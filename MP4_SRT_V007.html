
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MP4_SRT V007 Rewrite Engine</title>
<style>
body{font-family:Arial;background:#0b1220;color:#e6eefc;padding:20px}
textarea{width:100%;height:180px;background:#111a33;color:#fff;border:1px solid #3a4b7a;padding:10px;margin-bottom:10px}
button{padding:10px 16px;margin:5px;background:#2a5bd7;color:#fff;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#3b6df0}
.panel{background:#121c3a;padding:15px;border-radius:10px;margin-bottom:15px}
</style>
</head>

<body>

<h2>MP4_SRT V007 – Strong Rewrite Engine</h2>

<div class="panel">
<b>1. Paste original SRT</b>
<textarea id="input"></textarea>
</div>

<div class="panel">
<button onclick="rewrite()">Batch Rewrite</button>
<button onclick="download()">Download rewritten.srt</button>
</div>

<div class="panel">
<b>Rewritten SRT</b>
<textarea id="output"></textarea>
</div>

<script>

function cleanSentence(s){
    s=s.replace(/\bwhile\b/gi,"")
    s=s.replace(/\s+,/g,",")
    s=s.replace(/\s+/g," ").trim()
    return s
}

function strongRewrite(sentence){

    let s=sentence

    s=s.replace(/Once upon a time/gi,"Long ago")
    s=s.replace(/there was/gi,"there lived")
    s=s.replace(/little boy/gi,"young boy")
    s=s.replace(/very poor/gi,"extremely poor")
    s=s.replace(/had no money/gi,"had almost no money")
    s=s.replace(/went to/gi,"decided to go to")

    s=cleanSentence(s)

    return s
}

function rewrite(){

    let text=document.getElementById("input").value
    let blocks=text.split(/\n\n+/)
    let out=[]

    for(let b of blocks){

        let lines=b.split("\n")

        if(lines.length>=3){

            let id=lines[0]
            let time=lines[1]

            let sentence=lines.slice(2).join(" ")
            let rewritten=strongRewrite(sentence)

            out.push(id+"\n"+time+"\n"+rewritten)
        }

    }

    document.getElementById("output").value=out.join("\n\n")
}

function download(){

    let data=document.getElementById("output").value
    let blob=new Blob([data],{type:"text/plain"})
    let url=URL.createObjectURL(blob)

    let a=document.createElement("a")
    a.href=url
    a.download="rewritten.srt"
    a.click()

    URL.revokeObjectURL(url)
}

</script>

</body>
</html>
