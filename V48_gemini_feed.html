<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V48 Gemini Music Prompt Generator</title>
<style>
body{font-family:Arial;padding:20px;background:#111;color:#eee}
textarea{width:100%;height:220px;margin-top:10px;background:#222;color:#0f0}
button{padding:10px;margin:5px}
.box{border:1px solid #444;padding:10px;margin-top:15px}
</style>
</head>
<body>

<h2>V48 - Gemini 兒歌強化餵料器（含節奏+Hook）</h2>

<input type="file" id="srtFile"><br>
<button onclick="parseSRT()">解析 SRT</button>

<div id="output"></div>

<script>
function parseSRT(){
    const file = document.getElementById('srtFile').files[0];
    if(!file) return alert("請選 SRT");

    const reader = new FileReader();
    reader.onload = function(e){
        const text = e.target.result;
        const blocks = text.split(/\n\s*\n/);

        let lines = [];
        blocks.forEach(b=>{
            let l = b.split("\n").filter(x=>x.trim());
            if(l.length>2){
                lines.push(l.slice(2).join(" "));
            }
        });

        let chunkSize = Math.ceil(lines.length/6);
        let outHTML = "";

        for(let i=0;i<6;i++){
            let partLines = lines.slice(i*chunkSize,(i+1)*chunkSize);

            let hook = partLines.slice(0,2).join("\n");

            let prompt = `Style: happy kids song, upbeat, simple melody, 100-120 bpm

Structure:
short intro, verse, catchy hook, repeat

Lyrics:
${partLines.join("\n")}

Hook:
${hook}`;

            outHTML += `
            <div class="box">
            <h3>Part ${i+1}</h3>
            <textarea id="t${i}">${prompt}</textarea><br>
            <button onclick="copyText(${i})">複製</button>
            </div>`;
        }

        document.getElementById("output").innerHTML = outHTML;
    }
    reader.readAsText(file);
}

function copyText(i){
    let t = document.getElementById("t"+i);
    t.select();
    document.execCommand("copy");
    alert("已複製 Part "+(i+1));
}
</script>

</body>
</html>
