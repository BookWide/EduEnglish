<div class="modal" id="stage1Modal"><div class="modalBox"><h2>第 1 關完成！</h2><p>你完成 1–10 題，得到 <b>2 個遊客金幣</b>。接下來可去影片館使用，或挑戰 11–20 題。</p><div class="modalActions"><button class="gold" id="openPortal" type="button">A. 去 Story / Music / Movie / News</button><button id="startStage2" type="button">B. 進入 11–20 跟讀挑戰</button></div></div></div>

/* === BookWide roman speech helper: vi/th/ne fallback === */
function bwRomanOf(obj, lang){
  try{
    if(!obj) return "";
    if(obj.roman && obj.roman[lang]) return obj.roman[lang];
    return "";
  }catch(e){return "";}
}
function bwSpeakText(obj, lang){
  const roman = bwRomanOf(obj, lang);
  if((lang === "th" || lang === "ne" || lang === "vi") && roman) return roman;
  return (obj && (obj[lang] || obj.en || obj.zh || obj.ja)) || "";
}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}function lang(){return $("localSelect").value||"ja"}function cfg(){return LANGS[lang()]||LANGS.ja}function local(obj){const code=lang();if(code==="en")return"";return String(obj?.[code]||obj?.local||"")}function speechLang(){return cfg().speech}function normalize(s){return String(s||"").toLowerCase().replace(/[’']/g,"").replace(/[^a-z0-9぀-ヿ㐀-鿿가-힯ऀ-ॿ\s]/g," ").replace(/\s+/g," ").trim()}
function scoreText(a,b){a=normalize(a);b=normalize(b);if(!a||!b)return 0;const aw=a.split(" "),bw=b.split(" ");let hit=0;for(const w of aw){if(bw.includes(w))hit++}let ratio=hit/Math.max(aw.length,1);if(a.length>3&&b.includes(a))ratio=Math.max(ratio,.75);return Math.round(Math.min(100,ratio*100))}
function fetchJson(u){return fetch(u+(u.includes("?")?"&":"?")+"v="+Date.now(),{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})}
async function load(){try{let data=await fetchJson(PHOTO_JSON);let a=Array.isArray(data)?data:data.photos;if(Array.isArray(a)&&a.length)photos=a.filter(Boolean)}catch(e){console.warn("photos fallback",e)}try{let data=await fetchJson(LESSON_JSON);let a=Array.isArray(data)?data:data.lessons;if(Array.isArray(a)&&a.length&&a[0]&&a[0].question&&a[0].question.it&&a[0].choices&&a[0].choices[0]&&a[0].choices[0].it)lessons=a.slice(0,TOTAL)}catch(e){console.warn("lessons fallback",e)}}
function setCoins(n){let cur=Number(localStorage.getItem("bw_guest_coins")||0);localStorage.setItem("bw_guest_coins",String(cur+n))}
function speak(t,l,rate=RATE,onDone){if(!t){onDone&&onDone();return}try{speechSynthesis.cancel()}catch(e){}const u=new SpeechSynthesisUtterance(String(t));u.lang=l;u.rate=rate;u.pitch=1;u.onend=()=>onDone&&onDone();u.onerror=()=>onDone&&onDone();speechSynthesis.speak(u)}
function speakSeq(items){try{speechSynthesis.cancel()}catch(e){}let i=0;function next(){if(i>=items.length)return;const it=items[i++];if(!it||!it.text){next();return}const u=new SpeechSynthesisUtterance(String(it.text));u.lang=it.lang||"en-US";u.rate=it.rate||RATE;u.pitch=1;u.onend=()=>setTimeout(next,220);u.onerror=()=>setTimeout(next,220);speechSynthesis.speak(u)}next()}
function renderHeroWords(text){const words=String(text||"").split(/(\s+)/);$("heroEn").innerHTML=words.map(w=>/\s+/.test(w)?w:`<span class="heroWord">${esc(w)}</span>`).join("")}
function highlightHero(){const words=[...document.querySelectorAll(".heroWord")];words.forEach(w=>w.classList.remove("on"));let i=0;const timer=setInterval(()=>{words.forEach(w=>w.classList.remove("on"));if(i>=words.length){clearInterval(timer);return}words[i++].classList.add("on")},260)}
function playQuestion(){const l=lessons[idx],lo=local(l.question||l);highlightHero();speak(l.en,"en-US",RATE,()=>{if(lo){$("heroLocal").classList.add("on");speak(lo,speechLang(),RATE,()=>$("heroLocal").classList.remove("on"))}})}
function stage2Needed(){return idx>=10}function isChallengePassed(){return !stage2Needed()||passed[idx]}
function render(){if(idx>9&&!stage2Unlocked)idx=0;const l=lessons[idx]||lessons[0],lo=local(l.question||l);answered=false;renderHeroWords(l.en);$("heroLocal").textContent=lo;$("heroLocal").style.display=lo?"block":"none";$("headerSub").textContent=`第 ${idx+1} 關｜英文＋${cfg().label}｜中文只顯示`;$("miniStage").textContent=`第 ${idx+1} 關`;$("miniDone").textContent=`${Math.min(idx,20)}/20`;$("miniCoins").textContent=`金${Number(localStorage.getItem("bw_shopping_bonus")||0)}`;$("miniNextCoin").textContent=idx<10?"完成10題送2金":"跟讀>35%";$("miniBadge").textContent=idx<10?"第1關":"第2關";$("title").textContent=l.title||"Shopping English + Local";$("scene").textContent=l.scene||"購物";$("photo").src=photos[idx%photos.length]||photos[0];renderChallenge();renderQuiz();}
function renderChallenge(){const box=$("speakBox"),quiz=$("quizBox"),l=lessons[idx];if(!stage2Needed()){box.classList.remove("show");quiz.style.display="block";return}box.classList.add("show");const done=passed[idx];quiz.style.display=done?"block":"none";$("challengeTop").textContent=`任務 ${idx+1} / 20｜先慢速聽，再開口說。分數超過 ${PASS_SCORE} 才可做題。｜本 Mission 已解鎖`;$("tabEn").classList.toggle("on",challengeMode==="en");$("tabLocal").classList.toggle("on",challengeMode!=="en");const target=challengeMode==="en"?l.en:(local(l.question||l)||l.en);const targetLocal=challengeMode==="en"?(local(l.question||l)||""):l.en;$("challengeTarget").textContent=target;$("challengeLocal").textContent=targetLocal;$("challengeLocal").style.display=targetLocal?"block":"none";$("challengeZh").textContent=(l.question&&l.question.zh)||l.zh||"";$("challengeRef").textContent=challengeMode==="en"?((l.question&&l.question.zh)||l.zh||""):l.en;$("passBtn").style.display=done?"inline-block":"none";$("scoreBox").classList.remove("show");}
function renderQuiz(){const l=lessons[idx],answers=(l.answers||l.choices||[]).slice(0,3);$("quizQ").textContent=`「${l.en}」選合理回答：`;$("completeBtn").textContent="先答題";$("completeBtn").classList.remove("ready");$("choices").innerHTML=answers.map((a,i)=>{let al=local(a);return `<button class="choice" type="button" data-i="${i}" data-c="${a.correct?'1':'0'}"><div class="choiceInner"><span class="choiceNo">${String.fromCharCode(65+i)}.</span><span class="choiceText"><span class="choiceEn">${esc(a.en||"")}</span>${al?`<span class="choiceLocal">${esc(al)}</span>`:""}<span class="choiceZh">${esc(a.zh||"")}</span></span><span class="choiceSpeak">🔊</span></div></button>`}).join("");document.querySelectorAll(".choice").forEach(b=>{b.onclick=e=>{const a=answers[Number(b.dataset.i)],al=local(a),seq=[{text:a.en,lang:"en-US"}];if(al)seq.push({text:al,lang:speechLang()});if(e.target.classList.contains("choiceSpeak")){speakSeq(seq);return}if(stage2Needed()&&!passed[idx])return;document.querySelectorAll(".choice").forEach(x=>x.disabled=true);b.classList.add(b.dataset.c==="1"?"correct":"wrong");speakSeq(seq);if(b.dataset.c==="1"){answered=true;$("completeBtn").textContent="完成本關";$("completeBtn").classList.add("ready")}else{$('completeBtn').textContent="答錯，請重整再試"}}})}
function checkChallenge(text){const l=lessons[idx];const target=challengeMode==="en"?l.en:(local(l.question||l)||l.en);const sc=scoreText(target,text);$("saidBox").textContent=text||"尚未取得內容";$("scoreText").textContent=`分數：${sc} / 100（需超過 ${PASS_SCORE}）`;$("scoreBox").classList.add("show");if(sc>PASS_SCORE){passed[idx]=true;$("passBtn").style.display="inline-block";$("scoreText").textContent+=`｜通過，可以進入答題`;renderQuiz();$("quizBox").style.display="block"}}
function openModal(id){$(id).classList.add("show")}function closeModal(id){$(id).classList.remove("show")}
$("localSelect").onchange=render;$("play").onclick=playQuestion;$("hero").onclick=playQuestion;
$("prev").onclick=()=>{if(idx>0){idx--;render()}};$("next").onclick=()=>{if(!answered){alert("本關還沒完成，不能跳下一關");return}if(idx===9||idx===19)return;if(idx<9||stage2Unlocked){idx++;render()}};$("photoPrev").onclick=e=>{e.stopPropagation();$("prev").click()};$("photoNext").onclick=e=>{e.stopPropagation();$("next").click()};
$("completeBtn").onclick=()=>{if(!answered||!$("completeBtn").classList.contains("ready"))return;if(idx<9){idx++;render();return}if(idx===9){if(!localStorage.getItem("bw_shopping_stage1_bonus")){setCoins(2);localStorage.setItem("bw_shopping_stage1_bonus","1");localStorage.setItem("bw_shopping_bonus",String(Number(localStorage.getItem("bw_shopping_bonus")||0)+2))}openModal("stage1Modal");render();return}if(idx<19){idx++;render();return}if(idx===19){if(!localStorage.getItem("bw_shopping_stage2_bonus")){setCoins(2);localStorage.setItem("bw_shopping_stage2_bonus","1");localStorage.setItem("bw_shopping_bonus",String(Number(localStorage.getItem("bw_shopping_bonus")||0)+2))}openModal("finishModal");render();return}};
$("openPortal").onclick=()=>{closeModal("stage1Modal");openModal("portalModal")};$("backStage1").onclick=()=>{closeModal("portalModal");openModal("stage1Modal")};$("startStage2").onclick=()=>{stage2Unlocked=true;idx=10;closeModal("stage1Modal");render()};$("finishPortal").onclick=()=>{closeModal("finishModal");openModal("portalModal")};
$("tabEn").onclick=()=>{challengeMode="en";renderChallenge()};$("tabLocal").onclick=()=>{challengeMode="local";renderChallenge()};$("slowBtn").onclick=()=>{const l=lessons[idx];const t=challengeMode==="en"?l.en:(local(l.question||l)||l.en);speak(t,challengeMode==="en"?"en-US":speechLang(),.68)};$("passBtn").onclick=()=>{$("quizBox").scrollIntoView({behavior:"smooth",block:"nearest"})};$("checkBtn").onclick=()=>checkChallenge($("saidInput").value);
$("recBtn").onclick=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("這個瀏覽器沒有語音辨識，請在下方輸入你說的內容，再按檢查分數。");return}const rec=new SR();rec.lang=challengeMode==="en"?"en-US":speechLang();rec.interimResults=false;rec.maxAlternatives=1;$("saidBox").textContent="正在聽...";$("scoreBox").classList.add("show");rec.onresult=e=>{const txt=e.results[0][0].transcript;$("saidInput").value=txt;checkChallenge(txt)};rec.onerror=e=>{$("saidBox").textContent="語音辨識失敗，請手動輸入。"};rec.start()};
load().then(render);


/* BW_ROMAN_VOICE_BRIDGE_V1 */
(function(){
  if(window.__BW_ROMAN_VOICE_BRIDGE_V1__) return;
  window.__BW_ROMAN_VOICE_BRIDGE_V1__ = true;

  const ROMAN_LANGS = new Set(["vi","th","ne"]);

  function bwNormLang(lang){
    lang = String(lang || "").toLowerCase();
    if(lang.startsWith("vi")) return "vi";
    if(lang.startsWith("th")) return "th";
    if(lang.startsWith("ne")) return "ne";
    if(lang.startsWith("ja")) return "ja";
    if(lang.startsWith("zh")) return "zh";
    if(lang.startsWith("en")) return "en";
    return lang || "en";
  }

  function bwTtsLang(lang){
    lang = bwNormLang(lang);
    if(ROMAN_LANGS.has(lang)) return "en-US";
    if(lang === "ja") return "ja-JP";
    if(lang === "zh") return "zh-TW";
    return "en-US";
  }

  function bwPickSelectLang(){
    const sels = Array.from(document.querySelectorAll("select"));
    for(const s of sels){
      const v = bwNormLang(s.value);
      if(v) return v;
    }
    return "ja";
  }

  function bwWalk(obj, fn, seen){
    if(!obj || typeof obj !== "object") return;
    seen = seen || new WeakSet();
    if(seen.has(obj)) return;
    seen.add(obj);
    fn(obj);
    if(Array.isArray(obj)){
      obj.forEach(x => bwWalk(x, fn, seen));
    }else{
      Object.keys(obj).forEach(k => bwWalk(obj[k], fn, seen));
    }
  }

  function bwBuildRomanMap(){
    const map = new Map();
    try{
      const root = window.lessons || window.LESSONS || window.DATA || null;
      bwWalk(root, function(o){
        if(!o || typeof o !== "object") return;
        const roman = o.roman && typeof o.roman === "object" ? o.roman : {};
        ["vi","th","ne"].forEach(lang=>{
          if(typeof o[lang] === "string" && o[lang].trim()){
            const r = roman[lang] || o[lang + "_roman"] || "";
            if(r) map.set(o[lang].trim(), String(r).trim());
          }
        });
      });
    }catch(e){}
    return map;
  }

  let BW_ROMAN_MAP = null;
  function bwRomanMap(){
    if(!BW_ROMAN_MAP) BW_ROMAN_MAP = bwBuildRomanMap();
    return BW_ROMAN_MAP;
  }

  window.bwRomanOf = function(obj, lang){
    lang = bwNormLang(lang);
    if(!obj || !ROMAN_LANGS.has(lang)) return "";
    if(obj.roman && obj.roman[lang]) return String(obj.roman[lang]);
    if(obj[lang + "_roman"]) return String(obj[lang + "_roman"]);
    if(obj[lang]) return bwRomanMap().get(String(obj[lang]).trim()) || "";
    return "";
  };

  window.bwSpeakPlain = function(text, lang, rate){
    text = String(text || "").trim();
    if(!text) return;
    try{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang || "en-US";
      u.rate = rate || (window.RATE || 0.8);
      speechSynthesis.speak(u);
    }catch(e){ console.warn("bwSpeakPlain failed", e); }
  };

  window.bwSpeakText = function(obj, lang){
    lang = bwNormLang(lang);
    if(!obj) return;
    let text = "";
    if(typeof obj === "string"){
      text = obj;
    }else if(ROMAN_LANGS.has(lang)){
      text = window.bwRomanOf(obj, lang) || obj.en || obj[lang] || "";
    }else{
      text = obj[lang] || obj.en || "";
    }
    if(!text) return;
    window.bwSpeakPlain(text, bwTtsLang(lang), window.RATE || 0.8);
  };

  function bwCurrentLesson(){
    try{
      const arr = window.lessons || window.LESSONS || [];
      let i = 0;
      if(typeof window.idx !== "undefined") i = window.idx;
      else if(typeof window.currentIndex !== "undefined") i = window.currentIndex;
      else if(typeof window.lessonIndex !== "undefined") i = window.lessonIndex;
      i = Math.max(0, Math.min(Number(i)||0, arr.length - 1));
      return arr[i];
    }catch(e){ return null; }
  }

  function bwSpeakCurrent(){
    const lesson = bwCurrentLesson();
    if(!lesson) return;
    const lang = bwPickSelectLang();
    try{ speechSynthesis.cancel(); }catch(e){}
    window.bwSpeakText(lesson, "en");
    setTimeout(()=>window.bwSpeakText(lesson, lang), 900);
  }

  function bwTextChoiceFromButton(btn){
    const box = btn.closest(".choice,.choiceInner,button,li,div");
    if(!box) return null;
    const txt = (box.innerText || "").trim();
    if(!txt) return null;
    const lines = txt.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    let en = "";
    let roman = "";
    for(const line of lines){
      if(/^拼音\s*[:：]/.test(line)) roman = line.replace(/^拼音\s*[:：]\s*/, "").trim();
      else if(!en && /[A-Za-z]/.test(line) && !/^拼音\s*[:：]/.test(line)) en = line.replace(/^[A-C]\.?\s*/, "").trim();
    }
    return {en, roman};
  }

  function bwSpeakChoiceButton(btn){
    const lang = bwPickSelectLang();
    const parsed = bwTextChoiceFromButton(btn);
    if(!parsed) return false;
    try{ speechSynthesis.cancel(); }catch(e){}
    if(parsed.en) window.bwSpeakPlain(parsed.en, "en-US", window.RATE || 0.8);
    const second = ROMAN_LANGS.has(lang) ? parsed.roman : "";
    if(second) setTimeout(()=>window.bwSpeakPlain(second, "en-US", window.RATE || 0.8), 900);
    return true;
  }

  try{
    const oldSpeak = speechSynthesis.speak.bind(speechSynthesis);
    speechSynthesis.speak = function(utter){
      try{
        if(utter && typeof utter.text === "string"){
          const raw = utter.text.trim();
          const lang = bwNormLang(utter.lang || bwPickSelectLang());
          const mapped = bwRomanMap().get(raw);
          if(mapped || ROMAN_LANGS.has(lang)){
            utter.text = mapped || raw;
            utter.lang = "en-US";
            utter.rate = utter.rate || (window.RATE || 0.8);
          }
        }
      }catch(e){}
      return oldSpeak(utter);
    };
  }catch(e){}

  document.addEventListener("click", function(ev){
    const btn = ev.target.closest("button");
    if(!btn) return;
    const id = btn.id || "";
    const cls = String(btn.className || "");

    if(id === "play" || cls.includes("play")){
      if(ROMAN_LANGS.has(bwPickSelectLang())){
        ev.preventDefault();
        ev.stopPropagation();
        if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        bwSpeakCurrent();
      }
      return;
    }

    if(cls.includes("choiceSpeak") || cls.includes("speak") || /🔊/.test(btn.innerText || "")){
      if(ROMAN_LANGS.has(bwPickSelectLang())){
        ev.preventDefault();
        ev.stopPropagation();
        if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        bwSpeakChoiceButton(btn);
      }
    }
  }, true);

  document.addEventListener("change", function(ev){
    if(ev.target && ev.target.tagName === "SELECT"){
      setTimeout(()=>{ BW_ROMAN_MAP = bwBuildRomanMap(); }, 100);
    }
  }, true);

  setTimeout(()=>{ BW_ROMAN_MAP = bwBuildRomanMap(); }, 500);
  setTimeout(()=>{ BW_ROMAN_MAP = bwBuildRomanMap(); }, 1500);
})();

</script>
