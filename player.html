<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BookWide 播放器（Talk 位置修正版）</title>
<style>
:root{
  --bg:#081224;
  --panel:#0d1a30;
  --panel2:#10213d;
  --line:#1d3156;
  --ink:#eef4ff;
  --muted:#9fb4d9;
  --accent:#2f7de1;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}
a{color:inherit;text-decoration:none}
header{
  height:86px;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;background:#09162d;border-bottom:1px solid #12284a;
}
header h1{margin:0;font-size:22px}
.top-actions{display:flex;gap:12px;align-items:center}
.btn{
  border:1px solid #26436d;background:#102747;color:#fff;border-radius:14px;
  padding:10px 16px;cursor:pointer;font-size:14px;line-height:1;
}
.btn:hover{filter:brightness(1.08)}
.btn.sm{padding:8px 12px;border-radius:999px}
.btn.ghost{background:transparent}
.wrap{height:calc(100vh - 86px);padding:14px}
.layout{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;height:100%;
}
.left,.right{
  background:var(--panel);border:1px solid var(--line);border-radius:16px;min-width:0;min-height:0;
}
.left{padding:14px;display:flex;flex-direction:column}
.videoWrap{
  width:100%;aspect-ratio:16/10;background:#000;border-radius:14px;overflow:hidden;
}
.videoWrap video,.videoWrap iframe{width:100%;height:100%;display:block;border:0}
.controls{
  margin-top:12px;background:#0e2340;border:1px solid #18385d;border-radius:16px;padding:12px;
}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:8px 0}
.range{accent-color:#ff4d7f}
.right{display:flex;flex-direction:column;overflow:hidden}
.tabs{
  display:flex;gap:10px;padding:14px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:4;
}
.tab{
  border:1px solid #26436d;background:#102747;color:#fff;border-radius:16px;padding:10px 16px;font-weight:700;cursor:pointer;
}
.tab.active{background:#1f5faa}
.paneWrap{flex:1;overflow:auto}
.pane{display:none;padding:0}
.pane.active{display:block}
.placeholder{padding:18px;color:var(--muted)}
/* Talk 只在右側 */
.talk-top{
  padding:14px;border-bottom:1px solid var(--line);background:#0c1a31;
}
.talk-mode-row,.talk-action-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.select{
  min-width:220px;height:44px;border-radius:14px;border:1px solid #26436d;
  background:#102747;color:#fff;padding:0 14px;font-size:14px;
}
.statusLine{color:#b8c9e8;margin-top:10px;font-size:14px}
.card{
  margin:14px;padding:18px;border:1px solid var(--line);border-radius:18px;background:var(--panel2);
}
.card h3{margin:0 0 12px 0;font-size:16px;color:#d8e7ff}
.big-en{font-size:20px;font-weight:800;line-height:1.45}
.sub-line{margin-top:10px;font-size:14px;line-height:1.8;color:#d6e4ff}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  border:1px solid #2d5c96;background:#12315a;color:#fff;border-radius:999px;
  padding:4px 10px;font-size:13px;min-width:56px
}
.talk-footer{
  padding:0 14px 14px;
}
.speech-box{
  border:1px solid var(--line);background:#071427;border-radius:18px;padding:18px;min-height:140px;
}
.speech-box .label{font-size:14px;color:#d8e7ff;margin-bottom:8px}
.speech-box .muted{color:var(--muted);line-height:1.8}
.list{
  margin:14px;display:flex;flex-direction:column;gap:10px
}
.item{
  border:1px solid #183256;background:#0a1830;border-radius:16px;padding:14px;
}
.item.active{background:#17345e;border-color:#2f7de1}
.item-top{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}
.item-main{display:flex;gap:12px;align-items:flex-start}
.time{font-family:ui-monospace,Consolas,monospace;color:#d4e1ff;min-width:84px;font-size:13px}
.item-text{flex:1;min-width:0}
.item-en{font-size:18px;font-weight:800;line-height:1.45}
.item-sub{font-size:14px;line-height:1.8;color:#d9e5ff;margin-top:8px}
.item-actions{display:flex;gap:8px;flex-wrap:wrap}
.score{
  margin-top:10px;padding:10px 12px;border-radius:12px;background:#0b1d36;border:1px solid #17345a;color:#dfeaff;
  font-size:14px;
}
.muted{color:var(--muted)}
.hidden{display:none!important}
@media (max-width:980px){
  .layout{grid-template-columns:1fr}
  .wrap{height:auto}
  body{height:auto}
}
</style>
</head>
<body>
<header>
  <h1>播放器</h1>
  <div class="top-actions">
    <a class="btn" href="./account/learning-dashboard.html">↩ 回學習控制台</a>
    <span id="userNameBadge" class="muted"></span>
  </div>
</header>

<div class="wrap">
  <div class="layout">
    <section class="left">
      <div class="videoWrap">
        <video id="player" playsinline controls></video>
      </div>

      <div class="controls">
        <div class="row">
          <button class="btn" id="btnPrev">⏮ 上一句</button>
          <button class="btn" id="btnPlay">▶ 播放 / 暫停</button>
          <button class="btn" id="btnNext">⏭ 下一句</button>
          <button class="btn" id="btnReplay">🔁 重複本句</button>
        </div>
        <div class="row">
          <label class="btn ghost"><input id="chkFollow" type="checkbox" /> 跟隨</label>
          <span class="btn ghost">偏移 <span id="offsetVal">0.0s</span></span>
          <button class="btn" id="btnOffsetMinus">-0.5s</button>
          <button class="btn" id="btnOffsetPlus">+0.5s</button>
          <button class="btn" id="btnAutoSync">🧭 簡易校準</button>
        </div>
        <div class="row">
          <span>速度</span>
          <input class="range" id="speedRange" type="range" min="0.5" max="2" step="0.05" value="1">
          <span id="speedVal">1.00x</span>
        </div>
      </div>
    </section>

    <section class="right">
      <div class="tabs">
        <button class="tab active" data-tab="sub">字幕</button>
        <button class="tab" data-tab="quiz">測驗</button>
        <button class="tab" data-tab="vocab">單字</button>
        <button class="tab" data-tab="ai">AI互動</button>
        <button class="tab" data-tab="talk">Talk</button>
      </div>

      <div class="paneWrap">
        <section class="pane active" id="pane-sub">
          <div class="placeholder">字幕分頁保留。這版重點只修 Talk 位置，讓 Talk 不再出現在左側。</div>
        </section>

        <section class="pane" id="pane-quiz">
          <div class="placeholder">測驗分頁保留。</div>
        </section>

        <section class="pane" id="pane-vocab">
          <div class="placeholder">單字分頁保留。</div>
        </section>

        <section class="pane" id="pane-ai">
          <div class="placeholder">AI互動分頁保留。</div>
        </section>

        <section class="pane" id="pane-talk">
          <div class="talk-top">
            <div class="talk-mode-row">
              <button class="btn sm" id="modeShadow">跟讀</button>
              <button class="btn sm" id="modeRoleplay">角色扮演</button>
              <select class="select" id="roleSelect">
                <option value="student">我扮演：student</option>
                <option value="teacher">我扮演：teacher</option>
                <option value="customer">我扮演：customer</option>
                <option value="clerk">我扮演：clerk</option>
              </select>
              <span class="statusLine" id="talkStatus">Talk 載入中…</span>
            </div>
          </div>

          <div class="card">
            <h3>目前練習</h3>
            <div class="item-main">
              <span class="badge" id="turnBadge">—</span>
              <span class="time" id="turnTime">00:00:00</span>
            </div>
            <div class="big-en" id="turnEn">—</div>
            <div class="sub-line" id="turnZh">—</div>
            <div class="sub-line" id="turnJa">—</div>
            <div class="score" id="turnHint">模式：跟讀。可用「跳句 / 朗讀 / 上一句 / 下一句 / 我來說」練習。</div>
          </div>

          <div class="talk-footer">
            <div class="talk-action-row">
              <button class="btn" id="btnTalkStart">▶ 開始本輪</button>
              <button class="btn" id="btnTalkSpeak">🎙 我來說</button>
              <button class="btn" id="btnTalkStop">■ 停止</button>
              <button class="btn" id="btnTalkRead">🔊 朗讀目前句</button>
              <button class="btn sm" id="btnTalkZh">中</button>
              <button class="btn sm" id="btnTalkJa">日</button>
              <button class="btn" id="btnTalkPrev">◀ 上一句</button>
              <button class="btn" id="btnTalkNext">下一句 ▶</button>
              <span class="muted" id="talkCount">第 0/0 句</span>
            </div>
            <div style="margin-top:10px">
              <label><input type="checkbox" id="chkAutoNext" checked> AI 後自動下一句</label>
            </div>
          </div>

          <div class="card">
            <h3>口說區</h3>
            <div class="speech-box">
              <div class="label" id="speechMode">輸到你說：—</div>
              <div class="muted" id="speechText">辨識文字：—</div>
              <div class="muted" id="speechScore">相似度：—</div>
            </div>
          </div>

          <div class="list" id="talkList"></div>
        </section>
      </div>
    </section>
  </div>
</div>

<script>
const $ = (s, e=document) => e.querySelector(s);
const $$ = (s, e=document) => [...e.querySelectorAll(s)];
const params = new URLSearchParams(location.search);
const cat = (params.get('cat') || 'story').toLowerCase();
const slug = (params.get('slug') || '').trim();
const BASE = '';
let talkMode = 'shadow';
let talkItems = [];
let talkIndex = 0;
let recognition = null;
let synth = window.speechSynthesis || null;

function fmtTime(t){
  if(!t) return '00:00:00';
  return String(t);
}
function escapeHtml(s){
  return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}
function switchTab(name){
  $$('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === name));
  $$('.pane').forEach(x => x.classList.remove('active'));
  const pane = $('#pane-' + name);
  if(pane) pane.classList.add('active');
}
$$('.tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

function updateTalkCard(){
  const item = talkItems[talkIndex];
  if(!item){
    $('#talkStatus').textContent = '目前沒有 Talk 資料';
    $('#turnBadge').textContent = '—';
    $('#turnTime').textContent = '00:00:00';
    $('#turnEn').textContent = '—';
    $('#turnZh').textContent = '—';
    $('#turnJa').textContent = '—';
    $('#talkCount').textContent = '第 0/0 句';
    return;
  }
  $('#turnBadge').textContent = item.role || 'speaker';
  $('#turnTime').textContent = fmtTime(item.time);
  $('#turnEn').textContent = item.text || '—';
  $('#turnZh').textContent = item.zh || '—';
  $('#turnJa').textContent = item.ja || '—';
  $('#talkCount').textContent = `第 ${talkIndex + 1}/${talkItems.length} 句`;

  const userRole = $('#roleSelect').value;
  if(talkMode === 'roleplay'){
    if((item.role || '').toLowerCase() === userRole.toLowerCase()){
      $('#turnHint').textContent = `角色扮演：現在輪到你（${userRole}）說。可按「我來說」開始辨識。`;
      $('#speechMode').textContent = `輪到你說：${userRole}`;
    }else{
      $('#turnHint').textContent = `角色扮演：現在由 AI / 影片角色 ${item.role || 'speaker'} 出句。`;
      $('#speechMode').textContent = `現在聽對方：${item.role || 'speaker'}`;
    }
  }else{
    $('#turnHint').textContent = '模式：跟讀。可用「跳句 / 朗讀 / 上一句 / 下一句 / 我來說」練習。';
    $('#speechMode').textContent = `輸入你說：跟讀：${userRole}`;
  }

  $$('#talkList .item').forEach((row, i) => row.classList.toggle('active', i === talkIndex));
}

function renderTalkList(){
  const list = $('#talkList');
  list.innerHTML = '';
  talkItems.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item' + (i === talkIndex ? ' active' : '');
    row.innerHTML = `
      <div class="item-top">
        <div class="item-main">
          <div class="time">${escapeHtml(fmtTime(item.time))}</div>
          <span class="badge">${escapeHtml(item.role || 'speaker')}</span>
        </div>
        <div class="item-actions">
          <button class="btn sm" data-act="jump">跳句</button>
          <button class="btn sm" data-act="en">英</button>
          <button class="btn sm" data-act="zh">中</button>
          <button class="btn sm" data-act="ja">日</button>
        </div>
      </div>
      <div class="item-text">
        <div class="item-en">${escapeHtml(item.text || '')}</div>
        <div class="item-sub">${escapeHtml(item.zh || '')}</div>
        <div class="item-sub">${escapeHtml(item.ja || '')}</div>
      </div>
    `;
    row.querySelector('[data-act="jump"]').addEventListener('click', () => {
      talkIndex = i;
      updateTalkCard();
      row.scrollIntoView({behavior:'smooth', block:'nearest'});
    });
    row.querySelector('[data-act="en"]').addEventListener('click', () => speakText(item.text, 'en-US'));
    row.querySelector('[data-act="zh"]').addEventListener('click', () => speakText(item.zh, 'zh-TW'));
    row.querySelector('[data-act="ja"]').addEventListener('click', () => speakText(item.ja, 'ja-JP'));
    list.appendChild(row);
  });
  updateTalkCard();
}

function speakText(text, lang='en-US'){
  if(!text || !synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  synth.speak(u);
}

function similarity(a, b){
  a = String(a || '').trim().toLowerCase();
  b = String(b || '').trim().toLowerCase();
  if(!a || !b) return 0;
  const aw = a.replace(/[^\w\s']/g,'').split(/\s+/).filter(Boolean);
  const bw = b.replace(/[^\w\s']/g,'').split(/\s+/).filter(Boolean);
  if(!aw.length || !bw.length) return 0;
  let hit = 0;
  bw.forEach(w => { if(aw.includes(w)) hit += 1; });
  return Math.round((hit / Math.max(bw.length, 1)) * 100);
}

function startSTT(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    $('#speechText').textContent = '辨識文字：此瀏覽器不支援語音辨識';
    return;
  }
  if(recognition){
    try{ recognition.stop(); }catch(e){}
  }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;

  $('#speechText').textContent = '辨識文字：正在聽...';
  $('#speechScore').textContent = '相似度：—';

  recognition.onresult = (ev) => {
    let transcript = '';
    for(let i = ev.resultIndex; i < ev.results.length; i++){
      transcript += ev.results[i][0].transcript + ' ';
    }
    transcript = transcript.trim();
    $('#speechText').textContent = '辨識文字：' + (transcript || '—');
    const target = talkItems[talkIndex]?.text || '';
    const score = similarity(transcript, target);
    $('#speechScore').textContent = '相似度：' + score + '%';
  };
  recognition.onerror = (ev) => {
    $('#speechText').textContent = '辨識文字：失敗（' + (ev.error || 'unknown') + '）';
  };
  recognition.start();
}

function stopSTT(){
  if(recognition){
    try{ recognition.stop(); }catch(e){}
  }
}

function nextTalk(){
  if(!talkItems.length) return;
  talkIndex = Math.min(talkIndex + 1, talkItems.length - 1);
  updateTalkCard();
}
function prevTalk(){
  if(!talkItems.length) return;
  talkIndex = Math.max(talkIndex - 1, 0);
  updateTalkCard();
}
function startTurn(){
  const item = talkItems[talkIndex];
  if(!item) return;
  const userRole = ($('#roleSelect').value || '').toLowerCase();
  const lineRole = (item.role || '').toLowerCase();
  if(talkMode === 'roleplay' && lineRole !== userRole){
    speakText(item.text, 'en-US');
    if($('#chkAutoNext').checked){
      setTimeout(() => {
        if(talkIndex < talkItems.length - 1){
          talkIndex += 1;
          updateTalkCard();
        }
      }, 1800);
    }
  }else{
    startSTT();
  }
}

async function loadTalk(){
  if(!slug){
    $('#talkStatus').textContent = '缺少 slug';
    return;
  }
  const paths = [
    `${BASE}/data/${cat}/${slug}/${slug}.dialogue.json?v=${Date.now()}`,
    `${BASE}/data/${cat}/${slug}/dialogue-${slug}.json?v=${Date.now()}`,
    `${BASE}/data/${cat}/${slug}/talk-${slug}.json?v=${Date.now()}`
  ];

  for(const url of paths){
    try{
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) continue;
      const json = await res.json();
      const arr = Array.isArray(json.dialogue) ? json.dialogue : [];
      if(arr.length){
        talkItems = arr;
        $('#talkStatus').textContent = `已載入 Talk：${arr.length} 句`;
        renderTalkList();
        return;
      }
    }catch(err){}
  }
  $('#talkStatus').textContent = '找不到 dialogue.json';
}

$('#modeShadow').addEventListener('click', () => { talkMode = 'shadow'; updateTalkCard(); });
$('#modeRoleplay').addEventListener('click', () => { talkMode = 'roleplay'; updateTalkCard(); });
$('#roleSelect').addEventListener('change', updateTalkCard);
$('#btnTalkStart').addEventListener('click', startTurn);
$('#btnTalkSpeak').addEventListener('click', startSTT);
$('#btnTalkStop').addEventListener('click', stopSTT);
$('#btnTalkRead').addEventListener('click', () => speakText(talkItems[talkIndex]?.text || '', 'en-US'));
$('#btnTalkZh').addEventListener('click', () => speakText(talkItems[talkIndex]?.zh || '', 'zh-TW'));
$('#btnTalkJa').addEventListener('click', () => speakText(talkItems[talkIndex]?.ja || '', 'ja-JP'));
$('#btnTalkPrev').addEventListener('click', prevTalk);
$('#btnTalkNext').addEventListener('click', nextTalk);

$('#btnPlay').addEventListener('click', () => {
  const v = $('#player');
  if(v.paused) v.play().catch(()=>{});
  else v.pause();
});
$('#btnPrev').addEventListener('click', prevTalk);
$('#btnNext').addEventListener('click', nextTalk);
$('#btnReplay').addEventListener('click', () => speakText(talkItems[talkIndex]?.text || '', 'en-US'));
$('#btnOffsetMinus').addEventListener('click', () => {
  const cur = parseFloat($('#offsetVal').textContent) || 0;
  $('#offsetVal').textContent = (cur - 0.5).toFixed(1) + 's';
});
$('#btnOffsetPlus').addEventListener('click', () => {
  const cur = parseFloat($('#offsetVal').textContent) || 0;
  $('#offsetVal').textContent = (cur + 0.5).toFixed(1) + 's';
});
$('#speedRange').addEventListener('input', (e) => {
  $('#speedVal').textContent = Number(e.target.value).toFixed(2) + 'x';
  $('#player').playbackRate = Number(e.target.value);
});

loadTalk();
</script>
</body>
</html>
