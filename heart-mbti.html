<style>
:root{--bg:#071225;--card:#0d1d35;--ink:#eef6ff;--muted:#9fb4d1;--blue:#3b82f6;--line:rgba(96,165,250,.28)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}
button,a{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.app{width:min(520px,100vw);margin:0 auto;padding:6px 7px 20px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
.brand{display:flex;align-items:center;gap:6px;min-width:0}.logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center}
.brand b{display:block;font-size:17px;line-height:1}.brand span{display:block;color:#b9cff0;font-size:10px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top a{font-size:11px;font-weight:850;border:1px solid rgba(148,163,184,.25);background:rgba(15,31,56,.78);border-radius:999px;padding:5px 9px}
.hero{position:relative;height:241px;border-radius:20px;overflow:hidden;background:#061225;margin-bottom:6px;box-shadow:0 14px 34px rgba(0,0,0,.24)}
.hero img,.hero video{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;filter:saturate(1.05) contrast(1.03)}.hero video{display:none;background:#061225}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,.06),rgba(5,12,24,.04) 35%,rgba(5,12,24,.70) 100%);pointer-events:none}
.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:28px;height:28px;border:0;border-radius:99px;background:rgba(255,255,255,.78);color:#0f172a;font-size:17px;font-weight:950}.prev{left:8px}.next{right:8px}
.hint{position:absolute;right:8px;bottom:8px;z-index:4;background:rgba(37,99,235,.76);border-radius:999px;padding:4px 7px;font-size:10px;font-weight:900}
.sub{position:absolute;left:10px;right:10px;bottom:48px;z-index:4;text-align:center;text-shadow:0 3px 16px rgba(0,0,0,.86),0 1px 2px rgba(0,0,0,.95)}
.en{font-size:clamp(12px,3.6vw,18px);line-height:1.12;font-weight:950;color:#fff}.ja{margin-top:5px;font-size:clamp(10px,2.9vw,15px);line-height:1.15;font-weight:950;color:#e9f7ff}.zh{margin-top:5px;font-size:clamp(10px,2.9vw,14px);line-height:1.15;font-weight:950;color:#fff7ed}
.wave{position:absolute;left:0;right:0;bottom:0;height:54px;z-index:3;background:linear-gradient(180deg,rgba(3,8,18,0),rgba(3,8,18,.72));pointer-events:none}
#waveCanvas{width:100%;height:100%;display:block}
.mini{display:flex;gap:4px;margin-bottom:4px;overflow-x:auto;scrollbar-width:none}.mini span{flex:0 0 auto;border:1px solid var(--line);background:rgba(13,29,53,.72);color:#dbeafe;border-radius:999px;padding:3px 7px;font-size:10px;font-weight:900}.mini .coin{color:#fde68a;border-color:rgba(251,191,36,.36);background:rgba(251,191,36,.12)}
.card{border:1px solid rgba(85,136,206,.42);border-radius:15px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:7px;box-shadow:0 12px 28px rgba(0,0,0,.16)}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}.title{min-width:0}.title b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title span{display:block;color:#c7d2fe;font-size:10px;font-weight:800}
.ctrls{display:flex;gap:4px}.ctrl{width:28px;height:28px;border-radius:999px;border:1px solid var(--line);background:rgba(59,130,246,.15);color:#dbeafe;font-weight:950}.ctrl.on{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55);color:#bbf7d0}.ctrl.off{opacity:.58}.play{width:35px;height:35px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff}
.quiz{border:1px solid rgba(251,191,36,.28);border-radius:14px;background:rgba(251,191,36,.08);padding:7px}.q{font-size:12.5px;font-weight:950;line-height:1.25;margin-bottom:5px}
.choices{display:grid;gap:4px}.choice{width:100%;border:1px solid rgba(148,163,184,.24);background:rgba(15,31,56,.85);color:#eaf3ff;border-radius:12px;padding:6px 7px;text-align:left;display:grid;grid-template-columns:22px 1fr 27px;gap:4px;align-items:center;min-height:40px;-webkit-tap-highlight-color:transparent}
.choice b{font-size:12.5px;line-height:1.12}.choice small{display:block;color:#c4b5fd;font-size:10.5px;line-height:1.1;margin-top:1px}.choice em{display:block;color:#cbd5e1;font-style:normal;font-size:10.5px;line-height:1.1;margin-top:1px}
.choiceText{min-width:0}.voiceBtns{display:grid;gap:2px}.voiceBtns button{width:27px;height:19px;border:1px solid rgba(96,165,250,.32);background:rgba(59,130,246,.16);color:#dbeafe;border-radius:999px;font-size:10px;font-weight:950;padding:0;cursor:pointer}.voiceBtns button:active{transform:scale(.96);background:rgba(96,165,250,.28)}
.choice.ok{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55);color:#bbf7d0}.choice.bad{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);color:#fecaca}
.spk{width:25px;height:25px;border-radius:99px;border:1px solid var(--line);background:rgba(59,130,246,.16);color:#dbeafe;display:grid;place-items:center}
.complete{width:100%;margin-top:5px;border-radius:999px;border:1px solid rgba(148,163,184,.28);background:rgba(148,163,184,.16);color:#cbd5e1;padding:7px 8px;font-size:12.5px;font-weight:950}.complete.ready{border:0;background:linear-gradient(135deg,#22c55e,#60a5fa);color:#fff}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:99;background:rgba(15,23,42,.9);border:1px solid var(--line);padding:10px 14px;border-radius:999px;font-size:13px;font-weight:900;display:none;max-width:min(360px,92vw);text-align:center}.toast.show{display:block}
.modal{position:fixed;inset:0;z-index:999;display:none;place-items:center;padding:20px;background:rgba(7,18,37,.66);backdrop-filter:blur(8px)}.modal.show{display:grid}.box{width:min(340px,92vw);border:1px solid rgba(251,191,36,.38);border-radius:24px;background:linear-gradient(145deg,rgba(16,40,71,.98),rgba(9,25,47,.98));box-shadow:0 24px 60px rgba(0,0,0,.42);padding:18px;text-align:center}.box h2{margin:0 0 8px;font-size:21px}.box p{margin:0 0 12px;color:#dbeafe;font-weight:850;line-height:1.45}.box button{width:100%;border:0;border-radius:999px;padding:10px 12px;background:linear-gradient(135deg,#f59e0b,#22c55e);color:#fff;font-weight:950}
@media(max-width:390px){.hero{height:214px;border-radius:18px}.app{padding-left:7px;padding-right:7px}}

/* === Doctor-style read-along highlight: 英文逐字變色，日文整句變色 === */

<script>

const HEART_TOPIC_SLUG = new URLSearchParams(location.search).get("topic") || "mbti";
// MBTI 測試用：?reset=1 會清空本主題舊進度，強制回第 1 題。
(function(){
  try{
    const p = new URLSearchParams(location.search);
    if(p.get("reset") === "1"){
      const slug = HEART_TOPIC_SLUG;
      [
        "bw_heart_done_"+slug,
        "bw_heart_failed_"+slug,
        "bw_heart_answers_"+slug,
        "bw_heart_idx_"+slug,
        "bw_heart_mbti_scores_"+slug,
        "bw_heart_paid_block_"+slug+"_1",
        "bw_heart_paid_block_"+slug+"_2",
        "bw_heart_paid_block_"+slug+"_topic"
      ].forEach(k=>localStorage.removeItem(k));
    }
  }catch(e){}
})();
const HEART_TOPICS_URLS = [
  "/data/monk/heart-topics.json",
  "data/monk/heart-topics.json",
  "./data/monk/heart-topics.json",
  "/data/heart/heart-topics.json",
  "data/heart/heart-topics.json",
  "./data/heart/heart-topics.json"
].map(u => u + "?v=" + Date.now());

let HEART_TOPIC = null;
let HEART_TITLE = "情商問答";
let HEART_SERIES = "情商問答";
let HEART_QUESTIONS_URL = "";
let HEART_PHOTOS_URL = "";
let HEART_BGM_URL = "";

// === MBTI MODE v1：只對 topic=mbti / mbti-64 生效；其它 heart / monk / funny / renqing 完全走原流程 ===
function isMbtiMode(){
  return /^mbti(?:-|$)/i.test(String(HEART_TOPIC_SLUG || ""));
}
try{ if(isMbtiMode()) document.body.classList.add("bw-mbti-mode"); }catch(e){}
const MBTI_FREE_RESULT_TOTAL = 10; // 初階：10 題免費完成後立即給初階結果
const MBTI_ADVANCED_RESULT_TOTAL = 20; // 進階：20 題提高準度
const MBTI_FULL_REPORT_TOTAL = 40; // 完整：40 題產出完整人格報告｜感情/職場/學習/金錢模式
function mbtiAnswerKey(){ return "bw_heart_mbti_scores_" + HEART_TOPIC_SLUG; }

// === MBTI v2: 選答案就算完成，不再依賴「完成本題」按鈕；避免答完10題看不到報告 ===
function mbtiAnswerDays(){
  try{
    return [...new Set(getHeartAnswers().map(a=>Number(a.day||0)).filter(n=>n>0))].sort((a,b)=>a-b);
  }catch(e){ return []; }
}
function mbtiDoneDays(){
  const a = mbtiAnswerDays();
  const d = Array.isArray(getDone()) ? getDone().map(x=>Number(x||0)).filter(n=>n>0) : [];
  return [...new Set([...d, ...a])].sort((x,y)=>x-y);
}
function mbtiSyncDoneFromAnswers(){
  if(!isMbtiMode()) return getDone();
  const merged = mbtiDoneDays();
  try{ setDone(merged); }catch(e){}
  return merged;
}
function mbtiCount(){ return mbtiDoneDays().length; }
function mbtiResetScores(){ localStorage.setItem(mbtiAnswerKey(), JSON.stringify({E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0})); }
function mbtiGetScores(){
  try{
    const j = JSON.parse(localStorage.getItem(mbtiAnswerKey()) || "{}");
    return Object.assign({E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}, j || {});
  }catch(e){ return {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}; }
}
function mbtiRecalcScores(limit){
  const scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  let arr = getHeartAnswers();
  if(Number(limit || 0) > 0) arr = arr.filter(a => Number(a.day || 0) <= Number(limit));
  arr.forEach(a=>{
    const w = Math.max(1, Number(a.weight || 1) || 1);
    const multi = a.mbti_scores && typeof a.mbti_scores === "object" ? a.mbti_scores : null;
    if(multi){
      Object.keys(multi).forEach(k0=>{
        const k = String(k0 || "").toUpperCase();
        const v = Number(multi[k0] || 0) || 0;
        if(Object.prototype.hasOwnProperty.call(scores,k)) scores[k] += v * w;
      });
    }else{
      const k = String(a.mbti_score || "").toUpperCase();
      if(Object.prototype.hasOwnProperty.call(scores,k)) scores[k] += w;
    }
  });
  if(!Number(limit || 0)) localStorage.setItem(mbtiAnswerKey(), JSON.stringify(scores));
  return scores;
}
function mbtiTypeFromScores(scores){
  scores = scores || mbtiRecalcScores();
  return (scores.E >= scores.I ? "E" : "I") +
         (scores.S >= scores.N ? "S" : "N") +
         (scores.T >= scores.F ? "T" : "F") +
         (scores.J >= scores.P ? "J" : "P");
}
function mbtiTypeName(type){
  const r = mbtiReportForType(type);
  if(r && r.name_zh) return r.name_zh;
  const map={
    ISTJ:"守序實幹型", ISFJ:"溫柔守護型", INFJ:"安靜洞察型", INTJ:"冷靜戰略型",
    ISTP:"現場解題型", ISFP:"感受自由型", INFP:"內心劇場型", INTP:"邏輯腦洞型",
    ESTP:"行動衝鋒型", ESFP:"氣氛發電型", ENFP:"靈感爆棚型", ENTP:"反轉辯手型",
    ESTJ:"效率指揮型", ESFJ:"人情照顧型", ENFJ:"帶隊鼓舞型", ENTJ:"目標統帥型"
  };
  return map[type] || "未知人格型";
}
let BW_MBTI_REPORTS = null;
let BW_MBTI_REPORTS_LOADING = null;
function mbtiReportUrl(){
  return `data/monk/${encodeURIComponent(HEART_TOPIC_SLUG || 'mbti')}/mbti-reports.json?v=8`;
}
async function mbtiLoadReports(){
  if(!isMbtiMode()) return null;
  if(BW_MBTI_REPORTS) return BW_MBTI_REPORTS;
  if(BW_MBTI_REPORTS_LOADING) return BW_MBTI_REPORTS_LOADING;
  BW_MBTI_REPORTS_LOADING = fetch(mbtiReportUrl(), {cache:'no-store'})
    .then(r=>r.ok ? r.json() : null)
    .then(j=>{ BW_MBTI_REPORTS = (j && j.reports) ? j.reports : {}; return BW_MBTI_REPORTS; })
    .catch(()=>{ BW_MBTI_REPORTS = {}; return BW_MBTI_REPORTS; });
  return BW_MBTI_REPORTS_LOADING;
}
function mbtiReportForType(type){
  const key = String(type || '').toUpperCase();
  return (BW_MBTI_REPORTS && BW_MBTI_REPORTS[key]) || null;
}
try{ if(isMbtiMode()) mbtiLoadReports(); }catch(e){}
function mbtiStageMode(doneCount){
  doneCount = Number(doneCount || getDone().length || 0);
  if(doneCount >= MBTI_FULL_REPORT_TOTAL || doneCount >= TOTAL) return "full";
  if(doneCount >= MBTI_ADVANCED_RESULT_TOTAL) return "advanced";
  if(doneCount >= MBTI_FREE_RESULT_TOTAL) return "initial";
  return "progress";
}
function mbtiScoresForMode(mode){
  if(mode === "initial") return mbtiRecalcScores(MBTI_FREE_RESULT_TOTAL);
  if(mode === "advanced") return mbtiRecalcScores(MBTI_ADVANCED_RESULT_TOTAL);
  return mbtiRecalcScores();
}
function mbtiFullReportLines(type){
  const lines = [];
  const love = type[2]==='F' ? "感情模式：重視被理解與被回應，關係裡最怕冷處理；適合願意溝通情緒的人。" : "感情模式：重視問題解決與承諾落實，關係裡最怕反覆情緒勒索；適合講理也守信的人。";
  const work = type[3]==='J' ? "職場模式：適合目標清楚、流程穩定、能看見成果的工作；混亂與臨時改來改去會消耗你。" : "職場模式：適合變化、創意、開放探索的任務；太死的流程會讓你失去動力。";
  const study = type[1]==='N' ? "學習模式：適合故事化、情境化、跨主題連結；先懂概念，再補細節最有效。" : "學習模式：適合例句、步驟、任務打卡；先能用，再慢慢理解背後規則最有效。";
  const money = type[2]==='T' ? "金錢模式：決策偏理性，會看風險報酬；提醒是不要因為過度分析而錯過小型試錯。" : "金錢模式：容易受信任、關係與氣氛影響；提醒是重大支出先冷靜一天再決定。";
  const social = type[0]==='E' ? "人際模式：互動會幫你充電，適合用對話整理想法；提醒是保留一點安靜空間。" : "人際模式：獨處會幫你恢復，適合先觀察再投入；提醒是別讓沉默被誤會成疏離。";
  lines.push(love, work, study, money, social);
  return lines;
}
function mbtiResultText(mode){
  const doneCount = getDone().length;
  mode = mode || mbtiStageMode(doneCount);
  const s = mbtiScoresForMode(mode);
  const type = mbtiTypeFromScores(s);
  const title = mode === "initial" ? "你的 BookWide 初階性格傾向" : (mode === "advanced" ? "你的 BookWide 進階性格分析" : "你的 BookWide 完整人格報告");
  const note = mode === "initial"
    ? "這是 10 題免費快速版，適合先拿結果與分享；想更準可繼續做進階題。"
    : (mode === "advanced" ? "這是 20 題進階版，準度比初階更穩；想看感情、職場、學習、金錢模式，可完成 40 題完整報告。" : "這是 40 題完整人格報告，包含感情模式、職場模式、學習模式、金錢模式與人際提醒。此為性格傾向整理，不是正式心理診斷。");
  let out = `${title}：${type}｜${mbtiTypeName(type)}\n\nE/I ${s.E}:${s.I}｜S/N ${s.S}:${s.N}｜T/F ${s.T}:${s.F}｜J/P ${s.J}:${s.P}\n\n${note}`;
  if(mode === "full") out += "\n\n" + mbtiFullReportLines(type).join("\n");
  return out;
}
const RENQING_STAGE_TOTAL = 8;
const RENQING_STAGE_TITLES = {
  1: "一句話高情商接話",
  2: "回夸／被稱讚怎麼回",
  3: "職場領導話術",
  4: "同事朋友親戚應對",
  5: "回怼／拒絕／不被冒犯",
  6: "飯局酒局／敬酒話術",
  7: "面試話術",
  8: "求人辦事／送禮／社交破冰"
};
function isRenqingSeries(){
  return /^renqing-chat(?:-\d+)?$/.test(String(HEART_TOPIC_SLUG || ""));
}
function lessonStageNo(l){
  const n = Number((l && l.stage) || 1);
  return Math.max(1, Math.min(RENQING_STAGE_TOTAL, n || 1));
}
function currentRenqingStageNo(){
  return lessonStageNo(lessons[idx] || {});
}
function renqingStageTitle(no){
  return RENQING_STAGE_TITLES[Number(no)||1] || "情商訓練";
}
function currentModeLabel(l){
  const t = String((l && (l.type_label || l.q_type)) || "");
  if(/避雷|avoid/i.test(t)) return "避雷訓練";
  if(/最佳|best/i.test(t)) return "最佳接話";
  return t || "問答訓練";
}
function stageLocalNo(i){
  const l = lessons[i] || {};
  const st = lessonStageNo(l);
  return lessons.filter(x => lessonStageNo(x) === st && Number(x.day || 0) <= Number(l.day || i+1)).length || 1;
}
function stageTotalCount(stageNo){
  return lessons.filter(x => lessonStageNo(x) === Number(stageNo)).length || 20;
}
function findFirstIndexOfStage(stageNo){
  return lessons.findIndex(x => lessonStageNo(x) === Number(stageNo));
}
function updateRenqingHeader(l){
  if(!isRenqingSeries()){
    const doneEl = $("done");
    if(doneEl) doneEl.style.display = "";
    return false;
  }
  const doneEl = $("done");
  if(doneEl) doneEl.style.display = "none";
  const no = lessonStageNo(l);
  const localNo = stageLocalNo(idx);
  const localTotal = stageTotalCount(no);
  const mode = currentModeLabel(l);
  const stageEl = $("stage");
  if(stageEl) stageEl.textContent = `第 ${no} / ${RENQING_STAGE_TOTAL} 關｜${renqingStageTitle(no)}｜${mode}｜${localNo}/${localTotal}`;
  const sceneEl = $("scene");
  if(sceneEl) sceneEl.textContent = `本系列共 ${RENQING_STAGE_TOTAL} 關｜每關 ${localTotal} 題｜本關第5題扣 ${topicCoinCost()} 金幣`;
  const brandSub = document.querySelector(".brand span");
  if(brandSub) brandSub.textContent = `第 ${no} / ${RENQING_STAGE_TOTAL} 關｜${renqingStageTitle(no)}｜正式金幣`;
  return true;
}
function renqingBreakUrl(cat,nextStage){
  const back = `/heart-mbti.html?topic=${encodeURIComponent(HEART_TOPIC_SLUG)}&stage=${encodeURIComponent(nextStage)}`;
  return `/index.html?cat=${encodeURIComponent(cat)}&from=renqing-chat&topic=${encodeURIComponent(HEART_TOPIC_SLUG)}&stage=${encodeURIComponent(nextStage)}&next_stage=${encodeURIComponent(nextStage)}&return=${encodeURIComponent(back)}`;
}
function goRenqingStage(stageNo){
  const target = findFirstIndexOfStage(stageNo);
  if(target >= 0){
    idx = target;
    localStorage.setItem("bw_heart_idx_"+HEART_TOPIC_SLUG, idx);
    answered = false;
    correct = false;
    $("reward").classList.remove("show");
    render();
    scheduleAutoQuestion(650);
  }else{
    toast("下一關題庫尚未上架");
    $("reward").classList.remove("show");
  }
}

/* === v10 hard binding: stage break modal buttons must react === */
function renqingNextStageFromCurrent(){
  const cur = currentRenqingStageNo();
  return Math.min(RENQING_STAGE_TOTAL, cur + 1);
}
function renqingGoBreak(cat){
  const st = renqingNextStageFromCurrent();
  const back = `/heart-mbti.html?topic=${encodeURIComponent(HEART_TOPIC_SLUG)}&stage=${encodeURIComponent(st)}`;
  try{
    localStorage.setItem("bw_renqing_return_url", back);
    localStorage.setItem("bw_renqing_next_stage", String(st));
  }catch(e){}
  location.href = renqingBreakUrl(cat, st);
}
function renqingGoNextHard(){
  const st = renqingNextStageFromCurrent();
  goRenqingStage(st);
}
document.addEventListener("click", function(e){
  const btn = e.target.closest("#rewardOk,#goMusic,#goStory,#goMovie,#goNextStage");
  if(!btn) return;
  if(!isRenqingSeries()) return;
  const modal = $("reward");
  if(!modal || !modal.classList.contains("show")) return;
  e.preventDefault();
  e.stopPropagation();
  e.stopImmediatePropagation();

const BW_RENQING_DIRECT_SLUGS = {
  music: [],

};
function renqingReturnUrl(nextStage){
  return `/heart-mbti.html?topic=${encodeURIComponent(HEART_TOPIC_SLUG)}&stage=${encodeURIComponent(nextStage)}`;
}
function bwCollectSlugsDeep(obj, out=[]){
  if(!obj || out.length > 80) return out;
  if(Array.isArray(obj)){
    obj.forEach(x=>bwCollectSlugsDeep(x,out));
    return out;
  }
  if(typeof obj === "object"){
    const slug = obj.slug || obj.id || obj.video_slug || obj.asset_slug;
    const cat = obj.category || obj.cat || obj.type || "";
    const okPub = obj.is_published !== false && obj.published !== false && String(obj.review_status || "").toLowerCase() !== "rejected";
    if(slug && okPub && !String(slug).includes("/") && !String(slug).includes(".")){
      out.push(String(slug).trim());
    }
    Object.keys(obj).forEach(k=>{
      if(["slug","id","video_slug","asset_slug"].includes(k)) return;
      const v=obj[k];
      if(Array.isArray(v) || (v && typeof v === "object")) bwCollectSlugsDeep(v,out);
    });
  }
  return [...new Set(out.filter(Boolean))];
}
async function renqingPickSlug(cat){
  const fixed = BW_RENQING_DIRECT_SLUGS[cat] || [];
  let pool = fixed.slice();

  if(!pool.length){
    const urls = [
      `/data/${cat}/index.json?v=${Date.now()}`,
      `data/${cat}/index.json?v=${Date.now()}`,
      `./data/${cat}/index.json?v=${Date.now()}`
    ];
    for(const u of urls){
      try{
        const r = await fetch(u,{cache:"no-store"});
        if(!r.ok) continue;
        const j = await r.json();
        const slugs = bwCollectSlugsDeep(j);
        if(slugs.length){ pool = slugs; break; }
      }catch(e){}
    }
  }

  pool = [...new Set(pool.filter(Boolean))];
  if(!pool.length) return "";

  // RENQING RANDOM FIX:
  // 每關休息去 music/story/movie 時，不固定同一首。
  // 優先避開上一個用過的 slug；只有一個素材時才會重複。
  const key = "bw_renqing_last_break_slug_" + cat;
  let last = "";
  try{ last = localStorage.getItem(key) || ""; }catch(e){}
  const candidates = pool.length > 1 ? pool.filter(s => s !== last) : pool;
  const chosen = candidates[Math.floor(Math.random() * candidates.length)] || pool[0];
  try{ localStorage.setItem(key, chosen); }catch(e){}
  return chosen;
}

    return `/player.html?cat=${encodeURIComponent(cat)}&slug=${encodeURIComponent(slug)}&device=${encodeURIComponent(currentDeviceForLesson())}&${qs}`;

}

function bwPath(u){

function readJsonSafe(v){
  try{return JSON.parse(v)}catch(e){return null}
}
function clearSupabaseAuthStorage(){
  const remove=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i)||"";
    if(/^sb-.*-auth-token$/.test(k)) remove.push(k);
  }
  remove.forEach(k=>localStorage.removeItem(k));
}
function decodeJwtPayload(token){
  try{
    const part=String(token||"").split(".")[1];
    if(!part)return null;
    const b64=part.replace(/-/g,"+").replace(/_/g,"/");
    const json=decodeURIComponent(Array.prototype.map.call(atob(b64),c=>"%" + ("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  }catch(e){return null}
}
function isJwtExpired(token){
  const p=decodeJwtPayload(token);
  if(!p||!p.exp)return false;
  return (p.exp*1000)<(Date.now()+30000);
}
function getSupabaseAccessToken(){
  let best="";
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i)||"";
    if(!/^sb-.*-auth-token$/.test(k))continue;
    const j=readJsonSafe(localStorage.getItem(k)||"");
    if(!j)continue;
    const arr=[j.access_token,j.currentSession&&j.currentSession.access_token,j.session&&j.session.access_token].filter(Boolean);
    for(const token of arr){
      if(token&&!isJwtExpired(token))return token;
      if(token)best=token;
    }
  }
  return best&&!isJwtExpired(best)?best:"";
}

function animateHeroWords(text, ms, token){
  const words = splitHeroWords(text);
  if(!words.length) return;
  const start = performance.now();
  const total = Math.max(700, ms || words.length * 430);
  function step(now){
    if(token !== speechToken || !playing){
      clearHeroWordHighlight();
      return;
    }
    const p = Math.min(0.999, (now - start) / total);
    const idxNow = Math.min(words.length - 1, Math.floor(p * words.length));
    document.querySelectorAll(".heroWord").forEach((el,i)=>el.classList.toggle("on", i === idxNow));
    if(p < 0.999) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function setHeroLangActive(lang,on){
  const ja = $("heroJa");

function estimateSpeechMs(text, lang){
  const s = String(text || "");
  if(!s) return 700;
  if(lang === "ja-JP" || lang === "zh-TW") return Math.max(900, s.length * 155);
  return Math.max(900, splitHeroWords(s).length * 460);
}

let speechToken=0;
function stopSpeech(){
  speechToken++;
  try{speechSynthesis.cancel()}catch(e){}
  setPlaying(false);
}
function voices(){
  try{return speechSynthesis.getVoices?speechSynthesis.getVoices():[]}catch(e){return[]}
}
function pickVoice(lang,role){
  const want=lang.slice(0,2).toLowerCase();
  const vs=voices().filter(v=>(v.lang||"").toLowerCase().startsWith(want));
  const male=["male","man","男","男性","daniel","david","alex","mark","fred","george","thomas","aaron","bruce","otoya","ichiro","kyushu"];
  const female=["female","woman","女","女性","samantha","zira","susan","victoria","karen","moira","tessa","kyoko","haruka","nanami","sayaka"];
  const picked=vs.map(v=>({v,score:score(v)})).sort((a,b)=>b.score-a.score)[0];
  return picked?picked.v:null;
  function score(v){
    const n=(v.name||"").toLowerCase(), vl=(v.lang||"").toLowerCase();
    let s=0;
    if(vl===lang.toLowerCase())s+=120;
    if(v.localService)s+=8;
    const isMale=male.some(x=>n.includes(x)), isFemale=female.some(x=>n.includes(x));
    if(role==="student"){
      if(isFemale)s+=160; if(isMale)s-=120;
      if(lang==="en-US"&&n.includes("samantha"))s+=90;
      if(lang==="ja-JP"&&(n.includes("kyoko")||n.includes("nanami")||n.includes("haruka")))s+=90;
    }else{
      if(isMale)s+=160; if(isFemale)s-=140;
      if(lang==="en-US"&&(n.includes("daniel")||n.includes("david")||n.includes("alex")))s+=90;
      if(lang==="ja-JP"&&(n.includes("otoya")||n.includes("ichiro")))s+=90;
    }
    return s;
  }
}
function voiceParams(lang,role){
  if(role==="student") return lang==="ja-JP" ? {rate:.76,pitch:1.18} : {rate:.78,pitch:1.12};
  return lang==="ja-JP" ? {rate:.62,pitch:.52} : {rate:.68,pitch:.58};
}
function makeUtter(text,lang,role,useVoice=true){
  const u=new SpeechSynthesisUtterance(String(text||""));
  const vp=voiceParams(lang,role);
  u.lang=lang;
  if(useVoice) u.voice=pickVoice(lang,role);
  u.rate=vp.rate;
  u.pitch=vp.pitch;
  u.volume=1;
  return u;
}
function waitMs(ms){return new Promise(r=>setTimeout(r,ms))}
function hardTimeoutMs(text,lang){
  const s=String(text||"");
  const units=lang==="ja-JP"?s.length:Math.max(1,s.split(/\s+/).filter(Boolean).length);
  return Math.max(3500,Math.min(18000,lang==="ja-JP"?2200+units*210:2200+units*430));
}
function speakStep(text,lang,role,token){
  return new Promise(resolve=>{
    if(token!==speechToken || !text){resolve(false);return}
    let finished=false, triedFallback=false, current=null;
    const shouldHeroHighlight = role === "student" && lessons[idx] && (String(text||"") === String(lessons[idx].en||"") || String(text||"") === String(lessons[idx].ja||"") || String(text||"") === String(lessons[idx].zh||""));
    if(shouldHeroHighlight){
      if(lang === "en-US") animateHeroWords(text, estimateSpeechMs(text,lang), token);
      else setHeroLangActive(lang,true);
    }
    const finish=ok=>{if(finished)return;finished=true;clearTimeout(timer);if(shouldHeroHighlight)clearHeroWordHighlight();resolve(ok)};
    const speakNow=useVoice=>{
      if(token!==speechToken){finish(false);return}
      current=makeUtter(text,lang,role,useVoice);
      current.onend=()=>finish(true);
      current.onerror=()=>{
        // Edge / 手機有時指定 voice 會失敗；失敗時立刻改用該瀏覽器預設語音重讀同一句，不能直接跳到日文。
        if(!triedFallback && useVoice){
          triedFallback=true;
          setTimeout(()=>speakNow(false),120);
        }else{
          finish(false);
        }
      };
      try{
        speechSynthesis.resume&&speechSynthesis.resume();
        speechSynthesis.speak(current);
      }catch(e){
        if(!triedFallback && useVoice){triedFallback=true;setTimeout(()=>speakNow(false),120)}else finish(false);
      }
    };
    const timer=setTimeout(()=>finish(false),hardTimeoutMs(text,lang));
    speakNow(true);
  });
}
async function speakOne(text,lang,role="monk"){
  stopSpeech();
  const token=++speechToken;
  setPlaying(true);
  await waitMs(80);
  await speakStep(text,lang,role,token);
  if(token===speechToken)setPlaying(false);
}
async function speakPair(en,ja,role="monk"){
  stopSpeech();
  const token=++speechToken;
  setPlaying(true);
  await waitMs(80);
  // 必須先英文，再日文；英文失敗時也先用預設語音重試英文，不可直接跳日文。
  await speakStep(en,"en-US",role,token);
  await waitMs(260);
  await speakStep(ja,"ja-JP",role,token);
  if(token===speechToken)setPlaying(false);
}
function speakQuestion(lang="en"){
  if(!bgmUserOff)startBgm(true);
  const l = lessons[idx] || {};
  if(lang==="ja") return speakOne(l.ja || "", "ja-JP", "student");
  if(lang==="zh") return speakOne(l.zh || "", "zh-TW", "student");
  return speakOne(l.en || "", "en-US", "student");
}
function speakAnswer(en,ja){if(!bgmUserOff)startBgm(true);return speakPair(en,ja,"monk")}
function speakAnswerLang(text,lang){if(!bgmUserOff)startBgm(true);
  const map={en:"en-US",ja:"ja-JP",zh:"zh-TW"};
  return speakOne(text,map[lang]||"zh-TW","monk");
}

let autoQuestionTimer=null;
function scheduleAutoQuestion(delay=520){
  // 進入頁面/切題後自動嘗試出聲：
  // 1) 有 MP4 先播 MP4 原音
  // 2) 沒有 MP4 或瀏覽器擋住時，改朗讀英文題句

        stopSpeech();

        video.muted=false;

    }catch(e){}
    speakQuestion("en");
  }, delay);
}

let BW_waveRaf=0;
function resizeWaveCanvas(){
  const c=$("waveCanvas");
  if(!c)return;
  const dpr=window.devicePixelRatio||1;
  const r=c.getBoundingClientRect();
  c.width=Math.max(1,Math.floor(r.width*dpr));
  c.height=Math.max(1,Math.floor(r.height*dpr));
}
function drawLiveWave(){
  // RENQING LITE v14:
  // 舊版 waveCanvas 每秒 60 次永久動畫，頁面就算沒播放也一直跑，桌機/手機都會卡。
  // 新版：只有播放語音時才連續動畫；停止時只畫一次靜態波形，不再永久 requestAnimationFrame。
  const c=$("waveCanvas");
  if(!c) return;
  if(BW_waveRaf){
    try{ cancelAnimationFrame(BW_waveRaf); }catch(e){}
    BW_waveRaf = 0;
  }
  const ctx=c.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const w=c.width/dpr,h=c.height/dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const t=performance.now()/1000;
  const active=playing;
  const count=Math.max(34,Math.floor(w/9));
  const gap=4;
  const bw=Math.max(3,Math.floor((w-(count-1)*gap)/count));
  const base=h-12;
  for(let i=0;i<count;i++){
    const x=i*(bw+gap);
    const wave=Math.sin(i*.55+(active?t*5.6:0))*.5+.5;
    const wave2=Math.sin(i*.22+(active?t*2.7:0)+1.6)*.5+.5;
    const amp=active?(8+wave*21+wave2*8):(5+wave*5);
    const bh=Math.max(5,amp);
    const y=base-bh;
    ctx.fillStyle=i%5===0?"rgba(250,204,21,.76)":"rgba(96,165,250,.70)";
    const r=Math.min(6,bw/2);
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,bw,bh,r);ctx.fill();}
    else{ctx.fillRect(x,y,bw,bh);}
  }
  if(active){
    BW_waveRaf=requestAnimationFrame(drawLiveWave);
  }
}
window.addEventListener("resize",resizeWaveCanvas);
setTimeout(()=>{resizeWaveCanvas();drawLiveWave();},250);


function normalizeMediaUrl(item){
  if(!item)return "";
  if(typeof item==="string")return item;
  if(typeof item==="object")return item.url||item.src||item.photo||item.video||"";
  return String(item||"");
}
function isVideoMedia(url,item=null){
  const type=(item&&typeof item==="object"?String(item.type||item.kind||""):"").toLowerCase();
  return type==="video"||type==="mp4"||/\.(mp4|webm|mov)(\?|#|$)/i.test(String(url||""));
}
function fallbackImageUrl(url){
  return String(url || "").replace(/\.(mp4|webm|mov)(\?.*)?$/i, ".png$2");
}
function showMedia(item){
  const url=normalizeMediaUrl(item);
  const img=$("photo"), video=$("mediaVideo");
  if(!img||!video||!url)return;

  const showImage = (src)=>{
    try{ video.pause(); }catch(e){}
    video.removeAttribute("src");
    video.load();
    video.style.display="none";
    img.style.display="block";
    img.src=src;
    $("hint").textContent="點一下播放";
  };

  if(isVideoMedia(url,item)){
    img.style.display="none";
    video.style.display="block";
    video.onerror=function(){
      showImage(fallbackImageUrl(url));
    };
    video.onended=function(){
      setPlaying(false);
      $("hint").textContent="影片已播完";
    };
    if(video.getAttribute("src")!==url){
      video.pause();
      video.src=url;
      video.load();
    }
    video.muted=false;      // MP4 原音可播放
    video.volume=1;
    video.loop=false;       // 只播一次，不循環
    video.playsInline=true;
    video.pause();          // 進頁不自動播，需點影片/播放鍵
    setPlaying(false);
    $("hint").textContent="點一下播放影片";
  }else{
    showImage(url);
  }
}

function isCurrentVideoMedia(){
  const video=$("mediaVideo");
  return !!(video && video.style.display !== "none" && video.getAttribute("src"));
}
function toggleCurrentVideo(){
  const video=$("mediaVideo");
  if(!isCurrentVideoMedia() || !video) return false;
  if(!video.paused && !video.ended){
    video.pause();
    setPlaying(false);
    $("hint").textContent="影片已暫停";
    return true;
  }
  if(video.ended){
    try{ video.currentTime=0; }catch(e){}
  }
  stopSpeech();
  video.muted=false;
  video.volume=1;
  video.loop=false;
  video.play().then(()=>{
    setPlaying(true);
    $("hint").textContent="影片播放中";
  }).catch(()=>{
    $("hint").textContent="再點一下播放影片聲音";
  });
  return true;
}

}

function getMonkReplyPack(l, c, ok){
  const safe = v => (v && typeof v === "object") ? v : {};
  const fromChoice = safe(c && c.monk_reply);
  const fromQuestion = ok ? safe(l && l.monk_reply && l.monk_reply.correct) : safe(l && l.monk_reply && l.monk_reply.wrong);
  const pack = {
    en: fromChoice.en || fromQuestion.en || (ok ? (l && l.correct_reply_en) : (l && l.wrong_reply_en)) || "",
    zh: fromChoice.zh || fromQuestion.zh || (ok ? ((l && l.correct_reply_zh) || (l && l.correct_reply)) : ((l && l.wrong_reply_zh) || (l && l.wrong_reply))) || (ok ? "施主有悟。" : "施主再想想。"),
    ja: fromChoice.ja || fromQuestion.ja || (ok ? (l && l.correct_reply_ja) : (l && l.wrong_reply_ja)) || ""
  };
  return pack;
}

function recordHeartAnswer(l,c,isCorrect){
  if(!l||!c)return;
  const r = getMonkReplyPack(l, c, !!isCorrect);
  const arr=getHeartAnswers().filter(x=>Number(x.day)!==Number(l.day));
  arr.push({
    topic_slug:HEART_TOPIC_SLUG,topic_title:HEART_TITLE,series:HEART_SERIES,
    day:Number(l.day||idx+1),title:l.title||"",scene:l.scene||"",
    question_en:l.en||"",question_ja:l.ja||"",question_zh:l.zh||"",
    selected_en:c.en||"",selected_ja:c.ja||"",selected_zh:c.zh||"",
    axis:l.axis||"", mbti_score:c.mbti_score||"", mbti_scores:c.mbti_scores||null, weight:Number(c.weight||l.weight||1)||1,
    is_correct:!!isCorrect,
    reply:r.zh||"",
    reply_en:r.en||"",
    reply_zh:r.zh||"",
    reply_ja:r.ja||"",

async function composeHeartReportCover(answers){

  const payload={
    topic_slug:HEART_TOPIC_SLUG,

function mbtiReportTitle(mode){

function mbtiReportPlainText(mode){

  const lines = [`BookWide ${title}：${type}｜${mbtiTypeName(type)}`, `E/I ${s.E}:${s.I}｜S/N ${s.S}:${s.N}｜T/F ${s.T}:${s.F}｜J/P ${s.J}:${s.P}`];
  mbtiReportSections(mode,type).forEach(x=>lines.push(`${x.t}：${x.p}`));

}

function complete(){
  const l=lessons[idx];
  if(isMbtiMode() && !answered){
    try{
      const hasSaved = getHeartAnswers().some(a => Number(a.day || 0) === Number(l.day || 0));
      if(hasSaved){ answered = true; correct = true; }
      else if(mbtiCount() >= MBTI_FREE_RESULT_TOTAL){ mbtiOpenMilestoneReport(mbtiCount()); return; }
    }catch(e){}
  }
  const d=isMbtiMode() ? mbtiSyncDoneFromAnswers() : getDone();
  const isCompletedDay = d.includes(l.day);
  if(isCompletedDay && isRenqingSeries()){
    if(showRenqingStageBreakIfNeeded(d.length)) return;
  }
  if(!answered){toast("先選一個答案");return}
  if(!isMbtiMode() && !correct){toast("要先選出正確答案，才能進下一關");return}
  if(!d.includes(l.day))setDone([...d,Number(l.day || idx+1)]);
  const nd=isMbtiMode() ? mbtiSyncDoneFromAnswers() : getDone();
  $("done").textContent = isMbtiMode() ? (nd.length < MBTI_FREE_RESULT_TOTAL ? `初階 ${nd.length}/${MBTI_FREE_RESULT_TOTAL}` : (nd.length < MBTI_ADVANCED_RESULT_TOTAL ? `進階 ${nd.length}/${MBTI_ADVANCED_RESULT_TOTAL}` : `完整 ${nd.length}/${TOTAL}`)) : `${nd.length}/${TOTAL}`;
  if(isMbtiMode()){
    const scores = mbtiRecalcScores();
    $("coins").textContent=mbtiTypeFromScores(scores);
    $("nextCoin").textContent = nd.length>=TOTAL ? '完整報告完成' : (nd.length>=MBTI_ADVANCED_RESULT_TOTAL ? '進階結果已開' : (nd.length>=MBTI_FREE_RESULT_TOTAL ? '初階結果已開' : '不扣金幣'));
  }else{
    $("coins").textContent=`耗${coinCount()}金`;
    $("nextCoin").textContent=zenProgressText();
  }

  // renqing-chat：每關20題完成後，先停在中繼頁，導向 Music / Story / Movie / 下一關。
  if(showRenqingStageBreakIfNeeded(nd.length)){
    updateReportButton();
    return;
  }

  if(isMbtiMode()){
    const mode = mbtiStageMode(nd.length);
    if(mode !== "progress"){
      mbtiOpenMilestoneReport(nd.length);
      updateReportButton();
      return;
    }
    $("rewardTitle").textContent = `MBTI｜第 ${l.day} 題完成`;
    $("rewardText").textContent = `已記錄你的選擇，目前傾向：${mbtiTypeFromScores(mbtiScoresForMode("initial"))}`;
    $("rewardOk").style.display = "";
    $("rewardOk").textContent = "進下一題";
  }else if(isRenqingSeries() && nd.length>=TOTAL){
    $("rewardTitle").textContent = `8 / 8 關全部完成！`;
    $("rewardText").textContent = zenRewardText(l.day,nd.length);
    $("rewardOk").textContent = "完成問答";
  }else{
    $("rewardTitle").textContent=nd.length>=TOTAL?`${ZEN_LEVEL_NAME}完成！`:`${ZEN_LEVEL_NAME}｜第 ${l.day} 題完成！`;
    $("rewardText").textContent=zenRewardText(l.day,nd.length);
    $("rewardOk").textContent=nd.length>=TOTAL?"完成問答":"進下一關";
  }
  updateReportButton();
  resetRenqingRewardButtons();
  $("reward").classList.add("show");
}
function canLeaveCurrent(){
  const l = lessons[idx];
  if(!l) return true;
  const d = isMbtiMode() ? mbtiSyncDoneFromAnswers() : getDone();
  if(d.includes(l.day) || correct) return true;
  toast(isMbtiMode() ? "本題尚未選擇" : "本題尚未答對，不能跳開");
  return false;
}
function firstUnfinishedIndex(){
  const d = isMbtiMode() ? mbtiSyncDoneFromAnswers() : getDone();
  const i = lessons.findIndex(x => !d.includes(x.day));
  return i >= 0 ? i : Math.max(0, lessons.length - 1);
}

  const target=(idx+1)%lessons.length;
  if(!(await confirmPaidBlockIfNeeded(target)))return;
  idx=target;render();scheduleAutoQuestion(520)
}
async function prevStage(){
  // 已答過的題目要能回退閱讀；即使目前題尚未答，也允許往回看。
  const target=(idx-1+lessons.length)%lessons.length;
  if(!(await confirmPaidBlockIfNeeded(target)))return;
  idx=target;render();scheduleAutoQuestion(520)
}
$("hero").onclick=e=>{if(e.target.tagName==="BUTTON")return; if(toggleCurrentVideo())return;};
const heroSpeakJa=$("heroSpeakJa"); if(heroSpeakJa) heroSpeakJa.onclick=e=>{e.preventDefault();e.stopPropagation();speakQuestion("ja")};
const heroSpeakZh=$("heroSpeakZh"); if(heroSpeakZh) heroSpeakZh.onclick=e=>{e.preventDefault();e.stopPropagation();speakQuestion("zh")};
$("play").onclick=()=>{
  if(isCurrentVideoMedia()){
    toggleCurrentVideo();
    return;
  }
  playing ? stopSpeech() : speakQuestion();
};
$("next").onclick=nextStage;$("prev").onclick=prevStage;$("photoNext").onclick=nextStage;$("photoPrev").onclick=prevStage;$("complete").onclick=complete;
$("rewardOk").onclick=()=>{ if(isRenqingSeries()) return renqingGoNextHard(); resetRenqingRewardButtons(); const rb=$("reward"); const bx=rb?rb.querySelector(".box"):null; if(bx) bx.classList.remove("bwMbtiReportBox"); const ok=$("rewardOk"); if(ok) ok.style.display=""; rb.classList.remove("show"); nextStage()};
$("music").onclick=toggleBgm;
$("laughToggle").onclick=toggleCorrectLaugh;
const reportBtn=$("reportPdf"); if(reportBtn) reportBtn.onclick=openHeartReportPdf;
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    stopSpeech();
    clearTimeout(autoQuestionTimer);
    const a=bgm();if(a)a.pause();
    const v=$("mediaVideo");if(v)v.pause();
    updateBgmButton();
  }else{
    const v=$("mediaVideo");
    if(v&&v.style.display==="block")v.play().catch(()=>{});
    updateBgmButton();
  }
});
if("onvoiceschanged" in speechSynthesis) speechSynthesis.onvoiceschanged=voices;
bindBgmFirstGesture();
setTimeout(tryAutoBgm,350);
loadHeartTopic()
  .then(loadHeartLessons)
  .then(loadPhotos)
  .then(async ()=>{
    if(!requireHeartLogin()) return;
    if(idx >= lessons.length) idx = 0;
    const requestedStage = requestedRenqingStageFromUrl();
    const hasRequestedStage = requestedStage > 0 && applyStageParamOnLoad();
    if(isMbtiMode()) mbtiSyncDoneFromAnswers();
    const firstTodo = firstUnfinishedIndex();
    const doneList = isMbtiMode() ? mbtiSyncDoneFromAnswers() : getDone();
    const allDone = doneList.length >= lessons.length;

    // 有 URL stage=2/3... 時，必須停在指定關，不可再被 firstTodo 拉回第1關。
    if(!hasRequestedStage && !allDone) idx = firstTodo;

    if(!(await confirmPaidBlockIfNeeded(idx))) idx = hasRequestedStage ? idx : firstTodo;
    window.BW_HEART_FRESH_LOAD = true;
    render();
    window.BW_HEART_FRESH_LOAD = false;
    updateBgmButton();
    bindRenqingStageButtonsHard();
    scheduleAutoQuestion(780);
  })
  .catch(e=>{
    console.error(e);
    alert("心靈問答載入失敗：\n" + (e.message || e));
  });
