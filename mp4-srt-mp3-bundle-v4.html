<!DOCTYPE html>
<html>
<body>
    <h3>TTS 聲音診斷測試</h3>
    <input type="text" id="testApi" placeholder="貼上妳的 API URL" style="width:300px;"><br><br>
    <button onclick="testVoice()">點我測試聲音</button>
    <p id="msg"></p>

    <script>
        async function testVoice() {
            const url = document.getElementById('testApi').value;
            const msg = document.getElementById('msg');
            msg.innerText = "連線中...";
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: "測試連線正常", lang: "zh", rate: "0%", pitch: "0%" })
                });
                if (!res.ok) throw new Error("API 回報錯誤: " + res.status);
                const blob = await res.blob();
                const audio = new Audio(URL.createObjectURL(blob));
                audio.play();
                msg.innerText = "✅ 成功！妳應該能聽到聲音了。";
            } catch (e) {
                msg.innerText = "❌ 失敗: " + e.message + "\n請檢查 CORS 或 Azure Key 設定。";
            }
        }
    </script>
</body>
</html>
