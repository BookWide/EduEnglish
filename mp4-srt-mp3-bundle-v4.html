<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 故事全素材打包工具 - 旗艦版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2e; --accent: #10b981; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 360px; background: var(--card); padding: 25px; border-right: 1px solid #2d3748; overflow-y: auto; }
        .config-group { background: #1f2937; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .btn { background: var(--blue); border: none; color: white; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: scale(0.98); }
        .btn-pack { background: #f59e0b; }
        #main { flex: 1; padding: 30px; overflow-y: auto; background: #020617; }
        .scene-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 30px; border: 1px solid #2d3748; display: flex; gap: 20px; }
        .media-preview { width: 280px; text-align: center; font-weight: bold; color: var(--accent); }
        .media-preview img { width: 100%; border-radius: 10px; margin-bottom: 10px; border: 2px solid #334155; }
        .tts-item { background: #0b0f1a; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--blue); }
        .tts-item input[type="text"] { background: transparent; border: none; color: white; border-bottom: 1px solid #334155; flex: 1; outline: none; }
        .controls { display: flex; gap: 5px; font-size: 11px; }
        .controls input { width: 45px; background: #161e2e; color: #fff; border: 1px solid #334155; text-align: center; border-radius: 4px; }
        #v-h, #c-h { display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--accent);">💎 故事全素材打包</h2>
    <div class="config-group">
        <label>1. 上傳 SRT (傑克與魔豆)</label>
        <input type="file" id="srtIn" accept=".srt">
    </div>
    <div class="config-group">
        <label>2. 圖片來源</label>
        <p style="font-size: 11px; color: #94a3b8;">影片自動截圖 (MP4):</p>
        <input type="file" id="videoIn" accept="video/mp4">
        <p style="font-size: 11px; color: #94a3b8; margin-top:10px;">或 批次 JPG:</p>
        <input type="file" id="imgsIn" accept="image/*" multiple>
    </div>
    <div class="config-group">
        <label>3. API URL (Supabase):</label>
        <input type="text" id="apiUrl" style="width:95%; margin-top:5px;" placeholder="貼上妳的 Deno 連結">
    </div>
    <button class="btn" onclick="init()">⚡ 1. 解析並預覽</button>
    <button class="btn btn-pack" onclick="packAll()">📦 2. 合成並打包 ZIP</button>
    <div id="status" style="font-size:13px; color: var(--accent); margin-top:10px; white-space: pre-line;"></div>
</div>

<div id="main"><div id="target"></div></div>

<video id="v-h"></video>
<canvas id="c-h"></canvas>

<script>
    let master = [];
    let manualImgs = [];
    const v = document.getElementById('v-h');
    const c = document.getElementById('c-h');

    document.getElementById('imgsIn').onchange = (e) => manualImgs = Array.from(e.target.files);

    async function init() {
        const srtFile = document.getElementById('srtIn').files[0];
        if(!srtFile) return alert("請先選擇 SRT 檔案");
        
        const srtData = parseSRT(await srtFile.text());
        const vFile = document.getElementById('videoIn').files[0];
        if(vFile) { v.src = URL.createObjectURL(vFile); await new Promise(r => v.onloadedmetadata = r); }

        master = [];
        let batch = [], startTime = 0;

        srtData.forEach((item, i) => {
            batch.push({...item, rate: "+0%", pitch: "+0Hz", vol: "+0%"});
            if (item.end - startTime >= 15 || i === srtData.length - 1) {
                master.push({ id: master.length+1, time: startTime, sents: [...batch], img: "" });
                startTime = item.end; batch = [];
            }
        });
        renderUI();
    }

    async function renderUI() {
        const target = document.getElementById('target');
        target.innerHTML = '';
        for (let [idx, scene] of master.entries()) {
            let img = manualImgs[idx] ? await toB64(manualImgs[idx]) : (v.src ? await shot(scene.time) : "");
            scene.img = img;
            const card = document.createElement('div');
            card.className = 'scene-card';
            card.innerHTML = `
                <div class="media-preview"><img src="${img}"><p>分鏡 #${scene.id.toString().padStart(3,'0')}</p></div>
                <div style="flex:1">
                    ${scene.sents.map((s, si) => `
                        <div class="tts-item">
                            <button onclick="preview('${s.text}', ${scene.id}, ${si})" style="background:none; border:none; cursor:pointer; font-size:20px;">🔊</button>
                            <input type="text" value="${s.text}" onchange="master[${idx}].sents[${si}].text=this.value">
                            <div class="controls">
                                R:<input type="text" value="${s.rate}" onchange="master[${idx}].sents[${si}].rate=this.value">
                                P:<input type="text" value="${s.pitch}" onchange="master[${idx}].sents[${si}].pitch=this.value">
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            target.appendChild(card);
        }
    }

    async function preview(text, sid, si) {
        const url = document.getElementById('apiUrl').value;
        const item = master[sid-1].sents[si];
        try {
            const res = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ text, lang: "en", rate: item.rate, pitch: item.pitch, volume: item.vol })
            });
            if(!res.ok) throw new Error("API 無響應");
            const blob = await res.blob();
            new Audio(URL.createObjectURL(blob)).play();
        } catch(e) { alert("發聲出錯，請檢查 API URL 或 CORS 設定！"); }
    }

    async function packAll() {
        const zip = new JSZip();
        const imgDir = zip.folder("images");
        const audDir = zip.folder("audio");
        const api = document.getElementById('apiUrl').value;
        const status = document.getElementById('status');

        status.innerText = "🚀 開始打包...\n正在逐句請求語音 MP3";
        try {
            for (let scene of master) {
                imgDir.file(`scene_${scene.id.toString().padStart(3,'0')}.jpg`, scene.img.split(',')[1], {base64: true});
                for (let [si, s] of scene.sents.entries()) {
                    status.innerText = `處理中: 分鏡 ${scene.id} 語音 ${si+1}`;
                    const res = await fetch(api, {
                        method: 'POST',
                        body: JSON.stringify({ text: s.text, lang: "en", rate: s.rate, pitch: s.pitch, volume: s.vol })
                    });
                    audDir.file(`audio_${scene.id}_${si+1}.mp3`, await res.blob());
                }
            }
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = `Story_Pack_${Date.now()}.zip`;
            a.click();
            status.innerText = "✅ 打包完成！";
        } catch(e) { status.innerText = "❌ 失敗: " + e.message; }
    }

    function parseSRT(t) { return t.split(/\n\s*\n/).filter(x=>x.trim()).map(b=>{
        const l = b.split('\n'); const m = l[1].split(' --> ');
        return { start: ts(m[0]), end: ts(m[1]), text: l.slice(2).join(' ') };
    });}
    function ts(t) { const p = t.trim().split(':'); return (+p[0])*3600 + (+p[1])*60 + parseFloat(p[2].replace(',','.')); }
    function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f); }); }
    function shot(t) { return new Promise(r => { v.currentTime = t; v.onseeked = () => {
        c.width = v.videoWidth/2; c.height = v.videoHeight/2;
        c.getContext('2d').drawImage(v, 0, 0, c.width, c.height); r(c.toDataURL('image/jpeg', 0.8));
    };});}
</script>
</body>
</html>
