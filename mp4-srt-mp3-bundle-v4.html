<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 影片素材全自動打包系統 - 旗艦版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2e; --accent: #10b981; --blue: #3b82f6; --text: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 側邊欄：設定區 */
        #sidebar { width: 380px; background: var(--card); padding: 25px; border-right: 1px solid #2d3748; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .config-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .btn { background: var(--blue); border: none; color: white; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; margin-bottom: 10px; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn-pack { background: #f59e0b; font-size: 1.1em; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        
        /* 主區域：編輯區 */
        #main-editor { flex: 1; padding: 30px; overflow-y: auto; background: #020617; scroll-behavior: smooth; }
        .scene-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 30px; border: 1px solid #2d3748; display: flex; gap: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .media-preview { width: 280px; text-align: center; }
        .media-preview img { width: 100%; border-radius: 10px; border: 2px solid #334155; transition: 0.3s; cursor: pointer; }
        .media-preview img:hover { border-color: var(--accent); }
        
        /* TTS 句子列表 */
        .sentence-list { flex: 1; }
        .tts-item { background: #1f2937; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--blue); }
        .tts-item input[type="text"] { flex: 1; background: transparent; border: none; color: white; border-bottom: 1px solid #4b5563; outline: none; padding: 5px; }
        .tts-item .controls { display: flex; gap: 8px; font-size: 11px; }
        .tts-item .controls input { width: 45px; background: #0b0f1a; color: #fff; border: 1px solid #4b5563; border-radius: 4px; text-align: center; }

        #status-display { margin-top: 15px; font-size: 13px; color: var(--accent); line-height: 1.6; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--accent);">💎 AI 故事全自動打包</h2>
    
    <div class="config-group">
        <label>1. 上傳字幕檔 (SRT)</label>
        <input type="file" id="srtFile" accept=".srt">
    </div>

    <div class="config-group">
        <label>2. 圖片來源</label>
        <p style="font-size: 11px; color: #94a3b8;">影片自動切圖 (MP4):</p>
        <input type="file" id="videoFile" accept="video/mp4">
        <p style="font-size: 11px; color: #94a3b8; margin-top:10px;">或 批次上傳 JPG:</p>
        <input type="file" id="imgsFile" accept="image/*" multiple>
    </div>

    <div class="config-group">
        <label>3. 語音伺服器 (Azure Function):</label>
        <input type="text" id="apiUrl" placeholder="貼上妳的 Supabase URL" style="width:100%; margin-top:5px; background:#0b0f1a; color:white; border:1px solid #334155; padding:5px; border-radius:4px;">
    </div>

    <button class="btn" onclick="startProcessing()">⚡ 1. 解析並預覽分鏡</button>
    <button class="btn btn-pack" onclick="packEverything()">📦 2. 合成 MP3 並打包下載</button>
    
    <div id="status-display"></div>
</div>

<div id="main-editor">
    <div id="render-target">
        <div style="text-align: center; margin-top: 100px; color: #4b5563;">
            <h3>等待檔案匯入...</h3>
            <p>請先上傳 SRT 與 MP4/JPG 檔案</p>
        </div>
    </div>
</div>

<video id="v-hidden"></video>
<canvas id="c-hidden"></canvas>

<script>
    let projectData = [];
    let manualImages = [];
    const v = document.getElementById('v-hidden');
    const c = document.getElementById('c-hidden');

    document.getElementById('imgsFile').onchange = (e) => manualImages = Array.from(e.target.files);

    async function startProcessing() {
        const sFile = document.getElementById('srtFile').files[0];
        if(!sFile) return alert("請務必上傳 SRT 檔案！");

        const status = document.getElementById('status-display');
        status.innerText = "正在分析資源中...";
        
        const srtItems = parseSRT(await sFile.text());
        const vFile = document.getElementById('videoFile').files[0];
        if(vFile) { 
            v.src = URL.createObjectURL(vFile); 
            await new Promise(r => v.onloadedmetadata = r); 
        }

        projectData = [];
        let currentBatch = [];
        let currentStart = 0;

        // 邏輯：依 15 秒間隔自動打包句子到「大段落 (Scene)」
        srtItems.forEach((item, i) => {
            currentBatch.push({...item, rate: "0%", pitch: "0%"});
            if (item.end - currentStart >= 15 || i === srtItems.length - 1) {
                projectData.push({
                    id: projectData.length + 1,
                    time: currentStart,
                    sentences: [...currentBatch],
                    img: null
                });
                currentStart = item.end;
                currentBatch = [];
            }
        });

        renderWorkflow();
        status.innerText = `✅ 解析完成！生成了 ${projectData.length} 個分鏡卡片。`;
    }

    async function renderWorkflow() {
        const target = document.getElementById('render-target');
        target.innerHTML = '';

        for (let [idx, scene] of projectData.entries()) {
            let thumb = "";
            if (manualImages[idx]) {
                thumb = await toBase64(manualImages[idx]);
            } else if (v.src) {
                thumb = await captureFrame(scene.time);
            } else {
                thumb = "https://via.placeholder.com/280x157/161e2e/e2e8f0?text=Wait+for+Image";
            }
            scene.img = thumb;

            const card = document.createElement('div');
            card.className = 'scene-card';
            card.innerHTML = `
                <div class="media-preview">
                    <img src="${thumb}" id="thumb-${scene.id}" onclick="updateThumb(${scene.id})">
                    <p style="margin-top:10px; font-weight:bold; color:var(--accent);">分鏡 #${scene.id.toString().padStart(3,'0')}</p>
                    <small style="color:#6b7280;">${scene.time.toFixed(2)}s</small>
                </div>
                <div class="sentence-list">
                    <textarea style="width:100%; height:40px; background:#0b0f1a; color:#f59e0b; border:1px solid #334155; border-radius:6px; padding:5px; margin-bottom:10px;" placeholder="輸入 AI 生成 Prompt..."></textarea>
                    ${scene.sentences.map((s, si) => `
                        <div class="tts-item">
                            <button onclick="previewVoice('${s.text}', ${scene.id}, ${si})" style="background:none; border:none; cursor:pointer; font-size:16px;">🔊</button>
                            <input type="text" value="${s.text}" onchange="projectData[${idx}].sentences[${si}].text=this.value">
                            <div class="controls">
                                R:<input type="text" value="${s.rate}" onchange="projectData[${idx}].sentences[${si}].rate=this.value">
                                P:<input type="text" value="${s.pitch}" onchange="projectData[${idx}].sentences[${si}].pitch=this.value">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            target.appendChild(card);
        }
    }

    // --- 打包核心：圖片、語音、SRT 一口氣處理 ---
    async function packEverything() {
        const api = document.getElementById('apiUrl').value;
        if(!api) return alert("請輸入語音伺服器地址！");

        const status = document.getElementById('status-display');
        const zip = new JSZip();
        const imgDir = zip.folder("images");
        const audioDir = zip.folder("audio");
        
        status.innerHTML = "🚀 啟動打包程序...<br>正在逐句合成語音，請勿關閉網頁。";

        try {
            for (let scene of projectData) {
                // 1. 儲存圖片
                const imgData = scene.img.split(',')[1];
                imgDir.file(`scene_${scene.id.toString().padStart(3,'0')}.jpg`, imgData, {base64: true});

                // 2. 逐句呼叫 API 獲取 MP3
                for (let [si, s] of scene.sentences.entries()) {
                    status.innerHTML = `正在處理：分鏡 ${scene.id} 第 ${si+1} 句...`;
                    const res = await fetch(api, {
                        method: 'POST',
                        body: JSON.stringify({ text: s.text, lang: "zh", rate: s.rate, pitch: s.pitch })
                    });
                    if(!res.ok) throw new Error("API 響應失敗");
                    const audioBlob = await res.blob();
                    // 命名的很清楚：分鏡編號_句子編號.mp3
                    audioDir.file(`audio_${scene.id.toString().padStart(3,'0')}_${si+1}.mp3`, audioBlob);
                }
            }

            // 3. 儲存 SRT 與配置
            let srtStr = "";
            let sn = 1;
            projectData.forEach(scene => {
                scene.sentences.forEach(s => {
                    srtStr += `${sn++}\n${secToSrt(s.start)} --> ${secToSrt(s.end)}\n${s.text}\n\n`;
                });
            });
            zip.file("final_subtitles.srt", srtStr);
            zip.file("config.json", JSON.stringify(projectData, null, 2));

            // 4. 下載 ZIP
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = `AI_Project_${Date.now()}.zip`;
            a.click();
            status.innerText = "✨ 下載成功！所有素材已打包。";
        } catch (e) {
            status.innerText = "❌ 發生錯誤：" + e.message;
        }
    }

    // --- 工具函數 ---
    function parseSRT(t) {
        return t.split(/\n\s*\n/).filter(x=>x.trim()).map(b=>{
            const lines = b.split('\n');
            const times = lines[1].split(' --> ');
            return { start: srtToSec(times[0]), end: srtToSec(times[1]), text: lines.slice(2).join(' ') };
        });
    }

    function srtToSec(t) {
        const p = t.trim().split(':');
        return (+p[0])*3600 + (+p[1])*60 + parseFloat(p[2].replace(',','.'));
    }

    function secToSrt(s) {
        const date = new Date(0);
        date.setSeconds(s);
        const time = date.toISOString().substr(11, 8);
        const ms = (s % 1).toFixed(3).substring(2);
        return `${time},${ms}`;
    }

    async function previewVoice(text, sId, idx) {
        const url = document.getElementById('apiUrl').value;
        const item = projectData[sId-1].sentences[idx];
        const res = await fetch(url, { method: 'POST', body: JSON.stringify({ text, lang: "zh", rate: item.rate, pitch: item.pitch }) });
        const blob = await res.blob();
        new Audio(URL.createObjectURL(blob)).play();
    }

    function captureFrame(t) {
        return new Promise(r => {
            v.currentTime = t;
            v.onseeked = () => {
                c.width = v.videoWidth/2; c.height = v.videoHeight/2;
                c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
                r(c.toDataURL('image/jpeg', 0.8));
            };
        });
    }

    function toBase64(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = e => r(e.target.result); reader.readAsDataURL(f); }); }

    function updateThumb(id) {
        const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = async (e) => {
            const data = await toBase64(e.target.files[0]);
            document.getElementById(`thumb-${id}`).src = data;
            projectData[id-1].img = data;
        };
        inp.click();
    }
</script>
</body>
</html>
