<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 故事全素材打包工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --blue: #3b82f6; }
        body { font-family: sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 360px; background: var(--card); padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        .config-group { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #334155; }
        .btn { background: var(--blue); border: none; color: white; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .btn-pack { background: #f59e0b; }
        #main { flex: 1; padding: 30px; overflow-y: auto; background: #020617; }
        .scene-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 25px; border: 1px solid #475569; display: flex; gap: 20px; }
        .media-preview { width: 260px; text-align: center; }
        .media-preview img { width: 100%; border-radius: 8px; border: 2px solid #334155; }
        .tts-row { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; margin-top: 8px; display: flex; align-items: center; gap: 10px; }
        .tts-row input[type="text"] { background: transparent; border: none; color: white; border-bottom: 1px solid #475569; flex: 1; outline: none; }
        .params { display: flex; gap: 5px; font-size: 11px; }
        .params input { width: 45px; background: #000; color: #fff; border: 1px solid #555; text-align: center; }
        #v-hidden, #c-hidden { display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>📦 素材一鍵打包</h2>
    <div class="config-group">
        <label>1. 上傳 SRT 字幕</label><br>
        <input type="file" id="srtIn" accept=".srt">
    </div>
    <div class="config-group">
        <label>2. 圖片來源 (MP4或JPG)</label><br>
        <input type="file" id="videoIn" accept="video/mp4" style="margin-bottom:5px;">
        <input type="file" id="imgsIn" accept="image/*" multiple>
    </div>
    <div class="config-group">
        <label>3. API URL (Supabase):</label>
        <input type="text" id="apiUrl" style="width:95%; margin-top:5px;" placeholder="貼上妳的 Deno 網址">
    </div>
    <button class="btn" onclick="initWorkflow()">⚡ 1. 解析預覽</button>
    <button class="btn btn-pack" onclick="bundleZip()">📦 2. 合成語音並打包</button>
    <div id="status" style="font-size:12px; color:var(--accent); line-height:1.5; margin-top:10px;"></div>
</div>

<div id="main"><div id="list"></div></div>

<video id="v-hidden"></video>
<canvas id="c-hidden"></canvas>

<script>
    let masterData = [];
    let uploadImgs = [];
    const v = document.getElementById('v-hidden');
    const c = document.getElementById('c-hidden');

    document.getElementById('imgsIn').onchange = (e) => uploadImgs = Array.from(e.target.files);

    async function initWorkflow() {
        const sF = document.getElementById('srtIn').files[0];
        if(!sF) return alert("請提供 SRT");
        
        const srtItems = parseSRT(await sF.text());
        const vF = document.getElementById('videoIn').files[0];
        if(vF) { v.src = URL.createObjectURL(vF); await new Promise(r => v.onloadedmetadata = r); }

        masterData = [];
        let temp = [];
        let start = 0;
        srtItems.forEach((item, i) => {
            temp.push({...item, rate: "+0%", pitch: "+0Hz", vol: "+0%"});
            if (item.end - start >= 15 || i === srtItems.length - 1) {
                masterData.push({ id: masterData.length + 1, time: start, sentences: [...temp], img: "" });
                start = item.end;
                temp = [];
            }
        });
        render();
    }

    async function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        for (let [idx, scene] of masterData.entries()) {
            let img = uploadImgs[idx] ? await toB64(uploadImgs[idx]) : (v.src ? await shot(scene.time) : "");
            scene.img = img;
            const card = document.createElement('div');
            card.className = 'scene-card';
            card.innerHTML = `
                <div class="media-preview"><img src="${img}"><br>分鏡 #${scene.id}</div>
                <div style="flex:1">
                    ${scene.sentences.map((s, si) => `
                        <div class="tts-row">
                            <button onclick="preview('${s.text}', ${scene.id}, ${si})">🔊</button>
                            <input type="text" value="${s.text}" onchange="masterData[${idx}].sentences[${si}].text=this.value">
                            <div class="params">
                                R:<input type="text" value="${s.rate}" onchange="masterData[${idx}].sentences[${si}].rate=this.value">
                                P:<input type="text" value="${s.pitch}" onchange="masterData[${idx}].sentences[${si}].pitch=this.value">
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            list.appendChild(card);
        }
    }

    async function preview(text, sid, si) {
        const url = document.getElementById('apiUrl').value;
        const item = masterData[sid-1].sentences[si];
        const res = await fetch(url, {
            method: 'POST',
            body: JSON.stringify({ text, lang: "en", rate: item.rate, pitch: item.pitch, volume: item.vol })
        });
        const blob = await res.blob();
        new Audio(URL.createObjectURL(blob)).play();
    }

    async function bundleZip() {
        const api = document.getElementById('apiUrl').value;
        const status = document.getElementById('status');
        const zip = new JSZip();
        const imgDir = zip.folder("images");
        const audioDir = zip.folder("audio");

        status.innerText = "🚀 開始打包...\n正在合成語音中...";
        try {
            for (let scene of masterData) {
                imgDir.file(`scene_${scene.id}.jpg`, scene.img.split(',')[1], {base64: true});
                for (let [si, s] of scene.sentences.entries()) {
                    status.innerText = `處理中: 分鏡 ${scene.id} 第 ${si+1} 句`;
                    const res = await fetch(api, {
                        method: 'POST',
                        body: JSON.stringify({ text: s.text, lang: "en", rate: s.rate, pitch: s.pitch, volume: s.vol })
                    });
                    audioDir.file(`audio_${scene.id}_${si+1}.mp3`, await res.blob());
                }
            }
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = "Final_Story_Pack.zip";
            a.click();
            status.innerText = "✅ 打包完成！內容物：\n- images/ (JPG)\n- audio/ (MP3)";
        } catch(e) { status.innerText = "❌ 錯誤: " + e.message; }
    }

    function parseSRT(t) { return t.split(/\n\s*\n/).filter(x=>x.trim()).map(b=>{
        const l = b.split('\n'); const m = l[1].split(' --> ');
        return { start: ts(m[0]), end: ts(m[1]), text: l.slice(2).join(' ') };
    });}
    function ts(t) { const p = t.trim().split(':'); return (+p[0])*3600 + (+p[1])*60 + parseFloat(p[2].replace(',','.')); }
    function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f); }); }
    function shot(t) { return new Promise(r => { v.currentTime = t; v.onseeked = () => {
        c.width = v.videoWidth/2; c.height = v.videoHeight/2;
        c.getContext('2d').drawImage(v, 0, 0, c.width, c.height); r(c.toDataURL('image/jpeg', 0.8));
    };});}
</script>
</body>
</html>
