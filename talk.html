  function showToast(msg){ toastEl.textContent=msg; toastEl.style.display="block"; clearTimeout(showToast._t); showToast._t=setTimeout(()=>toastEl.style.display="none",1800); }
  function openModal(){ mask.style.display="flex"; mask.setAttribute("aria-hidden","false"); }

  function getWeekFromId(id){ const m=String(id||"").match(/^w(\d{1,3})\./i); return m?parseInt(m[1],10):null; }
  function safeText(v){ return (v==null) ? "" : String(v); }

  function BW_focusInputDesktopOnly(){ try{ BW_isMobileViewport() ? fillInput?.blur() : fillInput?.focus(); }catch(_e){} }
  const __talkJsonCache = new Map();

  async function fetchJsonAny(urls){
    let lastErr = null;
    for(const u of urls){
      try{
        const key = String(u || "");
        if(__talkJsonCache.has(key)) return __talkJsonCache.get(key);
        const ctrl = ("AbortController" in window) ? new AbortController() : null;
        const timer = ctrl ? setTimeout(()=>{ try{ ctrl.abort(); }catch(_e){} }, 8000) : null;
        const res = await fetch(key, {
          cache:"default",
          signal: ctrl ? ctrl.signal : undefined
        });
        if(timer) clearTimeout(timer);
        if(!res.ok) throw new Error("HTTP "+res.status);

        const data = await res.json();
        __talkJsonCache.set(key, data);
        return data;
      }catch(e){
        lastErr = e;
        try{ console.warn('[Talk] fetch failed', u, e); }catch(_e){}
      }
    }
    throw lastErr || new Error("fetch failed");
  }
  function getUserId(){ try{ return String(window.BW_USER_ID || localStorage.getItem("BW_USER_ID") || ""); }catch(e){ return ""; } }
  const LS_ANCHOR_BASE = "BW_TALK_ANCHOR_TS_";
  const LS_EXPIRES_BASE = "BW_TALK_EXPIRES_AT_";
  const WEEK_DAYS = 7;        // 每週 = 7 天（固定）
  const ADVANCE_WEEKS = 0.5;  // 提前 unlock（0.5 = 提前半週）

  function ensureAnchorTs(){
    const uid = getUserId() || "anon";
    const k = LS_ANCHOR_BASE + uid;
    let ts = 0;
    try{ ts = Number(localStorage.getItem(k)||"0"); }catch(e){ ts = 0; }
    const expNow = (()=>{ try{ return (window.BW_SUB_EXPIRES_AT || localStorage.getItem("BW_SUB_EXPIRES_AT") || "").toString(); }catch(e){ return ""; }})();
    try{
      const expKey = LS_EXPIRES_BASE + uid;
      const expOld = localStorage.getItem(expKey) || "";
      if(expNow && !expOld) localStorage.setItem(expKey, expNow);
    }catch(_e){}

    if(!ts){
      ts = Date.now();
      try{ localStorage.setItem(k, String(ts)); }catch(e){}
    }
    return ts;
  }

  function computeUnlockedWeek(){
    const ts = ensureAnchorTs();
    const diff = Date.now() - ts;
    const weekMs = WEEK_DAYS * DAY;
    const passed = diff / weekMs; // 0.0, 1.0, 2.0...
    const base = Math.max(1, Math.min(MAX_WEEKS, Math.floor(passed + ADVANCE_WEEKS) + 1));
    let cap = null;
    try{
      const capDirect = Number(localStorage.getItem("BW_LEVEL_WEEK_CAP"));
      if(Number.isFinite(capDirect) && capDirect > 0) cap = Math.floor(capDirect);

      if(cap == null){
        const n = Number(localStorage.getItem("BW_LEVEL_UNLOCKED_WEEK"));
        if(Number.isFinite(n) && n > 0) cap = Math.floor(n);
      }

      if(cap == null){
        let map = null;
        try{
          const raw = localStorage.getItem("BW_LEVEL_WEEK_MAP");
          if(raw) map = JSON.parse(raw);
        }catch(_){}

        const r = (localStorage.getItem("BW_LEVEL_RESULT")||"").trim().toUpperCase();
        const def = {A:1, B:6, C:12};
        const wk = (map && map[r] != null) ? Number(map[r]) : def[r];
        if(Number.isFinite(wk) && wk > 0) cap = Math.floor(wk);
      }

      if(cap == null){
        const cefr = (localStorage.getItem("BW_CEFR_LEVEL") || localStorage.getItem("BW_CEFR_RESULT") || "").trim().toUpperCase();
        const cefrMap = {A0:1, A1:4, A2:8, B1:16, B2:32, C1:999, C2:999};
        const wk = Number(cefrMap[cefr]);
        if(Number.isFinite(wk) && wk > 0) cap = Math.min(MAX_WEEKS, Math.floor(wk));
      }
    }catch(_){}

    return (cap!=null) ? Math.max(base, Math.min(MAX_WEEKS, cap)) : base;
  }
function normalizeTurns(raw){
    const arr = Array.isArray(raw) ? raw : (["turns","dialogue","lines","items"].map(k=>raw?.[k]).find(v=>Array.isArray(v) && v.length) || []);
    return arr.map((t)=>{
      if(!t) return null;
      const en = String(t.en ?? t.english ?? t.text ?? "").trim();
      if(!en) return null;
      const zh = String(t.zh ?? t.tw ?? t.cn ?? t.chinese ?? "").trim();
      const ja = String(t.ja ?? t.jp ?? t.japanese ?? "").trim();
      const rawRole = String(t.role ?? t.speaker ?? "").trim();
      const r = rawRole.toLowerCase();
      const role = !rawRole ? ((!t.en && (t.hint_en || t.hint_zh)) ? "USER" : "AI") : ((r==="assistant" || r==="ai" || r==="bot" || r==="system") ? "AI" : ((r==="user" || r==="student" || r==="learner") ? "USER" : rawRole));
      return { en, zh, ja, role, level:String(t.level ?? t.cefr ?? raw?.meta?.level ?? raw?.meta?.cefr ?? "A1").trim() || "A1", hint:String(t.hint ?? "").trim(), fill:String(t.fill ?? t.blank ?? ""), answer:String(t.answer ?? "").trim() };
    }).filter(Boolean);
  }
function currentTurn(){
    return turns[Math.max(0, Math.min(turnIdx, turns.length-1))] || {en:"",zh:"",level:"A1",hint:"",fill:"",answer:""};
  }
function extractJapanese(text){ const m=String(text||"").trim().match(/[\u3040-\u30ff][\u3040-\u30ff\u3400-\u9fff\u3000-\u303f\s]*/); return m?m[0].trim():""; }
function cleanTalkZhDisplay(text){ const raw=String(text||"").trim(), jp=raw.search(/[\u3040-\u30ff]/); if(!raw||jp<0) return raw; const zh=raw.slice(0,jp).trim().replace(/\s+[A-Za-z][A-Za-z0-9'’\s,.;:!?-]*$/g,"").trim(); return zh||raw; }
function speakJA(text){
  try{
    if(!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 0.95;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakENQuick(text){
  const s = String(text || "").trim();
  if(!s) return;
  try{
    speak(s);
  }catch(_e){
    try{
      if(!('speechSynthesis' in window)) return;
      const u = new SpeechSynthesisUtterance(s);
      u.lang = 'en-US';
      u.rate = 0.96;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }catch(_e2){}
  }
}
function renderZhJa(containerEl, zhText, jaText){
  if(!containerEl) return;
  containerEl.innerHTML = '';

  const rawZh = (zhText || '').toString().trim();

function updateUI(){
    let aiIdx = turnIdx;
    while(aiIdx < turns.length && turns[aiIdx]?.role === "USER") aiIdx++;
    if(aiIdx >= turns.length) aiIdx = Math.max(0, turns.length-1);
    const ai = turns[aiIdx] || {en:"—",zh:"",level:"A1",role:"AI"};
    const user = (turns[aiIdx+1] && turns[aiIdx+1].role==="USER") ? turns[aiIdx+1] : null;

    lineEn.textContent = ai.en || "—";
    renderZhJa(lineZh, ai.zh, ai.ja);
    fillTitle.textContent = "你的回覆";
    let expected = (user?.en || "").trim();

      expected = synthUserFromAI(ai.en||"", activeSceneId||"");
      expectedSrc = "generated";
      console.warn("[Talk] 缺 USER 建議句：已用規則生成（請補 JSON）", { sceneId: activeSceneId, ai: ai.en });
    }
    const cl = makeCloze(expected);
    fillEn.textContent = expected ? (cl.cloze || "請輸入你的回覆…") : "請輸入你的回覆…";
    if(fillTrans){
      const uzh = (user && user.zh) ? user.zh : "";
      const uja = (user && user.ja) ? user.ja : "";
      renderZhJa(fillTrans, uzh, uja);
    }renderFillOptions(cl);
    fillHint.textContent = "按 🎤 開始說；回覆相似度達 50% 會自動下一句。未達門檻可重說，或直接按「送出」。" + (expectedSrc==="generated" ? "  ⚠ 缺 USER 建議句：已用規則生成，請補 JSON。" : "");

  function synthUserFromAI(aiEn, sceneId){
    const s = (aiEn||"").trim();
    if(!s) return "—";
    const lower = s.toLowerCase();
    const isQ = /\?$/.test(s);
    const sid = (sceneId||"").toLowerCase();
    const isDir = sid.includes("direction");
    const isAirport = sid.includes("airport");
    const isCoffee = sid.includes("coffee");
    if(isQ){
      if(isDir && (lower.includes("where") || lower.includes("how do i get"))){
        return "It's over there.";
      }
      if(isAirport && (lower.includes("passport") || lower.includes("boarding") || lower.includes("gate"))){
        return "Sure. Let me check that for you.";
      }
      if(isCoffee && (lower.includes("would you like") || lower.includes("what can i get"))){
        return "I'd like a coffee, please.";
      }
      if(lower.startsWith("can i") || lower.startsWith("could i") || lower.startsWith("may i")){
        return "Yes, please.";
      }
      return "Sure.";
    }
    return s;
  }

function makeCloze(expectedEn){
    const s = (expectedEn||"").trim();
    if(!s) return {cloze:"", answer:"", options:[]};
    const tokens = s.replace(/[?!.]/g,"").split(/\s+/).filter(Boolean);
    let target = "";
    for(const tk of tokens){
      if(/\d/.test(tk)){ target = tk; break; }
    }
    if(!target){
      for(let i=tokens.length-1;i>=0;i--){
        const tk = tokens[i].replace(/[^A-Za-z0-9'-]/g,"");
        if(tk.length>=4 && !/^(this|that|with|have|your|what|where|when|could|would|please)$/i.test(tk)){
          target = tokens[i];
          break;
        }
      }
    }
    if(!target) target = tokens[Math.max(0, tokens.length-1)];
    const esc = target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const cloze = s.replace(new RegExp('\\b'+esc+'\\b'), '____');
    const pool = ["gate","terminal","passport","boarding","information","coffee","small","large","help","today","tomorrow","please","thanks","baggage","counter","check-in"];
    const lower = target.toLowerCase();
    const opts = [target];
    for(const w of pool){
      if(opts.length>=3) break;
      if(w.toLowerCase()===lower) continue;
      if(/\d/.test(target)){
        if(/\d/.test(w)) opts.push(w);
      }else{
        if(!/\d/.test(w)) opts.push(w);
      }
    }
    if(/\d/.test(target) && opts.length<3){
      const n = parseInt(target.replace(/\D/g,""),10) || 12;
      while(opts.length<3){
        const cand = String(n + (opts.length===1?1:2));
        if(!opts.includes(cand)) opts.push(cand);
      }
    }
    return {cloze, answer: target, options: opts};
  }

  function ensureFillOpts(){
    let el = document.getElementById("fillOpts");
    if(!el){
      el = document.createElement("div");
      el.id = "fillOpts";
      el.className = "fillOpts";
      el.style.display = "flex";
      el.style.flexWrap = "wrap";
      el.style.gap = "10px";
      el.style.marginTop = "10px";
      fillHint.insertAdjacentElement("afterend", el);
    }
    return el;
  }

  function renderFillOptions(cl){
    const el = ensureFillOpts();
    el.innerHTML = "";
    if(!cl || !cl.options || cl.options.length===0) return;
    cl.options.forEach((opt)=>{
      const b = document.createElement("button");
      b.type = "button";
      b.className = "optBtn";
      b.textContent = opt;
      b.style.border = "1px solid var(--line)";
      b.style.background = "#fff";
      b.style.borderRadius = "999px";
      b.style.padding = "10px 14px";
      b.style.cursor = "pointer";
      b.addEventListener("click", ()=>{
        const expected = (currentExpectedEn()||"").trim();
        if(!expected){ fillInput.value = opt; return; }
        const cl2 = makeCloze(expected);
        const completed = (cl2.cloze||"").includes("____")
          ? cl2.cloze.replace("____", opt)
          : expected;
        fillInput.value = completed;
        BW_focusInputDesktopOnly();
      });
      el.appendChild(b);
    });
  }

  function currentExpectedEn(){
    const aiIdx = turnIdx;
    const user = (turns[aiIdx+1] && turns[aiIdx+1].role==="USER") ? turns[aiIdx+1] : expectedAfter(aiIdx);
    return (user && user.en) ? user.en : "";
  }
  const USE_AZURE_TTS = true; // 改成 false 可退回 Browser Speech
  const AZURE_TTS_ENDPOINT = `${SUPABASE_URL}/functions/v1/azure-tts`;
  let __ttsAudio = null;
  let __ttsBlobUrl = null;
  let __ttsRequestSeq = 0;
  let __ttsAbortCtrl = null;

async function speak(text){
    try{
      const now = Date.now();
      if (text && text === lastTts && (now - lastTtsAt) < 800) return; // 防止重複發聲
      lastTtsAt = now;
      lastTts = text;

      const mySeq = ++__ttsRequestSeq;
      try{ if(__ttsAbortCtrl){ __ttsAbortCtrl.abort(); } }catch(e){}
      __ttsAbortCtrl = ("AbortController" in window) ? new AbortController() : null;
      try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){}
      try{ if(__ttsAudio){ __ttsAudio.pause(); __ttsAudio.currentTime = 0; } }catch(e){}
      try{ if(__ttsBlobUrl){ URL.revokeObjectURL(__ttsBlobUrl); } }catch(e){}
      __ttsAudio = null;
      __ttsBlobUrl = null;

      __tvStart();
      if (USE_AZURE_TTS){
        const voice = "en-AU-NatashaNeural";
        const st = { rate: "+6%", pitch: "+2%" };

        const r = await fetch(AZURE_TTS_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": "Bearer " + SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ text, voice, rate: st.rate, pitch: st.pitch }),
          signal: __ttsAbortCtrl ? __ttsAbortCtrl.signal : undefined
        });
        if(mySeq !== __ttsRequestSeq){
          __tvStop();
          return;
        }

        if(!r.ok){
          const t = await r.text().catch(()=> "");
          console.warn("[azure-tts] failed:", r.status, t.slice(0,200));
          throw new Error("azure-tts " + r.status);
        }

        const blob = await r.blob();
        if(mySeq !== __ttsRequestSeq){
          __tvStop();
          return;
        }
        __ttsBlobUrl = URL.createObjectURL(blob);
        __ttsAudio = new Audio(__ttsBlobUrl);

        __ttsAudio.onended = ()=>{
          __tvStop();
          try{ if(__ttsBlobUrl) URL.revokeObjectURL(__ttsBlobUrl); }catch(e){}
          __ttsAudio = null;
          __ttsBlobUrl = null;
        };
        __ttsAudio.onerror = ()=>{
          __tvStop();
        };

        if(mySeq !== __ttsRequestSeq){
          try{ __ttsAudio.pause(); }catch(e){}
          __tvStop();
          return;
        }
        await __ttsAudio.play();
        return;
      }
      if(!("speechSynthesis" in window)){ __tvStop(); return; }
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 1.0;
      window.speechSynthesis.speak(u);
      u.onend = ()=>{ __tvStop(); };
      u.onerror = ()=>{ __tvStop(); };
    }catch(e){
      try{ __tvStop(); }catch(_){}
    }
  }

  function stopSpeak(){
    try{ __ttsRequestSeq++; }catch(e){}
    try{ if(__ttsAbortCtrl){ __ttsAbortCtrl.abort(); } }catch(e){}
    __ttsAbortCtrl = null;
    try{ window.speechSynthesis.cancel(); }catch(e){}
    try{ if(__ttsAudio){ __ttsAudio.pause(); __ttsAudio.currentTime = 0; } }catch(e){}
    try{ if(__ttsBlobUrl){ URL.revokeObjectURL(__ttsBlobUrl); } }catch(e){}
    __ttsAudio = null;
    __ttsBlobUrl = null;
    __tvStop();
  }

  function isAI(t){ return !!t && (t.role||'AI') !== 'USER'; }
  function nextAIIndex(from){
    for(let i=from+1;i<turns.length;i++){
      if(isAI(turns[i])) return i;
    }
    return -1;
  }
  function expectedAfter(aiIndex){
    for(let i=aiIndex+1;i<turns.length;i++){
      const t = turns[i];
      if(!t) continue;
      if(isAI(t)) break;
      return t; // first user-like turn after AI
    }
    return null;
  }

  function nextTurn(){
    const ni = nextAIIndex(turnIdx);
    if(ni >= 0){
      turnIdx = ni;
      updateUI();
      speak(currentTurn().en); // only speak AI turns
    }else{
      showToast("本情境完成 ✅");
try{showReport();}catch(e){}
    }
  }

  function saveLine(){
    const t = currentTurn();
    if(!t.en) return;
    let arr = [];
    try{ arr = JSON.parse(localStorage.getItem(LS_SAVED)||"[]"); }catch(e){}
    arr.unshift({en:t.en, zh:t.zh, at:new Date().toISOString(), scene:activeSceneId});
    arr = arr.slice(0,200);
    localStorage.setItem(LS_SAVED, JSON.stringify(arr));
    showToast("已收藏");
  }

  async function loadSceneById(id, title){
    activeSceneId = id;
    const sceneMeta = ((indexData && Array.isArray(indexData.scenes)) ? indexData.scenes : []).find(s => String(s?.id||"") === String(id||"")) || null;
    activeSceneTitle = title || sceneMeta?.title || id;

    const explicitFile = String(sceneMeta?.file || sceneMeta?.url || "").trim();
    const fallback = [];
    if(explicitFile){
      fallback.push(new URL(explicitFile, location.origin).toString());
      fallback.push(new URL(explicitFile, location.href).toString());
    }
    fallback.push(
      new URL("/talk/" + encodeURIComponent(id) + ".json", location.origin).toString(),
      new URL("./" + encodeURIComponent(id) + ".json", location.href).toString(),
      new URL("../talk/" + encodeURIComponent(id) + ".json", location.href).toString()
    );

    try{
      activeScene = await fetchJsonAny(fallback);
    }catch(e){
      showToast("找不到場景 JSON：" + id);
      turns = [{en:"Scene JSON not found.", zh:"找不到場景 JSON（請確認檔案放在 /talk/）", level:"A1"}];
      turnIdx = 0;
      updateUI();
      return;
    }

    turns = normalizeTurns(activeScene);
    if(!turns.length){
      turns = [{en:"(No turns found in JSON)", zh:"JSON 沒有 turns/dialogue/lines/items 陣列", level: String(activeScene?.meta?.level || "A1")}];
    }
    turnIdx = 0;
    fillInput.value = "";
    updateUI();
    speak(currentTurn().en);
  }

  function buildWeekMap(){
    byWeek = new Map();
    const scenes = (indexData && Array.isArray(indexData.scenes)) ? indexData.scenes : [];
    for(const s of scenes){
      const id = s.id || s.scene_id || s.key;
      if(!id) continue;
      const wk = Number(s?.week || 0) || getWeekFromId(id);
      if(!wk) continue;
      if(!byWeek.has(wk)) byWeek.set(wk, []);
      byWeek.get(wk).push({
        id,
        title: s.title || id,
        level: s.level || s.lev || "",
        week: wk,
        file: s.file || s.url || ""
      });
    }
    for(const [wk, arr] of byWeek){
      arr.sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    }
  }

function renderPicker(){
  modalBody.innerHTML = "";
  const frag = document.createDocumentFragment();
  for(let wk=1; wk<=MAX_WEEKS; wk++){
    const list = byWeek.get(wk) || [];
    if(!list.length) continue;

    const locked = wk > unlockedWeek;

    const g = document.createElement("div");
    g.className = "group";

    const head = document.createElement("div");
    head.className = "gHead";
    head.innerHTML = `<div>Week ${wk}</div><div class="lock">${locked ? "🔒 尚未解鎖" : "✅ 可練習"}</div>`;
    g.appendChild(head);
    for(const it of list){
      const row = document.createElement("div");
      row.className = "item";

      const left = document.createElement("div");
      left.innerHTML = `
        <div class="name">${safeText(it.title || it.id)}</div>
        <p class="sub">${safeText(it.id)}</p>
      `;

      const btn = document.createElement("button");
      btn.className = locked ? "ghost" : "primary";
      btn.style.height = "42px";
      btn.style.fontSize = "15px";
      btn.textContent = locked ? "尚未" : "開始";
      btn.disabled = locked;

      btn.addEventListener("click", ()=>{
        activeWeek = wk;
        try{ localStorage.setItem(LS_LAST_SCENE, it.id); }catch(_){}
        closeModal();
        try{ localStorage.setItem(LS_WEEK, String(wk)); }catch(_e){}
        loadSceneById(it.id, it.title);
      });

      row.appendChild(left);
      row.appendChild(btn);
      g.appendChild(row);
    }

    frag.appendChild(g);
  }
  modalBody.appendChild(frag);
}

async function init(){
  const initialTeacherFile = "Emma.mp4";
  const __deferTeacherLoad = ()=> setTeacher(initialTeacherFile);
  if("requestIdleCallback" in window){
    requestIdleCallback(__deferTeacherLoad, { timeout: 1200 });
  }else{
    setTimeout(__deferTeacherLoad, 240);
  }
    unlockedWeek = computeUnlockedWeek();
    const savedWeek = parseInt(localStorage.getItem(LS_WEEK)||"0",10) || 0;
    activeWeek = Math.min(Math.max(savedWeek || unlockedWeek, 1), unlockedWeek);

    try{ localStorage.setItem("talk_active_week", String(activeWeek)); }catch(_e){}
    try{
      indexData = await fetchJsonAny([INDEX_URL, ...FALLBACK_INDEX_URLS]);
      indexData = normalizeIndex(indexData);
    }catch(e){
      indexData = { scenes: [] };
      showToast("讀不到 talk/index.json");
    }

    buildWeekMap();
    renderPicker();
    const availableWeeks = Array.from(byWeek.keys()).map(Number).filter(n => Number.isFinite(n)).sort((a,b)=>a-b);
    if(availableWeeks.length){
      const unlockedWeeks = availableWeeks.filter(w => w <= unlockedWeek);
      if(!unlockedWeeks.includes(activeWeek)){
        activeWeek = unlockedWeeks.length ? unlockedWeeks[unlockedWeeks.length - 1] : availableWeeks[0];
      }
    }
    const allScenes = Array.isArray(indexData?.scenes) ? indexData.scenes : [];
    const sceneParam = (new URLSearchParams(location.search).get("scene") || "").trim().replace(/\.json$/i, "");
    let pick = sceneParam ? allScenes.find(s=>String(s?.id||"")===sceneParam) : allScenes.find(s=>Number(s?.week||0)===Number(activeWeek||0));
    if(sceneParam && !pick){
      turns = [{en:`Scene not found: ${sceneParam}`, zh:`找不到場景：${sceneParam}。`}];
      updateUI(); showToast(`找不到場景：${sceneParam}`); return;
    }
    if(!pick){
      const openScenes = allScenes.filter(s=>Number(s?.week||0)>0 && Number(s?.week||0)<=Number(unlockedWeek||0));
      pick = openScenes[0] || allScenes[0] || null;
    }
    const firstId = pick?.id || null;
    const firstTitle = pick?.title || firstId;
    if(pick?.week){
      if(Number(pick.week) <= Number(unlockedWeek)) activeWeek = Number(pick.week) || activeWeek;
      try{ localStorage.setItem(LS_WEEK, String(activeWeek)); localStorage.setItem(LS_LAST_SCENE, pick.id); }catch(_e){}
    }
    if(!firstId){
      turns = [{en:"No scenes in index.json", zh:"請先把 w01..w08 的 JSON 與 talk/index.json 放在 /talk/ 目錄", level:"A1"}];
      updateUI();
      return;
    }
    await loadSceneById(firstId, firstTitle);
  }
  btnPick.addEventListener("click", ()=>{ renderPicker(); openModal(); });
  btnClose.addEventListener("click", closeModal);
  mask.addEventListener("click", (e)=>{ if(e.target===mask) closeModal(); });

  const btnSpeakLineEn = $("btnSpeakLineEn");
  const btnSpeakFillEn = $("btnSpeakFillEn");
  if(btnSpeakLineEn){
    btnSpeakLineEn.addEventListener("click", ()=>{
      const t = currentTurn();
      const aiText = (document.getElementById("lineEnInline")?.textContent || t.en || "").trim();
      if(aiText) speakENQuick(aiText);
    });
  }
  if(btnSpeakFillEn){
    btnSpeakFillEn.addEventListener("click", ()=>{
      const raw = (fillEn?.textContent || "").trim();
      const expected = (currentExpectedEn() || raw || "").trim();
      if(expected) speakENQuick(expected);
    });
  }

  btnSkip.addEventListener("click", ()=>{ stopTalkRecognition({ clearInput:false }); nextTurn(); });

  btnHint.addEventListener("click", ()=>{
    const expected = (currentExpectedEn() || "").trim();
    if(!expected){ showToast("本句沒有建議回覆"); return; }
    fillEn.textContent = expected;
    speak(expected);
    showToast("已顯示提示（完整句）");
    clearTimeout(window.__bwHintTimer);
    window.__bwHintTimer = setTimeout(()=>{
      const cl = makeCloze(expected);
      fillEn.textContent = cl.cloze || expected;
      renderFillOptions(cl);
    }, 3000);
  });

  btnSave.addEventListener("click", saveLine);

  btnFill.addEventListener("click", ()=>{
    fillCard.scrollIntoView({behavior:"smooth", block:"start"});
    BW_focusInputDesktopOnly();
  });

  btnFillReset.addEventListener("click", ()=>{
    stopTalkRecognition({ clearInput:true });
    fillInput.value = "";
    showToast("已清空，可重新說");
    BW_focusInputDesktopOnly();
  });

  function BW_submitReplyNow(said, opts){
    const options = opts || {};
    const text = String(said || "").trim();
    if(!text){ showToast("請先輸入你的回覆"); return false; }
    stopTalkRecognition({ clearInput:false });
    fillInput.value = "";
    showToast(options.toast || "已送出 ✅");
    nextTurn();
    return true;
  }

  btnSendFill.addEventListener("click", ()=>{
    const said = (fillInput.value || "").trim();
    BW_submitReplyNow(said, { echoUser:false, toast:"已送出 ✅" });
  });

  btnType.addEventListener("click", ()=>{
    let aiIdx = turnIdx;
    while(aiIdx < turns.length && turns[aiIdx]?.role === "USER") aiIdx++;
    const user = (turns[aiIdx+1] && turns[aiIdx+1].role==="USER") ? turns[aiIdx+1] : null;
    const ans = prompt("輸入你的回覆（會用 TTS 朗讀）", user?.en || "");
    if(ans && ans.trim()){
      fillInput.value = ans.trim();
    }
  });

  btnBack.addEventListener("click", ()=>{
    history.length>1 ? history.back() : (location.href = "./");
  });
  const btnMicStop = $("btnMicStop");
  let recognition = null;
  let talkVoiceAutoAdvancing = false;
  let talkVoiceFinalTranscript = "";
  let talkVoiceLastTranscript = "";
  let talkVoiceSession = 0;
  let talkVoiceStopping = false;

  function getTalkSR(){
    return window.SpeechRecognition || window.webkitSpeechRecognition || null;
  }

  function resetTalkRecUI(){
    try{ btnMic.disabled = false; }catch(_e){}
    try{ btnMicStop.disabled = true; }catch(_e){}
    try{ btnMic.classList.remove("isRecording"); }catch(_e){}
    try{ $("dotLive").style.background = "#22c55e"; }catch(_e){}
  }

  function stopTalkRecognition(opts){
    const options = opts || {};
    talkVoiceSession++;
    talkVoiceStopping = true;
    const old = recognition;
    recognition = null;
    try{
      if(old){
        old.onresult = null;
        old.onerror = null;
        old.onend = null;
        if(typeof old.abort === "function") old.abort();
        else if(typeof old.stop === "function") old.stop();
      }
    }catch(_e){}
    talkVoiceFinalTranscript = "";
    talkVoiceLastTranscript = "";
    if(options.clearInput){
      try{ fillInput.value = ""; }catch(_e){}
    }
    resetTalkRecUI();
    setTimeout(()=>{ talkVoiceStopping = false; }, 80);
  }

  function normalizeTalkSpeechText(s){
    return String(s || "")
      .toLowerCase()
      .replace(/[’‘]/g, "'")
      .replace(/\b(i'm)\b/g, "i am")
      .replace(/\b(don't)\b/g, "do not")
      .replace(/\b(can't)\b/g, "cannot")
      .replace(/\b(won't)\b/g, "will not")
      .replace(/\b(it's)\b/g, "it is")
      .replace(/\b(that's)\b/g, "that is")
      .replace(/\b(what's)\b/g, "what is")
      .replace(/\b(we're)\b/g, "we are")
      .replace(/\b(you're)\b/g, "you are")
      .replace(/[^a-z0-9\s']/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function talkSpeechTokens(s){
    const txt = normalizeTalkSpeechText(s);
    return txt ? txt.split(" ").filter(Boolean) : [];
  }

  function talkSpeechSimilarity(spoken, expected){
    const a = talkSpeechTokens(spoken);
    const b = talkSpeechTokens(expected);
    if(!a.length || !b.length) return 0;

    const pool = a.slice();
    let hit = 0;
    for(const w of b){
      const idx = pool.indexOf(w);
      if(idx >= 0){
        hit++;
        pool.splice(idx, 1);
      }
    }
    return Math.max(0, Math.min(1, (2 * hit) / (a.length + b.length)));
  }

  function talkVoiceExpectedReply(){
    return (typeof currentExpectedEn === "function" ? currentExpectedEn() : "") || "";
  }

  function talkVoiceAdvanceIfScoreOK(spoken, score){
    if(talkVoiceAutoAdvancing) return false;
    const said = String(spoken || "").trim();
    if(!said) return false;
    const pct = Math.round((Number(score) || 0) * 100);
    if((Number(score) || 0) < 0.50) return false;

    talkVoiceAutoAdvancing = true;
    fillInput.value = said;
    stopTalkRecognition({ clearInput:false });

    setTimeout(()=>{
      try{
        BW_submitReplyNow(said, {
          echoUser:false,
          toast:`正確度 ${pct}% ✅ 自動下一句`
        });
      }catch(_e){
        showToast(`正確度 ${pct}% ✅，請按送出`);
      }finally{
        talkVoiceAutoAdvancing = false;
      }
    }, 360);

    return true;
  }

  function talkVoiceHandleTranscript(transcript, hasFinal){
    const said = String(transcript || "").trim();
    if(!said || talkVoiceAutoAdvancing) return;

    talkVoiceLastTranscript = said;
    fillInput.value = said;

    const expected = String(talkVoiceExpectedReply() || "").trim();
    const score = expected ? talkSpeechSimilarity(said, expected) : 0;
    if(score >= 0.50 || (hasFinal && score >= 0.50)){
      talkVoiceAdvanceIfScoreOK(said, score);
    }
  }

  function startTalkRecognition(){
    const SR = getTalkSR();
    if(!SR){
      showToast("此瀏覽器暫不支援語音辨識，請直接輸入");
      BW_focusInputDesktopOnly();
      return;
    }

    stopSpeak();
    stopTalkRecognition({ clearInput:true });
    talkVoiceAutoAdvancing = false;
    talkVoiceFinalTranscript = "";
    talkVoiceLastTranscript = "";

    const mySession = ++talkVoiceSession;
    setTimeout(()=>{
      if(mySession !== talkVoiceSession) return;

      const rec = new SR();
      recognition = rec;
      rec.lang = "en-US";
      rec.interimResults = true;
      rec.continuous = false;
      rec.maxAlternatives = 1;

      fillInput.value = "";
      btnMic.disabled = true;
      btnMicStop.disabled = false;
      try{ btnMic.classList.add("isRecording"); }catch(_e){}
      try{ $("dotLive").style.background = "#ef4444"; }catch(_e){}
      showToast("正在聽；答對 50% 會自動下一句");

      rec.onresult = (e)=>{
        if(mySession !== talkVoiceSession || rec !== recognition) return;
        let finalText = "";
        let interimText = "";
        for(let i = 0; i < e.results.length; i++){
          const seg = String(e.results[i]?.[0]?.transcript || "").trim();
          if(!seg) continue;
          if(e.results[i].isFinal) finalText += seg + " ";
          else interimText += seg + " ";
        }
        talkVoiceFinalTranscript = finalText.trim();
        const transcript = (talkVoiceFinalTranscript || interimText).trim();
        const hasFinal = !!talkVoiceFinalTranscript;
        talkVoiceHandleTranscript(transcript, hasFinal);
      };

      rec.onerror = (ev)=>{
        if(mySession !== talkVoiceSession || rec !== recognition) return;
        const err = String(ev?.error || "");
        if(err === "aborted" || talkVoiceStopping || talkVoiceAutoAdvancing) return;
        const said = String(talkVoiceFinalTranscript || talkVoiceLastTranscript || fillInput.value || "").trim();
        const expected = String(talkVoiceExpectedReply() || "").trim();
        const score = expected ? talkSpeechSimilarity(said, expected) : 0;
        const pct = Math.round(score * 100);
        stopTalkRecognition({ clearInput:false });
        if(!talkVoiceAdvanceIfScoreOK(said, score)){
          showToast(said ? `正確度 ${pct}%｜可再說或直接送出` : "沒有聽清楚，可再按 🎤");
        }
      };

      rec.onend = ()=>{
        if(mySession !== talkVoiceSession || rec !== recognition) return;
        const said = String(talkVoiceFinalTranscript || talkVoiceLastTranscript || fillInput.value || "").trim();
        const expected = String(talkVoiceExpectedReply() || "").trim();
        const score = expected ? talkSpeechSimilarity(said, expected) : 0;
        const pct = Math.round(score * 100);
        stopTalkRecognition({ clearInput:false });
        if(!talkVoiceAdvanceIfScoreOK(said, score)){
          showToast(said ? `正確度 ${pct}%｜未達 50%，可重說或直接送出` : "沒有收到聲音，請再按 🎤");
        }
      };

      try{
        rec.start();
      }catch(_e){
        stopTalkRecognition({ clearInput:false });
        showToast("語音辨識無法啟動，請再試一次或直接輸入");
        BW_focusInputDesktopOnly();
      }
    }, 260);
  }

  btnMic.addEventListener("click", startTalkRecognition);

  if(btnMicStop){
    btnMicStop.addEventListener("click", ()=>{
      try{
        if(recognition && typeof recognition.stop === "function") recognition.stop();
        else stopTalkRecognition({ clearInput:false });
      }catch(_e){
        stopTalkRecognition({ clearInput:false });
      }
    });
  }
  document.addEventListener("touchmove", (e)=>{
    const inModal = e.target && (e.target.closest && e.target.closest("#modalBody"));
    if(mask.style.display==="flex" && inModal) return;
  }, {passive:true});

  init();
})();</script>

    <div style="text-align:center;color:#666;margin:6px 0 10px">買一杯咖啡</div>
    <div style="display:flex;gap:10px;justify-content:space-between;margin:10px 0">
      <div style="flex:1;text-align:center"><b id="rActive">50%</b><div style="color:#777;font-size:12px">主動練習</div></div>
      <div style="flex:1;text-align:center"><b id="rPron">53%</b><div style="color:#777;font-size:12px">發音</div></div>
      <div style="flex:1;text-align:center"><b id="rWords">116</b><div style="color:#777;font-size:12px">單字數</div></div>
    </div>
    <div style="text-align:center;margin:6px 0 14px">
      <div style="font-size:12px;color:#777">完整度</div>
      <div style="font-size:28px;font-weight:700" id="rComplete">65</div>
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeReport()" style="flex:1;border-radius:14px;border:1px solid #e5e7eb;padding:10px;background:#fff">關閉</button>
      <button onclick="closeReport()" style="flex:1;border-radius:14px;border:none;padding:10px;background:#2563eb;color:#fff">繼續</button>
    </div>
  </div>
</div>
<script>
function showReport(){document.getElementById('bwReportMask').style.display='block';try{bwSaveTalkDailyScore();try{if(typeof totalScore!=='undefined')BW_commitTalkScore(totalScore)}catch(e){}}catch(e){}}
function closeReport(){document.getElementById('bwReportMask').style.display='none'}
</script>

<script>
function bwSaveTalkDailyScore(){try{const d=new Date(),key=d.toISOString().slice(0,10),tw=d.toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'}),num=(id,def=null,max=100)=>{const e=document.getElementById(id);if(!e)return def;const v=Number(String(e.textContent||'').replace('%','').trim());return Number.isFinite(v)?Math.max(0,Math.min(max,Math.round(v))):def},obj=JSON.parse(localStorage.getItem('bwTalkScores')||'{}')||{},row={score:num('rComplete',65),active:num('rActive'),pron:num('rPron'),words:num('rWords',null,9999),updated_at:new Date().toISOString()};obj[key]=row;if(tw&&tw!==key)obj[tw]=row;localStorage.setItem('bwTalkScores',JSON.stringify(obj))}catch(e){}}
</script>

<script>
(function(){const KEY="BW_DAILY_SCORE_MAP";window.BW_commitTalkScore=function(score){try{const day=new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Taipei"}),map=JSON.parse(localStorage.getItem(KEY)||"{}");map[day]=(Number(map[day])||0)+Number(score||0);localStorage.setItem(KEY,JSON.stringify(map))}catch(e){console.error(e)}}})();
</script>
