<script>
(async function() {
  try {
    const SUPABASE_URL = window.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    // --- require login ---
    const { data: sess } = await supabase.auth.getSession();
    const session = sess && sess.session;
    if (!session || !session.user) {
      const red = encodeURIComponent(location.pathname + location.search + location.hash);
      location.replace('/login.html?next=' + red);
      return;
    }

    const user = session.user;
    const uid = user.id;
    const email = (user.email || '').toLowerCase();

    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' }); // YYYY-MM-DD

    // --- read profile (best effort) ---
    const { data: prof, error: perr } = await supabase
      .from('profiles')
      .select('id, expires_at, is_paused')
      .eq('id', uid)
      .maybeSingle();

    // 如果 profiles 讀不到（RLS / row 不存在），不要直接判死刑：改用 orders 當 fallback
    const paused = !!(prof && prof.is_paused);
    const pexp = prof && prof.expires_at ? String(prof.expires_at).slice(0,10) : '';

    // --- orders fallback (handle test accounts recreated with new uid) ---
    // 若 profiles 已明確顯示訂閱有效，就不要再多查 orders；
    // 這能少 1~2 次 Supabase round-trip，Talk 進頁會快不少。
    const profileValid = (!paused) && !!(pexp && pexp >= today);
    let oexp = '';
    let opaid = '';
    let ocreated = '';
    let hasPaid = false;

    if (!profileValid) {
      try {
        // 1) by user_id (best)
        const r1 = await supabase
          .from('orders')
          .select('status,expires_at,paid_at,created_at')
          .eq('user_id', uid)
          .order('created_at', { ascending:false })
          .limit(1);
        if (!r1.error && r1.data && r1.data.length) {
          const row = r1.data[0];
          if (row?.status) hasPaid = String(row.status).toLowerCase() === 'paid';
          if (row?.expires_at) oexp = String(row.expires_at).slice(0,10);
          if (row?.paid_at) opaid = String(row.paid_at);
          if (row?.created_at) ocreated = String(row.created_at);
        } else {
          // 2) fallback by email (covers cases where order created before account was recreated)
          const r2 = await supabase
            .from('orders')
            .select('status,expires_at,paid_at,created_at')
            .eq('email', email)
            .order('created_at', { ascending:false })
            .limit(1);
          if (!r2.error && r2.data && r2.data.length) {
            const row = r2.data[0];
            if (row?.status) hasPaid = String(row.status).toLowerCase() === 'paid';
            if (row?.expires_at) oexp = String(row.expires_at).slice(0,10);
            if (row?.paid_at) opaid = String(row.paid_at);
            if (row?.created_at) ocreated = String(row.created_at);
          }
        }
      } catch (e) {}
    }

    // If paid order exists but expires_at is missing, allow access for safety (prevents paid users being kicked).
// We still apply a loose recency check to avoid accidental perpetual access if old data lacks expires_at.
const today_sub = new Date().toISOString().slice(0,10);

// Base validity from profile/orders expires_at (YYYY-MM-DD)
let ok = profileValid || ((!paused) && (
  (oexp && oexp >= today)
));

// Safety: if paid order exists but expires_at is missing, allow access for a limited recency window
if (!ok && hasPaid) {
  const base = (opaid || ocreated || '').slice(0,10);
  if (base) {
    const t0 = new Date(base + 'T00:00:00Z').getTime();
    const t1 = Date.now();
    const days = (t1 - t0) / 86400000;
    if (days >= 0 && days <= 400) ok = true;
  } else {
    ok = true;
  }
}
window.BW_SUB_OK = ok;
    window.BW_SUB_EXPIRES_AT = (pexp && pexp >= today) ? pexp : (oexp || null);
    window.BW_PROFILE_OK = !perr;

    if (!ok) {
      location.replace('/account/subscription.html');
      return;
    }
  } catch (e) {
    location.replace('/account/subscription.html?err=guard');
  }
})();

  const __talkJsonCache = new Map();

  async function fetchJsonAny(urls){
    let lastErr = null;
    for(const u of urls){
      try{
        const key = String(u || "");
        if(__talkJsonCache.has(key)) return __talkJsonCache.get(key);

        // 靜態 talk/index.json 與場景 JSON 不需要每次強制 no-cache；
        // 改回 default 讓瀏覽器/CDN 可正常快取，並加 8 秒 timeout，避免網路卡住整頁。
        const ctrl = ("AbortController" in window) ? new AbortController() : null;
        const timer = ctrl ? setTimeout(()=>{ try{ ctrl.abort(); }catch(_e){} }, 8000) : null;
        const res = await fetch(key, {
          cache:"default",
          signal: ctrl ? ctrl.signal : undefined
        });
        if(timer) clearTimeout(timer);
        if(!res.ok) throw new Error("HTTP "+res.status);

        const data = await res.json();
        __talkJsonCache.set(key, data);
        return data;
      }catch(e){
        lastErr = e;
        try{ console.warn('[Talk] fetch failed', u, e); }catch(_e){}
      }

  function ensureAnchorTs(){
    const uid = getUserId() || "anon";
    const k = LS_ANCHOR_BASE + uid;
    let ts = 0;
    try{ ts = Number(localStorage.getItem(k)||"0"); }catch(e){ ts = 0; }

    // If subscription expires_at exists, we can detect first-time after subscribe:
    // store a copy of expires_at; if user renews later, we keep anchor (do not reset).
    const expNow = (()=>{ try{ return (window.BW_SUB_EXPIRES_AT || localStorage.getItem("BW_SUB_EXPIRES_AT") || "").toString(); }catch(e){ return ""; }})();
    try{
      const expKey = LS_EXPIRES_BASE + uid;
      const expOld = localStorage.getItem(expKey) || "";
      if(expNow && !expOld) localStorage.setItem(expKey, expNow);
    }catch(_e){}

    if(!ts){
      ts = Date.now();
      try{ localStorage.setItem(k, String(ts)); }catch(e){}
    }
    return ts;
  }


  function computeUnlockedWeek(){
    const ts = ensureAnchorTs();
    const diff = Date.now() - ts;
    const weekMs = WEEK_DAYS * DAY;
    const passed = diff / weekMs; // 0.0, 1.0, 2.0...
    const base = Math.max(1, Math.min(MAX_WEEKS, Math.floor(passed + ADVANCE_WEEKS) + 1));

    // --- Level cap (front, synced with level-survey.html) ---
    // Priority:
    // 0) BW_LEVEL_WEEK_CAP = number (written by level-survey.html)
    // 1) BW_LEVEL_UNLOCKED_WEEK = number
    // 2) BW_LEVEL_WEEK_MAP + BW_LEVEL_RESULT
    // 3) BW_CEFR_LEVEL / BW_CEFR_RESULT
    let cap = null;
    try{
      const capDirect = Number(localStorage.getItem("BW_LEVEL_WEEK_CAP"));
      if(Number.isFinite(capDirect) && capDirect > 0) cap = Math.floor(capDirect);

      if(cap == null){
        const n = Number(localStorage.getItem("BW_LEVEL_UNLOCKED_WEEK"));
        if(Number.isFinite(n) && n > 0) cap = Math.floor(n);
      }

      if(cap == null){
        let map = null;
        try{
          const raw = localStorage.getItem("BW_LEVEL_WEEK_MAP");
          if(raw) map = JSON.parse(raw);
        }catch(_){}

        const r = (localStorage.getItem("BW_LEVEL_RESULT")||"").trim().toUpperCase();
        const def = {A:1, B:6, C:12};
        const wk = (map && map[r] != null) ? Number(map[r]) : def[r];
        if(Number.isFinite(wk) && wk > 0) cap = Math.floor(wk);
      }

      if(cap == null){
        const cefr = (localStorage.getItem("BW_CEFR_LEVEL") || localStorage.getItem("BW_CEFR_RESULT") || "").trim().toUpperCase();
        const cefrMap = {A0:1, A1:4, A2:8, B1:16, B2:32, C1:999, C2:999};
        const wk = Number(cefrMap[cefr]);
        if(Number.isFinite(wk) && wk > 0) cap = Math.min(MAX_WEEKS, Math.floor(wk));
      }
    }catch(_){}

    return (cap!=null) ? Math.max(base, Math.min(MAX_WEEKS, cap)) : base;
  }

function normalizeTurns(raw){
    // Accept these shapes:
    // 1) [ {en/zh/role/...} ]
    // 2) { turns:[...], dialogue:[...], lines:[...], items:[...] }
    // Prefer the first NON-EMPTY array in priority order, so we don't get trapped by turns:[] while dialogue:[...] exists.
    let arr = [];
    if(Array.isArray(raw)){
      arr = raw;
    }else if(raw && typeof raw === "object"){
      const pick = (k)=>{
        const v = raw[k];
        return Array.isArray(v) && v.length ? v : null;
      };
      arr = pick("turns") || pick("dialogue") || pick("lines") || pick("items") || [];
      // If arrays exist but empty, still allow the first existing one (to avoid throwing)
      if(!arr.length){
        const v1 = Array.isArray(raw.turns) ? raw.turns : null;
        const v2 = Array.isArray(raw.dialogue) ? raw.dialogue : null;
        const v3 = Array.isArray(raw.lines) ? raw.lines : null;
        const v4 = Array.isArray(raw.items) ? raw.items : null;
        arr = v1 || v2 || v3 || v4 || [];
      }
    }

    return (arr||[]).map(t=>{
      if(!t) return null;

      // support {role:'assistant'|'user', text:'...'}
      const text = (t.text ?? t.english ?? t.en ?? "").toString();
      const en = (t.en ?? t.english ?? t.text ?? '').toString().trim();
      const zh = (t.zh ?? t.tw ?? t.cn ?? t.chinese ?? '').toString().trim();
      const ja = (t.ja ?? t.jp ?? t.japanese ?? '').toString().trim();

      // role normalization for dialogue mode
      let roleRaw = ((t.role ?? t.speaker ?? '').toString().trim()) || "";
      let role = roleRaw;
      if(!role){
        // if hints exist, treat as USER (old shape)
        role = (!t.en && (t.hint_en || t.hint_zh)) ? "USER" : "AI";
      }else{
        const r = roleRaw.toLowerCase();
        if(r === "assistant" || r === "ai" || r === "bot" || r === "system") role = "AI";
        else if(r === "user" || r === "student" || r === "learner") role = "USER";
        else role = roleRaw; // keep
      }

      const level = (t.level ?? t.cefr ?? raw?.meta?.level ?? raw?.meta?.cefr ?? '').toString().trim() || 'A1';
      const hint = (t.hint ?? '').toString().trim();
      const fill = (t.fill ?? t.blank ?? '').toString();
      const answer = (t.answer ?? '').toString().trim();

      return { en, zh, ja, role, level, hint, fill, answer };
    }).filter(x=>x && x.en);
  }

// ===== ZH line + tiny JA speak button (minimal) =====
function extractJapanese(text){
  if(!text) return "";
  const s = String(text || "").trim();
  // 只有真的含平假名 / 片假名，才視為舊資料裡混入的日文。
  // 避免純中文被當成日文，造成中日文重複與混字。
  const m = s.match(/[\u3040-\u30ff][\u3040-\u30ff\u3400-\u9fff\u3000-\u303f\s]*/);
  return m ? m[0].trim() : "";
}
function cleanTalkZhDisplay(text){
  const raw = String(text || "").trim();
  if(!raw) return "";
  const jpPos = raw.search(/[\u3040-\u30ff]/);
  if(jpPos < 0) return raw;
  // 舊資料若 zh 內混成「中文 + 英文 + 日文」，
  // 手機前台先保留日文段前的中文，去掉尾端殘留英文。
  let zh = raw.slice(0, jpPos).trim();
  zh = zh.replace(/\s+[A-Za-z][A-Za-z0-9'’\s,.;:!?-]*$/g, "").trim();
  return zh || raw;
}
function speakJA(text){

}

    speak(s);

    try{
      if(!('speechSynthesis' in window)) return;

      u.lang = 'en-US';
      u.rate = 0.96;

}

  function synthUserFromAI(aiEn, sceneId){
    const s = (aiEn||"").trim();
    if(!s) return "—";
    const lower = s.toLowerCase();
    const isQ = /\?$/.test(s);
    // scene hint
    const sid = (sceneId||"").toLowerCase();
    const isDir = sid.includes("direction");
    const isAirport = sid.includes("airport");
    const isCoffee = sid.includes("coffee");
    // Deterministic templates (no randomness)
    if(isQ){
      if(isDir && (lower.includes("where") || lower.includes("how do i get"))){
        return "It's over there.";
      }
      if(isAirport && (lower.includes("passport") || lower.includes("boarding") || lower.includes("gate"))){
        return "Sure. Let me check that for you.";
      }
      if(isCoffee && (lower.includes("would you like") || lower.includes("what can i get"))){
        return "I'd like a coffee, please.";
      }
      if(lower.startsWith("can i") || lower.startsWith("could i") || lower.startsWith("may i")){
        return "Yes, please.";
      }
      return "Sure.";
    }
    // If AI is giving a model sentence, we let user shadow it (stable & predictable)
    return s;
  }

function makeCloze(expectedEn){
    const s = (expectedEn||"").trim();
    if(!s) return {cloze:"", answer:"", options:[]};
    // pick a target word: prefer numbers, then last content word
    const tokens = s.replace(/[?!.]/g,"").split(/\s+/).filter(Boolean);
    let target = "";
    // number?
    for(const tk of tokens){
      if(/\d/.test(tk)){ target = tk; break; }
    }
    if(!target){
      for(let i=tokens.length-1;i>=0;i--){
        const tk = tokens[i].replace(/[^A-Za-z0-9'-]/g,"");
        if(tk.length>=4 && !/^(this|that|with|have|your|what|where|when|could|would|please)$/i.test(tk)){
          target = tokens[i];
          break;
        }
      }
    }
    if(!target) target = tokens[Math.max(0, tokens.length-1)];

    // build cloze
    const esc = target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const cloze = s.replace(new RegExp('\\b'+esc+'\\b'), '____');

    // distractor pool (small + stable)
    const pool = ["gate","terminal","passport","boarding","information","coffee","small","large","help","today","tomorrow","please","thanks","baggage","counter","check-in"];
    const lower = target.toLowerCase();
    const opts = [target];
    for(const w of pool){
      if(opts.length>=3) break;
      if(w.toLowerCase()===lower) continue;
      // keep similar type: if target is number, add numbers
      if(/\d/.test(target)){
        if(/\d/.test(w)) opts.push(w);
      }else{
        if(!/\d/.test(w)) opts.push(w);
      }
    }
    // fallback for number
    if(/\d/.test(target) && opts.length<3){
      const n = parseInt(target.replace(/\D/g,""),10) || 12;
      while(opts.length<3){
        const cand = String(n + (opts.length===1?1:2));
        if(!opts.includes(cand)) opts.push(cand);
      }
    }
    return {cloze, answer: target, options: opts};
  }

function guessFillFromSentence(en){
    if(!en) return "";
    // Simple heuristic: blank the longest noun-ish token or last content word
    const s = String(en).trim();
    if(s.includes("____")) return s;
    const words = s.replace(/[“”"]/g,"").split(/\s+/).filter(Boolean);
    if(words.length<4) return s.replace(/\b(\w+)\b/, "____");
    // blank one token near the end
    const k = Math.max(1, words.length-2);
    const target = words[k].replace(/[.,!?;:]+$/,"");
    return s.replace(target, "____");
  }

  const TEACHER_AZURE_VOICE = {
    "Diana": "en-GB-LibbyNeural",

    "Sophia": "en-US-AriaNeural"
  };

  // 每位老師的語速/音高（更好分辨）
  const TEACHER_TTS_STYLE = {
    "Diana": { rate: "-2%", pitch: "+10%" },
    "Emma":  { rate: "+6%", pitch: "+2%" },
    "Sophia":{ rate: "0%",  pitch: "-6%" }

  let __ttsAudio = null;
  let __ttsBlobUrl = null;
  let __ttsRequestSeq = 0;
  let __ttsAbortCtrl = null;

async function speak(text){
    try{
      const now = Date.now();
      if (text && text === lastTts && (now - lastTtsAt) < 800) return; // 防止重複發聲
      lastTtsAt = now;
      lastTts = text;

      const mySeq = ++__ttsRequestSeq;

      // --- stop any previous / pending audio ---
      try{ if(__ttsAbortCtrl){ __ttsAbortCtrl.abort(); } }catch(e){}
      __ttsAbortCtrl = ("AbortController" in window) ? new AbortController() : null;
      try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){}
      try{ if(__ttsAudio){ __ttsAudio.pause(); __ttsAudio.currentTime = 0; } }catch(e){}
      try{ if(__ttsBlobUrl){ URL.revokeObjectURL(__ttsBlobUrl); } }catch(e){}
      __ttsAudio = null;
      __ttsBlobUrl = null;

      __tvStart();

      // ===== Azure TTS (Edge Function) =====
      if (USE_AZURE_TTS){
        const sel = document.getElementById("selTeacher");
        const raw = sel ? String(sel.value||"") : "";
        const key = raw.toLowerCase();
        const base = key.split('/').pop();
        const name = base.replace(/\.mp4$/,'');
        const cap = name ? (name.charAt(0).toUpperCase() + name.slice(1)) : raw;

        const voice = (TEACHER_AZURE_VOICE[raw] || TEACHER_AZURE_VOICE[cap] || TEACHER_AZURE_VOICE[base] || "en-US-AriaNeural");
        const st = (TEACHER_TTS_STYLE[raw] || TEACHER_TTS_STYLE[cap] || TEACHER_TTS_STYLE[base] || { rate: "0%", pitch: "0%" });

        const r = await fetch(AZURE_TTS_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": "Bearer " + SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ text, voice, rate: st.rate, pitch: st.pitch }),
          signal: __ttsAbortCtrl ? __ttsAbortCtrl.signal : undefined
        });

        // 若使用者已按麥克風或觸發下一個 speak，舊回應不得再播放。
        if(mySeq !== __ttsRequestSeq){
          __tvStop();
          return;
        }

        if(!r.ok){
          const t = await r.text().catch(()=> "");
          console.warn("[azure-tts] failed:", r.status, t.slice(0,200));
          throw new Error("azure-tts " + r.status);
        }

        const blob = await r.blob();
        if(mySeq !== __ttsRequestSeq){
          __tvStop();
          return;
        }
        __ttsBlobUrl = URL.createObjectURL(blob);
        __ttsAudio = new Audio(__ttsBlobUrl);

        __ttsAudio.onended = ()=>{
          __tvStop();
          try{ if(__ttsBlobUrl) URL.revokeObjectURL(__ttsBlobUrl); }catch(e){}
          __ttsAudio = null;
          __ttsBlobUrl = null;
        };
        __ttsAudio.onerror = ()=>{
          __tvStop();
        };

        if(mySeq !== __ttsRequestSeq){
          try{ __ttsAudio.pause(); }catch(e){}
          __tvStop();
          return;
        }
        await __ttsAudio.play();
        return;
      }

      // ===== Fallback: Browser Speech =====
      if(!("speechSynthesis" in window)){ __tvStop(); return; }
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 1.0;
      window.speechSynthesis.speak(u);
      u.onend = ()=>{ __tvStop(); };
      u.onerror = ()=>{ __tvStop(); };
    }catch(e){
      try{ __tvStop(); }catch(_){}
    }
  }

  function stopSpeak(){
    // 完整停止：Browser Speech、已播放 Audio、尚未回來的 Azure TTS fetch 全部取消。
    try{ __ttsRequestSeq++; }catch(e){}
    try{ if(__ttsAbortCtrl){ __ttsAbortCtrl.abort(); } }catch(e){}
    __ttsAbortCtrl = null;
    try{ window.speechSynthesis.cancel(); }catch(e){}

    try{ if(__ttsBlobUrl){ URL.revokeObjectURL(__ttsBlobUrl); } }catch(e){}
    __ttsAudio = null;
    __ttsBlobUrl = null;
    __tvStop();
  }

  // 初次進頁先把文字/場景載入；老師 MP4 延後到瀏覽器空檔再抓，減少首屏卡頓。
  const __deferTeacherLoad = ()=> setTeacher(initialTeacherFile);
  if("requestIdleCallback" in window){
    requestIdleCallback(__deferTeacherLoad, { timeout: 1200 });
  }else{
    setTimeout(__deferTeacherLoad, 240);
  }
    getOverrides();
    // Front: unlockedWeek 由「訂閱/時間」計算，再套用 level cap（若有）
    unlockedWeek = computeUnlockedWeek();
    const savedWeek = parseInt(localStorage.getItem(LS_WEEK)||"0",10) || 0;
    // 依已儲存週數或目前可解鎖週數啟動。
    // 舊版殘留 isAdmin 變數未定義，會讓 Talk init() 直接中斷、畫面卡在 Loading。
    activeWeek = Math.min(Math.max(savedWeek || unlockedWeek, 1), unlockedWeek);

    // 模式：對話(dialogue) / 跟讀(shadow)
    try{ talkMode = localStorage.getItem("talk_mode") || "dialogue"; }catch(_e){ talkMode = "dialogue"; }

    try{ localStorage.setItem("talk_active_week", String(activeWeek)); }catch(_e){}
    // load index.json
    try{
      indexData = await fetchJsonAny([INDEX_URL, ...FALLBACK_INDEX_URLS]);
      indexData = normalizeIndex(indexData);
    }catch(e){
      indexData = { scenes: [] };
      showToast("讀不到 talk/index.json");
    }

    buildWeekMap();

    // 先把 activeWeek 對到「有內容且已解鎖」的週，避免落在空週造成一直載入
    const availableWeeks = Array.from(byWeek.keys()).map(Number).filter(n => Number.isFinite(n)).sort((a,b)=>a-b);
    if(availableWeeks.length){
      const unlockedWeeks = availableWeeks.filter(w => w <= unlockedWeek);
      if(!unlockedWeeks.includes(activeWeek)){
        activeWeek = unlockedWeeks.length ? unlockedWeeks[unlockedWeeks.length - 1] : availableWeeks[0];
      }
    }

    // 情境選單改為「按下時才建 DOM」，避免進頁就把 648 支情境清單全部 render。
    pickerRendered = false;

    // pick scene
    const params = new URLSearchParams(location.search);
    const legacyScene = (params.get("scene")||"").trim(); // e.g. airport / coffee_shop / w02.variation.airport
    const forcedScene = null;
    let forcedByParam = false;

    let firstId = null, firstTitle = null;

    // scenes list from index.json
    const allScenes = Array.isArray(indexData?.scenes) ? indexData.scenes : [];

    function baseNameNoExt(p){
      if(!p) return "";
      const s = String(p).split("?")[0].split("#")[0];
      const file = s.split("/").pop() || s;
      return file.replace(/\.json$/i,"");
    }
    function resolveScene(param){
      if(!param) return null;
      const q = String(param).trim();

      // 1) exact id match
      let hit = allScenes.find(s => (s?.id||"") === q);
      if(hit) return hit;

      // 2) match file base name (w02.variation.airport) or last token (airport)
      const qBase = q.replace(/\.json$/i,"");
      const qTail = qBase.split(".").pop();

      const candidates = [];
      for(const s of allScenes){
        const id = String(s?.id||"");
        const fileBase = baseNameNoExt(s?.file||s?.url||""); // support either field
        const idTail = id.split(".").pop();
        if(!id) continue;

        if(fileBase && fileBase === qBase) candidates.push(s);
        else if(fileBase && fileBase.endsWith("." + qBase)) candidates.push(s);
        else if(id === qBase) candidates.push(s);
        else if(id.endsWith("." + qBase)) candidates.push(s);
        else if(qTail && (idTail === qTail || fileBase.endsWith("." + qTail) || id.endsWith("." + qTail))) candidates.push(s);
      }
      if(candidates.length === 0) return null;

      // prefer same week as activeWeek
      const aw = Number(activeWeek||0);
      let best = null;
      let bestScore = -1;
      for(const s of candidates){
        const w = Number(s?.week||0);
        const tr = String(s?.track||"");
        const score =
          (w === aw ? 1000 : 0) +
          (w ? (100 - Math.abs(w - aw)) : 0) +
          (tr==="core" ? 3 : tr==="variation" ? 2 : tr==="challenge" ? 1 : 0);
        if(score > bestScore){ bestScore = score; best = s; }
      }
      return best || candidates[0];
    }

    if(legacyScene){
      const mapped = resolveScene(legacyScene);
      if(!mapped){
        // 如果你指定了 ?scene=xxx 但找不到，就不要偷偷跳到別的場景（避免誤判 JSON 錯）
        turns = [{en:`Scene not found: ${legacyScene}`, zh:`找不到場景：${legacyScene}。請確認 talk/index.json 的 id 是否存在。`}];
        renderTurns();
        showToast(`找不到場景：${legacyScene}`);
        return;
      }
      if(mapped){
        forcedByParam = true;

        firstId = mapped.id;
        firstTitle = mapped.title || mapped.id;
        // force week to match the resolved scene (so top bar shows correct W#)
        if(mapped.week){
          if(Number(mapped.week) <= Number(unlockedWeek)) activeWeek = Number(mapped.week)||activeWeek;
          try{ localStorage.setItem("talk_active_week", String(activeWeek)); }catch(_e){}
          try{ localStorage.setItem(LS_LAST_SCENE, mapped.id); }catch(_e){}
        }
      }else{
        // 如果找不到就不要硬跳到第一個（避免顯示錯情境）
        turns = [{en:"Scene not found: "+legacyScene, zh:"找不到此情境（請確認 URL 參數或 index.json 是否包含）", level:"A1"}];
        updateUI();
        return;
      }
    }else if(forcedScene){
      const mapped = resolveScene(forcedScene);
      if(mapped){
        firstId = mapped.id;
        firstTitle = mapped.title || mapped.id;
        // force week to match the resolved scene (so top bar shows correct W#)
        if(mapped.week){
          if(Number(mapped.week) <= Number(unlockedWeek)) activeWeek = Number(mapped.week)||activeWeek;
          try{ localStorage.setItem("talk_active_week", String(activeWeek)); }catch(_e){}
        }
      }else{
        firstId = forcedScene;
        firstTitle = forcedScene;
      }
    }else{
      // default: pick first in current active week; else nearest available unlocked week; else first in index
      let pick = allScenes.find(s => Number(s?.week||0) === Number(activeWeek||0));
      if(!pick){
        const unlockedScenes = allScenes.filter(s => Number(s?.week||0) > 0 && Number(s?.week||0) <= Number(unlockedWeek||0));
        pick = unlockedScenes[0] || allScenes[0] || null;
      }
      if(pick){
        firstId = pick.id; firstTitle = pick.title || pick.id;
      }
    }

    // --- resolved ---
if(!firstId){
      turns = [{en:"No scenes in index.json", zh:"請先把 w01..w08 的 JSON 與 talk/index.json 放在 /talk/ 目錄", level:"A1"}];
      updateUI();
      return;
    }
    await loadSceneById(firstId, firstTitle);
  }

  // -------- events --------
  btnPick.addEventListener("click", ()=>{
    if(!pickerRendered) renderPicker();
    openModal();
  });
  btnClose.addEventListener("click", closeModal);
  mask.addEventListener("click", (e)=>{ if(e.target===mask) closeModal(); });

  const btnSpeakLineEn = $("btnSpeakLineEn");
  const btnSpeakFillEn = $("btnSpeakFillEn");
  if(btnSpeakLineEn){
    btnSpeakLineEn.addEventListener("click", ()=>{
      const t = currentTurn();
      const aiText = (document.getElementById("lineEnInline")?.textContent || t.en || "").trim();
      if(aiText) speakENQuick(aiText);
    });
  }
  if(btnSpeakFillEn){
    btnSpeakFillEn.addEventListener("click", ()=>{
      const raw = (fillEn?.textContent || "").trim();
      const expected = (currentExpectedEn() || raw || "").trim();
      // 若畫面是挖空句，優先朗讀完整建議句，學習比較有用。
      if(expected) speakENQuick(expected);
    });
  }

  btnSkip.addEventListener("click", ()=>nextTurn());

  btnHint.addEventListener("click", ()=>{
    if(talkMode === "dialogue"){
      const expected = (currentExpectedEn() || "").trim();
      if(!expected){ showToast("本句沒有建議回覆"); return; }
      // temporarily reveal the full expected sentence
      fillEn.textContent = expected;
      // speak the full expected sentence
      speak(expected);
      showToast("已顯示提示（完整句）");
      // auto revert to cloze after 3 seconds
      clearTimeout(window.__bwHintTimer);
      window.__bwHintTimer = setTimeout(()=>{
        const cl = makeCloze(expected);
        fillEn.textContent = cl.cloze || expected;
        renderFillOptions(cl);
      }, 3000);
      return;
    }
    const t = currentTurn();
    showToast(t.hint && t.hint.trim() ? t.hint : "提示：先跟著唸一遍，再改成你自己的說法。");
  });

  btnSave.addEventListener("click", saveLine);

  btnFill.addEventListener("click", ()=>{
    fillCard.scrollIntoView({behavior:"smooth", block:"start"});
    BW_focusInputDesktopOnly();
  });

  btnHideFill.addEventListener("click", ()=>{
    const hidden = fillCard.style.display === "none";
    fillCard.style.display = hidden ? "" : "none";
  });

  btnFillReset.addEventListener("click", ()=>{
    fillInput.value = "";
    // 手機按「重來」只清空，不叫出鍵盤，避免畫面被鍵盤吃掉。
    BW_focusInputDesktopOnly();
  });

  function BW_submitReplyNow(said, opts){
    const options = opts || {};
    const text = String(said || "").trim();
    if(!text){ showToast("請先輸入你的回覆"); return false; }

    if(talkMode === "dialogue"){
      // 手機語音辨識自動送出時，絕不再依賴 btn.click()。
      // 直接清欄位、直接進下一句，避免部分手機瀏覽器程式 click 失效或延遲。
      fillInput.value = "";
      showToast(options.toast || "已送出 ✅");

      // 對話模式直接推進下一句，不回放使用者答案。
      // 先前「下一句 AI」與「使用者答案回放」會互相搶音、重疊。
      nextTurn();
      return true;
    }

    // non-dialogue (fill practice)
    try{ speak(text); }catch(e){}
    showToast(options.toast || "做得好 ✅");
    return true;
  }

  btnSendFill.addEventListener("click", ()=>{
    const said = (fillInput.value || "").trim();
    if(talkMode === "dialogue"){
      BW_submitReplyNow(said, { echoUser:false, toast:"已送出 ✅" });
      return;
    }
    if(!said){ showToast("請先填空"); return; }
    BW_submitReplyNow(said, { echoUser:true, toast:"做得好 ✅" });
  });


  btnType.addEventListener("click", ()=>{
    if(talkMode === "dialogue"){
      // default show suggested reply (next USER turn)
      let aiIdx = turnIdx;
      while(aiIdx < turns.length && turns[aiIdx]?.role === "USER") aiIdx++;
      const user = (turns[aiIdx+1] && turns[aiIdx+1].role==="USER") ? turns[aiIdx+1] : null;
      const ans = prompt("輸入你的回覆（會用 TTS 朗讀）", user?.en || "");
      if(ans && ans.trim()){
        fillInput.value = ans.trim();
      }
      return;
    }
    const t = currentTurn();
    const ans = prompt("輸入你的句子（會用 TTS 朗讀）", t.en || "");
    if(ans && ans.trim()){
      speak(ans.trim());
    }
  });


  btnBack.addEventListener("click", ()=>{
    history.length>1 ? history.back() : (location.href = "./");
  });

  // Speech recognition — 改回 Player Talk 型穩定流程 + 50% 自動過關
  // Player Talk 的穩定點：
  // - interimResults=true
  // - continuous=false
  // - maxAlternatives=1
  // - 用 e.resultIndex + finalTranscript，不把歷次 partial 一直重疊累加
  const btnMicStop = $("btnMicStop");
  let recognition = null;
  let talkVoiceAutoAdvancing = false;
  let talkVoiceFinalTranscript = "";
  let talkVoiceLastTranscript = "";

  function getTalkSR(){
    return window.SpeechRecognition || window.webkitSpeechRecognition || null;
  }

  function resetTalkRecUI(){
    try{ btnMic.disabled = false; }catch(_e){}
    try{ btnMicStop.disabled = true; }catch(_e){}
    try{ btnMic.classList.remove("isRecording"); }catch(_e){}
    try{ $("dotLive").style.background = "#22c55e"; }catch(_e){}
  }

  function normalizeTalkSpeechText(s){
    return String(s || "")
      .toLowerCase()
      .replace(/[’‘]/g, "'")
      .replace(/\b(i'm)\b/g, "i am")
      .replace(/\b(don't)\b/g, "do not")
      .replace(/\b(can't)\b/g, "cannot")
      .replace(/\b(won't)\b/g, "will not")
      .replace(/\b(it's)\b/g, "it is")
      .replace(/\b(that's)\b/g, "that is")
      .replace(/\b(what's)\b/g, "what is")
      .replace(/\b(we're)\b/g, "we are")
      .replace(/\b(you're)\b/g, "you are")
      .replace(/[^a-z0-9\s']/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function talkSpeechTokens(s){
    const txt = normalizeTalkSpeechText(s);
    return txt ? txt.split(" ").filter(Boolean) : [];
  }

  function talkSpeechSimilarity(spoken, expected){
    const a = talkSpeechTokens(spoken);
    const b = talkSpeechTokens(expected);
    if(!a.length || !b.length) return 0;

    const pool = a.slice();
    let hit = 0;
    for(const w of b){
      const idx = pool.indexOf(w);
      if(idx >= 0){
        hit++;
        pool.splice(idx, 1);
      }
    }
    // F1-like：句子短時比單純 hit/target 更穩，不會一個字就誤過關。
    return Math.max(0, Math.min(1, (2 * hit) / (a.length + b.length)));
  }

  function talkVoiceExpectedReply(){
    return (typeof currentExpectedEn === "function" ? currentExpectedEn() : "") || "";
  }

  function talkVoiceAdvanceIfScoreOK(spoken, score){
    if(talkVoiceAutoAdvancing) return false;
    const said = String(spoken || "").trim();
    if(!said) return false;
    const pct = Math.round((Number(score) || 0) * 100);
    if((Number(score) || 0) < 0.50) return false;

    talkVoiceAutoAdvancing = true;
    fillInput.value = said;

    try{
      if(recognition){
        recognition.onresult = null;
        recognition.onerror = null;
        recognition.onend = null;
        recognition.stop();
      }
    }catch(_e){}

    resetTalkRecUI();

    // 等麥克風真正釋放，再播下一句 AI，避免收音/TTS 搶音。
    setTimeout(()=>{
      try{
        BW_submitReplyNow(said, {
          echoUser:false,
          toast:`正確度 ${pct}% ✅ 自動下一句`
        });
      }catch(_e){
        showToast(`正確度 ${pct}% ✅，請按送出`);
      }finally{
        talkVoiceAutoAdvancing = false;
      }
    }, 520);

    return true;
  }

  function talkVoiceHandleTranscript(transcript, hasFinal){
    const said = String(transcript || "").trim();
    if(!said || talkVoiceAutoAdvancing) return;

    talkVoiceLastTranscript = said;
    fillInput.value = said;

    const expected = String(talkVoiceExpectedReply() || "").trim();
    const score = expected ? talkSpeechSimilarity(said, expected) : 0;

    // 2026-05-16：改成 Player AI 語音的「即時互動」感。
    // 不再硬等 final / onend；只要即時辨識已達 50%，就直接進下一句。
    // final 仍保留作保險，避免部分瀏覽器 interim 更新很慢。
    if(score >= 0.50 || hasFinal){
      talkVoiceAdvanceIfScoreOK(said, score);
    }
  }

  btnMic.addEventListener("click", ()=>{
    const SR = getTalkSR();
    if(!SR){
      showToast("此瀏覽器暫不支援語音辨識，請直接輸入");
      BW_focusInputDesktopOnly();
      return;
    }

    // 開麥克風前，完整停止 Emma / Azure TTS；連尚未返回的 TTS fetch 一併取消。
    stopSpeak();

    talkVoiceAutoAdvancing = false;
    talkVoiceFinalTranscript = "";
    talkVoiceLastTranscript = "";

    try{
      if(recognition){
        recognition.onend = null;
        recognition.onerror = null;
        recognition.abort && recognition.abort();
      }
    }catch(_e){}
    recognition = null;

    // 稍等音訊釋放，再開手機麥克風，避免 TTS 尾音被辨識進去。
    setTimeout(()=>{
      recognition = new SR();
      recognition.lang = "en-US";
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.maxAlternatives = 1;

      fillInput.value = "";
      btnMic.disabled = true;
      btnMicStop.disabled = false;
      try{ btnMic.classList.add("isRecording"); }catch(_e){}
      try{ $("dotLive").style.background = "#ef4444"; }catch(_e){}
      showToast("正在聽；答對 50% 會自動下一句");

      recognition.onresult = (e)=>{
        let interim = "";
        let hasFinal = false;

        for(let i = e.resultIndex; i < e.results.length; i++){
          const seg = String(e.results[i]?.[0]?.transcript || "").trim();
          if(!seg) continue;
          if(e.results[i].isFinal){
            talkVoiceFinalTranscript += seg + " ";
            hasFinal = true;
          }else{
            interim += seg + " ";
          }
        }

        const transcript = (talkVoiceFinalTranscript || interim).trim();
        talkVoiceHandleTranscript(transcript, hasFinal);
      };

      recognition.onerror = ()=>{
        if(talkVoiceAutoAdvancing) return;
        resetTalkRecUI();
        const said = String(talkVoiceLastTranscript || fillInput.value || "").trim();
        const expected = String(talkVoiceExpectedReply() || "").trim();
        const score = expected ? talkSpeechSimilarity(said, expected) : 0;
        const pct = Math.round(score * 100);
        if(!talkVoiceAdvanceIfScoreOK(said, score)){
          showToast(said ? `正確度 ${pct}%｜可再說或直接送出` : "沒有聽清楚，可再按 🎤");
        }
      };

      recognition.onend = ()=>{
        if(talkVoiceAutoAdvancing) return;
        resetTalkRecUI();
        const said = String(talkVoiceFinalTranscript || talkVoiceLastTranscript || fillInput.value || "").trim();
        const expected = String(talkVoiceExpectedReply() || "").trim();
        const score = expected ? talkSpeechSimilarity(said, expected) : 0;
        const pct = Math.round(score * 100);

        if(!talkVoiceAdvanceIfScoreOK(said, score)){
          showToast(said ? `正確度 ${pct}%｜未達 50%，可重說或直接送出` : "沒有收到聲音，請再按 🎤");
        }
      };

      try{
        recognition.start();
      }catch(_e){
        resetTalkRecUI();
        showToast("語音辨識無法啟動，請再試一次或直接輸入");
        BW_focusInputDesktopOnly();
      }
    }, 260);
  });

  if(btnMicStop){
    btnMicStop.addEventListener("click", ()=>{
      try{
        if(recognition) recognition.stop();
      }catch(_e){}
      // onend 會接手比對與是否自動下一句
    });
  }

  // Avoid iOS rubber band scroll / keep stable
  document.addEventListener("touchmove", (e)=>{
    // allow scrolling only inside modal body
    const inModal = e.target && (e.target.closest && e.target.closest("#modalBody"));
    if(mask.style.display==="flex" && inModal) return;
    // otherwise prevent overscroll
  }, {passive:true});

  init();
})();</script>

<script>
function bwSaveTalkDailyScore(){
  try{
    const d = new Date();
    const key = d.toISOString().slice(0,10); // UTC key
    const twKey = d.toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' }); // Taiwan key
    const score = (function(){
      const el = document.getElementById('rComplete');
      const v = el ? Number(String(el.textContent||'').trim()) : NaN;
      return Number.isFinite(v) ? Math.max(0, Math.min(100, Math.round(v))) : 65;
    })();
    const active = (function(){
      const el = document.getElementById('rActive');
      if(!el) return null;
      const t = String(el.textContent||'').replace('%','').trim();
      const v = Number(t);
      return Number.isFinite(v) ? Math.max(0, Math.min(100, Math.round(v))) : null;
    })();
    const pron = (function(){
      const el = document.getElementById('rPron');
      if(!el) return null;
      const t = String(el.textContent||'').replace('%','').trim();
      const v = Number(t);
      return Number.isFinite(v) ? Math.max(0, Math.min(100, Math.round(v))) : null;
    })();
    const words = (function(){
      const el = document.getElementById('rWords');
      if(!el) return null;
      const v = Number(String(el.textContent||'').trim());
      return Number.isFinite(v) ? Math.max(0, Math.min(9999, Math.round(v))) : null;
    })();

    let obj = {};
    const raw = localStorage.getItem('bwTalkScores');
    if(raw){ try{ obj = JSON.parse(raw)||{}; }catch(e){ obj = {}; } }
    obj[key] = { score, active, pron, words, updated_at: new Date().toISOString() };
    if (twKey && twKey !== key) obj[twKey] = obj[key];
    localStorage.setItem('bwTalkScores', JSON.stringify(obj));
  }catch(e){}
}
</script>

<script id="bw-level-unlock-override">
(function(){
  function getOverrideWeek(){
    try{
      const capDirect = Number(localStorage.getItem("BW_LEVEL_WEEK_CAP"));
      if(Number.isFinite(capDirect) && capDirect > 0) return Math.floor(capDirect);

      const n = Number(localStorage.getItem("BW_LEVEL_UNLOCKED_WEEK"));
      if(Number.isFinite(n) && n > 0) return Math.floor(n);

      let map = null;
      try{
        const raw = localStorage.getItem("BW_LEVEL_WEEK_MAP");
        if(raw) map = JSON.parse(raw);
      }catch(_){}

      const r = (localStorage.getItem("BW_LEVEL_RESULT")||"").trim().toUpperCase();
      const def = {A:1, B:6, C:12};
      const week = (map && map[r] != null) ? Number(map[r]) : def[r];
      if(Number.isFinite(week) && week > 0) return Math.floor(week);

      const cefr = (localStorage.getItem("BW_CEFR_LEVEL") || localStorage.getItem("BW_CEFR_RESULT") || "").trim().toUpperCase();
      const cefrMap = {A0:1, A1:4, A2:8, B1:16, B2:32, C1:999, C2:999};
      const cefrWeek = Number(cefrMap[cefr]);
      if(Number.isFinite(cefrWeek) && cefrWeek > 0) return Math.floor(cefrWeek);
    }catch(_){}
    return null;
  }

  const old = window.computeUnlockedWeek;
  if(typeof old !== "function") return;

  window.computeUnlockedWeek = function(){
    const baseWeek = old.apply(this, arguments);
    const ov = getOverrideWeek();
    return (ov!=null) ? Math.max(baseWeek, ov) : baseWeek;
  };
})();
</script>
