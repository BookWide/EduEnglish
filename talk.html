<script>
/* ===== BookWide Talk Guard ===== */
const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";
window.SUPABASE_URL = SUPABASE_URL;
window.SUPABASE_ANON_KEY = SUPABASE_ANON_KEY;

(async function guardTalk(){
  try{
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
    });

    const { data: sess } = await client.auth.getSession();
    const session = sess && sess.session;
    if(!session || !session.user){
      const next = encodeURIComponent(location.pathname + location.search + location.hash);
      location.replace("/login.html?next=" + next);
      return;
    }

    const user = session.user;
    window.BW_USER_ID = user.id || "";
    const email = String(user.email || "").toLowerCase();
    const today = new Date().toLocaleDateString("en-CA", { timeZone:"Asia/Taipei" });

    const { data: prof, error: profErr } = await client
      .from("profiles")
      .select("id, expires_at, is_paused")
      .eq("id", user.id)
      .maybeSingle();

    const paused = !!(prof && prof.is_paused);
    const pexp = prof && prof.expires_at ? String(prof.expires_at).slice(0,10) : "";
    const profileValid = !paused && !!(pexp && pexp >= today);

    let orderValid = false;
    let orderExp = "";
    let orderPaid = false;
    let orderPaidAt = "";
    let orderCreatedAt = "";

    if(!profileValid){
      const tryRows = async (field, value) => {
        const r = await client
          .from("orders")
          .select("status, expires_at, paid_at, created_at")
          .eq(field, value)
          .order("created_at", { ascending:false })
          .limit(1);
        return (!r.error && r.data && r.data[0]) ? r.data[0] : null;
      };

      let row = await tryRows("user_id", user.id);
      if(!row && email) row = await tryRows("email", email);

      if(row){
        orderPaid = String(row.status || "").toLowerCase() === "paid";
        orderExp = row.expires_at ? String(row.expires_at).slice(0,10) : "";
        orderPaidAt = row.paid_at ? String(row.paid_at) : "";
        orderCreatedAt = row.created_at ? String(row.created_at) : "";
        orderValid = !paused && !!(orderExp && orderExp >= today);
      }

      if(!orderValid && orderPaid){
        const base = String(orderPaidAt || orderCreatedAt || "").slice(0,10);
        if(base){
          const t0 = new Date(base + "T00:00:00Z").getTime();
          const days = (Date.now() - t0) / 86400000;
          if(days >= 0 && days <= 400) orderValid = true;
        }else{
          orderValid = true;
        }
      }
    }

    const ok = profileValid || orderValid;
    window.BW_SUB_OK = ok;
    window.BW_SUB_EXPIRES_AT = profileValid ? pexp : (orderExp || null);
    window.BW_PROFILE_OK = !profErr;

    if(!ok){
      location.replace("/account/subscription.html");
    }
  }catch(err){
    location.replace("/account/subscription.html?err=guard");
  }
})();
</script>

<script>
(() => {
  "use strict";

  const $ = (id) => document.getElementById(id);
  const els = {
    btnBack: $("btnBack"),
    btnScene: $("btnScene"),
    weekLabel: $("weekLabel"),
    sceneLabel: $("sceneLabel"),
    teacherVideo: $("teacherVideo"),
    aiEn: $("aiEn"),
    aiZh: $("aiZh"),
    sceneMeta: $("sceneMeta"),
    btnReplayAi: $("btnReplayAi"),
    btnMic: $("btnMic"),
    btnStop: $("btnStop"),
    btnSkip: $("btnSkip"),
    btnType: $("btnType"),
    btnHint: $("btnHint"),
    btnFill: $("btnFill"),
    btnSave: $("btnSave"),
    levelBadge: $("levelBadge"),
    promptEn: $("promptEn"),
    promptZh: $("promptZh"),
    hintText: $("hintText"),
    replyInput: $("replyInput"),
    btnSubmit: $("btnSubmit"),
    statusLine: $("statusLine"),
    fillOptions: $("fillOptions"),
    toast: $("toast"),
    pickerMask: $("pickerMask"),
    btnClosePicker: $("btnClosePicker"),
    pickerBody: $("pickerBody"),
  };

  const INDEX_URLS = ["/talk/index.json", "../talk/index.json", "./../talk/index.json"];
  const TEACHER_VIDEO_URL = "https://jeajrwpmrgczimmrflxo.supabase.co/storage/v1/object/public/talk/teacher/Emma.mp4";
  const AZURE_TTS_ENDPOINT = `${SUPABASE_URL}/functions/v1/azure-tts`;
  const USE_AZURE_TTS = true;
  const EMMA_VOICE = "en-AU-NatashaNeural";
  const EMMA_RATE = "+6%";
  const EMMA_PITCH = "+2%";
  const PASS_SCORE = 0.50;
  const WEEK_DAYS = 7;
  const ADVANCE_WEEKS = 0.5;
  const MAX_WEEKS = 999;

  const state = {
    index: [],
    scenesByWeek: new Map(),
    unlockedWeek: 1,
    activeWeek: 1,
    activeScene: null,
    activeSceneId: "",
    turns: [],
    aiIndex: 0,
    hintOn: false,
    fillOn: false,
    saved: new Set(),
    recognition: null,
    recording: false,
    manualStop: false,
    finalTranscript: "",
    liveTranscript: "",
    ttsSeq: 0,
    ttsAudio: null,
    ttsBlobUrl: null,
    ttsAbort: null,
    lastSpokenText: "",
    lastSpokenAt: 0,
  };

  function toast(msg){
    els.toast.textContent = msg;
    els.toast.style.display = "block";
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => els.toast.style.display = "none", 1800);
  }

  function escText(v){
    return String(v == null ? "" : v);
  }

  function cleanText(v){
    return String(v == null ? "" : v).trim();
  }

  function normalizeForScore(text){
    return cleanText(text)
      .toLowerCase()
      .replace(/[’‘]/g, "'")
      .replace(/[^a-z0-9' ]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function tokens(text){
    const s = normalizeForScore(text);
    return s ? s.split(" ").filter(Boolean) : [];
  }

  function similarity(spoken, expected){
    const a = tokens(spoken);
    const b = tokens(expected);
    if(!a.length || !b.length) return 0;

    const pool = a.slice();
    let hit = 0;
    for(const word of b){
      const idx = pool.indexOf(word);
      if(idx >= 0){
        hit += 1;
        pool.splice(idx, 1);
      }
    }
    return Math.max(0, Math.min(1, (2 * hit) / (a.length + b.length)));
  }

  function setStatus(msg, kind=""){
    els.statusLine.className = "status" + (kind ? " " + kind : "");
    els.statusLine.textContent = msg || "";
  }

  async function fetchJsonAny(urls){
    let lastErr = null;
    for(const url of urls){
      try{
        const ctrl = "AbortController" in window ? new AbortController() : null;
        const timer = ctrl ? setTimeout(() => ctrl.abort(), 8000) : null;
        const res = await fetch(url, {
          cache:"default",
          signal: ctrl ? ctrl.signal : undefined
        });
        if(timer) clearTimeout(timer);
        if(!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      }catch(err){
        lastErr = err;
        console.warn("[Talk clean] fetch failed:", url, err);
      }
    }
    throw lastErr || new Error("fetch failed");
  }

  function weekNumber(raw, id=""){
    const m1 = String(raw || "").match(/(\d{1,3})/);
    if(m1) return Number(m1[1]) || 1;
    const m2 = String(id || "").match(/^w(\d{1,3})\./i);
    if(m2) return Number(m2[1]) || 1;
    return 1;
  }

  function normalizeIndex(raw){
    if(raw && Array.isArray(raw.scenes)){
      return raw.scenes.map(normalizeScene).filter(Boolean);
    }

    if(raw && Array.isArray(raw.weeks)){
      const out = [];
      for(const w of raw.weeks){
        const week = weekNumber(w.week);
        const items = Array.isArray(w.items) ? w.items : [];
        for(const item of items){
          out.push(normalizeScene({
            ...item,
            week,
            file: item.file || item.filename
          }));
        }
      }
      return out.filter(Boolean);
    }

    if(raw && Array.isArray(raw.items)){
      return raw.items.map(normalizeScene).filter(Boolean);
    }

    if(Array.isArray(raw)){
      return raw.map(normalizeScene).filter(Boolean);
    }

    return [];
  }

  function normalizeScene(s){
    if(!s) return null;
    const id = cleanText(s.id || s.scene_id || s.key || "");
    if(!id) return null;
    const week = weekNumber(s.week, id);
    const title = cleanText(s.title_zh || s.title || s.name || s.scene || id);
    let file = cleanText(s.file || s.url || s.filename || "");
    if(!file) file = "/talk/" + id + ".json";
    else if(!file.startsWith("/") && !/^https?:\/\//i.test(file)) file = "/talk/" + file;
    return {
      id,
      title,
      week,
      level: cleanText(s.level || s.lev || ""),
      file
    };
  }

  function normalizeTurns(raw){
    let arr = [];
    if(Array.isArray(raw)){
      arr = raw;
    }else if(raw && typeof raw === "object"){
      arr = (Array.isArray(raw.turns) && raw.turns.length ? raw.turns : null)
        || (Array.isArray(raw.dialogue) && raw.dialogue.length ? raw.dialogue : null)
        || (Array.isArray(raw.lines) && raw.lines.length ? raw.lines : null)
        || (Array.isArray(raw.items) && raw.items.length ? raw.items : null)
        || raw.turns || raw.dialogue || raw.lines || raw.items || [];
    }

    return (Array.isArray(arr) ? arr : []).map((t) => {
      if(!t) return null;
      const en = cleanText(t.en ?? t.english ?? t.text ?? "");
      if(!en) return null;

      const zh = cleanText(t.zh ?? t.tw ?? t.cn ?? t.chinese ?? "");
      const ja = cleanText(t.ja ?? t.jp ?? t.japanese ?? "");
      let role = cleanText(t.role ?? t.speaker ?? "");
      if(!role){
        role = (!t.en && (t.hint_en || t.hint_zh)) ? "USER" : "AI";
      }else{
        const r = role.toLowerCase();
        if(["assistant","ai","bot","system","emma"].includes(r)) role = "AI";
        else if(["user","student","learner"].includes(r)) role = "USER";
        else role = role.toUpperCase() === "USER" ? "USER" : "AI";
      }

      return {
        en,
        zh,
        ja,
        role,
        level: cleanText(t.level ?? t.cefr ?? raw?.meta?.level ?? raw?.meta?.cefr ?? "A1") || "A1",
        hint: cleanText(t.hint ?? t.hint_en ?? ""),
      };
    }).filter(Boolean);
  }

  function getUserKey(){
    return cleanText(window.BW_USER_ID || "anon");
  }

  function computeUnlockedWeek(){
    const key = "BW_TALK_ANCHOR_TS_" + getUserKey();
    let start = Number(localStorage.getItem(key) || "0");
    if(!start){
      start = Date.now();
      try{ localStorage.setItem(key, String(start)); }catch(_){}
    }
    const weeksPassed = (Date.now() - start) / (WEEK_DAYS * 86400000);
    const timeWeek = Math.max(1, Math.min(MAX_WEEKS, Math.floor(weeksPassed + ADVANCE_WEEKS) + 1));

    let levelCap = 0;
    try{
      levelCap = Number(localStorage.getItem("BW_LEVEL_WEEK_CAP") || localStorage.getItem("BW_LEVEL_UNLOCKED_WEEK") || "0");
    }catch(_){}
    return Math.max(timeWeek, Number.isFinite(levelCap) && levelCap > 0 ? Math.floor(levelCap) : 1);
  }

  function groupScenes(){
    state.scenesByWeek.clear();
    for(const scene of state.index){
      const list = state.scenesByWeek.get(scene.week) || [];
      list.push(scene);
      state.scenesByWeek.set(scene.week, list);
    }
  }

    els.pickerMask.style.display = "flex";
    els.pickerMask.setAttribute("aria-hidden","false");

  function closePicker(){

  function renderPicker(){
    const weeks = [...state.scenesByWeek.keys()].sort((a,b) => a - b);
    els.pickerBody.innerHTML = "";
    if(!weeks.length){
      els.pickerBody.textContent = "找不到 Talk 情境";

      wrap.appendChild(head);

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;");
  }

  async function loadScene(scene){
    stopRecognition(false);
    stopSpeak();
    setStatus("讀取情境中…", "wait");

    try{
      const raw = await fetchJsonAny([scene.file]);
      const turns = normalizeTurns(raw);
      if(!turns.length) throw new Error("No turns");

      state.activeScene = scene;
      state.activeSceneId = scene.id;
      state.activeWeek = scene.week;
      state.turns = turns;
      state.aiIndex = firstAiIndex(0);

      try{
        localStorage.setItem("talk_active_week", String(scene.week));
        localStorage.setItem("BW_TALK_LAST_SCENE", scene.id);
      }catch(_){}

      renderCurrent();
      speakCurrentAi();
      setStatus("", "");
    }catch(err){
      console.error("[Talk clean] load scene error", err);
      setStatus("情境 JSON 讀取失敗", "bad");
      toast("讀不到 Talk 情境");
    }
  }

  function firstAiIndex(from){
    for(let i=Math.max(0,from); i<state.turns.length; i++){
      if(state.turns[i] && state.turns[i].role !== "USER") return i;
    }
    return -1;
  }

  function currentAi(){
    return state.aiIndex >= 0 ? state.turns[state.aiIndex] : null;
  }

  function currentUserReply(){
    for(let i=state.aiIndex + 1; i<state.turns.length; i++){
      const t = state.turns[i];
      if(!t) continue;
      if(t.role !== "USER") break;
      return t;
    }
    return null;
  }

  function expectedReply(){
    return cleanText(currentUserReply()?.en || "");
  }

  function renderCurrent(){
    const ai = currentAi();
    const user = currentUserReply();
    const scene = state.activeScene;

    if(!ai){
      els.aiEn.textContent = "本情境完成 ✅";
      els.aiZh.textContent = "";
      els.sceneMeta.textContent = scene ? `W${scene.week} · ${scene.title}` : "";
      els.promptEn.textContent = "可選擇下一個情境";
      els.promptZh.textContent = "";
      els.levelBadge.textContent = "DONE";
      els.replyInput.value = "";
      els.fillOptions.innerHTML = "";
      return;
    }

    els.weekLabel.textContent = "W" + (scene?.week || 1);
    els.sceneLabel.textContent = scene?.title || "選擇情境";
    els.sceneMeta.textContent = `W${scene?.week || 1} · ${scene?.title || scene?.id || ""}`;
    els.aiEn.textContent = ai.en || "—";
    els.aiZh.textContent = ai.zh || ai.ja || "";
    els.levelBadge.textContent = ai.level || user?.level || "A1";

    els.replyInput.value = "";
    els.statusLine.textContent = "";
    renderPrompt();
  }

  function renderPrompt(){
    const user = currentUserReply();
    const expected = expectedReply();

    if(!expected){
      els.promptEn.textContent = "自由回答";
      els.promptZh.textContent = user?.zh || user?.ja || "";
      els.fillOptions.innerHTML = "";
      return;
    }

    if(state.hintOn){
      els.promptEn.textContent = expected;
    }else if(state.fillOn){
      els.promptEn.textContent = makeCloze(expected).cloze;
    }else{
      els.promptEn.textContent = "請口說或輸入你的回覆";
    }

    els.promptZh.textContent = user?.zh || user?.ja || "";
    renderFillOptions(state.fillOn ? makeCloze(expected) : null);
  }

  function makeCloze(sentence){
    const s = cleanText(sentence);
    if(!s) return { cloze:"", answer:"", options:[] };
    const words = s.replace(/[“”"]/g,"").split(/\s+/).filter(Boolean);
    if(!words.length) return { cloze:s, answer:"", options:[] };

    let idx = Math.max(0, words.length - 2);
    if(words.length <= 3) idx = Math.max(0, words.length - 1);
    const rawTarget = words[idx];
    const target = rawTarget.replace(/[.,!?;:]+$/,"");
    const cloze = s.replace(target, "____");

    const basePool = ["please","today","coffee","ticket","help","small","large","tomorrow","passport","check-in","information","thanks"];
    const options = [target];
    for(const cand of basePool){
      if(options.length >= 3) break;
      if(cand.toLowerCase() !== target.toLowerCase()) options.push(cand);
    }
    return { cloze, answer:target, options };
  }

  function renderFillOptions(cl){
    els.fillOptions.innerHTML = "";
    if(!cl || !cl.options || !cl.options.length) return;

    for(const opt of cl.options){
      const btn = document.createElement("button");
      btn.className = "optBtn";
      btn.type = "button";
      btn.textContent = opt;
      btn.addEventListener("click", () => {
        const expected = expectedReply();
        const now = makeCloze(expected);
        const completed = now.cloze.includes("____")
          ? now.cloze.replace("____", opt)
          : expected;
        els.replyInput.value = completed;
      });
      els.fillOptions.appendChild(btn);
    }
  }

  async function speakCurrentAi(){
    const ai = currentAi();
    if(ai?.en) await speak(ai.en);
  }

  function startTeacher(){
    const v = els.teacherVideo;
    if(!v) return;
    try{
      if(v.getAttribute("src") !== TEACHER_VIDEO_URL){
        v.setAttribute("src", TEACHER_VIDEO_URL);
        v.load();
      }
      v.loop = false;
      v.muted = true;
      v.playsInline = true;
      try{ v.currentTime = 0; }catch(_){}
      const p = v.play();
      if(p && typeof p.catch === "function") p.catch(() => {});
    }catch(_){}
  }

  function stopTeacher(){
    const v = els.teacherVideo;
    if(!v) return;
    try{ v.pause(); }catch(_){}
    try{ v.currentTime = 0; }catch(_){}
  }

  async function speak(text){
    const line = cleanText(text);
    if(!line) return;

    const now = Date.now();
    if(line === state.lastSpokenText && now - state.lastSpokenAt < 600) return;
    state.lastSpokenText = line;
    state.lastSpokenAt = now;

    stopRecognition(false);
    stopSpeak();
    const seq = ++state.ttsSeq;
    startTeacher();

    try{
      if(USE_AZURE_TTS){
        state.ttsAbort = "AbortController" in window ? new AbortController() : null;
        const res = await fetch(AZURE_TTS_ENDPOINT, {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "apikey":SUPABASE_ANON_KEY,
            "Authorization":"Bearer " + SUPABASE_ANON_KEY
          },
          body:JSON.stringify({
            text:line,
            voice:EMMA_VOICE,
            rate:EMMA_RATE,
            pitch:EMMA_PITCH
          }),
          signal:state.ttsAbort ? state.ttsAbort.signal : undefined
        });

        if(seq !== state.ttsSeq) return;
        if(!res.ok) throw new Error("azure-tts " + res.status);

        const blob = await res.blob();
        if(seq !== state.ttsSeq) return;

        state.ttsBlobUrl = URL.createObjectURL(blob);
        state.ttsAudio = new Audio(state.ttsBlobUrl);
        state.ttsAudio.onended = () => {
          stopTeacher();
          cleanupAudio();
        };
        state.ttsAudio.onerror = () => {
          stopTeacher();
          cleanupAudio();
        };
        await state.ttsAudio.play();
        return;
      }
    }catch(err){
      console.warn("[Talk clean] Azure TTS fallback:", err);
    }

    try{
      if(!("speechSynthesis" in window)){
        stopTeacher();
        return;
      }
      const u = new SpeechSynthesisUtterance(line);
      u.lang = "en-US";
      u.rate = 1.0;
      u.onend = stopTeacher;
      u.onerror = stopTeacher;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }catch(_){
      stopTeacher();
    }
  }

  function cleanupAudio(){
    try{ if(state.ttsBlobUrl) URL.revokeObjectURL(state.ttsBlobUrl); }catch(_){}
    state.ttsAudio = null;
    state.ttsBlobUrl = null;
  }

  function stopSpeak(){
    state.ttsSeq += 1;
    try{ if(state.ttsAbort) state.ttsAbort.abort(); }catch(_){}
    state.ttsAbort = null;
    try{ if(state.ttsAudio){ state.ttsAudio.pause(); state.ttsAudio.currentTime = 0; } }catch(_){}
    cleanupAudio();
    try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(_){}
    stopTeacher();
  }

  function getSpeechRecognition(){
    return window.SpeechRecognition || window.webkitSpeechRecognition || null;
  }

  function setRecordingUI(on){
    state.recording = !!on;
    els.btnMic.classList.toggle("recording", !!on);
    els.btnMic.disabled = !!on;
    els.btnStop.disabled = !on;
    els.btnMic.textContent = on ? "●" : "🎤";
  }

  function startRecognition(){
    const SR = getSpeechRecognition();
    if(!SR){
      toast("此瀏覽器暫不支援語音辨識");
      return;
    }

    stopSpeak();
    stopRecognition(false);

    state.manualStop = false;
    state.finalTranscript = "";
    state.liveTranscript = "";
    els.replyInput.value = "";
    setStatus("正在聽，說完後會自動判分…", "wait");

    const rec = new SR();
    state.recognition = rec;
    rec.lang = "en-US";
    rec.interimResults = true;
    rec.continuous = false;
    rec.maxAlternatives = 1;

    rec.onstart = () => setRecordingUI(true);

    rec.onresult = (event) => {
      let interim = "";
      let finalText = state.finalTranscript;

      for(let i = event.resultIndex; i < event.results.length; i++){
        const piece = cleanText(event.results[i][0]?.transcript || "");
        if(!piece) continue;
        if(event.results[i].isFinal){
          finalText = cleanText((finalText + " " + piece).trim());
        }else{
          interim = cleanText((interim + " " + piece).trim());
        }
      }

      state.finalTranscript = finalText;
      state.liveTranscript = cleanText((finalText + " " + interim).trim());
      els.replyInput.value = state.liveTranscript;
    };

    rec.onerror = (event) => {
      console.warn("[Talk clean] speech error", event);
      setRecordingUI(false);
      state.recognition = null;
      if(event.error === "no-speech"){
        setStatus("沒有聽到聲音，請再按一次 🎤", "bad");
      }else{
        setStatus("語音辨識失敗，請再試一次", "bad");
      }
    };

    rec.onend = () => {
      const heard = cleanText(state.finalTranscript || state.liveTranscript || els.replyInput.value);
      setRecordingUI(false);
      state.recognition = null;
      if(!heard){
        if(!state.manualStop) setStatus("沒有聽到內容，請再試一次", "bad");
        return;
      }
      evaluateReply(heard, { fromSpeech:true });
    };

    try{
      rec.start();
    }catch(err){
      console.warn("[Talk clean] speech start failed", err);
      setRecordingUI(false);
      state.recognition = null;
      setStatus("麥克風啟動失敗，請再試一次", "bad");
    }
  }

  function stopRecognition(markManual=true){
    if(markManual) state.manualStop = true;
    const rec = state.recognition;
    if(rec){
      try{ rec.stop(); }catch(_){}
    }
  }

  function evaluateReply(text, { fromSpeech=false } = {}){
    const heard = cleanText(text);
    if(!heard){
      setStatus("請先說話或輸入回覆", "bad");
      return;
    }

    const expected = expectedReply();
    if(!expected){
      setStatus("已收到你的回覆 ✅", "good");
      toast("已送出");
      setTimeout(nextTurn, 380);
      return;
    }

    const score = similarity(heard, expected);
    const pct = Math.round(score * 100);
    els.replyInput.value = heard;

    if(score >= PASS_SCORE){
      setStatus(`正確度 ${pct}% ✅ 自動下一句`, "good");
      toast(`正確度 ${pct}% ✅`);
      setTimeout(nextTurn, fromSpeech ? 420 : 300);
    }else{
      setStatus(`正確度 ${pct}%　未達 50%，請再說一次`, "bad");
    }
  }

  function nextTurn(){
    stopRecognition(false);
    stopSpeak();
    const next = firstAiIndex(state.aiIndex + 1);
    if(next < 0){
      state.aiIndex = -1;
      renderCurrent();
      setStatus("本情境完成 ✅", "good");
      toast("本情境完成");
      return;
    }
    state.aiIndex = next;
    state.hintOn = false;
    state.fillOn = false;
    els.btnHint.classList.remove("on");
    els.btnFill.classList.remove("on");
    renderCurrent();
    speakCurrentAi();
  }

  function toggleHint(){
    state.hintOn = !state.hintOn;
    els.btnHint.classList.toggle("on", state.hintOn);
    renderPrompt();
  }

  function toggleFill(){
    state.fillOn = !state.fillOn;
    els.btnFill.classList.toggle("on", state.fillOn);
    renderPrompt();
  }

  function toggleSave(){
    const ai = currentAi();
    if(!ai) return;
    const key = `${state.activeSceneId}::${state.aiIndex}`;
    if(state.saved.has(key)){
      state.saved.delete(key);
      els.btnSave.classList.remove("on");
      toast("已取消收藏");
    }else{
      state.saved.add(key);
      els.btnSave.classList.add("on");
      toast("已收藏");
    }
    try{ localStorage.setItem("BW_TALK_SAVED_LINES", JSON.stringify([...state.saved])); }catch(_){}
  }

  function restoreSaved(){
    try{
      const arr = JSON.parse(localStorage.getItem("BW_TALK_SAVED_LINES") || "[]");
      if(Array.isArray(arr)) state.saved = new Set(arr);
    }catch(_){}
  }

  function syncSaveBtn(){
    const key = `${state.activeSceneId}::${state.aiIndex}`;
    els.btnSave.classList.toggle("on", state.saved.has(key));
  }

  function promptTyped(){
    const current = cleanText(els.replyInput.value);
    const ans = prompt("輸入你的回覆", current);
    if(ans != null){
      els.replyInput.value = cleanText(ans);
      if(ans.trim()) evaluateReply(ans, { fromSpeech:false });
    }
  }

  async function init(){
    restoreSaved();

    try{
      const indexRaw = await fetchJsonAny(INDEX_URLS);
      state.index = normalizeIndex(indexRaw);
    }catch(err){
      console.error("[Talk clean] index load failed", err);
      setStatus("讀不到 /talk/index.json", "bad");
      els.aiEn.textContent = "Talk index 讀取失敗";
      els.aiZh.textContent = "";
      return;
    }

    if(!state.index.length){
      setStatus("talk/index.json 沒有情境資料", "bad");
      els.aiEn.textContent = "找不到 Talk 情境";
      els.aiZh.textContent = "";
      return;
    }

    state.unlockedWeek = computeUnlockedWeek();
    groupScenes();

    const savedWeek = Number(localStorage.getItem("talk_active_week") || "0");
    const savedSceneId = cleanText(localStorage.getItem("BW_TALK_LAST_SCENE") || "");
    const forcedId = cleanText(new URLSearchParams(location.search).get("scene") || "");

    let scene = null;
    if(forcedId) scene = state.index.find(s => s.id === forcedId) || null;
    if(!scene && savedSceneId) scene = state.index.find(s => s.id === savedSceneId) || null;
    if(!scene && savedWeek){
      scene = state.index.find(s => s.week === savedWeek && s.week <= state.unlockedWeek) || null;
    }
    if(!scene){
      scene = state.index.find(s => s.week <= state.unlockedWeek) || state.index[0];
    }

    await loadScene(scene);
    syncSaveBtn();
  }

    if(ev.key === "Enter"){
      ev.preventDefault();
      evaluateReply(els.replyInput.value, { fromSpeech:false });
    }
  });

  if(els.teacherVideo){
    els.teacherVideo.addEventListener("ended", stopTeacher);
  }

  const oldRenderCurrent = renderCurrent;
  renderCurrent = function(){
    oldRenderCurrent();
    syncSaveBtn();
  };

  init();
})();
</script>
</body>
</html>
