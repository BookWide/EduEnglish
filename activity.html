<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>BookWide｜活動</title>
<style>
:root{
  --bg:#070f1f;
  --panel:#0f1f3a;
  --ink:#f8fbff;
  --muted:#a9b9d4;
  --line:rgba(148,163,184,.22);
  --blue:#3b82f6;
  --cyan:#38bdf8;
  --gold:#fbbf24;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  color:var(--ink);
  font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:
    radial-gradient(circle at 12% 0%,rgba(59,130,246,.34),transparent 34%),
    radial-gradient(circle at 92% 10%,rgba(34,197,94,.16),transparent 28%),
    var(--bg);
}
.wrap{width:min(980px,100%);margin:0 auto;padding:18px 14px 42px}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:10px}
.logo{
  width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  box-shadow:0 12px 26px rgba(37,99,235,.32);font-size:22px;
}
.brand b{display:block;font-size:25px;line-height:1;letter-spacing:.2px}
.brand span{display:block;margin-top:3px;color:var(--muted);font-size:12px;font-weight:850}
.back{
  border:1px solid var(--line);background:rgba(15,31,58,.78);color:#dbeafe;
  border-radius:999px;padding:8px 13px;text-decoration:none;font-size:13px;font-weight:950;
}
.hero{
  border:1px solid rgba(96,165,250,.26);border-radius:28px;
  background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(15,31,58,.88)),rgba(15,31,58,.86);
  box-shadow:0 24px 70px rgba(0,0,0,.26);padding:26px;margin-bottom:16px;overflow:hidden;position:relative;
}
.hero:after{
  content:"活動";position:absolute;right:-12px;bottom:-34px;color:rgba(255,255,255,.035);
  font-size:122px;font-weight:1000;letter-spacing:-8px;
}
.kicker{
  display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(251,191,36,.28);
  background:rgba(251,191,36,.10);color:#fde68a;border-radius:999px;
  padding:5px 10px;font-size:12px;font-weight:950;margin-bottom:10px;
}
.hero h1{margin:0;font-size:38px;line-height:1.08;letter-spacing:.2px}
.hero p{margin:10px 0 0;color:#d7e6ff;font-size:15px;line-height:1.6;font-weight:800;max-width:620px}
.sectionTitle{margin:18px 0 10px;color:#eaf3ff;font-size:16px;font-weight:950}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.card{
  min-height:154px;border:1px solid var(--line);border-radius:22px;
  background:linear-gradient(145deg,rgba(20,40,73,.95),rgba(11,24,45,.95));
  box-shadow:0 16px 36px rgba(0,0,0,.18);padding:16px;
  display:flex;flex-direction:column;justify-content:space-between;gap:14px;position:relative;overflow:hidden;
}
.card:before{
  content:"";position:absolute;inset:auto -30px -42px auto;width:118px;height:118px;
  border-radius:999px;background:rgba(96,165,250,.10);
}
.cardTop{display:flex;gap:12px;align-items:flex-start;position:relative}
.icon{
  flex:0 0 auto;width:46px;height:46px;border-radius:16px;display:grid;place-items:center;
  font-size:24px;background:rgba(59,130,246,.18);border:1px solid rgba(96,165,250,.18);
}
.card h2{margin:0;font-size:19px;line-height:1.25}
.card p{margin:6px 0 0;color:#b9cff0;font-size:13px;line-height:1.5;font-weight:760}
.actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;position:relative}
.btn{
  display:inline-flex;align-items:center;justify-content:center;min-width:84px;
  padding:9px 14px;border-radius:999px;color:#fff;text-decoration:none;font-size:13px;font-weight:950;
  background:linear-gradient(135deg,#2563eb,#60a5fa);box-shadow:0 10px 20px rgba(37,99,235,.22);
}
.btn.ghost{
  background:rgba(255,255,255,.06);border:1px solid rgba(148,163,184,.24);
  color:#dbeafe;box-shadow:none;
}
button.btn{font:inherit}
button.btn[disabled]{
  opacity:.55;
  cursor:not-allowed;
  box-shadow:none;
}
.tag{
  font-size:11px;color:#fde68a;font-weight:950;border:1px solid rgba(251,191,36,.26);
  background:rgba(251,191,36,.09);border-radius:999px;padding:5px 8px;
}
.note{margin-top:14px;color:#8ea5c5;font-size:12px;line-height:1.5;font-weight:750}
@media(max-width:720px){
  .wrap{padding:12px 10px 30px}.top{margin-bottom:12px}
  .logo{width:36px;height:36px;border-radius:12px;font-size:19px}.brand b{font-size:22px}
  .hero{border-radius:22px;padding:20px;margin-bottom:14px}.hero h1{font-size:31px}.hero p{font-size:13.5px}
  .grid{grid-template-columns:1fr;gap:10px}.card{min-height:0;border-radius:18px;padding:14px}
  .card h2{font-size:17px}.actions{justify-content:flex-start}
}
</style>
</head>
<body>
<main class="wrap">
  <section class="top">
    <div class="brand">
      <div class="logo">📘</div>
      <div>
        <b>BookWide</b>
        <span>活動中心</span>
      </div>
    </div>
    <a class="back" href="/index.html">回首頁</a>
  </section>

  <section class="hero">
    <div class="kicker">BookWide Events</div>
    <h1>活動中心</h1>
    <p>所有加碼福利、助學申請、推薦獎勵與限時體驗集中在這裡。首頁只放「活動」入口，內容在此頁管理。</p>
  </section>

  <div class="sectionTitle">目前活動</div>

  <section class="grid">
    <article class="card">
      <div class="cardTop">
        <div class="icon">🎁</div>
        <div>
          <h2>活動加碼</h2>
          <p>完成指定活動後，可參加英日小闖關，領取遊客金幣。</p>
        </div>
      </div>
      <div class="actions">
        <span class="tag">加碼獎勵</span>
        <a class="btn" href="/blood-donation.html">進入</a>
      </div>
    </article>

    <article class="card">
      <div class="cardTop">
        <div class="icon">🎓</div>
        <div>
          <h2>助學申請</h2>
          <p>符合資格者可申請免費學習資格，後台審核後開通。</p>
        </div>
      </div>
      <div class="actions">
        <span class="tag">人工審核</span>
        <a class="btn ghost" href="/account/payment-slip.html#scholarship">申請</a>
      </div>
    </article>

    <article class="card">
      <div class="cardTop">
        <div class="icon">🤝</div>
        <div>
          <h2>推薦活動</h2>
          <p>邀請朋友加入 BookWide，可領推薦獎勵。</p>
        </div>
      </div>
      <div class="actions">
        <span class="tag">推薦獎勵</span>
        <a class="btn ghost" href="/referral.html">查看</a>
      </div>
    </article>

    <article class="card">
      <div class="cardTop">
        <div class="icon">⚡</div>
        <div>
          <h2>限時體驗</h2>
          <p>不定期開放主題課程體驗與金幣獎勵。</p>
        </div>
      </div>
      <div class="actions">
        <span class="tag">不定期</span>
        <button class="btn ghost" type="button" disabled>準備中</button>
      </div>
    </article>
  </section>

  <div class="note">此頁只做活動入口；一般英文主題請留在主題體驗或投放中心，不塞進活動頁。</div>
</main>
</body>
</html>
