<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookWide Player</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
.wrap{max-width:1000px;margin:auto}
.videoWrap{position:relative;width:100%;aspect-ratio:16/9;background:#000}
#ytWrap,#html5Wrap{position:absolute;inset:0}
video{width:100%;height:100%}
.topbar{display:flex;gap:10px;padding:10px;background:#111}
.btn{padding:6px 12px;background:#333;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
<button class="btn" onclick="switchSource('youtube')">YouTube</button>
<button class="btn" onclick="switchSource('cloudflare')">Cloudflare</button>
<button class="btn" onclick="switchSource('mp4')">MP4</button>
</div>

<div class="videoWrap">
<div id="ytWrap"></div>
<div id="html5Wrap">
<video id="video" controls></video>
</div>
</div>
</div>

<script>
let data=null, ytPlayer=null, currentSource=null;

async function init(){
  const res=await fetch('index_test.json');
  data=await res.json();
  loadPreferred();
}

function loadPreferred(){
  if(data.preferred_source==='youtube'){loadYouTube();}
  else{loadFallback(0);}
}

function loadYouTube(){
  if(!data.youtube_id){loadFallback(0);return;}
  loadYT().then(()=>{
    ytPlayer=new YT.Player('ytWrap',{
      videoId:data.youtube_id,
      events:{
        onReady:e=>{e.target.playVideo(); setTimeout(checkYT,5000);},
        onError:()=>fallback(),
      }
    });
  });
}

function checkYT(){
  try{
    if(ytPlayer.getCurrentTime()<0.5){fallback();}
  }catch(e){fallback();}
}

function fallback(){loadFallback(0);}

function loadFallback(i){
  const order=data.fallback_order||[];
  if(i>=order.length)return;
  const t=order[i];
  if(t==='cloudflare' && data.cloudflare_url){playHTML5(data.cloudflare_url);}
  else if(t==='mp4' && data.mp4_url){playHTML5(data.mp4_url);}
  else{loadFallback(i+1);}
}

function playHTML5(url){
  document.getElementById('ytWrap').innerHTML='';
  const v=document.getElementById('video');
  v.src=url;
  v.play().catch(()=>{});
}

function switchSource(t){
  if(t==='youtube')loadYouTube();
  if(t==='cloudflare')playHTML5(data.cloudflare_url);
  if(t==='mp4')playHTML5(data.mp4_url);
}

function loadYT(){
  return new Promise(r=>{
    if(window.YT)return r();
    const s=document.createElement('script');
    s.src="https://www.youtube.com/iframe_api";
    document.body.appendChild(s);
    window.onYouTubeIframeAPIReady=r;
  });
}

init();
</script>
</body>
</html>
