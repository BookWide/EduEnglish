<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>player_test</title>
</head>
<body>
  <h2>player_test</h2>
  <div id="status">驗證中...</div>

  <script type="module">
    import { supabase } from './supa.js';

    const statusEl = document.getElementById('status');
    const device_id = localStorage.getItem('dev');
    const device_type = window.innerWidth < 900 ? 'mobile' : 'desktop';

    async function getReadySession(retry = 10, waitMs = 300) {
      for (let i = 0; i < retry; i++) {
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.access_token) return session;
        await new Promise(r => setTimeout(r, waitMs));
      }
      return null;
    }

    async function verify() {
      try {
        const session = await getReadySession();

        if (!session) {
          alert('沒登入或 session 尚未建立');
          location.href = 'index_test.html';
          return;
        }

        const resp = await fetch(
          'https://jeajrwpmrgczimmrflxo.supabase.co/functions/v1/verify_test',
          {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + session.access_token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ device_id, device_type })
          }
        );

        const data = await resp.json().catch(() => ({}));
        console.log('verify_test =>', resp.status, data);

        if (!resp.ok) {
          statusEl.textContent = 'verify 失敗：' + resp.status;
          return;
        }

        if (!data.valid) {
          alert('被踢掉');
          location.href = 'index_test.html';
          return;
        }

        statusEl.textContent = 'OK';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'verify 發生錯誤';
      }
    }

    await verify();
    setInterval(verify, 30000);
  </script>
</body>
</html>
