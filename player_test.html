<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>player_test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h2>player_test</h2>
<div id="status">驗證中...</div>

<script>
const supa = supabase.createClient(
"https://jeajrwpmrgczimmrflxo.supabase.co",
"YOUR_ANON_KEY"
);

const device_id = localStorage.getItem('dev');
const device_type = window.innerWidth < 900 ? 'mobile' : 'desktop';

async function verify(){
  const { data:{session} } = await supa.auth.getSession();

  const r = await fetch('/functions/v1/verify_test',{
    method:'POST',
    headers:{
      Authorization:'Bearer '+session.access_token,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({device_id,device_type})
  }).then(r=>r.json());

  if(!r.valid){
    alert('被踢掉');
    location.href='index_test.html';
  }else{
    document.getElementById('status').innerText='OK';
  }
}

verify();
setInterval(verify,30000);
</script>
</body>
</html>
