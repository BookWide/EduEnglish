<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V55 Suno輸出版</title>
<style>
body {background:#111;color:#eee;font-family:Arial;padding:20px;}
textarea {width:100%;min-height:200px;background:#222;color:#0f0;margin:10px 0;}
button {padding:10px;background:#ff6600;color:#fff;border:none;margin:5px;}
.block {border:1px solid #444;padding:15px;margin:15px 0;}
</style>
</head>
<body>

<h2>🎯 V55（Suno / Mureka 穩定輸出版）</h2>

<input type="file" id="fileInput" accept=".srt">
<button onclick="parseSRT()">解析 SRT</button>

<div id="output"></div>

<script>

function clean(t){return (t||"").trim();}

function normalize(s){
    return s.replace(/\b(be|la|na|oh|ah)\b/gi,'')
            .replace(/\b(\w+)(\s+\1)+/gi,'$1')
            .replace(/\s+/g,' ')
            .trim();
}

function makeLyrics(lines){
    let out=[];
    lines.forEach(l=>{
        l=normalize(clean(l));
        if(!l) return;

        let parts=l.split(/[,.;!?]/);

        parts.forEach(p=>{
            p=p.trim();
            if(!p) return;
            out.push(p);
        });
    });

    // 保證至少4句（防拖長）
    while(out.length<4){
        out.push(out[out.length-1]||"Repeat");
    }

    return out.slice(0,6).join("\n\n");
}

function getStyle(){
return `Spoken English learning track.

NOT music.
NOT a song.
NO singing.

Normal speaking speed.
Do NOT make it slow.

Each line under 2 seconds.
Do NOT stretch words.
No filler sounds.

Clear teacher voice.

Very subtle background only.
No ambient.
No cinematic slow music.

This is for English learning.`;
}

function parseSRT(){
    const file=document.getElementById('fileInput').files[0];
    if(!file) return alert("選SRT");

    const reader=new FileReader();

    reader.onload=function(e){
        const text=e.target.result;
        const lines=text.split(/\r?\n/);

        let cleanLines=[];
        lines.forEach(l=>{
            if(l.includes('-->')) return;
            if(/^\d+$/.test(l.trim())) return;
            if(!l.trim()) return;
            cleanLines.push(l.trim());
        });

        let html="";

        for(let i=0;i<cleanLines.length;i+=4){
            const chunk=cleanLines.slice(i,i+4);
            const id=String(i/4+1).padStart(3,'0');

            const lyrics=makeLyrics(chunk);
            const style=getStyle();

            html+=`
            <div class="block">
            <b>Part ${id}</b><br>

            <b>Title（貼到 Suno）</b>
            <textarea>${id}</textarea>

            <b>Lyrics</b>
            <textarea>${lyrics}</textarea>

            <b>Style</b>
            <textarea>${style}</textarea>
            </div>`;
        }

        document.getElementById("output").innerHTML=html;
    };

    reader.readAsText(file);
}

</script>

</body>
</html>
