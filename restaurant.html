  </section>
</main>
<div class="modal" id="stage1Modal"><div class="modalBox"><h2>第 1 關完成！</h2><p>你完成 1–10 題，得到 <b>2 個遊客金幣</b>。接下來可去影片館使用，或挑戰 11–20 題。</p><div class="modalActions"><button class="gold" id="openPortal" type="button">A. 去 Story / Music / Movie / News</button><button id="startStage2" type="button">B. 進入 11–20 跟讀挑戰</button></div></div></div>
<div class="modal" id="portalModal"><div class="modalBox"><h2>選擇影片館</h2><p>帶著遊客金幣進入你要看的分類。</p><div class="portalGrid"><a href="./index.html?cat=story">STORY</a><a href="./index.html?cat=music">MUSIC</a><a href="./index.html?cat=movie">MOVIE</a><a href="./index.html?cat=news">NEWS</a></div><div class="modalActions" style="margin-top:10px"><button id="backStage1" type="button">返回選擇</button></div></div></div>
<div class="modal" id="finishModal"><div class="modalBox"><h2>第 2 關完成！</h2><p>你完成 11–20 跟讀＋答題，再得到 <b>2 個遊客金幣</b>。總共 4 金幣。</p><div class="modalActions"><button class="gold" id="finishPortal" type="button">去 Story / Music / Movie / News</button></div></div></div>

function bwRomanOf(obj, lang){
  try{
    if(!obj) return "";
    if(obj.roman && obj.roman[lang]) return obj.roman[lang];
    return "";
  }catch(e){return "";}
}
function bwSpeakText(obj, lang){
  const roman = bwRomanOf(obj, lang);
  if((lang === "th" || lang === "ne" || lang === "vi") && roman) return roman;
  return (obj && (obj[lang] || obj.en || obj.zh || obj.ja)) || "";
}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}function lang(){return $("localSelect").value||"ja"}function cfg(){return LANGS[lang()]||LANGS.ja}function local(obj){const code=lang();if(code==="en")return"";return String(obj?.[code]||obj?.local||"")}function speechLang(){return cfg().speech}function normalize(s){return String(s||"").toLowerCase().replace(/[’']/g,"").replace(/[^a-z0-9぀-ヿ㐀-鿿가-힯ऀ-ॿ\s]/g," ").replace(/\s+/g," ").trim()}
function scoreText(a,b){a=normalize(a);b=normalize(b);if(!a||!b)return 0;const aw=a.split(" "),bw=b.split(" ");let hit=0;for(const w of aw){if(bw.includes(w))hit++}let ratio=hit/Math.max(aw.length,1);if(a.length>3&&b.includes(a))ratio=Math.max(ratio,.75);return Math.round(Math.min(100,ratio*100))}

/* BW_ROMAN_VOICE_BRIDGE_V1 */
(function(){
  if(window.__BW_ROMAN_VOICE_BRIDGE_V1__) return;
  window.__BW_ROMAN_VOICE_BRIDGE_V1__ = true;

  const ROMAN_LANGS = new Set(["vi","th","ne"]);

  function bwNormLang(lang){
    lang = String(lang || "").toLowerCase();
    if(lang.startsWith("vi")) return "vi";
    if(lang.startsWith("th")) return "th";
    if(lang.startsWith("ne")) return "ne";
    if(lang.startsWith("ja")) return "ja";
    if(lang.startsWith("zh")) return "zh";
    if(lang.startsWith("en")) return "en";
    return lang || "en";
  }

  function bwTtsLang(lang){
    lang = bwNormLang(lang);
    if(ROMAN_LANGS.has(lang)) return "en-US";
    if(lang === "ja") return "ja-JP";
    if(lang === "zh") return "zh-TW";
    return "en-US";
  }

  function bwPickSelectLang(){
    const sels = Array.from(document.querySelectorAll("select"));
    for(const s of sels){
      const v = bwNormLang(s.value);
      if(v) return v;
    }
    return "ja";
  }

  function bwWalk(obj, fn, seen){
    if(!obj || typeof obj !== "object") return;
    seen = seen || new WeakSet();
    if(seen.has(obj)) return;
    seen.add(obj);
    fn(obj);
    if(Array.isArray(obj)){
      obj.forEach(x => bwWalk(x, fn, seen));
    }else{
      Object.keys(obj).forEach(k => bwWalk(obj[k], fn, seen));
    }
  }

  function bwBuildRomanMap(){
    const map = new Map();
    try{
      const root = window.lessons || window.LESSONS || window.DATA || null;
      bwWalk(root, function(o){
        if(!o || typeof o !== "object") return;
        const roman = o.roman && typeof o.roman === "object" ? o.roman : {};
        ["vi","th","ne"].forEach(lang=>{
          if(typeof o[lang] === "string" && o[lang].trim()){
            const r = roman[lang] || o[lang + "_roman"] || "";
            if(r) map.set(o[lang].trim(), String(r).trim());
          }
        });
      });
    }catch(e){}
    return map;
  }

  let BW_ROMAN_MAP = null;
  function bwRomanMap(){
    if(!BW_ROMAN_MAP) BW_ROMAN_MAP = bwBuildRomanMap();
    return BW_ROMAN_MAP;
  }

  window.bwRomanOf = function(obj, lang){
    lang = bwNormLang(lang);
    if(!obj || !ROMAN_LANGS.has(lang)) return "";
    if(obj.roman && obj.roman[lang]) return String(obj.roman[lang]);
    if(obj[lang + "_roman"]) return String(obj[lang + "_roman"]);
    if(obj[lang]) return bwRomanMap().get(String(obj[lang]).trim()) || "";
    return "";
  };

  window.bwSpeakPlain = function(text, lang, rate){
    text = String(text || "").trim();
    if(!text) return;
    try{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang || "en-US";
      u.rate = rate || (window.RATE || 0.8);
      speechSynthesis.speak(u);
    }catch(e){ console.warn("bwSpeakPlain failed", e); }
  };

  window.bwSpeakText = function(obj, lang){
    lang = bwNormLang(lang);
    if(!obj) return;
    let text = "";
    if(typeof obj === "string"){
      text = obj;
    }else if(ROMAN_LANGS.has(lang)){
      text = window.bwRomanOf(obj, lang) || obj.en || obj[lang] || "";
    }else{
      text = obj[lang] || obj.en || "";
    }
    if(!text) return;
    window.bwSpeakPlain(text, bwTtsLang(lang), window.RATE || 0.8);
  };

  function bwCurrentLesson(){
    try{
      const arr = window.lessons || window.LESSONS || [];
      let i = 0;
      if(typeof window.idx !== "undefined") i = window.idx;
      else if(typeof window.currentIndex !== "undefined") i = window.currentIndex;
      else if(typeof window.lessonIndex !== "undefined") i = window.lessonIndex;
      i = Math.max(0, Math.min(Number(i)||0, arr.length - 1));
      return arr[i];
    }catch(e){ return null; }
  }

  function bwSpeakCurrent(){
    const lesson = bwCurrentLesson();
    if(!lesson) return;
    const lang = bwPickSelectLang();
    try{ speechSynthesis.cancel(); }catch(e){}
    window.bwSpeakText(lesson, "en");
    setTimeout(()=>window.bwSpeakText(lesson, lang), 900);
  }

  function bwTextChoiceFromButton(btn){
    const box = btn.closest(".choice,.choiceInner,button,li,div");
    if(!box) return null;
    const txt = (box.innerText || "").trim();
    if(!txt) return null;
    const lines = txt.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    let en = "";
    let roman = "";
    for(const line of lines){
      if(/^拼音\s*[:：]/.test(line)) roman = line.replace(/^拼音\s*[:：]\s*/, "").trim();
      else if(!en && /[A-Za-z]/.test(line) && !/^拼音\s*[:：]/.test(line)) en = line.replace(/^[A-C]\.?\s*/, "").trim();
    }
    return {en, roman};
  }

  function bwSpeakChoiceButton(btn){
    const lang = bwPickSelectLang();
    const parsed = bwTextChoiceFromButton(btn);
    if(!parsed) return false;
    try{ speechSynthesis.cancel(); }catch(e){}
    if(parsed.en) window.bwSpeakPlain(parsed.en, "en-US", window.RATE || 0.8);
    const second = ROMAN_LANGS.has(lang) ? parsed.roman : "";
    if(second) setTimeout(()=>window.bwSpeakPlain(second, "en-US", window.RATE || 0.8), 900);
    return true;
  }

  try{
    const oldSpeak = speechSynthesis.speak.bind(speechSynthesis);
    speechSynthesis.speak = function(utter){
      try{
        if(utter && typeof utter.text === "string"){
          const raw = utter.text.trim();
          const lang = bwNormLang(utter.lang || bwPickSelectLang());
          const mapped = bwRomanMap().get(raw);
          if(mapped || ROMAN_LANGS.has(lang)){
            utter.text = mapped || raw;
            utter.lang = "en-US";
            utter.rate = utter.rate || (window.RATE || 0.8);
          }
        }
      }catch(e){}
      return oldSpeak(utter);
    };
  }catch(e){}

  document.addEventListener("click", function(ev){
    const btn = ev.target.closest("button");
    if(!btn) return;
    const id = btn.id || "";
    const cls = String(btn.className || "");

    if(id === "play" || cls.includes("play")){
      if(ROMAN_LANGS.has(bwPickSelectLang())){
        ev.preventDefault();
        ev.stopPropagation();
        if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        bwSpeakCurrent();
      }
      return;
    }

    if(cls.includes("choiceSpeak") || cls.includes("speak") || /🔊/.test(btn.innerText || "")){
      if(ROMAN_LANGS.has(bwPickSelectLang())){
        ev.preventDefault();
        ev.stopPropagation();
        if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        bwSpeakChoiceButton(btn);
      }
    }
  }, true);

  document.addEventListener("change", function(ev){
    if(ev.target && ev.target.tagName === "SELECT"){
      setTimeout(()=>{ BW_ROMAN_MAP = bwBuildRomanMap(); }, 100);
    }
  }, true);

  setTimeout(()=>{ BW_ROMAN_MAP = bwBuildRomanMap(); }, 500);
  setTimeout(()=>{ BW_ROMAN_MAP = bwBuildRomanMap(); }, 1500);
})();

</script>
</body>
