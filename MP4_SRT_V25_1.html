<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MP4_SRT V25.1</title>
<style>
body{font-family:Arial;background:#0b1a2b;color:#fff;padding:20px}
button{padding:10px 18px;margin:6px;font-size:16px;border-radius:6px;border:0;background:#1e88e5;color:white;cursor:pointer}
textarea{width:100%;height:220px;margin-top:10px}
.panel{background:#13263f;padding:15px;border-radius:10px;margin-top:15px}
.note{opacity:.9;font-size:14px;line-height:1.6}
</style>
</head>
<body>
<h2>MP4_SRT V25.1（語音集 JSON 版）</h2>

<div class="panel">
<input type="file" id="srtFile">
<button onclick="loadSRT()">讀取 SRT</button>
<button onclick="buildVoiceLibrary()">生成 語音集 JSON</button>
<button onclick="downloadJSON()">下載 JSON</button>
<div class="note">
這版輸出的是 <b>V19.1 / V19.2 / V23 可直接匯入的「語音庫 JSON」</b><br>
不是段落清單 voice.json。
</div>
</div>

<div class="panel">
<h3>SRT 內容</h3>
<textarea id="srtText"></textarea>
</div>

<div class="panel">
<h3>語音集 JSON（可直接匯入 V19.1 / V23 的「匯入語音庫 JSON」）</h3>
<textarea id="jsonOut"></textarea>
</div>

<script>
let segments=[];

function loadSRT(){
  const file=document.getElementById("srtFile").files[0];
  if(!file){alert("請選 SRT");return}
  const reader=new FileReader();
  reader.onload=function(e){
    const txt=e.target.result;
    document.getElementById("srtText").value=txt;
    parseSRT(txt);
  };
  reader.readAsText(file);
}

function parseSRT(text){
  segments=[];
  let blocks=text.trim().split(/\n\s*\n/);
  blocks.forEach((b,i)=>{
    let lines=b.split("\n").map(v=>v.trim());
    if(lines.length>=3){
      segments.push({
        id:i+1,
        time:lines[1],
        text:lines.slice(2).join(" ")
      });
    }
  });
  alert("解析 "+segments.length+" 段");
}

function detectRole(t){
  t=(t||"").toLowerCase();
  if(t.includes("mother")||t.includes("mom")||t.includes("mummy")) return "mother";
  if(t.includes("girl")||t.includes("goldilocks")||t.includes("little girl")) return "girl";
  if(t.includes("boy")||t.includes("little boy")) return "boy";
  if(t.includes("bear")) return "bear";
  if(t.includes("old man")) return "old_man";
  if(t.includes("lion")) return "lion";
  if(t.includes("mouse")) return "mouse";
  return "narration";
}

function roleDisplayName(role){
  const map={
    narration:"旁白",
    girl:"小女孩",
    boy:"男孩",
    mother:"母親",
    bear:"熊",
    old_man:"老人",
    lion:"獅子",
    mouse:"老鼠"
  };
  return map[role] || role;
}

function roleVoice(role){
  const map={
    narration:{voice:"en-US-GuyNeural",pitch:"+0Hz",rate:"+0%",volume:"+0%"},
    girl:{voice:"en-US-AriaNeural",pitch:"+3Hz",rate:"+5%",volume:"+0%"},
    boy:{voice:"en-US-DavisNeural",pitch:"+1Hz",rate:"+3%",volume:"+0%"},
    mother:{voice:"en-US-JennyNeural",pitch:"+0Hz",rate:"+0%",volume:"+0%"},
    bear:{voice:"en-US-BrianNeural",pitch:"-2Hz",rate:"-5%",volume:"+0%"},
    old_man:{voice:"en-US-TonyNeural",pitch:"-2Hz",rate:"-3%",volume:"+0%"},
    lion:{voice:"en-US-BrianNeural",pitch:"-3Hz",rate:"-5%",volume:"+0%"},
    mouse:{voice:"en-US-AriaNeural",pitch:"+4Hz",rate:"+8%",volume:"+0%"}
  };
  return map[role] || map.narration;
}

function buildVoiceLibrary(){
  const found=new Set(["narration"]);
  segments.forEach(s=>found.add(detectRole(s.text)));

  const order=Array.from(found);
  const voiceLibrary={};

  order.forEach(role=>{
    const cfg = roleVoice(role);
    voiceLibrary[role]={
      name: roleDisplayName(role),
      voice: cfg.voice,
      rate: cfg.rate,
      pitch: cfg.pitch,
      volume: cfg.volume
    };
  });

  const out={
    voiceLibrary: voiceLibrary,
    voiceSetOrder: order,
    voiceUI: { activeSetId: "narration" }
  };

  document.getElementById("jsonOut").value=JSON.stringify(out,null,2);
}

function downloadJSON(){
  let data=document.getElementById("jsonOut").value;
  if(!data){alert("沒有 JSON");return}
  let blob=new Blob([data],{type:"application/json"});
  let url=URL.createObjectURL(blob);
  let a=document.createElement("a");
  a.href=url;
  a.download="voice_library.json";
  a.click();
}
</script>
</body>
</html>
