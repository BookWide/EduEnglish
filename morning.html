<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>BookWide 早安三語｜English・中文・日本語</title>
<style>
:root{
  --bg:#071225;
  --panel:#0d1d35;
  --panel2:#102847;
  --line:#24466f;
  --ink:#eef6ff;
  --muted:#9fb4d1;
  --blue:#3b82f6;
  --green:#22c55e;
  --purple:#8b5cf6;
  --gold:#fbbf24;
  --shadow:0 18px 48px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:
  radial-gradient(circle at 20% 0%,rgba(59,130,246,.28),transparent 34%),
  radial-gradient(circle at 85% 16%,rgba(139,92,246,.18),transparent 32%),
  var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif}
button,a,input{font:inherit}
a{color:inherit;text-decoration:none}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding:16px 14px 88px}
.top{
  display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 14px;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:950;font-size:28px;letter-spacing:.01em}
.brandMark{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center;box-shadow:0 8px 20px rgba(59,130,246,.28)}
.brandMark::before{content:"📘";font-size:19px}
.topBtns{display:flex;gap:8px;align-items:center}
.pillBtn{
  border:1px solid rgba(148,163,184,.26);background:rgba(15,31,56,.78);color:#eaf3ff;
  border-radius:999px;padding:9px 13px;font-weight:850;cursor:pointer;
  box-shadow:0 8px 22px rgba(0,0,0,.18)
}
.iconBtn{
  border:1px solid rgba(148,163,184,.26);background:rgba(15,31,56,.78);color:#eaf3ff;
  border-radius:16px;width:42px;height:42px;display:grid;place-items:center;cursor:pointer;
}
.hero{
  position:relative;border-radius:24px;overflow:hidden;min-height:250px;box-shadow:var(--shadow);
  border:1px solid rgba(125,171,241,.28);background:#08172b;margin-bottom:14px;
}
.heroTrack{display:flex;height:100%;transition:transform .45s ease}
.heroSlide{position:relative;flex:0 0 100%;min-height:250px;background-size:cover;background-position:center}
.heroSlide::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.06),rgba(0,0,0,.58))}
.heroText{position:absolute;left:18px;right:18px;bottom:18px;z-index:2}
.heroText .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(15,23,42,.58);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#fff;margin-bottom:8px}
.heroText h1{font-size:29px;line-height:1.08;margin:0 0 8px;font-weight:1000;text-shadow:0 3px 14px rgba(0,0,0,.45)}
.heroText p{margin:0;color:#d8e8ff;font-weight:700;line-height:1.45;text-shadow:0 2px 10px rgba(0,0,0,.5)}
.heroArrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:4;border:0;width:42px;height:42px;border-radius:999px;
  background:rgba(255,255,255,.78);color:#0f172a;font-size:22px;font-weight:950;cursor:pointer;
}
.heroArrow.left{left:12px}.heroArrow.right{right:12px}
.dots{position:absolute;left:0;right:0;bottom:9px;z-index:5;display:flex;justify-content:center;gap:7px}
.dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.42);transition:.2s}
.dot.active{width:24px;background:#fff}

.playerCard{
  border:1px solid rgba(85,136,206,.42);border-radius:24px;background:linear-gradient(145deg,rgba(16,40,71,.96),rgba(8,22,42,.96));
  box-shadow:var(--shadow);padding:14px;margin-bottom:14px;
}
.lessonHeader{display:grid;grid-template-columns:92px 1fr;gap:14px;align-items:center}
.thumb{height:92px;border-radius:18px;background-size:cover;background-position:center;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.thumb .playBig{position:absolute;inset:0;margin:auto;width:52px;height:52px;border-radius:999px;border:2px solid rgba(255,255,255,.82);display:grid;place-items:center;background:rgba(0,0,0,.26);font-size:24px}
.lessonMeta .badge{display:inline-flex;background:rgba(59,130,246,.2);border:1px solid rgba(96,165,250,.28);color:#bfdbfe;border-radius:999px;padding:4px 10px;font-weight:900;font-size:12px;margin-bottom:8px}
.lessonMeta h2{font-size:22px;line-height:1.12;margin:0 0 6px}
.lessonMeta p{margin:0;color:var(--muted);font-weight:750}
.progress{margin-top:14px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;color:#c4d5ee;font-weight:800}
.bar{height:6px;border-radius:999px;background:rgba(148,163,184,.35);overflow:hidden}
.bar span{display:block;height:100%;width:36%;background:linear-gradient(90deg,#60a5fa,#93c5fd);border-radius:999px}
.ctrls{display:flex;align-items:center;justify-content:center;gap:20px;margin:12px 0 6px}
.ctrlBtn{border:0;background:transparent;color:#fff;cursor:pointer;font-size:28px;width:48px;height:48px;border-radius:999px}
.ctrlBtn.main{background:linear-gradient(135deg,#2563eb,#60a5fa);width:66px;height:66px;box-shadow:0 12px 28px rgba(37,99,235,.4);font-size:30px}
.ctrlBottom{border-top:1px solid rgba(148,163,184,.18);margin-top:12px;padding-top:12px;display:flex;align-items:center;justify-content:space-between;color:#c7d2fe}
.toggle{display:inline-flex;align-items:center;gap:8px}
.switch{width:48px;height:28px;border-radius:999px;background:#334155;position:relative}
.switch::after{content:"";position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:999px;background:#fff;transition:.18s}
.switch.on{background:#2563eb}.switch.on::after{left:24px}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0}
.tab{border:1px solid rgba(85,136,206,.46);background:rgba(16,40,71,.7);color:#e5f0ff;border-radius:18px;padding:12px 4px;text-align:center;font-weight:950}
.tab.active{background:linear-gradient(135deg,#2563eb,#3b82f6);box-shadow:0 10px 22px rgba(37,99,235,.28)}
.phraseStack{display:flex;flex-direction:column;gap:12px}
.phraseCard{
  border:1px solid rgba(85,136,206,.46);border-radius:22px;background:linear-gradient(145deg,rgba(16,40,71,.92),rgba(9,25,47,.92));padding:14px;box-shadow:0 14px 34px rgba(0,0,0,.18)
}
.phraseTop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.num{width:34px;height:34px;border-radius:999px;background:#1d4ed8;display:grid;place-items:center;font-weight:950}
.scene{color:#c7d2fe;font-size:13px;font-weight:850}
.langLine{
  display:grid;grid-template-columns:64px 1fr 46px;gap:10px;align-items:center;padding:10px 0;border-top:1px dashed rgba(148,163,184,.22);
}
.langLine:first-of-type{border-top:0}
.lang{border-radius:10px;padding:8px 8px;text-align:center;font-weight:950;background:#123054;color:#7dd3fc}
.lang.zh{background:rgba(34,197,94,.18);color:#86efac}
.lang.ja{background:rgba(139,92,246,.22);color:#c4b5fd}
.text .main{font-size:19px;line-height:1.38;font-weight:920}
.text .hint{font-size:12px;color:var(--muted);margin-top:3px}
.speak{
  width:42px;height:42px;border-radius:999px;border:1px solid rgba(96,165,250,.4);background:rgba(59,130,246,.18);color:#bfdbfe;cursor:pointer;font-size:20px;
}
.langLine.zh .speak{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.18);color:#bbf7d0}
.langLine.ja .speak{border-color:rgba(139,92,246,.48);background:rgba(139,92,246,.2);color:#ddd6fe}
.speak.playing{animation:pulse .9s infinite;box-shadow:0 0 0 0 rgba(96,165,250,.5)}
@keyframes pulse{70%{box-shadow:0 0 0 12px rgba(96,165,250,0)}100%{box-shadow:0 0 0 0 rgba(96,165,250,0)}}
.brandCta{
  margin-top:14px;border:1px solid rgba(251,191,36,.35);background:linear-gradient(135deg,rgba(251,191,36,.13),rgba(59,130,246,.12));
  border-radius:22px;padding:16px;text-align:center
}
.brandCta b{font-size:19px}
.brandCta p{margin:8px 0 14px;color:#d8e8ff;line-height:1.55}
.ctaBtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.cta{border:0;border-radius:999px;padding:11px 16px;font-weight:950;cursor:pointer}
.cta.primary{background:#2563eb;color:#fff}.cta.secondary{background:#fff;color:#0f172a}
.bottomNav{
  position:fixed;left:0;right:0;bottom:0;background:rgba(8,20,39,.9);backdrop-filter:blur(14px);border-top:1px solid rgba(148,163,184,.18);
  display:flex;justify-content:center;z-index:20
}
.bottomInner{width:min(520px,100%);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.navItem{text-align:center;color:#90a6c6;font-weight:850;font-size:12px}
.navItem .ico{font-size:22px;margin-bottom:2px}.navItem.active{color:#60a5fa}
.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-20px);opacity:0;transition:.2s;z-index:99;background:#0f172a;border:1px solid rgba(96,165,250,.42);border-radius:999px;padding:10px 14px;box-shadow:0 14px 34px rgba(0,0,0,.3);font-weight:900;color:#eaf3ff}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:390px){
  .app{padding-left:10px;padding-right:10px}
  .hero,.heroSlide{min-height:218px}
  .lessonHeader{grid-template-columns:82px 1fr}.thumb{height:82px}
  .lessonMeta h2{font-size:20px}
  .tabs{gap:6px}.tab{font-size:14px}
  .langLine{grid-template-columns:54px 1fr 42px;gap:8px}
  .text .main{font-size:17px}
}

.ctrlBtn{width:34px!important;height:34px!important;font-size:19px!important}
.ctrlBtn.main{width:48px!important;height:48px!important;font-size:23px!important}
.ctrlBottom{display:none!important}

/* 不顯示 V5 hero 控制，避免重複 */
.heroControls,.heroProgress,.heroNote,.heroBadge,.heroTitle,.heroSub{display:none!important}

.tabs{
  margin:9px 0!important;
  gap:7px!important;
}
.tab{padding:8px 2px!important;border-radius:16px!important;font-size:14px!important}

/* 內容一次只顯示目前一句組，乾淨不長 */
.phraseStack{gap:9px!important}
.phraseCard{
  padding:11px 12px!important;
  border-radius:20px!important;
  box-shadow:0 12px 28px rgba(0,0,0,.16)!important;
}
.phraseCard:not(.activeLesson){display:none!important}
.phraseTop{margin-bottom:5px!important;gap:8px!important}
.num{width:30px!important;height:30px!important;font-size:15px!important}
.phraseTitle{font-size:19px!important;line-height:1.14!important;font-weight:950!important}
.scene{font-size:12px!important;color:#c7d2fe!important}
.langLine{
  grid-template-columns:46px 1fr 36px!important;
  gap:8px!important;
  padding:7px 0!important;
}
.lang{font-size:12px!important;padding:6px 4px!important;border-radius:9px!important}
.text .main{font-size:18px!important;line-height:1.34!important;font-weight:900!important}
.text .hint{font-size:11px!important;margin-top:2px!important}
.speak{width:34px!important;height:34px!important;font-size:16px!important}

/* 中文只看，不播放 */
.langLine.zh .speak{display:none!important}
.langLine.zh .hint{color:#9fb4d1!important}
.langLine.zh .text{cursor:default!important}

.brandCta,.bottomNav{display:none!important}

@media(max-width:390px){
  .app{padding-left:8px!important;padding-right:8px!important}
  .hero,.heroSlide{min-height:146px!important}
  .lessonHeader{grid-template-columns:54px 1fr!important}
  .thumb{height:54px!important}
  .lessonMeta h2{font-size:18px!important}
  .tabs{gap:5px!important}
  .tab{font-size:13px!important;padding:8px 1px!important}
  .phraseTitle{font-size:18px!important}
  .text .main{font-size:17px!important}
  .langLine{grid-template-columns:43px 1fr 34px!important}
}


/* === V7：上方純照片，點照片播放；下方 KTV 高亮字幕 === */
.app{padding:10px 10px 28px!important}
.top{margin:2px 0 8px!important}
.brand{font-size:22px!important}
.brandMark{width:28px!important;height:28px!important}
.pillBtn{padding:7px 12px!important;font-size:13px!important}
.iconBtn{display:none!important}

/* 上方只當照片／播放入口 */
.hero{
  min-height:190px!important;
  border-radius:22px!important;
  margin-bottom:9px!important;
  overflow:hidden!important;
  box-shadow:0 14px 32px rgba(0,0,0,.24)!important;
  cursor:pointer;
}
.heroSlide{min-height:190px!important}
.heroSlide::after{
  background:linear-gradient(180deg,rgba(5,12,24,.06),rgba(5,12,24,.10) 48%,rgba(5,12,24,.46) 100%)!important;
}
.heroText,.heroInfo,.heroControls,.heroProgress,.heroNote,.heroBadge,.heroTitle,.heroSub{display:none!important}
.heroArrow{
  width:34px!important;height:34px!important;top:50%!important;
  background:rgba(255,255,255,.80)!important;font-size:20px!important;
}
.heroArrow.left{left:10px!important}.heroArrow.right{right:10px!important}
.dots{bottom:8px!important;gap:6px!important}
.dot{width:7px!important;height:7px!important}.dot.active{width:20px!important}

/* 照片中央播放提示 */
.heroPlayHint{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:6;width:68px;height:68px;border-radius:999px;
  display:grid;place-items:center;
  background:rgba(15,23,42,.36);
  border:2px solid rgba(255,255,255,.82);
  color:white;font-size:30px;font-weight:950;
  box-shadow:0 14px 34px rgba(0,0,0,.26);
  backdrop-filter:blur(4px);
}
.heroPlayHint.playing{font-size:24px;background:rgba(37,99,235,.62)}

/* 紅線那塊播放器直接隱藏 */
.playerCard{display:none!important}

/* 分頁縮小 */
.tabs{margin:9px 0!important;gap:7px!important}
.tab{padding:8px 2px!important;border-radius:16px!important;font-size:14px!important}

/* KTV 主體 */
.phraseStack{gap:9px!important}
.phraseCard{
  padding:12px!important;
  border-radius:21px!important;
  box-shadow:0 12px 28px rgba(0,0,0,.16)!important;
}
.phraseCard:not(.activeLesson){display:none!important}
.phraseTop{
  display:flex!important;
  align-items:center!important;
  justify-content:space-between!important;
  gap:8px!important;
  margin-bottom:8px!important;
}
.num{width:30px!important;height:30px!important;font-size:15px!important;flex:0 0 30px}
.phraseHeadLeft{display:flex;align-items:center;gap:8px;min-width:0}
.phraseTitle{
  font-size:18px!important;
  line-height:1.14!important;
  font-weight:950!important;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.scene{font-size:12px!important;color:#c7d2fe!important}
.ktvMiniCtrl{display:flex;gap:7px;align-items:center;flex:0 0 auto}
.ktvBtn{
  border:1px solid rgba(96,165,250,.32);
  background:rgba(59,130,246,.15);
  color:#dbeafe;
  border-radius:999px;
  width:34px;height:34px;
  display:grid;place-items:center;
  font-weight:950;
  cursor:pointer;
}
.ktvBtn.play{
  width:42px;height:42px;
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  color:white;
  box-shadow:0 8px 18px rgba(37,99,235,.28);
}
.ktvHint{
  color:#9fb4d1;
  font-size:12px;
  margin:0 0 8px 38px;
}

/* 每行：英文會亮、中文只看、日文會亮 */
.langLine{
  grid-template-columns:42px 1fr 34px!important;
  gap:8px!important;
  padding:8px 0!important;
  transition:.18s ease;
}
.lang{font-size:12px!important;padding:6px 4px!important;border-radius:9px!important}
.text .main{
  font-size:18px!important;
  line-height:1.36!important;
  font-weight:900!important;
  color:#dbeafe!important;
  transition:.18s ease;
}
.text .hint{font-size:11px!important;margin-top:2px!important}
.speak{width:34px!important;height:34px!important;font-size:16px!important}

/* 中文不播放，不顯示喇叭 */
.langLine.zh .speak{display:none!important}
.langLine.zh .hint{color:#9fb4d1!important}
.langLine.zh .text{cursor:default!important}

/* KTV 高亮 */
.langLine.ktv-active{
  margin-left:-4px;margin-right:-4px;
  padding-left:4px!important;padding-right:4px!important;
  background:linear-gradient(90deg,rgba(59,130,246,.20),rgba(96,165,250,.08));
  border-radius:14px;
}
.langLine.ktv-active .main{
  color:#ffffff!important;
  text-shadow:0 0 18px rgba(96,165,250,.48);
}
.langLine.ktv-active .lang{
  background:#2563eb!important;
  color:#fff!important;
}
.langLine.ktv-done .main{color:#7dd3fc!important}

/* 輕量逐字感：整句高亮，避免做逐字造成手機卡 */
.brandCta,.bottomNav{display:none!important}

@media(max-width:390px){
  .app{padding-left:8px!important;padding-right:8px!important}
  .hero,.heroSlide{min-height:176px!important}
  .heroPlayHint{width:60px;height:60px;font-size:27px}
  .tab{font-size:13px!important;padding:8px 1px!important}
  .phraseTitle{font-size:17px!important}
  .text .main{font-size:17px!important}
  .langLine{grid-template-columns:40px 1fr 32px!important}
}


/* === V8：R2 圖片架構 + 手機照片完整顯示 + KTV 字幕 === */
.hero{
  background:#071225!important;
  min-height:205px!important;
}
.heroTrack{height:100%!important}
.heroSlide{
  background-size:cover!important;
  background-position:center!important;
  min-height:205px!important;
  overflow:hidden!important;
}
.heroSlide::before{
  content:"";
  position:absolute;
  inset:-18px;
  background-image:inherit;
  background-size:cover;
  background-position:center;
  filter:blur(14px);
  transform:scale(1.08);
  opacity:.72;
}
.heroSlide::after{
  background:linear-gradient(180deg,rgba(5,12,24,.08),rgba(5,12,24,.12) 52%,rgba(5,12,24,.42) 100%)!important;
}
.heroPhotoContain{
  position:absolute;
  inset:0;
  z-index:2;
  background-repeat:no-repeat;
  background-position:center;
  background-size:contain;
}
.heroPlayHint,.dots,.heroArrow{z-index:8!important}
.dots{bottom:8px!important}

@media(max-width:430px){
  .hero,.heroSlide{min-height:196px!important}
}
@media(max-width:390px){
  .hero,.heroSlide{min-height:184px!important}
}


/* === V9：照片清晰、不跳空白；用 img 載入，失敗自動跳下一張 === */
.hero{
  background:#071225!important;
  min-height:220px!important;
  border-radius:22px!important;
  overflow:hidden!important;
}
.heroTrack{height:100%!important}
.heroSlide{
  min-height:220px!important;
  position:relative!important;
  overflow:hidden!important;
  background:#071225!important;
}
.heroSlide::before{
  content:"";
  position:absolute;
  inset:-20px;
  z-index:1;
  background-image:var(--bg-img);
  background-repeat:no-repeat;
  background-position:center;
  background-size:cover;
  filter:blur(12px);
  transform:scale(1.08);
  opacity:.55;
}
.heroSlide::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  background:linear-gradient(180deg,rgba(5,12,24,.04),rgba(5,12,24,.08) 52%,rgba(5,12,24,.34) 100%)!important;
}
.heroPhotoImg{
  position:absolute;
  inset:0;
  z-index:3;
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  display:block;
  opacity:1;
}
.heroPhotoContain{display:none!important}
.heroPlayHint,.dots,.heroArrow{z-index:8!important}
.heroPlayHint{
  background:rgba(15,23,42,.28)!important;
  border:2px solid rgba(255,255,255,.86)!important;
}
.heroSlide.is-broken{
  display:none!important;
}
@media(max-width:430px){
  .hero,.heroSlide{min-height:204px!important}
}
@media(max-width:390px){
  .hero,.heroSlide{min-height:192px!important}
}


/* === V10：照片自動剪裁填滿，不顯示中央播放符號 === */
.hero{
  min-height:220px!important;
  background:#071225!important;
  cursor:pointer!important;
}
.heroSlide{
  min-height:220px!important;
  background:#071225!important;
}
.heroSlide::before{
  opacity:.35!important;
  filter:blur(10px)!important;
}
.heroSlide::after{
  background:linear-gradient(180deg,rgba(5,12,24,.02),rgba(5,12,24,.04) 58%,rgba(5,12,24,.24) 100%)!important;
}

/* 重點：自動剪裁，填滿畫面，不再左右留模糊邊 */
.heroPhotoImg{
  width:100%!important;
  height:100%!important;
  object-fit:cover!important;
  object-position:center!important;
  display:block!important;
}

/* 不要中央大播放符號，避免擋照片 */
.heroPlayHint{
  display:none!important;
}

/* 照片可點擊即可播放；只留下左右切換與 dots */
.heroArrow{
  width:34px!important;
  height:34px!important;
  opacity:.82!important;
}
.dots{
  bottom:8px!important;
}

@media(max-width:430px){
  .hero,.heroSlide{min-height:204px!important}
}
@media(max-width:390px){
  .hero,.heroSlide{min-height:190px!important}
}


/* === V11：照片區不顯示中央圓形/三角播放符號；語速 0.8 === */
#heroPlayHint,
.heroPlayHint,
.hero .playBig,
.heroSlide .playBig,
.heroPhotoContain .playBig,
.hero > button:not(.heroArrow),
.heroTrack button,
.heroSlide button {
  display:none!important;
  visibility:hidden!important;
  opacity:0!important;
  pointer-events:none!important;
}

/* 照片仍可直接點擊播放/暫停 */
.hero,
.heroTrack,
.heroSlide,
.heroPhotoImg {
  cursor:pointer!important;
}

/* 照片自動剪裁填滿，保留清楚畫面 */
.heroPhotoImg{
  object-fit:cover!important;
  object-position:center!important;
}

/* 只保留左右切換箭頭和下方圓點 */
.heroArrow{
  display:grid!important;
  visibility:visible!important;
  opacity:.82!important;
  pointer-events:auto!important;
}
.dots{
  display:flex!important;
  visibility:visible!important;
  opacity:1!important;
}


/* === V12：修正 null onclick 錯誤；照片中央不放播放符號；語速 0.8 === */
#heroPlayHint,
.heroPlayHint,
.hero .playBig,
.heroSlide .playBig,
.heroPhotoContain .playBig,
.hero > button:not(.heroArrow),
.heroTrack button,
.heroSlide button {
  display:none!important;
  visibility:hidden!important;
  opacity:0!important;
  pointer-events:none!important;
}
.hero,
.heroTrack,
.heroSlide,
.heroPhotoImg {
  cursor:pointer!important;
}
.heroPhotoImg{
  object-fit:cover!important;
  object-position:center!important;
}
.heroArrow{
  display:grid!important;
  visibility:visible!important;
  opacity:.82!important;
  pointer-events:auto!important;
}
.dots{
  display:flex!important;
  visibility:visible!important;
  opacity:1!important;
}

}

<script>
const params = new URLSearchParams(location.search);
const ref = (params.get('ref') || '').trim();

const FALLBACK_IMG = "linear-gradient(135deg,#1e3a8a,#0f172a)";

// V3：支援 assets/morning/photos.json 隨機抽 5 張照片。
// GitHub Pages 不能直接讀取資料夾清單，所以 500 張照片要搭配 photos.json。
let PHOTO_POOL = [
  "assets/morning/hiking-01.jpg",
  "assets/morning/hiking-02.jpg",
  "assets/morning/life-01.jpg",
  "assets/morning/coffee-01.jpg",
  "assets/morning/life-02.jpg"
];

let SLIDES = [];

async function loadPhotoPool(){
  const p = new URLSearchParams(location.search);
  const photosJsonUrl =
    p.get("photos") ||
    window.BW_MORNING_PHOTOS_JSON ||
    "assets/morning/photos.json";

  try{
    const sep = photosJsonUrl.includes("?") ? "&" : "?";
    const r = await fetch(photosJsonUrl + sep + "v=" + Date.now(), { cache:"no-store" });
    if(!r.ok) throw new Error("photos.json HTTP " + r.status);
    const data = await r.json();
    const arr = Array.isArray(data) ? data : (Array.isArray(data.photos) ? data.photos : []);
    const cleaned = arr
      .map(x => typeof x === "string" ? x : (x && (x.url || x.src || x.file || x.path)))
      .filter(Boolean)
      .map(x => String(x).trim())
      .filter(Boolean);
    if(cleaned.length) PHOTO_POOL = cleaned;
    console.log("[morning] photos loaded:", PHOTO_POOL.length, "from", photosJsonUrl);
  }catch(err){
    console.warn("[morning] photos.json not found, use built-in photos", err);
  }
}

function shuffleCopy(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildRandomSlides(){
  const picks = shuffleCopy(PHOTO_POOL.filter(Boolean)).slice(0, 5);
  const titles = [
    ["早安，今天一起走一段路", "一句英文，一句日文，讓語言變成生活。", "Morning Walk"],
    ["山路很長，但每天一點就會到", "Small steps every day make a big difference.", "Daily Progress"],
    ["生活裡的小句子，就是最好的教材", "English・中文・日本語，一起慢慢累積。", "Life English"],
    ["早晨的光，適合重新開始", "Every day is a new beginning.", "New Start"],
    ["把今天過成值得記得的一天", "Let language become part of your life.", "BookWide"]
  ];
  SLIDES = picks.map((img, i) => ({
    title: titles[i % titles.length][0],
    sub: titles[i % titles.length][1],
    tag: titles[i % titles.length][2],
    img,
    fallback: [
      "linear-gradient(135deg,#14532d,#1e3a8a)",
      "linear-gradient(135deg,#0f766e,#1e293b)",
      "linear-gradient(135deg,#7c2d12,#0f172a)",
      "linear-gradient(135deg,#1d4ed8,#0f172a)",
      "linear-gradient(135deg,#581c87,#0f172a)"
    ][i % 5]
  }));
}

const LESSONS = [
  {
    scene:"早安健行",
    title:"Morning Hiking English",
    image:"assets/morning/hiking-01.jpg",
    en:"Let’s enjoy a peaceful hike this morning.",
    zh:"今天早上一起享受一場輕鬆的健行。",
    ja:"今朝は気持ちよくハイキングを楽しみましょう。"
  },
  {
    scene:"雨後小徑",
    title:"Beautiful Trail",
    image:"assets/morning/hiking-02.jpg",
    en:"The trail is beautiful after the rain.",
    zh:"雨後的小徑特別美麗。",
    ja:"雨上がりの道はとてもきれいです。"
  },
  {
    scene:"出門提醒",
    title:"Bring Enough Water",
    image:"assets/morning/life-01.jpg",
    en:"Don’t forget to bring enough water.",
    zh:"別忘了帶足夠的水。",
    ja:"十分な水を持っていくのを忘れないでください。"
  },
  {
    scene:"每日鼓勵",
    title:"New Beginning",
    image:"assets/morning/coffee-01.jpg",
    en:"Every day is a new beginning.",
    zh:"每一天，都是新的開始。",
    ja:"毎日は新しい始まりです。"
  },
  {
    scene:"慢慢進步",
    title:"Small Steps",
    image:"assets/morning/life-02.jpg",
    en:"Small steps every day make a big difference.",
    zh:"每天一小步，會累積成很大的改變。",
    ja:"毎日の小さな一歩が、大きな変化を生みます。"
  }
];


function photoForLesson(index, fallback){
  if(!PHOTO_POOL || !PHOTO_POOL.length) return fallback;
  return PHOTO_POOL[index % PHOTO_POOL.length] || fallback;
}

let slideIndex = 0;
let activeIndex = 0;
let speaking = false;
let timer = null;
let progressTimer = null;
let elapsed = 0;
let rate = 0.8;
let shadowMode = false;

const $ = id => document.getElementById(id);
const toast = (msg) => {
  const el = $("toast");
  el.textContent = msg || "已播放發音";
  el.classList.add("show");
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove("show"),1300);
};


function applyRandomLessonImages(){
  LESSONS.forEach((l, i)=>{
    l.image = photoForLesson(i, l.image);
  });
}

function setupRefLinks(){
  const q = ref ? `?ref=${encodeURIComponent(ref)}` : "";
  $("startLearning").href = "./pricing.html" + q;
}

function imageStyle(img, fallback){
  const safe = safeImgUrl(img);
  return `background-image:url('${safe}'),${fallback || FALLBACK_IMG}`;
}


function safeImgUrl(url){
  const raw = String(url || "").trim();
  if(!raw) return "";
  try{
    return encodeURI(raw).replace(/'/g, "%27").replace(/\)/g, "%29").replace(/\(/g, "%28");
  }catch(e){
    return raw.replace(/'/g, "%27").replace(/\)/g, "%29").replace(/\(/g, "%28");
  }
}
function cssUrlVar(url){
  const safe = safeImgUrl(url);
  return `--bg-img:url('${safe}')`;
}

function renderSlides(){
  const track = $("heroTrack");
  track.innerHTML = SLIDES.map((s,i) => `
    <div class="heroSlide" data-slide="${i}" style="${cssUrlVar(s.img)}">
      <img class="heroPhotoImg" src="${safeImgUrl(s.img)}" alt="" loading="${i < 2 ? 'eager' : 'lazy'}" decoding="async"
           onerror="this.closest('.heroSlide')?.classList.add('is-broken'); window.__morningImageBroken && window.__morningImageBroken();" />
    </div>
  `).join("");
  $("dots").innerHTML = SLIDES.map((_,i)=>`<span class="dot ${i===slideIndex?'active':''}"></span>`).join("");
  updateSlide();
  preloadNextPhotos();
}
function updateSlide(){
  const slides = [...document.querySelectorAll(".heroSlide")];
  if(slides.length){
    let guard = 0;
    while(slides[slideIndex]?.classList.contains("is-broken") && guard < slides.length){
      slideIndex = (slideIndex + 1) % slides.length;
      guard++;
    }
  }
  $("heroTrack").style.transform = `translateX(${-slideIndex*100}%)`;
  [...$("dots").children].forEach((d,i)=>d.classList.toggle("active",i===slideIndex));
  const item = LESSONS[activeIndex] || LESSONS[0];
  if($("lessonThumb")) $("lessonThumb").style.cssText = imageStyle(item.image, SLIDES[slideIndex]?.fallback);
}
window.__morningImageBroken = function(){
  const slides = [...document.querySelectorAll(".heroSlide")];
  if(slides[slideIndex]?.classList.contains("is-broken")){
    nextSlide();
  }
};
function preloadNextPhotos(){
  const urls = [];
  for(let k=1;k<=3;k++){
    const s = SLIDES[(slideIndex+k) % SLIDES.length];
    if(s && s.img) urls.push(safeImgUrl(s.img));
  }
  urls.forEach(u=>{
    const img = new Image();
    img.src = u;
  });
}
function nextSlide(){ slideIndex=(slideIndex+1)%SLIDES.length; updateSlide(); preloadNextPhotos(); }
function prevSlide(){ slideIndex=(slideIndex-1+SLIDES.length)%SLIDES.length; updateSlide(); preloadNextPhotos(); }

function renderPhrases(){
  const root = $("phraseStack");
  root.innerHTML = LESSONS.map((l,i)=>`
    <article class="phraseCard ${i===activeIndex?'activeLesson':''}" data-i="${i}">
      <div class="phraseTop">
        <div class="phraseHeadLeft">
          <div class="num">${i+1}</div>
          <div style="min-width:0">
            <div class="phraseTitle">${l.title}</div>
            <div class="scene">${l.scene}</div>
          </div>
        </div>
        <div class="ktvMiniCtrl">
          <button class="ktvBtn" type="button" data-prev="${i}">‹</button>
          <button class="ktvBtn play" type="button" data-play="${i}">▶</button>
          <button class="ktvBtn" type="button" data-next="${i}">›</button>
        </div>
      </div>
      <div class="ktvHint">點照片或 ▶ 播放；只念英文／日文，中文只看。</div>
      ${lineHtml("EN", "en", l.en, "en-US", true, "點擊播放英文")}
      ${lineHtml("中", "zh", l.zh, "zh-TW", false, "中文只供閱讀")}
      ${lineHtml("日", "ja", l.ja, "ja-JP", true, "點擊播放日文")}
    </article>
  `).join("");

  root.querySelectorAll(".speak").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const text = btn.dataset.text;
      const lang = btn.dataset.lang;
      speak(text, lang, btn);
    });
  });
  updateLessonInfo();
}
function lineHtml(label, cls, text, lang, canSpeak=true, hint="點擊播放發音"){
  return `
    <div class="langLine ${cls}">
      <div class="lang ${cls}">${label}</div>
      <div class="text ${canSpeak ? 'clickable' : ''}" ${canSpeak ? 'role="button" tabindex="0"' : ''} data-text="${escapeAttr(text)}" data-lang="${lang}">
        <div class="main">${text}</div>
        <div class="hint">${hint}</div>
      </div>
      ${canSpeak
        ? `<button class="speak" type="button" data-text="${escapeAttr(text)}" data-lang="${lang}" title="播放發音">🔊</button>`
        : `<span class="speak" aria-hidden="true"></span>`}
    </div>
  `;
}
function escapeAttr(s){return String(s).replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;");}

function speak(text, lang, btn){
  try{ speechSynthesis.cancel(); }catch(e){}
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = rate || 0.8;
  u.pitch = 1;
  speaking = true;
  if(btn) btn.classList.add("playing");
  u.onend = u.onerror = () => {
    speaking = false;
    if(btn) btn.classList.remove("playing");
  };
  speechSynthesis.speak(u);
  toast(lang==="en-US" ? "播放英文發音" : "播放日文發音");
}

document.addEventListener("click", e=>{
  const t = e.target.closest(".text.clickable");
  if(t){
    speak(t.dataset.text, t.dataset.lang, t.closest(".langLine")?.querySelector(".speak"));
  }
});

function updateLessonInfo(){
  const item = LESSONS[activeIndex];
  $("lessonTitle").textContent = item.title;
  $("lessonSub").textContent = `${item.scene}｜英語＋日語發音・中文閱讀`;
  $("lessonThumb").style.cssText = imageStyle(item.image, SLIDES[slideIndex]?.fallback);
  $("heroLessonTitle").textContent = item.title;
  $("heroLessonSub").textContent = `${item.scene}｜英語＋日語發音・中文閱讀`;
  [...document.querySelectorAll(".phraseCard")].forEach((c,i)=>{
    c.classList.toggle("activeLesson", i===activeIndex);
    c.style.outline = i===activeIndex ? "2px solid rgba(96,165,250,.28)" : "0";
  });
}

async function playCurrentAll(){
  stopProgress();
  clearKtvHighlight();
  const l = LESSONS[activeIndex];
  elapsed = 0;
  startProgress();
  setHeroPlaying(true);
  await speakSequence([
    [l.en,"en-US","en"],
    [l.ja,"ja-JP","ja"]
  ]);
  clearKtvHighlight();
  stopProgress(true);
  setHeroPlaying(false);
  if(shadowMode && activeIndex < LESSONS.length-1){
    activeIndex++;
    updateLessonInfo();
    setTimeout(playCurrentAll,420);
  }
}
function clearKtvHighlight(){
  document.querySelectorAll(".langLine").forEach(el=>{
    el.classList.remove("ktv-active","ktv-done");
  });
}
function setKtvHighlight(cls){
  document.querySelectorAll(".phraseCard.activeLesson .langLine").forEach(el=>{
    el.classList.remove("ktv-active");
  });
  const row = document.querySelector(`.phraseCard.activeLesson .langLine.${cls}`);
  if(row){
    row.classList.add("ktv-active");
    row.scrollIntoView({behavior:"smooth", block:"nearest"});
  }
}
function markKtvDone(cls){
  const row = document.querySelector(`.phraseCard.activeLesson .langLine.${cls}`);
  if(row){
    row.classList.remove("ktv-active");
    row.classList.add("ktv-done");
  }
}
function setHeroPlaying(on){
  // V11：照片中央不顯示播放符號，只更新字幕區小播放鍵。
  document.querySelectorAll(".ktvBtn.play").forEach(b=>b.textContent = on ? "❚❚" : "▶");
}
function speakSequence(items){
  return new Promise(resolve=>{
    let idx=0;
    const next=()=>{
      if(idx>=items.length){ resolve(); return; }
      const [text,lang,cls] = items[idx++];
      try{ speechSynthesis.cancel(); }catch(e){}
      setKtvHighlight(cls);
      const u = new SpeechSynthesisUtterance(text);
      u.lang=lang; u.rate=rate || 0.8;
      speaking=true;
      u.onend=()=>{ speaking=false; markKtvDone(cls); setTimeout(next,260); };
      u.onerror=()=>{ speaking=false; markKtvDone(cls); setTimeout(next,260); };
      speechSynthesis.speak(u);
    };
    next();
  });
}
function startProgress(){
  if($("btnPlayAll")) $("btnPlayAll").textContent = "⏸";
  $("heroPlayAll").textContent = "⏸";
  progressTimer = setInterval(()=>{
    elapsed += .25;
    const t = "00:" + String(Math.min(59,Math.floor(elapsed))).padStart(2,"0");
    const w = Math.min(100, (elapsed/60)*100) + "%";
    $("pTime").textContent = t;
    $("pBar").style.width = w;
    $("heroTime").textContent = t;
    $("heroBar").style.width = w;
  },250);
}
function stopProgress(done=false){
  if(progressTimer) clearInterval(progressTimer);
  progressTimer=null;
  $("btnPlayAll").textContent = "▶";
  $("heroPlayAll").textContent = "▶";
  if(done){
    $("pTime").textContent="01:00";$("pBar").style.width="100%";
    $("heroTime").textContent="01:00";$("heroBar").style.width="100%";
  }else{
    $("heroTime").textContent=$("pTime").textContent;
    $("heroBar").style.width=$("pBar").style.width || "0%";
  }
}
function stopAll(){
  try{ speechSynthesis.cancel(); }catch(e){}
  speaking = false;
  stopProgress();
  setHeroPlaying(false);
  clearKtvHighlight();
  document.querySelectorAll(".speak.playing").forEach(b=>b.classList.remove("playing"));
}

function sharePage(){
  const url = location.origin + location.pathname + (ref ? `?ref=${encodeURIComponent(ref)}` : "");
  const text = "BookWide 早安三語：每天一句英文・中文・日文，一起聽發音學語言。";
  if(navigator.share){
    navigator.share({title:"BookWide 早安三語", text, url}).catch(()=>{});
  }else{
    navigator.clipboard?.writeText(url);
    toast("已複製分享連結");
  }
}

$("prevSlide").onclick = prevSlide;
$("nextSlide").onclick = nextSlide;
$("btnPrevPhrase").onclick = ()=>{ stopAll(); activeIndex=(activeIndex-1+LESSONS.length)%LESSONS.length; updateLessonInfo(); document.querySelector(`[data-i="${activeIndex}"]`)?.scrollIntoView({behavior:"smooth",block:"nearest"}); };
$("btnNextPhrase").onclick = ()=>{ stopAll(); activeIndex=(activeIndex+1)%LESSONS.length; updateLessonInfo(); document.querySelector(`[data-i="${activeIndex}"]`)?.scrollIntoView({behavior:"smooth",block:"nearest"}); };
$("btnPlayAll").onclick = ()=> speaking ? stopAll() : playCurrentAll();
$("bigPlay").onclick = playCurrentAll;
$("shadowSwitch").onclick = ()=>{ shadowMode=!shadowMode; $("shadowSwitch").classList.toggle("on", shadowMode); toast(shadowMode?"跟讀模式開啟":"跟讀模式關閉"); };
$("btnShare").onclick = sharePage;
$("shareCta").onclick = sharePage;

document.addEventListener("click", e=>{
  const playBtn = e.target.closest("[data-play]");
  const prevBtn = e.target.closest("[data-prev]");
  const nextBtn = e.target.closest("[data-next]");
  if(playBtn){ e.preventDefault(); speaking ? stopAll() : playCurrentAll(); }
  if(prevBtn){ e.preventDefault(); $("btnPrevPhrase").onclick(); }
  if(nextBtn){ e.preventDefault(); $("btnNextPhrase").onclick(); }
});
if($("heroTrack")) $("heroTrack").onclick = ()=> speaking ? stopAll() : playCurrentAll();
if($("heroPlayHint")) if($("heroPlayHint")) $("heroPlayHint").onclick = (e)=>{ e.stopPropagation(); speaking ? stopAll() : playCurrentAll(); };

if($("heroPrevPhrase")) $("heroPrevPhrase").onclick = ()=> $("btnPrevPhrase").onclick();
if($("heroNextPhrase")) $("heroNextPhrase").onclick = ()=> $("btnNextPhrase").onclick();
if($("heroPlayAll")) $("heroPlayAll").onclick = ()=> speaking ? stopAll() : playCurrentAll();

(async function bootMorning(){
  await loadPhotoPool();
  buildRandomSlides();
  applyRandomLessonImages();
  renderSlides();
  renderPhrases();
  if($("rateText")) $("rateText").textContent = "0.8x";
  setupRefLinks();
  timer = setInterval(nextSlide, 4600);
})();

function showAutoplayHint(){
  const h = $("autoplayHint");
  if(!h) return;
  h.classList.add("show");
  clearTimeout(h._t);
  h._t = setTimeout(()=>h.classList.remove("show"), 2200);
}
function tryMorningAutoplay(){
  // Chrome/Safari 手機通常會擋「未互動自動發音」；
  // 桌機或部分 WebView 可能可直接播放。被擋時，第一次點畫面就補播。
  setTimeout(async ()=>{
    try{
      if(document.visibilityState === "hidden") return;
      await playCurrentAll();
    }catch(e){
      console.warn("[morning] autoplay blocked:", e);
      showAutoplayHint();
    }
  }, 650);
}
window.addEventListener("load", tryMorningAutoplay, { once:true });

// 如果瀏覽器擋自動播放，使用者第一次點任意位置就補播一次。
