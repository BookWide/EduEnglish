<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>BookWide 合歡山英日小旅行</title>
<style>
:root{
  --bg:#071225;
  --card:#0d1d35;
  --ink:#eef6ff;
  --muted:#9fb4d1;
  --blue:#3b82f6;
}
*{box-sizing:border-box}
html,body{
  margin:0;min-height:100%;
  background:radial-gradient(circle at 20% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);
  color:var(--ink);
  font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}
button,a{font:inherit}
a{color:inherit;text-decoration:none}
.app{max-width:520px;margin:0 auto;padding:10px 10px 28px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 0 8px}
.brand{display:flex;align-items:center;gap:8px;min-width:0}
.logo{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center;font-size:16px;flex:0 0 auto}
.brandText{min-width:0}
.brandText b{display:block;font-size:21px;line-height:1.05}
.brandText span{display:block;color:#b9cff0;font-size:12px;font-weight:850;margin-top:2px;white-space:nowrap}
.top a{font-size:13px;font-weight:850;border:1px solid rgba(148,163,184,.25);background:rgba(15,31,56,.78);border-radius:999px;padding:7px 11px}

.hero{position:relative;height:214px;border-radius:22px;overflow:hidden;background:#08172b;box-shadow:0 14px 34px rgba(0,0,0,.25);margin-bottom:9px;cursor:pointer}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:opacity .25s ease}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,0),rgba(5,12,24,.08) 62%,rgba(5,12,24,.42));pointer-events:none}
.heroNav{position:absolute;top:50%;transform:translateY(-50%);z-index:4;width:34px;height:34px;border:0;border-radius:99px;background:rgba(255,255,255,.78);color:#0f172a;font-size:20px;font-weight:950;cursor:pointer}
.heroNav.prev{left:8px}.heroNav.next{right:8px}
.dayPill{position:absolute;left:10px;bottom:10px;z-index:4;background:rgba(7,18,37,.76);backdrop-filter:blur(10px);border:1px solid rgba(148,163,184,.22);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#eaf3ff}
.photoMeta{position:absolute;left:10px;top:10px;z-index:4;background:rgba(7,18,37,.42);backdrop-filter:blur(6px);border:1px solid rgba(148,163,184,.14);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700;letter-spacing:.2px;color:rgba(239,246,255,.92)}
.hint{position:absolute;right:10px;bottom:10px;z-index:4;background:rgba(37,99,235,.76);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:white}

.card{border:1px solid rgba(85,136,206,.42);border-radius:21px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:12px;box-shadow:0 12px 28px rgba(0,0,0,.16)}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.title{min-width:0}
.title b{display:block;font-size:19px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title span{display:block;color:#c7d2fe;font-size:12px;font-weight:800;margin-top:2px}
.controls{display:flex;gap:7px;align-items:center}
.ctrl{border:1px solid rgba(96,165,250,.32);background:rgba(59,130,246,.15);color:#dbeafe;border-radius:999px;width:34px;height:34px;font-weight:950;cursor:pointer}
.ctrl.play{width:43px;height:43px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:white;box-shadow:0 8px 18px rgba(37,99,235,.28)}
.notice{color:#9fb4d1;font-size:12px;font-weight:800;margin:0 0 8px 0}
.lineItem{display:grid;grid-template-columns:42px 1fr 34px;gap:8px;align-items:center;padding:8px 0;border-top:1px dashed rgba(148,163,184,.18)}
.lineItem:first-of-type{border-top:0}
.lang{border-radius:9px;padding:6px 4px;text-align:center;font-weight:950;font-size:12px;background:#123054;color:#7dd3fc}
.lang.zh{background:rgba(34,197,94,.18);color:#86efac}
.lang.ja{background:rgba(139,92,246,.22);color:#c4b5fd}
.txt{font-size:18px;line-height:1.35;font-weight:900;color:#dbeafe}
.speak{width:34px;height:34px;border-radius:999px;border:1px solid rgba(96,165,250,.4);background:rgba(59,130,246,.18);color:#bfdbfe;cursor:pointer}
.lineItem.zh .speak{display:none}
.active{margin-left:-4px;margin-right:-4px;padding-left:4px;padding-right:4px;border-radius:14px;background:linear-gradient(90deg,rgba(59,130,246,.22),rgba(96,165,250,.08))}
.active .txt{color:#fff;text-shadow:0 0 18px rgba(96,165,250,.48)}
.active .lang{background:#2563eb;color:white}
.done .txt{color:#7dd3fc}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:99;background:rgba(15,23,42,.9);border:1px solid rgba(96,165,250,.35);color:#eaf3ff;padding:10px 14px;border-radius:999px;font-size:13px;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.28);display:none}
.toast.show{display:block}
@media(max-width:390px){
  .app{padding-left:8px;padding-right:8px}
  .hero{height:196px}
  .brandText b{font-size:20px}
  .brandText span{font-size:11px}
  .top a{font-size:12px;padding:6px 10px}
  .txt{font-size:17px}
  .photoMeta{font-size:10px;padding:3px 7px}
}
</style>
</head>
<body>
<div class="toast" id="toast">點一下畫面即可播放</div>

<main class="app">
  <section class="top">
    <div class="brand">
      <div class="logo">📘</div>
      <div class="brandText">
        <b>BookWide</b>
        <span id="headerSub">合歡山英日小旅行｜英日發音・中文閱讀</span>
      </div>
    </div>
    <a href="./account/learning-dashboard.html">控制台</a>
  </section>

  <section class="hero" id="hero" aria-label="合歡山照片輪播，點擊播放">
    <img id="photo" alt="BookWide morning photo" />
    <button class="heroNav prev" id="photoPrev" type="button">‹</button>
    <button class="heroNav next" id="photoNext" type="button">›</button>
    <div class="dayPill" id="dayPill">今日 Day 1</div>
    <div class="photoMeta" id="photoMeta">2026.5.10 合歡山</div>
    <div class="hint" id="playHint">點一下播放</div>
  </section>

  <section class="card">
    <div class="titleRow">
      <div class="title">
        <b id="title">Morning English</b>
        <span id="scene">合歡山小旅行</span>
      </div>
      <div class="controls">
        <button class="ctrl" id="prev" type="button">‹</button>
        <button class="ctrl play" id="play" type="button">▶</button>
        <button class="ctrl" id="next" type="button">›</button>
      </div>
    </div>
    <p class="notice">停在此頁會自動輪播合歡山照片；LINE 若擋自動發聲，點照片播放。</p>

    <div class="lineItem en" data-lang="en">
      <div class="lang">EN</div>
      <div class="txt" id="enText"></div>
      <button class="speak" id="enBtn" type="button">🔊</button>
    </div>
    <div class="lineItem zh" data-lang="zh">
      <div class="lang zh">中</div>
      <div class="txt" id="zhText"></div>
      <span></span>
    </div>
    <div class="lineItem ja" data-lang="ja">
      <div class="lang ja">日</div>
      <div class="txt" id="jaText"></div>
      <button class="speak" id="jaBtn" type="button">🔊</button>
    </div>
  </section>
</main>

<script>
const PHOTO_JSON = "assets/morning/photos.json";
const LESSON_JSON = "assets/morning/morning_lessons_30days.json";
const RATE = 0.8;
const SLIDE_MS = 4600;
const $ = id => document.getElementById(id);

let photos = [
  "assets/morning/hiking-01.jpg",
  "assets/morning/hiking-02.jpg",
  "assets/morning/life-01.jpg",
  "assets/morning/coffee-01.jpg",
  "assets/morning/life-02.jpg"
];

let lessons = [
  {day:1,scene:"合歡山出發",title:"Hehuan Mountain Trip",en:"Let’s enjoy the mountain view today.",zh:"今天一起欣賞合歡山的風景。",ja:"今日は山の景色を楽しみましょう。"}
];

let activeIndex = 0;
let photoIndex = 0;
let photoOrder = [];
let slideTimer = null;
let speaking = false;
let attemptedAutoplay = false;

function qs(){ return new URLSearchParams(location.search); }
function encUrl(u){ try{return encodeURI(String(u||""));}catch(e){return String(u||"");} }

function toast(msg){
  const t=$("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("show"),2200);
}

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}

async function fetchJson(url){
  const sep = url.includes("?") ? "&" : "?";
  const r = await fetch(url + sep + "v=" + Date.now(), {cache:"no-store"});
  if(!r.ok) throw new Error(url + " HTTP " + r.status);
  return await r.json();
}

async function loadData(){
  try{
    const p = qs();
    const photoUrl = p.get("photos") || PHOTO_JSON;
    const data = await fetchJson(photoUrl);
    const arr = Array.isArray(data) ? data : data.photos;
    if(Array.isArray(arr) && arr.length) photos = arr.filter(Boolean);
  }catch(e){ console.warn("[morning] photos fallback", e); }

  try{
    const p = qs();
    const lessonUrl = p.get("lessons") || LESSON_JSON;
    const data = await fetchJson(lessonUrl);
    const arr = Array.isArray(data) ? data : data.lessons;
    if(Array.isArray(arr) && arr.length){
      lessons = arr.map((x,i)=>({
        day:Number(x.day||i+1),
        scene:String(x.scene||`Day ${i+1}`),
        title:String(x.title||`Day ${i+1}`),
        en:String(x.en||""),
        zh:String(x.zh||""),
        ja:String(x.ja||"")
      })).filter(x=>x.en && x.zh && x.ja);
    }
  }catch(e){ console.warn("[morning] lessons fallback", e); }
}

function calendarIndex(){
  const d = Number(qs().get("day") || 0);
  if(d>=1) return Math.min(lessons.length-1, d-1);
  return Math.min(lessons.length-1, Math.min(30, new Date().getDate())-1);
}

function setupPhotoCycle(){
  photoOrder = shuffle(photos);
  if(!photoOrder.length) photoOrder = photos.slice(0, 1);
  photoIndex = 0;
  showPhoto(0);
  clearInterval(slideTimer);
  slideTimer = setInterval(()=>showPhoto(photoIndex + 1), SLIDE_MS);
}

function showPhoto(i){
  if(!photoOrder.length) return;
  photoIndex = (i + photoOrder.length) % photoOrder.length;
  const url = photoOrder[photoIndex];
  const img = $("photo");
  img.style.opacity = "0.15";
  img.onload = ()=>{ img.style.opacity = "1"; };
  img.onerror = ()=>{
    photoOrder.splice(photoIndex,1);
    if(!photoOrder.length) return;
    showPhoto(photoIndex);
  };
  img.src = encUrl(url);
  preloadNextPhotos();
}

function movePhoto(delta){
  showPhoto(photoIndex + delta);
  clearInterval(slideTimer);
  slideTimer = setInterval(()=>showPhoto(photoIndex + 1), SLIDE_MS);
}

function preloadNextPhotos(){
  if(!photoOrder.length) return;
  for(let k=1;k<=2;k++){
    const u = photoOrder[(photoIndex+k) % photoOrder.length];
    if(u){
      const img = new Image();
      img.src = encUrl(u);
    }
  }
}

function render(){
  const l = lessons[activeIndex] || lessons[0];
  $("title").textContent = l.title;
  $("scene").textContent = l.scene;
  $("enText").textContent = l.en;
  $("zhText").textContent = l.zh;
  $("jaText").textContent = l.ja;
  $("dayPill").textContent = `今日 Day ${l.day || activeIndex+1}`;
  $("headerSub").textContent = `今日 Day ${l.day || activeIndex+1}｜合歡山小旅行｜英日發音・中文閱讀`;
  clearMarks();
}

function clearMarks(){
  document.querySelectorAll(".lineItem").forEach(x=>x.classList.remove("active","done"));
}

function mark(cls, done=false){
  document.querySelectorAll(".lineItem").forEach(x=>x.classList.remove("active"));
  const row = document.querySelector(".lineItem."+cls);
  if(row){
    row.classList.add(done ? "done" : "active");
    row.scrollIntoView({behavior:"smooth",block:"nearest"});
  }
}

function speakOne(text, lang, cls){
  return new Promise(resolve=>{
    try{ speechSynthesis.cancel(); }catch(e){}
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = RATE;
    u.pitch = 1;
    speaking = true;
    mark(cls);
    u.onend = u.onerror = ()=>{
      mark(cls,true);
      setTimeout(resolve,220);
    };
    speechSynthesis.speak(u);
  });
}

async function playAll(){
  if(speaking){ stopAll(); return; }
  const l = lessons[activeIndex];
  if(!l) return;
  $("play").textContent = "❚❚";
  $("playHint").textContent = "播放中";
  clearMarks();
  await speakOne(l.en,"en-US","en");
  await speakOne(l.ja,"ja-JP","ja");
  speaking = false;
  $("play").textContent = "▶";
  $("playHint").textContent = "點一下播放";
}

function stopAll(){
  try{ speechSynthesis.cancel(); }catch(e){}
  speaking=false;
  $("play").textContent="▶";
  $("playHint").textContent="點一下播放";
  clearMarks();
}

function prevDay(){
  stopAll();
  activeIndex = (activeIndex - 1 + lessons.length) % lessons.length;
  render();
}

function nextDay(){
  stopAll();
  activeIndex = (activeIndex + 1) % lessons.length;
  render();
}

function attemptAutoplayOnce(){
  if(attemptedAutoplay) return;
  attemptedAutoplay = true;
  setTimeout(()=>{
    try{
      if(!speaking && document.visibilityState !== "hidden") playAll();
    }catch(e){
      toast("點一下畫面即可播放");
    }
  },700);
}

function bind(){
  $("hero").onclick = playAll;
  $("play").onclick = playAll;
  $("prev").onclick = prevDay;
  $("next").onclick = nextDay;
  $("enBtn").onclick = ()=>speakOne(lessons[activeIndex].en,"en-US","en");
  $("jaBtn").onclick = ()=>speakOne(lessons[activeIndex].ja,"ja-JP","ja");

  $("photoPrev").onclick = (e)=>{ e.stopPropagation(); movePhoto(-1); };
  $("photoNext").onclick = (e)=>{ e.stopPropagation(); movePhoto(1); };

  document.addEventListener("pointerdown",()=>{
    if(!attemptedAutoplay){
      attemptedAutoplay = true;
      if(!speaking) playAll();
    }
  }, {once:true,passive:true});
}

(async function boot(){
  await loadData();
  activeIndex = calendarIndex();
  setupPhotoCycle();
  render();
  bind();
  attemptAutoplayOnce();
})();
</script>
</body>
</html>
