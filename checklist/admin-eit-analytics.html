<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BookWide Admin｜心理測驗數據中心</title>
  <style>
    :root{--navy:#0f1c31;--blue:#2563eb;--line:#d9e3f0;--muted:#64748b;--bg:#f3f7fc;--card:#fff}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:#10213b;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif}
    header{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .back{color:#fff;text-decoration:none;border:1px solid #64748b;border-radius:999px;padding:8px 13px}
    h1{font-size:21px;margin:0}.sub{font-size:12px;color:#b9c7db;margin-top:3px}
    .actions{display:flex;gap:8px;align-items:center}
    button{border:0;border-radius:999px;padding:9px 15px;font-weight:800;cursor:pointer}
    .primary{background:var(--blue);color:#fff}.ghost{background:#fff;color:#1d4ed8;border:1px solid #b8cff8}
    main{max-width:1280px;margin:0 auto;padding:22px}
    .status{margin-bottom:14px;color:var(--muted);font-size:13px}
    .summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .metric,.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 24px rgba(15,28,49,.05)}
    .metric{padding:18px}.metric .label{font-size:13px;color:var(--muted);font-weight:800}.metric .value{font-size:30px;font-weight:950;margin-top:8px}.metric .note{font-size:12px;color:#7c8ca2;margin-top:6px}
    .grid{display:grid;grid-template-columns:1.3fr .7fr;gap:18px}
    .panel{padding:18px;margin-bottom:18px}.panel h2{font-size:18px;margin:0 0 5px}.panel p{margin:0 0 15px;color:var(--muted);font-size:13px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:11px 9px;border-bottom:1px solid #e5ebf3;text-align:left;vertical-align:middle}
    th{font-size:12px;color:#64748b;background:#f8fafc}
    tbody tr:hover{background:#f8fbff}
    .num{text-align:right;font-variant-numeric:tabular-nums}
    .bar{height:10px;background:#e8eef7;border-radius:999px;overflow:hidden;min-width:100px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#3b82f6,#7c3aed);border-radius:999px}
    .distGroup{border:1px solid #e1e8f2;border-radius:14px;padding:13px;margin-bottom:12px}
    .distTitle{font-weight:900;margin-bottom:10px}.distRow{display:grid;grid-template-columns:minmax(120px,1fr) 2fr 64px;gap:10px;align-items:center;margin:8px 0;font-size:13px}
    .empty{padding:28px;text-align:center;color:#71839c;border:1px dashed #cbd8e8;border-radius:14px}
    .warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:10px 12px;margin-bottom:14px;display:none}
    @media(max-width:900px){.summary{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}main{padding:14px}}
    @media(max-width:540px){.summary{grid-template-columns:1fr}.actions{flex-wrap:wrap}.distRow{grid-template-columns:1fr}.num{text-align:left}}
  </style>
</head>
<body>
<header>
  <div class="brand">
    <a class="back" href="../admin.html">← 回後台</a>
    <div><h1>心理測驗數據中心</h1><div class="sub">BookWide EIT Analytics</div></div>
  </div>
  <div class="actions">
    <button class="ghost" id="btn7">最近 7 天</button>
    <button class="ghost" id="btn30">最近 30 天</button>
    <button class="primary" id="btnRefresh">重新整理</button>
  </div>
</header>

<main>
  <div class="warn" id="warn"></div>
  <div class="status" id="status">正在確認管理員權限…</div>

  <section class="summary">
    <div class="metric"><div class="label">最近 7 天完成人數</div><div class="value" id="m7">—</div><div class="note">不重複會員數</div></div>
    <div class="metric"><div class="label">最近 7 天完成筆數</div><div class="value" id="m7rows">—</div><div class="note">包含不同測驗</div></div>
    <div class="metric"><div class="label">全部正式完成筆數</div><div class="value" id="mall">—</div><div class="note">僅完整 report_html</div></div>
    <div class="metric"><div class="label">有資料的測驗數</div><div class="value" id="mtests">—</div><div class="note">目前已有正式結果</div></div>
  </section>

  <div class="grid">
    <section>
      <div class="panel">
        <h2>13 套各自完成數與平均分數</h2>
        <p id="rangeLabel">統計範圍：全部正式結果</p>
        <div id="tableWrap"></div>
      </div>
    </section>
    <aside>
      <div class="panel">
        <h2>各結果類型分布</h2>
        <p>依測驗分組，顯示各結論類型人數與比例。</p>
        <div id="distWrap"></div>
      </div>
    </aside>
  </div>
</main>

<script type="module">
  import { supabase, BW } from '../supa.js?v=20251109g';

  const $=s=>document.querySelector(s);
  let days=0;
  let testIndex=[];

  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmt=n=>Number(n||0).toLocaleString('zh-TW');
  const avg=n=>Number.isFinite(Number(n))?Number(n).toFixed(1):'—';

  async function loadTestIndex(){
    try{
      const r=await fetch('../data/monk/aptitude/eit-tests.json?v='+Date.now(),{cache:'no-store'});
      if(r.ok) testIndex=await r.json();
    }catch(e){}
  }
  function titleFor(slug, fallback){
    const x=testIndex.find(t=>String(t.file||'').replace(/\.json$/,'')===slug);
    return x?.title || fallback || slug;
  }

  async function load(){
    $('#status').textContent='讀取心理測驗統計中…';
    $('#warn').style.display='none';
    const {data,error}=await supabase.rpc('admin_get_eit_analytics',{p_days:days});
    if(error){
      console.error(error);
      $('#warn').textContent='讀取失敗：'+(error.message||error.code||'未知錯誤');
      $('#warn').style.display='block';
      $('#status').textContent='載入失敗';
      return;
    }
    render(data||{});
    $('#status').textContent='最後更新：'+new Date().toLocaleString('zh-TW');
  }

  function render(d){
    const s=d.summary||{};
    $('#m7').textContent=fmt(s.users_7d);
    $('#m7rows').textContent=fmt(s.completions_7d);
    $('#mall').textContent=fmt(s.total_completions);
    $('#mtests').textContent=fmt(s.active_tests);

    const rows=Array.isArray(d.tests)?d.tests:[];
    const maxCount=Math.max(1,...rows.map(r=>Number(r.completion_count||0)));
    $('#rangeLabel').textContent=days?`統計範圍：最近 ${days} 天正式結果`:'統計範圍：全部正式結果';
    $('#tableWrap').innerHTML=rows.length?`
      <table>
        <thead><tr><th>#</th><th>測驗</th><th class="num">完成數</th><th>相對量</th><th class="num">平均分數</th><th class="num">平均百分比</th></tr></thead>
        <tbody>${rows.map((r,i)=>{
          const pct=Math.round(Number(r.completion_count||0)/maxCount*100);
          return `<tr>
            <td>${i+1}</td>
            <td><b>${esc(titleFor(r.test_slug,r.test_title))}</b><div style="font-size:11px;color:#71839c">${esc(r.test_slug)}</div></td>
            <td class="num">${fmt(r.completion_count)}</td>
            <td><div class="bar"><i style="width:${pct}%"></i></div></td>
            <td class="num">${avg(r.average_score)} / ${avg(r.average_max_score)}</td>
            <td class="num">${avg(r.average_percentage)}%</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`:'<div class="empty">目前沒有正式測驗結果</div>';

    const groups=Array.isArray(d.result_distribution)?d.result_distribution:[];
    const bySlug=new Map();
    groups.forEach(r=>{
      if(!bySlug.has(r.test_slug)) bySlug.set(r.test_slug,[]);
      bySlug.get(r.test_slug).push(r);
    });
    $('#distWrap').innerHTML=bySlug.size?[...bySlug.entries()].map(([slug,list])=>{
      const total=list.reduce((a,x)=>a+Number(x.count||0),0)||1;
      return `<div class="distGroup">
        <div class="distTitle">${esc(titleFor(slug,list[0]?.test_title))}</div>
        ${list.map(x=>{
          const p=Number(x.count||0)/total*100;
          return `<div class="distRow">
            <div>${esc(x.result_title_zh||x.result_key||'未分類')}</div>
            <div class="bar"><i style="width:${p}%"></i></div>
            <div class="num">${fmt(x.count)}｜${p.toFixed(1)}%</div>
          </div>`;
        }).join('')}
      </div>`;
    }).join(''):'<div class="empty">目前沒有結果類型資料</div>';
  }

  async function init(){
    await BW.requireAdmin();
    await loadTestIndex();
    await load();
  }

  $('#btnRefresh').onclick=load;
  $('#btn7').onclick=()=>{days=7;load()};
  $('#btn30').onclick=()=>{days=30;load()};
  init();
</script>
</body>
</html>
