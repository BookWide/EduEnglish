<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BookWide Admin｜心理測驗數據中心</title>
<style>
:root{--navy:#071426;--blue:#2f6df6;--purple:#7b45f6;--green:#16a36a;--red:#e04f5f;--amber:#e59b17;--line:#dbe5f1;--muted:#6b7c93;--bg:#edf3fa;--card:#fff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#10213b;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif}
header{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,#071426,#112744);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 8px 24px rgba(3,15,31,.18)}
.brand{display:flex;align-items:center;gap:12px}.back{color:#fff;text-decoration:none;border:1px solid #64748b;border-radius:999px;padding:8px 13px}h1{font-size:21px;margin:0}.sub{font-size:12px;color:#b9c7db;margin-top:3px}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}button,.linkBtn{border:0;border-radius:999px;padding:9px 15px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
.primary{background:var(--blue);color:#fff}.ghost{background:#fff;color:#1d4ed8;border:1px solid #b8cff8}.public{background:#16a36a;color:#fff}
main{max-width:1380px;margin:0 auto;padding:22px}.status{margin-bottom:14px;color:var(--muted);font-size:13px}.warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:10px 12px;margin-bottom:14px;display:none}
.ticker{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.metric,.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(15,28,49,.06)}
.metric{padding:17px;position:relative;overflow:hidden}.metric:after{content:"";position:absolute;right:-30px;bottom:-35px;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,rgba(47,109,246,.14),rgba(123,69,246,.08))}
.metric .label{font-size:12px;color:var(--muted);font-weight:900}.metric .value{font-size:31px;font-weight:950;margin-top:8px}.metric .note{font-size:11px;color:#7c8ca2;margin-top:6px}
.layout{display:grid;grid-template-columns:1.45fr .75fr;gap:16px}.panel{padding:18px;margin-bottom:16px}.panel h2{font-size:18px;margin:0 0 5px}.panel p{margin:0 0 14px;color:var(--muted);font-size:13px}
table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:11px 9px;border-bottom:1px solid #e5ebf3;text-align:left;vertical-align:middle}th{font-size:12px;color:#64748b;background:#f8fafc;position:sticky;top:0}.num{text-align:right;font-variant-numeric:tabular-nums}
.spark{height:12px;background:#e8eef7;border-radius:999px;overflow:hidden;min-width:110px}.spark i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--purple))}
.scoreBadge{display:inline-flex;min-width:62px;justify-content:center;border-radius:999px;padding:5px 8px;font-weight:900;background:#eef4ff;color:#2455bb}
.moveUp{color:var(--green);font-weight:900}.moveDown{color:var(--red);font-weight:900}.moveFlat{color:#64748b;font-weight:900}
.distGroup{border:1px solid #e1e8f2;border-radius:14px;padding:13px;margin-bottom:12px}.distTitle{font-weight:950;margin-bottom:10px}.distRow{display:grid;grid-template-columns:minmax(120px,1fr) 1.7fr 70px;gap:10px;align-items:center;margin:8px 0;font-size:13px}
.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.heatItem{border-radius:10px;padding:10px 6px;text-align:center;font-size:11px;background:#eef4ff}.heatItem b{display:block;font-size:17px;margin-top:3px}
.empty{padding:28px;text-align:center;color:#71839c;border:1px dashed #cbd8e8;border-radius:14px}
@media(max-width:980px){.ticker{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}main{padding:14px}}@media(max-width:560px){.ticker{grid-template-columns:1fr}.distRow{grid-template-columns:1fr}.num{text-align:left}}
</style>
</head>
<body>
<header>
  <div class="brand"><a class="back" href="../admin.html">← 回後台</a><div><h1>心理測驗數據中心</h1><div class="sub">BookWide EIT Analytics</div></div></div>
  <div class="actions"><a class="linkBtn public" href="../eit-market.html" target="_blank">查看前台大盤</a><button class="ghost" id="btn7">最近 7 天</button><button class="ghost" id="btn30">最近 30 天</button><button class="primary" id="btnRefresh">重新整理</button></div>
</header>
<main>
<div class="warn" id="warn"></div><div class="status" id="status">正在確認管理員權限…</div>
<section class="ticker">
  <div class="metric"><div class="label">最近 7 天完成人數</div><div class="value" id="m7">—</div><div class="note">不重複會員</div></div>
  <div class="metric"><div class="label">最近 7 天完成筆數</div><div class="value" id="m7rows">—</div><div class="note">包含不同測驗</div></div>
  <div class="metric"><div class="label">全部正式完成筆數</div><div class="value" id="mall">—</div><div class="note" id="sourceNote">會員＋免費訪客</div></div>
  <div class="metric"><div class="label">有資料的測驗數</div><div class="value" id="mtests">—</div><div class="note">已累積正式結果</div></div>
</section>

<div class="layout">
<section>
  <div class="panel"><h2>心理測驗大盤</h2><p id="rangeLabel">統計範圍：全部正式結果</p><div id="tableWrap"></div></div>
  <div class="panel"><h2>最近 14 天完成走勢</h2><p>像成交量一樣，看每天測驗完成熱度。</p><div class="heat" id="heatWrap"></div></div>
</section>
<aside>
  <div class="panel"><h2>結果類型分布</h2><p>每套測驗的結果占比。</p><div id="distWrap"></div></div>
</aside>
</div>
</main>
<script type="module">
import { supabase, BW } from '../supa.js?v=20251109g';
const $=s=>document.querySelector(s); let days=0; let testIndex=[];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>Number(n||0).toLocaleString('zh-TW'); const one=n=>Number.isFinite(Number(n))?Number(n).toFixed(1):'—';
async function loadIndex(){try{const r=await fetch('../data/monk/aptitude/eit-tests.json?v='+Date.now(),{cache:'no-store'});if(r.ok)testIndex=await r.json()}catch(e){}}
function titleFor(slug,fallback){const x=testIndex.find(t=>String(t.file||'').replace(/\.json$/,'')===slug);return x?.title||fallback||slug}
async function load(){ $('#status').textContent='讀取統計中…'; $('#warn').style.display='none';
 const {data,error}=await supabase.rpc('admin_get_eit_analytics_v2',{p_days:days});
 if(error){console.error(error);$('#warn').textContent='讀取失敗：'+(error.message||error.code);$('#warn').style.display='block';$('#status').textContent='載入失敗';return}
 render(data||{}); $('#status').textContent='最後更新：'+new Date().toLocaleString('zh-TW');
}
function moveClass(v){return v>0?'moveUp':v<0?'moveDown':'moveFlat'} function moveText(v){return v>0?'▲ '+v:v<0?'▼ '+Math.abs(v):'—'}
function render(d){
 const s=d.summary||{}; $('#m7').textContent=fmt(s.users_7d);$('#m7rows').textContent=fmt(s.completions_7d);$('#mall').textContent=fmt(s.total_completions);$('#mtests').textContent=fmt(s.active_tests);$('#sourceNote').textContent=`會員 ${fmt(s.member_completions)}／免費訪客 ${fmt(s.guest_completions)}`;
 const rows=Array.isArray(d.tests)?d.tests:[]; const max=Math.max(1,...rows.map(x=>Number(x.completion_count||0)));
 $('#rangeLabel').textContent=days?`統計範圍：最近 ${days} 天正式結果`:'統計範圍：全部正式結果';
 $('#tableWrap').innerHTML=rows.length?`<table><thead><tr><th>#</th><th>測驗</th><th class="num">完成數</th><th class="num">會員／訪客</th><th>熱度</th><th class="num">標準化分數</th><th class="num">7日動能</th></tr></thead><tbody>${rows.map((r,i)=>{const w=Number(r.completion_count||0)/max*100;const mv=Number(r.momentum_7d||0);return `<tr><td>${i+1}</td><td><b>${esc(titleFor(r.test_slug,r.test_title))}</b><div style="font-size:11px;color:#71839c">${esc(r.test_slug)}</div></td><td class="num">${fmt(r.completion_count)}</td><td class="num">${fmt(r.member_count)}／${fmt(r.guest_count)}</td><td><div class="spark"><i style="width:${w}%"></i></div></td><td class="num"><span class="scoreBadge">${one(r.normalized_average)}%</span></td><td class="num ${moveClass(mv)}">${moveText(mv)}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">目前沒有正式測驗結果</div>';
 const groups=Array.isArray(d.result_distribution)?d.result_distribution:[]; const by=new Map(); groups.forEach(r=>{if(!by.has(r.test_slug))by.set(r.test_slug,[]);by.get(r.test_slug).push(r)});
 $('#distWrap').innerHTML=by.size?[...by.entries()].map(([slug,list])=>{const total=list.reduce((a,x)=>a+Number(x.count||0),0)||1;return `<div class="distGroup"><div class="distTitle">${esc(titleFor(slug,list[0]?.test_title))}</div>${list.map(x=>{const p=Number(x.count||0)/total*100;return `<div class="distRow"><div>${esc(x.result_title_zh||x.result_key||'未分類')}</div><div class="spark"><i style="width:${p}%"></i></div><div class="num">${p.toFixed(1)}%</div></div>`}).join('')}</div>`}).join(''):'<div class="empty">目前沒有結果類型資料</div>';
 const trend=Array.isArray(d.daily_trend)?d.daily_trend:[]; const maxD=Math.max(1,...trend.map(x=>Number(x.count||0)));
 $('#heatWrap').innerHTML=trend.map(x=>{const alpha=.12+.7*Number(x.count||0)/maxD;return `<div class="heatItem" style="background:rgba(47,109,246,${alpha})"><span>${esc(x.day_label)}</span><b>${fmt(x.count)}</b></div>`}).join('');
}
async function init(){await BW.requireAdmin();await loadIndex();await load()}
$('#btnRefresh').onclick=load;$('#btn7').onclick=()=>{days=7;load()};$('#btn30').onclick=()=>{days=30;load()};init();
</script>
</body></html>
