<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BookWide Admin｜審核 / 上架</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f3f6fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
      --blue:#2563eb;--blue2:#1d4ed8;--green:#16a34a;--red:#ef4444;--dark:#0b1224;
      --shadow:0 8px 20px rgba(15,23,42,.08);
      font-family:system-ui,-apple-system,"Segoe UI","Microsoft JhengHei",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink)}
    .topbar{position:sticky;top:0;z-index:50;background:var(--dark);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 18px rgba(0,0,0,.18)}
    .brand{font-size:20px;font-weight:900;display:flex;align-items:center;gap:10px}
    .beta{font-size:12px;border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:2px 8px;color:#cbd5e1}
    .topRight{display:flex;gap:10px;align-items:center}
    .pill{border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:6px 10px;color:#e5e7eb}
    .wrap{max-width:1500px;margin:14px auto;padding:0 14px 28px}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
    .tab{border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px;cursor:pointer;box-shadow:var(--shadow);font-weight:900;font-size:18px;text-align:center}
    .tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .tab small{display:block;margin-top:3px;font-size:12px;font-weight:700;opacity:.75}
    .panel{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
    .panelHead{padding:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
    h2{margin:0;font-size:20px}
    .hint{font-size:13px;color:var(--muted);margin-top:4px}
    .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    input,select{height:38px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:14px;background:#fff}
    input.search{min-width:320px}
    button,.btn{border:0;border-radius:12px;background:var(--blue);color:#fff;font-weight:900;padding:9px 13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    button:hover,.btn:hover{background:var(--blue2)}
    .btn.green{background:var(--green)}
    .btn.red{background:var(--red)}
    .btn.gray{background:#334155}
    .btn.white{background:#fff;color:#0f172a;border:1px solid var(--line)}
    .content{padding:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));gap:12px}
    .asset{border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px;display:grid;grid-template-columns:128px 1fr;gap:12px}
    .thumb{width:128px;height:72px;border-radius:12px;object-fit:cover;background:#020617;border:1px solid var(--line)}
    .noThumb{width:128px;height:72px;border-radius:12px;background:#020617;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:12px}
    .assetTitle{font-size:16px;font-weight:900;line-height:1.25;margin-bottom:6px}
    .mini{font-size:12px;color:var(--muted);line-height:1.45}
    .mono{font-family:Consolas,Menlo,monospace;word-break:break-all}
    .bad{color:var(--red);font-weight:900}
    .ok{color:var(--green);font-weight:900}
    .badge{display:inline-flex;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#1e40af;font-size:12px;font-weight:900;margin-right:4px}
    .row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:8px}
    .titleEdit{width:100%;margin-top:7px;font-weight:800}
    .sourceGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
    .sourceCard{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px}
    .sourceTitle{font-size:17px;font-weight:900;margin-bottom:4px}
    .sourceUrl{font-size:12px;max-height:36px;overflow:hidden;color:#334155}
    .empty{padding:32px;text-align:center;color:#64748b;font-weight:800}
    .count{font-weight:900;color:var(--blue)}
    @media(max-width:720px){
      .tabs{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr}
      .asset{grid-template-columns:96px 1fr}
      .thumb,.noThumb{width:96px;height:54px}
      input.search{min-width:100%;width:100%}
      .panelHead{align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">BookWide Admin <span class="beta">Beta</span> <span>審核 / 上架</span></div>
    <div class="topRight">
      <span class="pill">管理員：<span id="adminEmail">—</span></span>
      <button class="btn gray" onclick="location.href='../admin.html'">回後台</button>
    </div>
  </div>

  <div class="wrap">
    <div class="tabs">
      <div class="tab active" data-tab="review" onclick="switchTab('review')">① 待審上架 <small><span id="reviewCount">0</span> 支待處理</small></div>
      <div class="tab" data-tab="live" onclick="switchTab('live')">② 目前上架 <small><span id="liveCount">0</span> 支正在使用</small></div>
      <div class="tab" data-tab="sources" onclick="switchTab('sources')">③ 來源站點 <small><span id="sourceCount">0</span> 個來源</small></div>
    </div>

    <div class="panel">
      <div class="panelHead">
        <div>
          <h2 id="panelTitle">待審上架</h2>
          <div class="hint" id="panelHint">只看還沒上架的影片。審核通過後才會進首頁。</div>
        </div>
        <div class="tools" id="assetTools">
          <input class="search" id="q" placeholder="搜尋：標題 / slug / 來源 / YouTube ID">
          <select id="catSel"><option value="">全部分類</option></select>
          <select id="sourceSel"><option value="">全部來源</option></select>
          <button onclick="reloadAll()">重新整理</button>
        </div>
        <div class="tools" id="sourceTools" style="display:none">
          <input class="search" id="sourceQ" placeholder="搜尋來源：maya / story / source_key / URL">
          <select id="sourceStatus">
            <option value="">全部來源</option>
            <option value="1">已上架來源</option>
            <option value="0">未上架來源</option>
          </select>
          <button onclick="reloadAll()">重新整理</button>
        </div>
      </div>
      <div class="content">
        <div id="assetGrid" class="grid"></div>
        <div id="sourceGrid" class="sourceGrid" style="display:none"></div>
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJqZWFqcnpwbXJnY3ppbW1yZmx4byIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzYwNzE4OTM5LCJleHAiOjIwNzYyOTQ5Mzl9".replace("qWFq","eWFq");
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const STORAGE_BASE = "https://pub-578e9e060a104f24b6865e26eb941648.r2.dev";

let currentTab = "review";
let rows = [];
let sources = [];

const el = id => document.getElementById(id);
const esc = s => String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");
const norm = s => String(s || '').trim().toLowerCase();

function youtubeId(url){
  const s = String(url || '');
  let m = s.match(/[?&]v=([^&#]+)/); if (m) return m[1];
  m = s.match(/youtu\.be\/([^?&#/]+)/); if (m) return m[1];
  return '';
}
function coverFor(r){
  return r.cover_url || `${STORAGE_BASE}/assets/${r.category}/${r.slug}.jpg`;
}
function mp4For(r){
  return r.mp4_url || `${STORAGE_BASE}/videos/${r.category}/${r.slug}.mp4`;
}
function sourceByKey(k){
  return sources.find(s => String(s.source_key || '') === String(k || ''));
}
function isSourceOn(k){
  const s = sourceByKey(k);
  return !!(s && s.is_enabled && s.is_published);
}
function playerUrl(r){
  return `/player.html?cat=${encodeURIComponent(r.category || '')}&slug=${encodeURIComponent(r.slug || '')}`;
}

async function requireAdmin(){
  const { data:sess } = await supa.auth.getSession();
  const user = sess?.session?.user;
  if (!user) { alert("請先登入管理員"); location.href="/index.html"; return false; }

  const { data:p, error } = await supa.from("profiles").select("email,is_admin,is_paused").eq("id", user.id).maybeSingle();
  if (error || !p || !p.is_admin || p.is_paused) { alert("不是有效管理員"); location.href="/index.html"; return false; }
  el("adminEmail").textContent = p.email || user.email || "admin";
  return true;
}

async function loadSources(){
  const { data, error } = await supa
    .from("content_sources")
    .select("source_key,source_name,source_type,category,source_url,is_enabled,is_published,updated_at")
    .order("category", {ascending:true})
    .order("source_key", {ascending:true});
  if (error) throw error;
  sources = data || [];
}

async function loadAssets(){
  const { data, error } = await supa
    .from("assets")
    .select("slug,category,title,is_published,review_status,difficulty_level,duration_sec,cover_url,mp4_url,youtube_url,youtube_id,preferred_source,source_key,source_name,source_url,source_batch,updated_at")
    .order("updated_at", {ascending:false});
  if (error) throw error;
  rows = data || [];
}

async function reloadAll(){
  await loadSources();
  await loadAssets();
  fillFilters();
  render();
}

function fillFilters(){
  const oldCat = el("catSel").value;
  const oldSource = el("sourceSel").value;
  const cats = Array.from(new Set(rows.map(r => r.category).filter(Boolean))).sort();
  el("catSel").innerHTML = `<option value="">全部分類</option>` + cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");
  if (cats.includes(oldCat)) el("catSel").value = oldCat;

  const sourceMap = new Map();
  sources.forEach(s => { if (s.source_key) sourceMap.set(s.source_key, s.source_name || s.source_key); });
  rows.forEach(r => { if (r.source_key && !sourceMap.has(r.source_key)) sourceMap.set(r.source_key, r.source_name || r.source_key); });
  el("sourceSel").innerHTML = `<option value="">全部來源</option>` +
    Array.from(sourceMap.entries()).sort((a,b)=>a[0].localeCompare(b[0]))
      .map(([k,n])=>`<option value="${esc(k)}">${esc(n)}｜${esc(k)}</option>`).join("");
  if (sourceMap.has(oldSource)) el("sourceSel").value = oldSource;

  el("reviewCount").textContent = rows.filter(r => !r.is_published).length;
  el("liveCount").textContent = rows.filter(r => !!r.is_published).length;
  el("sourceCount").textContent = sources.length;
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  el("assetTools").style.display = tab === "sources" ? "none" : "flex";
  el("sourceTools").style.display = tab === "sources" ? "flex" : "none";
  el("assetGrid").style.display = tab === "sources" ? "none" : "grid";
  el("sourceGrid").style.display = tab === "sources" ? "grid" : "none";

  if (tab === "review") {
    el("panelTitle").textContent = "待審上架";
    el("panelHint").textContent = "只看未上架影片。確認 OK 後按「通過上架」。";
  } else if (tab === "live") {
    el("panelTitle").textContent = "目前上架";
    el("panelHint").textContent = "只看首頁正在使用的影片。這裡只做下架、修標題、開播放器。";
  } else {
    el("panelTitle").textContent = "來源站點";
    el("panelHint").textContent = "來源是整批開關；影片是單支開關。兩個都上架才會出現在首頁。";
  }
  render();
}

function filteredAssets(){
  const q = norm(el("q").value);
  const cat = el("catSel").value;
  const sk = el("sourceSel").value;
  let list = rows.filter(r => currentTab === "review" ? !r.is_published : !!r.is_published);
  if (cat) list = list.filter(r => r.category === cat);
  if (sk) list = list.filter(r => r.source_key === sk);
  if (q) {
    list = list.filter(r => `${r.title||''} ${r.slug||''} ${r.category||''} ${r.youtube_id||''} ${r.youtube_url||''} ${r.source_key||''} ${r.source_name||''}`.toLowerCase().includes(q));
  }
  return list;
}

function filteredSources(){
  const q = norm(el("sourceQ").value);
  const st = el("sourceStatus").value;
  let list = sources;
  if (st !== "") list = list.filter(s => String((s.is_enabled && s.is_published) ? 1 : 0) === st);
  if (q) list = list.filter(s => `${s.source_key||''} ${s.source_name||''} ${s.category||''} ${s.source_type||''} ${s.source_url||''}`.toLowerCase().includes(q));
  return list;
}

function render(){
  if (currentTab === "sources") return renderSources();
  return renderAssets();
}

function renderAssets(){
  const list = filteredAssets();
  if (!list.length) {
    el("assetGrid").innerHTML = `<div class="empty" style="grid-column:1/-1">沒有資料。把篩選清掉，或切到另一個頁籤。</div>`;
    return;
  }
  el("assetGrid").innerHTML = list.map(r => {
    const srcOn = isSourceOn(r.source_key);
    const yt = r.youtube_url || (r.youtube_id ? `https://www.youtube.com/watch?v=${r.youtube_id}` : "");
    const mp4 = mp4For(r);
    const cover = coverFor(r);
    const sourceLabel = `${r.source_name || r.source_key || '未指定來源'}`;
    const sourceStatus = srcOn ? `<span class="ok">來源已上架</span>` : `<span class="bad">來源未上架</span>`;
    const actionBtns = currentTab === "review"
      ? `<button class="green" onclick="publishAsset('${esc(r.category)}','${esc(r.slug)}')">通過上架</button>
         <button class="red" onclick="rejectAsset('${esc(r.category)}','${esc(r.slug)}')">拒絕/保留下架</button>`
      : `<button class="red" onclick="unpublishAsset('${esc(r.category)}','${esc(r.slug)}')">下架</button>
         <a class="btn" href="${esc(playerUrl(r))}" target="_blank">開播放器</a>`;
    return `
      <div class="asset">
        <div>
          <a href="${esc(cover)}" target="_blank">
            <img class="thumb" src="${esc(cover)}" onerror="this.outerHTML='<div class=&quot;noThumb&quot;>無 cover</div>'">
          </a>
        </div>
        <div>
          <div><span class="badge">${esc(r.category || '—')}</span><span class="badge">${esc(r.slug || '')}</span></div>
          <input class="titleEdit" value="${esc(r.title || '')}" data-cat="${esc(r.category)}" data-slug="${esc(r.slug)}">
          <div class="mini">
            來源：<span class="mono">${esc(r.source_key || '—')}</span> / ${esc(sourceLabel)} ｜ ${sourceStatus}<br>
            審核：<span class="mono">${esc(r.review_status || '—')}</span> ｜ 狀態：${r.is_published ? '<span class="ok">已上架</span>' : '<span class="bad">未上架</span>'}<br>
            YT：<span class="mono">${esc(r.youtube_id || youtubeId(r.youtube_url) || '—')}</span>
          </div>
          <div class="row">
            <button onclick="saveTitle('${esc(r.category)}','${esc(r.slug)}')">存名稱</button>
            ${yt ? `<a class="btn white" href="${esc(yt)}" target="_blank">YouTube</a>` : ''}
            ${mp4 ? `<a class="btn white" href="${esc(mp4)}" target="_blank">MP4</a>` : ''}
            ${actionBtns}
          </div>
        </div>
      </div>`;
  }).join("");
}

function renderSources(){
  const list = filteredSources();
  if (!list.length) {
    el("sourceGrid").innerHTML = `<div class="empty" style="grid-column:1/-1">沒有符合的來源。</div>`;
    return;
  }
  el("sourceGrid").innerHTML = list.map(s => {
    const on = !!s.is_enabled && !!s.is_published;
    return `
      <div class="sourceCard">
        <div class="sourceTitle">${esc(s.source_name || s.source_key)}</div>
        <div class="mini">
          key：<span class="mono">${esc(s.source_key)}</span><br>
          分類：${esc(s.category || '—')} ｜ ${on ? '<span class="ok">已上架</span>' : '<span class="bad">未上架</span>'}<br>
          <span class="sourceUrl">${esc(s.source_url || '無網址')}</span>
        </div>
        <div class="row">
          <button class="green" onclick="setSource('${esc(s.source_key)}',true)">來源上架</button>
          <button class="red" onclick="setSource('${esc(s.source_key)}',false)">來源下架</button>
          <button class="white" onclick="viewSourceAssets('${esc(s.source_key)}')">看此來源影片</button>
        </div>
      </div>`;
  }).join("");
}

async function saveTitle(category, slug){
  const input = document.querySelector(`input.titleEdit[data-cat="${CSS.escape(category)}"][data-slug="${CSS.escape(slug)}"]`);
  const title = String(input?.value || '').trim();
  if (!title) return alert("標題不能空白");
  const { error } = await supa.from("assets").update({title, updated_at:new Date().toISOString()}).eq("category", category).eq("slug", slug);
  if (error) return alert(error.message);
  await reloadAll();
}

async function publishAsset(category, slug){
  const row = rows.find(r => r.category === category && r.slug === slug);
  const src = row?.source_key || '';
  const srcOn = isSourceOn(src);
  const msg = srcOn ? "確定通過上架？" : "來源還沒上架。影片可先上架，但首頁仍不會顯示，直到來源也上架。\n\n仍要上架影片？";
  if (!confirm(`${msg}\n${category}/${slug}`)) return;
  const { error } = await supa.from("assets").update({is_published:true, review_status:"approved", updated_at:new Date().toISOString()}).eq("category", category).eq("slug", slug);
  if (error) return alert(error.message);
  await reloadAll();
}

async function rejectAsset(category, slug){
  if (!confirm(`確定保留下架/拒絕？\n${category}/${slug}`)) return;
  const { error } = await supa.from("assets").update({is_published:false, review_status:"rejected", updated_at:new Date().toISOString()}).eq("category", category).eq("slug", slug);
  if (error) return alert(error.message);
  await reloadAll();
}

async function unpublishAsset(category, slug){
  if (!confirm(`確定從目前上架移除？\n${category}/${slug}`)) return;
  const { error } = await supa.from("assets").update({is_published:false, review_status:"pending", updated_at:new Date().toISOString()}).eq("category", category).eq("slug", slug);
  if (error) return alert(error.message);
  await reloadAll();
}

async function setSource(sourceKey, on){
  if (!confirm(`${on ? '來源上架' : '來源下架'}？\n${sourceKey}`)) return;
  const { error } = await supa.from("content_sources").update({is_enabled:true, is_published:!!on, updated_at:new Date().toISOString()}).eq("source_key", sourceKey);
  if (error) return alert(error.message);
  await reloadAll();
}

function viewSourceAssets(sourceKey){
  switchTab("review");
  el("sourceSel").value = sourceKey;
  el("q").value = "";
  render();
}

["q","catSel","sourceSel","sourceQ","sourceStatus"].forEach(id => {
  document.addEventListener("input", e => { if (e.target && e.target.id === id) render(); });
  document.addEventListener("change", e => { if (e.target && e.target.id === id) render(); });
});

(async function init(){
  if (!(await requireAdmin())) return;
  try { await reloadAll(); }
  catch(e){ console.error(e); alert("載入失敗：" + (e.message || e)); }
})();
</script>
</body>
</html>
