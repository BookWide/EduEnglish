<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BookWide Admin｜使用者清單</title>
  <style>
    :root{
      --bg:#f4f6fb;
      --card-bg:#fff;
      --muted:#6b7280;
      --border:#e5e7eb;
      --brand:#2563eb;
      --brand-soft:#e0edff;
      --danger:#b91c1c;
      --ok:#15803d;
      --radius-lg:18px;
      --shadow-card:0 10px 30px rgba(15,23,42,.08);
      --warn:#ea580c;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans TC",sans-serif;
      background:var(--bg);
      color:#111827;
    }
    .wrap{
      max-width:1100px;
      margin:24px auto 40px;
      padding:0 16px 40px;
    }
    h1{
      font-size:24px;
      margin:0 0 4px;
      font-weight:700;
    }
    .sub{
      margin:0 0 16px;
      color:var(--muted);
      font-size:14px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      gap:12px;
    }
    .back{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-size:14px;
      text-decoration:none;
      color:#111827;
    }
    .back span{font-size:18px;}
    .tabs{
      display:flex;
      gap:8px;
      margin:8px 0 16px;
      flex-wrap:wrap;
    }
    .tab{
      padding:8px 16px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-size:14px;
      text-decoration:none;
      color:#111827;
    }
    .tab.active{
      background:var(--brand);
      color:#fff;
      border-color:var(--brand);
    }
    .card{
      background:var(--card-bg);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-card);
      padding:18px 18px 12px;
    }
    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }
    .search-group{
      display:flex;
      align-items:center;
      gap:8px;
      flex:1;
      min-width:220px;
    }
    #q{
      flex:1;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      font-size:14px;
    }
    #btnRefresh{
      padding:8px 14px;
      border-radius:999px;
      border:0;
      background:var(--brand);
      color:#fff;
      font-size:14px;
      cursor:pointer;
      white-space:nowrap;
    }
    .meta{
      font-size:12px;
      color:var(--muted);
      margin-bottom:10px;
      line-height:1.5;
    }
    .meta b{color:#374151;}
    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    thead th{
      text-align:left;
      padding:8px 6px;
      border-bottom:1px solid var(--border);
      color:#4b5563;
      white-space:nowrap;
      background:#f9fafb;
    }
    tbody td{
      padding:7px 6px;
      border-bottom:1px solid #f1f5f9;
      vertical-align:middle;
    }
    tbody tr:nth-child(even){
      background:#fbfcff;
    }
    .hint{
      text-align:center;
      padding:18px 8px;
      color:var(--muted);
      font-size:13px;
    }
    .pill{
      display:inline-flex;
      padding:2px 9px;
      border-radius:999px;
      border:1px solid #d1d5db;
      font-size:12px;
      align-items:center;
      gap:4px;
      white-space:nowrap;
    }
    .pill.ok{
      border-color:var(--ok);
      color:var(--ok);
      background:#ecfdf3;
    }
    .pill.warn{
      border-color:var(--warn);
      color:#c2410c;
      background:#fff7ed;
    }
    .pill.online{
      border-color:var(--ok);
      color:var(--ok);
      background:#ecfdf3;
    }
    .pill.offline{
      border-color:#9ca3af;
      color:#4b5563;
      background:#f9fafb;
    }
    .pill-admin{
      background:var(--brand-soft);
      border-color:var(--brand);
      color:#1d4ed8;
    }
    .pill.dev{
      border-color:#cbd5e1;
      color:#334155;
      background:#f8fafc;
      font-weight:800;
    }
    .pill.dev.warn{
      border-color:#ef4444;
      color:#b91c1c;
      background:#fff1f2;
    }

    .admin-info{
      font-size:13px;
      color:var(--muted);
    }
    .admin-info b{color:#111827;}
    @media (max-width:720px){
      thead{display:none;}
      table,tbody,tr,td{display:block;width:100%;}
      tbody tr{margin-bottom:8px;border-radius:12px;border:1px solid #e5e7eb;background:#fff;}
      tbody td{
        border-bottom:0;
        padding:5px 10px;
      }
      tbody td::before{
        content:attr(data-label);
        display:inline-block;
        min-width:80px;
        margin-right:4px;
        color:#6b7280;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="../admin.html">
        <span>←</span> 回上頁
      </a>
      <div class="admin-info">
        管理員：<b id="adminEmail">讀取中…</b>
      </div>
    </div>

    <h1>BookWide Admin｜使用者清單</h1>
    <p class="sub">查看所有使用者登入紀錄、在線狀態與訂閱期限。</p>

    <div class="tabs">
      <a class="tab active" href="user.html">使用者清單</a>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="search-group">
          <input id="q" placeholder="搜尋 Email / 顯示名稱…" />
          <button id="btnRefresh">重新整理</button>
        </div>
      </div>

      <div class="meta" id="metaText">
        資料來源：<b>public.profiles</b>（使用者主檔）＋ <b>public.orders</b>（訂閱狀態補充）。<br/>
        合併鍵：<b>orders.buyer_id = profiles.id</b>（不再產生 orders-only/unknown）。台灣時區顯示．10 分鐘內視為「使用中」。
      </div>

      <div style="overflow-x:auto;">
        <table id="usersTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Email</th>
              <th>顯示名稱</th>
              <th>最後登入</th>
              <th>最近在線</th>
              <th>裝置</th>
              <th>管理員</th>
              <th>狀態</th>
              <th>到期日</th>
            </tr>
          </thead>
          <tbody>
            <tr><td class="hint" colspan="9">載入中…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
  <script>
// BookWide Admin | 使用者清單 R8
// 版面保留原 user.html，只把讀取方式改成 admin.html 同款直接 Supabase，不再卡 BW.requireAdmin。

const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
const SUPABASE_ANON =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do".replace("IHW", "jea");

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const DENY_SIGNIN = "/index.html?denied=signin";
const DENY_ADMIN  = "/index.html?denied=admin";
const DENY_PAUSED = "/index.html?denied=paused";
const DENY_PROFILE= "/index.html?denied=profile";

function kick(url){
  try { location.replace(url); } catch(e){ location.href = url; }
}

function esc(v){
  return String(v ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
}

function fmtTW(ts){
  if (!ts) return '—';
  try{
    const d = ts instanceof Date ? ts : new Date(ts);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString('zh-TW', { timeZone:'Asia/Taipei', hour12:false });
  }catch(_){ return '—'; }
}

function isOnlineWithin(ts, minutes=10){
  if (!ts) return false;
  const t = new Date(ts).getTime();
  if (!Number.isFinite(t)) return false;
  return (Date.now() - t) <= minutes * 60 * 1000;
}

function pill(text, cls=''){
  return `<span class="pill ${cls}">${esc(text)}</span>`;
}

async function requireAdmin(){
  const { data: sess } = await supa.auth.getSession();
  const session = sess?.session;
  if (!session?.user) return kick(DENY_SIGNIN);

  const { data: profile, error } = await supa
    .from('profiles')
    .select('email,is_admin,is_paused')
    .eq('id', session.user.id)
    .maybeSingle();

  if (error || !profile) return kick(DENY_PROFILE);
  if (profile.is_paused) return kick(DENY_PAUSED);
  if (!profile.is_admin) return kick(DENY_ADMIN);

  const email = profile.email || session.user.email || 'admin';
  const el = document.getElementById('adminEmail');
  if (el) el.textContent = email;
  return { session, profile };
}

(function main(){
  const $ = (q, root=document) => root.querySelector(q);
  const tbody = $('#usersTable tbody');
  const q = $('#q');
  const btnRefresh = $('#btnRefresh');
  const metaText = $('#metaText');
  const state = { rows: [] };

  function computeStatus(row){
    const expRaw = row?.expires_at || row?.expire_at || null;
    const exp = expRaw ? new Date(expRaw) : null;
    const hasExp = exp && !isNaN(exp.getTime());
    const ok = hasExp && exp.getTime() > Date.now();
    const source = row?.expire_source ? String(row.expire_source) : (row?.expire_at ? 'orders' : 'profiles');
    return { exp, hasExp, ok, source };
  }

  function render(list){
    tbody.innerHTML = '';
    if (!list.length){
      tbody.innerHTML = `<tr><td class="hint" colspan="9">沒有資料</td></tr>`;
      return;
    }

    list.forEach((r, i) => {
      const st = computeStatus(r);
      const onlineTag = isOnlineWithin(r.last_seen_at, 10) ? pill('使用中','online') : pill('離線','offline');
      const adminTag = r.is_admin ? pill('管理員','pill-admin') : pill('—','');
      const deviceTag = pill(r.device_text || '0/2','dev');
      const statusTag = !st.hasExp ? pill('未訂閱','warn') : (st.ok ? pill('有效','ok') : pill('已到期','warn'));
      const expireText = st.hasExp ? fmtTW(st.exp) : '—';
      const sourceText = st.hasExp ? ` <span style="color:#6b7280;font-size:12px;">(${esc(st.source)})</span>` : '';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="#">${i+1}</td>
        <td data-label="Email">${esc(r.email || '—')}</td>
        <td data-label="顯示名稱">${esc(r.display_name || '—')}</td>
        <td data-label="最後登入">${fmtTW(r.last_sign_in_at)}</td>
        <td data-label="最近在線">${fmtTW(r.last_seen_at)} ${onlineTag}</td>
        <td data-label="裝置">${deviceTag}</td>
        <td data-label="管理員">${adminTag}</td>
        <td data-label="狀態">${statusTag}${sourceText}</td>
        <td data-label="到期日">${expireText}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function fetchRows(){
    metaText.textContent = '讀取中…';

    try{
      const vr = await supa.rpc('admin_users_overview');
      if (vr.error) throw vr.error;
      const rows = (vr.data || []).filter(x => x && x.id);
      metaText.textContent = `資料來源：admin_users_overview（${rows.length}）`;
      return rows;
    }catch(e){
      console.warn('[BookWide] RPC admin_users_overview 不可用，改讀 profiles：', e?.message || e);
    }

    const cols = 'id,email,display_name,is_admin,is_paused,last_sign_in_at,last_seen_at,expires_at';
    const r = await supa.from('profiles').select(cols).order('last_seen_at', { ascending:false, nullsFirst:false });
    if (r.error) throw r.error;
    const rows = (r.data || []).filter(x => x && x.id).map(x => ({...x, expire_source:'profiles'}));
    metaText.textContent = `資料來源：profiles（${rows.length}）`;
    return rows;
  }

  function applyFilterAndRender(){
    const kw = (q.value || '').trim().toLowerCase();
    const list = !kw ? state.rows : state.rows.filter(r => {
      const a = String(r.email || '').toLowerCase();
      const b = String(r.display_name || '').toLowerCase();
      return a.includes(kw) || b.includes(kw);
    });
    render(list);
  }

  async function load(){
    tbody.innerHTML = `<tr><td class="hint" colspan="9">載入中…</td></tr>`;
    try{
      state.rows = await fetchRows();
      applyFilterAndRender();
    }catch(e){
      console.error('[BookWide] 使用者清單讀取失敗：', e);
      tbody.innerHTML = `<tr><td class="hint" colspan="9">讀取失敗：${esc(e?.message || e)}</td></tr>`;
      metaText.textContent = '讀取失敗';
    }
  }

  q.addEventListener('input', applyFilterAndRender);
  btnRefresh.addEventListener('click', load);

  requireAdmin()
    .then(load)
    .catch(e => {
      console.error('[BookWide] requireAdmin failed:', e);
      tbody.innerHTML = `<tr><td class="hint" colspan="9">管理員檢查失敗：${esc(e?.message || e)}</td></tr>`;
    });
})();
  </script>
</body>
</html>
