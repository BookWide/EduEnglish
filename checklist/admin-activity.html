<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BookWide 活動追蹤後台</title>
<style>
:root{--bg:#071225;--card:#0d1d35;--line:rgba(96,165,250,.28);--ink:#eef6ff;--muted:#9fb4d1;--blue:#3b82f6;--green:#22c55e;--gold:#facc15;--red:#fb7185}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:18px 12px 36px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.brand b{font-size:24px}.brand span{display:block;color:var(--muted);font-size:13px;font-weight:700}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}select,button{font:inherit;border-radius:10px;border:1px solid var(--line);background:#0b1b33;color:var(--ink);padding:9px 10px}button{cursor:pointer;background:linear-gradient(135deg,#2563eb,#60a5fa);border:0;font-weight:900}.admin{font-size:12px;color:#c7d2fe;font-weight:800}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}.card{border:1px solid var(--line);background:linear-gradient(145deg,rgba(16,40,71,.95),rgba(9,25,47,.95));border-radius:16px;padding:12px;box-shadow:0 12px 24px rgba(0,0,0,.16)}.metric{font-size:13px;color:var(--muted);font-weight:800}.num{font-size:30px;font-weight:950;margin-top:4px}.ok{color:#86efac}.gold{color:#fde68a}.red{color:#fda4af}.section{margin-top:12px}.section h2{font-size:17px;margin:0 0 8px}table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:12px}th,td{border-bottom:1px solid rgba(148,163,184,.14);padding:9px 8px;text-align:left;font-size:13px}th{color:#c7d2fe;background:rgba(59,130,246,.12)}td{color:#eaf3ff}.muted{color:var(--muted)}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.bar{height:9px;border-radius:99px;background:rgba(148,163,184,.2);overflow:hidden}.bar>i{display:block;height:100%;background:#60a5fa;border-radius:99px}.err{display:none;margin:10px 0;padding:10px;border:1px solid rgba(248,113,113,.35);background:rgba(248,113,113,.12);border-radius:12px;color:#fecaca;font-weight:800}@media(max-width:760px){.grid,.two{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.tools{width:100%}select,button{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><b>BookWide 活動追蹤後台</b><span>只給 Supabase 登入後的 admin 權限使用，不另外輸入管理密鑰</span></div>
    <div class="tools">
      <span id="adminEmail" class="admin">檢查管理員中…</span>
      <select id="days">
        <option value="1">今天 / 24小時</option>
        <option value="3">近3天</option>
        <option value="7" selected>近7天</option>
        <option value="30">近30天</option>
      </select>
      <button id="reload">重新整理</button>
    </div>
  </div>

  <div id="err" class="err"></div>

  <div class="grid">
    <div class="card"><div class="metric">總事件</div><div id="m_total" class="num">-</div></div>
    <div class="card"><div class="metric">訪客數 guest</div><div id="m_guests" class="num ok">-</div></div>
    <div class="card"><div class="metric">進頁 enter</div><div id="m_enter" class="num gold">-</div></div>
    <div class="card"><div class="metric">完成 finish</div><div id="m_finish" class="num red">-</div></div>
  </div>

  <div class="two">
    <div class="card section">
      <h2>各頁流量</h2>
      <table><thead><tr><th>頁面</th><th>次數</th><th>比例</th></tr></thead><tbody id="pageRows"></tbody></table>
    </div>
    <div class="card section">
      <h2>事件排行</h2>
      <table><thead><tr><th>事件</th><th>次數</th><th>比例</th></tr></thead><tbody id="eventRows"></tbody></table>
    </div>
  </div>

  <div class="card section">
    <h2>漏斗檢查</h2>
    <table><thead><tr><th>主題</th><th>進入</th><th>完成10題</th><th>完成20題</th><th>10題完成率</th><th>20題完成率</th></tr></thead><tbody id="funnelRows"></tbody></table>
  </div>

  <div class="card section">
    <h2>最新紀錄</h2>
    <table><thead><tr><th>ID</th><th>事件</th><th>頁面</th><th>Guest</th><th>時間</th></tr></thead><tbody id="recentRows"></tbody></table>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";
const FN_URL = "https://jeajrwpmrgczimmrflxo.supabase.co/functions/v1/activity-summary";
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const $ = (id)=>document.getElementById(id);
let session = null;

async function requireAdmin(){
  const { data: sess } = await supa.auth.getSession();
  session = sess && sess.session;
  if(!session || !session.user){
    location.replace('/index.html?denied=signin');
    return false;
  }
  $('adminEmail').textContent = session.user.email || 'admin';
  return true;
}

$('reload').onclick = loadData;
$('days').onchange = loadData;

function pct(n,d){ return d ? Math.round(n*1000/d)/10 + "%" : "-"; }
function safe(v){ return (v==null || v==="") ? "-" : String(v).replace(/[<>&]/g,s=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[s]));}
function bar(n,max){ const w = max ? Math.max(4, Math.round(n*100/max)) : 0; return `<div class="bar"><i style="width:${w}%"></i></div>`; }

async function loadData(){
  $('err').style.display = 'none';
  try{
    if(!session){ const ok = await requireAdmin(); if(!ok) return; }
    const days = $('days').value;
    const r = await fetch(FN_URL + '?days=' + encodeURIComponent(days), {
      headers: { Authorization: 'Bearer ' + session.access_token }
    });
    const data = await r.json();
    if(!r.ok || !data.ok){
      if(r.status === 403) location.replace('/index.html?denied=admin');
      else throw new Error(data.error || ('HTTP ' + r.status));
      return;
    }
    render(data);
  }catch(e){
    $('err').textContent = '讀取失敗：' + e.message;
    $('err').style.display = 'block';
  }
}

function render(data){
  $('m_total').textContent = data.metrics.total_events || 0;
  $('m_guests').textContent = data.metrics.guests || 0;
  $('m_enter').textContent = data.metrics.enter_events || 0;
  $('m_finish').textContent = data.metrics.finish_events || 0;

  const byPage = data.by_page || [];
  const byEvent = data.by_event || [];
  const funnel = data.funnel || [];
  const recent = data.recent || [];
  const maxPage = Math.max(1, ...byPage.map(x=>x.count));
  $('pageRows').innerHTML = byPage.map(x=>`<tr><td>${safe(x.page || x.name)}</td><td>${x.count}</td><td>${bar(x.count,maxPage)}</td></tr>`).join('');

  const maxEvent = Math.max(1, ...byEvent.map(x=>x.count));
  $('eventRows').innerHTML = byEvent.map(x=>`<tr><td>${safe(x.event_name || x.name)}</td><td>${x.count}</td><td>${bar(x.count,maxEvent)}</td></tr>`).join('');

  $('funnelRows').innerHTML = funnel.map(x=>`<tr>
    <td>${safe(x.slug)}</td><td>${x.enter}</td><td>${x.finish10}</td><td>${x.finish20}</td>
    <td>${pct(x.finish10,x.enter)}</td><td>${pct(x.finish20,x.enter)}</td>
  </tr>`).join('');

  $('recentRows').innerHTML = recent.map(x=>`<tr>
    <td>${x.id}</td><td>${safe(x.event_name || x.event_type)}</td><td>${safe(x.page)}</td><td class="muted">${safe(x.guest_id)}</td><td>${safe(x.created_at)}</td>
  </tr>`).join('');
}

requireAdmin().then(ok=>{ if(ok) loadData(); });
supa.auth.onAuthStateChange((_event, s)=>{ if(!s?.user) location.replace('/index.html?denied=signin'); session = s; });
setInterval(loadData, 60000);
</script>
</body>
</html>
