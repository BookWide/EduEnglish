<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>學習主題管理｜BookWide Admin</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#fff; --line:#e5e7eb; --text:#111827;
      --muted:#6b7280; --brand:#2563eb; --ok:#16a34a; --err:#dc2626;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,"Microsoft JhengHei",sans-serif}
    .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
    h1{margin:0 0 14px;font-size:24px}
    .muted{color:var(--muted);font-size:13px}
    .row{display:grid;grid-template-columns:1.1fr 1.4fr .7fr .7fr auto;gap:10px;align-items:end}
    .row + .row{margin-top:10px}
    .input, .btn, select{font:inherit}
    .input, select{width:100%;padding:.7rem .8rem;border:1px solid var(--line);border-radius:10px;background:#fff}
    .btn{padding:.7rem 1rem;border-radius:10px;border:1px solid var(--brand);background:var(--brand);color:#fff;cursor:pointer}
    .btn.outline{background:#fff;color:var(--brand)}
    table{width:100%;border-collapse:collapse;margin-top:18px}
    th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
    th{font-size:13px;color:var(--muted)}
    .pill{display:inline-block;padding:.2rem .55rem;border-radius:999px;font-size:12px}
    .on{background:#dcfce7;color:#166534}
    .off{background:#fee2e2;color:#991b1b}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .msg{margin-top:12px;font-size:14px}
    @media (max-width:900px){
      .row{grid-template-columns:1fr}
      table,thead,tbody,tr,td,th{display:block}
      thead{display:none}
      td{padding:8px 0}
      tr{padding:12px 0;border-bottom:1px solid var(--line)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>學習主題管理</h1>
      <div class="muted">這裡管理 Profile 的下拉選單項目。可新增、啟用/停用、排序。</div>

      <div class="row" style="margin-top:16px">
        <div>
          <label>code</label>
          <input id="code" class="input" placeholder="ted_talk">
        </div>
        <div>
          <label>顯示名稱</label>
          <input id="label" class="input" placeholder="TED英文演說">
        </div>
        <div>
          <label>排序</label>
          <input id="sort_order" class="input" type="number" value="99">
        </div>
        <div>
          <label>啟用</label>
          <select id="enabled" class="input">
            <option value="true" selected>是</option>
            <option value="false">否</option>
          </select>
        </div>
        <div>
          <button id="btnAdd" class="btn">新增主題</button>
        </div>
      </div>

      <div class="actions" style="margin-top:14px">
        <button id="btnReload" class="btn outline">重新載入</button>
      </div>

      <div id="msg" class="msg"></div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>code</th>
            <th>顯示名稱</th>
            <th>排序</th>
            <th>啟用</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
    const SUPABASE_ANON_KEY = "你的 anon key";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (q) => document.querySelector(q);
    const msg = $('#msg');

    function showMsg(text, color = '#111827'){
      msg.textContent = text;
      msg.style.color = color;
    }

    async function loadDomains() {
      showMsg('載入中...');
      const { data, error } = await supabase
        .from('learning_domains')
        .select('*')
        .order('sort_order', { ascending: true })
        .order('id', { ascending: true });

      if (error) {
        showMsg('讀取失敗：' + error.message, '#dc2626');
        return;
      }

      const tbody = $('#tbody');
      tbody.innerHTML = '';

      for (const row of (data || [])) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.id}</td>
          <td>${row.code}</td>
          <td>
            <input class="input" data-field="label" data-id="${row.id}" value="${row.label || ''}">
          </td>
          <td>
            <input class="input" data-field="sort_order" data-id="${row.id}" type="number" value="${row.sort_order ?? 0}">
          </td>
          <td>
            <span class="pill ${row.enabled ? 'on' : 'off'}">${row.enabled ? '啟用' : '停用'}</span>
          </td>
          <td>
            <div class="actions">
              <button class="btn outline" onclick="saveRow(${row.id})">保存</button>
              <button class="btn outline" onclick="toggleRow(${row.id}, ${row.enabled ? 'false' : 'true'})">${row.enabled ? '停用' : '啟用'}</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      }

      showMsg(`已載入 ${data?.length || 0} 筆`, '#16a34a');
    }

    async function saveRow(id) {
      const label = document.querySelector(`[data-field="label"][data-id="${id}"]`).value.trim();
      const sortOrder = Number(document.querySelector(`[data-field="sort_order"][data-id="${id}"]`).value || 0);

      const { error } = await supabase
        .from('learning_domains')
        .update({
          label,
          sort_order: sortOrder,
          updated_at: new Date().toISOString()
        })
        .eq('id', id);

      if (error) {
        showMsg('保存失敗：' + error.message, '#dc2626');
        return;
      }

      showMsg('保存成功', '#16a34a');
      loadDomains();
    }

    async function toggleRow(id, enabled) {
      const { error } = await supabase
        .from('learning_domains')
        .update({
          enabled: enabled === 'true',
          updated_at: new Date().toISOString()
        })
        .eq('id', id);

      if (error) {
        showMsg('切換失敗：' + error.message, '#dc2626');
        return;
      }

      showMsg('更新成功', '#16a34a');
      loadDomains();
    }

    async function addDomain() {
      const code = $('#code').value.trim();
      const label = $('#label').value.trim();
      const sort_order = Number($('#sort_order').value || 99);
      const enabled = $('#enabled').value === 'true';

      if (!code || !label) {
        showMsg('請填 code 與 顯示名稱', '#dc2626');
        return;
      }

      const { error } = await supabase
        .from('learning_domains')
        .insert([{ code, label, sort_order, enabled }]);

      if (error) {
        showMsg('新增失敗：' + error.message, '#dc2626');
        return;
      }

      $('#code').value = '';
      $('#label').value = '';
      $('#sort_order').value = '99';
      $('#enabled').value = 'true';

      showMsg('新增成功', '#16a34a');
      loadDomains();
    }

    document.getElementById('btnAdd').addEventListener('click', addDomain);
    document.getElementById('btnReload').addEventListener('click', loadDomains);

    window.saveRow = saveRow;
    window.toggleRow = toggleRow;

    loadDomains();
  </script>
</body>
</html>
