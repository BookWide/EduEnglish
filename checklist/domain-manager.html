<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>學習主題管理｜BookWide Admin</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#fff;
      --line:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
      --brand:#2563eb;
      --ok:#16a34a;
      --err:#dc2626;
      --soft:#eff6ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:16px/1.5 system-ui,-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;
    }
    .wrap{max-width:1200px;margin:24px auto;padding:0 16px}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      box-shadow:0 8px 24px rgba(15,23,42,.04);
    }
    h1{margin:0 0 10px;font-size:24px}
    .muted{color:var(--muted);font-size:14px}
    .toolbar{
      display:grid;
      grid-template-columns:1.1fr 1.4fr .7fr .7fr auto auto;
      gap:12px;
      align-items:end;
      margin-top:20px;
    }
    label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:var(--muted);
    }
    .input,.btn,select{
      font:inherit;
    }
    .input,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:.78rem .9rem;
      outline:none;
    }
    .input:focus,select:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .btn{
      border:1px solid var(--brand);
      background:var(--brand);
      color:#fff;
      border-radius:12px;
      padding:.78rem 1rem;
      cursor:pointer;
      white-space:nowrap;
    }
    .btn.outline{
      background:#fff;
      color:var(--brand);
    }
    .btn.danger{
      background:#fff;
      color:var(--err);
      border-color:#fecaca;
    }
    .msg{
      margin-top:14px;
      font-size:14px;
      min-height:22px;
    }
    .table-wrap{
      overflow:auto;
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:860px;
    }
    th,td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:middle;
    }
    th{
      font-size:13px;
      color:var(--muted);
      background:#fafafa;
    }
    tr:last-child td{border-bottom:none}
    .pill{
      display:inline-block;
      padding:.22rem .62rem;
      border-radius:999px;
      font-size:12px;
    }
    .on{background:#dcfce7;color:#166534}
    .off{background:#fee2e2;color:#991b1b}
    .row-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .hint-box{
      margin-top:16px;
      padding:12px 14px;
      border-radius:12px;
      background:var(--soft);
      border:1px solid #dbeafe;
      color:#1e3a8a;
      font-size:13px;
    }
    .small{
      font-size:12px;
      color:var(--muted);
    }
    @media (max-width:980px){
      .toolbar{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>學習主題管理</h1>
      <div class="muted">這裡管理 Profile 的下拉選單項目。可新增、啟用/停用、排序。新增後，使用者在 profile.html 的工作類型欄位就能直接選到。</div>

      <div class="hint-box">
        建議 code 一律用小寫英文與底線，例如：<b>ted_talk</b>、<b>premium_guide</b>。<br>
        顯示名稱則填給使用者看的中文，例如：<b>TED英文演說</b>、<b>優質教材導讀</b>。
      </div>

      <div class="toolbar">
        <div>
          <label>code</label>
          <input id="code" class="input" placeholder="ted_talk">
        </div>
        <div>
          <label>顯示名稱</label>
          <input id="label" class="input" placeholder="TED英文演說">
        </div>
        <div>
          <label>排序</label>
          <input id="sort_order" class="input" type="number" value="99">
        </div>
        <div>
          <label>啟用</label>
          <select id="enabled" class="input">
            <option value="true" selected>是</option>
            <option value="false">否</option>
          </select>
        </div>
        <div>
          <button id="btnAdd" class="btn" type="button">新增主題</button>
        </div>
        <div>
          <button id="btnReload" class="btn outline" type="button">重新載入</button>
        </div>
      </div>

      <div id="msg" class="msg"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:70px">ID</th>
              <th style="width:180px">code</th>
              <th>顯示名稱</th>
              <th style="width:110px">排序</th>
              <th style="width:110px">啟用</th>
              <th style="width:260px">操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="small" style="margin-top:10px">
        若你想加入：TED英文演說 / 優質教材導讀，可直接新增：
        <br>code = <b>ted_talk</b>，label = <b>TED英文演說</b>
        <br>code = <b>premium_guide</b>，label = <b>優質教材導讀</b>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";

    // 關鍵：不要用 const supabase，避免和站上其他腳本撞名
    const sbDomainMgr = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (q) => document.querySelector(q);
    const msg = $('#msg');

    function showMsg(text, type = '') {
      msg.textContent = text;
      msg.style.color = type === 'err'
        ? '#dc2626'
        : type === 'ok'
        ? '#16a34a'
        : '#111827';
    }

    function normalizeCode(raw) {
      return String(raw || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, '_')
        .replace(/[^a-z0-9_]/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    async function loadDomains() {
      showMsg('載入中...');
      const { data, error } = await sbDomainMgr
        .from('learning_domains')
        .select('*')
        .order('sort_order', { ascending: true })
        .order('id', { ascending: true });

      if (error) {
        showMsg('讀取失敗：' + error.message, 'err');
        return;
      }

      const tbody = $('#tbody');
      tbody.innerHTML = '';

      for (const row of (data || [])) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.id}</td>
          <td><code>${row.code}</code></td>
          <td>
            <input class="input" data-field="label" data-id="${row.id}" value="${escapeHtml(row.label || '')}">
          </td>
          <td>
            <input class="input" data-field="sort_order" data-id="${row.id}" type="number" value="${row.sort_order ?? 0}">
          </td>
          <td>
            <span class="pill ${row.enabled ? 'on' : 'off'}">${row.enabled ? '啟用' : '停用'}</span>
          </td>
          <td>
            <div class="row-actions">
              <button class="btn outline" type="button" onclick="saveRow(${row.id})">保存</button>
              <button class="btn outline" type="button" onclick="toggleRow(${row.id}, ${row.enabled ? 'false' : 'true'})">${row.enabled ? '停用' : '啟用'}</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      }

      showMsg(`已載入 ${data?.length || 0} 筆`, 'ok');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function saveRow(id) {
      const labelEl = document.querySelector(`[data-field="label"][data-id="${id}"]`);
      const sortEl = document.querySelector(`[data-field="sort_order"][data-id="${id}"]`);

      const label = (labelEl?.value || '').trim();
      const sort_order = Number(sortEl?.value || 0);

      if (!label) {
        showMsg('顯示名稱不能空白', 'err');
        return;
      }

      const { error } = await sbDomainMgr
        .from('learning_domains')
        .update({
          label,
          sort_order,
          updated_at: new Date().toISOString()
        })
        .eq('id', id);

      if (error) {
        showMsg('保存失敗：' + error.message, 'err');
        return;
      }

      showMsg('保存成功', 'ok');
      loadDomains();
    }

    async function toggleRow(id, enabled) {
      const { error } = await sbDomainMgr
        .from('learning_domains')
        .update({
          enabled: enabled === 'true',
          updated_at: new Date().toISOString()
        })
        .eq('id', id);

      if (error) {
        showMsg('切換失敗：' + error.message, 'err');
        return;
      }

      showMsg('更新成功', 'ok');
      loadDomains();
    }

    async function addDomain() {
      const code = normalizeCode($('#code').value);
      const label = ($('#label').value || '').trim();
      const sort_order = Number($('#sort_order').value || 99);
      const enabled = $('#enabled').value === 'true';

      if (!code) {
        showMsg('請填 code', 'err');
        return;
      }

      if (!label) {
        showMsg('請填顯示名稱', 'err');
        return;
      }

      const { error } = await sbDomainMgr
        .from('learning_domains')
        .insert([{ code, label, sort_order, enabled }]);

      if (error) {
        showMsg('新增失敗：' + error.message, 'err');
        return;
      }

      $('#code').value = '';
      $('#label').value = '';
      $('#sort_order').value = '99';
      $('#enabled').value = 'true';

      showMsg('新增成功', 'ok');
      loadDomains();
    }

    document.getElementById('btnAdd').addEventListener('click', addDomain);
    document.getElementById('btnReload').addEventListener('click', loadDomains);

    window.saveRow = saveRow;
    window.toggleRow = toggleRow;

    loadDomains();
  </script>
</body>
</html>
