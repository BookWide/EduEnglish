async function waitSupabase(ms = 4000){
  const start = Date.now();
  while(!window.supabase){
    if(Date.now()-start>ms) return false;
    await new Promise(r=>setTimeout(r,50));
  }
  return true;
}
function $(id){ return document.getElementById(id); }
function fmtDate(v){
  if(!v) return "-";
  const d = new Date(v);
  return isNaN(d.getTime()) ? "-" : d.toLocaleString();
}

/**
 * ✅ 這裡是關鍵修正：
 * - total / subtotal：視為「元」
 * - total_cents / unit_price：視為「分」
 */
function moneyNTDFromRow(o){
  if(!o) return "-";

  // 1) total（元）
  if (typeof o.total === "number" && o.total > 0) {
    return "NT$ " + Math.round(o.total).toLocaleString("en-US");
  }

  // 2) subtotal（元）
  if (typeof o.subtotal === "number" && o.subtotal > 0) {
    return "NT$ " + Math.round(o.subtotal).toLocaleString("en-US");
  }

  // 3) total_cents（分）
  if (typeof o.total_cents === "number" && o.total_cents > 0) {
    const ntd = Math.round(o.total_cents / 100);
    return "NT$ " + ntd.toLocaleString("en-US");
  }

  // 4) unit_price*quantity（分）
  if (typeof o.unit_price === "number" && o.unit_price > 0) {
    const q = (typeof o.quantity === "number" && o.quantity>0) ? o.quantity : 1;
    const cents = o.unit_price * q;
    const ntd = Math.round(cents / 100);
    return "NT$ " + ntd.toLocaleString("en-US");
  }

  return "NT$ 0";
}

function planTextFromRow(o){
  const s = o?.status ? String(o.status) : "-";
  const exp = o?.expire_at ? ("到期 " + fmtDate(o.expire_at)) : "無到期日";
  return `${s}（${exp}）`;
}
function isActiveByExpire(o){
  if(!o) return false;
  if(!o.expire_at) return true;
  const exp = new Date(o.expire_at);
  return !isNaN(exp.getTime()) && exp > new Date();
}
function daysLeft(expire_at){
  if(!expire_at) return null;
  const exp = new Date(expire_at);
  if(isNaN(exp.getTime())) return null;
  const diff = exp.getTime() - Date.now();
  return Math.ceil(diff / 86400000);
}

async function getSessionUser(sb){
  try{
    let { data: { session } } = await sb.auth.getSession();
    if (!session) {
      await new Promise(r=>setTimeout(r, 250));
      ({ data: { session } } = await sb.auth.getSession());
    }
    if (session?.user) return session.user;

    const { data: authData, error: authErr } = await sb.auth.getUser();
    if (authErr) {
      console.error('[subscription] getUser error', authErr);
      return null;
    }
    return authData?.user || null;
  }catch(err){
    console.error('[subscription] getSessionUser error', err);
    return null;
  }
}
async function getWalletCoins(sb, userId){
  try{
    const { data, error } = await sb
      .from('profiles')
      .select('wallet_coins')
      .eq('id', userId)
      .single();
    if (error) throw error;
    return Number(data?.wallet_coins || 0);
  }catch(err){
    console.error('[subscription] getWalletCoins error', err);
    return 0;
  }
}

  if (wn) wn.textContent = `目前金幣：${coins}`;
}

        <div class="muted">最近一次發幣：</div><div class="mono">${latestGrant}</div>
      </div>
    `;

}
function renderCoinLogs(rows){
  const body = $("coinLogBody");
  if (!body) return;
  if (!rows || !rows.length){
    body.innerHTML = `<tr><td colspan="3" class="muted">目前沒有金幣流水資料</td></tr>`;
    return;
  }
  body.innerHTML = rows.map(r => {
    const amount = Number(r.amount || 0);
    const sign = amount > 0 ? "+" : "";
    const reason = r.reason || (amount > 0 ? "訂閱發幣" : "影片解鎖");
    const color = amount > 0 ? "#065f46" : "#b91c1c";
    return `
      <tr>
        <td class="mono">${fmtDate(r.created_at)}</td>
        <td>${reason}${r.asset_slug ? `：${r.asset_slug}` : ""}</td>
        <td class="mono" style="color:${color};font-weight:900;">${sign}${amount}</td>
      </tr>
    `;
  }).join("");
}
async function loadWalletOverview(sb, userId){
  const result = { coins: 0, granted: 0, spent: 0, latestGrant: 0, logs: [] };

  result.coins = await getWalletCoins(sb, userId);

  try{
    const { data: orders } = await sb
      .from("orders")
      .select("coins_added, coins_granted, paid_at, status, buyer_id, user_id")
      .or(`buyer_id.eq.${userId},user_id.eq.${userId}`)
      .eq("status", "paid")
      .order("paid_at", { ascending: false });

    const paid = Array.isArray(orders) ? orders : [];
    result.granted = paid.reduce((sum, o) => sum + Number(o.coins_added || 0), 0);
    result.latestGrant = Number((paid.find(o => Number(o.coins_added || 0) > 0)?.coins_added) || 0);
  }catch(err){
    console.error("[wallet] orders summary error", err);
  }

  try{
    const { data: unlocks } = await sb
      .from("asset_unlocks")
      .select("asset_slug, unlocked_at")
      .eq("user_id", userId)
      .order("unlocked_at", { ascending: false });

    const unlockRows = Array.isArray(unlocks) ? unlocks : [];

    let costMap = {};
    if (unlockRows.length){
      const slugs = [...new Set(unlockRows.map(x => x.asset_slug).filter(Boolean))];
      const { data: assets } = await sb
        .from("assets")
        .select("slug, coin_cost")
        .in("slug", slugs);
      (assets || []).forEach(a => costMap[a.slug] = Number(a.coin_cost || 0));
    }

    result.logs = unlockRows.slice(0, 20).map(u => ({
      created_at: u.unlocked_at,
      amount: -Number(costMap[u.asset_slug] || 0),
      reason: "影片解鎖",
      asset_slug: u.asset_slug
    }));

    result.spent = result.logs.reduce((sum, r) => sum + Math.abs(Number(r.amount || 0)), 0);
  }catch(err){
    console.error("[wallet] unlock logs error", err);
  }

  try{
    const { data: grantOrders } = await sb
      .from("orders")
      .select("coins_added, paid_at, status, buyer_id, user_id")
      .or(`buyer_id.eq.${userId},user_id.eq.${userId}`)
      .eq("status", "paid")
      .gt("coins_added", 0)
      .order("paid_at", { ascending: false })
      .limit(20);

    const grantRows = (grantOrders || []).map(o => ({
      created_at: o.paid_at,
      amount: Number(o.coins_added || 0),
      reason: "訂閱發幣",
      asset_slug: ""
    }));

    result.logs = [...grantRows, ...result.logs]
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
      .slice(0, 20);
  }catch(err){
    console.error("[wallet] grant logs error", err);
  }

  return result;
}

(async () => {
  const $current = $("currentSub");
  const $right   = $("currentRight");
  const $history = $("historyBody");
  const $status  = $("subStatus");
  const $debug   = $("debug");
  const $who     = $("whoChip");

  const $avoidDup= $("avoidDup");

  const $goProfile = $("btnGoProfile");

  if(!(await waitSupabase(5000))){
    $status.textContent = "錯誤";
    $status.className = "pill bad";
    $current.innerHTML = `<div class="mono" style="color:var(--bad);font-weight:900;">supabase-js 未載入</div>`;
    $history.innerHTML = `<tr><td colspan="3" style="color:var(--bad);font-weight:900;">SDK 未載入</td></tr>`;
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  renderReturnNotice();
  const user = await getSessionUser(sb);

  if(!user){
    renderLoggedOutState();
    $debug.textContent = "";
    renderWalletSummary({coins:0, granted:0, spent:0, latestGrant:0});
    renderCoinLogs([]);
    return;
  }

  const email = user.email || "(no email)";
  const uidShort = String(user.id || "").slice(0,8);
  $who.textContent = `${email} · ${uidShort}`;
  $debug.textContent = `auth uid: ${user.id}`;

  const walletInfo = await loadWalletOverview(sb, user.id);
  renderWalletCoins(walletInfo.coins);
  renderWalletSummary(walletInfo);
  renderCoinLogs(walletInfo.logs);

  // ✅ 這裡多抓 total/subtotal
  const { data: orders, error: ordersErr } = await sb
    .from("orders")
    .select("id,status,paid_at,expire_at,buyer_id,user_id,referrer_id,referral_code,total,total_cents,subtotal,unit_price,quantity,items,period")
    .or(`buyer_id.eq.${user.id},user_id.eq.${user.id}`)
    .order("paid_at", { ascending: false, nullsFirst: false });

  if(ordersErr){
    $status.textContent = "錯誤";
    $status.className = "pill bad";
    $current.innerHTML = `<div style="color:var(--bad);font-weight:900;">讀取失敗：${ordersErr.message}</div>`;
    $history.innerHTML = `<tr><td colspan="3" style="color:var(--bad);font-weight:900;">${ordersErr.message}</td></tr>`;
return;
  }

  const list = Array.isArray(orders) ? orders : [];

    $status.textContent = "無資料";
    $status.className = "pill neu";
    $current.innerHTML = `<div style="color:var(--bad);font-weight:900;">尚無訂閱紀錄</div>`;

    return;

  const paidList = list.filter(o => String(o.status||"").toLowerCase() === "paid");
  const activePaid = paidList.find(o => isActiveByExpire(o)) || null;
  const latest = activePaid || list[0];

  const active = activePaid ? true : (String(latest.status||"").toLowerCase()==="paid" && isActiveByExpire(latest));

  $status.textContent = active ? "有效" : "無資料";
  $status.className = "pill " + (active ? "ok" : "neu");

  if(!active){
    // ✅ 沒有有效訂閱：回到 pricing（讓用戶完成你既有的 checkout/綠界流程）

    return;

  const amt = moneyNTDFromRow(latest);
  const buyerEmail = email;

  $right.innerHTML = `
    <div class="kv">
      <div class="muted">金額：</div><div class="rightAmount">${amt}</div>
      <div class="muted">到期日期：</div><div class="mono">${fmtDate(latest.expire_at)}</div>

    </div>
  `;

  $current.innerHTML = `
    <div class="kv">
      <div class="muted">狀態：</div><div><b style="color:${active?'var(--ok)':'var(--bad)'}">${latest.status || "-"}</b></div>
      <div class="muted">付款日期：</div><div class="mono">${fmtDate(latest.paid_at)}</div>
      <div class="muted">訂單ID：</div><div class="mono">${latest.id}</div>
    </div>
  `;

  if(active){
    const $nextStepBox = $("nextStepBox");

    // ===== 簡化導流：訂閱後先去 profile，不再強制英文評測 =====
    let profileLevel = null;
    let profileWeek = null;
    let profileDomain = null;
    let profileRole = null;
    try{
      const { data: pRow } = await sb
        .from('profiles')
        .select('cefr_level, talk_week_unlock, domain_code, role_code')

        .single();

      profileWeek = pRow?.talk_week_unlock ?? null;
      profileDomain = pRow?.domain_code || null;
      profileRole = pRow?.role_code || null;
    }catch(_e){}

    const hasCareerSetup = !!(profileDomain && profileRole);

    try{
      const qs = new URLSearchParams(location.search);
      const isReturn = qs.has('rtn') || qs.has('mtn');
      if (isReturn && !hasCareerSetup) {
        location.replace('./profile.html?from=subscription');
        return;
      }
    }catch(_e){}

    try{
      const btnLevel = document.getElementById('btnStartLevel');
      if(btnLevel){
        if(!profileLevel){
          btnLevel.textContent = '（選填）英語程度評測';
          btnLevel.style.display = 'inline-flex';
          btnLevel.onclick = () => {
            location.href = './level-survey.html?next=' + encodeURIComponent('./learning-dashboard.html');
          };
        }else{
          const label = `已完成英語程度評測：${profileLevel}${(profileWeek?`（W${profileWeek}）`:``)}`;
          btnLevel.textContent = label;
          btnLevel.style.display = 'inline-flex';
          btnLevel.style.pointerEvents = 'none';
          btnLevel.style.opacity = '0.7';
        }
      }

      if (!hasCareerSetup && $goProfile) {
        $goProfile.style.display = 'inline-flex';
      }

      if (hasCareerSetup && $goDashboard) {
        $goDashboard.style.display = 'inline-flex';
      }
    }catch(_e){}

    if ($nextStepBox){
      if (!hasCareerSetup) {
        $nextStepBox.textContent = '下一步：請先前往學習設定，選擇你的工作類型與角色身份。英文程度評測改為選填，不再強制。';
      } else {
        $nextStepBox.textContent = '已完成訂閱與職業主題設定，可直接進入學習控制台。';
      }
    }

    const leftDays = daysLeft(latest.expire_at);
    $avoidDup.style.display = "block";
    $avoidDup.innerHTML = `
      <div class="warnBox">
        <div class="warnIcon">⚠️</div>
        <div>
          <div class="warnTitle">尚未到期，請勿重覆訂閱</div>
          <div class="tiny">你現在的訂閱仍有效${leftDays!=null?`，距離到期約 ${leftDays} 天`:``}。（避免重複扣款）</div>
        </div>
      </div>
    `;

    $goPricing.style.display = "none";
    $locked.style.display = "inline-flex";
  } else {
$goPricing.style.display = "inline-flex";
    $locked.style.display = "none";
    $avoidDup.style.display = "none";
  }

  const history = paidList.length ? paidList : list;

  $history.innerHTML = history.map(o => `
    <tr>
      <td class="mono"><b>${fmtDate(o.paid_at)}</b></td>
      <td>${planTextFromRow(o)}</td>
      <td class="mono"><b>${moneyNTDFromRow(o)}</b></td>
    </tr>
  `).join("");

})();
</script>
</body>
</html>
