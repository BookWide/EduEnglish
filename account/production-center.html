<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>製片派工中心（外網控制版）</title>
  <style>
    :root{--bg:#091633;--panel:#1c2a46;--panel-2:#223250;--line:#304566;--text:#fff;--muted:#b9c6dd;--blue:#3b82f6;--blue-2:#2563eb;--green:#16a34a;--orange:#f59e0b;--red:#ef4444;--gray:#64748b;--chip:#0f1c35;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1700px;margin:0 auto;padding:24px 16px 40px}
    .title{font-size:28px;font-weight:700;margin:8px 0 22px}
    .card{background:var(--panel);border-radius:18px;padding:22px;margin-bottom:24px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .card h2{margin:0 0 18px;font-size:18px}
    .small{font-size:12px;color:var(--muted)}
    .mono{font-family:Consolas,monospace;word-break:break-all}
    .grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:16px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .field{margin-bottom:14px}
    .label{display:block;margin-bottom:8px;font-size:14px;color:var(--muted)}
    input[type="text"],select{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:#111827;font-size:16px;outline:none}
    .chips{display:flex;gap:10px;flex-wrap:wrap}
    .chip{border:1px solid var(--line);background:var(--chip);color:#fff;border-radius:999px;padding:10px 18px;cursor:pointer;user-select:none;font-size:16px;transition:.15s ease}
    .chip.active{background:#fff;color:#0f172a;border-color:#fff;font-weight:700}
    .switch-row{display:flex;align-items:center;gap:10px;margin-top:8px;color:#fff}
    .switch-row input{width:18px;height:18px}
    .btn{border:none;border-radius:12px;padding:12px 18px;cursor:pointer;color:#fff;background:var(--blue);font-size:16px;font-weight:700}
    .btn:hover{background:var(--blue-2)}
    .btn-secondary{background:#334155}
    .btn-danger{background:#b91c1c}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .toolbar{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .status-chip{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;border:1px solid var(--line);background:#10203d;color:#dbe7fb}
    .dot{width:10px;height:10px;border-radius:50%;background:#94a3b8;display:inline-block}
    .dot.online{background:#22c55e}
    .dot.offline{background:#ef4444}
    .dot.busy{background:#f59e0b}
    .table-wrap{overflow:auto;border-radius:14px;border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;min-width:1180px;background:var(--panel-2)}
    th,td{padding:14px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}
    th{color:#dbe7fb;background:#1b2942;position:sticky;top:0;z-index:1}
    .status{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
    .pending{background:var(--gray)}
    .running{background:var(--orange);color:#111827}
    .success{background:var(--green)}
    .failed{background:var(--red)}
    .log{background:#081121;border:1px solid #20324f;border-radius:12px;padding:12px;white-space:pre-wrap;font-family:Consolas,monospace;font-size:12px;max-height:180px;overflow:auto;margin-top:10px}
    .empty{padding:20px;text-align:center;color:var(--muted)}
    .pipeline-box{margin-top:12px;border:1px solid var(--line);border-radius:14px;padding:12px;background:#12203a}
    .pipeline-title{font-size:13px;color:#dbe7fb;margin-bottom:10px;font-weight:700}
    .pipeline-steps{display:grid;grid-template-columns:repeat(4,minmax(90px,1fr));gap:8px}
    .step{border:1px solid #324866;border-radius:12px;padding:10px 8px;text-align:center;background:#0c1730;color:#9fb0cb;font-size:12px;font-weight:700}
    .step.waiting{background:#0c1730;color:#9fb0cb}
    .step.running{background:#f59e0b;color:#111827;border-color:#f59e0b}
    .step.done{background:#16a34a;color:#fff;border-color:#16a34a}
    .step.fail{background:#ef4444;color:#fff;border-color:#ef4444}
    .kv{display:grid;grid-template-columns:120px 1fr;gap:6px 10px;margin-top:10px;font-size:12px;color:#dbe7fb}
    .kv .k{color:var(--muted)}
    .hint{margin-top:8px;color:#c8d5ed;font-size:12px;line-height:1.6}
    .warn{margin-top:8px;color:#fcd34d;font-size:12px;line-height:1.6}
    @media (max-width:1100px){
      .grid,.grid-2{grid-template-columns:1fr}
      .pipeline-steps{grid-template-columns:repeat(2,minmax(120px,1fr))}
      .kv{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">🎬 製片派工中心（外網控制版）</div>

    <div class="card">
      <div class="toolbar">
        <h2 style="margin:0;">新增任務</h2>
        <div class="row">
          <div class="status-chip" id="serverBadge"><span class="dot" id="serverDot"></span><span id="serverText">主機檢查中...</span></div>
          <button class="btn btn-secondary" onclick="checkServerNow()">測試主機</button>
        </div>
      </div>

      <div class="small mono">SERVER: <span id="serverUrlText"></span></div>
      <div class="hint">外網控制目前走 Tailscale：100.79.115.109:8787</div>

      <div class="grid-2" style="margin-top:14px;">
        <div class="field">
          <label class="label">主機快速切換</label>
          <select id="serverPreset" onchange="applyPresetServer()"></select>
        </div>
        <div class="field">
          <label class="label">手動主機位址</label>
          <input id="serverInput" type="text" placeholder="http://xxx:8787">
        </div>
      </div>

      <div class="row" style="margin-top:-4px;">
        <button class="btn btn-secondary" type="button" onclick="applyServer()">套用主機</button>
      </div>

      <div class="field" style="margin-top:16px;">
        <label class="label">五大類</label>
        <div class="chips" id="majorCategoryChips">
          <button type="button" class="chip active" data-value="story">故事</button>
          <button type="button" class="chip" data-value="music">音樂</button>
          <button type="button" class="chip" data-value="movie">電影</button>
          <button type="button" class="chip" data-value="news">實況</button>
          <button type="button" class="chip" data-value="grammar">語法</button>
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label class="label">YouTube URL</label>
          <input id="url" type="text" placeholder="貼 YouTube URL">
        </div>
        <div class="field">
          <label class="label">出版層級</label>
          <select id="publishTier">
            <option value="pro">pro</option>
            <option value="free">free</option>
          </select>
        </div>
        <div class="field">
          <label class="label">後台資料夾 Domain（僅人工預估）</label>
          <select id="domainSelect"></select>
          <div class="warn">這裡只跟本機 output_v3/relay_data/pro 資料夾名稱對齊。真正最後分類，仍以桌機後台 CMD 程序為準。</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="label">執行模式</label>
          <select id="runMode">
            <option value="full">完整流程（01→02→04→05→06→03）</option>
            <option value="json_only">只重跑 JSON</option>
            <option value="upload_only">只跑上傳</option>
            <option value="git_only">只跑 Git</option>
          </select>
        </div>
        <div class="field">
          <label class="label">備註</label>
          <input id="remark" type="text" placeholder="可留空">
        </div>
      </div>

      <div class="row" style="margin-top:6px;">
        <label class="switch-row"><input type="checkbox" id="autoPush" checked><span>自動 push GitHub</span></label>
        <label class="switch-row"><input type="checkbox" id="autoPublish"><span>自動上架</span></label>
        <label class="switch-row"><input type="checkbox" id="priorityRun"><span>優先執行</span></label>
      </div>

      <div class="row" style="margin-top:18px;">
        <button class="btn" id="createBtn" onclick="createJob()">🚀 建立任務</button>
        <button class="btn btn-secondary" onclick="resetForm()">清空</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2 style="margin:0;">任務列表</h2>
        <div class="row">
          <button class="btn btn-secondary" onclick="reloadJobs()">重新整理</button>
          <button class="btn btn-secondary" onclick="clearFinished()">清掉已完成顯示</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:110px;">ID</th>
              <th style="width:120px;">五大類</th>
              <th style="width:120px;">層級</th>
              <th style="width:180px;">預估 Domain</th>
              <th>URL</th>
              <th style="width:120px;">狀態</th>
              <th style="width:160px;">Slug</th>
              <th style="width:360px;">操作 / 真實狀態</th>
            </tr>
          </thead>
          <tbody id="jobTable">
            <tr><td colspan="8" class="empty">目前尚無任務</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let SERVER = "http://100.79.115.109:8787";
    const SERVER_OPTIONS = [
      { label: "桌機 100.79.115.109", value: "http://100.79.115.109:8787" },
      { label: "筆電 100.107.134.43", value: "http://100.107.134.43:8787" }
    ];

    const REAL_PRO_DOMAINS = [
      "business","education","engineering","finance","healthcare","legal",
      "lifestyle","manufacturing","marketing","service","student","ted_talk"
    ];

    let jobs = [];
    let selectedMajorCategory = "story";
    let serverOnline = false;

    function initCategoryChips() {
      document.querySelectorAll("#majorCategoryChips .chip").forEach(chip => {
        chip.addEventListener("click", () => {
          document.querySelectorAll("#majorCategoryChips .chip").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          selectedMajorCategory = chip.dataset.value;
          refreshDomainOptions();
        });
      });
    }

    function defaultDomainByMajor(major) {
      const map = {
        story: "service",
        music: "lifestyle",
        movie: "lifestyle",
        news: "business",
        grammar: "education"
      };
      return map[major] || "service";
    }

    function refreshDomainOptions() {
      const select = document.getElementById("domainSelect");
      select.innerHTML = REAL_PRO_DOMAINS.map(v => `<option value="${v}">${v}</option>`).join("");
      select.value = defaultDomainByMajor(selectedMajorCategory);
    }

    function resetForm() {
      document.getElementById("url").value = "";
      document.getElementById("publishTier").value = "pro";
      document.getElementById("runMode").value = "full";
      document.getElementById("remark").value = "";
      document.getElementById("autoPush").checked = true;
      document.getElementById("autoPublish").checked = false;
      document.getElementById("priorityRun").checked = false;
      refreshDomainOptions();
    }

    function makeInitialPipeline() {
      return [
        { label: "已送主機", state: "waiting" },
        { label: "主機執行", state: "waiting" },
        { label: "已完成", state: "waiting" },
        { label: "失敗", state: "waiting" }
      ];
    }

    function normalizeStatusText(v) {
      return String(v || "").trim().toLowerCase();
    }

    function isSuccessBackend(data) {
      const running = !!data?.running;
      const finished = !!data?.last_finished_at;
      const rc = data?.last_returncode;
      const lastStatus = normalizeStatusText(data?.last_status);
      const lastError = String(data?.last_error || "").trim();

      if (running) return false;
      if (lastStatus === "failed" || lastStatus === "error") return false;
      if (rc === 0 || rc === "0") return true;

      if (finished && (rc === null || rc === undefined || rc === "")) {
        return !lastError;
      }

      if (lastStatus === "success" || lastStatus === "done" || lastStatus === "completed") {
        return true;
      }

      return false;
    }

    function isFailedBackend(data) {
      const running = !!data?.running;
      const finished = !!data?.last_finished_at;
      const rc = data?.last_returncode;
      const lastStatus = normalizeStatusText(data?.last_status);

      if (running) return false;
      if (lastStatus === "failed" || lastStatus === "error") return true;
      if (finished && rc !== null && rc !== undefined && rc !== "" && rc !== 0 && rc !== "0") {
        return true;
      }
      return false;
    }

    function updatePipelineByBackend(data) {
      const p = makeInitialPipeline();
      if (!data) return p;

      const running = !!data.running;
      const started = !!data.last_started_at;
      const finished = !!data.last_finished_at;
      const success = isSuccessBackend(data);
      const failed = isFailedBackend(data);

      if (started || running || finished) {
        p[0].state = "done";
      }

      if (running) {
        p[1].state = "running";
        return p;
      }

      if (success) {
        p[1].state = "done";
        p[2].state = "done";
        return p;
      }

      if (failed) {
        p[1].state = "fail";
        p[3].state = "fail";
        return p;
      }

      if (started && !finished) {
        p[1].state = "running";
      }

      return p;
    }

    function setJobStateFromBackend(job, data) {
      if (!data) return;

      const running = !!data.running;
      const success = isSuccessBackend(data);
      const failed = isFailedBackend(data);

      if (running) {
        job.status = "running";
      } else if (success) {
        job.status = "success";
      } else if (failed) {
        job.status = "failed";
      } else {
        job.status = "pending";
      }

      job.pipeline = updatePipelineByBackend(data);

      job.log =
`running: ${data.running}
status: ${data.last_status || "-"}
started: ${data.last_started_at || "-"}
finished: ${data.last_finished_at || "-"}
returncode: ${data.last_returncode ?? "-"}
last_url: ${data.last_url || "-"}
log_file: ${data.last_log_file || "-"}
error: ${data.last_error || "-"}`;

      const lastUrl = String(data.last_url || "");
      const ytMatch = lastUrl.match(/[?&]v=([A-Za-z0-9_-]{6,})/);
      if (ytMatch) job.slug = ytMatch[1];
    }

    function pipelineHtml(job) {
      const pipeline = job.pipeline || makeInitialPipeline();
      return `
        <div class="pipeline-box">
          <div class="pipeline-title">真實主機狀態</div>
          <div class="pipeline-steps">${pipeline.map(s => `<div class="step ${s.state}">${s.label}</div>`).join("")}</div>
          <div class="kv">
            <div class="k">狀態</div><div>${job.status}</div>
            <div class="k">預估 Domain</div><div>${job.domain || "-"}</div>
            <div class="k">實際路徑</div><div class="mono">目前後台未回傳，請以 output_v3 / pipeline_logs 為準</div>
            <div class="k">最後訊息</div><div>${escapeHtml((job.log || "").split("\n")[0] || "-")}</div>
          </div>
        </div>
      `;
    }

    function setServerBadge(mode, text) {
      const dot = document.getElementById("serverDot");
      const el = document.getElementById("serverText");
      dot.className = "dot";
      if (mode === "online") dot.classList.add("online");
      if (mode === "offline") dot.classList.add("offline");
      if (mode === "busy") dot.classList.add("busy");
      el.textContent = text;
    }

    async function checkServerNow() {
      document.getElementById("serverUrlText").textContent = SERVER;
      try {
        const res = await fetch(SERVER + "/status");
        const data = await res.json();
        serverOnline = true;
        setServerBadge(data.running ? "busy" : "online", data.running ? "主機運行中" : "主機在線");
        document.getElementById("createBtn").disabled = false;
      } catch {
        serverOnline = false;
        setServerBadge("offline", "主機離線 / 無法連線");
        document.getElementById("createBtn").disabled = true;
      }
    }

    function createJob() {
      if (!serverOnline) {
        alert("主機目前無法連線，先按『測試主機』或確認 07 server 已啟動。");
        return;
      }

      const url = document.getElementById("url").value.trim();
      if (!url) {
        alert("請先貼 YouTube URL");
        return;
      }

      const job = {
        id: Date.now(),
        majorCategory: selectedMajorCategory,
        publishTier: document.getElementById("publishTier").value,
        domain: document.getElementById("domainSelect").value,
        runMode: document.getElementById("runMode").value,
        url,
        remark: document.getElementById("remark").value.trim(),
        autoPush: document.getElementById("autoPush").checked,
        autoPublish: document.getElementById("autoPublish").checked,
        priorityRun: document.getElementById("priorityRun").checked,
        status: "pending",
        slug: "",
        log: "等待送出主機...",
        pipeline: makeInitialPipeline()
      };

      jobs.unshift(job);
      renderJobs();
      runJob(job);
      resetForm();
    }

    function runJob(job) {
      job.status = "running";
      job.log = "送出主機中...";
      job.pipeline = makeInitialPipeline();
      job.pipeline[0].state = "running";
      renderJobs();

      fetch(SERVER + "/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          url: job.url,
          majorCategory: job.majorCategory,
          publishTier: job.publishTier,
          domain: job.domain,
          runMode: job.runMode,
          autoPush: job.autoPush,
          autoPublish: job.autoPublish,
          priorityRun: job.priorityRun,
          remark: job.remark
        })
      })
      .then(async res => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));

        job.log = "主機已接收，背景執行中...";
        job.pipeline[0].state = "done";
        job.pipeline[1].state = "running";
        renderJobs();
        pollJob(job);
      })
      .catch(err => {
        job.status = "failed";
        job.log = "主機連線失敗: " + err.message;
        job.pipeline = makeInitialPipeline();
        job.pipeline[0].state = "fail";
        job.pipeline[3].state = "fail";
        renderJobs();
      });
    }

    function pollJob(job) {
      const timer = setInterval(() => {
        fetch(SERVER + "/status")
          .then(res => res.json())
          .then(data => {
            if (!data.last_url || job.url === data.last_url) {
              setJobStateFromBackend(job, data);

              if (!data.running && data.last_finished_at) {
                clearInterval(timer);
              }

              renderJobs();
            }
          })
          .catch(() => {});
      }, 2000);
    }

    function retryJob(id) {
      const job = jobs.find(j => j.id === id);
      if (job) runJob(job);
    }

    function removeJob(id) {
      jobs = jobs.filter(j => j.id !== id);
      renderJobs();
    }

    function clearFinished() {
      jobs = jobs.filter(j => !["success", "failed"].includes(j.status));
      renderJobs();
    }

    function reloadJobs() {
      renderJobs();
      checkServerNow();
    }

    function renderJobs() {
      const tbody = document.getElementById("jobTable");
      if (!jobs.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty">目前尚無任務</td></tr>`;
        return;
      }

      tbody.innerHTML = jobs.map(job => `
        <tr>
          <td class="mono">${job.id}</td>
          <td>${labelMajor(job.majorCategory)}</td>
          <td>${job.publishTier}</td>
          <td>${job.domain}</td>
          <td><div class="mono">${job.url}</div><div class="small">${job.remark || ""}</div></td>
          <td><span class="status ${job.status}">${job.status}</span></td>
          <td class="mono">${job.slug || "-"}</td>
          <td>
            <div class="row">
              <button class="btn btn-secondary" onclick="retryJob(${job.id})">重跑</button>
              <button class="btn btn-danger" onclick="removeJob(${job.id})">移除</button>
            </div>
            ${pipelineHtml(job)}
            <div class="log">${escapeHtml(job.log)}</div>
          </td>
        </tr>
      `).join("");
    }

    function labelMajor(value) {
      const map = {
        story: "故事",
        music: "音樂",
        movie: "電影",
        news: "實況",
        grammar: "語法"
      };
      return map[value] || value;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function initServerOptions() {
      const preset = document.getElementById("serverPreset");
      preset.innerHTML = SERVER_OPTIONS.map(opt => `<option value="${opt.value}">${opt.label}</option>`).join("");
      preset.value = SERVER;
      document.getElementById("serverInput").value = SERVER;
      document.getElementById("serverUrlText").textContent = SERVER;
    }

    function applyPresetServer() {
      document.getElementById("serverInput").value = document.getElementById("serverPreset").value;
    }

    function applyServer() {
      const v = document.getElementById("serverInput").value.trim();
      if (!v) return alert("請輸入主機位址");
      SERVER = v;
      const preset = document.getElementById("serverPreset");
      if ([...preset.options].some(opt => opt.value === v)) preset.value = v;
      document.getElementById("serverUrlText").textContent = SERVER;
      setServerBadge("offline", "主機切換後待測試");
      serverOnline = false;
      document.getElementById("createBtn").disabled = true;
    }

    initCategoryChips();
    refreshDomainOptions();
    initServerOptions();
    renderJobs();
    checkServerNow();
    setInterval(checkServerNow, 15000);
  </script>
</body>
</html>
