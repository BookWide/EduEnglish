<!-- 只給你關鍵改動區，你貼進你原本 renderJobs() 裡即可 -->

<script>
function buildPlayerUrl(category, slug){
  return `https://bookwide.net/player.html?category=${category}&slug=${slug}`;
}

function buildMp4Url(category, slug){
  return `https://your-r2-domain/videos/${category}/${slug}.mp4`;
}

function renderJobs() {
  const tbody = document.getElementById("jobTable");

  tbody.innerHTML = jobs.map(job => {

    let playBtns = "";

    if (job.status === "success" && job.slug) {
      const playerUrl = buildPlayerUrl(job.realCategory || job.majorCategory, job.slug);
      const mp4Url = buildMp4Url(job.realCategory || job.majorCategory, job.slug);

      playBtns = `
        <div style="margin-top:8px;">
          <a href="${playerUrl}" target="_blank">
            <button class="btn">▶ 播放</button>
          </a>
          <a href="${mp4Url}" target="_blank">
            <button class="btn btn-secondary">▶ MP4</button>
          </a>
        </div>
      `;
    }

    return `
      <tr>
        <td>${job.id}</td>
        <td>${job.majorCategory}</td>
        <td>${job.publishTier}</td>
        <td>${job.domain || "-"}</td>
        <td>${job.url}</td>
        <td>${job.status}</td>
        <td>${job.slug || "-"}</td>
        <td>
          <button onclick="retryJob(${job.id})">重跑</button>
          <button onclick="removeJob(${job.id})">移除</button>
          ${playBtns}
        </td>
      </tr>
    `;
  }).join("");
}
</script>
