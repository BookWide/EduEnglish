<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>製片派工中心</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    padding: 30px;
}

h1 {
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, select {
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table th, .table td {
    padding: 10px;
    border-bottom: 1px solid #334155;
    text-align: left;
}

.status {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
}

.pending { background: gray; }
.running { background: orange; }
.success { background: green; }
.failed { background: red; }

.log {
    background: #020617;
    padding: 10px;
    font-size: 12px;
    max-height: 120px;
    overflow-y: auto;
    margin-top: 10px;
}
</style>

</head>

<body>

<h1>🎬 製片派工中心（Admin）</h1>

<div class="card">
    <h3>新增任務</h3>

```
<input id="url" placeholder="貼 YouTube URL">

<select id="category">
    <option value="pro">pro</option>
    <option value="free">free</option>
</select>

<select id="domain">
    <option value="ted_talk">TED 演講</option>
    <option value="movie">電影</option>
    <option value="conversation">對話</option>
</select>

<label><input type="checkbox" id="autoPush" checked> 自動 push GitHub</label>
<br><br>

<button onclick="createJob()">🚀 建立任務</button>
```

</div>

<div class="card">
    <h3>任務列表</h3>

```
<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>URL</th>
            <th>狀態</th>
            <th>Slug</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="jobTable"></tbody>
</table>
```

</div>

<script>

let jobs = []

function createJob() {
    const url = document.getElementById("url").value
    if (!url) {
        alert("請輸入網址")
        return
    }

    const job = {
        id: Date.now(),
        url,
        status: "pending",
        slug: "",
        log: "等待執行..."
    }

    jobs.unshift(job)
    render()

    runJob(job)
}

function runJob(job) {
    job.status = "running"
    job.log = "執行中..."
    render()

    // 模擬主機處理（之後會換成 API）
    setTimeout(() => {
        job.status = "success"
        job.slug = "ted-talk-" + Math.random().toString(36).substring(6)
        job.log = "完成 ✔"
        render()
    }, 3000)
}

function render() {
    const table = document.getElementById("jobTable")
    table.innerHTML = ""

    jobs.forEach(j => {
        const tr = document.createElement("tr")

        tr.innerHTML = `
            <td>${j.id}</td>
            <td>${j.url}</td>
            <td><span class="status ${j.status}">${j.status}</span></td>
            <td>${j.slug}</td>
            <td>
                <button onclick="retry(${j.id})">重跑</button>
            </td>
        `

        table.appendChild(tr)

        const logRow = document.createElement("tr")
        logRow.innerHTML = `
            <td colspan="5">
                <div class="log">${j.log}</div>
            </td>
        `
        table.appendChild(logRow)
    })
}

function retry(id) {
    const job = jobs.find(j => j.id === id)
    if (!job) return

    runJob(job)
}

</script>

</body>
</html>
