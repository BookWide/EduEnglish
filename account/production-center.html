<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>製片派工中心（通用版）</title>
  <style>
    :root{
      --bg:#091633;
      --panel:#1c2a46;
      --panel-2:#223250;
      --line:#304566;
      --text:#ffffff;
      --muted:#b9c6dd;
      --blue:#3b82f6;
      --blue-2:#2563eb;
      --green:#16a34a;
      --orange:#f59e0b;
      --red:#ef4444;
      --gray:#64748b;
      --chip:#0f1c35;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, "Microsoft JhengHei", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1700px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .title{
      font-size:28px;
      font-weight:700;
      margin:8px 0 22px;
    }

    .card{
      background:var(--panel);
      border-radius:18px;
      padding:22px;
      margin-bottom:24px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }

    .card h2{
      margin:0 0 18px;
      font-size:18px;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .grid{
      display:grid;
      grid-template-columns:1.2fr 1fr 1fr;
      gap:16px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .row{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .field{
      margin-bottom:14px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:var(--muted);
    }

    input[type="text"], select, textarea{
      width:100%;
      padding:13px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      font-size:16px;
      outline:none;
    }

    textarea{
      min-height:88px;
      resize:vertical;
    }

    .chips{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .chip{
      border:1px solid var(--line);
      background:var(--chip);
      color:#fff;
      border-radius:999px;
      padding:10px 18px;
      cursor:pointer;
      user-select:none;
      font-size:16px;
      transition:.15s ease;
    }

    .chip.active{
      background:#fff;
      color:#0f172a;
      border-color:#fff;
      font-weight:700;
    }

    .switch-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
      color:#fff;
    }

    .switch-row input{
      width:18px;
      height:18px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      color:#fff;
      background:var(--blue);
      font-size:16px;
      font-weight:700;
    }

    .btn:hover{ background:var(--blue-2); }

    .btn-secondary{
      background:#334155;
    }

    .btn-danger{
      background:#b91c1c;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .table-wrap{
      overflow:auto;
      border-radius:14px;
      border:1px solid var(--line);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:980px;
      background:var(--panel-2);
    }

    th, td{
      padding:14px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      color:#dbe7fb;
      background:#1b2942;
      position:sticky;
      top:0;
      z-index:1;
    }

    .status{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:#fff;
      white-space:nowrap;
    }

    .pending{ background:var(--gray); }
    .running{ background:var(--orange); color:#111827; }
    .success{ background:var(--green); }
    .failed{ background:var(--red); }

    .mono{
      font-family:Consolas, monospace;
      word-break:break-all;
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    .log{
      background:#081121;
      border:1px solid #20324f;
      border-radius:12px;
      padding:12px;
      white-space:pre-wrap;
      font-family:Consolas, monospace;
      font-size:12px;
      max-height:160px;
      overflow:auto;
    }

    .empty{
      padding:20px;
      text-align:center;
      color:var(--muted);
    }

    @media (max-width:1100px){
      .grid, .grid-2{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">🎬 製片派工中心（通用版 Admin）</div>

    <div class="card">
      <h2>新增任務</h2>

      <div class="field">
        <label class="label">五大類</label>
        <div class="chips" id="majorCategoryChips">
          <button type="button" class="chip active" data-value="story">故事</button>
          <button type="button" class="chip" data-value="music">音樂</button>
          <button type="button" class="chip" data-value="movie">電影</button>
          <button type="button" class="chip" data-value="news">實況</button>
          <button type="button" class="chip" data-value="grammar">語法</button>
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label class="label">YouTube URL</label>
          <input id="url" type="text" placeholder="貼 YouTube URL">
        </div>

        <div class="field">
          <label class="label">出版層級</label>
          <select id="publishTier">
            <option value="pro">pro</option>
            <option value="free">free</option>
          </select>
        </div>

        <div class="field">
          <label class="label">工作主題 / Domain</label>
          <select id="domainSelect"></select>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="label">執行模式</label>
          <select id="runMode">
            <option value="full">完整流程（01→04→05→06→03）</option>
            <option value="json_only">只重跑 JSON</option>
            <option value="upload_only">只跑上傳</option>
            <option value="git_only">只跑 Git</option>
          </select>
        </div>

        <div class="field">
          <label class="label">備註</label>
          <input id="remark" type="text" placeholder="可留空">
        </div>
      </div>

      <div class="row" style="margin-top:6px;">
        <label class="switch-row">
          <input type="checkbox" id="autoPush" checked>
          <span>自動 push GitHub</span>
        </label>

        <label class="switch-row">
          <input type="checkbox" id="autoPublish">
          <span>自動上架</span>
        </label>

        <label class="switch-row">
          <input type="checkbox" id="priorityRun">
          <span>優先執行</span>
        </label>
      </div>

      <div class="row" style="margin-top:18px;">
        <button class="btn" onclick="createJob()">🚀 建立任務</button>
        <button class="btn btn-secondary" onclick="resetForm()">清空</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2 style="margin:0;">任務列表</h2>
        <div class="row">
          <button class="btn btn-secondary" onclick="reloadJobs()">重新整理</button>
          <button class="btn btn-secondary" onclick="clearFinished()">清掉已完成顯示</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:110px;">ID</th>
              <th style="width:120px;">五大類</th>
              <th style="width:120px;">層級</th>
              <th style="width:160px;">Domain</th>
              <th>URL</th>
              <th style="width:120px;">狀態</th>
              <th style="width:160px;">Slug</th>
              <th style="width:220px;">操作</th>
            </tr>
          </thead>
          <tbody id="jobTable">
            <tr><td colspan="8" class="empty">目前尚無任務</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const domainMap = {
      story: [
        { value: "conversation", label: "日常對話" },
        { value: "student", label: "學生日常" },
        { value: "service", label: "服務接待" },
        { value: "travel", label: "生活旅遊" }
      ],
      music: [
        { value: "music", label: "音樂教材" },
        { value: "song_listening", label: "歌曲聽力" },
        { value: "song_vocab", label: "歌曲單字" }
      ],
      movie: [
        { value: "movie", label: "電影對白" },
        { value: "movie_shadowing", label: "電影跟讀" },
        { value: "movie_scene", label: "電影場景" }
      ],
      news: [
        { value: "news", label: "新聞實況" },
        { value: "current_affairs", label: "時事理解" },
        { value: "anchor_listening", label: "主播聽力" }
      ],
      grammar: [
        { value: "grammar", label: "語法講解" },
        { value: "sentence_pattern", label: "句型練習" },
        { value: "writing", label: "寫作應用" }
      ]
    };

    let jobs = [];
    let selectedMajorCategory = "story";

    function initCategoryChips() {
      const chips = document.querySelectorAll("#majorCategoryChips .chip");
      chips.forEach(chip => {
        chip.addEventListener("click", () => {
          chips.forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          selectedMajorCategory = chip.dataset.value;
          refreshDomainOptions();
        });
      });
    }

    function refreshDomainOptions() {
      const select = document.getElementById("domainSelect");
      const items = domainMap[selectedMajorCategory] || [];
      select.innerHTML = items.map(item =>
        `<option value="${item.value}">${item.label}</option>`
      ).join("");
    }

    function resetForm() {
      document.getElementById("url").value = "";
      document.getElementById("publishTier").value = "pro";
      document.getElementById("runMode").value = "full";
      document.getElementById("remark").value = "";
      document.getElementById("autoPush").checked = true;
      document.getElementById("autoPublish").checked = false;
      document.getElementById("priorityRun").checked = false;
    }

    function createJob() {
      const url = document.getElementById("url").value.trim();
      const publishTier = document.getElementById("publishTier").value;
      const domain = document.getElementById("domainSelect").value;
      const runMode = document.getElementById("runMode").value;
      const remark = document.getElementById("remark").value.trim();
      const autoPush = document.getElementById("autoPush").checked;
      const autoPublish = document.getElementById("autoPublish").checked;
      const priorityRun = document.getElementById("priorityRun").checked;

      if (!url) {
        alert("請先貼 YouTube URL");
        return;
      }

      const job = {
        id: Date.now(),
        majorCategory: selectedMajorCategory,
        publishTier,
        domain,
        runMode,
        url,
        remark,
        autoPush,
        autoPublish,
        priorityRun,
        status: "pending",
        slug: "",
        log: "等待送出主機..."
      };

      jobs.unshift(job);
      renderJobs();

      runJob(job);
      resetForm();
    }

    function runJob(job) {
      job.status = "running";
      job.log = "送出主機中...";
      renderJobs();

      // 之後可接真 API
      // fetch("http://localhost:8787/run", {...})

      setTimeout(() => {
        job.status = "success";
        job.slug = `${job.majorCategory}-${Math.random().toString(36).slice(2, 8)}`;
        job.log =
`主機已接收任務
五大類: ${job.majorCategory}
層級: ${job.publishTier}
domain: ${job.domain}
模式: ${job.runMode}
自動 push: ${job.autoPush ? "是" : "否"}
自動上架: ${job.autoPublish ? "是" : "否"}
備註: ${job.remark || "-"}

完成 ✔`;
        renderJobs();
      }, 1800);
    }

    function retryJob(id) {
      const job = jobs.find(j => j.id === id);
      if (!job) return;
      runJob(job);
    }

    function removeJob(id) {
      jobs = jobs.filter(j => j.id !== id);
      renderJobs();
    }

    function clearFinished() {
      jobs = jobs.filter(j => j.status !== "success");
      renderJobs();
    }

    function reloadJobs() {
      renderJobs();
    }

    function renderJobs() {
      const tbody = document.getElementById("jobTable");

      if (!jobs.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty">目前尚無任務</td></tr>`;
        return;
      }

      tbody.innerHTML = jobs.map(job => `
        <tr>
          <td class="mono">${job.id}</td>
          <td>${labelMajor(job.majorCategory)}</td>
          <td>${job.publishTier}</td>
          <td>${job.domain}</td>
          <td>
            <div class="mono">${job.url}</div>
            <div class="small">${job.remark || ""}</div>
          </td>
          <td><span class="status ${job.status}">${job.status}</span></td>
          <td class="mono">${job.slug || "-"}</td>
          <td>
            <div class="row">
              <button class="btn btn-secondary" onclick="retryJob(${job.id})">重跑</button>
              <button class="btn btn-danger" onclick="removeJob(${job.id})">移除</button>
            </div>
            <div class="log" style="margin-top:10px;">${escapeHtml(job.log)}</div>
          </td>
        </tr>
      `).join("");
    }

    function labelMajor(value) {
      const map = {
        story: "故事",
        music: "音樂",
        movie: "電影",
        news: "實況",
        grammar: "語法"
      };
      return map[value] || value;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    initCategoryChips();
    refreshDomainOptions();
    renderJobs();
  </script>
</body>
</html>
</script>

</body>
</html>
