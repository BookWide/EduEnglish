<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>訂閱申請確認｜BookWide Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--brand:#2563eb;--ok:#047857;--bad:#b91c1c;--warn:#92400e;--soft:#eff6ff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}.wrap{max-width:1180px;margin:24px auto 70px;padding:0 16px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 13px;font-weight:800;cursor:pointer;text-decoration:none;color:var(--ink)}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}.btn.bad{background:var(--bad);border-color:var(--bad);color:#fff}.btn:disabled{opacity:.5;cursor:not-allowed}h1{margin:6px 0 4px;font-size:34px}.sub{color:var(--muted);line-height:1.7}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 32px rgba(15,23,42,.08);padding:18px;margin:14px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}select,input,textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:15px;background:#fff}textarea{width:100%;min-height:72px}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:#fff;color:#475569;font-size:13px}.pill.pending{background:#fffbeb;color:#92400e;border-color:#fde68a}.pill.approved{background:#ecfdf5;color:#047857;border-color:#a7f3d0}.pill.rejected{background:#fef2f2;color:#b91c1c;border-color:#fecaca}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}}.box{border:1px solid var(--line);border-radius:14px;padding:12px;background:#f8fafc}.k{font-size:12px;color:#64748b;font-weight:900}.v{font-size:16px;font-weight:850;margin-top:3px;word-break:break-word}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.muted{color:#64748b}.result{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;background:#f8fafc;border:1px dashed var(--line);border-radius:14px;padding:12px;color:#334155}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.empty{padding:24px;text-align:center;color:#64748b;border:1px dashed var(--line);border-radius:18px;background:#fff}.small{font-size:13px;color:#64748b;line-height:1.5}.hr{height:1px;background:var(--line);margin:14px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>訂閱申請確認</h1><div class="sub">客戶送出付款單後會出現在這裡。確認入帳後按「確認開通」，系統會執行開通日期、發金幣並寄出信件。</div></div>
    <div><a class="btn" href="/admin.html">回 admin</a></div>
  </div>
  <div class="card">
    <div class="toolbar">
      <span id="who" class="pill">檢查登入中…</span>
      <select id="status"><option value="pending">待確認</option><option value="approved">已開通</option><option value="rejected">已退回</option><option value="all">全部</option></select>
      <button class="btn primary" id="reload">重新整理</button>
    </div>
  </div>
  <div id="list"></div>
  <div class="card"><h2 style="margin-top:0">執行結果</h2><div id="result" class="result">尚未執行。</div></div>
</div>
<script>
const SUPABASE_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do';
const FUNCTION_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co/functions/v1/subscription-request';
const ADMIN_EMAILS = ['pmktools@gmail.com'];
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser=null;
function $(id){return document.getElementById(id)}
function fmt(ts){ if(!ts)return '—'; return new Date(ts).toLocaleString('zh-Hant-TW',{hour12:false}); }
function nt(n){ return 'NT$' + Number(n||0).toLocaleString('zh-Hant-TW'); }
function statusPill(s){ return `<span class="pill ${s}">${s==='pending'?'待確認':s==='approved'?'已開通':s==='rejected'?'已退回':s}</span>`; }
function planLabel(r){ return r.plan_label || (r.plan==='year'?'年繳':r.plan==='half'?'半年':'月繳'); }
async function call(action, payload={}){
  const { data:sess } = await sb.auth.getSession();
  const token = sess?.session?.access_token;
  if(!token) throw new Error('請先登入 admin 帳號');
  const res = await fetch(FUNCTION_URL, {method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}, body:JSON.stringify({action,...payload})});
  const j = await res.json().catch(()=>({}));
  if(!res.ok || !j.ok) throw new Error(j.error || `HTTP ${res.status}`);
  return j;
}
function render(rows){
  if(!rows?.length){ $('list').innerHTML='<div class="empty">目前沒有資料。</div>'; return; }
  $('list').innerHTML = rows.map(r=>`
    <div class="card" data-id="${r.id}">
      <div class="toolbar" style="justify-content:space-between">
        <div><b class="mono">${r.id}</b> ${statusPill(r.status)}</div>
        <div class="small">送出：${fmt(r.created_at)}</div>
      </div>
      <div class="grid" style="margin-top:12px">
        <div class="box"><div class="k">會員 Email</div><div class="v">${r.email||''}</div></div>
        <div class="box"><div class="k">方案</div><div class="v">${planLabel(r)}</div></div>
        <div class="box"><div class="k">金額 / 金幣</div><div class="v">${nt(r.amount)} / ${r.coins} 金幣</div></div>
        <div class="box"><div class="k">推薦碼</div><div class="v mono">${r.referral_code||'無'}</div></div>
        <div class="box"><div class="k">付款方式</div><div class="v">${r.payment_method||'—'}</div></div>
        <div class="box"><div class="k">付款時間</div><div class="v">${fmt(r.payment_time)}</div></div>
        <div class="box"><div class="k">付款後五碼 / 截圖</div><div class="v">${r.payment_ref||'—'}</div></div>
        <div class="box"><div class="k">付款單號</div><div class="v mono">${r.slip_no||'—'}</div></div>
      </div>
      <div class="hr"></div>
      <div class="small"><b>客戶備註：</b>${(r.customer_note||'無').replaceAll('<','&lt;')}</div>
      <div class="small"><b>後台備註：</b>${(r.admin_note||'無').replaceAll('<','&lt;')}</div>
      ${r.open_response ? `<div class="small"><b>開通回應：</b><span class="mono">${JSON.stringify(r.open_response)}</span></div>`:''}
      <div class="actions">
        ${r.status==='pending' ? `<button class="btn ok" onclick="approveReq('${r.id}')">確認開通</button><button class="btn bad" onclick="rejectReq('${r.id}')">退回</button>` : ''}
      </div>
    </div>`).join('');
}
async function load(){
  try{ $('result').textContent='讀取中…'; const j=await call('list',{status:$('status').value}); render(j.requests||[]); $('result').textContent=`已讀取 ${j.requests?.length||0} 筆。`; }
  catch(e){ $('result').textContent='❌ 讀取失敗：'+(e.message||e); }
}
async function approveReq(id){
  const note = prompt('確認入帳備註（可空白）','已確認入帳');
  if(note===null) return;
  if(!confirm('確認要開通這筆訂閱、發金幣並寄出通知信？')) return;
  try{ $('result').textContent='開通中…'; const j=await call('approve',{requestId:id, adminNote:note}); $('result').textContent='✅ 開通完成\n\n'+JSON.stringify(j,null,2); await load(); }
  catch(e){ $('result').textContent='❌ 開通失敗：'+(e.message||e); }
}
async function rejectReq(id){
  const note = prompt('退回原因','付款資料不足或尚未入帳');
  if(note===null) return;
  try{ $('result').textContent='退回中…'; const j=await call('reject',{requestId:id, adminNote:note}); $('result').textContent='已退回\n\n'+JSON.stringify(j,null,2); await load(); }
  catch(e){ $('result').textContent='❌ 退回失敗：'+(e.message||e); }
}
async function init(){
  const {data}=await sb.auth.getUser(); currentUser=data?.user||null;
  if(!currentUser){$('who').textContent='未登入'; $('result').textContent='請先登入 admin。'; return;}
  $('who').textContent=currentUser.email;
  if(!ADMIN_EMAILS.includes(String(currentUser.email||'').toLowerCase())){$('who').textContent=currentUser.email+'（非 admin）'; $('reload').disabled=true; return;}
  await load();
}
$('reload').addEventListener('click', load); $('status').addEventListener('change', load); init();
</script>
</body>
</html>
