<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MBTI 報告檢視｜BookWide</title>
<style>
:root{--navy:#071225;--ink:#0f172a;--muted:#64748b;--line:#dbe5f2;--brand:#2563eb;--soft:#f8fbff;--err:#b91c1c;--ok:#166534}
*{box-sizing:border-box}body{margin:0;background:#f5f8ff;color:var(--ink);font:16px/1.55 system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}
header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;min-height:70px;padding:12px max(18px,calc((100vw - 1160px)/2));background:var(--navy);color:#fff;border-bottom:1px solid rgba(255,255,255,.12)}
header h1{margin:0;font-size:22px;font-weight:950}.back{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);border-radius:999px;color:#dbeafe;text-decoration:none;padding:9px 14px;font-weight:900}
.wrap{max-width:1160px;margin:22px auto;padding:0 14px}.panel{border:1px solid var(--line);background:#fff;border-radius:18px;box-shadow:0 18px 50px rgba(15,23,42,.08);overflow:hidden}.bar{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);background:#fff}.bar b{font-size:18px}.sub{color:#52647d;font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:999px;padding:10px 16px;font-weight:950;cursor:pointer}.btn.outline{background:#fff;color:var(--brand)}
#msg{margin:26px 34px;padding:18px;border-radius:14px;background:#eef6ff;color:#1e3a5f;font-weight:850}.err{background:#fee2e2!important;color:#991b1b!important}.ok{background:#dcfce7!important;color:#166534!important}.empty{background:#fff7ed!important;color:#92400e!important}
#reportHost{padding:0;background:#fff}.reportFrame{width:100%;min-height:calc(100vh - 190px);border:0;background:#fff;display:block}.debug{margin:10px 18px 18px;padding:10px 12px;border:1px dashed var(--line);border-radius:12px;background:#f8fafc;color:#64748b;font-size:12px;white-space:pre-wrap}
@media print{header,.bar,.debug,#msg{display:none!important}.wrap{margin:0!important;padding:0!important;max-width:none!important}.panel{border:0!important;box-shadow:none!important;border-radius:0!important}.reportFrame{min-height:100vh!important}}
</style>
</head>
<body>
<header><a class="back" href="./profile.html">← 回 Profile</a><h1>MBTI 報告檢視</h1></header>
<main class="wrap">
  <section class="panel">
    <div class="bar">
      <div><b id="title">讀取中…</b><div class="sub" id="subtitle">正在讀取 Profile 內存放的報告快照｜v4-profilecache</div></div>
      <div class="actions"><button class="btn outline" onclick="location.reload()">重新載入</button><button class="btn" onclick="printReport()">列印 / 存 PDF</button></div>
    </div>
    <div id="msg">讀取中…</div>
    <div id="reportHost" hidden><iframe id="reportFrame" class="reportFrame" sandbox="allow-same-origin allow-scripts"></iframe></div>
    <pre id="debug" class="debug" hidden></pre>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script>
const SUPABASE_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co';
// 與 /account/profile.html 同一組 anon key
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do';
const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const kind = (params.get('kind') || 'last').toLowerCase();
const sb = window.supabase && window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } });
function label(k){return k==='answer'?'最近問答報告':k==='full'?'最近正式報告':'最後存放報告';}
function fmt(v){ if(!v) return ''; const d=new Date(v); return Number.isNaN(d.getTime())?String(v):d.toLocaleString('zh-TW',{hour12:false}); }
function showMsg(text, cls=''){ const el=$('msg'); el.className=cls; el.textContent=text; el.hidden=false; }
function debug(text){ try{ $('debug').hidden=false; $('debug').textContent=text; }catch(_){} }
function pickHtml(row){
  if(kind === 'answer') return row.mbti_answer_report_html || '';
  if(kind === 'full') return row.mbti_full_report_html || '';
  return row.mbti_last_report_html || row.mbti_answer_report_html || row.mbti_full_report_html || '';
}
function pickTime(row){
  if(kind === 'answer') return row.mbti_answer_pdf_updated_at || row.mbti_last_report_updated_at || '';
  if(kind === 'full') return row.personality_report_updated_at || row.mbti_last_report_updated_at || '';
  return row.mbti_last_report_updated_at || row.mbti_answer_pdf_updated_at || row.personality_report_updated_at || '';
}
function normalizeHtml(html){
  const s = String(html || '').trim();
  if(!s) return '';
  if(/<!doctype|<html[\s>]/i.test(s)) return s;
  return '<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BookWide MBTI 報告</title><style>body{margin:0;background:#fff;color:#111827;font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}.page{max-width:980px;margin:0 auto;padding:24px}</style></head><body><div class="page">'+s+'</div></body></html>';
}

function tryLoadFromProfileCache(){
  try{
    const raw = sessionStorage.getItem('bw_mbti_report_view_payload') || '';
    if(!raw) return false;
    const payload = JSON.parse(raw);
    const wanted = kind;
    if(payload.kind && wanted && wanted !== 'last' && payload.kind !== wanted) return false;
    const html = normalizeHtml(payload.html || '');
    if(!html) return false;
    $('title').textContent = payload.title || label(kind);
    $('subtitle').textContent = `${payload.email || ''}｜${payload.completed_count || 0}/40｜${payload.last_report_kind || payload.kind || kind}｜${fmt(payload.updated_at || payload.saved_at)}`;
    debug(`v4-profilecache\nsource=sessionStorage from profile.html\nkind=${payload.kind||kind}\nhas_html=${!!html}\nemail=${payload.email||''}`);
    $('msg').hidden = true;
    $('reportHost').hidden = false;
    const frame = $('reportFrame');
    if('srcdoc' in frame) frame.srcdoc = html;
    else {
      const blob = new Blob([html], {type:'text/html;charset=utf-8'});
      frame.src = URL.createObjectURL(blob);
    }
    return true;
  }catch(e){
    debug('profile cache load error=' + (e?.message || e));
    return false;
  }
}
async function loadReport(){
  $('title').textContent = label(kind);
  if (tryLoadFromProfileCache()) return;
  if(!sb){ showMsg('讀取失敗：Supabase SDK 未載入，且沒有從 Profile 帶入暫存報告。請從 Profile 的「查看報告」按鈕進入。','err'); return; }
  try{
    const { data:{ user }, error:userErr } = await sb.auth.getUser();
    if(userErr) throw userErr;
    if(!user){ showMsg('尚未登入，請先登入後再查看報告。','empty'); return; }
    const fields = 'email,mbti_answer_report_html,mbti_full_report_html,mbti_last_report_html,mbti_last_report_kind,mbti_last_report_updated_at,mbti_answer_pdf_updated_at,personality_report_updated_at,mbti_completed_count';
    const { data:row, error } = await sb.from('profiles').select(fields).eq('id', user.id).maybeSingle();
    if(error) throw error;
    if(!row){ showMsg('讀取失敗：找不到 Profile 資料。','err'); return; }
    const html = normalizeHtml(pickHtml(row));
    const time = pickTime(row);
    $('subtitle').textContent = `${row.email || user.email || ''}｜${row.mbti_completed_count || 0}/40｜${row.mbti_last_report_kind || kind}｜${fmt(time)}`;
    debug(`v4-profilecache\nuser=${user.id}\nemail=${row.email||user.email}\nkind=${kind}\nhas_answer=${!!row.mbti_answer_report_html}\nhas_last=${!!row.mbti_last_report_html}\nlast_kind=${row.mbti_last_report_kind||''}`);
    if(!html){
      showMsg('尚未存放這份報告 HTML。請先回 heart-mbti.html 按「列印目前問答 PDF」產生並存放。','empty');
      return;
    }
    $('msg').hidden = true;
    $('reportHost').hidden = false;
    const frame = $('reportFrame');
    if('srcdoc' in frame) frame.srcdoc = html;
    else {
      const blob = new Blob([html], {type:'text/html;charset=utf-8'});
      frame.src = URL.createObjectURL(blob);
    }
  }catch(e){
    const msg = e && (e.message || e.error_description || e.details || e.hint) || String(e || 'unknown error');
    showMsg('讀取失敗：' + msg, 'err');
    debug('error=' + msg + '\nkind=' + kind + '\nkey_prefix=' + SUPABASE_ANON_KEY.slice(0,18));
  }
}
function printReport(){
  const frame = $('reportFrame');
  if(frame && frame.contentWindow && !$('reportHost').hidden) frame.contentWindow.print();
  else window.print();
}
loadReport();
</script>
</body>
</html>
