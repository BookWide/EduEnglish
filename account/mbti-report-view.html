<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MBTI 報告檢視｜BookWide</title>
  <style>
    :root{--bg:#f6f8fc;--ink:#0f172a;--muted:#64748b;--line:#dbe5f2;--brand:#2563eb;--navy:#071225}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}
    header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:12px;padding:12px max(12px,calc((100vw - 1180px)/2));background:rgba(7,18,37,.96);color:#fff;border-bottom:1px solid rgba(255,255,255,.12)}
    header h1{font-size:18px;margin:0;font-weight:950}.back{color:#dbeafe;text-decoration:none;border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:7px 12px;font-weight:900}.spacer{flex:1}.hint{color:#cbd5e1;font-size:13px}
    .wrap{max-width:1180px;margin:18px auto;padding:0 12px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px rgba(15,23,42,.08);overflow:hidden}.bar{display:flex;gap:8px;align-items:center;padding:12px;border-bottom:1px solid var(--line);background:#fff}.bar b{font-size:16px}.bar small{color:var(--muted);font-weight:700}.bar .grow{flex:1}.btn{border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:999px;padding:9px 14px;font-weight:900;cursor:pointer}.btn.outline{background:#fff;color:var(--brand)}
    iframe{display:block;width:100%;height:calc(100vh - 150px);min-height:640px;border:0;background:#fff}.empty{padding:28px;line-height:1.7;color:#475569}.err{color:#991b1b;background:#fee2e2;border-radius:12px;padding:12px;margin-top:12px}
    @media(max-width:760px){header{padding:9px 10px}header h1{font-size:16px}.hint{display:none}.wrap{margin:10px auto}.bar{flex-wrap:wrap}iframe{height:calc(100vh - 132px);min-height:560px}}
  </style>
</head>
<body>
  <header>
    <a class="back" href="./profile.html">← 回 Profile</a>
    <h1>MBTI 報告檢視</h1>
    <div class="spacer"></div>
    <div id="userEmail" class="hint"></div>
  </header>
  <main class="wrap">
    <section class="card">
      <div class="bar">
        <div><b id="reportTitle">讀取中…</b><br><small id="reportMeta">正在讀取 Profile 內存放的報告快照</small></div>
        <div class="grow"></div>
        <button class="btn outline" type="button" onclick="location.reload()">重新載入</button>
        <button class="btn" type="button" onclick="printReport()">列印 / 存 PDF</button>
      </div>
      <div id="empty" class="empty" hidden></div>
      <iframe id="reportFrame" title="MBTI report"></iframe>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script>
    const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";
  </script>
  <script>
    // 上方 ANON KEY 若複製時被瀏覽器/工具改壞，改用 BookWide 既有 key。
    const BW_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJqZWFqcnFwbXJnY3ppbW1yZmx4byIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";
    const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, BW_ANON_KEY, {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}}) : null;
    const $ = id => document.getElementById(id);
    function kindLabel(kind){ return kind === 'answer' ? '最近問答報告' : kind === 'full' ? '最近正式人格報告' : '最後存放報告'; }
    function fmt(v){ if(!v) return ''; const d=new Date(v); return Number.isNaN(d.getTime()) ? String(v) : d.toLocaleString('zh-TW',{hour12:false}); }
    function showEmpty(msg){ $('reportFrame').hidden=true; $('empty').hidden=false; $('empty').innerHTML=msg; }
    function printReport(){ const f=$('reportFrame'); try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){ window.print(); } }
    async function loadReport(){
      if(!sb){ showEmpty('<div class="err">Supabase SDK 載入失敗，無法讀取報告。</div>'); return; }
      const params = new URLSearchParams(location.search);
      const kind = (params.get('kind') || 'last').toLowerCase();
      const {data:{user}, error:userErr} = await sb.auth.getUser();
      if(userErr) throw userErr;
      if(!user){ location.href = '../login.html?next=' + encodeURIComponent(location.pathname + location.search); return; }
      $('userEmail').textContent = user.email || '';
      const {data, error} = await sb.from('profiles')
        .select('email,mbti_code,mbti_title,mbti_answer_report_html,mbti_full_report_html,mbti_last_report_html,mbti_last_report_kind,mbti_last_report_updated_at,mbti_answer_pdf_updated_at,personality_report_updated_at')
        .eq('id', user.id).maybeSingle();
      if(error) throw error;
      let html = '', at = '', realKind = kind;
      if(kind === 'answer'){
        html = data?.mbti_answer_report_html || '';
        at = data?.mbti_answer_pdf_updated_at || '';
      }else if(kind === 'full'){
        html = data?.mbti_full_report_html || '';
        at = data?.personality_report_updated_at || '';
      }else{
        html = data?.mbti_last_report_html || '';
        at = data?.mbti_last_report_updated_at || '';
        realKind = data?.mbti_last_report_kind || 'last';
      }
      $('reportTitle').textContent = kindLabel(kind);
      $('reportMeta').textContent = [data?.mbti_code || '', data?.mbti_title || '', at ? ('存放時間：' + fmt(at)) : ''].filter(Boolean).join('｜') || 'Profile 內尚未有報告快照';
      if(!html){
        showEmpty(`<b>${kindLabel(kind)}尚未存放。</b><br>請先回 MBTI 頁產生「問答 PDF」或完成 40/40 正式報告，系統才會把報告 HTML 快照寫入 Profile。`);
        return;
      }
      $('empty').hidden=true; $('reportFrame').hidden=false;
      $('reportFrame').srcdoc = html;
    }
    loadReport().catch(e=>{ console.error(e); showEmpty('<div class="err">讀取失敗：' + String(e.message || e) + '</div>'); });
  </script>
</body>
</html>
