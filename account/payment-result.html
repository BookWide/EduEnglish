<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BookWide 付款返回</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f6f8fc;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;color:#0f172a}.card{width:min(520px,calc(100vw - 28px));background:#fff;border:1px solid #e2e8f0;border-radius:22px;padding:24px;box-shadow:0 18px 42px rgba(15,23,42,.1)}h1{margin:0 0 10px;font-size:24px}.muted{color:#64748b;line-height:1.6}.btn{display:inline-flex;margin-top:16px;border-radius:999px;background:#111827;color:#fff;padding:10px 16px;text-decoration:none;font-weight:900}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
</style>
</head>
<body>
<div class="card">
<h1>正在回到我的訂閱</h1>
<div class="muted" id="msg">系統會自動導回 BookWide「我的訂閱 / 金幣錢包」。</div>
<a class="btn" id="go" href="/account/subscription.html">立即查看我的訂閱</a>
</div>
<script>
const qs = new URLSearchParams(location.search);
const mtn = qs.get('mtn') || qs.get('MerchantTradeNo') || qs.get('order') || '';
const paid = qs.get('paid') || qs.get('rtn') || '';
const status = qs.get('status') || '';
const target = new URL('/account/subscription.html', location.origin);
target.searchParams.set('provider','payuni');
target.searchParams.set('rtn', paid === '1' ? '1' : '0');
if(mtn) target.searchParams.set('mtn', mtn);
if(status) target.searchParams.set('status', status);
document.getElementById('go').href = target.toString();
document.getElementById('msg').innerHTML = mtn ? `訂單：<span class="mono">${mtn}</span><br>正在導回我的訂閱。` : '正在導回我的訂閱。';
setTimeout(()=>{ location.replace(target.toString()); }, 500);
</script>
</body>
</html>
