<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BookWide Profile FINAL</title>

<style>
body{margin:0;font-family:sans-serif;background:#fff}
.wrap{max-width:900px;margin:40px auto;padding:20px}
.input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px}
.btn{padding:12px 18px;background:#2563eb;color:#fff;border:none;border-radius:10px;cursor:pointer}
.msg{margin-top:12px;font-size:14px}
</style>
</head>

<body>
<div class="wrap">

<h2>學習設定（最終穩定版）</h2>

<select id="domain_code" class="input">
<option value="">選工作類型</option>
<option value="business">商務工作</option>
<option value="education">教學工作</option>
</select>

<select id="role_code" class="input">
<option value="">選角色身份</option>
<option value="trader">貿易業務</option>
<option value="teacher">老師</option>
</select>

<select id="level_code" class="input">
<option value="beginner">初級</option>
<option value="intermediate">中級</option>
<option value="advanced">進階</option>
</select>

<button id="btnSave" class="btn">完成並儲存</button>

<div id="msg" class="msg"></div>

</div>

<script type="module">
import * as SupaMod from '../supa.js';
const supabase = SupaMod.supabase || SupaMod.BW?.supa;

const msg = document.getElementById('msg');

async function safeGetUser(){
  try{
    const r = await Promise.race([
      supabase.auth.getUser(),
      new Promise((_,rej)=>setTimeout(()=>rej('timeout'),5000))
    ]);
    return r?.data?.user || null;
  }catch{
    return null;
  }
}

document.getElementById('btnSave').onclick = async ()=>{
  msg.innerText = '儲存中...';

  const user = await safeGetUser();

  if(!user){
    msg.innerText = '未登入或登入狀態失效';
    return;
  }

  const { error } = await supabase
    .from('profiles')
    .upsert({
      id: user.id,
      domain_code: document.getElementById('domain_code').value,
      role_code: document.getElementById('role_code').value,
      level_code: document.getElementById('level_code').value
    });

  if(error){
    msg.innerText = '錯誤: ' + error.message;
  }else{
    msg.innerText = '已儲存';
  }
};
</script>

</body>
</html>
