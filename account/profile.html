<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>個人資料｜BookWide</title>
  <style>
    :root{
      --bg:#fff;--fg:#111;--line:#e5e7eb;--brand:#2563eb;--muted:#6b7280;
      --soft:#f8fafc;--ok:#16a34a;--err:#b91c1c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--fg);
      font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue","PingFang TC","Noto Sans CJK TC","微軟正黑體",sans-serif
    }
    header{
      display:flex;gap:12px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)
    }
    a.back{
      color:var(--brand);text-decoration:none;border:1px solid var(--brand);
      border-radius:10px;padding:.4rem .7rem
    }
    .wrap{max-width:980px;margin:20px auto;padding:0 16px}
    .card{
      border:1px solid var(--line);border-radius:16px;background:#fff;padding:18px
    }
    .section{
      margin-top:24px;padding-top:20px;border-top:1px solid var(--line)
    }
    .section:first-of-type{
      margin-top:0;padding-top:0;border-top:none
    }
    .section-title{
      margin:0 0 14px;font-size:18px;font-weight:700
    }
    .section-desc{
      color:var(--muted);font-size:13px;margin:-6px 0 14px
    }
    .row{
      display:grid;gap:14px;grid-template-columns:1fr 1fr
    }
    @media (max-width:820px){ .row{grid-template-columns:1fr} }
    label{
      display:block;font-size:13px;color:var(--muted);margin-bottom:6px
    }
    input,button,select{font:inherit}
    .input{
      width:100%;border:1px solid var(--line);border-radius:10px;padding:.68rem .75rem;background:#fff
    }
    .btn{
      border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:10px;
      padding:.68rem 1rem;cursor:pointer
    }
    .btn.outline{background:#fff;color:var(--brand)}
    .grid-actions{
      display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap
    }
    .hint{color:var(--muted);font-size:13px}
    .avatar{width:120px;height:120px;border-radius:999px;object-fit:cover;border:1px solid var(--line);background:#f7f7f7}
    .center{display:flex;align-items:center;gap:14px}
    .ok{color:var(--ok)}
    .err{color:var(--err)}
    .chips{
      display:flex;flex-wrap:wrap;gap:10px
    }
    .chip{
      border:1px solid var(--line);background:#fff;border-radius:999px;padding:.56rem .85rem;
      cursor:pointer;transition:.15s ease;color:#111
    }
    .chip:hover{border-color:#bfd4ff;background:#f8fbff}
    .chip.active{
      background:var(--brand);border-color:var(--brand);color:#fff
    }
    .mini-grid{
      display:grid;grid-template-columns:1fr;gap:10px
    }
    .box-note{
      background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
      color:#334155;font-size:13px
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="../index.html">← 回首頁</a>
    <h1 style="margin:0;font-size:18px">個人資料</h1>
    <div id="userEmail" class="hint" style="margin-left:auto"></div>
  </header>

  <main class="wrap">
    <div class="card">

      <section class="section">
        <h2 class="section-title">基本資料</h2>

        <div class="center" style="margin-bottom:14px">
          <img id="avatarPreview" class="avatar" alt="avatar" src="">
          <div style="flex:1;min-width:0">
            <label>頭像上傳（建議 400×400 JPG/PNG）</label>
            <input id="avatarFile" type="file" accept="image/*" class="input" />
            <div class="hint">將會上傳到 <code>avatars/{userId}/avatar.jpg</code></div>
          </div>
        </div>

        <div class="row">
          <div>
            <label>姓名 / 暱稱（display_name）</label>
            <input id="display_name" class="input" placeholder="RAYMOND / pmktools">
          </div>
          <div>
            <label>聯絡電話（phone）</label>
            <input id="phone" class="input" placeholder="0932-xxxxxx">
          </div>

          <div>
            <label>LINE ID（line_id）</label>
            <input id="line_id" class="input" placeholder="myLineId">
          </div>
          <div>
            <label>WeChat ID（wechat_id）</label>
            <input id="wechat_id" class="input" placeholder="myWeChatId">
          </div>

          <div style="grid-column:1 / -1">
            <label>地址（address）</label>
            <input id="address" class="input" placeholder="台中市……">
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">學習設定</h2>
        <div class="section-desc">前台給使用者簡單選，後端用標準代碼排課。</div>

        <div class="row">
          <div>
            <label>工作類型（domain_code）</label>
            <select id="domain_code" class="input">
              <option value="">請選擇</option>
              <option value="education">教學工作</option>
              <option value="healthcare">醫療照護</option>
              <option value="business">商務工作</option>
              <option value="engineering">工程技術</option>
              <option value="service">服務接待</option>
              <option value="student">學生日常</option>
              <option value="lifestyle">生活旅遊</option>
            </select>
          </div>

          <div>
            <label>角色身份（role_code）</label>
            <select id="role_code" class="input">
              <option value="">請先選工作類型</option>
            </select>
          </div>

          <div>
            <label>英文程度（level_code）</label>
            <select id="level_code" class="input">
              <option value="beginner">初級</option>
              <option value="intermediate">中級</option>
              <option value="advanced">進階</option>
            </select>
          </div>

          <div>
            <label>每日學習時間（daily_minutes）</label>
            <select id="daily_minutes" class="input">
              <option value="5">5 分鐘</option>
              <option value="10" selected>10 分鐘</option>
              <option value="15">15 分鐘</option>
              <option value="30">30 分鐘</option>
            </select>
          </div>

          <div>
            <label>今日口說任務（talk_enabled）</label>
            <select id="talk_enabled" class="input">
              <option value="true" selected>啟用</option>
              <option value="false">停用</option>
            </select>
          </div>

          <div>
            <label>啟動狀態</label>
            <input id="onboarding_done_text" class="input" value="首次儲存後啟用學習控制台" readonly>
          </div>
        </div>

        <div style="margin-top:16px">
          <label>你最常用英文的情境（最多選 3 個）</label>
          <div id="scene_box" class="chips"></div>
          <div class="hint" style="margin-top:8px">系統會優先依這些情境安排學習控制台、今日口說、今日複習。</div>
        </div>

        <div class="mini-grid" style="margin-top:16px">
          <div class="box-note">
            <b>目前整合方式</b><br>
            Profile = 設定中心；Learning Dashboard = 執行中心。<br>
            這頁存你的工作類型、角色、程度、每日時間、口說開關與情境優先序。儲存後，學習控制台會依這些設定排內容。
          </div>
        </div>
      </section>

      <div class="grid-actions">
        <button id="btnReload" class="btn outline" type="button">重新載入</button>
        <button id="btnSave" class="btn" type="button">完成並儲存</button>
      </div>

      <div id="msg" class="hint" style="margin-top:10px"></div>
    </div>
  </main>

  <script type="module">
    import * as SupaMod from '../supa.js';
    const supabase = (SupaMod && (SupaMod.supabase || (SupaMod.BW && SupaMod.BW.supa)));
    if (!supabase) {
      alert('找不到 Supabase 連線（supa.js），請確認路徑與輸出。');
      throw new Error('supabase not found');
    }

    const ROLE_MAP = {
      education: [
        ["elementary_teacher","國小老師"],
        ["junior_teacher","國中老師"],
        ["senior_teacher","高中老師"],
        ["cram_teacher","補習班老師"],
        ["university_lecturer","大學老師"],
        ["nursing_instructor","護理老師"],
        ["tutor","家教老師"]
      ],
      healthcare: [
        ["nurse","護士"],
        ["physician","醫師"],
        ["pharmacist","藥師"],
        ["therapist","治療師"],
        ["clinic_staff","診所櫃台"]
      ],
      business: [
        ["trader","貿易業務"],
        ["sales","業務"],
        ["purchasing","採購"],
        ["customer_service","客服"],
        ["office_staff","一般上班族"],
        ["manager","主管"]
      ],
      engineering: [
        ["mechanical_engineer","機械工程師"],
        ["process_engineer","製程工程師"],
        ["quality_engineer","品保工程師"],
        ["product_engineer","產品工程師"],
        ["field_service_engineer","現場工程師"]
      ],
      service: [
        ["restaurant_staff","餐廳"],
        ["hotel_staff","飯店"],
        ["retail_staff","門市"],
        ["reception","接待"]
      ],
      student: [
        ["high_school","高中生"],
        ["college","大學生"],
        ["graduate","研究生"]
      ],
      lifestyle: [
        ["daily","日常生活"],
        ["travel","旅遊"],
        ["business_trip","出差"]
      ]
    };

    const SCENES = [
      ["daily","日常對話"],
      ["teaching","教學說明"],
      ["meeting","工作會議"],
      ["client","客戶溝通"],
      ["travel","旅遊出差"],
      ["medical","醫療照護"],
      ["factory","工廠技術"],
      ["presentation","簡報表達"]
    ];

    const $ = (q, root = document) => root.querySelector(q);
    const msg = $('#msg');
    let selectedScenes = [];

    function renderSceneChips(){
      const sceneBox = $('#scene_box');
      sceneBox.innerHTML = '';
      SCENES.forEach(([val, text]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (selectedScenes.includes(val) ? ' active' : '');
        btn.textContent = text;
        btn.dataset.value = val;
        btn.addEventListener('click', () => {
          if (selectedScenes.includes(val)) {
            selectedScenes = selectedScenes.filter(v => v !== val);
          } else {
            if (selectedScenes.length >= 3) {
              alert('最多選 3 個');
              return;
            }
            selectedScenes.push(val);
          }
          renderSceneChips();
        });
        sceneBox.appendChild(btn);
      });
    }

    function renderRoleOptions(domain, selected = ''){
      const roleSelect = $('#role_code');
      roleSelect.innerHTML = '<option value="">請選擇</option>';
      const list = ROLE_MAP[domain] || [];
      list.forEach(([val, text]) => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = text;
        if (val === selected) opt.selected = true;
        roleSelect.appendChild(opt);
      });
      if (!list.length) {
        roleSelect.innerHTML = '<option value="">請先選工作類型</option>';
      }
    }

    function safeSceneArray(v){
      if (Array.isArray(v)) return v.filter(Boolean);
      if (!v) return [];
      if (typeof v === 'string') {
        try {
          const arr = JSON.parse(v);
          return Array.isArray(arr) ? arr.filter(Boolean) : [];
        } catch(_e) {
          return v.split(',').map(s => s.trim()).filter(Boolean);
        }
      }
      return [];
    }

    const { data: userData } = await supabase.auth.getUser();
    const user = userData?.user ?? null;
    if (!user) {
      location.href = '../index.html?denied=signin';
    }
    $('#userEmail').textContent = user?.email || '';

    async function loadProfile() {
      msg.textContent = '載入中…';
      const { data, error } = await supabase
        .from('profiles')
        .select('id,display_name,phone,line_id,wechat_id,address,avatar_url,domain_code,role_code,level_code,daily_minutes,talk_enabled,onboarding_done,scene_priority')
        .eq('id', user.id)
        .maybeSingle();

      if (error) {
        msg.innerHTML = `<span class="err">讀取失敗：</span>${error.message}`;
        return;
      }

      $('#display_name').value = data?.display_name ?? '';
      $('#phone').value        = data?.phone ?? '';
      $('#line_id').value      = data?.line_id ?? '';
      $('#wechat_id').value    = data?.wechat_id ?? '';
      $('#address').value      = data?.address ?? '';
      $('#avatarPreview').src  = data?.avatar_url || '';

      $('#domain_code').value   = data?.domain_code ?? '';
      renderRoleOptions(data?.domain_code ?? '', data?.role_code ?? '');
      $('#level_code').value    = data?.level_code ?? 'beginner';
      $('#daily_minutes').value = String(data?.daily_minutes ?? 10);
      $('#talk_enabled').value  = String(data?.talk_enabled ?? true);
      $('#onboarding_done_text').value = data?.onboarding_done ? '已啟用學習控制台' : '首次儲存後啟用學習控制台';

      selectedScenes = safeSceneArray(data?.scene_priority);
      renderSceneChips();

      msg.textContent = '就緒。';
    }

    async function saveProfile() {
      msg.textContent = '儲存中…';
      $('#btnSave').disabled = true;

      try {
        const file = $('#avatarFile').files[0];
        let avatar_url = null;
        if (file) {
          const path = `${user.id}/avatar.jpg`;
          const up = await supabase.storage.from('avatars').upload(path, file, { upsert: true });
          if (up.error) throw up.error;

          const { data: pub } = supabase.storage.from('avatars').getPublicUrl(path);
          avatar_url = pub?.publicUrl || null;
          if (avatar_url) $('#avatarPreview').src = avatar_url;
        }

        const updateData = {
          display_name: $('#display_name').value.trim() || null,
          phone: $('#phone').value.trim() || null,
          line_id: $('#line_id').value.trim() || null,
          wechat_id: $('#wechat_id').value.trim() || null,
          address: $('#address').value.trim() || null,
          domain_code: $('#domain_code').value || null,
          role_code: $('#role_code').value || null,
          level_code: $('#level_code').value || 'beginner',
          daily_minutes: Number($('#daily_minutes').value || 10),
          talk_enabled: $('#talk_enabled').value === 'true',
          scene_priority: selectedScenes,
          onboarding_done: true,
          ...(avatar_url ? { avatar_url } : {}),
          updated_at: new Date().toISOString(),
        };

        const { data: exist } = await supabase
          .from('profiles')
          .select('id')
          .eq('id', user.id)
          .maybeSingle();

        let err = null;
        if (exist) {
          ({ error: err } = await supabase.from('profiles').update(updateData).eq('id', user.id));
        } else {
          ({ error: err } = await supabase.from('profiles').insert({ id: user.id, ...updateData }));
        }

        if (err) throw err;

        $('#onboarding_done_text').value = '已啟用學習控制台';
        msg.innerHTML = '<span class="ok">✅ 已保存！正在前往學習控制台…</span>';
        setTimeout(() => {
          location.href = './learning-dashboard.html';
        }, 700);
      } catch (e) {
        console.error(e);
        msg.innerHTML = `<span class="err">儲存失敗：</span>${e.message || e}`;
      } finally {
        $('#btnSave').disabled = false;
      }
    }

    $('#domain_code').addEventListener('change', function(){
      renderRoleOptions(this.value, '');
    });

    $('#btnReload').addEventListener('click', loadProfile);
    $('#btnSave').addEventListener('click', saveProfile);

    renderSceneChips();
    loadProfile();
  </script>
</body>
</html>
