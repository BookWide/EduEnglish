<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>個人資料｜BookWide</title>
  <style>
    :root{
      --bg:#fff;--fg:#111;--line:#e5e7eb;--brand:#2563eb;--muted:#6b7280;
      --soft:#f8fafc;--ok:#16a34a;--err:#b91c1c;--warn:#b45309;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--fg);
      font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue","PingFang TC","Noto Sans CJK TC","微軟正黑體",sans-serif
    }
    header{
      display:flex;gap:12px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)
    }
    a.back{
      color:var(--brand);text-decoration:none;border:1px solid var(--brand);
      border-radius:10px;padding:.4rem .7rem
    }
    .wrap{max-width:980px;margin:20px auto;padding:0 16px}
    .card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:18px}
    .section{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
    .section:first-of-type{margin-top:0;padding-top:0;border-top:none}
    .section-title{margin:0 0 14px;font-size:18px;font-weight:700}
    .section-desc{color:var(--muted);font-size:13px;margin:-6px 0 14px}
    .row{display:grid;gap:14px;grid-template-columns:1fr 1fr}
    @media (max-width:820px){ .row{grid-template-columns:1fr} }
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input,button,select{font:inherit}
    .input{width:100%;border:1px solid var(--line);border-radius:10px;padding:.68rem .75rem;background:#fff}
    .btn{border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:10px;padding:.68rem 1rem;cursor:pointer}
    .btn.outline{background:#fff;color:var(--brand)}
    .grid-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
    .hint{color:var(--muted);font-size:13px}
    .avatar{width:120px;height:120px;border-radius:999px;object-fit:cover;border:1px solid var(--line);background:#f7f7f7}
    .center{display:flex;align-items:center;gap:14px}
    .ok{color:var(--ok)}
    .err{color:var(--err)}
    .warn{color:var(--warn)}
    .chips{display:flex;flex-wrap:wrap;gap:10px}
    .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:.56rem .85rem;cursor:pointer;transition:.15s ease;color:#111}
    .chip:hover{border-color:#bfd4ff;background:#f8fbff}
    .chip.active{background:var(--brand);border-color:var(--brand);color:#fff}
    .mini-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .box-note{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:#334155;font-size:13px}
    .debug{margin-top:12px;padding:10px 12px;border:1px dashed var(--line);border-radius:12px;background:#fafafa;font-size:12px;color:#475569;white-space:pre-wrap}
    .req::after{content:' *';color:var(--err)}
  </style>
</head>
<body>
  <header>
    <a class="back" href="../index.html">← 回首頁</a>
    <h1 style="margin:0;font-size:18px">個人資料</h1>
    <div id="userEmail" class="hint" style="margin-left:auto"></div>
  </header>

  <main class="wrap">
    <div class="card">
      <section class="section">
        <h2 class="section-title">基本資料</h2>

        <div class="center" style="margin-bottom:14px">
          <img id="avatarPreview" class="avatar" alt="avatar" src="">
          <div style="flex:1;min-width:0">
            <label>頭像上傳（建議 400×400 JPG/PNG）</label>
            <input id="avatarFile" type="file" accept="image/*" class="input" />
            <div class="hint">將會上傳到 <code>avatars/{userId}/avatar.jpg</code></div>
          </div>
        </div>

        <div class="row">
          <div>
            <label>姓名 / 暱稱（display_name）</label>
            <input id="display_name" class="input" placeholder="RAYMOND / pmktools">
          </div>
          <div>
            <label>聯絡電話（phone）</label>
            <input id="phone" class="input" placeholder="0932-xxxxxx">
          </div>

          <div>
            <label>LINE ID（line_id）</label>
            <input id="line_id" class="input" placeholder="myLineId">
          </div>
          <div>
            <label>WeChat ID（wechat_id）</label>
            <input id="wechat_id" class="input" placeholder="myWeChatId">
          </div>

          <div style="grid-column:1 / -1">
            <label>地址（address）</label>
            <input id="address" class="input" placeholder="台中市……">
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">學習設定</h2>
        <div class="section-desc">極簡版：只保留必要設定。先選工作類型，再設定英文程度、口說開關與常用情境。</div>
        <div style="font-size:13px;color:#64748b;margin:-4px 0 8px;">
          訂閱後 → 完成英語程度評測 → 設定工作類型 → 開始學習
        </div>
        <div id="guideBox" style="
          margin:12px 0 16px;
          padding:12px 14px;
          border-radius:12px;
          background:#f8fafc;
          border:1px solid #e5e7eb;
          color:#334155;
          font-size:14px;
          line-height:1.65;
        "></div>

        <div class="row">
          <div>
            <label class="req">工作類型（domain_code）</label>
            <select id="domain_code" class="input">
              <option value="">請選擇</option>
            </select>
          </div>

          <div>
            <label>英文程度（level_code）</label>
            <select id="level_code" class="input">
              <option value="beginner">初級</option>
              <option value="intermediate">中級</option>
              <option value="advanced">進階</option>
            </select>
          </div>

          <div>
            <label>今日口說任務（talk_enabled）</label>
            <select id="talk_enabled" class="input">
              <option value="true" selected>啟用</option>
              <option value="false">停用</option>
            </select>
          </div>

          <div>
            <label>啟動狀態</label>
            <input id="onboarding_done_text" class="input" value="首次儲存後啟用學習控制台" readonly>
          </div>
        </div>

        <div style="margin-top:16px">
          <label>你最常用英文的情境（最多選 3 個）</label>
          <div id="scene_box" class="chips"></div>
          <div class="hint" style="margin-top:8px">系統會優先依這些情境安排學習控制台、今日口說、今日複習。</div>
        </div>

        <div class="mini-grid" style="margin-top:16px">
          <div class="box-note">
            <b>目前整合方式</b><br>
            Profile = 設定中心；Learning Dashboard = 執行中心。<br>
            這頁只存必要欄位：工作類型、程度、口說開關與情境優先序。儲存成功後，會直接跳到學習控制台。
          </div>
        </div>

        <div id="debugBox" class="debug" hidden></div>
      </section>

      <div class="grid-actions">
        <button id="btnReload" class="btn outline" type="button">重新載入</button>
        <button id="btnSave" class="btn" type="button">完成並儲存</button>
      </div>

      <div id="msg" class="hint" style="margin-top:10px"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script>
    const SUPABASE_URL = "https://jeajrwpmrgczimmrflxo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";

    if (!window.supabase) {
      alert('載入 Supabase SDK 失敗，請確認網路或瀏覽器設定。');
      throw new Error('window.supabase not found');
    }

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const DASHBOARD_URL = './learning-dashboard.html';

      debugBox.textContent = info;
    }

    function renderSceneChips(){
      const sceneBox = $('#scene_box');
      sceneBox.innerHTML = '';
      SCENES.forEach(([val, text]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (selectedScenes.includes(val) ? ' active' : '');
        btn.textContent = text;
        btn.dataset.value = val;
        btn.addEventListener('click', () => {
          if (selectedScenes.includes(val)) {
            selectedScenes = selectedScenes.filter(v => v !== val);
          } else {
            if (selectedScenes.length >= 3) {
              alert('最多選 3 個');
              return;
            }
            selectedScenes.push(val);
          }
          renderSceneChips();
        });
        sceneBox.appendChild(btn);
      });
    }


    function safeSceneArray(v){
      if (Array.isArray(v)) return v.filter(Boolean);
      if (!v) return [];
      if (typeof v === 'string') {
        try {
          const arr = JSON.parse(v);
          return Array.isArray(arr) ? arr.filter(Boolean) : [];
        } catch(_e) {
          return v.split(',').map(s => s.trim()).filter(Boolean);
        }
      }
      return [];
    }

    async function getCurrentUser() {
      try {
        const { data, error } = await supabase.auth.getUser();
        if (!error && data?.user) return data.user;
      } catch (_e) {}

      try {
        const { data } = await supabase.auth.getSession();
        if (data?.session?.user) return data.session.user;
      } catch (_e) {}
      return null;
    }

    function isAdminUser(user) {
      if (!user) return false;
      const email = String(user.email || '').toLowerCase().trim();
      return ADMIN_EMAILS.includes(email);
    }

    function applyProfileLock(locked) {
      // 極簡版：不鎖定工作類型；非管理員只有未訂閱時不能改，管理員永遠可改。
      const admin = isAdminUser(currentUser);
      $('#domain_code').disabled = admin ? false : !HAS_ACTIVE_SUBSCRIPTION;
    }

    function isOrderActive(orderRow) {
      if (!orderRow) return false;
      const status = String(orderRow.status || '').toLowerCase();
      if (status !== 'paid') return false;
      if (!orderRow.expire_at) return true;
      const exp = new Date(orderRow.expire_at);
      return !isNaN(exp.getTime()) && exp > new Date();
    }

    async function fetchLatestActiveSubscription(userId) {
      const { data, error } = await supabase
        .from('orders')
        .select('id,status,paid_at,expire_at,buyer_id,user_id')
        .or(`buyer_id.eq.${userId},user_id.eq.${userId}`)
        .order('paid_at', { ascending: false, nullsFirst: false });

      if (error) throw error;
      const rows = Array.isArray(data) ? data : [];
      return rows.find(isOrderActive) || null;
    }

    async function loadProfile() {
      showMsg('', '載入中…');
      try {
        currentUser = await getCurrentUser();

        if (!currentUser) {
          $('#userEmail').textContent = '';
          HAS_ACTIVE_SUBSCRIPTION = false;
          await loadDomainOptions('');
          applyProfileLock(false);
          renderSceneChips();
          setGuide('🔒 尚未登入：請先登入帳號，再進行訂閱與職業主題設定。');
          showMsg('warn', '未登入或登入狀態失效，請先回首頁重新登入');
          setDebug('loadProfile: no user from auth.getUser()/getSession()');
          return;
        }

        $('#address').value = data?.address ?? '';
        $('#avatarPreview').src = data?.avatar_url || '';

        const rawDomainCode = data?.domain_code ?? '';
        const domainCode = rawDomainCode === 'lifestyle' ? 'travel' : rawDomainCode;
        const isLocked = false; // 極簡版：不鎖定工作類型，user/admin 都可重新調整

        await loadDomainOptions(domainCode);
        applyProfileLock(isLocked);
        $('#level_code').value = data?.level_code ?? 'beginner';
        $('#talk_enabled').value = String(data?.talk_enabled ?? true);
        $('#onboarding_done_text').value = data?.onboarding_done ? '已啟用學習控制台' : '首次儲存後啟用學習控制台';

        selectedScenes = safeSceneArray(data?.scene_priority);
        renderSceneChips();

        setDebug([
          `user.id = ${currentUser.id}`,
          `email = ${currentUser.email || '(空)'}`,
          `subscription_active = ${HAS_ACTIVE_SUBSCRIPTION}`,
          `from_subscription = ${FROM_SUBSCRIPTION}`,
          `admin_bypass = ${isAdminUser(currentUser)}`,
          `domain_code = ${domainCode || '(空)'}`,
          `raw_domain_code = ${rawDomainCode || '(空)'}`,
          `domain_label = ${DOMAIN_LABEL[domainCode] || '(無)'}`,
          `domain_locked = ${isLocked}`
        ].join('\n'));

        if (isAdminUser(currentUser)) {
          setGuide('🛠 管理員模式：你具有最高權限，可直接修改工作類型，不會被鎖定。');
          showMsg('ok', '✅ 管理員模式：可自由調整職業主題設定');
        } else if (FROM_SUBSCRIPTION) {
          setGuide('👉 你是從訂閱流程進來的：請重新確認「工作類型」，儲存後即可進入學習控制台。');
          pulseField($('#domain_code'));
          showMsg('ok', '✅ 請完成職業主題設定');
        } else if (isLocked) {
          setGuide('✅ 已完成職業主題設定：你仍可重新調整工作類型。');
          showMsg('warn', '✅ 已完成職業主題設定，可重新調整');
        } else {
          setGuide('👉 請先選擇「工作類型」，完成後儲存即可啟用你的學習控制台。之後也可重新調整。');
          pulseField($('#domain_code'));
          showMsg('ok', '✅ 可進行職業主題設定');
        }
      } catch (e) {
        console.error(e);
        showMsg('err', `讀取失敗：${e.message || e}`);
        setDebug(`loadProfile error: ${e.message || e}`);
      }
    }

    async function uploadAvatar(user, file) {
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const path = `${user.id}/avatar.${ext === 'png' ? 'png' : 'jpg'}`;
      const up = await supabase.storage.from('avatars').upload(path, file, { upsert: true, contentType: file.type || 'image/jpeg' });
      if (up.error) throw up.error;
      const { data } = supabase.storage.from('avatars').getPublicUrl(path);
      return data?.publicUrl || null;
    }

    function validateForm() {
      const domain = $('#domain_code').value;
      if (!domain) {
        throw new Error('請先選工作類型');
      }
    }

    async function saveProfile() {
      showMsg('', '儲存中…');
      $('#btnSave').disabled = true;

      try {
        currentUser = await getCurrentUser();

        if (!currentUser) {
          showMsg('warn', '未登入或登入狀態失效，請先回首頁重新登入');
          setDebug('saveProfile: no user from auth.getUser()/getSession()');
          return;
        }

        if (!HAS_ACTIVE_SUBSCRIPTION && !isAdminUser(currentUser)) {
          setGuide('🔒 目前尚未啟用有效訂閱，請先完成訂閱後再進行職業主題設定。');
          showMsg('warn', '請先完成有效訂閱，再設定職業主題');
          setDebug('saveProfile blocked: no active subscription');
          return;
        }

        validateForm();

        const file = $('#avatarFile').files[0];
        let avatar_url = null;
        if (file) {
          avatar_url = await uploadAvatar(currentUser, file);
          if (avatar_url) $('#avatarPreview').src = avatar_url;
        }

        const updateData = {
          display_name: $('#display_name').value.trim() || null,
          phone: $('#phone').value.trim() || null,
          line_id: $('#line_id').value.trim() || null,
          wechat_id: $('#wechat_id').value.trim() || null,
          address: $('#address').value.trim() || null,
          domain_code: $('#domain_code').value,
          level_code: $('#level_code').value || 'beginner',
          talk_enabled: $('#talk_enabled').value === 'true',
          scene_priority: selectedScenes,
          onboarding_done: true,
          updated_at: new Date().toISOString(),
          ...(avatar_url ? { avatar_url } : {})
        };

        const { data: exist, error: existError } = await supabase
          .from('profiles')
          .select('id')
          .eq('id', currentUser.id)
          .maybeSingle();

        if (existError) throw existError;

        const query = exist
          ? supabase.from('profiles').update(updateData).eq('id', currentUser.id)
          : supabase.from('profiles').insert({ id: currentUser.id, ...updateData });

        const { error: saveError } = await query;
        if (saveError) throw saveError;

        $('#onboarding_done_text').value = '已啟用學習控制台';
        applyProfileLock(true);

        setDebug([
          `save success`,
          `user.id = ${currentUser.id}`,
          `domain_code = ${updateData.domain_code}`,
          `scene_priority = ${JSON.stringify(updateData.scene_priority)}`
        ].join('\n'));

        setGuide('✅ 職業主題設定完成，系統正在為你開啟學習控制台...');
        showMsg('ok', isAdminUser(currentUser) ? '✅ 管理員設定已保存，跳轉學習控制台...' : '✅ 已保存，跳轉學習控制台...');

        setTimeout(() => {
          location.href = DASHBOARD_URL + '?profile_updated=1';
        }, 500);
      } catch (e) {
        console.error(e);
        showMsg('err', `儲存失敗：${e.message || e}`);
        setDebug(`saveProfile error: ${e.message || e}`);
      } finally {
        $('#btnSave').disabled = false;
      }
    }


    $('#btnReload').addEventListener('click', loadProfile);
    $('#btnSave').addEventListener('click', saveProfile);

    renderSceneChips();

    supabase.auth.getUser().then(({ data, error }) => {
      if (error) {
        setDebug('startup getUser error: ' + (error.message || error));
      } else if (data?.user) {
        setDebug('startup getUser ok: ' + (data.user.email || data.user.id));
      } else {
        setDebug('startup getUser: null');
      }
    }).catch((e) => {
      setDebug('startup getUser catch: ' + (e.message || e));
    });

    supabase.auth.onAuthStateChange((event, session) => {
      if (session?.user) {
        currentUser = session.user;
        loadProfile();
      }
    });

    loadProfile();
  </script>
</body>
</html>
