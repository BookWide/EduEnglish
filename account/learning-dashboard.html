<!doctype html>
<html><head><meta charset="utf-8"><title>LD FINAL LOCK</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<script>
const SUPABASE_URL="https://jeajrwpmrgczimmrflxo.supabase.co";
const SUPABASE_ANON_KEY="YOUR_KEY";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function BW_getDeviceId(){
  let id = localStorage.getItem("bw_device_id");
  if(!id){ id = crypto.randomUUID(); localStorage.setItem("bw_device_id", id);}
  return id;
}

async function start(){
  const { data:{ user } } = await supabaseClient.auth.getUser();
  if(!user){ location.href="./index.html"; return; }

  const myDevice = BW_getDeviceId();

  await supabaseClient.from('profiles')
    .update({ current_device_id: myDevice })
    .eq('id', user.id);

  setInterval(async ()=>{
    const { data } = await supabaseClient
      .from('profiles')
      .select('current_device_id')
      .eq('id', user.id)
      .single();

    if(data?.current_device_id !== myDevice){
      alert("被其他裝置接管");
      await supabaseClient.auth.signOut();
      location.href="./index.html";
    }
  },5000);
}

start();
</script>
<h1>learning dashboard test</h1>
</body></html>
