<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Learning Dashboard V20</title>
<style>
body{font-family:sans-serif;background:#f5f6fa;padding:20px;}
.box{background:#fff;padding:12px;margin-bottom:12px;border-radius:8px;}
.day{padding:8px;margin:4px;border-radius:6px;background:#eaeef6;}
.right-item{padding:8px;margin:6px;background:#eef3ff;border-radius:6px;}
</style>
</head>
<body>

<h2>Learning Dashboard（V20 強制版）</h2>

<div class="box">
<h3>Profile</h3>
<div id="profile"></div>
</div>

<div class="box">
<h3>14 天行事曆（強制角色）</h3>
<div id="calendar"></div>
</div>

<div class="box">
<h3>角色路線（Top 10）</h3>
<div id="roadmap"></div>
</div>

<script>
function getProfile(){
  try{
    return JSON.parse(localStorage.getItem("profile")) || {};
  }catch(e){
    return {};
  }
}
const profile = getProfile();
document.getElementById("profile").innerText = JSON.stringify(profile,null,2);

async function loadAllData(){
  const res = await fetch("/data/index-all-pro.json");
  const data = await res.json();
  return data || [];
}

function filterByProfile(items, profile){
  const role = profile.role_code;
  const domain = profile.domain_code;
  return items.filter(x => {
    if(!x.role_codes || !x.domain_code) return false;
    return (
      x.domain_code === domain &&
      x.role_codes.includes(role)
    );
  });
}

function buildRoadmap(items){
  return items.slice(0,10);
}

function buildCalendar(items){
  const days = [];
  for(let i=0;i<14;i++){
    const item = items[i % items.length];
    days.push(item);
  }
  return days;
}

function renderCalendar(list){
  const el = document.getElementById("calendar");
  el.innerHTML = "";
  list.forEach((x,i)=>{
    const d = document.createElement("div");
    d.className = "day";
    d.innerText = `Day ${i+1}：${x.slug}`;
    el.appendChild(d);
  });
}

function renderRoadmap(list){
  const el = document.getElementById("roadmap");
  el.innerHTML = "";
  list.forEach((x,i)=>{
    const d = document.createElement("div");
    d.className = "right-item";
    d.innerText = `${i+1}. ${x.slug}`;
    el.appendChild(d);
  });
}

async function init(){
  const all = await loadAllData();
  const filtered = filterByProfile(all, profile);

  if(filtered.length === 0){
    alert("❌ 沒有符合此角色的教材！");
    return;
  }

  const roadmap = buildRoadmap(filtered);
  const calendar = buildCalendar(filtered);

  renderRoadmap(roadmap);
  renderCalendar(calendar);
}
init();
</script>

</body>
</html>
