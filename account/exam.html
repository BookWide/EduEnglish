<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BookWide｜本期學習成果測驗</title>
  <style>
    :root{
      --bg:#071224;
      --panel:#0f2039;
      --panel2:#122844;
      --card:#0b1930;
      --line:#28476f;
      --text:#f3f7ff;
      --muted:#b9cae6;
      --brand:#3b82f6;
      --brand2:#1d4ed8;
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --pill:#17365d;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif}
    a{color:inherit}
    .topbar{position:sticky;top:0;z-index:20;min-height:76px;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;background:rgba(7,18,36,.94);backdrop-filter:blur(12px);border-bottom:1px solid rgba(120,160,220,.16)}
    .brand{font-size:24px;font-weight:900;letter-spacing:.2px}
    .brand small{font-size:13px;font-weight:700;color:#d4e2ff;border:1px solid var(--line);padding:4px 10px;border-radius:999px;margin-left:8px}
    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .top-link,.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:999px;padding:11px 16px;font-size:15px;font-weight:800;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:transparent}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .wrap{max-width:1180px;margin:28px auto 80px;padding:0 18px}
    .hero{border:1px solid var(--line);background:linear-gradient(135deg,rgba(20,47,82,.96),rgba(11,25,48,.96));border-radius:28px;padding:24px;box-shadow:var(--shadow);display:grid;gap:18px}
    .hero-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(280px,.8fr);gap:18px}
    @media(max-width:900px){.hero-grid{grid-template-columns:1fr}}
    h1{font-size:34px;margin:0 0 10px;line-height:1.2}
    .lead{font-size:17px;line-height:1.8;color:var(--muted);margin:0}
    .meta-card{background:rgba(5,14,29,.48);border:1px solid var(--line);border-radius:20px;padding:18px}
    .meta-list{display:grid;gap:12px;margin-top:12px}
    .meta-row{display:flex;justify-content:space-between;gap:16px;color:var(--muted);font-size:15px}
    .meta-row strong{color:var(--text);text-align:right}
    .pill-row{display:flex;flex-wrap:wrap;gap:10px}
    .pill{background:var(--pill);border:1px solid var(--line);padding:8px 12px;border-radius:999px;font-weight:800;font-size:14px}
    .toolbar{margin-top:18px;padding:16px 18px;border:1px solid var(--line);border-radius:22px;background:var(--panel);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;position:sticky;top:92px;z-index:12}
    .progress-wrap{flex:1 1 100%;display:flex;align-items:center;gap:12px}
    .progress{height:14px;background:#091427;border:1px solid var(--line);border-radius:999px;overflow:hidden;flex:1}
    .progress > div{height:100%;width:0;background:linear-gradient(90deg,#38bdf8,#22c55e);transition:width .2s ease}
    .progress-text{white-space:nowrap;font-weight:900;color:#dbeafe}
    .notice{margin-top:18px;border:1px dashed var(--line);background:rgba(16,35,63,.72);border-radius:20px;padding:16px 18px;color:var(--muted);line-height:1.8}
    .questions{display:grid;gap:18px;margin-top:18px}
    .q-card{border:1px solid var(--line);background:var(--card);border-radius:24px;padding:20px;box-shadow:0 12px 30px rgba(0,0,0,.18)}
    .q-head{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .q-no{font-weight:1000;font-size:18px;color:#dbeafe}
    .section-badge{font-size:13px;font-weight:900;border-radius:999px;padding:6px 11px;border:1px solid var(--line);background:var(--pill)}
    .source-mini{font-size:13px;color:var(--muted)}
    .question{font-size:22px;line-height:1.55;font-weight:900;margin:10px 0 16px}
    .options{display:grid;gap:10px}
    .option{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);background:#10223e;border-radius:18px;padding:14px 15px;cursor:pointer;transition:transform .12s ease,border-color .12s ease,background .12s ease}
    .option:hover{transform:translateY(-1px);border-color:#5f8fda}
    .option.selected{border-color:#60a5fa;background:#16355f}
    .option input{margin-top:4px;transform:scale(1.2)}
    .opt-letter{font-weight:1000;color:#dbeafe;min-width:26px}
    .opt-text{font-size:18px;line-height:1.55}
    .footer-actions{margin-top:22px;border:1px solid var(--line);background:var(--panel);padding:18px;border-radius:24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
    .save-state{color:var(--muted);font-size:15px;line-height:1.7}
    .result-box{margin-top:18px;display:none;border:1px solid rgba(34,197,94,.5);background:rgba(20,83,45,.35);border-radius:24px;padding:20px}
    .result-box.show{display:block}
    .result-score{font-size:42px;font-weight:1000;margin:0 0 6px}
    .result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:14px}
    .result-mini{border:1px solid rgba(134,239,172,.25);border-radius:18px;padding:14px;background:rgba(0,0,0,.14)}
    .empty,.loading,.error{border:1px solid var(--line);background:var(--panel);border-radius:24px;padding:28px;text-align:center;color:var(--muted);font-size:18px;margin-top:18px}
    .error{border-color:rgba(239,68,68,.58);color:#fecaca}
    @media(max-width:700px){.topbar{padding:14px 16px}.brand{font-size:20px}h1{font-size:28px}.question{font-size:19px}.opt-text{font-size:16px}.wrap{padding:0 12px}.toolbar{top:84px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">BookWide <small>成果測驗</small></div>
    <div class="top-actions">
      <span id="who" class="top-link">登入檢查中…</span>
      <a class="top-link" href="/account/learning-dashboard.html">↩ 回學習控制台</a>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <div class="hero-grid">
        <div>
          <h1>本期學習成果測驗</h1>
          <p class="lead">這份考卷不考你記住幾週前影片中的情節或歌詞。系統會依你訂閱期間實際看過的 BookWide 內容，抽出核心字彙與片語做成果驗收；完成後自動批改並生成報告。</p>
          <div class="pill-row" style="margin-top:16px">
            <span class="pill" id="examTypePill">測驗類型載入中</span>
            <span class="pill" id="totalPill">題數載入中</span>
            <span class="pill" id="periodPill">期間載入中</span>
          </div>
        </div>
        <aside class="meta-card">
          <strong style="font-size:18px">考卷狀態</strong>
          <div class="meta-list">
            <div class="meta-row"><span>狀態</span><strong id="examStatus">—</strong></div>
            <div class="meta-row"><span>已作答</span><strong id="answeredCount">0 / 0</strong></div>
            <div class="meta-row"><span>自動保存</span><strong id="saveBadge">待作答</strong></div>
          </div>
        </aside>
      </div>
    </section>

    <section class="toolbar">
      <div class="progress-wrap">
        <div class="progress"><div id="progressBar"></div></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>

    </section>

    <section class="notice">作答會逐題自動保存。這份成果測驗以「學過的字彙與片語」為主，不考長時間後難以回想的影片情節。全部題目完成後，再按下最下方的「提交並批改」。</section>

    <div id="loading" class="loading">正在載入成果考卷…</div>
    <div id="error" class="error" style="display:none"></div>
    <section id="questions" class="questions"></section>

    <section class="footer-actions" id="footerActions" style="display:none">
      <div class="save-state" id="footerHint">全部題目作答後即可提交。系統會依題目標準答案自動批改。</div>
      <button class="btn primary" id="submitBtn" disabled>提交並批改</button>
    </section>

    <section id="resultBox" class="result-box">
      <p class="result-score" id="resultScore">—</p>
      <div id="resultSummary" style="font-size:18px;font-weight:900"></div>
      <div class="result-grid" id="resultGrid"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    const ROOT_BASE = (location.pathname.startsWith('/EduEnglish') || location.hostname.includes('github.io')) ? '/EduEnglish' : '';
    const FUNCTIONS_BASE = 'https://jeajrwpmrgczimmrflxo.supabase.co/functions/v1';
    const qs = new URLSearchParams(location.search);
    const examId = qs.get('exam') || qs.get('id') || '';
    const els = {
      who: document.getElementById('who'), loading: document.getElementById('loading'), error: document.getElementById('error'), questions: document.getElementById('questions'), examTypePill: document.getElementById('examTypePill'), totalPill: document.getElementById('totalPill'), periodPill: document.getElementById('periodPill'), examStatus: document.getElementById('examStatus'), answeredCount: document.getElementById('answeredCount'), saveBadge: document.getElementById('saveBadge'), progressBar: document.getElementById('progressBar'), progressText: document.getElementById('progressText'), footerActions: document.getElementById('footerActions'), footerHint: document.getElementById('footerHint'), submitBtn: document.getElementById('submitBtn'), resultBox: document.getElementById('resultBox'), resultScore: document.getElementById('resultScore'), resultSummary: document.getElementById('resultSummary'), resultGrid: document.getElementById('resultGrid')
    };
    let supabase = null, session = null, currentUser = null, exam = null, questions = [], answers = new Map(), saveTimer = null;
    function showError(msg){ els.loading.style.display='none'; els.error.style.display='block'; els.error.textContent=msg; }
    function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function fmtDate(v){ if(!v)return '—'; const d=new Date(v); return Number.isNaN(d.getTime())?String(v):d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}); }
    function examTypeLabel(t){ return t==='monthly'?'1 個月成果測驗':t==='half_year'?'6 個月成果測驗':t==='yearly'?'12 個月成果測驗':(t||'成果測驗'); }
    function statusLabel(s){ return ({draft:'準備中',ready:'可作答',sent:'已寄出',started:'作答中',submitted:'已交卷',result_emailed:'成績已寄出',expired:'已截止'}[s]||s||'—'); }
    const letters=()=>['A','B','C','D'];
    async function initSupa(){
      const SUPABASE_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co';
      const SUPABASE_ANON_KEY =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do';

      els.who.textContent = '登入檢查中…';

      if (!window.supabase?.createClient) {
        throw new Error('找不到 Supabase client，無法讀取登入狀態。');
      }

      // 完全比照目前 Talk 守門：
      // CDN UMD client + auth.getSession() 先拿 session.user
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
      console.log('[BW-exam] using talk-style session guard');

      async function readSession(){
        const { data, error } = await supabase.auth.getSession();
        if(error) console.warn('[BW-exam] getSession error', error);
        return data?.session || null;
      }

      // exam 頁很輕，auth storage 恢復可能比 dashboard 更晚；最多等 5 秒
      const started = Date.now();
      while(Date.now() - started < 5000){
        session = await readSession();
        if(session?.user) break;
        await new Promise(r => setTimeout(r, 250));
      }

      if (!session?.user) {
        throw new Error('請先登入 BookWide 後再開啟成果測驗。');
      }

      currentUser = session.user;
      els.who.textContent = currentUser.email || '已登入';
      console.log('[BW-exam] auth ok user =', currentUser.email || currentUser.id);
    }
    async function loadExam(){
      if(!examId) throw new Error('缺少 exam id。請使用測驗專屬連結開啟。');
      const examRes=await supabase.from('learning_exams').select('*').eq('id',examId).maybeSingle();
      if(examRes.error) throw examRes.error; if(!examRes.data) throw new Error('找不到這份成果測驗，或此帳號無權查看。'); exam=examRes.data;
      const qRes=await supabase.from('learning_exam_questions').select('*').eq('exam_id',examId).order('order_no',{ascending:true});
      if(qRes.error) throw qRes.error; questions=qRes.data||[];
      const aRes=await supabase.from('learning_exam_answers').select('question_id,selected_answer,is_correct').eq('exam_id',examId).eq('user_id',currentUser.id);
      if(aRes.error) throw aRes.error; answers=new Map((aRes.data||[]).map(a=>[a.question_id,a.selected_answer||'']));
    }
    function renderMeta(){ els.examTypePill.textContent=examTypeLabel(exam.exam_type); els.totalPill.textContent=`共 ${exam.total_questions || questions.length} 題`; els.periodPill.textContent=`${fmtDate(exam.period_start)} ～ ${fmtDate(exam.period_end)}`; els.examStatus.textContent=statusLabel(exam.status); updateProgress(); }
    function updateProgress(){ const total=questions.length, answered=questions.filter(q=>!!answers.get(q.id)).length, pct=total?Math.round(answered*100/total):0; els.answeredCount.textContent=`${answered} / ${total}`; els.progressText.textContent=`${pct}%`; els.progressBar.style.width=`${pct}%`; els.submitBtn.disabled=!(total>0&&answered===total); els.saveBadge.textContent=answered?'已自動保存':'待作答'; els.footerHint.textContent=answered===total?'已全部作答，可以提交並自動批改。':`尚有 ${Math.max(0,total-answered)} 題未作答。`; }
    function visibleQuestions(){ return questions; }
    function renderQuestions(){
      const rows=visibleQuestions();
      els.questions.innerHTML=rows.map(q=>{ const selected=answers.get(q.id)||'', opts=Array.isArray(q.options)?q.options:[]; return `<article class="q-card" data-qid="${escapeHtml(q.id)}"><div class="q-head"><span class="q-no">第 ${escapeHtml(q.order_no)} 題</span><span class="section-badge">${escapeHtml(q.section)}</span><span class="source-mini">${escapeHtml(q.asset_category)} / ${escapeHtml(q.asset_slug)}</span></div><div class="question">${escapeHtml(q.question)}</div><div class="options">${letters().map((letter,idx)=>{ const text=opts[idx]??'', checked=selected===letter?'checked':'', sel=selected===letter?'selected':''; return `<label class="option ${sel}"><input type="radio" name="q_${escapeHtml(q.id)}" value="${letter}" ${checked}><span class="opt-letter">${letter}.</span><span class="opt-text">${escapeHtml(text)}</span></label>`; }).join('')}</div></article>`; }).join('');
      els.questions.querySelectorAll('input[type="radio"]').forEach(radio=>radio.addEventListener('change',async ev=>{ const card=ev.target.closest('.q-card'), qid=card?.dataset?.qid, val=ev.target.value; if(!qid||!val)return; answers.set(qid,val); card.querySelectorAll('.option').forEach(el=>el.classList.remove('selected')); ev.target.closest('.option')?.classList.add('selected'); updateProgress(); await saveAnswer(qid,val); }));
    }
    async function saveAnswer(questionId,selectedAnswer){ els.saveBadge.textContent='保存中…'; if(saveTimer)clearTimeout(saveTimer); const payload={exam_id:examId,question_id:questionId,user_id:currentUser.id,selected_answer:selectedAnswer,answered_at:new Date().toISOString()}; const res=await supabase.from('learning_exam_answers').upsert(payload,{onConflict:'exam_id,question_id,user_id'}); if(res.error){ console.error(res.error); els.saveBadge.textContent='保存失敗'; els.saveBadge.style.color='#fecaca'; return; } els.saveBadge.style.color=''; els.saveBadge.textContent='已自動保存'; saveTimer=setTimeout(()=>updateProgress(),900); }
    async function submitExam(){ if(els.submitBtn.disabled)return; if(!confirm('確定要提交本期成果測驗嗎？提交後將自動批改。'))return; els.submitBtn.disabled=true; els.submitBtn.textContent='批改中…'; try{ const res=await fetch(`${FUNCTIONS_BASE}/submit-learning-exam`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},body:JSON.stringify({exam_id:examId})}); const data=await res.json(); if(!res.ok||!data.ok)throw new Error(data?.message||data?.error||'提交失敗'); showResult(data); exam.status='submitted'; els.examStatus.textContent=statusLabel(exam.status); }catch(err){ console.error(err); alert(`提交失敗：${err.message || err}`); els.submitBtn.disabled=false; }finally{ els.submitBtn.textContent='提交並批改'; } }
    function showResult(data){ els.resultBox.classList.add('show'); els.resultScore.textContent=`${Number(data.score||0).toFixed(2)} 分`; els.resultSummary.textContent=`答對 ${data.correct_count} / ${data.total_questions} 題`; const stats=data.section_stats||{}; els.resultGrid.innerHTML=Object.entries(stats).map(([section,v])=>`<div class="result-mini"><div style="font-weight:1000;margin-bottom:6px">${escapeHtml(section)}</div><div>${escapeHtml(v.correct)} / ${escapeHtml(v.total)} 題</div></div>`).join(''); els.resultBox.scrollIntoView({behavior:'smooth',block:'start'}); }
    async function boot(){ try{ await initSupa(); await loadExam(); els.loading.style.display='none'; els.footerActions.style.display='flex'; renderMeta(); renderQuestions(); els.submitBtn.addEventListener('click',submitExam); }catch(err){ console.error(err); showError(err.message||String(err)); } }
    boot();
  </script>
</body>
</html>
