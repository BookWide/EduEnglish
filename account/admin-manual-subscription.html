<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>訂閱人工開通｜BookWide Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--brand:#2563eb;--ok:#047857;--bad:#b91c1c;--warn:#92400e;}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}.wrap{max-width:980px;margin:28px auto;padding:0 16px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 16px;font-weight:800;cursor:pointer;text-decoration:none;color:var(--ink)}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn:disabled{opacity:.55;cursor:not-allowed}h1{margin:8px 0 4px;font-size:34px}.sub{color:var(--muted);line-height:1.7}.card{background:var(--card);border:1px solid var(--line);box-shadow:0 12px 32px rgba(15,23,42,.08);border-radius:22px;padding:22px;margin:16px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.grid{grid-template-columns:1fr}}label{display:block;font-size:13px;color:#475569;font-weight:800;margin:0 0 6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:16px;background:#fff;color:var(--ink)}textarea{min-height:92px;resize:vertical}.hint{font-size:12px;color:var(--muted);margin-top:6px}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;color:#475569;font-size:13px}.result{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;border:1px dashed var(--line);background:#f8fafc;border-radius:16px;padding:14px;line-height:1.55}.ok{color:var(--ok);font-weight:900}.bad{color:var(--bad);font-weight:900}.warn{color:var(--warn);font-weight:900}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}@media(max-width:760px){.summary{grid-template-columns:1fr}}.box{border:1px solid var(--line);border-radius:16px;padding:12px;background:#f8fafc}.box b{display:block;margin-bottom:5px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>訂閱人工開通</h1>
      <div class="sub">客戶人工付款後，在這裡輸入 Email、方案與推薦碼，系統會建立 paid 訂單、發金幣、寫入分潤。</div>
    </div>
    <div class="row">
      <span class="pill" id="who">檢查登入中…</span>
      <a class="btn" href="../admin.html">← 回 Admin</a>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">開通資料</h2>
    <div class="grid">
      <div>
        <label>客戶登入 Email</label>
        <input id="email" placeholder="customer@example.com" autocomplete="email" />
        <div class="hint">必須是 profiles 裡已存在的登入 email。</div>
      </div>
      <div>
        <label>方案</label>
        <select id="plan">
          <option value="month">月繳 NT$1000｜30 天｜50 金幣｜分潤 NT$100</option>
          <option value="half">半年 NT$5400｜180 天｜330 金幣｜分潤 NT$540</option>
          <option value="year">年繳 NT$9600｜365 天｜720 金幣｜分潤 NT$960</option>
        </select>
      </div>
      <div>
        <label>推薦碼 ref（沒有可留空）</label>
        <input id="refCode" placeholder="例如：45845" />
        <div class="hint">自推不計分潤；找不到推薦碼則不計分潤。</div>
      </div>
      <div>
        <label>付款方式</label>
        <select id="paymentMethod">
          <option value="bank">銀行轉帳</option>
          <option value="linepay">LINE Pay / LINE 轉帳</option>
          <option value="other">其他人工付款</option>
        </select>
      </div>
      <div>
        <label>付款時間（可留空，預設現在）</label>
        <input id="paidAt" type="datetime-local" />
      </div>
      <div>
        <label>付款後五碼 / 交易備註</label>
        <input id="paymentRef" placeholder="例如後五碼、截圖檔名、LINE 訊息時間" />
      </div>
    </div>

    <div style="margin-top:14px">
      <label>內部備註</label>
      <textarea id="note" placeholder="例如：LINE 回報、已核對渣打入帳、截圖檔名…"></textarea>
    </div>

    <div class="summary" id="summary"></div>

    <div class="row" style="margin-top:18px">
      <button class="btn" id="btnPreview" type="button">重新計算</button>
      <button class="btn primary" id="btnOpen" type="button">確認人工開通</button>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">執行結果</h2>
    <div id="result" class="result">尚未執行。</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do';
const FUNCTION_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co/functions/v1/manual-subscription-open';
const ADMIN_EMAILS = ['pmktools@gmail.com'];
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PLAN = {
  month:{label:'月繳', amount:1000, days:30, coins:50, commission:100},
  half:{label:'半年', amount:5400, days:180, coins:330, commission:540},
  year:{label:'年繳', amount:9600, days:365, coins:720, commission:960}
};
let currentUser = null;
function $(id){return document.getElementById(id)}
function planInfo(){return PLAN[$('plan').value] || PLAN.month}
function renderSummary(){
  const p = planInfo();
  $('summary').innerHTML = `
    <div class="box"><b>開通天數</b>${p.days} 天</div>
    <div class="box"><b>發放金幣</b>${p.coins} 金幣</div>
    <div class="box"><b>推薦分潤</b>有推薦碼時 NT$${p.commission}</div>
  `;
}
async function init(){
  renderSummary();
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  $('paidAt').value = now.toISOString().slice(0,16);

  const { data } = await sb.auth.getUser();
  currentUser = data?.user || null;
  if(!currentUser){
    $('who').textContent = '未登入';
    $('who').className = 'pill bad';
    $('btnOpen').disabled = true;
    $('result').textContent = '請先登入 admin 帳號。';
    return;
  }
  $('who').textContent = currentUser.email;
  const isAdmin = ADMIN_EMAILS.includes(String(currentUser.email || '').toLowerCase());
  if(!isAdmin){
    $('who').className = 'pill bad';
    $('btnOpen').disabled = true;
    $('result').textContent = '目前登入帳號不是允許的 admin。';
    return;
  }
  $('who').className = 'pill ok';
}
$('plan').addEventListener('change', renderSummary);
$('btnPreview').addEventListener('click', renderSummary);
$('btnOpen').addEventListener('click', async ()=>{
  const email = $('email').value.trim();
  if(!email){ alert('請輸入客戶 Email'); return; }
  if(!confirm(`確認開通 ${email} 的 ${planInfo().label} 方案？`)) return;
  $('btnOpen').disabled = true;
  $('result').textContent = '執行中…';
  try{
    const { data: sessionData } = await sb.auth.getSession();
    const token = sessionData?.session?.access_token;
    if(!token) throw new Error('找不到登入 token，請重新登入。');
    const res = await fetch(FUNCTION_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
      body: JSON.stringify({
        email,
        plan:$('plan').value,
        refCode:$('refCode').value.trim(),
        paymentMethod:$('paymentMethod').value,
        paidAt:$('paidAt').value ? new Date($('paidAt').value).toISOString() : null,
        paymentRef:$('paymentRef').value.trim(),
        note:$('note').value.trim()
      })
    });
    const json = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    $('result').innerHTML = `✅ 開通成功\n\n${JSON.stringify(json, null, 2)}`;
  }catch(err){
    $('result').innerHTML = `❌ 開通失敗\n\n${err.message || err}`;
  }finally{
    $('btnOpen').disabled = false;
  }
});
init();
</script>
</body>
</html>
