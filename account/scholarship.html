<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>BookWide｜助學申請</title>
<style>
:root{
  --bg:#f5f7fb;
  --card:#fff;
  --ink:#0f172a;
  --muted:#64748b;
  --line:#dbe5f2;
  --brand:#2563eb;
  --ok:#16a34a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  background:linear-gradient(180deg,#f8fbff 0%,#eef3fa 100%);
  color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
}
a{text-decoration:none;color:inherit}
.wrap{
  width:min(720px,calc(100vw - 20px));
  margin:16px auto 28px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}
.brand{font-weight:950;font-size:18px;letter-spacing:.01em}
.topActions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  border:1px solid var(--brand);
  border-radius:999px;
  padding:9px 15px;
  background:linear-gradient(135deg,var(--brand),#4f8cff);
  color:#fff;
  font-weight:950;
  font-size:14px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
}
.btn.secondary{background:#fff;color:var(--brand);border-color:#bfdbfe}
.btn.scholar{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:#16a34a}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:0 18px 42px rgba(15,23,42,.10);
  overflow:hidden;
}
.hero{
  padding:22px 22px 18px;
  background:linear-gradient(135deg,#ecfdf5,#fff 58%,#eff6ff);
  border-bottom:1px solid var(--line);
}
.eyebrow{color:var(--ok);font-size:12px;font-weight:1000;letter-spacing:.12em}
h1{margin:6px 0 7px;font-size:28px;line-height:1.15;letter-spacing:-.02em}
.sub{margin:0;color:#475569;font-size:14px;line-height:1.55;font-weight:750}
.content{padding:18px 22px 20px;display:grid;gap:14px}
.notice{
  border:1px solid #bbf7d0;
  background:#f0fdf4;
  border-radius:16px;
  padding:11px 13px;
  color:#334155;
  font-size:13px;
  line-height:1.55;
  font-weight:820;
}
.form{
  border:1px solid var(--line);
  border-radius:18px;
  background:#fff;
  padding:14px;
}
.fieldGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fieldRow{display:grid;gap:5px;margin-top:10px}
.fieldRow:first-child{margin-top:0}
.fieldLabel{font-size:12px;color:#475569;font-weight:950}
select,input,textarea{
  width:100%;
  border:1px solid #cbd5e1;
  border-radius:12px;
  padding:9px 10px;
  font:inherit;
  font-size:14px;
}
textarea{min-height:108px;resize:vertical}
.actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:14px}
.status{
  margin-top:12px;
  border:1px solid #bfdbfe;
  background:#eff6ff;
  border-radius:13px;
  padding:10px 11px;
  font-size:12px;
  line-height:1.45;
  font-weight:800;
}
.status.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}
.status.ok{border-color:#bbf7d0;background:#f0fdf4;color:#166534}
.legal{margin-top:12px;color:#64748b;font-size:12px;line-height:1.45;font-weight:750}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
@media(max-width:560px){
  .wrap{width:calc(100vw - 16px);margin-top:10px}
  .topbar{display:block}
  .topActions{margin-top:8px}
  .topActions .btn{flex:1}
  .hero{padding:18px 16px 15px}
  h1{font-size:25px}
  .content{padding:14px 16px 16px}
  .fieldGrid{grid-template-columns:1fr}
  .actions .btn{width:100%}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">BookWide 助學申請</div>
    <div class="topActions">
      <a class="btn secondary" href="/activity.html">返回活動</a>
      <a class="btn secondary" id="loginBtn" href="/index.html#login">登入 / 註冊</a>
    </div>
  </div>

  <main class="card">
    <section class="hero">
      <div class="eyebrow">BOOKWIDE SCHOLARSHIP</div>
      <h1>助學申請</h1>
      <p class="sub">弱勢學生可申請免費學習資格。送出後由 BookWide 後台審核，通過後手動開通會員。</p>
    </section>

    <section class="content">
      <div class="notice">
        助學申請不需付款；請先登入帳號再送出申請。審核通過後，系統會由後台手動開通學習會員。
      </div>

      <section class="form">
        <div class="fieldGrid">
          <div class="fieldRow">
            <div class="fieldLabel">申請人姓名 / 暱稱</div>
            <input id="scholarName" type="text" placeholder="例如：王小明">
          </div>
          <div class="fieldRow">
            <div class="fieldLabel">申請身分</div>
            <select id="scholarType">
              <option value="弱勢學生">弱勢學生</option>
              <option value="低收入戶 / 中低收入戶">低收入戶 / 中低收入戶</option>
              <option value="偏鄉學生">偏鄉學生</option>
              <option value="其他需要協助者">其他需要協助者</option>
            </select>
          </div>
        </div>

        <div class="fieldRow">
          <div class="fieldLabel">申請原因</div>
          <textarea id="scholarReason" placeholder="簡短說明目前學習需求與需要助學資格的原因。"></textarea>
        </div>

        <div class="actions">
          <button class="btn scholar" id="submitScholarship" type="button">送出助學申請</button>
        </div>

        <div id="scholarStatus" class="status">請先確認已登入 BookWide 帳號。</div>
      </section>

      <div class="legal">客服：pmktools@gmail.com</div>
    </section>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do';
const REQUEST_FUNCTION_URL = 'https://jeajrwpmrgczimmrflxo.supabase.co/functions/v1/subscription-request';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
});

const qs = new URLSearchParams(location.search);
const ref = (qs.get('ref') || '').trim();
let authUser = null;
let finalEmail = '';

function $(id){ return document.getElementById(id); }
function loginUrl(){ return '/index.html#login'; }

function setScholarStatus(html, type=''){
  const box = $('scholarStatus');
  if(!box) return;
  box.className = 'status' + (type ? ' ' + type : '');
  box.innerHTML = html;
}

async function initAuthEmail(showMessage=true){
  const { data: sess } = await sb.auth.getSession();
  const session = sess?.session || null;
  authUser = session?.user || null;
  const token = session?.access_token || '';

  const loginBtn = $('loginBtn');
  if(authUser?.email && token){
    finalEmail = authUser.email;
    if(loginBtn){
      loginBtn.textContent = `已登入：${finalEmail}`;
      loginBtn.href = '/account/subscription.html';
    }
    if(showMessage) setScholarStatus(`已登入：<span class="mono">${finalEmail}</span>，可送出助學申請。`, 'ok');
    return { ok:true, token, email:finalEmail };
  }

  finalEmail = '';
  if(loginBtn){
    loginBtn.textContent = '登入 / 註冊';
    loginBtn.href = loginUrl();
  }
  if(showMessage){
    setScholarStatus(`請先登入後再送出助學申請。<br><a class="btn" href="${loginUrl()}" style="display:inline-flex;margin-top:10px">前往登入 / 註冊</a>`, 'error');
  }
  return { ok:false, token:'', email:'' };
}

$('submitScholarship')?.addEventListener('click', async ()=>{
  try{
    const auth = await initAuthEmail(false);
    if(!auth.ok || !auth.token || !auth.email){
      setScholarStatus(`請先登入後再送出助學申請。<br><a class="btn" href="${loginUrl()}" style="display:inline-flex;margin-top:10px">前往登入 / 註冊</a>`, 'error');
      return;
    }

    const name = ($('scholarName')?.value || '').trim();
    const type = ($('scholarType')?.value || '').trim();
    const reason = ($('scholarReason')?.value || '').trim();

    if(!reason){
      setScholarStatus('請先填寫申請原因。', 'error');
      return;
    }

    setScholarStatus('助學申請送出中…');
    const scholarshipNo = 'BW-AID-' + new Date().toISOString().slice(0,10).replaceAll('-','') + '-' + Math.random().toString(36).slice(2,8).toUpperCase();

    const res = await fetch(REQUEST_FUNCTION_URL, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${auth.token}`,
        'apikey':SUPABASE_ANON_KEY
      },
      body: JSON.stringify({
        action:'submit',
        email: auth.email,
        plan: 'scholarship',
        planLabel: '助學免費資格 / 後台審核',
        amount: 0,
        days: 30,
        coins: 50,
        referralCode: ref || '',
        paymentMethod: '助學申請',
        paymentTime: new Date().toISOString(),
        paymentRef: scholarshipNo,
        slipNo: scholarshipNo,
        customerNote: `助學申請｜姓名/暱稱：${name || '未填'}｜身分：${type || '未填'}｜原因：${reason}`
      })
    });

    const j = await res.json().catch(()=>({}));
    if(!res.ok || !j.ok) throw new Error(j.error || `HTTP ${res.status}`);

    setScholarStatus(`已送出助學申請。<br>申請編號：<span class="mono">${j.request_id || scholarshipNo}</span><br>後台審核通過後會手動開通會員。`, 'ok');
    $('submitScholarship').disabled = true;
  }catch(e){
    setScholarStatus(`助學申請送出失敗：${String(e.message || e)}`, 'error');
  }
});

initAuthEmail(true);
</script>
</body>
</html>
