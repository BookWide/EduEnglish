<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWide 情商問答系統 (fq.html)</title>
    <!-- 引入日文字型與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           1. 基礎深藍調視覺與佈局 (參考 image_39b088.jpg)
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d1b2a;
            color: #e0e1dd;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #bookwide-app {
            width: 100%;
            max-width: 500px;
            background: #1b263b;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 20px;
            border: 1px solid #415a77;
            transition: all 0.3s ease;
        }

        /* --- 頂部視覺區 (Hero Area) --- */
        .hero-container {
            position: relative;
            background: #0d1b2a;
            border-radius: 12px;
            height: 241px; /* 桌機預設高度 */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            border: 1px solid #415a77;
        }
        .hero-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
            z-index: 1;
        }
        .hero-text-box {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            padding-bottom: 10px;
        }

        /* --- 語音高亮核心特效 (herating.html 精隨) --- */
        .heroWord {
            display: inline-block;
            font-size: 1.4rem;
            font-weight: 500;
            color: #ffffff;
            margin: 0 4px;
            transition: transform 0.15s, color 0.15s;
        }
        .heroWord.on {
            color: #ffeb3b; /* 經典亮黃色 */
            transform: translateY(-3px) scale(1.08);
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.8);
        }
        
        /* 中日文整句/斷句高亮 */
        .phraseWord {
            display: inline-block;
            font-size: 1.4rem;
            font-weight: 500;
            color: #ffffff;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .phraseWord.on {
            color: #ffeb3b;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.8);
        }

        /* --- 控制面板與多語下拉選單 --- */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            background: #0d1b2a;
            padding: 8px 12px;
            border-radius: 8px;
        }
        .scene-title { font-size: 1rem; font-weight: bold; color: #778da9; }
        .right-controls { display: flex; align-items: center; gap: 8px; }
        
        select.lang-select {
            background: #1b263b;
            color: #e0e1dd;
            border: 1px solid #415a77;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }
        .icon-btn {
            background: #415a77;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: #778da9; }

        /* --- 選項與答題區 --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #415a77;
            border-radius: 10px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .option-card:hover { background: rgba(255,255,255,0.08); border-color: #778da9; }
        .option-main { font-size: 1rem; font-weight: 500; color: #fff; margin-bottom: 2px; }
        .option-sub { font-size: 0.85rem; color: #778da9; }

        /* --- 點評與和尚回話區 (.monkReply) --- */
        .monkReply {
            margin-top: 15px;
            background: #415a77;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #ffeb3b;
            display: none; /* 預設隱藏 */
            animation: fadeIn 0.3s ease;
        }
        .monkReply.show { display: block; }

        /* ==========================================================================
           2. 手機版極致壓縮 CSS (呼應 bw-heart-mobile-space-compress)
           ========================================================================== */
        @media (max-width: 640px) {
            body { padding: 10px; }
            #bookwide-app { padding: 12px; border-radius: 12px; }
            
            /* 高度大幅壓縮，防滾動 */
            .hero-container { height: 165px; padding: 8px; }
            .heroWord, .phraseWord { font-size: 1.15rem; }
            
            .control-panel { margin: 10px 0; padding: 6px 10px; }
            .scene-title { font-size: 0.85rem; }
            
            /* 選項與字體微調縮小 */
            .option-card { padding: 10px 12px; }
            .option-main { font-size: 0.9rem; }
            .option-sub { font-size: 0.78rem; }
            .monkReply { font-size: 0.85rem; padding: 10px; margin-top: 10px; }
        }

        /* 日文特殊字型與行高優化 */
        .lang-ja { font-family: "Noto Sans JP", sans-serif; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="bookwide-app" class="lang-ja">
    <!-- 頂部視覺區 -->
    <div class="hero-container">
        <!-- 預留背景圖，此處使用 Unsplash 示意餐廳背景 -->
        <img class="hero-img" src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500" alt="Scene">
        <div class="hero-text-box" id="heroTextBox">
            <!-- 透過 JS 動態注入高亮 Span -->
        </div>
    </div>

    <!-- 控制面版 (包含預留多語下拉選單) -->
    <div class="control-panel">
        <div class="scene-title" id="sceneTitle">Loading...</div>
        <div class="right-controls">
            <!-- 多語系下拉選單，優先套用 ja (日文) -->
            <select class="lang-select" id="langSelect" onchange="switchLanguage(this.value)">
                <option value="ja" selected>日文</option>
                <option value="en">只英文</option>
                <option value="zh">中文</option>
            </select>
            <button class="icon-btn" onclick="simulateAudioPlay()" title="播放語音">
                <i class="fa-solid fa-volume-high"></i>
            </button>
        </div>
    </div>

    <!-- 選項區 -->
    <div class="options-container" id="optionsContainer">
        <!-- 透過 JS 動態生成 -->
    </div>

    <!-- 情商點評區 (.monkReply) -->
    <div class="monkReply" id="monkReplyBox">
        <strong>💡 情商點評：</strong> <span id="monkReplyText"></span>
    </div>
</div>

<script>
    /* ==========================================================================
       3. 多語系 JSON 資料結構 (模擬後端傳入)
       ========================================================================== */
    const quizData = {
        "stage_id": 1,
        "scene": "Entering the Restaurant",
        "languages": {
            "ja": {
                "hero_text": "二人用の席をお願いします。",
                "chunks": ["二人用の席を", "お願いします。"], /* 日文採斷句高亮 */
                "options": [
                    {"key": "A", "text": "かしこまりました。お席へご案内いたします。", "sub": "好的，請跟我到座位。"},
                    {"key": "B", "text": "かしこまりました。パスポートをご提示ください。", "sub": "好的，請出示護照。"},
                    {"key": "C", "text": "かしこまりました。このお薬をお飲みください。", "sub": "好的，請吃這個藥。"}
                ]
            },
            "en": {
                "hero_text": "We would like a table for two.",
                "options": [
                    {"key": "A", "text": "Sure. Please follow me to your table.", "sub": "好的，請跟我到座位。"},
                    {"key": "B", "text": "Sure. Please show your passport.", "sub": "好的，請出示護照。"},
                    {"key": "C", "text": "Sure. Please take this medicine.", "sub": "好的，請吃這個藥。"}
                ]
            },
            "zh": {
                "hero_text": "我們想要一桌兩位子的位子。",
                "chunks": ["我們想要", "一桌兩位子的位子。"],
                "options": [
                    {"key": "A", "text": "好的，請跟我到座位。", "sub": "Sure. Please follow me to your table."},
                    {"key": "B", "text": "好的，請出示護照。", "sub": "Sure. Please show your passport."},
                    {"key": "C", "text": "好的，請吃這個藥。", "sub": "Sure. Please take this medicine."}
                ]
            }
        },
        "correct_answer": "A",
        "monk_reply": "別人在餐廳要位子，妳叫他出示護照或吃藥，會被當成怪人喔！請選 A 才是標準體貼的餐飲接話術。"
    };

    let currentLang = 'ja'; // 預留多語，初始預設日文

    // 頁面初始化
    document.addEventListener("DOMContentLoaded", () => {
        renderQuiz();
    });

    /* ==========================================================================
       4. 渲染與切換語系核心邏輯
       ========================================================================== */
    function renderQuiz() {
        const appContainer = document.getElementById('bookwide-app');
        appContainer.className = `lang-${currentLang}`; // 動態切換容器 class 調整字型
        
        const langPack = quizData.languages[currentLang];
        
        // 1. 設定場景標題
        document.getElementById('sceneTitle').innerText = quizData.scene;
        
        // 2. 處理 Hero 文字切分 (英文逐字，中日文依語意斷句)
        const heroBox = document.getElementById('heroTextBox');
        heroBox.innerHTML = '';
        
        if (currentLang === 'en') {
            const words = langPack.hero_text.split(' ');
            words.forEach((word, idx) => {
                heroBox.innerHTML += `<span class="heroWord" id="word-${idx}">${word}</span> `;
            });
        } else {
            // 中日文使用預設好的 chunks
            langPack.chunks.forEach((chunk, idx) => {
                heroBox.innerHTML += `<span class="phraseWord" id="chunk-${idx}">${chunk}</span>`;
            });
        }

        // 3. 渲染選項
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        langPack.options.forEach(opt => {
            optionsContainer.innerHTML += `
                <div class="option-card" onclick="checkAnswer('${opt.key}')">
                    <div class="option-main"><strong>${opt.key}.</strong> ${opt.text}</div>
                    <div class="option-sub">${opt.sub}</div>
                </div>
            `;
        });

        // 隱藏上一次的點評
        document.getElementById('monkReplyBox').classList.remove('show');
    }

    // 切換語系下拉選單觸發
    function switchLanguage(lang) {
        currentLang = lang;
        renderQuiz();
    }

    // 點擊選項觸發點評
    function checkAnswer(selectedKey) {
        const replyBox = document.getElementById('monkReplyBox');
        const replyText = document.getElementById('monkReplyText');
        
        replyText.innerText = quizData.monk_reply;
        replyBox.classList.add('show');
        
        // 答題時自動觸發一次語音高亮模擬
        simulateAudioPlay();
    }

    /* ==========================================================================
       5. 模擬 herating.html 的逐字/斷句同步高亮特效
       ========================================================================== */
    function simulateAudioPlay() {
        // 先清除所有高亮
        document.querySelectorAll('.heroWord, .phraseWord').forEach(el => el.classList.remove('on'));
        
        let timeline = [];
        if (currentLang === 'en') {
            // 模擬英文逐字亮起
            const wordCount = quizData.languages.en.hero_text.split(' ').length;
            for(let i=0; i<wordCount; i++) {
                timeline.push({ id: `word-${i}`, delay: i * 250 });
            }
        } else {
            // 模擬日/中文分段亮起
            const chunkCount = quizData.languages[currentLang].chunks.length;
            for(let i=0; i<chunkCount; i++) {
                timeline.push({ id: `chunk-${i}`, delay: i * 600 });
            }
        }

        // 執行定時高亮動畫
        timeline.forEach(item => {
            setTimeout(() => {
                const el = document.getElementById(item.id);
                if(el) el.classList.add('on');
            }, item.delay);
        });
    }
</script>
</body>
</html>
