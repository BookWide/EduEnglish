<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>戀愛聊天實驗室｜高情商接話闖關｜BookWide</title>
<meta name="description" content="BookWide 戀愛聊天實驗室，高情商接話術闖關練習。第1關完成送2遊客金幣，第2關跟讀挑戰完成再送2遊客金幣。">
<style>
:root{--bg:#071225;--card:#0d1d35;--panel:#122846;--line:rgba(96,165,250,.35);--ink:#eef6ff;--muted:#9fb4d1;--blue:#3b82f6;--green:#22c55e;--gold:#facc15;--bad:#ef4444}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}button,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:520px;margin:0 auto;padding:7px 8px 22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}.brand{display:flex;gap:7px;align-items:center}.logo{width:27px;height:27px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center;font-weight:900}.brand b{display:block;font-size:18px;line-height:1}.brand span{display:block;color:#b9cff0;font-size:10.5px;font-weight:850}.top a{color:#dbeafe;text-decoration:none;border:1px solid var(--line);background:rgba(15,31,56,.78);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}
.hero{position:relative;height:241px;border-radius:20px;overflow:hidden;background:#061225;margin-bottom:5px;box-shadow:0 14px 34px rgba(0,0,0,.25);cursor:pointer}.hero img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,.04),rgba(5,12,24,.08) 35%,rgba(5,12,24,.72));pointer-events:none}.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:30px;height:30px;border:0;border-radius:999px;background:rgba(255,255,255,.82);color:#0f172a;font-size:18px;font-weight:950}.prevPhoto{left:8px}.nextPhoto{right:8px}.hint{position:absolute;right:8px;bottom:8px;z-index:4;background:rgba(37,99,235,.75);border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900}.heroText{position:absolute;left:12px;right:12px;bottom:48px;z-index:4;text-align:center;text-shadow:0 3px 16px rgba(0,0,0,.9)}.heroEn{font-size:clamp(14px,4vw,22px);font-weight:950;line-height:1.18}.heroLocal{margin-top:5px;font-size:clamp(12px,3.2vw,17px);font-weight:950;line-height:1.18;color:#f8fbff}.wave{position:absolute;left:0;right:0;bottom:0;height:44px;z-index:4;background:linear-gradient(180deg,transparent,rgba(3,8,18,.8));display:flex;align-items:end;justify-content:center;gap:3px;padding-bottom:10px}.bar{width:3px;border-radius:99px;background:#60a5fa;height:10px;animation:w 1s infinite ease-in-out}.bar:nth-child(2n){animation-delay:.12s}.bar:nth-child(3n){animation-delay:.25s}@keyframes w{50%{height:23px;background:#fde047}}
.mini{display:flex;gap:5px;overflow-x:auto;margin-bottom:5px}.mini span{flex:0 0 auto;border:1px solid rgba(96,165,250,.26);background:rgba(13,29,53,.72);color:#dbeafe;border-radius:999px;padding:4px 8px;font-size:10.5px;font-weight:900}#miniCoins{color:#fde68a;border-color:rgba(251,191,36,.36);background:rgba(251,191,36,.12)}#miniBadge{color:#bbf7d0;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.1)}.card{border:1px solid rgba(85,136,206,.42);border-radius:16px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:8px}.titleRow{display:flex;justify-content:space-between;align-items:center;gap:8px}.title b{display:block;font-size:16px}.title span{display:block;color:#c7d2fe;font-size:10.5px;font-weight:800}.controls{display:flex;gap:5px;align-items:center}.ctrl{border:1px solid var(--line);background:rgba(59,130,246,.15);color:#dbeafe;border-radius:999px;width:30px;height:30px;font-weight:950}.play{width:38px;height:38px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff}.langSel{border:1px solid var(--line);background:#0d1d35;color:#dbeafe;border-radius:999px;height:31px;padding:0 8px;font-size:12px;font-weight:900;max-width:76px}
.quiz,.speakBox{margin-top:6px;border:1px solid rgba(251,191,36,.28);border-radius:14px;background:rgba(251,191,36,.08);padding:8px}.quizQ{font-size:14px;line-height:1.32;font-weight:950;margin-bottom:6px}.choices{display:grid;gap:5px}.choice{width:100%;border:1px solid rgba(148,163,184,.24);background:rgba(15,31,56,.85);color:#eaf3ff;border-radius:12px;padding:0;text-align:left;font-weight:850;overflow:visible}.choiceInner{display:grid;grid-template-columns:24px 1fr 28px;gap:5px;align-items:center;min-height:62px;padding:8px}.choiceNo{color:#dbeafe;font-weight:950}.choiceText{display:block;color:#fff;font-size:14px;line-height:1.22;font-weight:950}.choiceLocal{display:block;color:#c4b5fd;font-size:12px;line-height:1.18;margin-top:2px}.choiceSpeak{width:26px;height:26px;border-radius:999px;border:1px solid var(--line);background:rgba(59,130,246,.16);display:grid;place-items:center}.correct{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55)}.wrong{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45)}.complete{width:100%;border:1px solid rgba(148,163,184,.28);background:rgba(148,163,184,.16);color:#cbd5e1;border-radius:999px;padding:8px;margin-top:6px;font-size:13px;font-weight:950}.ready{background:linear-gradient(135deg,#22c55e,#60a5fa)!important;border:0!important;color:#fff!important}.monkReply{display:none;margin-top:7px;border-radius:12px;background:rgba(7,18,37,.78);border:1px solid rgba(96,165,250,.24);padding:9px;font-size:13px;line-height:1.5;color:#eaf3ff;font-weight:800}.monkReply.show{display:block}.monkReply b{color:#fde68a}
.speakBox{display:none;border-color:rgba(96,165,250,.35);background:rgba(30,64,115,.58)}.speakBox.show{display:block}.challengeTop{font-size:12px;color:#c7d2fe;line-height:1.4;font-weight:850;margin-bottom:7px}.target{font-size:20px;line-height:1.35;font-weight:950;padding:8px 0;border-bottom:1px solid rgba(148,163,184,.15)}.targetLocal{font-size:14px;color:#dbeafe;font-weight:850;line-height:1.35;padding:6px 0;border-bottom:1px solid rgba(148,163,184,.12)}.refLine{font-size:14px;color:#dbeafe;font-weight:850;padding:7px 0}.refLine b{color:#93c5fd;margin-right:5px}.challengeBtns{display:flex;flex-wrap:wrap;gap:8px;margin:5px 0 8px}.challengeBtns button{border:0;border-radius:10px;padding:9px 11px;font-size:13px;font-weight:950;color:#fff;background:#334155}#recBtn{background:#f59e0b}#passBtn{background:#3b82f6}.saidBox{border:1px dashed rgba(147,197,253,.42);background:#061225;border-radius:10px;padding:8px;min-height:42px;color:#eaf3ff;line-height:1.35}.scoreBox{display:none;margin-top:8px;border-radius:12px;background:rgba(15,31,56,.78);border:1px solid rgba(96,165,250,.24);padding:9px;font-size:14px;font-weight:900}.scoreBox.show{display:block}.fallback{width:100%;min-height:44px;border:1px dashed rgba(147,197,253,.42);background:#061225;color:#eaf3ff;border-radius:10px;padding:8px;resize:vertical;margin-top:7px}
.modal{position:fixed;inset:0;z-index:99;display:none;place-items:center;background:rgba(3,7,18,.72);backdrop-filter:blur(8px);padding:18px}.modal.show{display:grid}.modalBox{width:min(420px,94vw);border:1px solid rgba(251,191,36,.38);border-radius:22px;background:linear-gradient(145deg,#122846,#071225);box-shadow:0 24px 70px rgba(0,0,0,.5);padding:18px;text-align:center}.modalBox h2{margin:0 0 8px;font-size:22px}.modalBox p{margin:0 0 12px;color:#dbeafe;font-weight:850;line-height:1.45}.modalActions{display:grid;gap:9px}.modalActions button,.modalActions a{display:block;text-decoration:none;border:0;border-radius:999px;padding:12px 14px;color:#fff;font-weight:950;background:linear-gradient(135deg,#2563eb,#60a5fa)}.modalActions .gold{background:linear-gradient(135deg,#f59e0b,#22c55e)}.portalGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.portalGrid a{border-radius:16px}
@media(max-width:390px){.hero{height:214px}.brand b{font-size:17px}.heroText{bottom:46px}.choiceText{font-size:12.8px}.choiceLocal{font-size:10.8px}.target{font-size:18px}}
</style>
</head>
<body>
<main class="app">
  <section class="top"><div class="brand"><div class="logo">💬</div><div><b>BookWide</b><span>戀愛聊天實驗室｜完成10題送2金幣</span></div></div><a href="./account/learning-dashboard.html">控制台</a></section>
  <section class="hero" id="hero"><img id="photo" alt=""><button class="nav prevPhoto" id="photoPrev" type="button">‹</button><button class="nav nextPhoto" id="photoNext" type="button">›</button><div class="hint" id="playHint">點一下播放</div><div class="heroText"><div class="heroEn" id="heroEn"></div><div class="heroLocal" id="heroLocal"></div></div><div class="wave" aria-hidden="true"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div></section>
  <section class="mini"><span id="miniStage">第 1 關</span><span id="miniDone">0/20</span><span id="miniCoins">遊客金幣 0</span><span id="miniNextCoin">完成10題送2金幣</span><span id="miniBadge">聊天新手</span></section>
  <section class="card"><div class="titleRow"><div class="title"><b id="title">戀愛聊天實驗室</b><span id="scene">一句話決定加分還是出局</span></div><div class="controls"><button class="ctrl" id="prev" type="button">‹</button><select class="langSel" id="localSelect"><option value="zh">中文</option><option value="en">英文</option><option value="ja">日文</option></select><button class="ctrl play" id="play" type="button">▶</button><button class="ctrl" id="next" type="button">›</button></div></div>
    <section class="speakBox" id="speakBox"><div class="challengeTop" id="challengeTop">任務 11 / 20｜先聽標準音，再開口說。分數 35 以上才可做題。</div><div class="target" id="challengeTarget"></div><div class="targetLocal" id="challengeLocal"></div><div class="refLine"><b>ZH</b><span id="challengeZh"></span></div><div class="challengeBtns"><button id="slowBtn" type="button">慢速標準音</button><button id="recBtn" type="button">開始口說</button><button id="passBtn" type="button" style="display:none">進入答題</button></div><textarea class="fallback" id="saidInput" placeholder="手機不能語音時，輸入你說的內容"></textarea><div class="challengeBtns"><button id="checkBtn" type="button">檢查分數</button></div><div class="scoreBox" id="scoreBox">你說的內容：<div class="saidBox" id="saidBox">尚未開始</div><div id="scoreText" style="margin-top:7px"></div></div></section>
    <section class="quiz" id="quizBox"><div class="quizQ" id="quizQ"></div><div class="choices" id="choices"></div><div class="monkReply" id="monkReply"></div><button class="complete" id="completeBtn" type="button">先答題</button></section>
  </section>
</main>
<div class="modal" id="stage1Modal"><div class="modalBox"><h2>第 1 關完成！</h2><p>你完成 1–10 題，得到 <b>2 個遊客金幣</b>。接下來可去影片館使用，或挑戰 11–20 題。</p><div class="modalActions"><button class="gold" id="openPortal" type="button">A. 去 Story / Music / Movie / News</button><button id="startStage2" type="button">B. 進入 11–20 跟讀挑戰</button></div></div></div>
<div class="modal" id="portalModal"><div class="modalBox"><h2>選擇影片館</h2><p>帶著遊客金幣進入你要看的分類。</p><div class="portalGrid"><a href="./index.html?cat=story&guest=1">STORY</a><a href="./index.html?cat=music&guest=1">MUSIC</a><a href="./index.html?cat=movie&guest=1">MOVIE</a><a href="./index.html?cat=news&guest=1">NEWS</a></div><div class="modalActions" style="margin-top:10px"><button id="backStage1" type="button">返回選擇</button></div></div></div>
<div class="modal" id="finishModal"><div class="modalBox"><h2>第 2 關完成！</h2><p>你完成 11–20 跟讀＋答題，再得到 <b>2 個遊客金幣</b>。總共 4 金幣。</p><div class="modalActions"><button class="gold" id="finishPortal" type="button">去 Story / Music / Movie / News</button></div></div></div>
<script>
const QUESTIONS_JSON="assets/chat-lab/chat-lab_questions.json";
const PHOTOS_JSON="assets/chat-lab/chat-lab_photos.json";
const RATE=.85,TOTAL=20,PASS_SCORE=35;
const $=id=>document.getElementById(id);
let qs=[], photos=[], idx=0, done=new Set(), stage2Unlocked=false, answeredCorrect=false, currentLang='zh', photoIdx=0;
function getGuestCoins(){return Number(localStorage.getItem('bw_guest_coins')||'0')||0}
function addGuestCoins(n){localStorage.setItem('bw_guest_coins',String(getGuestCoins()+n)); updateMini();}
function textOf(obj, lang=currentLang){return (obj&& (obj[lang]||obj.zh||obj.en||obj.ja)) || ''}
function langCode(lang){return lang==='ja'?'ja-JP':lang==='en'?'en-US':'zh-TW'}
function speak(txt, lang=currentLang, rate=RATE){try{speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(String(txt||'')); u.lang=langCode(lang); u.rate=rate; speechSynthesis.speak(u)}catch(e){}}
function norm(s){return String(s||'').toLowerCase().replace(/[\u3000\s.,!?;:'"，。！？；：「」『』、]/g,'')}
function score(a,b){a=norm(a);b=norm(b); if(!a||!b)return 0; let hit=0; const set=new Set(a.split('')); for(const ch of b) if(set.has(ch)) hit++; return Math.min(100,Math.round(hit/Math.max(1,b.length)*100));}
async function load(){
  let qd=await fetch(QUESTIONS_JSON+'?v='+Date.now()).then(r=>r.json()).catch(()=>null);
  qs=(qd&&qd.questions)||[];
  let pd=await fetch(PHOTOS_JSON+'?v='+Date.now()).then(r=>r.json()).catch(()=>null);
  photos=(pd&&pd.photos)||[];
  if(!photos.length) photos=Array.from({length:20},(_,i)=>`assets/chat-lab/chat-lab${String(i+1).padStart(2,'0')}.png`);
  if(!qs.length){alert('找不到 chat-lab_questions.json');return}
  render();
}
function updateMini(){ $('miniStage').textContent=idx<10?'第 1 關':'第 2 關'; $('miniDone').textContent=`${done.size}/${TOTAL}`; $('miniCoins').textContent=`遊客金幣 ${getGuestCoins()}`; $('miniBadge').textContent=done.size>=20?'聊天高手':done.size>=10?'進階挑戰':'聊天新手'; $('miniNextCoin').textContent=done.size<10?'完成10題送2金幣':'完成20題再送2金幣'; }
function render(){
  const q=qs[idx]; answeredCorrect=done.has(idx+1); currentLang=$('localSelect').value;
  $('title').textContent=q.title||'戀愛聊天實驗室'; $('scene').textContent=q.scene||'一句話決定加分還是出局';
  const pic=photos[idx%photos.length]||''; $('photo').src=pic; $('heroEn').textContent=q.en||''; $('heroLocal').textContent=q.zh||'';
  $('quizQ').innerHTML=`<b>${q.day}. ${textOf(q,currentLang)}</b><br><span style="color:#c7d2fe">${q.zh}</span>`;
  $('choices').innerHTML=''; $('monkReply').classList.remove('show'); $('monkReply').innerHTML='';
  const needsSpeak=idx>=10 && !stage2Unlocked && !done.has(idx+1);
  $('speakBox').classList.toggle('show', needsSpeak); $('quizBox').style.display=needsSpeak?'none':'block';
  if(needsSpeak) renderSpeak(q);
  q.choices.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='choice'; b.type='button';
    b.innerHTML=`<div class="choiceInner"><div class="choiceNo">${String.fromCharCode(65+i)}.</div><div><span class="choiceText">${textOf(c,currentLang)}</span><span class="choiceLocal">${c.zh||''}</span></div><span class="choiceSpeak">🔊</span></div>`;
    b.querySelector('.choiceSpeak').onclick=e=>{e.stopPropagation(); speak(textOf(c,currentLang),currentLang)};
    b.onclick=()=>choose(c,b);
    $('choices').appendChild(b);
  });
  $('completeBtn').textContent=answeredCorrect?'下一題':'先答對本題'; $('completeBtn').classList.toggle('ready',answeredCorrect);
  updateMini();
}
function renderSpeak(q){
  $('challengeTop').textContent=`任務 ${idx+1} / 20｜先聽標準音，再開口說。分數 35 以上才可做題。`;
  $('challengeTarget').textContent=q.en||q.zh||''; $('challengeLocal').textContent=q.ja||''; $('challengeZh').textContent=q.zh||'';
  $('saidInput').value=''; $('saidBox').textContent='尚未開始'; $('scoreText').textContent=''; $('scoreBox').classList.remove('show'); $('passBtn').style.display='none';
}
function choose(c,btn){
  if(answeredCorrect) return;
  [...document.querySelectorAll('.choice')].forEach(x=>x.classList.remove('correct','wrong'));
  if(c.correct){ btn.classList.add('correct'); answeredCorrect=true; done.add(idx+1); showReply(true); $('completeBtn').textContent=idx===9?'領取2金幣 / 進下一關':idx===19?'完成第2關':'下一題'; $('completeBtn').classList.add('ready'); }
  else{ btn.classList.add('wrong'); showReply(false); $('completeBtn').textContent='答錯，請再選一次'; $('completeBtn').classList.remove('ready'); }
  updateMini();
}
function showReply(ok){ const q=qs[idx]; const lang=currentLang; const key=(ok?'correct_reply_':'wrong_reply_')+lang; const zh=(ok?q.correct_reply_zh:q.wrong_reply_zh)||''; const msg=q[key]||zh; $('monkReply').innerHTML=`<b>和尚點評：</b><br>${msg.replace(/\n/g,'<br>')}`; $('monkReply').classList.add('show'); speak(msg,lang); }
function nextQ(){ if(!answeredCorrect){return} if(idx===9){ addGuestCoins(2); $('stage1Modal').classList.add('show'); return;} if(idx===19){ addGuestCoins(2); $('finishModal').classList.add('show'); return;} idx=Math.min(TOTAL-1,idx+1); stage2Unlocked=false; render(); }
$('completeBtn').onclick=nextQ; $('next').onclick=()=>{if(answeredCorrect) nextQ()}; $('prev').onclick=()=>{idx=Math.max(0,idx-1); stage2Unlocked=idx<10||done.has(idx+1); render()}; $('play').onclick=()=>speak(textOf(qs[idx],currentLang),currentLang); $('hero').onclick=()=>speak(textOf(qs[idx],currentLang),currentLang); $('localSelect').onchange=render;
$('photoPrev').onclick=e=>{e.stopPropagation(); photoIdx=(photoIdx+photos.length-1)%photos.length; $('photo').src=photos[photoIdx]}; $('photoNext').onclick=e=>{e.stopPropagation(); photoIdx=(photoIdx+1)%photos.length; $('photo').src=photos[photoIdx]};
$('slowBtn').onclick=()=>speak(qs[idx].en||qs[idx].zh,'en',.72);
$('checkBtn').onclick=()=>{const said=$('saidInput').value.trim(); const target=qs[idx].en||qs[idx].zh; const s=score(said,target); $('saidBox').textContent=said||'尚未輸入'; $('scoreText').textContent=`分數：${s} / 100`+(s>=PASS_SCORE?'，可以進入答題':'，再練一次'); $('scoreBox').classList.add('show'); if(s>=PASS_SCORE){$('passBtn').style.display='inline-block';}}
$('recBtn').onclick=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){$('saidInput').focus(); return;} const r=new SR(); r.lang='en-US'; r.interimResults=false; r.maxAlternatives=1; r.onresult=e=>{$('saidInput').value=e.results[0][0].transcript; $('checkBtn').click()}; r.onerror=()=>{$('saidInput').focus()}; r.start();}
$('passBtn').onclick=()=>{stage2Unlocked=true; $('speakBox').classList.remove('show'); $('quizBox').style.display='block';}
$('openPortal').onclick=()=>{$('stage1Modal').classList.remove('show'); $('portalModal').classList.add('show')}; $('backStage1').onclick=()=>{$('portalModal').classList.remove('show'); $('stage1Modal').classList.add('show')}; $('startStage2').onclick=()=>{$('stage1Modal').classList.remove('show'); idx=10; stage2Unlocked=false; render()}; $('finishPortal').onclick=()=>{location.href='./index.html?guest=1'};
load();
</script>
</body>
</html>
