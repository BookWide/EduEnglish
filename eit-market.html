<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BookWide 心理測驗大盤</title>
<style>
:root{--navy:#061426;--blue:#3270f5;--purple:#8247f5;--green:#17a36a;--red:#e04f5f;--line:#dbe5f1;--muted:#6d7d92;--bg:#edf3fa}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#10213b;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif}
.hero{background:radial-gradient(circle at 80% 20%,rgba(79,110,255,.36),transparent 32%),linear-gradient(135deg,#071426,#112744 60%,#17315b);color:#fff;padding:28px 20px 34px}
.wrap{max-width:1180px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;gap:14px}.logo{font-size:25px;font-weight:950}.logo small{display:block;font-size:12px;color:#bac8db}.cta{background:#fff;color:#173c87;text-decoration:none;border-radius:999px;padding:11px 17px;font-weight:900}
.hero h1{font-size:34px;margin:34px 0 8px}.hero p{color:#c8d4e5;max-width:760px;line-height:1.7}.headline{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}.hcard{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);border-radius:16px;padding:16px}.hcard span{font-size:12px;color:#b9c7db}.hcard b{display:block;font-size:28px;margin-top:7px}
main{max-width:1180px;margin:-14px auto 40px;padding:0 16px}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 12px 30px rgba(15,28,49,.08);margin-bottom:16px}.panel h2{margin:0 0 6px}.panel p{margin:0 0 16px;color:var(--muted)}
.marketRow{display:grid;grid-template-columns:44px minmax(180px,1fr) 100px 2fr 90px;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid #e7edf5}.rank{font-weight:950;color:#71839c}.name b{display:block}.name small{color:#7a8aa0}.count{text-align:right;font-weight:900}.bar{height:13px;background:#e8eef7;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--purple))}.score{text-align:right;font-weight:950;color:#244fa8}
.news{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.newsCard{border:1px solid #e0e8f3;border-radius:15px;padding:15px;background:#f8fbff}.newsCard h3{font-size:15px;margin:0 0 8px}.newsCard p{font-size:13px;line-height:1.6;margin:0;color:#61738b}
.footer{text-align:center;color:#73839a;font-size:12px;padding:20px}
@media(max-width:760px){.headline,.news{grid-template-columns:1fr}.marketRow{grid-template-columns:34px 1fr 70px}.marketRow .bar{grid-column:2/4}.score{display:none}.hero h1{font-size:28px}}
</style>
</head>
<body>
<section class="hero"><div class="wrap"><div class="top"><div class="logo">BookWide<small>心理測驗大盤</small></div><a class="cta" href="eit.html">立即測驗</a></div><h1>大家最近都在測什麼？</h1><p>以會員與免費訪客的匿名彙總資料呈現熱門測驗、平均傾向與最新熱度。這不是醫療診斷，也不代表全體人口，只反映 BookWide 已完成測驗的受測者。</p><div class="headline"><div class="hcard"><span>累積正式結果</span><b id="total">—</b></div><div class="hcard"><span>最近 7 天完成</span><b id="week">—</b></div><div class="hcard"><span>目前最熱門</span><b id="hot">—</b></div></div></div></section>
<main>
<div class="panel"><h2>心理測驗熱門榜</h2><p>像市場成交量一樣，看哪一套最受關注。</p><div id="market"></div></div>
<div class="panel"><h2>本週吃瓜觀察</h2><p>由匿名彙總數據自動整理。</p><div class="news" id="news"></div></div>
<div class="footer">BookWide 匿名彙總統計｜樣本不足時不做過度解讀</div>
</main>
<script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL="https://jeajrwpmrgczimmrflxo.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const fmt=n=>Number(n||0).toLocaleString('zh-TW');
(async()=>{const {data,error}=await sb.rpc('public_get_eit_market');if(error){document.querySelector('#market').textContent='資料暫時無法載入';return}const d=data||{},rows=d.tests||[];document.querySelector('#total').textContent=fmt(d.summary?.total_completions);document.querySelector('#week').textContent=fmt(d.summary?.completions_7d);document.querySelector('#hot').textContent=rows[0]?.test_title||'累積中';const max=Math.max(1,...rows.map(x=>Number(x.completion_count||0)));document.querySelector('#market').innerHTML=rows.length?rows.map((r,i)=>`<div class="marketRow"><div class="rank">${i+1}</div><div class="name"><b>${esc(r.test_title||r.test_slug)}</b><small>${esc(r.test_slug)}</small></div><div class="count">${fmt(r.completion_count)} 次</div><div class="bar"><i style="width:${Number(r.completion_count||0)/max*100}%"></i></div><div class="score">${Number(r.normalized_average||0).toFixed(1)}%</div></div>`).join(''):'尚在累積資料';const top=rows[0],high=[...rows].sort((a,b)=>Number(b.normalized_average)-Number(a.normalized_average))[0],low=[...rows].sort((a,b)=>Number(a.normalized_average)-Number(b.normalized_average))[0];const cards=[];if(top)cards.push({h:'本週人氣王',p:`「${top.test_title}」目前完成數最高，共 ${fmt(top.completion_count)} 次。`});if(high)cards.push({h:'最高平均傾向',p:`「${high.test_title}」標準化平均為 ${Number(high.normalized_average).toFixed(1)}%。`});if(low)cards.push({h:'最少見高分',p:`「${low.test_title}」標準化平均為 ${Number(low.normalized_average).toFixed(1)}%，目前相對較低。`});document.querySelector('#news').innerHTML=cards.map(x=>`<div class="newsCard"><h3>${esc(x.h)}</h3><p>${esc(x.p)}</p></div>`).join('')})();
</script></body></html>
