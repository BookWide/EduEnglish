<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BookWide 心理測驗大盤</title>
<style>
:root{--navy:#071426;--blue:#3270f5;--purple:#7d43f3;--green:#17a36a;--line:#dce6f2;--muted:#6f8097;--bg:#edf3fa}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#10213b;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif}
header{background:linear-gradient(135deg,#071426,#17315b);color:#fff;padding:16px}.wrap{max-width:1180px;margin:auto}
.top{display:flex;justify-content:space-between;align-items:center}.brand{font-size:23px;font-weight:950}.brand small{display:block;font-size:11px;color:#bdcada}.btn{border-radius:999px;padding:9px 13px;font-weight:900;text-decoration:none;background:var(--green);color:#fff}
.hero{margin-top:16px}.hero h1{font-size:29px;margin:0 0 6px}.hero p{margin:0;color:#c6d2e3;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.stat{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);border-radius:13px;padding:11px}.stat span{font-size:10px;color:#c2cede}.stat b{display:block;font-size:22px;margin-top:5px}
main{max-width:1180px;margin:13px auto 35px;padding:0 10px}.error{display:none;background:#fff1f2;border:1px solid #fecdd3;color:#9f1239;border-radius:12px;padding:12px;margin-bottom:10px;font-size:13px;white-space:pre-wrap}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 28px rgba(15,28,49,.06)}.panel h2{margin:0 0 4px}.panel p{margin:0 0 12px;color:var(--muted);font-size:12px}
.test{display:grid;grid-template-columns:34px minmax(190px,1fr) 78px minmax(260px,2fr) 66px 66px;gap:10px;align-items:center;padding:13px 0;border-bottom:1px solid #e8eef6}.rank{font-weight:950;color:#708198}.name b{display:block}.sample{text-align:right;font-weight:950}.sample small,.value small{display:block;font-size:9px;color:#7b8ba0}
.hist{height:62px;display:grid;grid-template-columns:repeat(10,1fr);gap:3px;align-items:end}.bin{height:100%;display:flex;align-items:flex-end;position:relative}.bin i{display:block;width:100%;min-height:2px;border-radius:4px 4px 1px 1px;background:linear-gradient(180deg,var(--purple),var(--blue))}.bin span{position:absolute;left:50%;transform:translateX(-50%);bottom:-14px;font-size:8px;color:#8190a5}.value{text-align:right;font-weight:950;color:#244fa8}
@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.test{grid-template-columns:24px 1fr 54px}.hist{grid-column:2/4;height:48px}.test>.value:nth-last-child(2){grid-column:2}.test>.value:last-child{grid-column:3}.name b{font-size:13px}}
</style></head>
<body>
<header><div class="wrap"><div class="top"><div class="brand">BookWide<small>心理測驗大盤</small></div><a class="btn" href="eit.html">立即測驗</a></div><div class="hero"><h1>看看大家都落在哪裡</h1><p>每套測驗直接顯示分數分布。</p></div><div class="stats"><div class="stat"><span>市場樣本</span><b id="sampleN">載入中</b></div><div class="stat"><span>最近 7 天</span><b id="weekN">載入中</b></div><div class="stat"><span>測驗數</span><b id="testN">載入中</b></div><div class="stat"><span>目前熱門</span><b id="topName">載入中</b></div></div></div></header>
<main><div id="loadError" class="error"></div><div class="panel"><h2>13 套分數分布</h2><p>每條柱代表 10 分區間；柱越高，落在該區間的人越多。</p><div id="list">資料載入中…</div></div></main>
<script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
<script>
const SB_URL="https://jeajrwpmrgczimmrflxo.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do";
const client=supabase.createClient(SB_URL,SB_KEY);
const el=id=>document.getElementById(id);
const fmt=n=>Number(n||0).toLocaleString('zh-TW');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
(async()=>{
  try{
    const {data,error}=await client.rpc('public_get_eit_market_v9');
    if(error) throw error;
    const summary=data?.summary||{},rows=Array.isArray(data?.tests)?data.tests:[];
    el('sampleN').textContent=fmt(summary.sample_count);
    el('weekN').textContent=fmt(summary.recent_7d);
    el('testN').textContent=fmt(summary.active_tests);
    el('topName').textContent=summary.top_test||'累積中';
    el('list').innerHTML=rows.length?rows.map((r,i)=>{
      const dist=Array.isArray(r.distribution)?r.distribution:[];
      const max=Math.max(1,...dist.map(x=>Number(x.count||0)));
      const bars=dist.map((x,j)=>`<div class="bin" title="${x.from}–${x.to} 分：${fmt(x.count)}"><i style="height:${Math.max(4,Number(x.count||0)/max*100)}%"></i><span>${j*10}</span></div>`).join('');
      return `<div class="test"><div class="rank">${i+1}</div><div class="name"><b>${esc(r.test_title||r.test_slug)}</b></div><div class="sample">${fmt(r.sample_count)}<small>樣本</small></div><div class="hist">${bars}</div><div class="value">${Number(r.average_score||0).toFixed(1)}<small>平均</small></div><div class="value">${Number(r.median_score||0).toFixed(1)}<small>中位</small></div></div>`;
    }).join(''):'目前沒有資料';
  }catch(err){
    el('sampleN').textContent='錯誤';el('weekN').textContent='錯誤';el('testN').textContent='錯誤';el('topName').textContent='錯誤';
    el('list').textContent='';
    el('loadError').style.display='block';
    el('loadError').textContent='資料載入失敗：'+(err?.message||String(err))+'\n\n請確認已執行 V9 SQL。';
    console.error(err);
  }
})();
</script></body></html>
