function decodeJwtPayload(token){try{const part=String(token||'').split('.')[1];if(!part)return null;const b64=part.replace(/-/g,'+').replace(/_/g,'/');const json=decodeURIComponent(Array.prototype.map.call(atob(b64),c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));return JSON.parse(json)}catch(e){return null}}

async function getSupabaseAccessToken(){
  try{
    if(BW_SUPA&&BW_SUPA.auth&&BW_SUPA.auth.getSession){
      const r=await BW_SUPA.auth.getSession();
      const token=r&&r.data&&r.data.session&&r.data.session.access_token;
      if(token&&!isJwtExpired(token))return token;
    }
  }catch(e){}
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i)||'';
      if(!/^sb-.*-auth-token$/.test(k))continue;
      const j=readJsonSafe(localStorage.getItem(k)||'')||{};
      const arr=[j.access_token,j.currentSession&&j.currentSession.access_token,j.session&&j.session.access_token].filter(Boolean);
      for(const token of arr){if(token&&!isJwtExpired(token))return token}
    }
  }catch(e){}

}

  if(!token)return;
  try{
    const j=await callTravelCoinApi({mode:'check',slug});
    if(j&&j.ok&&Array.isArray(j.unlocked_mission_ids)){
      j.unlocked_mission_ids.forEach(id=>id&&unlockedSet.add(String(id)));
      saveUnlocks();
    }
  }catch(e){}
}
async function chargeMissionCoin(m){
  if(!m||!m.id)return false;
  if(missionUnlocked(m.id))return true;
  const ok=confirm(`本 Mission 前 ${BW_TRAVEL_FREE_SENTENCES} 句免費。
第 ${BW_TRAVEL_FREE_SENTENCES+1} 句開始需扣 ${BW_TRAVEL_MISSION_COST} 金幣，解鎖本 Mission 共 20 句。

確定扣金幣繼續？`);
  if(!ok)return false;
  const j=await callTravelCoinApi({mode:'mission_once',slug,mission_id:m.id,cost:BW_TRAVEL_MISSION_COST,sentence_no:BW_TRAVEL_FREE_SENTENCES+1});
  const code=String(j&&j.code||'');
  const msg=String(j&&j.message||'');
  if(!j||!j.ok){
    if(code==='NO_LOGIN'||code==='INVALID_TOKEN'||/invalid jwt|jwt|auth/i.test(msg)){redirectLoginBecauseTokenInvalid('登入狀態失效，請重新登入後再扣金幣。');return false}
    if(code==='NO_COINS'){alert(msg||'金幣不足，請先訂閱或取得金幣。');location.href=bwCoinTopupUrl();return false}
    if(code==='NETWORK_ERROR'){alert(j.message);return false}
    alert(msg||'扣金幣失敗，請稍後再試。');return false;
  }
  if(typeof j.remaining_coins!=='undefined')try{localStorage.setItem('bookwide_coin_balance',String(j.remaining_coins))}catch(e){}
  unlockedSet.add(m.id);saveUnlocks();renderMissions();
  alert(j.already?`本 Mission 已解鎖，不重複扣金幣。`:`已扣 ${BW_TRAVEL_MISSION_COST} 金幣，解鎖本 Mission 20 句。${typeof j.remaining_coins!=='undefined'?' 剩餘 '+j.remaining_coins+' 金幣。':''}`);
  return true;
}
async function unlockCurrentMission(){const ok=await chargeMissionCoin(currentMission());if(ok)renderCurrent()}
function renderHeader(){document.getElementById('title').textContent=missionData.title||'Travel Mission';document.getElementById('subtitle').textContent=missionData.subtitle||`${missionData.country||''}｜${missionData.days||''}｜${missionData.sentence_count||''}句｜${missionData.vocab_count||''}單字`}
function renderMissions(){const ms=getMissions(),list=document.getElementById('missionList');list.innerHTML=ms.map((m,i)=>{const cnt=questionsFor(m).length||m.sentence_count||0;return `<button class="mission-btn ${m.id===currentMissionId?'active':''}" onclick="selectMission('${esc(m.id)}')"><b>${String(i+1).padStart(2,'0')}｜${esc(m.title||m.id)}${missionUnlocked(m.id)?'<span class="coin-status">已解鎖</span>':'<span class="coin-status">2句免費｜1金幣</span>'}</b><span>${esc(m.scene||'')}｜${cnt}句｜${doneSet.has(m.id)?'已完成':'未完成'}</span></button>`}).join('');const total=ms.length||1,done=[...doneSet].filter(id=>ms.some(m=>m.id===id)).length;document.getElementById('progressBar').style.width=`${Math.round(done/total*100)}%`;document.getElementById('progressText').textContent=`完成 ${done} / ${ms.length}`}
function isMobileView(){return window.matchMedia('(max-width:850px)').matches}
function syncMissionListMode(){const card=document.getElementById('missionCard'),btn=document.getElementById('collapseBtn');if(!card||!btn)return;if(!isMobileView()){card.classList.remove('collapsed');btn.textContent='收起';btn.style.display='none'}else{btn.style.display='inline-block';if(!card.dataset.mobileReady){card.classList.add('collapsed');card.dataset.mobileReady='1'}btn.textContent=card.classList.contains('collapsed')?'展開':'收起'}}
function toggleMissionList(){const card=document.getElementById('missionCard');if(!isMobileView()){syncMissionListMode();return}card.classList.toggle('collapsed');document.getElementById('collapseBtn').textContent=card.classList.contains('collapsed')?'展開':'收起'}
window.addEventListener('resize',syncMissionListMode)
function selectMission(id){currentMissionId=id;challengeIndex=0;if(isMobileView()){document.getElementById('missionCard').classList.add('collapsed');document.getElementById('collapseBtn').textContent='展開'}renderMissions();renderCurrent()}function currentMission(){return getMissions().find(m=>m.id===currentMissionId)||getMissions()[0]||{}}
function setActiveTab(tab){activeTab=tab||'challenge';localStorage.setItem(`bw_travel_tab_${slug}`,activeTab);document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===activeTab))}
function renderCurrent(){const m=currentMission(),qn=questionsFor(m).length;document.getElementById('missionTitle').textContent=m.title||'Mission';document.getElementById('missionMeta').textContent=`${m.scene||''}｜${m.sentence_count||qn||0}句｜${m.vocab_count||vocabFor(m).length||0}單字`;renderPhoto(m);renderRouteCard(m);renderTabContent(m)}
function normalizePhotoSrc(src){let s=String(src||'').trim();if(!s)return'';s=s.replace('/assets/travel-missions/','/ads/travel-missions/');if(s.startsWith('http'))return s;if(s.startsWith('/ads/'))return R2_BASE+s;return s}
function renderPhoto(m){const old=document.getElementById('photoBox');const arr=photosData?.photos||photosData?.items||[];const hit=arr.find(p=>p.mission_id===m.id)||arr[0];const src=normalizePhotoSrc(hit?.url||hit?.src||m.photo||'');old.outerHTML=src?`<img id="photoBox" class="photo" src="${esc(src)}" onerror="this.outerHTML='<div id=&quot;photoBox&quot; class=&quot;photo-fallback&quot;>Travel Mission</div>'">`:`<div id="photoBox" class="photo-fallback">${esc(m.scene||'Travel Mission')}</div>`}
function renderTabContent(m){const box=document.getElementById('contentBox'),qs=questionsFor(m);if(activeTab==='challenge')return renderChallenge(m,qs,box);if(activeTab==='sentences'){
  const locked=!missionUnlocked(m.id);
  const shown=locked?qs.slice(0,BW_TRAVEL_FREE_SENTENCES):qs;
  box.innerHTML=qs.length?`<div class="qa">${shown.map((q,i)=>{const jk=jaKana(q);return `<div class="qcard"><div class="qtitle">${i+1}. ${esc(q.title||q.scene||'情境句')}</div><div class="sentence-row"><span class="tag">EN</span><div class="sentence-text">${esc(q.en||'')}</div><button class="row-sound" onclick="speakText('${esc(q.en||'')}','en')">🔊</button></div><div class="sentence-row"><span class="tag">JA</span><div class="sentence-text"><div class="ja-ruby">${rubyJa(q.ja||'')}</div>${(jk||autoKana(q.ja||''))?`<span class="ja-kana">${esc(jk||autoKana(q.ja||''))}</span>`:''}</div><button class="row-sound" onclick="speakText('${esc(q.ja||'')}','ja')">🔊</button></div><div class="sentence-row"><span class="tag">ZH</span><div class="sentence-text">${esc(q.zh||'')}</div><button class="row-sound" onclick="speakText('${esc(q.zh||'')}','zh')">🔊</button></div></div>`}).join('')}${locked?`<div class="coin-lock"><b>第 ${BW_TRAVEL_FREE_SENTENCES+1} 句後需扣 ${BW_TRAVEL_MISSION_COST} 金幣。</b><br>本 Mission 共 ${qs.length} 句，扣一次解鎖本 Mission 全部句子。<div class="actions"><button class="btn orange" onclick="unlockCurrentMission()">扣 ${BW_TRAVEL_MISSION_COST} 金幣解鎖本 Mission</button></div></div>`:''}</div>`:`<div class="warn">這個 Mission 還沒有 questions。</div>`;
  return
}if(activeTab==='vocab'){const words=vocabFor(m);box.innerHTML=words.length?`<div class="vocab">${words.map(vocabCard).join('')}</div>`:`<div class="warn">這個 Mission 還沒有 vocab。</div>`;return}box.innerHTML=`<div class="qcard"><div class="qtitle">${esc(m.title||'路線資訊')}</div><div class="line"><span class="tag">場景</span>${esc(m.scene||'')}</div><div class="line"><span class="tag">目的</span>${esc(m.goal||'用路點示意圖確認目前位置、下一站與任務動線。')}</div>${routePanelHtml(m,false)}<div class="line"><span class="tag">檔案</span>${esc(base)}/${esc(slug)}_questions.json</div></div>`}

function routeMissionIndex(m){const ms=getMissions();return Math.max(0,ms.findIndex(x=>x.id===m.id));}
function routePanelHtml(m,compact=true){
  const ms=getMissions();
  const idx=routeMissionIndex(m);
  const title=m?.title||'目前任務';
  const prev=idx>0?ms[idx-1]?.title:'出發準備';
  const next=idx<ms.length-1?ms[idx+1]?.title:'完成路線';
  const steps=ms.map((x,i)=>`<span class="route-step ${i===idx?'active':(doneSet.has(x.id)?'done':'')}">${String(i+1).padStart(2,'0')} ${esc(x.title||x.id)}</span>`).join('');
  return `<div class="route-map-wrap ${compact?'':'large'}"><img class="route-map-img" src="${BW_ROUTE_MAP_DATA}" alt="熊野古道路線軌跡示意圖"><span class="route-pin" aria-hidden="true"></span></div><div class="route-note"><b>目前：</b>${esc(title)}｜<b>上一站：</b>${esc(prev)}｜<b>下一站：</b>${esc(next)}<br>${compact?'路線資訊分頁可看放大軌跡圖。':'這是路點示意圖，用來輔助任務位置與動線；未來可替換成正式 GPX / SVG 軌跡圖。'}</div><div class="route-steps">${steps}</div>`;
}
function renderRouteCard(m){const box=document.getElementById('routeCardContent');if(box)box.innerHTML=routePanelHtml(m,true)}
const IPA={pilgrimage:'/ˈpɪlɡrɪmɪdʒ/',trail:'/treɪl/',trailhead:'/ˈtreɪlhed/',shrine:'/ʃraɪn/',goshuin:'/ɡoʊˈʃuːɪn/',amulet:'/ˈæmjələt/',reservation:'/ˌrezərˈveɪʃən/',platform:'/ˈplætfɔːrm/',luggage:'/ˈlʌɡɪdʒ/',passport:'/ˈpæspɔːrt/',weather:'/ˈweðər/',delay:'/dɪˈleɪ/'};
const KANA={'巡礼':'じゅんれい','古道':'こどう','登山口':'とざんぐち','神社':'じんじゃ','御朱印':'ごしゅいん','お守り':'おまもり','温泉':'おんせん','予約':'よやく','ホーム':'ほーむ','荷物':'にもつ','パスポート':'ぱすぽーと','搭乗券':'とうじょうけん','免税':'めんぜい','お土産':'おみやげ','水筒':'すいとう','休憩所':'きゅうけいじょ','天気':'てんき','雨具':'あまぐ','登山靴':'とざんぐつ','バス停':'ばすてい','切符':'きっぷ','地図':'ちず','観光案内所':'かんこうあんないじょ','夕食':'ゆうしょく','朝食':'ちょうしょく','乾杯':'かんぱい','おすすめ':'おすすめ','飛行機':'ひこうき','搭乗口':'とうじょうぐち','遅延':'ちえん'};
function vocabCard(w){const en=w.en||w.word||'',ja=w.ja||'',zh=w.zh||w.meaning||'',ipa=w.ipa||IPA[en.toLowerCase()]||'',kana=w.kana||KANA[ja]||'';return `<div class="word"><div><b>${esc(en)}</b>${ipa?`<div class="word-ipa">${esc(ipa)}</div>`:''}<div class="word-zh">中：${esc(zh)}</div><div class="word-ja">日：${esc(ja)}</div>${kana?`<div class="word-kana">假名：${esc(kana)}</div>`:''}</div><div class="word-actions"><button class="mini-sound primary" onclick="speakText('${esc(en)}','en')">EN 🔊</button><button class="mini-sound" onclick="speakText('${esc(ja)}','ja')">日 🔊</button></div></div>`}
function currentChallengeKey(){return `${currentMissionId}|${challengeIndex}|${speakLang}`}
function resetChallengeScoreForCurrent(){bwLastChallengeKey=currentChallengeKey();bwLastChallengeScore=null}
function hasPassedCurrentChallenge(){return bwLastChallengeKey===currentChallengeKey() && Number(bwLastChallengeScore)>=BW_TRAVEL_PASS_SCORE}
function renderChallenge(m,qs,box){
  if(!qs.length){box.innerHTML='<div class="warn">這個 Mission 還沒有可挑戰句子。</div>';return}
  if(challengeIndex>=qs.length)challengeIndex=0;
  if(needMissionUnlock(challengeIndex))challengeIndex=BW_TRAVEL_FREE_SENTENCES-1;
  resetChallengeScoreForCurrent();
  const locked=!missionUnlocked(m.id);
  const q=qs[challengeIndex],target=speakLang==='ja'?q.ja:q.en,hint=speakLang==='ja'?q.en:q.ja;
  const nextLabel=locked&&challengeIndex===BW_TRAVEL_FREE_SENTENCES-1?'扣金幣繼續':'下一句';
  box.innerHTML=`<div class="challenge"><div class="challenge-box"><div class="mini">任務 ${challengeIndex+1} / ${qs.length}｜先聽，再開口說。分數 ${BW_TRAVEL_PASS_SCORE} 以上才可下一句。${locked?'｜前 2 句免費，第 3 句提示扣 1 金幣':'｜本 Mission 已解鎖'}</div><div class="choice-row"><button class="choice ${speakLang==='en'?'active':''}" onclick="setSpeakLang('en')">英文挑戰</button><button class="choice ${speakLang==='ja'?'active':''}" onclick="setSpeakLang('ja')">日文挑戰</button></div><div style="margin-top:8px" class="${speakLang==='ja'?'big-ja':'big-en'}">${esc(target||'')}</div><div class="line"><span class="tag">ZH</span>${esc(q.zh||'')}</div><div class="line"><span class="tag">參考</span>${esc(hint||'')}</div><div class="actions"><button class="btn secondary" onclick="speakText('${esc(target||'')}','${speakLang}')">播放標準音</button><button class="btn orange" onclick="startSpeechChallenge('${esc(target||'')}','${speakLang}')">開始口說</button><button class="btn" id="nextBtn" onclick="nextChallenge()">${nextLabel}</button></div><div class="actions"><textarea id="manualAnswer" class="manual-input" placeholder="手機不能語音時，輸入你說的內容"></textarea><button class="btn secondary" onclick="checkManualAnswer('${esc(target||'')}')">檢查分數</button></div></div><div class="challenge-box"><div class="mini">你說的內容</div><div class="heard" id="heardBox">尚未開始</div><div style="margin-top:8px" id="scoreBox"></div></div></div>`
}
function setSpeakLang(lang){speakLang=lang;localStorage.setItem(`bw_travel_lang_${slug}`,lang);renderCurrent()}async function nextChallenge(){if(!hasPassedCurrentChallenge()){alert(`請先口說或手動檢查，分數達 ${BW_TRAVEL_PASS_SCORE} 以上才可進入下一句。`);return}const qs=questionsFor(currentMission());const next=(challengeIndex+1)%Math.max(1,qs.length);if(needMissionUnlock(next)){const ok=await chargeMissionCoin(currentMission());if(!ok)return}challengeIndex=next;renderCurrent()}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{setActiveTab(btn.dataset.tab);renderCurrent()}));
function markDone(){if(!currentMissionId)return;doneSet.add(currentMissionId);localStorage.setItem(`bw_travel_done_${slug}`,JSON.stringify([...doneSet]));renderMissions()}function resetProgress(){if(!confirm('確定重置這個 Travel Mission 的完成進度？'))return;doneSet=new Set();localStorage.removeItem(`bw_travel_done_${slug}`);renderMissions()}
function decodeHtmlText(s){const ta=document.createElement('textarea');ta.innerHTML=String(s||'');return ta.value}
function pickVoice(langCode){try{const want=langCode.toLowerCase().slice(0,2);const voices=speechSynthesis.getVoices()||[];return voices.find(v=>(v.lang||'').toLowerCase().startsWith(want))||voices.find(v=>(v.lang||'').toLowerCase().includes(want))||null}catch{return null}}
function speakText(text,lang='en'){
  const t=decodeHtmlText(text).trim();
  if(!t)return;
  const synth=window.speechSynthesis;
  if(!synth){alert('此手機瀏覽器不支援播放標準音');return}
  const langCode=lang==='ja'?'ja-JP':(lang==='zh'?'zh-TW':'en-US');
  const makeUtter=()=>{const u=new SpeechSynthesisUtterance(t);u.lang=langCode;u.rate=.82;u.volume=1;u.pitch=1;const v=pickVoice(langCode);if(v)u.voice=v;return u};
  try{
    synth.cancel();
    if(synth.paused)synth.resume();
    setTimeout(()=>{try{synth.speak(makeUtter());if(synth.paused)synth.resume()}catch(e){console.warn(e)}},30);
    setTimeout(()=>{try{if(!synth.speaking&&!synth.pending){synth.cancel();synth.speak(makeUtter())}}catch(e){}},350);
  }catch(e){console.warn(e)}
}
try{speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}catch{}
function normText(s){return String(s||'').toLowerCase().replace(/[.,!?;:，。！？、]/g,'').replace(/\s+/g,' ').trim()}function scoreText(target,said){const a=normText(target),b=normText(said);if(!a||!b)return 0;if(a===b)return 100;const aw=a.split(''),bw=b.split('');let hit=0;aw.forEach(ch=>{const i=bw.indexOf(ch);if(i>=0){hit++;bw.splice(i,1)}});return Math.min(99,Math.round(hit/Math.max(1,aw.length)*100))}
function showScore(target,said){const sc=scoreText(target,said);bwLastChallengeKey=currentChallengeKey();bwLastChallengeScore=sc;document.getElementById('heardBox').textContent=said||'沒有辨識到';document.getElementById('scoreBox').innerHTML=`<div class="score">${sc}</div><div class="${sc>=BW_TRAVEL_PASS_SCORE?'pass':'fail'}">${sc>=BW_TRAVEL_PASS_SCORE?'過關，可以下一句':'未達 50，請再聽一次重說'}</div>`}
function checkManualAnswer(target){showScore(target,document.getElementById('manualAnswer')?.value||'')}
function setHeardMessage(msg){const el=document.getElementById('heardBox');if(el)el.textContent=msg}
function showMicFallback(reason){
  const manual=document.getElementById('manualAnswer');
  setHeardMessage(reason||'麥克風沒有開啟，請用手動輸入。');
  if(manual){manual.focus();manual.placeholder='麥克風被擋時，直接輸入你說的內容再按「檢查分數」';}
}
async function ensureMicPermission(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    try{stream.getTracks().forEach(t=>t.stop())}catch(_e){}
    return true;
  }catch(e){
    const name=String(e&&e.name||'');
    if(name==='NotAllowedError'||name==='PermissionDeniedError'){
      showMicFallback('麥克風權限被擋：請在瀏覽器允許麥克風。若你在 LINE 內開啟，請改用 Safari / Chrome。');
    }else if(name==='NotFoundError'){
      showMicFallback('找不到麥克風，請用手動輸入。');
    }else{
      showMicFallback('麥克風啟動失敗：'+(name||'unknown')+'，請用手動輸入。');
    }
    return false;
  }
}
async function startSpeechChallenge(target,lang){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showMicFallback('此手機瀏覽器不支援語音辨識，請用手動輸入。');return}
  const ok=await ensureMicPermission();
  if(!ok)return;
  let rec;
  try{rec=new SR()}catch(e){showMicFallback('語音辨識啟動失敗，請用手動輸入。');return}
  rec.lang=lang==='ja'?'ja-JP':'en-US';
  rec.interimResults=false;
  rec.continuous=false;
  rec.maxAlternatives=1;
  setHeardMessage('聽你說...');
  rec.onresult=e=>showScore(target,e.results?.[0]?.[0]?.transcript||'');
  rec.onnomatch=()=>showMicFallback('沒有辨識到，請再按一次「開始口說」，或直接手動輸入。');
  rec.onerror=e=>{
    const err=String(e&&e.error||'unknown');
    if(err==='not-allowed'||err==='service-not-allowed'){
      showMicFallback('麥克風權限被擋：請允許麥克風。LINE 內建瀏覽器常會擋，請用 Safari / Chrome 開啟。');
    }else if(err==='no-speech'){
      showMicFallback('沒有聽到聲音，請靠近麥克風再試一次，或手動輸入。');
    }else if(err==='audio-capture'){
      showMicFallback('手機抓不到麥克風，請用手動輸入。');
    }else{
      showMicFallback('語音辨識失敗：'+err+'，請用手動輸入。');
    }
  };
  rec.onend=()=>{};
  try{rec.start()}catch(e){showMicFallback('語音辨識已卡住，請重新按「開始口說」，或手動輸入。')}
}
init();
