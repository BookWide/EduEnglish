      const arr=[j.access_token,j.currentSession&&j.currentSession.access_token,j.session&&j.session.access_token].filter(Boolean);

async function callTravelCoinApi(payload){
  const token=await getSupabaseAccessToken();
  if(!token)return {ok:false,code:'NO_LOGIN',message:'請先登入 BookWide，才能使用正式金幣。'};
  let res=null,j=null,raw='';
  try{
    res=await fetch(TRAVEL_DEDUCT_COIN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload||{})});

  }catch(e){return {ok:false,code:'NETWORK_ERROR',message:'扣金幣服務連線失敗，請稍後再試。'}}
  if(!res.ok||!j)return {ok:false,code:'HTTP_'+(res&&res.status),message:(j&&j.message)||raw||'扣金幣服務回應異常。'};

}

async function chargeMissionCoin(m){
  if(!m||!m.id)return false;

  const ok=confirm(`本 Mission 前 ${BW_TRAVEL_FREE_SENTENCES} 句免費。

確定扣金幣繼續？`);
  if(!ok)return false;

  const code=String(j&&j.code||'');
  const msg=String(j&&j.message||'');

    if(code==='NO_LOGIN'||code==='INVALID_TOKEN'||/invalid jwt|jwt|auth/i.test(msg)){redirectLoginBecauseTokenInvalid('登入狀態失效，請重新登入後再扣金幣。');return false}

    if(code==='NETWORK_ERROR'){alert(j.message);return false}

  }
  if(typeof j.remaining_coins!=='undefined')try{localStorage.setItem('bookwide_coin_balance',String(j.remaining_coins))}catch(e){}
  unlockedSet.add(m.id);saveUnlocks();renderMissions();

  return true;
}

}
function setSpeakLang(lang){speakLang=lang;localStorage.setItem(`bw_travel_lang_${slug}`,lang);renderCurrent()}async function nextChallenge(){if(!hasPassedCurrentChallenge()){alert(`請先口說或用手動輸入檢查，分數達 ${BW_TRAVEL_PASS_SCORE} 以上才可進入下一句。日文語音辨識太差時可直接打字；手機中斷會自動放行。`);return}const qs=questionsFor(currentMission());const next=(challengeIndex+1)%Math.max(1,qs.length);if(needMissionUnlock(next)){const ok=await chargeMissionCoin(currentMission());if(!ok)return}challengeIndex=next;renderCurrent()}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{setActiveTab(btn.dataset.tab);renderCurrent()}));
function markDone(){if(!currentMissionId)return;doneSet.add(currentMissionId);localStorage.setItem(`bw_travel_done_${slug}`,JSON.stringify([...doneSet]));renderMissions()}function resetProgress(){if(!confirm('確定重置這個 Travel Mission 的完成進度？'))return;doneSet=new Set();localStorage.removeItem(`bw_travel_done_${slug}`);renderMissions()}
function decodeHtmlText(s){const ta=document.createElement('textarea');ta.innerHTML=String(s||'');return ta.value}
function pickVoice(langCode){try{const want=langCode.toLowerCase().slice(0,2);const voices=speechSynthesis.getVoices()||[];return voices.find(v=>(v.lang||'').toLowerCase().startsWith(want))||voices.find(v=>(v.lang||'').toLowerCase().includes(want))||null}catch{return null}}
function speakText(text,lang='en'){
  const t=decodeHtmlText(text).trim();
  if(!t)return;
  const synth=window.speechSynthesis;
  if(!synth){alert('此手機瀏覽器不支援慢速標準音');return}
  const langCode=lang==='ja'?'ja-JP':(lang==='zh'?'zh-TW':'en-US');
  const makeUtter=()=>{const u=new SpeechSynthesisUtterance(t);u.lang=langCode;u.rate=(lang==='ja'?.58:(lang==='en'?.70:.78));u.volume=1;u.pitch=(lang==='ja'?.92:1);const v=pickVoice(langCode);if(v)u.voice=v;return u};
  try{
    synth.cancel();
    if(synth.paused)synth.resume();
    setTimeout(()=>{try{synth.speak(makeUtter());if(synth.paused)synth.resume()}catch(e){console.warn(e)}},30);
    setTimeout(()=>{try{if(!synth.speaking&&!synth.pending){synth.cancel();synth.speak(makeUtter())}}catch(e){}},350);
  }catch(e){console.warn(e)}
}
try{speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}catch{}
function normText(s){return String(s||'').toLowerCase().replace(/[.,!?;:，。！？、]/g,'').replace(/\s+/g,' ').trim()}function scoreText(target,said){const a=normText(target),b=normText(said);if(!a||!b)return 0;if(a===b)return 100;const aw=a.split(''),bw=b.split('');let hit=0;aw.forEach(ch=>{const i=bw.indexOf(ch);if(i>=0){hit++;bw.splice(i,1)}});return Math.min(99,Math.round(hit/Math.max(1,aw.length)*100))}
function showScore(target,said){const sc=scoreText(target,said);bwLastChallengeKey=currentChallengeKey();bwLastChallengeScore=sc;document.getElementById('heardBox').textContent=said||'沒有辨識到';document.getElementById('scoreBox').innerHTML=`<div class="score">${sc}</div><div class="${sc>=BW_TRAVEL_PASS_SCORE?'pass':'fail'}">${sc>=BW_TRAVEL_PASS_SCORE?'過關，可以下一句':'未達標準，請再慢速聽一次；語音辨識差時可手動輸入'}</div>`}
function checkManualAnswer(target){
  const said=document.getElementById('manualAnswer')?.value||'';
  if(speakLang==='ja' && said.trim()){
    bwLastChallengeKey=currentChallengeKey();
    bwLastChallengeScore=BW_TRAVEL_PASS_SCORE;
    document.getElementById('heardBox').textContent=said;
    document.getElementById('scoreBox').innerHTML=`<div class="score">${BW_TRAVEL_PASS_SCORE}</div><div class="pass">日文手動輸入已通過，可按下一句。</div>`;
    return;
  }
  showScore(target,said)
}
function setHeardMessage(msg){const el=document.getElementById('heardBox');if(el)el.textContent=msg}
function showMicFallback(reason){
  const manual=document.getElementById('manualAnswer');
  setHeardMessage(reason||'麥克風沒有開啟，請用手動輸入。');
  if(manual){manual.focus();manual.placeholder='麥克風被擋或中斷時，日文可直接手動輸入再按「檢查分數」';}
}
function passByMicAbort(reason){
  bwLastChallengeKey=currentChallengeKey();
  bwLastChallengeScore=BW_TRAVEL_PASS_SCORE;
  const heard=document.getElementById('heardBox');
  const score=document.getElementById('scoreBox');
  if(heard)heard.textContent=reason||'手機語音辨識中斷，已改用跟讀放行。';
  if(score)score.innerHTML=`<div class="score">${BW_TRAVEL_PASS_SCORE}</div><div class="pass">手機語音辨識中斷，已放行；可直接按下一句。</div>`;
}
async function ensureMicPermission(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    try{stream.getTracks().forEach(t=>t.stop())}catch(_e){}
    return true;
  }catch(e){
    const name=String(e&&e.name||'');
    if(name==='NotAllowedError'||name==='PermissionDeniedError'){
      showMicFallback('麥克風權限被擋：請在瀏覽器允許麥克風。若你在 LINE 內開啟，請改用 Safari / Chrome。');
    }else if(name==='NotFoundError'){
      showMicFallback('找不到麥克風，請用手動輸入。');
    }else{
      showMicFallback('麥克風啟動失敗：'+(name||'unknown')+'，請用手動輸入。');
    }
    return false;
  }
}
async function startSpeechChallenge(target,lang){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showMicFallback('此手機瀏覽器不支援語音辨識，請用手動輸入。');return}
  const ok=await ensureMicPermission();
  if(!ok)return;
  let rec;
  try{rec=new SR()}catch(e){showMicFallback('語音辨識啟動失敗，請用手動輸入。');return}
  rec.lang=lang==='ja'?'ja-JP':'en-US';
  rec.interimResults=false;
  rec.continuous=false;
  rec.maxAlternatives=1;
  setHeardMessage('聽你說...');
  rec.onresult=e=>showScore(target,e.results?.[0]?.[0]?.transcript||'');
  rec.onnomatch=()=>showMicFallback('沒有辨識到，請再按一次「開始口說」，或直接手動輸入。');
  rec.onerror=e=>{
    const err=String(e&&e.error||'unknown');
    if(err==='not-allowed'||err==='service-not-allowed'){
      showMicFallback('麥克風權限被擋：請允許麥克風。LINE 內建瀏覽器常會擋，請用 Safari / Chrome 開啟。');
    }else if(err==='no-speech'){
      showMicFallback('沒有聽到聲音，請靠近麥克風再試一次，或手動輸入。');
    }else if(err==='audio-capture'){
      showMicFallback('手機抓不到麥克風，請用手動輸入。');
    }else if(err==='aborted'||err==='network'||err==='language-not-supported'){
      passByMicAbort('手機語音辨識中斷：'+err+'。已放行，可直接按下一句。');
    }else{
      showMicFallback('語音辨識失敗：'+err+'，請用手動輸入。');
    }
  };
  rec.onend=()=>{};
  try{rec.start()}catch(e){showMicFallback('語音辨識已卡住，請重新按「開始口說」，或手動輸入。')}
}
init();
</script>
