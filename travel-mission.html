#163456;display:flex;align-items:center;justify-content:center;font-weight:900}.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0}.tab{padding:7px 11px;font-size:13px}.tab.active{background:var(--blue);border-color:var(--blue)}.mission-info{display:grid;grid-template-columns:1fr auto;gap:6px 10px;align-items:end}.mission-info h2{font-size:20px;line-height:1.15;margin:0}.actions{display:flex;gap:6px;flex-wrap:wrap}.btn{border:0;border-radius:10px;padding:8px 11px;background:var(--blue);font-size:13px}.btn.green{background:var(--green)}.btn.secondary{background:var(--gray)}.btn.orange{background:var(--orange);color:#111827}.qa,.challenge{display:grid;gap:8px}.qcard,.challenge-box{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:10px}.qtitle{font-weight:900;font-size:15px;margin-bottom:7px}.line{padding:5px 0;border-top:1px solid rgba(255,255,255,.08)}.line:first-of-type{border-top:0}.tag{font-size:12px;color:#93c5fd;font-weight:900;margin-right:7px}.speak{float:right;background:#334155;border:0;border-radius:10px;padding:5px 8px;font-size:12px}.sentence-row{display:grid;grid-template-columns:34px 1fr 36px;gap:7px;align-items:center;padding:6px 0;border-top:1px solid rgba(255,255,255,.08)}.sentence-row:first-of-type{border-top:0}.sentence-text{font-size:17px;line-height:1.35}.ja-note{display:block;color:#dbeafe;font-size:12px;letter-spacing:.08em;margin-bottom:2px;opacity:.9}.ja-kana{display:block;color:#dbeafe;font-size:12px;margin-top:3px;opacity:.92;letter-spacing:.04em}.ja-ruby{font-size:18px;line-height:1.7}.ja-ruby ruby{ruby-position:over}.ja-ruby rt{font-size:10px;color:#dbeafe;font-weight:700;letter-spacing:.04em}.row-sound{border:0;background:#334155;color:#fff;border-radius:999px;width:32px;height:32px;cursor:pointer;font-weight:900}.sentence-actions{display:none}.small-speak{border:0;border-radius:999px;padding:6px 9px;font-weight:900;color:#fff;background:#2563eb}.small-speak.ja{background:#475569}.vocab{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.word{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px 10px;display:grid;grid-template-columns:1fr auto;gap:5px 10px;align-items:center}.word b{font-size:18px}.word-ipa,.word-kana{font-size:12px;color:#9fb0cb}.word-zh,.word-ja{font-size:15px}.word-zh{font-weight:900}.word-actions{display:flex;gap:5px;grid-row:1/4;grid-column:2}.mini-sound{border:0;padding:5px 8px;font-size:12px}.mini-sound.primary{background:#2563eb}.mini{font-size:12px;color:var(--muted);line-height:1.35}.choice-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.choice{border:1px solid var(--line);background:#10213d;color:#fff;border-radius:999px;padding:6px 9px;font-size:12px;cursor:pointer}.choice.active{background:#fff;color:#0f172a;font-weight:900}.big-en{font-size:22px;line-height:1.2;font-weight:900}.big-ja{font-size:20px;line-height:1.25;font-weight:900}.heard{background:#071225;border:1px dashed #486487;border-radius:11px;padding:8px;min-height:34px;color:#dbeafe}.score{font-size:24px;font-weight:900;color:#86efac}.manual-input{width:100%;min-height:34px;border:1px dashed #486487;background:#071225;color:#fff;border-radius:10px;padding:7px 8px;font-size:14px;resize:vertical}.warn{color:#fcd34d;font-size:13px;line-height:1.45}.coin-lock{background:#2a1d0b;border:1px solid rgba(245,158,11,.65);color:#fde68a;border-radius:12px;padding:10px;margin-top:8px;line-height:1.45}.coin-lock b{color:#fff}.coin-status{display:inline-flex;align-items:center;gap:4px;border-radius:999px;background:#0b1d34;border:1px solid var(--line);color:#fde68a;padding:3px 7px;font-size:11px;font-weight:900;margin-left:6px}.err{color:#fecaca;background:#451a1a;border:1px solid #7f1d1d;border-radius:12px;padding:12px;white-space:pre-wrap}
@media(max-width:850px){.collapse-btn{display:inline-block}.mission-card.collapsed .mission-list,.mission-card.collapsed .progress,.mission-card.collapsed #progressText{display:none}.wrap{padding:5px 7px 14px;max-width:430px}.top{display:block;margin:0 0 5px}.title h1{font-size:18px;line-height:1.05;margin:0}.sub{font-size:12px;line-height:1.15}.pill{display:none}.grid{display:block}.card{padding:7px;border-radius:13px;margin-bottom:7px}.mission-card{padding:8px 9px}.mission-head{min-height:31px}.mission-head h2{font-size:16px}.collapse-btn{padding:5px 10px;font-size:13px}.mission-list{max-height:185px;gap:5px;margin-top:6px}.mission-btn{min-height:42px;padding:6px 8px;border-radius:11px}.mission-btn b{font-size:13px;line-height:1.1}.mission-btn span{font-size:10.5px;line-height:1.12}.progress{height:5px;margin-top:5px}#progressText{font-size:10.5px!important;margin-top:3px!important}.photo,.photo-fallback{aspect-ratio:16/4;max-height:92px;border-radius:10px}.tabs{gap:5px;margin:5px 0;white-space:nowrap;overflow-x:auto;flex-wrap:nowrap}.tab{padding:5px 8px;font-size:12.5px;line-height:1}.mission-info{display:block}.mission-info h2{font-size:18px;line-height:1.05;margin:0 0 2px}.mission-info .sub{font-size:11.5px}.actions{gap:5px;margin-top:5px}.btn{padding:7px 9px;font-size:12px;border-radius:9px}#contentBox{padding:7px}.qcard,.challenge-box{padding:8px;border-radius:11px}.qtitle{font-size:14px;margin-bottom:5px}.line{padding:4px 0}.tag{font-size:11px}.sentence-row{grid-template-columns:28px 1fr 32px;padding:5px 0}.sentence-text{font-size:15px}.ja-note{font-size:11px;margin-bottom:1px}.ja-kana{font-size:11px;margin-top:2px}.ja-ruby{font-size:16px;line-height:1.65}.ja-ruby rt{font-size:9px}.row-sound{width:28px;height:28px;font-size:12px}.sentence-actions{margin-top:5px}.small-speak{padding:5px 8px;font-size:12px}.big-en{font-size:19px}.big-ja{font-size:17px}.mini{font-size:11px}.heard{min-height:30px;padding:7px}.manual-input{min-height:32px}.score{font-size:22px}.vocab{grid-template-columns:1fr;gap:6px}.word{padding:8px;border-radius:11px}.word b{font-size:16px}.word-zh,.word-ja{font-size:14px}.word-ipa,.word-kana{font-size:11px}.mini-sound{padding:5px 7px;font-size:11px}}
@media(max-width:390px){.photo,.photo-fallback{max-height:82px}.mission-list{max-height:160px}.tab{padding:5px 7px}.title h1{font-size:17px}}

<body>
<div class="wrap">
  <div class="top"><div class="title"><h1 id="title">Travel Mission</h1><div class="sub" id="subtitle">讀取中...</div></div><div class="pill" id="slugPill">slug</div></div>
  <div id="errorBox"></div>
  <div class="grid">
    <div class="card mission-card" id="missionCard"><div class="mission-head"><h2>任務列表</h2><button class="collapse-btn" type="button" onclick="toggleMissionList()" id="collapseBtn">收起</button></div><div class="mission-list" id="missionList"></div><div class="progress"><div class="bar" id="progressBar"></div></div><div class="sub" id="progressText" style="margin-top:5px">完成 0 / 0</div></div>
    <div>
      <div class="card"><div id="photoBox" class="photo-fallback">Travel Mission</div><div class="tabs"><button class="tab active" data-tab="challenge">任務挑戰</button><button class="tab" data-tab="sentences">必學句</button><button class="tab" data-tab="vocab">單字</button><button class="tab" data-tab="info">路線資訊</button></div><div class="mission-info"><div><h2 id="missionTitle">請選擇任務</h2><div class="sub" id="missionMeta"></div></div><div class="actions"><button class="btn green" onclick="markDone()">完成本 Mission</button><button class="btn secondary" onclick="resetProgress()">重置進度</button></div></div></div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
<script>
const R2_BASE='https://pub-578e9e060a104f24b6865e26eb941648.r2.dev';
const SITE_BASE='https://bookwide.net';
const SUPABASE_URL='https://jeajrwpmrgczimmrflxo.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplYWpyd3BtcmdjemltbXJmbHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MTg5MzksImV4cCI6MjA3NjI5NDkzOX0.3iFXdHH0JEuk177_R4TGFJmOxYK9V8XctON6rDe7-Do';
const BW_SUPA=(window.supa||(window.supabase&&window.supabase.createClient?window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY):null));
if(BW_SUPA)window.supa=BW_SUPA;
const qs=new URLSearchParams(location.search);const slug=cleanSlug(qs.get('slug')||'kumano-kodo');
const isBookWideHost=/bookwide\.net$/i.test(location.hostname);
const base=isBookWideHost?`/data/travel-missions/${slug}`:`${SITE_BASE}/data/travel-missions/${slug}`;
let missionData=null,vocabData=null,photosData=null,currentMissionId='',activeTab=localStorage.getItem(`bw_travel_tab_${slug}`)||'challenge',challengeIndex=0,speakLang=localStorage.getItem(`bw_travel_lang_${slug}`)||'en';
let doneSet=new Set(JSON.parse(localStorage.getItem(`bw_travel_done_${slug}`)||'[]'));
const BW_TRAVEL_FREE_SENTENCES=2;
const BW_TRAVEL_MISSION_COST=1;
let unlockedSet=new Set(JSON.parse(localStorage.getItem(`bw_travel_unlocked_${slug}`)||'[]'));
function cleanSlug(v){return String(v||'').trim().toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')||'kumano-kodo'}
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
async function getJson(path){const r=await fetch(path,{cache:'no-store'});if(!r.ok)throw new Error(`${r.status} ${path}`);return await r.json()}async function tryJson(path){try{return await getJson(path)}catch{return null}}
async function init(){document.getElementById('slugPill').textContent=slug;try{missionData=await getJson(`${base}/${slug}_questions.json`);vocabData=await tryJson(`${base}/${slug}_vocab.json`);photosData=await tryJson(`${base}/${slug}_photos.json`);renderHeader();syncMissionListMode();await syncTravelUnlocks();currentMissionId=(getMissions()[0]||{}).id||'';setActiveTab(activeTab);renderMissions();renderCurrent()}catch(e){document.getElementById('errorBox').innerHTML=`<div class="err">讀不到 Travel Mission JSON：\n${esc(e.message)}\n\n請確認檔案存在：\n${base}/${slug}_questions.json</div>`;document.getElementById('subtitle').textContent='讀取失敗'}}
function getMissions(){return missionData?.missions||[]}function questionsFor(m){return (missionData?.questions||[]).filter(q=>q.mission_id===m.id)}function vocabFor(m){return (vocabData?.vocab||vocabData?.words||[]).filter(v=>v.mission_id===m.id)}
function missionUnlocked(id){return unlockedSet.has(id)}
function saveUnlocks(){localStorage.setItem(`bw_travel_unlocked_${slug}`,JSON.stringify([...unlockedSet]))}
function needMissionUnlock(index){return index>=BW_TRAVEL_FREE_SENTENCES && !missionUnlocked(currentMissionId)}
const TRAVEL_DEDUCT_COIN_URL=SUPABASE_URL+'/functions/v1/travel-deduct-coin';
function readJsonSafe(v){try{return JSON.parse(v)}catch(e){return null}}
function decodeJwtPayload(token){try{const part=String(token||'').split('.')[1];if(!part)return null;const b64=part.replace(/-/g,'+').replace(/_/g,'/');const json=decodeURIComponent(Array.prototype.map.call(atob(b64),c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));return JSON.parse(json)}catch(e){return null}}
function isJwtExpired(token){const p=decodeJwtPayload(token);if(!p||!p.exp)return false;return (p.exp*1000)<(Date.now()+30000)}
function clearSupabaseAuthStorage(){const remove=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i)||'';if(/^sb-.*-auth-token$/.test(k))remove.push(k)}remove.forEach(k=>localStorage.removeItem(k))}catch(e){}}
async function getSupabaseAccessToken(){
  try{
    if(BW_SUPA&&BW_SUPA.auth&&BW_SUPA.auth.getSession){
      const r=await BW_SUPA.auth.getSession();
      const token=r&&r.data&&r.data.session&&r.data.session.access_token;
      if(token&&!isJwtExpired(token))return token;
    }
  }catch(e){}
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i)||'';
      if(!/^sb-.*-auth-token$/.test(k))continue;
      const j=readJsonSafe(localStorage.getItem(k)||'')||{};
      const arr=[j.access_token,j.currentSession&&j.currentSession.access_token,j.session&&j.session.access_token].filter(Boolean);
      for(const token of arr){if(token&&!isJwtExpired(token))return token}
    }
  }catch(e){}
  return '';
}
function bwLoginUrl(){return '/index.html?login=1&next='+encodeURIComponent(location.pathname+location.search)}
function bwCoinTopupUrl(){return '/account/subscription.html'}
function redirectLoginBecauseTokenInvalid(message){clearSupabaseAuthStorage();alert(message||'登入已過期，請重新登入。');location.href=bwLoginUrl()}
async function callTravelCoinApi(payload){
  const token=await getSupabaseAccessToken();
  if(!token)return {ok:false,code:'NO_LOGIN',message:'請先登入 BookWide，才能使用正式金幣。'};
  let res=null,j=null,raw='';
  try{
    res=await fetch(TRAVEL_DEDUCT_COIN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload||{})});
    raw=await res.text();
    try{j=raw?JSON.parse(raw):null}catch(e){j=null}
  }catch(e){return {ok:false,code:'NETWORK_ERROR',message:'扣金幣服務連線失敗，請稍後再試。'}}
  if(!res.ok||!j)return {ok:false,code:'HTTP_'+(res&&res.status),message:(j&&j.message)||raw||'扣金幣服務回應異常。'};
  return j;
}
async function syncTravelUnlocks(){
  const token=await getSupabaseAccessToken();
  if(!token)return;
  try{
    const j=await callTravelCoinApi({mode:'check',slug});
    if(j&&j.ok&&Array.isArray(j.unlocked_mission_ids)){
      j.unlocked_mission_ids.forEach(id=>id&&unlockedSet.add(String(id)));
      saveUnlocks();
    }
  }catch(e){}
}
async function chargeMissionCoin(m){
  if(!m||!m.id)return false;
  if(missionUnlocked(m.id))return true;
  const ok=confirm(`本 Mission 前 ${BW_TRAVEL_FREE_SENTENCES} 句免費。
第 ${BW_TRAVEL_FREE_SENTENCES+1} 句開始需扣 ${BW_TRAVEL_MISSION_COST} 金幣，解鎖本 Mission 共 20 句。

確定扣金幣繼續？`);
  if(!ok)return false;
  const j=await callTravelCoinApi({mode:'mission_once',slug,mission_id:m.id,cost:BW_TRAVEL_MISSION_COST,sentence_no:BW_TRAVEL_FREE_SENTENCES+1});
  const code=String(j&&j.code||'');
  const msg=String(j&&j.message||'');
  if(!j||!j.ok){
    if(code==='NO_LOGIN'||code==='INVALID_TOKEN'||/invalid jwt|jwt|auth/i.test(msg)){redirectLoginBecauseTokenInvalid('登入狀態失效，請重新登入後再扣金幣。');return false}
    if(code==='NO_COINS'){alert(msg||'金幣不足，請先訂閱或取得金幣。');location.href=bwCoinTopupUrl();return false}
    if(code==='NETWORK_ERROR'){alert(j.message);return false}
    alert(msg||'扣金幣失敗，請稍後再試。');return false;
  }
  if(typeof j.remaining_coins!=='undefined')try{localStorage.setItem('bookwide_coin_balance',String(j.remaining_coins))}catch(e){}
  unlockedSet.add(m.id);saveUnlocks();renderMissions();
  alert(j.already?`本 Mission 已解鎖，不重複扣金幣。`:`已扣 ${BW_TRAVEL_MISSION_COST} 金幣，解鎖本 Mission 20 句。${typeof j.remaining_coins!=='undefined'?' 剩餘 '+j.remaining_coins+' 金幣。':''}`);
  return true;
}
async function unlockCurrentMission(){const ok=await chargeMissionCoin(currentMission());if(ok)renderCurrent()}
function renderHeader(){document.getElementById('title').textContent=missionData.title||'Travel Mission';document.getElementById('subtitle').textContent=missionData.subtitle||`${missionData.country||''}｜${missionData.days||''}｜${missionData.sentence_count||''}句｜${missionData.vocab_count||''}單字`}
function renderMissions(){const ms=getMissions(),list=document.getElementById('missionList');list.innerHTML=ms.map((m,i)=>{const cnt=questionsFor(m).length||m.sentence_count||0;return `<button class="mission-btn ${m.id===currentMissionId?'active':''}" onclick="selectMission('${esc(m.id)}')"><b>${String(i+1).padStart(2,'0')}｜${esc(m.title||m.id)}${missionUnlocked(m.id)?'<span class="coin-status">已解鎖</span>':'<span class="coin-status">2句免費｜1金幣</span>'}</b><span>${esc(m.scene||'')}｜${cnt}句｜${doneSet.has(m.id)?'已完成':'未完成'}</span></button>`}).join('');const total=ms.length||1,done=[...doneSet].filter(id=>ms.some(m=>m.id===id)).length;document.getElementById('progressBar').style.width=`${Math.round(done/total*100)}%`;document.getElementById('progressText').textContent=`完成 ${done} / ${ms.length}`}
function isMobileView(){return window.matchMedia('(max-width:850px)').matches}
function syncMissionListMode(){const card=document.getElementById('missionCard'),btn=document.getElementById('collapseBtn');if(!card||!btn)return;if(!isMobileView()){card.classList.remove('collapsed');btn.textContent='收起';btn.style.display='none'}else{btn.style.display='inline-block';if(!card.dataset.mobileReady){card.classList.add('collapsed');card.dataset.mobileReady='1'}btn.textContent=card.classList.contains('collapsed')?'展開':'收起'}}
function toggleMissionList(){const card=document.getElementById('missionCard');if(!isMobileView()){syncMissionListMode();return}card.classList.toggle('collapsed');document.getElementById('collapseBtn').textContent=card.classList.contains('collapsed')?'展開':'收起'}
window.addEventListener('resize',syncMissionListMode)
function selectMission(id){currentMissionId=id;challengeIndex=0;if(isMobileView()){document.getElementById('missionCard').classList.add('collapsed');document.getElementById('collapseBtn').textContent='展開'}renderMissions();renderCurrent()}function currentMission(){return getMissions().find(m=>m.id===currentMissionId)||getMissions()[0]||{}}
function setActiveTab(tab){activeTab=tab||'challenge';localStorage.setItem(`bw_travel_tab_${slug}`,activeTab);document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===activeTab))}
function renderCurrent(){const m=currentMission(),qn=questionsFor(m).length;document.getElementById('missionTitle').textContent=m.title||'Mission';document.getElementById('missionMeta').textContent=`${m.scene||''}｜${m.sentence_count||qn||0}句｜${m.vocab_count||vocabFor(m).length||0}單字`;renderPhoto(m);renderTabContent(m)}
function normalizePhotoSrc(src){let s=String(src||'').trim();if(!s)return'';s=s.replace('/assets/travel-missions/','/ads/travel-missions/');if(s.startsWith('http'))return s;if(s.startsWith('/ads/'))return R2_BASE+s;return s}
function renderPhoto(m){const old=document.getElementById('photoBox');const arr=photosData?.photos||photosData?.items||[];const hit=arr.find(p=>p.mission_id===m.id)||arr[0];const src=normalizePhotoSrc(hit?.url||hit?.src||m.photo||'');old.outerHTML=src?`<img id="photoBox" class="photo" src="${esc(src)}" onerror="this.outerHTML='<div id=&quot;photoBox&quot; class=&quot;photo-fallback&quot;>Travel Mission</div>'">`:`<div id="photoBox" class="photo-fallback">${esc(m.scene||'Travel Mission')}</div>`}
function renderTabContent(m){const box=document.getElementById('contentBox'),qs=questionsFor(m);if(activeTab==='challenge')return renderChallenge(m,qs,box);if(activeTab==='sentences'){
  const locked=!missionUnlocked(m.id);
  const shown=locked?qs.slice(0,BW_TRAVEL_FREE_SENTENCES):qs;
  box.innerHTML=qs.length?`<div class="qa">${shown.map((q,i)=>{const jk=jaKana(q);return `<div class="qcard"><div class="qtitle">${i+1}. ${esc(q.title||q.scene||'情境句')}</div><div class="sentence-row"><span class="tag">EN</span><div class="sentence-text">${esc(q.en||'')}</div><button class="row-sound" onclick="speakText('${esc(q.en||'')}','en')">🔊</button></div><div class="sentence-row"><span class="tag">JA</span><div class="sentence-text"><div class="ja-ruby">${rubyJa(q.ja||'')}</div>${(jk||autoKana(q.ja||''))?`<span class="ja-kana">${esc(jk||autoKana(q.ja||''))}</span>`:''}</div><button class="row-sound" onclick="speakText('${esc(q.ja||'')}','ja')">🔊</button></div><div class="sentence-row"><span class="tag">ZH</span><div class="sentence-text">${esc(q.zh||'')}</div><button class="row-sound" onclick="speakText('${esc(q.zh||'')}','zh')">🔊</button></div></div>`}).join('')}${locked?`<div class="coin-lock"><b>第 ${BW_TRAVEL_FREE_SENTENCES+1} 句後需扣 ${BW_TRAVEL_MISSION_COST} 金幣。</b><br>本 Mission 共 ${qs.length} 句，扣一次解鎖本 Mission 全部句子。<div class="actions"><button class="btn orange" onclick="unlockCurrentMission()">扣 ${BW_TRAVEL_MISSION_COST} 金幣解鎖本 Mission</button></div></div>`:''}</div>`:`<div class="warn">這個 Mission 還沒有 questions。</div>`;
  return
}if(activeTab==='vocab'){const words=vocabFor(m);box.innerHTML=words.length?`<div class="vocab">${words.map(vocabCard).join('')}</div>`:`<div class="warn">這個 Mission 還沒有 vocab。</div>`;return}box.innerHTML=`<div class="qcard"><div class="qtitle">${esc(m.title||'路線資訊')}</div><div class="line"><span class="tag">場景</span>${esc(m.scene||'')}</div><div class="line"><span class="tag">目的</span>${esc(m.goal||'出發前熟悉實際旅程會用到的句子、單字與互動。')}</div><div class="line"><span class="tag">檔案</span>${esc(base)}/${esc(slug)}_questions.json</div></div>`}
const IPA={pilgrimage:'/ˈpɪlɡrɪmɪdʒ/',trail:'/treɪl/',trailhead:'/ˈtreɪlhed/',shrine:'/ʃraɪn/',goshuin:'/ɡoʊˈʃuːɪn/',amulet:'/ˈæmjələt/',reservation:'/ˌrezərˈveɪʃən/',platform:'/ˈplætfɔːrm/',luggage:'/ˈlʌɡɪdʒ/',passport:'/ˈpæspɔːrt/',weather:'/ˈweðər/',delay:'/dɪˈleɪ/'};
const KANA={'巡礼':'じゅんれい','古道':'こどう','登山口':'とざんぐち','神社':'じんじゃ','御朱印':'ごしゅいん','お守り':'おまもり','温泉':'おんせん','予約':'よやく','ホーム':'ほーむ','荷物':'にもつ','パスポート':'ぱすぽーと','搭乗券':'とうじょうけん','免税':'めんぜい','お土産':'おみやげ','水筒':'すいとう','休憩所':'きゅうけいじょ','天気':'てんき','雨具':'あまぐ','登山靴':'とざんぐつ','バス停':'ばすてい','切符':'きっぷ','地図':'ちず','観光案内所':'かんこうあんないじょ','夕食':'ゆうしょく','朝食':'ちょうしょく','乾杯':'かんぱい','おすすめ':'おすすめ','飛行機':'ひこうき','搭乗口':'とうじょうぐち','遅延':'ちえん'};
function vocabCard(w){const en=w.en||w.word||'',ja=w.ja||'',zh=w.zh||w.meaning||'',ipa=w.ipa||IPA[en.toLowerCase()]||'',kana=w.kana||KANA[ja]||'';return `<div class="word"><div><b>${esc(en)}</b>${ipa?`<div class="word-ipa">${esc(ipa)}</div>`:''}<div class="word-zh">中：${esc(zh)}</div><div class="word-ja">日：${esc(ja)}</div>${kana?`<div class="word-kana">假名：${esc(kana)}</div>`:''}</div><div class="word-actions"><button class="mini-sound primary" onclick="speakText('${esc(en)}','en')">EN 🔊</button><button class="mini-sound" onclick="speakText('${esc(ja)}','ja')">日 🔊</button></div></div>`}
function renderChallenge(m,qs,box){if(!qs.length){box.innerHTML='<div class="warn">這個 Mission 還沒有可挑戰句子。</div>';return}if(challengeIndex>=qs.length)challengeIndex=0;if(needMissionUnlock(challengeIndex))challengeIndex=BW_TRAVEL_FREE_SENTENCES-1;const locked=!missionUnlocked(m.id);const q=qs[challengeIndex],target=speakLang==='ja'?q.ja:q.en,hint=speakLang==='ja'?q.en:q.ja;box.innerHTML=`<div class="challenge"><div class="challenge-box"><div class="mini">任務 ${challengeIndex+1} / ${qs.length}｜先聽，再開口說。分數 60 以上可過關。${locked?'｜前 2 句免費，第 3 句提示扣 1 金幣':'｜本 Mission 已解鎖'}</div><div class="choice-row"><button class="choice ${speakLang==='en'?'active':''}" onclick="setSpeakLang('en')">英文挑戰</button><button class="choice ${speakLang==='ja'?'active':''}" onclick="setSpeakLang('ja')">日文挑戰</button></div><div style="margin-top:8px" class="${speakLang==='ja'?'big-ja':'big-en'}">${esc(target||'')}</div><div class="line"><span class="tag">ZH</span>${esc(q.zh||'')}</div><div class="line"><span class="tag">參考</span>${esc(hint||'')}</div><div class="actions"><button class="btn secondary" onclick="speakText('${esc(target||'')}','${speakLang}')">播放標準音</button><button class="btn orange" onclick="startSpeechChallenge('${esc(target||'')}','${speakLang}')">開始口說</button><button class="btn" onclick="nextChallenge()">${locked&&challengeIndex===BW_TRAVEL_FREE_SENTENCES-1?'扣金幣繼續':'下一句'}</button></div><div class="actions"><textarea id="manualAnswer" class="manual-input" placeholder="手機不能語音時，輸入你說的內容"></textarea><button class="btn secondary" onclick="checkManualAnswer('${esc(target||'')}')">檢查分數</button></div></div><div class="challenge-box"><div class="mini">你說的內容</div><div class="heard" id="heardBox">尚未開始</div><div style="margin-top:8px" id="scoreBox"></div></div></div>`}
function setSpeakLang(lang){speakLang=lang;localStorage.setItem(`bw_travel_lang_${slug}`,lang);renderCurrent()}async function nextChallenge(){const qs=questionsFor(currentMission());const next=(challengeIndex+1)%Math.max(1,qs.length);if(needMissionUnlock(next)){const ok=await chargeMissionCoin(currentMission());if(!ok)return}challengeIndex=next;renderCurrent()}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{setActiveTab(btn.dataset.tab);renderCurrent()}));
function markDone(){if(!currentMissionId)return;doneSet.add(currentMissionId);localStorage.setItem(`bw_travel_done_${slug}`,JSON.stringify([...doneSet]));renderMissions()}function resetProgress(){if(!confirm('確定重置這個 Travel Mission 的完成進度？'))return;doneSet=new Set();localStorage.removeItem(`bw_travel_done_${slug}`);renderMissions()}
function decodeHtmlText(s){const ta=document.createElement('textarea');ta.innerHTML=String(s||'');return ta.value}
function pickVoice(langCode){try{const want=langCode.toLowerCase().slice(0,2);const voices=speechSynthesis.getVoices()||[];return voices.find(v=>(v.lang||'').toLowerCase().startsWith(want))||voices.find(v=>(v.lang||'').toLowerCase().includes(want))||null}catch{return null}}
function speakText(text,lang='en'){
  const t=decodeHtmlText(text).trim();
  if(!t)return;
  const synth=window.speechSynthesis;
  if(!synth){alert('此手機瀏覽器不支援播放標準音');return}
  const langCode=lang==='ja'?'ja-JP':(lang==='zh'?'zh-TW':'en-US');
  const makeUtter=()=>{const u=new SpeechSynthesisUtterance(t);u.lang=langCode;u.rate=.82;u.volume=1;u.pitch=1;const v=pickVoice(langCode);if(v)u.voice=v;return u};
  try{
    synth.cancel();
    if(synth.paused)synth.resume();
    setTimeout(()=>{try{synth.speak(makeUtter());if(synth.paused)synth.resume()}catch(e){console.warn(e)}},30);
    setTimeout(()=>{try{if(!synth.speaking&&!synth.pending){synth.cancel();synth.speak(makeUtter())}}catch(e){}},350);
  }catch(e){console.warn(e)}
}
try{speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}catch{}
function normText(s){return String(s||'').toLowerCase().replace(/[.,!?;:，。！？、]/g,'').replace(/\s+/g,' ').trim()}function scoreText(target,said){const a=normText(target),b=normText(said);if(!a||!b)return 0;if(a===b)return 100;const aw=a.split(''),bw=b.split('');let hit=0;aw.forEach(ch=>{const i=bw.indexOf(ch);if(i>=0){hit++;bw.splice(i,1)}});return Math.min(99,Math.round(hit/Math.max(1,aw.length)*100))}
function showScore(target,said){const sc=scoreText(target,said);document.getElementById('heardBox').textContent=said||'沒有辨識到';document.getElementById('scoreBox').innerHTML=`<div class="score">${sc}</div><div class="${sc>=60?'pass':'fail'}">${sc>=60?'過關，可以下一句':'再聽一次，重新說'}</div>`}
function checkManualAnswer(target){showScore(target,document.getElementById('manualAnswer')?.value||'')}
function setHeardMessage(msg){const el=document.getElementById('heardBox');if(el)el.textContent=msg}
function showMicFallback(reason){
  const manual=document.getElementById('manualAnswer');
  setHeardMessage(reason||'麥克風沒有開啟，請用手動輸入。');
  if(manual){manual.focus();manual.placeholder='麥克風被擋時，直接輸入你說的內容再按「檢查分數」';}
}
async function ensureMicPermission(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    try{stream.getTracks().forEach(t=>t.stop())}catch(_e){}
    return true;
  }catch(e){
    const name=String(e&&e.name||'');
    if(name==='NotAllowedError'||name==='PermissionDeniedError'){
      showMicFallback('麥克風權限被擋：請在瀏覽器允許麥克風。若你在 LINE 內開啟，請改用 Safari / Chrome。');
    }else if(name==='NotFoundError'){
      showMicFallback('找不到麥克風，請用手動輸入。');
    }else{
      showMicFallback('麥克風啟動失敗：'+(name||'unknown')+'，請用手動輸入。');
    }
    return false;
  }
}
async function startSpeechChallenge(target,lang){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showMicFallback('此手機瀏覽器不支援語音辨識，請用手動輸入。');return}
  const ok=await ensureMicPermission();
  if(!ok)return;
  let rec;
  try{rec=new SR()}catch(e){showMicFallback('語音辨識啟動失敗，請用手動輸入。');return}
  rec.lang=lang==='ja'?'ja-JP':'en-US';
  rec.interimResults=false;
  rec.continuous=false;
  rec.maxAlternatives=1;
  setHeardMessage('聽你說...');
  rec.onresult=e=>showScore(target,e.results?.[0]?.[0]?.transcript||'');
  rec.onnomatch=()=>showMicFallback('沒有辨識到，請再按一次「開始口說」，或直接手動輸入。');
  rec.onerror=e=>{
    const err=String(e&&e.error||'unknown');
    if(err==='not-allowed'||err==='service-not-allowed'){
      showMicFallback('麥克風權限被擋：請允許麥克風。LINE 內建瀏覽器常會擋，請用 Safari / Chrome 開啟。');
    }else if(err==='no-speech'){
      showMicFallback('沒有聽到聲音，請靠近麥克風再試一次，或手動輸入。');
    }else if(err==='audio-capture'){
      showMicFallback('手機抓不到麥克風，請用手動輸入。');
    }else{
      showMicFallback('語音辨識失敗：'+err+'，請用手動輸入。');
    }
  };
  rec.onend=()=>{};
  try{rec.start()}catch(e){showMicFallback('語音辨識已卡住，請重新按「開始口說」，或手動輸入。')}
}
init();
</script>
