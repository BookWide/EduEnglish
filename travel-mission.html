<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BookWide Travel Mission</title>
<style>
:root{--bg:#081426;--panel:#13233d;--panel2:#1b3154;--line:#2d4568;--text:#fff;--muted:#b9c7da;--blue:#3b82f6;--green:#16a34a;--orange:#f59e0b;--red:#ef4444}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1180px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
h1{font-size:26px;margin:0 0 6px}.sub{color:var(--muted);font-size:14px;line-height:1.5}.pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:#0d1b31;color:#dbeafe;font-size:13px;font-weight:700}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:14px}.mission-list{display:grid;gap:10px}.mission-btn{width:100%;text-align:left;border:1px solid var(--line);background:#0d1b31;color:#fff;border-radius:14px;padding:12px;cursor:pointer}.mission-btn.active{background:#fff;color:#0f172a;border-color:#fff}.mission-btn b{display:block;font-size:15px;margin-bottom:4px}.mission-btn span{display:block;font-size:12px;color:inherit;opacity:.72}
.photo{width:100%;aspect-ratio:2/1;border-radius:16px;background:#0b172a;border:1px solid var(--line);object-fit:cover;display:block}.photo-fallback{width:100%;aspect-ratio:2/1;border-radius:16px;background:linear-gradient(135deg,#163456,#1f5b69);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:#dbeafe;font-weight:800}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);background:#0d1b31;color:#fff;border-radius:999px;padding:9px 14px;cursor:pointer}.tab.active{background:var(--blue);border-color:var(--blue);font-weight:800}
.qa{display:grid;gap:10px}.qcard{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:14px}.qtitle{font-weight:800;margin-bottom:10px}.line{padding:7px 0;border-top:1px solid rgba(255,255,255,.08)}.line:first-of-type{border-top:0}.tag{font-size:12px;color:#93c5fd;font-weight:800;margin-right:8px}.speak{float:right;border:0;background:#334155;color:#fff;border-radius:10px;padding:6px 9px;cursor:pointer}
.vocab{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.word{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}.word b{font-size:17px}.word small{display:block;color:var(--muted);margin-top:4px}.progress{height:10px;background:#071225;border-radius:999px;overflow:hidden;border:1px solid var(--line);margin-top:10px}.bar{height:100%;width:0;background:var(--green)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{border:0;border-radius:12px;padding:11px 15px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer}.btn.secondary{background:#334155}.btn.green{background:var(--green)}.warn{color:#fcd34d;font-size:13px;line-height:1.5}.err{color:#fecaca;background:#451a1a;border:1px solid #7f1d1d;border-radius:12px;padding:12px;white-space:pre-wrap}
@media(max-width:850px){.grid{grid-template-columns:1fr}.vocab{grid-template-columns:1fr}h1{font-size:22px}.card{padding:13px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1 id="title">Travel Mission</h1>
      <div class="sub" id="subtitle">讀取中...</div>
    </div>
    <div class="pill" id="slugPill">slug</div>
  </div>

  <div id="errorBox"></div>

  <div class="grid">
    <div class="card">
      <h2 style="margin:0 0 12px;font-size:18px">任務列表</h2>
      <div class="mission-list" id="missionList"></div>
      <div class="progress"><div class="bar" id="progressBar"></div></div>
      <div class="sub" id="progressText" style="margin-top:8px">完成 0 / 0</div>
    </div>

    <div>
      <div class="card">
        <div id="photoBox" class="photo-fallback">Travel Mission</div>
        <div class="tabs">
          <button class="tab active" data-tab="sentences">必學句</button>
          <button class="tab" data-tab="vocab">單字</button>
          <button class="tab" data-tab="info">路線資訊</button>
        </div>
        <h2 id="missionTitle" style="margin:0 0 8px;font-size:20px">請選擇任務</h2>
        <div class="sub" id="missionMeta"></div>
        <div class="actions">
          <button class="btn green" onclick="markDone()">完成本 Mission</button>
          <button class="btn secondary" onclick="resetProgress()">重置進度</button>
        </div>
      </div>
      <div class="card" id="contentBox"></div>
    </div>
  </div>
</div>
<script>
const qs = new URLSearchParams(location.search);
const slug = cleanSlug(qs.get('slug') || 'kumano-kodo');
const base = `/data/travel-missions/${slug}`;
let missionData = null, vocabData = null, photosData = null;
let currentMissionId = '';
let activeTab = 'sentences';
let doneSet = new Set(JSON.parse(localStorage.getItem(`bw_travel_done_${slug}`) || '[]'));

function cleanSlug(v){return String(v||'').trim().toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'') || 'kumano-kodo'}
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
async function getJson(path){const r=await fetch(path,{cache:'no-store'}); if(!r.ok) throw new Error(`${r.status} ${path}`); return await r.json();}
async function init(){
  document.getElementById('slugPill').textContent = slug;
  try{
    missionData = await getJson(`${base}/${slug}_questions.json`);
    vocabData = await tryJson(`${base}/${slug}_vocab.json`);
    photosData = await tryJson(`${base}/${slug}_photos.json`);
    renderHeader(); renderMissions(); selectMission((getMissions()[0]||{}).id || '');
  }catch(e){
    document.getElementById('errorBox').innerHTML = `<div class="err">讀不到 Travel Mission JSON：\n${esc(e.message)}\n\n請確認檔案存在：\n${base}/${slug}_questions.json</div>`;
    document.getElementById('subtitle').textContent = '讀取失敗';
  }
}
async function tryJson(path){try{return await getJson(path)}catch{return null}}
function getMissions(){return missionData?.missions || []}
function renderHeader(){
  document.getElementById('title').textContent = missionData.title || 'Travel Mission';
  document.getElementById('subtitle').textContent = missionData.subtitle || `${missionData.country||''}｜${missionData.days||''}｜${missionData.sentence_count||''}句｜${missionData.vocab_count||''}單字`;
}
function renderMissions(){
  const list = document.getElementById('missionList');
  const ms = getMissions();
  list.innerHTML = ms.map((m,i)=>`<button class="mission-btn ${m.id===currentMissionId?'active':''}" onclick="selectMission('${esc(m.id)}')"><b>${String(i+1).padStart(2,'0')}｜${esc(m.title||m.id)}</b><span>${esc(m.scene||'')}｜${(m.questions||[]).length || m.sentence_count || 0}句｜${doneSet.has(m.id)?'已完成':'未完成'}</span></button>`).join('');
  const total = ms.length || 1, done = [...doneSet].filter(id=>ms.some(m=>m.id===id)).length;
  document.getElementById('progressBar').style.width = `${Math.round(done/total*100)}%`;
  document.getElementById('progressText').textContent = `完成 ${done} / ${ms.length}`;
}
function selectMission(id){currentMissionId=id; activeTab='sentences'; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===activeTab)); renderMissions(); renderCurrent();}
function currentMission(){return getMissions().find(m=>m.id===currentMissionId) || getMissions()[0] || {}}
function renderCurrent(){
  const m = currentMission();
  document.getElementById('missionTitle').textContent = m.title || 'Mission';
  document.getElementById('missionMeta').textContent = `${m.scene||''}｜${m.sentence_count||((m.questions||[]).length)||0}句｜${m.vocab_count||0}單字`;
  renderPhoto(m); renderTabContent(m);
}
function renderPhoto(m){
  const box=document.getElementById('photoBox');
  const arr = photosData?.photos || photosData?.items || [];
  const hit = arr.find(p => p.mission_id===m.id || p.id===m.id) || arr[0];
  const src = hit?.url || hit?.src || m.photo || '';
  if(src) box.outerHTML = `<img id="photoBox" class="photo" src="${esc(src)}" onerror="this.outerHTML='<div id=&quot;photoBox&quot; class=&quot;photo-fallback&quot;>Travel Mission</div>'">`;
  else box.outerHTML = `<div id="photoBox" class="photo-fallback">${esc(m.scene||'Travel Mission')}</div>`;
}
function renderTabContent(m){
  const box=document.getElementById('contentBox');
  if(activeTab==='sentences'){
    const qs=m.questions || [];
    box.innerHTML = qs.length ? `<div class="qa">${qs.map((q,i)=>`<div class="qcard"><button class="speak" onclick="speakText('${esc(q.ja||q.en||q.zh||'')}')">朗讀</button><div class="qtitle">${i+1}. ${esc(q.title||q.scene||'情境句')}</div><div class="line"><span class="tag">EN</span>${esc(q.en||'')}</div><div class="line"><span class="tag">JA</span>${esc(q.ja||'')}</div><div class="line"><span class="tag">ZH</span>${esc(q.zh||'')}</div></div>`).join('')}</div>` : `<div class="warn">這個 Mission 還沒有 questions。</div>`;
  } else if(activeTab==='vocab'){
    const words = (vocabData?.missions?.find(x=>x.id===m.id)?.words) || m.vocab || vocabData?.words || [];
    box.innerHTML = words.length ? `<div class="vocab">${words.map(w=>`<div class="word"><b>${esc(w.en||w.word||'')}</b><small>日：${esc(w.ja||'')}</small><small>中：${esc(w.zh||w.meaning||'')}</small></div>`).join('')}</div>` : `<div class="warn">這個 Mission 還沒有 vocab。可先只跑 questions。</div>`;
  } else {
    box.innerHTML = `<div class="qcard"><div class="qtitle">${esc(m.title||'路線資訊')}</div><div class="line"><span class="tag">場景</span>${esc(m.scene||'')}</div><div class="line"><span class="tag">目的</span>${esc(m.goal||'出發前熟悉實際旅程會用到的句子、單字與互動。')}</div><div class="line"><span class="tag">檔案</span>${esc(base)}/${esc(slug)}_questions.json</div></div>`;
  }
}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{activeTab=btn.dataset.tab;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===btn));renderCurrent();}));
function markDone(){if(!currentMissionId)return;doneSet.add(currentMissionId);localStorage.setItem(`bw_travel_done_${slug}`,JSON.stringify([...doneSet]));renderMissions();}
function resetProgress(){if(!confirm('確定重置這個 Travel Mission 的完成進度？'))return;doneSet=new Set();localStorage.removeItem(`bw_travel_done_${slug}`);renderMissions();}
function speakText(text){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=/[\u3040-\u30ff\u3400-\u9fff]/.test(text)?'ja-JP':'en-US';u.rate=.82;speechSynthesis.speak(u)}catch{}}
init();
</script>
</body>
</html>
