<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BookWide 男女傾向測驗</title>
<style>
  :root{
    --bg:#071528;--panel:#0b1d34;--panel2:#102744;--line:#2c5a91;--line2:#30537e;
    --text:#eef6ff;--muted:#b8cae4;--blue:#4b91ff;--blue2:#1e63c9;--gold:#f4c542;
    --ok:#22c879;--pink:#ff62a6;--orange:#ff9d1b;--red:#ff5f6d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Noto Sans JP",Arial,sans-serif;}
  body{background:radial-gradient(circle at 70% 12%,#17365b 0,#071528 34%,#071528 100%);}
  a{color:inherit;text-decoration:none}
  .page{width:min(680px,100%);margin:0 auto;padding:12px 10px 22px;}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 6px;}
  .brand{display:flex;align-items:center;gap:8px;line-height:1;min-width:0}.phone{width:28px;height:36px;border-radius:8px;background:#0aa3ff;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);display:grid;place-items:center;font-size:22px;flex:0 0 auto}.brand-title{font-size:28px;font-weight:950;letter-spacing:.2px}.brand-sub{font-size:13px;color:#c9d8ef;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}.ctl{border:1px solid #45658b;background:#16283f;color:#eaf4ff;border-radius:999px;padding:9px 15px;font-weight:900;white-space:nowrap}
  .hero{position:relative;height:284px;border-radius:24px 24px 18px 18px;overflow:hidden;border:1px solid rgba(80,140,210,.45);background:linear-gradient(135deg,#522e78 0%,#5b458f 38%,#173d63 72%,#10233c 100%);box-shadow:0 22px 50px rgba(0,0,0,.32);}
  .hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 20%,rgba(255,255,255,.16),transparent 26%),linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,.1) 58%,rgba(0,0,0,.36));}
  .hero-title{position:absolute;left:22px;right:22px;bottom:72px;text-align:center;font-size:26px;font-weight:950;line-height:1.1;text-shadow:0 3px 10px #000}.hero-ja,.hero-zh{position:absolute;left:22px;right:22px;text-align:center;font-weight:850;text-shadow:0 2px 8px #000}.hero-ja{bottom:43px;font-size:17px}.hero-zh{bottom:19px;font-size:17px}.arrow{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;border:0;background:rgba(255,255,255,.88);color:#0b1e35;font-size:24px;font-weight:900;display:grid;place-items:center}.arrow.left{left:12px}.arrow.right{right:12px}.bars{position:absolute;left:0;right:0;bottom:0;height:28px;display:flex;gap:5px;align-items:end;padding:0 8px 7px}.bars i{display:block;width:7px;border-radius:999px;background:#69a8ff;opacity:.9}.bars i:nth-child(5n){background:#d8b328}.bars i:nth-child(3n){height:12px}.bars i:nth-child(4n){height:19px}.bars i:nth-child(7n){height:23px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 8px}.chip{border:1px solid #376697;background:#0d2542;border-radius:999px;color:#e5f1ff;font-size:13px;font-weight:800;padding:4px 9px}.chip.gold{border-color:#8c7419;color:#ffe17a;background:#2a270e}.chip.ok{border-color:#2a875e;color:#aaf2cd;background:#123421}
  .card{background:rgba(12,34,58,.98);border:1px solid #2e5b8e;border-radius:18px;padding:10px;box-shadow:0 14px 34px rgba(0,0,0,.22)}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:2px 2px 9px}.qtitle{font-size:21px;font-weight:950;line-height:1.18}.rounds{display:flex;gap:8px}.round{width:38px;height:38px;border:1px solid #3b6da3;border-radius:50%;background:#12335a;color:white;font-size:20px;font-weight:900;display:grid;place-items:center}.play{background:#337dff;width:50px;height:50px;font-size:26px}.tagline{display:inline-flex;align-items:center;border-radius:15px;padding:7px 13px;margin:0 0 8px;background:linear-gradient(90deg,#ff9d1b,#f46aa3,#8e60ff);font-size:18px;font-weight:950;box-shadow:0 0 0 2px rgba(255,255,255,.25) inset;text-shadow:0 1px 3px rgba(0,0,0,.35)}
  .choicebox{border:1px solid rgba(210,180,66,.58);background:rgba(31,47,59,.8);border-radius:16px;padding:10px}.choicebox-title{font-size:16px;font-weight:900;margin:0 0 9px;color:#f4f8ff}.choices{display:grid;gap:10px}.choice{display:grid;grid-template-columns:36px 1fr 38px;gap:9px;align-items:center;width:100%;text-align:left;border:1px solid #2b5482;border-radius:14px;background:#102744;color:#eef6ff;padding:12px 10px;cursor:pointer}.choice:hover,.choice.selected{border-color:#27ca78;background:#155a40}.no{font-size:23px;font-weight:950;text-align:center}.ctxt{display:grid;gap:5px}.ctxt .en{font-size:16px;font-weight:900;line-height:1.25}.ctxt .ja,.ctxt .zh{font-size:13px;color:#d4e2f3;line-height:1.3}.langdots{display:grid;gap:4px}.langdots span{border:1px solid #376da6;background:#17395f;color:#dcecff;border-radius:999px;text-align:center;font-size:11px;font-weight:900;padding:2px 0}.navbtns{display:flex;gap:8px;margin-top:10px}.btn{appearance:none;border:1px solid #3a6a9d;border-radius:999px;background:#17375b;color:#eaf4ff;padding:11px 14px;font-weight:950;cursor:pointer;text-align:center}.btn.primary{background:linear-gradient(90deg,#26c66e,#4ea5ff);border:0}.btn.gold{background:linear-gradient(90deg,#ffa51f,#26d56d);border:0}.btn:disabled{opacity:.45;cursor:not-allowed}.navbtns .btn{flex:1}.hidden{display:none!important}.err{background:#ffdada;color:#9b1010;padding:14px;border-radius:14px;margin:10px 0;font-weight:900}
  .result{background:#f8fbff;color:#13243a;border-radius:20px;overflow:hidden;border:1px solid #d8e7fa}.res-head{padding:24px;background:linear-gradient(135deg,#eaf4ff,#fff1ca);border-bottom:1px solid #d8e5f5}.res-head h1{margin:0 0 8px;font-size:30px;color:#08182a}.score{font-size:22px;font-weight:950}.level{font-size:28px;font-weight:950;margin:7px 0}.summary{font-size:17px;line-height:1.65}.meter2{padding:24px}.axis{position:relative;height:24px;border-radius:999px;background:linear-gradient(90deg,#4b91ff 0 50%,#ffd166 50% 60%,#ff6b78 60% 100%);margin:32px 8px 28px}.pointer{position:absolute;top:-14px;width:5px;height:54px;background:#08182a;border-radius:999px;transform:translateX(-2px)}.pointer:before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:10px solid #08182a}.ticks{position:relative;height:28px;margin:0 8px}.tick{position:absolute;top:0;transform:translateX(-50%);font-size:13px;color:#54677e;font-weight:950}.res-body{padding:0 24px 24px}.res-body p{font-size:17px;line-height:1.7}.note{background:#eef6ff;border:1px solid #d5e7fb;border-radius:14px;padding:12px;color:#40556f}
  @media(max-width:560px){.page{padding:8px 8px 20px}.brand-title{font-size:24px}.brand-sub{max-width:250px}.ctl{padding:7px 11px}.hero{height:250px;border-radius:20px}.hero-title{font-size:22px;bottom:66px}.hero-ja,.hero-zh{font-size:15px}.card{border-radius:16px}.qtitle{font-size:19px}.rounds .round:not(.play){display:none}.choice{grid-template-columns:30px 1fr 34px;padding:11px 8px}.ctxt .en{font-size:15px}.navbtns{flex-direction:column}.res-head h1{font-size:25px}.level{font-size:23px}}
  @media print{body{background:white}.page{max-width:none}.top,.hero,.chips,.card .navbtns,.res-body .btn{display:none!important}.result{border-radius:0;border:0}}
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <div class="brand"><div class="phone">▯</div><div><div class="brand-title">BookWide</div><div class="brand-sub">BookWide 男女傾向測驗｜30題｜英・日・中</div></div></div>
    <a class="ctl" href="/index.html">控制台</a>
  </header>

  <section class="hero" id="hero">
    <button class="arrow left">‹</button><button class="arrow right">›</button>
    <div class="hero-title" id="heroEn">Choose the response closest to you.</div>
    <div class="hero-ja" id="heroJa">自分に一番近い反応を選んでください。</div>
    <div class="hero-zh" id="heroZh">選出比較像你的反應。</div>
    <div class="bars" id="bars"></div>
  </section>
  <div class="chips"><span class="chip" id="progressChip">男女傾向測驗｜0/30</span><span class="chip" id="stepChip">0/300</span><span class="chip gold">無標準答案</span></div>

  <main class="card" id="testCard">
    <div id="loadErr" class="err hidden"></div>
    <div class="card-head"><div class="qtitle" id="qTitle">載入中...</div><div class="rounds"><button class="round" id="prevTop">‹</button><button class="round play" id="playTop">▶</button><button class="round" id="nextTop">›</button></div></div>
    <div class="tagline" id="axisTag">性向測驗｜選比較像你的反應</div>
    <div class="choicebox"><div class="choicebox-title">選出比較像你的反應：</div><div class="choices" id="choices"></div><div class="navbtns"><button class="btn" id="prevBtn">上一題</button><button class="btn primary" id="nextBtn" disabled>下一題</button></div></div>
  </main>

  <section id="resultSec" class="hidden"></section>
</div>
<script>
(function(){
  const DATA_URL='/data/monk/aptitude/aptitude-analysis.json';
  const KEY='bookwide_aptitude_answers_v2';
  const $=id=>document.getElementById(id);
  let data, questions=[], answers=[], idx=0;
  $('bars').innerHTML=Array.from({length:54},(_,i)=>`<i style="height:${8+((i*7)%20)}px"></i>`).join('');
  const esc=s=>String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const text=(o,l)=>o?.[l]||o?.['text_'+l]||o?.['title_'+l]||'';
  function norm(q,i){return{no:q.day||q.no||q.id||i+1,cat:q.category||q.scene||'',en:text(q,'en'),ja:text(q,'ja'),zh:text(q,'zh'),choices:(q.choices||[]).map((c,j)=>({key:c.key||String.fromCharCode(65+j),en:text(c,'en'),ja:text(c,'ja'),zh:text(c,'zh'),score:Number(c.aptitude_score ?? c.score?.total_score ?? (j===0?10:j===1?5:0))}))};}
  async function load(){try{const r=await fetch(DATA_URL+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status+' '+DATA_URL);data=await r.json();questions=(data.questions||[]).map(norm).filter(q=>q.choices.length);if(!questions.length)throw new Error('找不到 questions[]');answers=JSON.parse(localStorage.getItem(KEY)||'[]');answers.length=questions.length;}catch(e){$('loadErr').textContent='資料讀取失敗：'+e.message;$('loadErr').classList.remove('hidden');}}
  const count=()=>answers.filter(Boolean).length; const score=()=>answers.reduce((s,a)=>s+(a?Number(a.score||0):0),0); const save=()=>localStorage.setItem(KEY,JSON.stringify(answers));
  function render(){const q=questions[idx];if(!q)return;$('heroEn').textContent=q.en;$('heroJa').textContent=q.ja;$('heroZh').textContent=q.zh;$('qTitle').textContent=`性向測驗 Q${q.no}`;$('axisTag').textContent=`${q.cat||'gender_tendency'}｜選比較像你的反應`;$('progressChip').textContent=`男女傾向測驗｜${idx+1}/${questions.length}｜已答 ${count()}`;$('stepChip').textContent=`${score()}/300`;let sel=answers[idx]?.key;$('choices').innerHTML=q.choices.map((c,j)=>`<button class="choice ${sel===c.key?'selected':''}" data-j="${j}"><div class="no">${j+1}</div><div class="ctxt"><div class="en">${esc(c.en)}</div><div class="ja">${esc(c.ja)}</div><div class="zh">${esc(c.zh)}</div></div><div class="langdots"><span>EN</span><span>日</span><span>中</span></div></button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{let c=q.choices[+b.dataset.j];answers[idx]={key:c.key,score:c.score};save();render();});$('prevBtn').disabled=idx===0;$('prevTop').disabled=idx===0;$('nextBtn').disabled=!answers[idx];$('nextBtn').textContent=idx===questions.length-1?'查看結果':'下一題';}
  function level(s){if(s<150)return{label:'偏男性化傾向',color:'#4b91ff',txt:'你的分數低於 150，表示反應方式比較偏男性化。通常比較重視邏輯、分析、規則、組織能力與自律，不太容易被情緒影響。'};if(s<=180)return{label:'男女特質平衡',color:'#d59612',txt:'你的分數在 150～180 之間，表示同時有男性化與女性化的思考特質。遇到問題時，較能在理性分析與感性判斷之間切換。'};return{label:'偏女性化傾向',color:'#ff5f6d',txt:'你的分數高於 180，表示反應方式比較偏女性化。通常比較依靠直覺、感受、創意、音樂藝術感與人際氣氛來判斷。'};}
  function showResult(){let s=score(),lv=level(s),pct=Math.max(0,Math.min(100,s/300*100));$('testCard').classList.add('hidden');$('hero').classList.add('hidden');document.querySelector('.chips').classList.add('hidden');$('resultSec').classList.remove('hidden');$('resultSec').innerHTML=`<div class="result"><div class="res-head"><h1>BookWide 男女傾向分析</h1><div class="score">你的分數：${s} / 300</div><div class="level" style="color:${lv.color}">結果：${lv.label}</div><p class="summary">${lv.txt}</p></div><div class="meter2"><div class="axis"><div class="pointer" style="left:${pct}%"></div></div><div class="ticks"><span class="tick" style="left:0%">0</span><span class="tick" style="left:50%">150</span><span class="tick" style="left:60%">180</span><span class="tick" style="left:100%">300</span></div></div><div class="res-body"><p>多數男性分數會落在 0～180；多數女性分數會落在 150～300。150～180 是男女特質交會區，代表同時有男性化與女性化的思考特質。</p><div class="note">本測驗不是醫學、心理或性傾向診斷，只是男女傾向的反應風格參考。</div><div class="navbtns"><button class="btn primary" onclick="window.print()">列印 / 存 PDF</button><button class="btn" onclick="localStorage.removeItem('${KEY}');location.href='?reset=1'">重新測驗</button></div></div></div>`;}
  function go(n){idx=Math.max(0,Math.min(questions.length-1,idx+n));render();}
  $('prevBtn').onclick=()=>go(-1);$('prevTop').onclick=()=>go(-1);$('nextTop').onclick=()=>{if(answers[idx])idx===questions.length-1?showResult():go(1)};$('playTop').onclick=()=>{};$('nextBtn').onclick=()=>{if(idx===questions.length-1){if(count()<questions.length){alert('還有題目未完成');return;}showResult();}else go(1);};
  (async()=>{await load();if(new URLSearchParams(location.search).get('reset')==='1'){answers=[];answers.length=questions.length;save();}idx=Math.max(0,answers.findIndex(a=>!a));if(idx<0)idx=0;render();})();
})();
</script>
</body>
</html>
