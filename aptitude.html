<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BookWide 男女傾向測驗</title>
<style>
  :root{
    --bg:#071528; --card:#10243b; --card2:#142d48; --line:#2d4b70;
    --text:#eef6ff; --muted:#a9bdd5; --blue:#4f9cff; --gold:#ffd166;
    --green:#2bd67b; --red:#ff6b78; --orange:#ffa726;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#071528,#0b1f36 55%,#081628);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Noto Sans JP",Arial,sans-serif;line-height:1.55;}
  a{color:inherit}
  .wrap{max-width:760px;margin:0 auto;padding:18px 14px 36px;}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:28px;line-height:1}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#18a4ff,#2d6bff);display:grid;place-items:center;font-size:22px;}
  .sub{font-size:13px;color:#c6d9f2;margin-top:3px;font-weight:600}.btn{border:1px solid #4773ad;background:#173557;color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}.btn.primary{background:linear-gradient(90deg,#2f7cff,#20c97a);border:0}.btn.gold{background:linear-gradient(90deg,#ffad1f,#34d36d);border:0;color:#fff}.btn.ghost{background:transparent}.btn:disabled{opacity:.45;cursor:not-allowed}
  .hero{background:linear-gradient(135deg,#0e2947,#071528);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 18px 45px rgba(0,0,0,.28);margin-bottom:14px;}
  .hero h1{font-size:26px;line-height:1.2;margin:0 0 10px}.hero p{margin:4px 0;color:#c9d8ea}.pillrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.pill{font-size:13px;color:#dbeaff;border:1px solid #386392;background:#0b2038;border-radius:999px;padding:5px 10px}.warn{margin-top:14px;background:#172a3f;border:1px solid #3b5f85;color:#d8e8ff;border-radius:14px;padding:12px 14px;font-size:14px}
  .status{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;margin:12px 0}.meter{height:12px;background:#24405f;border-radius:999px;overflow:hidden;flex:1;min-width:180px}.bar{height:100%;width:0%;background:linear-gradient(90deg,#27d980,#4f9cff);transition:.25s}.qcard{background:rgba(16,36,59,.96);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 12px 35px rgba(0,0,0,.2)}
  .qtag{display:inline-flex;border:1px solid #4470a3;background:#0b2038;border-radius:999px;padding:5px 10px;color:#cfe2ff;font-size:13px;font-weight:700;margin-bottom:14px}.qtitle{font-size:24px;font-weight:900;line-height:1.25;margin:0 0 12px}.langs{display:grid;gap:8px;margin-bottom:18px}.langs .en{font-size:21px;font-weight:850;color:#fff}.langs .ja{font-size:17px;color:#d8e7ff}.langs .zh{font-size:18px;color:#dff0ff}.choices{display:grid;gap:13px;margin-top:16px}.choice{border:1px solid #385d89;background:#0b2038;border-radius:18px;padding:15px 16px;text-align:left;color:#eef6ff;cursor:pointer;transition:.15s}.choice:hover,.choice.selected{border-color:#3adf8f;background:#124b37}.choice .no{font-weight:900;font-size:20px;margin-right:8px;color:#fff}.choice .ctext{display:grid;gap:6px;margin-top:8px}.choice .en{font-size:17px;font-weight:850}.choice .ja{font-size:14px;color:#cbdcf0}.choice .zh{font-size:15px;color:#dcecff}.nav{display:flex;gap:10px;margin-top:18px}.nav .btn{flex:1}.hidden{display:none!important}
  .result{background:#fff;color:#1a2940;border-radius:22px;overflow:hidden}.result-head{padding:26px 24px;background:linear-gradient(135deg,#eaf4ff,#fff5db);border-bottom:1px solid #dbe8f7}.result-head h2{margin:0 0 8px;font-size:30px;color:#071528}.scoreline{font-size:22px;font-weight:900;color:#0b2540}.level{font-size:28px;font-weight:950;margin:10px 0;color:#0b2540}.summary{font-size:18px;color:#21354f;margin-top:10px}.gauge{padding:24px}.axis{position:relative;height:22px;background:linear-gradient(90deg,#45a8ff 0 50%,#ffd166 50% 60%,#ff6b78 60% 100%);border-radius:999px;margin:44px 8px 34px}.pointer{position:absolute;top:-15px;width:4px;height:52px;background:#0b2540;border-radius:999px;left:0;transform:translateX(-2px)}.pointer:before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:10px solid #0b2540}.ticks{position:relative;height:32px;margin:0 8px}.tick{position:absolute;top:0;transform:translateX(-50%);font-size:13px;color:#51647e;font-weight:800}.ranges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}.range{border:1px solid #d7e4f4;border-radius:14px;padding:12px;background:#f8fbff}.range strong{display:block;color:#0b2540}.range span{font-size:13px;color:#5c6f89}.report-body{padding:0 24px 24px}.report-body h3{font-size:21px;margin:20px 0 8px;color:#0b2540}.report-body p{font-size:17px;color:#293d57}.note{background:#f3f8ff;border:1px solid #dbe9fb;border-radius:14px;padding:12px 14px;color:#344965}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 0}.error{background:#ffe1e1;color:#9a1414;border-radius:14px;padding:14px;margin:16px 0;font-weight:800}
  @media(max-width:520px){.wrap{padding:12px 10px 30px}.brand{font-size:23px}.logo{width:34px;height:34px}.hero{padding:16px;border-radius:20px}.hero h1{font-size:23px}.qcard{padding:15px;border-radius:18px}.qtitle{font-size:21px}.langs .en{font-size:19px}.choice{padding:14px}.nav{flex-direction:column}.ranges{grid-template-columns:1fr}.result-head h2{font-size:25px}.scoreline{font-size:19px}.level{font-size:23px}}
  @media print{body{background:white}.wrap{max-width:none;padding:0}.hero,.status,.qcard,header .btn,.actions{display:none!important}.result{box-shadow:none;border-radius:0}.result-head{break-inside:avoid}.gauge{break-inside:avoid}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand"><div class="logo">📘</div><div>BookWide<div class="sub">男女傾向測驗｜30題｜EN・日・中</div></div></div>
    </div>
    <a class="btn ghost" href="/index.html">回首頁</a>
  </header>

  <section id="intro" class="hero">
    <h1>BookWide 男女傾向測驗</h1>
    <p>30 題，選比較像你的反應。題目順序固定：英文、日文、中文。</p>
    <p>完成後會得到 0～300 分的男女傾向分析。</p>
    <div class="pillrow"><span class="pill">0～149 偏男性化傾向</span><span class="pill">150～180 平衡區</span><span class="pill">181～300 偏女性化傾向</span></div>
    <div class="warn">這不是醫學、心理或性傾向診斷，只是反應風格參考。</div>
    <div class="actions"><button id="startBtn" class="btn gold">開始測驗</button><button id="resetBtn" class="btn ghost">重新開始</button></div>
    <div id="loadErr" class="error hidden"></div>
  </section>

  <section id="test" class="hidden">
    <div class="status"><span id="progressText" class="pill">0 / 30</span><div class="meter"><div id="bar" class="bar"></div></div><span id="scoreText" class="pill">0 分</span></div>
    <div class="qcard">
      <div id="qtag" class="qtag">Q1</div>
      <h2 id="qtitle" class="qtitle"></h2>
      <div id="qlangs" class="langs"></div>
      <div id="choices" class="choices"></div>
      <div class="nav"><button id="prevBtn" class="btn ghost">上一題</button><button id="nextBtn" class="btn primary" disabled>下一題</button></div>
    </div>
  </section>

  <section id="resultSec" class="hidden"></section>
</div>
<script>
(function(){
  const DATA_URL = '/data/monk/aptitude/aptitude-analysis.json';
  const STORE_KEY = 'bookwide_aptitude_answers_v1';
  const REPORT_KEY = 'bookwide_aptitude_report_html';
  const $ = id => document.getElementById(id);
  let data=null, questions=[], answers=[], idx=0;

  function pick(obj, base){ return obj?.[base+'_en'] || obj?.en || obj?.title_en || obj?.text_en || ''; }
  function getText(obj, lang){
    return obj?.[lang] || obj?.['text_'+lang] || obj?.['title_'+lang] || obj?.['question_'+lang] || '';
  }
  function normalizeQuestion(q, i){
    const choices = (q.choices || q.options || []).map((c, j)=>({
      key: c.key || String.fromCharCode(65+j),
      en: getText(c,'en'), ja: getText(c,'ja'), zh: getText(c,'zh'),
      score: Number(c.aptitude_score ?? c.score ?? c.gender_score ?? (j===0?0:j===1?5:10))
    }));
    return {
      no: q.no || q.id || i+1,
      category: q.category || q.category_key || q.scene || '',
      en: getText(q,'en'), ja: getText(q,'ja'), zh: getText(q,'zh'),
      choices
    };
  }
  async function loadData(){
    try{
      const res = await fetch(DATA_URL + '?v=' + Date.now(), {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status+' '+DATA_URL);
      data = await res.json();
      questions = (data.questions || data.items || []).map(normalizeQuestion).filter(q=>q.choices.length>=2);
      if(!questions.length) throw new Error('JSON 裡找不到 questions[]');
      answers = JSON.parse(localStorage.getItem(STORE_KEY)||'[]');
      answers.length = questions.length;
    }catch(e){
      $('loadErr').textContent = '資料讀取失敗：' + e.message;
      $('loadErr').classList.remove('hidden');
      throw e;
    }
  }
  function currentScore(){ return answers.reduce((sum,a)=>sum + (a?Number(a.score||0):0),0); }
  function doneCount(){ return answers.filter(Boolean).length; }
  function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(answers)); }
  function render(){
    const q = questions[idx];
    const done = doneCount();
    $('progressText').textContent = (idx+1)+' / '+questions.length+'｜已答 '+done;
    $('scoreText').textContent = currentScore()+' 分';
    $('bar').style.width = (done/questions.length*100)+'%';
    $('qtag').textContent = '性向測驗 Q'+q.no + (q.category?'｜'+q.category:'');
    $('qtitle').textContent = q.zh || q.en || q.ja;
    $('qlangs').innerHTML = `<div class="en">${esc(q.en)}</div><div class="ja">${esc(q.ja)}</div><div class="zh">${esc(q.zh)}</div>`;
    const selected = answers[idx]?.key;
    $('choices').innerHTML = q.choices.map((c,j)=>`<button class="choice ${selected===c.key?'selected':''}" data-j="${j}"><span class="no">${j+1}</span><div class="ctext"><div class="en">${esc(c.en)}</div><div class="ja">${esc(c.ja)}</div><div class="zh">${esc(c.zh)}</div></div></button>`).join('');
    document.querySelectorAll('.choice').forEach(btn=>btn.onclick=()=>{ const c=q.choices[Number(btn.dataset.j)]; answers[idx]={q:idx+1,key:c.key,score:c.score}; save(); render(); });
    $('prevBtn').disabled = idx===0;
    $('nextBtn').disabled = !answers[idx];
    $('nextBtn').textContent = idx===questions.length-1 ? '查看結果' : '下一題';
  }
  function level(score){
    if(score < 150) return {key:'masculine', zh:'偏男性化傾向', en:'Masculine tendency', ja:'男性的傾向', color:'#4f9cff', text:'你的分數低於 150，表示反應方式比較偏男性化。通常比較重視邏輯、分析、規則、組織能力與自律，不太容易被情緒影響。'};
    if(score <= 180) return {key:'balanced', zh:'男女特質平衡', en:'Balanced tendency', ja:'バランス型', color:'#ffd166', text:'你的分數在 150～180 之間，表示同時有男性化與女性化的思考特質。遇到問題時，較能在理性分析與感性判斷之間切換。'};
    return {key:'feminine', zh:'偏女性化傾向', en:'Feminine tendency', ja:'女性的傾向', color:'#ff6b78', text:'你的分數高於 180，表示反應方式比較偏女性化。通常比較依靠直覺、感受、創意、音樂藝術感與人際氣氛來判斷。'};
  }
  function resultHtml(){
    const score=currentScore(), lv=level(score), pct=Math.max(0,Math.min(100,score/300*100));
    return `<div class="result"><div class="result-head"><h2>BookWide 男女傾向分析</h2><div class="scoreline">你的分數：${score} / 300</div><div class="level" style="color:${lv.color}">結果：${lv.zh}</div><p class="summary">${lv.text}</p></div><div class="gauge"><div class="axis"><div class="pointer" style="left:${pct}%"></div></div><div class="ticks"><span class="tick" style="left:0%">0</span><span class="tick" style="left:50%">150</span><span class="tick" style="left:60%">180</span><span class="tick" style="left:100%">300</span></div><div class="ranges"><div class="range"><strong>0～149</strong><span>偏男性化傾向</span></div><div class="range"><strong>150～180</strong><span>男女特質平衡</span></div><div class="range"><strong>181～300</strong><span>偏女性化傾向</span></div></div></div><div class="report-body"><h3>分數怎麼看？</h3><p>多數男性分數會落在 0～180；多數女性分數會落在 150～300。150～180 是男女特質交會區，代表同時有男性化與女性化的思考特質。</p><div class="note">本測驗不是醫學、心理或性傾向診斷，只是男女傾向的反應風格參考。</div><div class="actions"><button class="btn primary" onclick="window.print()">列印 / 存 PDF</button><button class="btn ghost" onclick="location.href='?reset=1'">重新測驗</button></div></div></div>`;
  }
  function showResult(){
    $('intro').classList.add('hidden'); $('test').classList.add('hidden'); $('resultSec').classList.remove('hidden');
    const html = resultHtml(); $('resultSec').innerHTML = html; localStorage.setItem(REPORT_KEY, html);
  }
  function esc(s){ return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  async function start(){
    await loadData();
    if(new URLSearchParams(location.search).get('reset')==='1'){ answers=[]; answers.length=questions.length; save(); }
    idx = Math.max(0, Math.min(questions.length-1, answers.findIndex(a=>!a))); if(idx<0) idx=0;
    $('intro').classList.add('hidden'); $('test').classList.remove('hidden'); $('resultSec').classList.add('hidden'); render();
  }
  $('startBtn').onclick=start;
  $('resetBtn').onclick=()=>{ localStorage.removeItem(STORE_KEY); location.href='?reset=1'; };
  $('prevBtn').onclick=()=>{ if(idx>0){idx--;render();} };
  $('nextBtn').onclick=()=>{ if(idx===questions.length-1){ if(doneCount()<questions.length){ alert('還有題目未完成'); return; } showResult(); } else { idx++; render(); } };
  if(new URLSearchParams(location.search).get('reset')==='1' || new URLSearchParams(location.search).get('start')==='1') start();
})();
</script>
</body>
</html>
