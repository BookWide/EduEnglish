<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide 多測驗引擎</title>
<style>
:root{
  --bg:#071225;--panel:#0d1d35;--panel2:#102744;--ink:#eef6ff;--muted:#9fb4d1;
  --blue:#3b82f6;--gold:#f59e0b;--green:#22c55e;--line:rgba(96,165,250,.30);
  --paper:#fff;--paperInk:#0f172a;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,rgba(59,130,246,.20),transparent 34%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}
button,a{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.app{width:min(640px,100vw);margin:0 auto;padding:8px 8px 24px}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.brandLogo{width:40px;height:40px;object-fit:contain}
.brandCopy{min-width:0}
.brandCopy b{display:block;font-size:20px;line-height:1}
.brandCopy span{display:block;color:#bfdbfe;font-size:11px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topLink{border:1px solid var(--line);border-radius:999px;padding:7px 11px;background:rgba(15,31,56,.78);font-size:12px;font-weight:900}

.hero{position:relative;height:300px;border-radius:22px;overflow:hidden;background:#061225;box-shadow:0 16px 40px rgba(0,0,0,.26);margin-bottom:7px}
.hero img{width:100%;height:100%;display:block;object-fit:cover;object-position:center 34%;filter:grayscale(.16) saturate(.66) contrast(.88) brightness(.86) blur(1.8px);transform:scale(1.018)}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(226,232,240,.14),rgba(15,23,42,.30) 58%,rgba(3,8,18,.84));pointer-events:none}
.heroText{position:absolute;left:48px;right:48px;bottom:44px;z-index:2;text-align:center;text-shadow:0 3px 16px rgba(0,0,0,.90)}
.heroText .en{font-size:clamp(18px,3vw,25px);line-height:1.1;font-weight:1000}
.heroText .ja,.heroText .zh{margin-top:7px;font-size:clamp(13px,2vw,17px);line-height:1.2;font-weight:900}
.heroText .ja{color:#e9f7ff}.heroText .zh{color:#fff7ed}
.heroSpeak{display:inline-grid;place-items:center;width:25px;height:25px;margin-left:5px;border:1px solid rgba(255,255,255,.40);border-radius:999px;background:rgba(15,31,56,.75);color:#fff;padding:0}
.heroNav{position:absolute;z-index:3;top:50%;transform:translateY(-50%);width:34px;height:34px;border:0;border-radius:999px;background:rgba(255,255,255,.84);color:#0f172a;font-size:20px;font-weight:1000}
.heroPrev{left:10px}.heroNext{right:10px}
.playHint{position:absolute;right:10px;bottom:9px;z-index:3;border:0;border-radius:999px;padding:6px 10px;background:rgba(37,99,235,.85);color:#fff;font-size:11px;font-weight:950}

.status{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px}
.status span{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;background:rgba(13,29,53,.78);padding:4px 8px;font-size:11px;font-weight:900}
.status .score{color:#fde68a;border-color:rgba(245,158,11,.42);background:rgba(245,158,11,.12)}

.card{border:1px solid rgba(85,136,206,.44);border-radius:18px;background:linear-gradient(145deg,rgba(16,40,71,.96),rgba(9,25,47,.96));padding:9px;box-shadow:0 14px 30px rgba(0,0,0,.17)}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.title h1{font-size:17px;line-height:1.1;margin:0}
.title .scene{display:inline-flex;margin-top:5px;padding:4px 11px;border-radius:999px;background:linear-gradient(135deg,#f59e0b,#fb7185,#8b5cf6);border:1px solid rgba(255,255,255,.60);font-size:13px;font-weight:1000}
.controls{display:flex;align-items:center;gap:5px;padding:5px 7px;border:2px solid rgba(96,165,250,.65);border-radius:999px;background:rgba(37,99,235,.18)}
.guide{padding:5px 9px;border-radius:999px;background:linear-gradient(135deg,#f59e0b,#f97316);font-size:11px;font-weight:1000}
.ctrl{width:32px;height:32px;border-radius:999px;border:1px solid rgba(147,197,253,.60);background:rgba(15,31,56,.92);color:#eaf4ff;font-weight:950}
.ctrl.play{width:43px;height:43px;border:2px solid #fff;background:linear-gradient(135deg,#2563eb,#60a5fa);font-size:19px;box-shadow:0 0 0 4px rgba(59,130,246,.16)}

.quiz{border:1px solid rgba(251,191,36,.26);border-radius:15px;background:rgba(251,191,36,.07);padding:8px}
.qLabel{font-size:13px;font-weight:950;margin-bottom:6px}
.choices{display:grid;gap:6px}
.choice{width:100%;display:grid;grid-template-columns:28px 1fr 30px;gap:7px;align-items:center;text-align:left;border:1px solid rgba(148,163,184,.25);background:rgba(15,31,56,.88);color:#eaf3ff;border-radius:13px;padding:9px;min-height:62px;cursor:pointer;user-select:none}
.choice:focus-visible{outline:3px solid rgba(96,165,250,.45);outline-offset:2px}
.choice.selected{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.60);color:#d1fae5}
.choiceNo{font-size:17px}
.choice b{display:block;font-size:14px;line-height:1.15}
.choice small,.choice em{display:block;margin-top:3px;font-size:11px;line-height:1.12;font-style:normal}
.choice small{color:#c4b5fd}.choice em{color:#cbd5e1}
.voiceBtns{display:grid;gap:3px}
.voiceBtns button{width:29px;height:21px;border:1px solid rgba(96,165,250,.36);border-radius:999px;background:rgba(59,130,246,.16);color:#dbeafe;font-size:10px;font-weight:950;padding:0}

.nextBtn{width:100%;margin-top:7px;border:0;border-radius:999px;padding:10px;background:linear-gradient(135deg,#22c55e,#60a5fa);color:#fff;font-weight:1000;font-size:15px}
.nextBtn:disabled{opacity:.45;cursor:not-allowed}

.modal{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(1,8,20,.72);backdrop-filter:blur(8px)}
.modal.show{display:flex}
.reportShell{width:min(760px,96vw);max-height:94vh;overflow:auto;border-radius:22px;background:#f8fafc;color:#0f172a;box-shadow:0 28px 90px rgba(0,0,0,.50)}
.reportActions{position:sticky;top:0;z-index:10;display:flex;justify-content:flex-end;gap:8px;padding:10px;background:rgba(248,250,252,.94);border-bottom:1px solid #dbe5f2}
.reportActions button{border:0;border-radius:999px;padding:9px 14px;color:#fff;font-weight:950}
.printBtn{background:#2563eb}.closeBtn{background:#475569}
.report{padding:18px;background:#fff}
.reportHeader{position:relative;aspect-ratio:32/9;overflow:hidden;border:1px solid #dbe5f2;border-radius:17px;margin-bottom:10px;background:#eaf2ff}
.reportHeaderPhoto{position:absolute;inset:-3px;background-size:cover;background-position:center;filter:grayscale(.14) saturate(.72) contrast(.90) brightness(.92) blur(.8px);transform:scale(1.01)}
.reportHeader::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.985),rgba(255,255,255,.94) 38%,rgba(255,255,255,.58) 66%,rgba(255,255,255,.22))}
.reportHeaderText{position:relative;z-index:1;max-width:60%;padding:17px 21px}
.reportHeaderText small{display:block;color:#2563eb;font-size:9px;font-weight:1000;letter-spacing:.14em;margin-bottom:5px}
.reportHeaderText h2{margin:0 0 5px;font-size:22px;line-height:1.08}
.reportHeaderText p{margin:0;color:#334155;font-size:11px;font-weight:800;line-height:1.35}
.reportMeta{display:grid;grid-template-columns:1.35fr 1fr 1fr 1.25fr;border:1px solid #dbe5f2;border-radius:14px;padding:9px;margin-bottom:15px}
.reportMeta>div{padding:3px 9px;border-right:1px dashed #cbd5e1}
.reportMeta>div:last-child{border-right:0}
.reportMeta small{display:block;color:#64748b;font-size:10px;font-weight:850}
.reportMeta b{display:block;margin-top:3px;font-size:13px;overflow-wrap:anywhere}
.resultLabel{display:block;color:#3b82f6;font-size:25px;font-weight:1000;margin:8px 0 13px}
.meter{position:relative;height:68px;margin:20px 0 13px;padding-top:22px}
.meterBar{display:flex;height:18px;border-radius:999px;overflow:hidden;background:#e2e8f0}
.meterBar i:nth-child(1){flex:1;background:#3b82f6}.meterBar i:nth-child(2){flex:.2;background:#fde68a}.meterBar i:nth-child(3){flex:.8;background:#fb7185}
.needle{position:absolute;top:1px;width:4px;height:46px;background:#0f172a;border-radius:99px;transform:translateX(-50%)}
.ticks{display:flex;justify-content:space-between;margin-top:6px;color:#64748b;font-size:11px}
.note{margin-top:13px;padding:10px 12px;border:1px solid rgba(59,130,246,.22);border-radius:12px;background:rgba(59,130,246,.08);color:#475569;font-size:13px}

.error{display:none;margin:20px auto;width:min(640px,94vw);padding:16px;border:1px solid #fecaca;border-radius:16px;background:#fff1f2;color:#991b1b;white-space:pre-wrap}
.error.show{display:block}

@media(max-width:640px){
  .app{padding:4px 5px 14px}
  .brandLogo{width:30px;height:30px}.brandCopy b{font-size:17px}.brandCopy span{font-size:9px}
  .hero{height:190px;border-radius:16px}.heroText{left:34px;right:34px;bottom:34px}
  .heroText .en{font-size:17px}.heroText .ja,.heroText .zh{font-size:12px;margin-top:4px}
  .titleRow{gap:5px}.title h1{font-size:14px}.title .scene{font-size:12px}
  .guide{display:none}.ctrl{width:27px;height:27px}.ctrl.play{width:36px;height:36px}
  .choice{min-height:52px;padding:7px;grid-template-columns:23px 1fr 28px}.choice b{font-size:12.5px}.choice small,.choice em{font-size:10px}
  .report{padding:10px}.reportHeader{aspect-ratio:16/6}.reportHeaderText{max-width:70%;padding:12px 14px}.reportHeaderText h2{font-size:18px}
  .reportMeta{grid-template-columns:1fr 1fr}.reportMeta>div{border-right:0;border-bottom:1px dashed #cbd5e1;padding:7px}.reportMeta>div:nth-last-child(-n+2){border-bottom:0}
}
@media print{
  @page{size:A4;margin:8mm}
  html,body{background:#fff!important}
  body>*:not(.modal){display:none!important}
  .modal{display:block!important;position:static!important;padding:0!important;background:#fff!important}
  .reportShell{width:100%!important;max-height:none!important;overflow:visible!important;border-radius:0!important;box-shadow:none!important}
  .reportActions{display:none!important}
  .report{padding:0!important}
  .reportHeader{aspect-ratio:32/9!important;min-height:24mm!important;margin-bottom:2.5mm!important;border-radius:3mm!important}
  .reportHeaderText{padding:4.5mm 5.5mm!important}.reportHeaderText h2{font-size:14.5pt!important}.reportHeaderText p{font-size:7.4pt!important}
  .reportMeta{margin-bottom:3mm!important;padding:2.5mm!important}.reportMeta small{font-size:6.8pt!important}.reportMeta b{font-size:8.5pt!important}
  .resultLabel{font-size:16pt!important;margin:2mm 0!important}
  .meter{height:48px!important;margin:2.5mm 0!important;padding-top:12px!important}.meterBar{height:12px!important}.needle{height:30px!important}.ticks{font-size:7pt!important}
  .note{font-size:7.5pt!important;padding:2.2mm 2.8mm!important;margin-top:2.5mm!important}
}
</style>
</head>
<body>
<div id="error" class="error"></div>
<main id="app" class="app" hidden>
  <header class="top">
    <div class="brand">
      <img class="brandLogo" src="/assets/logo.png" alt="BookWide" onerror="this.style.display='none'">
      <div class="brandCopy"><b>BookWide</b><span id="brandSub">多測驗引擎</span></div>
    </div>
    <a class="topLink" href="/index.html">控制台</a>
  </header>

  <section class="hero">
    <img id="heroImg" alt="">
    <button id="heroPrev" class="heroNav heroPrev" type="button">‹</button>
    <button id="heroNext" class="heroNav heroNext" type="button">›</button>
    <div class="heroText">
      <div id="qEn" class="en"></div>
      <div class="ja"><span id="qJa"></span><button class="heroSpeak" data-speak="ja" type="button">🔊</button></div>
      <div class="zh"><span id="qZh"></span><button class="heroSpeak" data-speak="zh" type="button">🔊</button></div>
    </div>
    <button id="heroPlay" class="playHint" type="button">點一下播放</button>
  </section>

  <div class="status">
    <span id="statusTitle">BookWide 測驗</span>
    <span id="statusProgress">1/1</span>
    <span id="statusDone">0/1</span>
    <span id="statusScore" class="score">0分</span>
    <span id="statusSource">JSON</span>
    <span>英・日・中</span>
  </div>

  <section class="card">
    <div class="titleRow">
      <div class="title"><h1 id="testTitle">測驗 Q1</h1><span id="scene" class="scene">選比較像你的反應</span></div>
      <div class="controls">
        <span class="guide">先按播放</span>
        <button id="prevBtn" class="ctrl" type="button">‹</button>
        <button id="playBtn" class="ctrl play" type="button">▶</button>
        <button id="nextBtn" class="ctrl" type="button">›</button>
      </div>
    </div>
    <div class="quiz">
      <div class="qLabel">選比較像你的反應：</div>
      <div id="choices" class="choices"></div>
      <button id="continueBtn" class="nextBtn" type="button" disabled>完成本題</button>
    </div>
  </section>
</main>

<div id="reportModal" class="modal">
  <section class="reportShell">
    <div class="reportActions">
      <button class="printBtn" type="button" onclick="window.print()">列印 / 存 PDF</button>
      <button id="closeReport" class="closeBtn" type="button">關閉</button>
    </div>
    <article id="report" class="report"></article>
  </section>
</div>

<script>
"use strict";

const FALLBACK_COVER="https://pub-578e9e060a104f24b6865e26eb941648.r2.dev/ads/monk/aptitude/cover.png";
const qs=new URLSearchParams(location.search);
const DATASET=safeSlug(qs.get("test")||qs.get("dataset")||qs.get("json")||qs.get("topic")||"aptitude-analysis");
const DATA_URL=`/data/monk/aptitude/${encodeURIComponent(DATASET)}.json`;
const $=id=>document.getElementById(id);

let config=null, questions=[], photos=[], index=0, selected=null;
let answers=loadJson(storageKey("answers"),[]);
let state=loadJson(storageKey("state"),{index:0});
let autoVoiceEnabled=loadJson(storageKey("auto_voice"),true)!==false;
let speechRunId=0;
let lastAutoSpokenKey="";
index=Math.max(0,Number(state.index||0));

function safeSlug(v){
  v=String(v||"").trim().replace(/\.json$/i,"");
  return /^[a-z0-9][a-z0-9_-]*$/i.test(v)?v:"aptitude-analysis";
}
function storageKey(name){return `bw_test_v1_${DATASET}_${name}`}
function loadJson(k,fallback){try{const v=JSON.parse(localStorage.getItem(k)||"null");return v??fallback}catch(_){return fallback}}
function saveJson(k,v){localStorage.setItem(k,JSON.stringify(v))}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function first(...v){return v.map(x=>String(x??"").trim()).find(Boolean)||""}
function number(...v){for(const x of v){const n=Number(x);if(Number.isFinite(n))return n}return 0}

function normalizeConfig(raw){
  const root=raw&&typeof raw==="object"?raw:{};
  const arr=Array.isArray(root)?root:
    Array.isArray(root.questions)?root.questions:
    Array.isArray(root.lessons)?root.lessons:
    Array.isArray(root.items)?root.items:
    Array.isArray(root?.data?.questions)?root.data.questions:[];
  const declaredSlug=safeSlug(first(root.slug,root.id,DATASET));
  const aliases=new Set([
    DATASET,
    declaredSlug,
    ...(Array.isArray(root.aliases)?root.aliases.map(safeSlug):[]),
    ...(Array.isArray(root.slugs)?root.slugs.map(safeSlug):[])
  ]);
  const builtInAliasGroups=[
    new Set(["aptitude-analysis","aptitude-orientation"]),
    new Set(["left-right-zodiac-potential","left-right-zodiac"])
  ];
  const aliasGroupMatch=builtInAliasGroups.some(group=>group.has(DATASET)&&group.has(declaredSlug));
  const sameDataset=aliases.has(DATASET) || aliasGroupMatch;
  if((root.slug||root.id) && !sameDataset){
    throw new Error(`JSON 資料集不符：網址要求 ${DATASET}，JSON 宣告 ${declaredSlug}`);
  }
  const cfg={
    slug:DATASET,
    declaredSlug,
    title:first(root.title_zh,root.title,root.name_zh,root.name,"BookWide 趣味偏好測驗"),
    subtitle:first(root.subtitle_zh,root.subtitle,"英・日・中"),
    scene:first(root.scene_label_zh,root.scene_label,"選比較像你的反應"),
    photosJson:first(root.photos_json,root.photo_json,root.assets?.photos_json,"/assets/hiking/photos.json"),
    cover:first(root.cover_url,root.report_profile?.cover,FALLBACK_COVER),
    scoreMin:number(root.score_model?.min,root.result_gauge?.min,root.min_score,0),
    scoreMax:number(root.score_model?.max,root.result_gauge?.max,root.max_score,arr.length*10||300),
    ranges:root.result_ranges||root.ranges||root.results||root.analysis?.ranges||root.score_model?.ranges||[],
    ticks:root.result_gauge?.ticks||root.ticks||[],
    disclaimer:first(root.result_profile?.disclaimer_zh,root.analysis?.disclaimer_zh,root.score_model?.important_disclaimer?.zh,root.disclaimer_zh,"本測驗僅供娛樂與自我探索，不構成專業診斷。"),
    reportTitle:first(root.report_profile?.title_zh,root.report_title_zh,root.title_zh,root.title,"BookWide 趣味偏好分析"),
    kicker:first(root.report_profile?.kicker,"BOOKWIDE APTITUDE REPORT"),
    questions:arr.map(normalizeQuestion)
  };
  if(!cfg.ranges.length){
    const mid=(cfg.scoreMin+cfg.scoreMax)/2;
    cfg.ranges=[
      {from:cfg.scoreMin,to:mid-1,label_zh:"偏向 A 型",summary_zh:"你的作答較偏向第一種反應模式。"},
      {from:mid,to:cfg.scoreMax,label_zh:"偏向 B 型",summary_zh:"你的作答較偏向第二種反應模式。"}
    ];
  }
  return cfg;
}
function normalizeQuestion(x,i){
  x=x&&typeof x==="object"?x:{};
  const rawChoices=Array.isArray(x.choices)?x.choices:Array.isArray(x.options)?x.options:Array.isArray(x.answers)?x.answers:[];
  return {
    id:number(x.day,x.id,x.no,i+1)||i+1,
    scene:first(x.scene,x.section,x.group),
    title:first(x.title,x.title_zh,x.question_zh),
    en:first(x.en,x.question_en,x.prompt_en,x.text_en),
    ja:first(x.ja,x.question_ja,x.prompt_ja,x.text_ja),
    zh:first(x.zh,x.question_zh,x.prompt_zh,x.text_zh,x.question),
    photo:first(x.photo,x.photo_url,x.image,x.image_url),
    choices:rawChoices.map((c,ci)=>normalizeChoice(c,ci))
  };
}
function normalizeChoice(c,ci){
  c=c&&typeof c==="object"?c:{};
  const scoreObj=c.score&&typeof c.score==="object"?c.score:{};
  const dimensionScores=c.scores&&typeof c.scores==="object"?c.scores:
    c.mbti_scores&&typeof c.mbti_scores==="object"?c.mbti_scores:{};
  return {
    en:first(c.en,c.text_en,c.label_en,c.english,c.text),
    ja:first(c.ja,c.text_ja,c.label_ja,c.japanese),
    zh:first(c.zh,c.text_zh,c.label_zh,c.chinese,c.label),
    value:number(c.aptitude_score,c.points,c.value,scoreObj.total_score,scoreObj.aptitude_tendency,scoreObj.score,ci*5),
    dimensions:dimensionScores,
    raw:c
  };
}

async function fetchJson(url){
  const r=await fetch(url+(url.includes("?")?"&":"?")+"v="+Date.now(),{cache:"no-store"});
  if(!r.ok)throw new Error(`${r.status} ${url}`);
  return r.json();
}
async function loadPhotos(url){
  try{
    const raw=await fetchJson(url);
    const arr=Array.isArray(raw)?raw:Array.isArray(raw.photos)?raw.photos:Array.isArray(raw.images)?raw.images:[];
    return arr.map(x=>typeof x==="string"?x:first(x.url,x.src,x.photo_url,x.image_url)).filter(Boolean);
  }catch(_){return []}
}

function answerFor(q){return answers.find(a=>String(a.qid)===String(q.id))}
function upsertAnswer(q,choiceIndex){
  const c=q.choices[choiceIndex];
  const row={qid:q.id,index:choiceIndex,value:c.value,dimensions:c.dimensions,at:new Date().toISOString()};
  answers=answers.filter(a=>String(a.qid)!==String(q.id));
  answers.push(row);saveJson(storageKey("answers"),answers);
}
function totalScore(){return answers.reduce((s,a)=>s+number(a.value),0)}
function result(){
  const total=totalScore(), min=config.scoreMin, max=config.scoreMax;
  const hit=config.ranges.find(r=>total>=number(r.from,r.min,min)&&total<=number(r.to,r.max,max))||config.ranges[0]||{};
  return {
    total,min,max,
    label:first(hit.label_zh,hit.title_zh,hit.label,hit.title,"分析結果"),
    summary:first(hit.summary_zh,hit.description_zh,hit.summary,hit.description,"你的結果呈現多種反應方式的組合。"),
    extra:first(hit.potential_zh,hit.note_zh,hit.advice_zh),
    answered:answers.length
  };
}
function photoFor(q,i){
  return q.photo||photos[i%Math.max(1,photos.length)]||config.cover||FALLBACK_COVER;
}

function render(options={}){
  if(!questions.length)return;
  index=Math.max(0,Math.min(index,questions.length-1));
  const q=questions[index], old=answerFor(q);
  selected=old?Number(old.index):null;
  $("brandSub").textContent=`${config.title}｜${questions.length}題｜英・日・中`;
  $("statusTitle").textContent=config.title;
  $("statusProgress").textContent=`${index+1}/${questions.length}`;
  $("statusDone").textContent=`${answers.length}/${questions.length}`;
  $("statusScore").textContent=`${totalScore()}分`;
  $("statusSource").textContent=`${DATASET}.json`;
  $("statusSource").title=config.declaredSlug && config.declaredSlug!==DATASET
    ? `${DATA_URL}｜JSON slug: ${config.declaredSlug}`
    : DATA_URL;
  $("testTitle").textContent=`${config.title} Q${index+1}`;
  $("scene").textContent=q.scene||config.scene;
  $("qEn").textContent=q.en;
  $("qJa").textContent=q.ja;
  $("qZh").textContent=q.zh;
  $("heroImg").src=photoFor(q,index);
  $("heroImg").alt=q.zh||q.en||config.title;
  $("choices").innerHTML=q.choices.map((c,ci)=>`
    <div class="choice ${selected===ci?"selected":""}" data-choice="${ci}" role="button" tabindex="0" aria-pressed="${selected===ci}">
      <span class="choiceNo">${ci+1}</span>
      <span><b>${esc(c.en)}</b><small>${esc(c.ja)}</small><em>${esc(c.zh)}</em></span>
      <span class="voiceBtns">
        <button type="button" data-voice="en" data-choice-voice="${ci}" aria-label="朗讀英文">EN</button>
        <button type="button" data-voice="ja" data-choice-voice="${ci}" aria-label="朗讀日文">日</button>
        <button type="button" data-voice="zh" data-choice-voice="${ci}" aria-label="朗讀中文">中</button>
      </span>
    </div>`).join("");
  $("continueBtn").disabled=selected===null;
  $("continueBtn").textContent=answers.length>=questions.length?"查看分析報告":(index===questions.length-1?"完成並查看報告":"完成本題");
  saveJson(storageKey("state"),{index});
  if(options.autoSpeak){
    scheduleAutoSpeak(q);
  }
}
function move(delta){
  index=(index+delta+questions.length)%questions.length;
  render({autoSpeak:true});
}
function selectChoice(ci){
  selected=ci;
  upsertAnswer(questions[index],ci);
  render({autoSpeak:false});
}

function speechLang(lang){
  return lang==="ja"?"ja-JP":lang==="zh"?"zh-TW":"en-US";
}
function speak(text,lang){
  if(!text||!("speechSynthesis"in window))return;
  speechRunId++;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=speechLang(lang);
  u.rate=.82;
  speechSynthesis.speak(u);
}
function speakSequence(lines){
  if(!("speechSynthesis"in window))return;
  const runId=++speechRunId;
  speechSynthesis.cancel();
  const queue=lines.filter(x=>String(x.text||"").trim());
  let pos=0;
  const next=()=>{
    if(runId!==speechRunId || pos>=queue.length)return;
    const row=queue[pos++];
    const u=new SpeechSynthesisUtterance(row.text);
    u.lang=speechLang(row.lang);
    u.rate=row.lang==="en"?.80:.86;
    u.onend=()=>setTimeout(next,180);
    u.onerror=()=>setTimeout(next,120);
    speechSynthesis.speak(u);
  };
  next();
}
function speakQuestion(){
  const q=questions[index];
  autoVoiceEnabled=true;
  saveJson(storageKey("auto_voice"),true);
  lastAutoSpokenKey=`${DATASET}:${q.id}`;
  speakSequence([
    {text:q.en,lang:"en"},
    {text:q.ja,lang:"ja"},
    {text:q.zh,lang:"zh"}
  ]);
}
function scheduleAutoSpeak(q){
  if(!autoVoiceEnabled||!q)return;
  const key=`${DATASET}:${q.id}`;
  if(lastAutoSpokenKey===key)return;
  lastAutoSpokenKey=key;
  setTimeout(()=>{
    if(!autoVoiceEnabled || questions[index]?.id!==q.id)return;
    speakSequence([
      {text:q.en,lang:"en"},
      {text:q.ja,lang:"ja"},
      {text:q.zh,lang:"zh"}
    ]);
  },420);
}

function profileInfo(){
  let p={};try{p=JSON.parse(localStorage.getItem("bw_user_profile")||"{}")||{}}catch(_){}
  const name=first(p.display_name,p.name,localStorage.getItem("display_name"),"未登入訪客");
  const email=first(p.email,localStorage.getItem("user_email"));
  const loggedIn=!!email;
  const masked=email?email.replace(/^(.{2}).*(@.*)$/,"$1***$2"):"";
  const cover=loggedIn?first(p.mbti_cover_url,p.mbti_cover_original_url,p.avatar_url,localStorage.getItem("mbti_cover_url"),localStorage.getItem("avatar_url"),config.cover):config.cover;
  return {name,email:masked,loggedIn,cover:cover||FALLBACK_COVER};
}
function formatTime(){return new Intl.DateTimeFormat("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date())}
function showReport(){
  const r=result(),p=profileInfo(),max=Math.max(r.max,r.total,1);
  const pct=Math.max(0,Math.min(100,((r.total-r.min)/Math.max(1,max-r.min))*100));
  const ticks=config.ticks.length?config.ticks:[r.min,Math.round((r.min+r.max)/2),r.max];
  $("report").innerHTML=`
    <div class="reportHeader">
      <div class="reportHeaderPhoto" style="background-image:url('${esc(p.cover)}')"></div>
      <div class="reportHeaderText"><small>${esc(config.kicker)}</small><h2>${esc(config.reportTitle)}</h2><p>${questions.length}題分析・英・日・中</p></div>
    </div>
    <div class="reportMeta">
      <div><small>報告對象 / Report owner</small><b>${esc(p.name)}</b>${p.email?`<small>${esc(p.email)}</small>`:""}</div>
      <div><small>帳號狀態 / Account</small><b>${p.loggedIn?"已登入會員":"訪客模式"}</b></div>
      <div><small>完成題數 / Completed</small><b>${r.answered} / ${questions.length}</b></div>
      <div><small>產生時間 / Created</small><b>${esc(formatTime())}</b></div>
    </div>
    <b>你的分數：${r.total} / ${r.max}</b>
    <span class="resultLabel">結果：${esc(r.label)}</span>
    <p>${esc(r.summary)}</p>
    <div class="meter"><div class="needle" style="left:${pct}%"></div><div class="meterBar"><i></i><i></i><i></i></div><div class="ticks">${ticks.map(x=>`<span>${esc(x)}</span>`).join("")}</div></div>
    ${r.extra?`<div class="note"><b>延伸分析：</b>${esc(r.extra)}</div>`:""}
    <div class="note">${esc(config.disclaimer)}</div>`;
  $("reportModal").classList.add("show");
  const reports=loadJson("bw_aptitude_reports_v1",{});
  reports[DATASET]={dataset:DATASET,title:config.reportTitle,created_at:new Date().toISOString(),score:r.total,max:r.max,label:r.label,summary:r.summary,html:$("report").innerHTML};
  saveJson("bw_aptitude_reports_v1",reports);
}
function continueFlow(){
  if(selected===null)return;
  if(answers.length>=questions.length||index===questions.length-1){showReport();return}
  let next=index+1;
  while(next<questions.length&&answerFor(questions[next]))next++;
  index=next<questions.length?next:index+1;
  render({autoSpeak:true});
}

function bind(){
  $("heroPrev").onclick=()=>move(-1);$("prevBtn").onclick=()=>move(-1);
  $("heroNext").onclick=()=>move(1);$("nextBtn").onclick=()=>move(1);
  $("heroPlay").onclick=speakQuestion;$("playBtn").onclick=speakQuestion;
  $("continueBtn").onclick=continueFlow;$("closeReport").onclick=()=>$("reportModal").classList.remove("show");
  $("choices").addEventListener("click",e=>{
    const voice=e.target.closest("[data-choice-voice]");
    if(voice){
      e.stopPropagation();
      const ci=Number(voice.dataset.choiceVoice),lang=voice.dataset.voice,c=questions[index].choices[ci];
      speak(c[lang],lang);return;
    }
    const card=e.target.closest("[data-choice]");
    if(card)selectChoice(Number(card.dataset.choice));
  });
  $("choices").addEventListener("keydown",e=>{
    const card=e.target.closest("[data-choice]");
    if(!card || e.target.closest("[data-choice-voice]")) return;
    if(e.key==="Enter" || e.key===" "){
      e.preventDefault();
      selectChoice(Number(card.dataset.choice));
    }
  });
  document.querySelectorAll("[data-speak]").forEach(b=>b.onclick=()=>{
    const q=questions[index],lang=b.dataset.speak;speak(q[lang],lang);
  });
}
async function init(){
  try{
    if(qs.get("reset")==="1"){
      localStorage.removeItem(storageKey("answers"));
      localStorage.removeItem(storageKey("state"));
      answers=[];
      index=0;
      lastAutoSpokenKey="";
    }
    const raw=await fetchJson(DATA_URL);
    config=normalizeConfig(raw);questions=config.questions;
    if(!questions.length)throw new Error("JSON 內找不到 questions / lessons / items / data.questions。");
    photos=await loadPhotos(config.photosJson);
    document.title=`${config.title}｜BookWide`;
    $("app").hidden=false;
    bind();
    render({autoSpeak:true});
  }catch(err){
    $("error").textContent=`BookWide V1 多測驗引擎載入失敗\n\n資料集：${DATASET}\n路徑：${DATA_URL}\n錯誤：${err.message||err}`;
    $("error").classList.add("show");
  }
}
init();
</script>
