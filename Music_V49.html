<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Music_MP4_SRT_V49_Story</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{
  --bg:#07101f;--panel:#0d1a30;--line:rgba(255,255,255,.10);
  --text:#eef4ff;--muted:rgba(255,255,255,.68)
}
*{box-sizing:border-box}
body{
  margin:0;font-family:Arial,"Microsoft JhengHei",sans-serif;
  background:linear-gradient(180deg,#07101f,#0a1326);color:var(--text)
}
.top{max-width:1440px;margin:0 auto;padding:18px 18px 0}
.title{font-size:34px;font-weight:900}
.sub{color:var(--muted);margin-top:6px}
.wrap{
  max-width:1440px;margin:0 auto;padding:18px;
  display:grid;grid-template-columns:430px 1fr;gap:18px
}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.hd{padding:16px 18px;border-bottom:1px solid var(--line);font-size:18px;font-weight:700}
.bd{padding:18px}
.field{margin:0 0 14px}
.label{font-size:13px;color:var(--muted);margin:0 0 6px}
input,textarea,button{font:inherit}
input[type=file],textarea{
  width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);
  background:rgba(0,0,0,.22);color:var(--text)
}
textarea{resize:vertical}
.btnrow{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
button{
  padding:12px 16px;border-radius:14px;border:1px solid var(--line);
  background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-weight:700
}
button.primary{background:linear-gradient(180deg,rgba(56,189,248,.30),rgba(56,189,248,.16));border-color:rgba(56,189,248,.45)}
button.good{background:linear-gradient(180deg,rgba(34,197,94,.26),rgba(34,197,94,.14));border-color:rgba(34,197,94,.45)}
button.warn{background:linear-gradient(180deg,rgba(250,204,21,.24),rgba(250,204,21,.12));border-color:rgba(250,204,21,.4)}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;color:var(--muted)}
.muted{color:var(--muted);font-size:12px}
.log,.lyrics,.styleBox{min-height:180px;font-family:Consolas,monospace;font-size:13px}
.styleBox{min-height:90px}
.sectionTitle{margin:0 0 8px;font-size:14px;font-weight:800}
.thumbGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.thumb{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.04)}
.thumb img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;background:#000}
.thumb .cap{padding:6px 8px;font-size:12px;color:var(--muted)}
@media (max-width:1100px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top">
  <div class="title">🎵 Music_MP4_SRT V49（劇情版）</div>
  <div class="sub">只留 4 步：parse SRT → rewrite（local story）→ cut JPG → zip。輸出只留 out_assets／seg_0001.jpg、lyric.txt、style.txt、google_parts。</div>
</div>

<div class="wrap">
  <section class="panel">
    <div class="hd">左邊操作</div>
    <div class="bd">
      <div class="field">
        <div class="label">1) 匯入 MP4</div>
        <input id="mp4File" type="file" accept="video/*">
        <div class="muted" id="mp4Info">尚未選擇 MP4</div>
      </div>

      <div class="field">
        <div class="label">2) 匯入 SRT</div>
        <input id="srtFile" type="file" accept=".srt,text/plain">
        <div class="muted" id="srtInfo">尚未選擇 SRT</div>
      </div>

      <div class="btnrow">
        <button class="primary" id="parseBtn">① parse SRT</button>
        <button class="good" id="rewriteBtn">② rewrite（劇情）</button>
      </div>
      <div class="btnrow">
        <button class="warn" id="cutBtn">③ cut JPG</button>
        <button class="primary" id="zipBtn">④ zip</button>
      </div>

      <div class="field" style="margin-top:16px">
        <div class="sectionTitle">狀態</div>
        <div class="pill" id="countPill">句數：0</div>
        <div class="muted" id="status" style="margin-top:8px">待命</div>
      </div>

      <div class="field">
        <div class="sectionTitle">執行紀錄</div>
        <textarea id="log" class="log" readonly></textarea>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="hd">右邊結果</div>
    <div class="bd">
      <div class="field">
        <div class="sectionTitle">style.txt（固定）</div>
        <textarea id="styleOut" class="styleBox" readonly></textarea>
      </div>

      <div class="field">
        <div class="sectionTitle">lyric.txt（短微劇情句）</div>
        <textarea id="lyricsOut" class="lyrics"></textarea>
        <div class="btnrow">
          <button class="primary" id="copyLyricsBtn">複製 lyric.txt</button>
          <button id="copyStyleBtn">複製 style.txt</button>
          <button id="copyBothBtn">複製 style + lyric</button>
        </div>
      </div>

      <div class="field">
        <div class="sectionTitle">切圖預覽</div>
        <div id="thumbs" class="thumbGrid"></div>
      </div>
    </div>
  </section>
</div>

<video id="hiddenVideo" style="display:none" playsinline muted></video>
<canvas id="hiddenCanvas" style="display:none"></canvas>

<script>
const st = {
  videoFile:null,
  videoUrl:'',
  srtFile:null,
  srtText:'',
  cues:[],
  lines:[],
  frames:[],
  videoReady:false
};

const $ = id => document.getElementById(id);
const STYLE_TEXT = `Spoken English.
No singing.
Clear voice.
Short story lines.`;

function log(msg){
  $('log').value += msg + '\\n';
  $('log').scrollTop = $('log').scrollHeight;
}
function setStatus(msg){ $('status').textContent = msg; }

$('styleOut').value = STYLE_TEXT;

$('mp4File').addEventListener('change', e => {
  const f = e.target.files[0];
  st.videoFile = f || null;
  st.videoUrl = f ? URL.createObjectURL(f) : '';
  $('mp4Info').textContent = f ? `已選擇：${f.name}` : '尚未選擇 MP4';
  st.videoReady = false;
  if(!f) return;
  const v = $('hiddenVideo');
  v.src = st.videoUrl;
  v.onloadedmetadata = () => {
    st.videoReady = true;
    log(`影片已載入：${v.videoWidth}x${v.videoHeight} / ${v.duration.toFixed(2)}s`);
  };
});

$('srtFile').addEventListener('change', e => {
  const f = e.target.files[0];
  st.srtFile = f || null;
  $('srtInfo').textContent = f ? `已選擇：${f.name}` : '尚未選擇 SRT';
  if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    st.srtText = ev.target.result || '';
    log('已讀取 SRT');
  };
  r.readAsText(f, 'utf-8');
});

function toSec(t){
  const p = t.replace(',', '.').split(':');
  return (+p[0])*3600 + (+p[1])*60 + (+p[2]);
}

function parseSRT(text){
  const blocks = text.replace(/\r/g,'').trim().split(/\n\s*\n/);
  const cues = [];
  for(const block of blocks){
    const lines = block.split('\n').filter(Boolean);
    const timeLine = lines.find(v => v.includes('-->'));
    if(!timeLine) continue;
    const [s,e] = timeLine.split('-->').map(v => v.trim());
    const txt = lines.slice(lines.indexOf(timeLine)+1).join(' ').trim();
    cues.push({
      start:toSec(s),
      end:toSec(e),
      dur:Math.max(0.2, toSec(e)-toSec(s)),
      text:txt
    });
  }
  return cues;
}

function normalizeText(text){
  return String(text || '')
    .replace(/\[[^\]]*\]/g,' ')
    .replace(/\([^)]*\)/g,' ')
    .replace(/<[^>]+>/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function englishWords(text){
  return normalizeText(text)
    .toLowerCase()
    .replace(/[^a-z\s']/g,' ')
    .split(/\s+/)
    .filter(Boolean);
}

const STOP = new Set([
  'the','a','an','and','or','but','to','of','in','on','at','for','with','from','by','is','are','was','were','be',
  'am','i','you','he','she','it','we','they','this','that','these','those','my','your','his','her','our','their',
  'me','him','them','do','does','did','not','no','yes','oh','ah','ha','hey','look','see','can','will','just',
  'very','little','small','big','then','there','here','have','has','had','up','down','out','into','over','under'
]);

function pickKeyword(text){
  const words = englishWords(text).filter(w => w.length >= 3 && !STOP.has(w));
  if(!words.length) return '';
  const counts = {};
  for(const w of words) counts[w] = (counts[w] || 0) + 1;
  const sorted = Object.keys(counts).sort((a,b) => counts[b]-counts[a] || b.length-a.length);
  return sorted[0];
}

function titleWord(w){
  if(!w) return '';
  return w.charAt(0).toUpperCase() + w.slice(1);
}

function hasEnglish(text){
  return /[A-Za-z]/.test(text || '');
}

function makeStoryLine(cue, i, keyword){
  const step = i % 6;
  const key = keyword ? keyword.toLowerCase() : '';
  const keyTitle = keyword ? titleWord(keyword) : '';

  if(step === 0){
    return key ? `We begin our little ${key} story.` : 'We begin our little story.';
  }
  if(step === 1){
    return key ? `Then we see a ${key} nearby.` : 'Then we see something nearby.';
  }
  if(step === 2){
    return key ? `We run to follow the ${key}.` : 'We run to follow it.';
  }
  if(step === 3){
    return key ? `The ${key} slips behind a tree.` : 'It slips behind a tree.';
  }
  if(step === 4){
    return keyTitle ? `${keyTitle} makes us stop and smile.` : 'That makes us stop and smile.';
  }
  return key ? `At last, we play with the ${key}.` : 'At last, we play together.';
}

function simplifyEnglishCue(text){
  const words = englishWords(text).filter(w => !STOP.has(w));
  if(!words.length) return '';
  const short = words.slice(0, 6).join(' ');
  if(!short) return '';
  return short.charAt(0).toUpperCase() + short.slice(1) + '.';
}

function rewriteCue(cue, i, globalKeyword){
  const raw = normalizeText(cue.text);
  const localKeyword = pickKeyword(raw) || globalKeyword;
  if(hasEnglish(raw)){
    const simple = simplifyEnglishCue(raw);
    if(simple && i % 3 !== 0){
      return simple;
    }
  }
  return makeStoryLine(cue, i, localKeyword);
}

function buildLyrics(cues){
  const allText = cues.map(c => c.text).join(' ');
  const globalKeyword = pickKeyword(allText);
  return cues.map((cue, i) => rewriteCue(cue, i, globalKeyword));
}

async function seekVideo(v, timeSec){
  return new Promise((resolve, reject) => {
    const onSeek = () => {
      v.removeEventListener('seeked', onSeek);
      resolve();
    };
    const onErr = () => {
      v.removeEventListener('error', onErr);
      reject(new Error('seek failed'));
    };
    v.addEventListener('seeked', onSeek, {once:true});
    v.addEventListener('error', onErr, {once:true});
    v.currentTime = Math.min(Math.max(0, timeSec), Math.max(0, v.duration - 0.05));
  });
}

function getFrameTime(cue){
  return cue.start + Math.max(0.05, cue.dur * 0.5);
}

$('parseBtn').onclick = () => {
  if(!st.srtText.trim()) return alert('先匯入 SRT');
  st.cues = parseSRT(st.srtText);
  $('countPill').textContent = '句數：' + st.cues.length;
  setStatus('SRT 解析完成');
  log('解析 SRT：' + st.cues.length + ' 段');
};

$('rewriteBtn').onclick = () => {
  if(!st.cues.length) return alert('先 parse SRT');
  st.lines = buildLyrics(st.cues);
  $('lyricsOut').value = st.lines.join('\n');
  setStatus('劇情句完成');
  log('已產生劇情 lyric.txt');
};

$('cutBtn').onclick = async () => {
  if(!st.videoFile || !st.videoReady) return alert('先匯入 MP4');
  if(!st.cues.length) return alert('先 parse SRT');

  const v = $('hiddenVideo');
  const c = $('hiddenCanvas');
  const ctx = c.getContext('2d');
  c.width = v.videoWidth || 1280;
  c.height = v.videoHeight || 720;

  st.frames = [];
  $('thumbs').innerHTML = '';
  setStatus('切圖中...');

  for(let i=0; i<st.cues.length; i++){
    const cue = st.cues[i];
    const t = getFrameTime(cue);
    await seekVideo(v, t);
    ctx.drawImage(v, 0, 0, c.width, c.height);
    const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.92));
    const idx4 = String(i + 1).padStart(4, '0');
    st.frames.push({name:`seg_${idx4}.jpg`, blob});

    const url = URL.createObjectURL(blob);
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="${url}"><div class="cap">seg_${idx4}.jpg</div>`;
    $('thumbs').appendChild(div);
    log('切圖 ' + idx4);
  }

  setStatus('切圖完成：' + st.frames.length + ' 張');
};

$('zipBtn').onclick = async () => {
  if(!st.frames.length) return alert('先 cut JPG');
  if(!$('lyricsOut').value.trim()) return alert('先 rewrite（劇情）');

  setStatus('打包 ZIP 中...');
  const zip = new JSZip();
  const folder = zip.folder('out_assets');

  folder.file('lyric.txt', $('lyricsOut').value.trim() + '\n');
  folder.file('style.txt', STYLE_TEXT + '\n');

  for(const f of st.frames){
    folder.file(f.name, f.blob);
  }

  const googleParts = zip.folder('google_parts');
  const total = st.cues.length || st.frames.length || 0;
  for(let i=1; i<=total; i++){
    const id = String(i).padStart(3, '0');
    googleParts.file(id + '.mp3', '');
  }

  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  const base = (st.videoFile && st.videoFile.name ? st.videoFile.name : 'music').replace(/\.[^.]+$/, '');
  a.href = URL.createObjectURL(blob);
  a.download = base + '_out_assets.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  setStatus('ZIP 已下載');
};

$('copyLyricsBtn').onclick = async () => {
  const txt = $('lyricsOut').value || '';
  await navigator.clipboard.writeText(txt);
  alert('已複製 lyric.txt');
};

$('copyStyleBtn').onclick = async () => {
  await navigator.clipboard.writeText(STYLE_TEXT);
  alert('已複製 style.txt');
};

$('copyBothBtn').onclick = async () => {
  await navigator.clipboard.writeText(STYLE_TEXT + '\n\n' + ($('lyricsOut').value || ''));
  alert('已複製 style + lyric');
};
</script>
</body>
</html>
