<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V51 語言教學引擎（穩定版）</title>
<style>
body { background:#111; color:#eee; font-family:Arial; padding:20px; }
textarea { width:100%; min-height:200px; background:#222; color:#0f0; margin:10px 0; }
button { padding:10px; background:#ff6600; color:#fff; border:none; margin:5px; }
.block { border:1px solid #444; padding:15px; margin:15px 0; }
</style>
</head>
<body>

<h2>🎯 V51 語音教學引擎（不再催眠 / 不再亂檔名）</h2>

<input type="file" id="fileInput" accept=".srt">
<button onclick="parseSRT()">解析 SRT</button>

<div id="output"></div>

<script>

function clean(t){ return (t||"").trim(); }

function makeFileName(id){
    return id + ".mp3";
}

function makeLyrics(lines){
    let out = [];

    lines.forEach(l=>{
        l = clean(l);
        if(!l) return;

        const words = l.split(" ");

        if(words.length > 4){
            const half = Math.ceil(words.length/2);
            out.push(words.slice(0,half).join(" "));
            out.push(l);
        } else {
            out.push(l);
        }

        out.push("");
    });

    return out.join("\n");
}

function getStyle(){
return `Spoken English learning audio.

NOT a song.
NO singing.
NO melody.

Voice is the main focus.
Clear, natural, expressive speaking.

Light cinematic background (very soft).
No strong rhythm.
No drums, no bass.

This is a speaking practice track.
Movie-like narration feeling.`;
}

function parseSRT(){
    const file = document.getElementById('fileInput').files[0];
    if(!file) return alert("選SRT");

    const reader = new FileReader();

    reader.onload = function(e){
        const text = e.target.result;
        const lines = text.split(/\r?\n/);

        let cleanLines = [];

        lines.forEach(l=>{
            if(l.includes('-->')) return;
            if(/^\d+$/.test(l.trim())) return;
            if(!l.trim()) return;
            cleanLines.push(l.trim());
        });

        let html = "";

        for(let i=0;i<cleanLines.length;i+=4){
            const chunk = cleanLines.slice(i,i+4);
            const id = String(i/4+1).padStart(3,'0');

            const lyrics = makeLyrics(chunk);
            const filename = makeFileName(id);
            const style = getStyle();

            html += `
            <div class="block">
            <b>Part ${id}</b><br>
            檔名：${filename}<br>

            <b>Lyrics</b>
            <textarea>${lyrics}</textarea>

            <b>Style</b>
            <textarea>${style}</textarea>
            </div>`;
        }

        document.getElementById("output").innerHTML = html;
    };

    reader.readAsText(file);
}

</script>

</body>
</html>
