<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V50 教材仿寫引擎（SRT → SUNO / Mureka）</title>
<style>
body { background:#111; color:#eee; font-family:Arial, sans-serif; padding:20px; line-height:1.45; }
h2 { margin-top:0; }
textarea { width:100%; min-height:220px; margin:8px 0 14px; background:#222; color:#0f0; padding:10px; border:1px solid #444; box-sizing:border-box; resize:vertical; }
button { padding:10px 18px; margin:4px 6px 4px 0; background:#ff6600; color:#fff; border:none; cursor:pointer; border-radius:6px; }
button.secondary { background:#444; }
button.level { background:#1f3b63; }
button.level.active { background:#2f6fd6; }
.block { border:1px solid #444; padding:15px; margin:15px 0; border-radius:10px; background:#181818; }
.meta { color:#9ad; margin:4px 0; word-break:break-all; }
.topbar { margin-bottom:18px; }
.notice { color:#ffd27d; margin:10px 0 18px; }
.small { font-size:12px; color:#aaa; }
input[type="file"] { margin-right:8px; }
.dual { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; margin-top:10px; }
.col { display:flex; flex-direction:column; }
.copy-group { margin-top:-6px; margin-bottom:8px; }
.filename-box textarea { min-height:56px; }
.levelbar { margin:10px 0 12px; }
.badge { display:inline-block; padding:4px 10px; border:1px solid #466; border-radius:999px; color:#9ad; margin-left:8px; font-size:12px; }
@media (max-width: 900px) {
  .dual { grid-template-columns:1fr; }
  textarea { min-height:180px; }
}
</style>
</head>
<body>

<h2>🎵 V50 教材仿寫引擎（SRT → SUNO / Mureka）</h2>
<div class="topbar">
    <input type="file" id="fileInput" accept=".srt">
    <button onclick="parseSRT()">解析 SRT</button>
    <button class="secondary" onclick="exportManifest()">匯出 manifest.json</button>
</div>

<div class="levelbar">
    <button class="level active" data-level="L1" onclick="setLevel('L1', this)">L1 簡單</button>
    <button class="level" data-level="L2" onclick="setLevel('L2', this)">L2 一般</button>
    <button class="level" data-level="L3" onclick="setLevel('L3', this)">L3 成人</button>
    <span class="badge" id="levelBadge">目前：L1 簡單</span>
</div>

<div class="notice">
    這版改成：<b>不切前 5 字、不破壞語意</b>。<br>
    Lyrics / Style 並排，方便直接貼到 SUNO / Mureka。<br>
    <b>建議檔名規則維持不變</b>：Part 編號、key phrase、建議檔名、manifest.json 匯出。
</div>

<div id="output"></div>

<script>
let latestParts = [];
let latestSourceName = "";
let currentLevel = "L1";

function normalizeText(text){
    return (text || "")
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fff\s]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function slugify(text, maxWords=8){
    const words = normalizeText(text).split(' ').filter(Boolean).slice(0, maxWords);
    return (words.join('_') || 'part').slice(0, 80);
}

function cleanSentence(s){
    return (s || '').replace(/\s+/g, ' ').trim();
}

function splitForEasy(line){
    const text = cleanSentence(line);
    if (!text) return [];

    const parts = text
        .split(/(?<=[,;:.!?])\s+|\s+-\s+|\s+—\s+/)
        .map(x => cleanSentence(x))
        .filter(Boolean);

    if (parts.length > 1) return parts;

    const words = text.split(/\s+/);
    if (words.length <= 10) return [text];

    const mid = Math.ceil(words.length / 2);
    return [
        words.slice(0, mid).join(' '),
        words.slice(mid).join(' ')
    ].filter(Boolean);
}

function makeLyricsByLevel(chunk, level){
    let lines = [];

    chunk.forEach(line => {
        const clean = cleanSentence(line);
        if (!clean) return;

        if (level === 'L1'){
            const pieces = splitForEasy(clean);
            pieces.forEach(p => {
                lines.push(p);
                lines.push(p);
            });
        } else if (level === 'L2'){
            lines.push(clean);
            lines.push(clean);
        } else {
            lines.push(clean);
        }
        lines.push('');
    });

    while (lines.length && lines[lines.length - 1] === '') lines.pop();
    return lines.join('\n');
}

function getStyleByLevel(level){
    if (level === 'L1'){
        return `Educational English learning audio.
Very clear pronunciation.
Slow speed (75-90 BPM).
Voice much louder than music.
Background music VERY light.
No heavy drums, no bass.
Repeat each sentence twice.
Pause between lines (0.5-1s).
Not childish singing.`;
    }
    if (level === 'L2'){
        return `Educational English listening audio.
Clear pronunciation.
Slow to medium speed (80-95 BPM).
Voice louder than music.
Background music light and soft.
Minimal instruments.
Repeat each sentence once more for practice.
Short pause between lines.
Focus on listening and repetition.`;
    }
    return `Educational spoken English with light rhythm.
Natural adult tone.
Medium speed (85-100 BPM).
Voice clearly in front, music very light in background.
No heavy melody, no strong bass.
Not childish.
Focus on comprehension, rhythm, and natural phrasing.`;
}

function buildPartsFromText(text, level){
    const lines = text.split(/\r?\n/);
    let sentences = [];

    for (let i = 0; i < lines.length; i++) {
        let t = lines[i].trim();
        if (!t) continue;
        if (t.includes('-->')) continue;
        if (/^\d+$/.test(t)) continue;
        sentences.push(t);
    }

    const clean = sentences.map(cleanSentence).filter(Boolean);
    let parts = [];

    for (let i=0; i<clean.length; i+=4){
        const chunk = clean.slice(i, i+4);
        const partNo = parts.length + 1;
        const partId = String(partNo).padStart(3,'0');
        const keyPhrase = chunk[0] || `part ${partId}`;
        const slug = slugify(keyPhrase);
        const lyrics = makeLyricsByLevel(chunk, level);

        parts.push({
            part_no: partNo,
            part_id: partId,
            key_phrase: keyPhrase,
            slug: slug,
            suggested_filename: `${partId}_${slug}.mp3`,
            lyrics: lyrics,
            lines: chunk,
            level: level
        });
    }

    return parts;
}

function setLevel(level, btn){
    currentLevel = level;
    document.querySelectorAll('.level').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    const label = level === 'L1' ? '目前：L1 簡單' : level === 'L2' ? '目前：L2 一般' : '目前：L3 成人';
    document.getElementById('levelBadge').textContent = label;

    if (window.__lastText){
        latestParts = buildPartsFromText(window.__lastText, currentLevel);
        render(latestParts);
    }
}

function parseSRT() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) {
        alert('請先選 SRT');
        return;
    }

    latestSourceName = file.name;
    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        window.__lastText = text;
        latestParts = buildPartsFromText(text, currentLevel);
        render(latestParts);
    };
    reader.readAsText(file, 'utf-8');
}

function render(parts){
    let html = '';

    parts.forEach((p) => {
        const style = getStyleByLevel(p.level || currentLevel);

        html += `
        <div class="block">
            <h3>Part ${p.part_id}</h3>
            <div class="meta"><b>Key phrase：</b> ${escapeHtml(p.key_phrase)}</div>
            <div class="meta"><b>建議檔名：</b> ${escapeHtml(p.suggested_filename)}</div>
            <div class="meta"><b>行數：</b> ${p.lines.length}</div>
            <div class="meta"><b>難度：</b> ${escapeHtml(p.level || currentLevel)}</div>

            <div class="dual">
                <div class="col">
                    <b>Lyrics</b>
                    <textarea>${escapeHtml(p.lyrics)}</textarea>
                    <div class="copy-group">
                        <button onclick="copyNthTextarea(this, 0)">複製 Lyrics</button>
                    </div>
                </div>

                <div class="col">
                    <b>Style（貼到 SUNO / Mureka）</b>
                    <textarea>${escapeHtml(style)}</textarea>
                    <div class="copy-group">
                        <button onclick="copyNthTextarea(this, 1)">複製 Style</button>
                    </div>
                </div>
            </div>

            <div class="filename-box">
                <b>建議檔名（可手動貼到你自己記錄）</b>
                <textarea>${escapeHtml(p.suggested_filename)}</textarea>
                <div class="copy-group">
                    <button class="secondary" onclick="copyNthTextarea(this, 2)">複製檔名</button>
                </div>
            </div>
        </div>`;
    });

    document.getElementById('output').innerHTML = html;
}

function copyNthTextarea(btn, idx){
    const block = btn.closest('.block');
    const list = block.querySelectorAll('textarea');
    const ta = list[idx];
    ta.focus();
    ta.select();
    document.execCommand('copy');
    alert('已複製');
}

function exportManifest(){
    if (!latestParts.length) {
        alert('請先解析 SRT');
        return;
    }

    const data = {
        version: 'V50-manifest',
        source_file: latestSourceName,
        created_at: new Date().toISOString(),
        rule: '不切前5字；保語意；L1/L2/L3 難度輸出；檔名規則不變',
        level: currentLevel,
        parts: latestParts
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'manifest.json';
    a.click();
    URL.revokeObjectURL(a.href);
}

function escapeHtml(str){
    return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
</script>

</body>
</html>
