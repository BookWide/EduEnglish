<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>index_test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h2>index_test</h2>
<input id="email" placeholder="email"><br><br>
<input id="pw" type="password" placeholder="password"><br><br>
<button onclick="login()">登入</button>
<button onclick="go()">進 player_test</button>

<script>
const supa = supabase.createClient(
"https://jeajrwpmrgczimmrflxo.supabase.co",
"YOUR_ANON_KEY"
);

const device_id = localStorage.getItem('dev') || crypto.randomUUID();
localStorage.setItem('dev', device_id);
const device_type = window.innerWidth < 900 ? 'mobile' : 'desktop';

async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('pw').value;
  await supa.auth.signInWithPassword({email,password});
  await claim();
  alert('登入成功');
}

async function claim(){
  const { data:{session} } = await supa.auth.getSession();
  await fetch('/functions/v1/claim_test',{
    method:'POST',
    headers:{
      Authorization:'Bearer '+session.access_token,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({device_id,device_type})
  });
}

function go(){
  location.href='player_test.html';
}
</script>
</body>
</html>
