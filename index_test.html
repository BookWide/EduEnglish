<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>index_test</title>
</head>
<body>
  <h2>index_test</h2>

  <input id="email" placeholder="email"><br><br>
  <input id="pw" type="password" placeholder="password"><br><br>

  <button id="loginBtn">登入</button>
  <button id="goBtn">進 player_test</button>

  <script type="module">
    import { supabase } from './supa.js';

    const emailEl = document.getElementById('email');
    const pwEl = document.getElementById('pw');
    const loginBtn = document.getElementById('loginBtn');
    const goBtn = document.getElementById('goBtn');

    const device_id = localStorage.getItem('dev') || crypto.randomUUID();
    localStorage.setItem('dev', device_id);
    const device_type = window.innerWidth < 900 ? 'mobile' : 'desktop';

    async function getReadySession(retry = 10, waitMs = 300) {
      for (let i = 0; i < retry; i++) {
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.access_token) return session;
        await new Promise(r => setTimeout(r, waitMs));
      }
      return null;
    }

    async function claim() {
      const session = await getReadySession();
      if (!session) {
        alert('登入成功但 session 尚未建立');
        return false;
      }

      const resp = await fetch(
        'https://jeajrwpmrgczimmrflxo.supabase.co/functions/v1/claim_test',
        {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session.access_token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ device_id, device_type })
        }
      );

      const data = await resp.json().catch(() => ({}));
      console.log('claim_test =>', resp.status, data);

      if (!resp.ok) {
        alert('claim 失敗：' + resp.status);
        return false;
      }

      return true;
    }

    loginBtn.onclick = async () => {
      const email = emailEl.value.trim();
      const password = pwEl.value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        alert(error.message);
        return;
      }

      const ok = await claim();
      if (ok) {
        alert('登入成功');
      }
    };

    goBtn.onclick = () => {
      location.href = 'player_test.html';
    };
  </script>
</body>
</html>
