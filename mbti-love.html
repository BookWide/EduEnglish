<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide MBTI Shorts Persona v33 Share Report Image</title>
<style>
:root{
  --bg:#071225;--card:#0d1d35;--ink:#eef6ff;--muted:#a9bad3;
  --gold:#fbbf24;--pink:#ec4899;--orange:#f97316;--blue:#3b82f6;
  --line:rgba(147,197,253,.24);--paper:#ffffff;--paperInk:#0f172a
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% 0%,rgba(236,72,153,.22),transparent 34%),radial-gradient(circle at 82% 8%,rgba(59,130,246,.22),transparent 32%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}
button,a,select{font:inherit}button{cursor:pointer}
.app{width:min(980px,100vw);margin:0 auto;padding:18px 14px 42px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}
.brand{display:flex;gap:10px;align-items:center}.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center}
.brand b{font-size:22px}.brand span{display:block;color:#bfdbfe;font-size:13px;font-weight:900}
.back{border:1px solid var(--line);background:rgba(15,31,56,.72);border-radius:999px;padding:8px 13px;color:#dbeafe;text-decoration:none;font-weight:900}
.hero{border:1px solid rgba(251,191,36,.34);border-radius:26px;background:linear-gradient(135deg,rgba(15,31,56,.94),rgba(31,41,55,.84));padding:26px;box-shadow:0 22px 60px rgba(0,0,0,.28);overflow:hidden;position:relative}
.hero:after{content:"";position:absolute;right:-70px;top:-80px;width:240px;height:240px;border-radius:50%;background:rgba(251,191,36,.14)}
h1{font-size:clamp(27px,5vw,46px);line-height:1.08;margin:0 0 10px;position:relative;z-index:1}
h1 small{display:block;font-size:.46em;color:#bfdbfe;margin-top:8px;line-height:1.22}
.lead{font-size:18px;line-height:1.55;color:#e5e7eb;margin:0;max-width:790px;position:relative;z-index:1}
.enSub,.jaSub{display:block;color:#bfdbfe;font-size:.88em;margin-top:4px}
.jaSub{color:#c4b5fd}
.tagline{margin-top:12px;color:#fde68a;font-weight:1000;font-size:17px;position:relative;z-index:1}
.tagline small{display:block;color:#bfdbfe;font-size:.82em;margin-top:4px}
.panel{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.box{border:1px solid var(--line);border-radius:22px;background:rgba(13,29,53,.84);padding:16px}
.box h2{margin:0 0 12px;font-size:20px}.box h2 small{display:block;color:#bfdbfe;font-size:13px;margin-top:3px}
.row{display:grid;grid-template-columns:126px 1fr;gap:10px;align-items:center;margin:10px 0}
.row label{color:#cbd5e1;font-weight:900}.row label small{display:block;color:#bfdbfe;font-size:12px;line-height:1.2}
select{width:100%;border:1px solid rgba(147,197,253,.28);background:#07182e;color:#fff;border-radius:14px;padding:12px;font-size:16px;font-weight:900}
.btn{border:0;border-radius:999px;padding:14px 18px;color:#fff;font-size:17px;font-weight:1000;background:linear-gradient(90deg,var(--pink),var(--orange));box-shadow:0 12px 28px rgba(236,72,153,.22);width:100%;margin-top:12px}
.btn.secondary{background:#334155;box-shadow:none}
.note{font-size:12px;color:#9fb4d1;line-height:1.5;margin-top:12px}
.result{margin-top:16px;border:1px solid rgba(34,197,94,.28);background:rgba(6,78,59,.18);border-radius:24px;padding:18px;display:none}
.result.show{display:block}
.resultHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.result h2{font-size:30px;line-height:1.15;margin:0}.result h2 small{display:block;color:#bfdbfe;font-size:15px;margin-top:4px}
.pill{display:inline-flex;border:1px solid rgba(251,191,36,.35);background:rgba(251,191,36,.10);color:#fde68a;border-radius:999px;padding:6px 10px;font-weight:950;margin:0 6px 8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:14px;position:relative;overflow:hidden}.card:after{content:'😂';position:absolute;right:12px;top:10px;opacity:.12;font-size:34px;pointer-events:none}
.card b{display:block;color:#fde68a;font-size:17px;margin-bottom:8px}.card b small{display:block;color:#bfdbfe;font-size:12px;margin-top:2px}
.lang{display:grid;grid-template-columns:42px 1fr 34px;gap:9px;margin:7px 0;align-items:start}
.lang span{border-radius:8px;background:rgba(59,130,246,.16);border:1px solid rgba(147,197,253,.22);font-size:12px;font-weight:950;text-align:center;padding:3px 0;color:#bfdbfe}
.lang p{margin:0;color:#f8fafc;line-height:1.45;font-size:15px}.speakBtn{width:32px;height:32px;border-radius:999px;border:1px solid rgba(147,197,253,.30);background:rgba(59,130,246,.18);color:#dbeafe;font-size:15px;display:grid;place-items:center;padding:0}.speakBtn:hover{background:rgba(59,130,246,.32)}.lang.ja span{background:rgba(168,85,247,.16);color:#ddd6fe}.lang.zh span{background:rgba(251,191,36,.13);color:#fde68a}
.useful{margin-top:12px;border-radius:18px;padding:16px;background:linear-gradient(135deg,rgba(236,72,153,.20),rgba(251,191,36,.13));border:1px solid rgba(251,191,36,.25)}
.useful b{color:#fde68a;font-size:18px}.disclaimer{font-size:11px;color:#9fb4d1;line-height:1.45;margin-top:12px}
.printOnly{display:none}
@media(max-width:760px){.panel,.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.hero{padding:20px}.brand b{font-size:19px}.resultHead{display:block}}



/* v52: refine screen compare panel to remove repeated labels; print stays unchanged */
.screenComparePanel{margin:16px 14px 16px!important;padding:16px!important;border-radius:18px!important;border:1px solid rgba(147,197,253,.18)!important;background:linear-gradient(180deg,rgba(13,29,53,.82),rgba(9,22,41,.92))!important;box-shadow:0 10px 26px rgba(0,0,0,.16)!important}
.screenCompareHead{margin:0 0 10px!important}
.screenCompareHead h3{margin:0!important;font-size:clamp(18px,2vw,28px)!important;line-height:1.12!important;color:#f59e0b!important;font-weight:1000!important}
.screenCompareHead .sub{margin-top:4px!important;font-size:clamp(12px,1.05vw,15px)!important;line-height:1.35!important;color:#dbeafe!important;font-weight:800!important}
.screenCompareGrid{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:12px!important}
.screenCompareCard{border:1px solid rgba(147,197,253,.18)!important;border-radius:16px!important;background:rgba(255,255,255,.03)!important;padding:12px 12px 11px!important}
.screenCompareCard .axisTop{font-size:11px!important;line-height:1.15!important;color:#8fb1da!important;font-weight:900!important;margin-bottom:8px!important}
.screenCompareBlock{margin:0!important}
.screenCompareBlock+.screenCompareBlock{margin-top:10px!important}
.screenCompareBlock .who{display:flex!important;align-items:center!important;justify-content:space-between!important;gap:10px!important;font-size:12px!important;line-height:1.15!important;font-weight:900!important;margin-bottom:4px!important}
.screenCompareBlock.self .who{color:#fca5a5!important}
.screenCompareBlock.partner .who{color:#93c5fd!important}
.screenCompareBlock .who em{font-style:normal!important;font-size:12px!important;opacity:.96!important}
.screenCompareBlock .main{font-size:clamp(18px,1.45vw,22px)!important;line-height:1.05!important;font-weight:1000!important;color:#fff!important;letter-spacing:-.02em!important}
.screenCompareBlock .sub{font-size:12px!important;line-height:1.2!important;font-weight:800!important;color:#bfd7fb!important;margin-top:2px!important}
.compareBar{height:8px!important;background:rgba(255,255,255,.08)!important;border-radius:999px!important;overflow:hidden!important;margin-top:8px!important}
.compareBar i{display:block!important;height:100%!important;border-radius:999px!important}
.screenCompareBlock.self .compareBar i{background:linear-gradient(90deg,#fb7185,#ef4444)!important}
.screenCompareBlock.partner .compareBar i{background:linear-gradient(90deg,#60a5fa,#2563eb)!important}
.screenCompareBlock .ends{display:flex!important;justify-content:space-between!important;gap:12px!important;margin-top:4px!important;font-size:10px!important;line-height:1.1!important;color:#94a3b8!important;font-weight:800!important}
@media (max-width: 980px){
  .screenCompareGrid{grid-template-columns:1fr!important}
}
@media print{
  .screenComparePanel{display:none!important}
}

@media print{
  @page{size:A4;margin:8mm}
  html,body{background:#fff!important;color:var(--paperInk)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .app{width:100%;padding:0;margin:0}.top,.hero,.panel,.btn,.back{display:none!important}
  .result{display:block!important;margin:0;border:0;background:#fff!important;border-radius:0;padding:0;color:var(--paperInk)!important}
  .resultHead{border-bottom:2px solid #e5e7eb;padding-bottom:4mm;margin-bottom:3mm}
  .result h2{font-size:23pt;color:#0f172a}.result h2 small{font-size:10pt;color:#475569}
  .pill{color:#92400e;border-color:#fbbf24;background:#fffbeb}
  .grid{grid-template-columns:1fr 1fr;gap:3mm;margin-top:2mm}
  .card{background:#fff!important;color:#0f172a;border:1px solid #d1d5db;border-radius:4mm;padding:3mm;break-inside:avoid}
  .card b{font-size:12pt;color:#92400e}.card b small{font-size:8pt;color:#475569}
  .lang{grid-template-columns:10mm 1fr;gap:2mm;margin:1.8mm 0}.lang p{font-size:8.5pt;line-height:1.32;color:#0f172a}.speakBtn{display:none!important}
  .lang span{font-size:7pt;color:#1e3a8a;background:#eff6ff;border-color:#bfdbfe}
  .lang.ja span{color:#5b21b6;background:#f5f3ff}.lang.zh span{color:#92400e;background:#fffbeb}
  .useful{border:1px solid #d1d5db;background:#fff7ed!important;padding:3mm;margin-top:3mm;break-inside:avoid}
  .useful b{font-size:12pt;color:#92400e}
  .disclaimer{font-size:7pt;color:#64748b;border-top:1px solid #e5e7eb;padding-top:2mm}
  .printOnly{display:block;color:#475569;font-size:9pt;margin-bottom:2mm}
}

/* v8 shorts persona style */
.personaStage{display:grid;grid-template-columns:1fr 76px 1fr;gap:14px;align-items:stretch;margin:12px 0 14px}
.personaCard{border:1px solid rgba(251,191,36,.28);background:linear-gradient(135deg,rgba(15,31,56,.92),rgba(30,41,59,.76));border-radius:22px;padding:14px;min-height:170px;position:relative;overflow:hidden}
.personaCard:before{content:attr(data-type);position:absolute;right:10px;top:6px;font-size:44px;font-weight:1000;letter-spacing:-2px;color:rgba(255,255,255,.06)}
.personaIcon{width:72px;height:72px;border-radius:22px;display:grid;place-items:center;font-size:40px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.24);margin-bottom:10px}
.personaCard h3{margin:0;font-size:24px;line-height:1.15;color:#f8fafc}.personaCard h3 small{display:block;font-size:13px;color:#bfdbfe;margin-top:3px}
.personaTag{margin-top:8px;display:inline-block;color:#fde68a;border:1px solid rgba(251,191,36,.35);border-radius:999px;padding:4px 9px;font-weight:1000}
.personaCard p{margin:10px 0 0;line-height:1.45;color:#e2e8f0;font-weight:800}
.personaX{display:grid;place-items:center;font-size:42px;color:#fde68a;font-weight:1000}
.punchLine{border:1px solid rgba(236,72,153,.35);background:linear-gradient(90deg,rgba(236,72,153,.18),rgba(249,115,22,.14));border-radius:22px;padding:16px 18px;margin:10px 0 14px}
.punchLine b{display:block;font-size:26px;line-height:1.18;color:#fff}.punchLine small{display:block;color:#bfdbfe;font-size:14px;margin-top:6px}
.shortGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.shortCard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);border-radius:18px;padding:14px;position:relative;overflow:hidden}
.shortCard:after{content:'⚡';position:absolute;right:12px;top:10px;opacity:.12;font-size:34px}
.shortCard b{display:block;color:#fde68a;font-size:19px;margin-bottom:8px}.shortCard b small{display:block;color:#bfdbfe;font-size:12px;margin-top:2px}
.sceneLine{font-size:16px;line-height:1.5;color:#f8fafc;font-weight:900;margin:8px 0 10px}
.sceneLine em{font-style:normal;color:#fca5a5}
.rescueTitle{color:#a7f3d0;font-weight:1000;margin:8px 0 4px}
@media(max-width:760px){.personaStage{grid-template-columns:1fr}.personaX{font-size:30px}.shortGrid{grid-template-columns:1fr}.personaCard{min-height:auto}}
@media print{
  .personaStage{grid-template-columns:1fr 12mm 1fr;gap:3mm;margin:2mm 0 3mm}
  .personaCard{background:#fff!important;border:1px solid #d1d5db;border-radius:4mm;padding:3mm;min-height:auto;color:#111827}
  .personaIcon{width:16mm;height:16mm;font-size:20pt;margin-bottom:1mm}
  .personaCard h3{font-size:15pt;color:#0f172a}.personaCard h3 small{font-size:8pt;color:#475569}
  .personaTag{font-size:8pt;color:#92400e;background:#fffbeb}.personaCard p{font-size:8.5pt;color:#111827;margin-top:2mm}
  .personaX{font-size:18pt;color:#92400e}.punchLine{background:#fff7ed!important;border:1px solid #fed7aa;padding:3mm;margin:2mm 0}
  .punchLine b{font-size:14pt;color:#111827}.punchLine small{font-size:8pt;color:#475569}
  .shortGrid{grid-template-columns:1fr;gap:2mm;margin-top:2mm}
  .shortCard{background:#fff!important;border:1px solid #d1d5db;border-radius:4mm;padding:3mm;break-inside:avoid}
  .shortCard b{font-size:11pt;color:#92400e}.sceneLine{font-size:8.5pt;color:#111827;margin:1mm 0 2mm}
}


/* v10: MBTI R2 photos in persona cards */
.personaCard.hasPhoto{
  min-height:260px;
  padding:0;
  background:#061225;
  border-color:rgba(251,191,36,.42);
  box-shadow:0 20px 44px rgba(0,0,0,.24);
}
.personaPhoto{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center 35%;
  filter:saturate(1.05) contrast(1.03);
  transform:scale(1.01);
}
.personaPhoto::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,rgba(3,8,18,.86) 0%,rgba(3,8,18,.38) 42%,rgba(3,8,18,.10) 100%),
    linear-gradient(180deg,rgba(3,8,18,.12) 0%,rgba(3,8,18,.16) 48%,rgba(3,8,18,.86) 100%);
}
.personaContent{
  position:relative;
  z-index:2;
  min-height:260px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:16px;
}
.personaBadge{
  position:absolute;
  left:14px;
  top:14px;
  min-width:92px;
  border-radius:18px;
  padding:10px 12px;
  background:rgba(4,12,24,.70);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 12px 28px rgba(0,0,0,.24);
  backdrop-filter:blur(7px);
}
.personaBadge strong{
  display:block;
  color:#fff;
  font-size:34px;
  line-height:1;
  letter-spacing:.06em;
}
.personaBadge small{
  display:none;
}
.personaCard.hasPhoto .personaIcon{
  display:none;
}
.personaCard.hasPhoto h3{
  font-size:25px;
  text-shadow:0 3px 18px rgba(0,0,0,.75);
}
.personaCard.hasPhoto .personaTag{
  background:transparent!important;
  backdrop-filter:none!important;
  border:0!important;
  box-shadow:none!important;
  padding:0!important;
}
.personaCard.hasPhoto p{
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.70);
  font-size:18px;
}
.personaCard.hasPhoto:before{
  display:none;
}
.personaPhotoNote{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-left:8px;
  padding:5px 9px;
  border-radius:999px;
  border:1px solid rgba(34,197,94,.32);
  background:rgba(34,197,94,.12);
  color:#bbf7d0;
  font-size:12px;
  font-weight:950;
}
@media(max-width:760px){
  .personaCard.hasPhoto,.personaContent{min-height:220px}
  .personaBadge strong{font-size:28px}
  .personaCard.hasPhoto h3{font-size:22px}
}
@media print{
  .personaCard.hasPhoto{
    min-height:70mm!important;
    background:#fff!important;
  }
  .personaPhoto{
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .personaContent{min-height:70mm!important;padding:4mm!important}
  .personaBadge{background:rgba(15,23,42,.72)!important}
  .personaCard.hasPhoto h3,.personaCard.hasPhoto p{color:#fff!important}
}


/* v11: 你的卡片優先使用 Profile 的 MBTI 專屬照片；對方卡片才用 R2 類型圖 */
.personaCard.profilePhoto{
  border-color:rgba(34,197,94,.45);
}
.personaCard.profilePhoto .personaPhoto{
  background-position:center center;
}
.personaProfileNote{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-left:8px;
  padding:5px 9px;
  border-radius:999px;
  border:1px solid rgba(34,197,94,.34);
  background:rgba(34,197,94,.14);
  color:#bbf7d0;
  font-size:12px;
  font-weight:950;
}
.personaProfileLabel{
  position:absolute;
  right:14px;
  top:14px;
  z-index:3;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(34,197,94,.18);
  border:1px solid rgba(34,197,94,.36);
  color:#d1fae5;
  font-size:12px;
  font-weight:1000;
  backdrop-filter:blur(7px);
}


/* v13: Profile MBTI 專屬照片維持套表頭；整體壓縮高度，優先考慮手機顯示 */
.hero{padding:20px;}
.hero.profileHero{
  position:relative;
  overflow:hidden;
  min-height:190px;
}
.hero.profileHero.hasCover::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:var(--hero-cover);
  background-size:cover;
  background-position:center center;
  filter:brightness(.42) saturate(1.04);
  opacity:.92;
}
.hero.profileHero.hasCover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, rgba(8,16,34,.95) 0%, rgba(9,22,45,.86) 34%, rgba(9,22,45,.58) 100%);
}
.hero.profileHero .heroInner,
.hero.profileHero > *{position:relative; z-index:2;}
.hero.profileHero h1{
  font-size:clamp(22px,3.1vw,38px)!important;
  line-height:1.08!important;
  margin:0 0 8px!important;
  max-width:60%;
}
.hero.profileHero h1 small{
  font-size:.48em!important;
  margin-top:6px!important;
}
.hero.profileHero .enTitle{font-size:clamp(14px,1.5vw,24px)!important;}
.hero.profileHero .lead,
.hero.profileHero .jp,
.hero.profileHero .accent,
.hero.profileHero .accentEn{max-width:58%;}
.hero.profileHero .lead{font-size:clamp(12px,1.08vw,18px)!important; line-height:1.48!important;}
.hero.profileHero .enSub,.hero.profileHero .jaSub{font-size:.92em!important; margin-top:3px!important;}
.hero.profileHero .tagline{margin-top:10px!important; font-size:clamp(13px,1.05vw,18px)!important;}
.hero.profileHero .tagline small{font-size:.84em!important; margin-top:3px!important;}
.heroProfileBadge{
  position:absolute; right:14px; top:14px; z-index:3;
  display:none; align-items:center; gap:8px; padding:8px 10px; max-width:min(28%,250px);
  border-radius:16px; border:1px solid rgba(255,255,255,.18);
  background:rgba(8,16,34,.55); backdrop-filter:blur(8px); color:#e8f4ff;
}
.heroProfileBadge img{width:50px; height:50px; object-fit:cover; border-radius:12px; border:2px solid rgba(255,255,255,.18)}
.heroProfileBadge .badgeTitle{font-size:11px; color:#bbf7d0; font-weight:900; margin-bottom:1px;}
.heroProfileBadge .badgeText{font-size:12px; line-height:1.28; color:#dbeafe;}
.hero.profileHero.hasCover .heroProfileBadge{display:flex;}
.resultHead .personaProfileNote{display:none!important;}
.personaCard.profilePhoto .personaProfileLabel{display:none!important;}
@media (max-width: 960px){
  .hero{padding:14px;border-radius:20px;}
  .hero.profileHero{min-height:0;}
  .hero.profileHero h1,
  .hero.profileHero .enTitle,
  .hero.profileHero .lead,
  .hero.profileHero .jp,
  .hero.profileHero .accent,
  .hero.profileHero .accentEn,
  .hero.profileHero .tagline{max-width:100%;}
  .hero.profileHero h1{font-size:clamp(18px,6.2vw,30px)!important; margin-right:82px;}
  .hero.profileHero h1 small{font-size:.52em!important;}
  .hero.profileHero .lead{font-size:13px!important; line-height:1.42!important;}

  for(const store of [localStorage, sessionStorage]){

      try{const v=String(store.getItem(k)||'').trim(); if(v) return {src:v, source:k.includes('cover')?'cover':'avatar'};}catch(e){}
    }
  }
  for(const store of [localStorage, sessionStorage]){
    for(const k of ["bw_user_profile","bw_profile_cache","profile_cache","bookwide_profile_cache"]){

function saveProfilePhotoCache(data){
  try{
    const cover=String(data.mbti_cover_url||data.mbti_cover_original_url||'').trim();
    const avatar=String(data.avatar_url||'').trim();
    if(cover){
      [localStorage, sessionStorage].forEach(s=>{ try{s.setItem('mbti_cover_url',cover);s.setItem('bw_mbti_cover_photo_url',cover);s.setItem('mbti_cover_original_url',cover);s.setItem('bw_mbti_cover_original_url',cover);}catch(e){} });

    }
    const email=String(data.email||data.user_email||'').trim();

    [localStorage, sessionStorage].forEach(s=>{ try{s.setItem('bw_user_profile',pack);s.setItem('bw_profile_cache',pack);}catch(e){} });
  }catch(e){}
}
async function initProfileCover(){
  const local=localProfilePhoto();
  if(local.src){ PROFILE_MBTI_COVER_URL=local.src; PROFILE_FETCH_DONE=true; return PROFILE_MBTI_COVER_URL; }
  if(PROFILE_FETCH_DONE) return PROFILE_MBTI_COVER_URL;
  PROFILE_FETCH_DONE=true;
  try{
    const supaClient=getSupa();
    if(!supaClient) return PROFILE_MBTI_COVER_URL;
    const ur=await supaClient.auth.getUser();
    const user=ur?.data?.user;
    if(!user) return PROFILE_MBTI_COVER_URL;
    const {data}=await supaClient.from('profiles').select('avatar_url,mbti_cover_url,mbti_cover_original_url,name,display_name').eq('id',user.id).single();
    if(!data) return PROFILE_MBTI_COVER_URL;
    data.email = user.email || data.email || '';
    saveProfilePhotoCache(data);
    PROFILE_MBTI_COVER_URL=String(data.mbti_cover_url||data.mbti_cover_original_url||data.avatar_url||'').trim();
  }catch(e){ console.warn('profile cover fetch failed', e); }
  return PROFILE_MBTI_COVER_URL;
}

function normalizePhotos(data){
  const out={};
  const arr = Array.isArray(data) ? data : (Array.isArray(data?.photos) ? data.photos : []);

    const m=s.match(/(?:^|[_/-])([IE][NS][FT][JP])(?:\.png|\.jpg|\.jpeg|\.webp)?(?:\?|$)/i);
    if(m) out[m[1].toUpperCase()] = s;
  });
  return out;

function cleanCanvasText(s){

function rr(ctx,x,y,w,h,r){
  const m=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+m,y);ctx.lineTo(x+w-m,y);ctx.quadraticCurveTo(x+w,y,x+w,y+m);
  ctx.lineTo(x+w,y+h-m);ctx.quadraticCurveTo(x+w,y+h,x+w-m,y+h);
  ctx.lineTo(x+m,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-m);
  ctx.lineTo(x,y+m);ctx.quadraticCurveTo(x,y,x+m,y);ctx.closePath();
}
function drawRoundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.save();rr(ctx,x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}ctx.restore();
}
function wrapCanvasLines(ctx,text,maxWidth){
  text=cleanCanvasText(text);
  const paras=text.split(/\n+/);
  const out=[];
  paras.forEach(p=>{
    p=p.trim();
    if(!p){out.push('');return;}
    let line='';
    const tokens=p.match(/[A-Za-z0-9’'.,!?;:()\-]+\s*|\S/g)||[];
    tokens.forEach(t=>{
      const test=line+t;
      if(ctx.measureText(test).width>maxWidth && line){out.push(line.trimEnd());line=t;}
      else line=test;
    });
    if(line) out.push(line.trimEnd());
  });
  return out;
}
function drawWrapped(ctx,text,x,y,maxWidth,font,lineHeight,color,limitLines){
  ctx.font=font;ctx.fillStyle=color;ctx.textBaseline='top';
  const lines=wrapCanvasLines(ctx,text,maxWidth);
  const take=limitLines?lines.slice(0,limitLines):lines;
  take.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight));
  return y+take.length*lineHeight;
}

function loadCanvasImage(src){
  src=String(src||'').trim();
  if(!src) return Promise.resolve(null);
  if(REPORT_IMG_CACHE.has(src)) return REPORT_IMG_CACHE.get(src);
  const promise = new Promise(resolve=>{
    let settled=false;
    const done=(img)=>{ if(settled) return; settled=true; clearTimeout(timer); resolve(img||null); };
    const img=new Image();
    img.crossOrigin='anonymous';
    img.referrerPolicy='no-referrer';
    img.onload=async()=>{
      try{ if(img.decode) await img.decode(); }catch(e){}
      done(img);
    };
    img.onerror=()=>done(null);
    const timer=setTimeout(()=>done(null),10000);
    img.src=src;
  });
  REPORT_IMG_CACHE.set(src,promise);
  return promise;
}
function drawCoverImage(ctx,img,x,y,w,h,posX=.5,posY=.5){
  if(!img || !img.naturalWidth){
    const g=ctx.createLinearGradient(x,y,x+w,y+h);g.addColorStop(0,'#e5e7eb');g.addColorStop(1,'#f8fafc');

  }
  ctx.save();rr(ctx,x,y,w,h,12);ctx.clip();
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const scale=Math.max(w/iw,h/ih);
  const sw=iw*scale, sh=ih*scale;
  const dx=x+(w-sw)*posX, dy=y+(h-sh)*posY;
  ctx.drawImage(img,dx,dy,sw,sh);
  ctx.restore();
}

      ${sideProfileHtml(me, pa, relation, r)}
      ${reportStatsHtml(relation)}
      ${axisCardsHtml(me)}
      ${insightBlocksHtml(me,pa,r)}
      <div class="sceneTabs">
        <div class="sceneTabNav">${r.scenes.map((sc,idx)=>sceneTabHtml(sc,idx)).join('')}</div>
        <div class="scenePanels">${r.scenes.map((sc,idx)=>scenePanelHtml(sc,idx)).join('')}</div>
      </div>
      ${interactionAnalysisHtml(me,pa,relation)}
      <button class="btn secondary rightPrint" data-print-btn="1" type="button" onclick="return triggerPrint(event)">分享報告 / Share Report</button>
      <div class="rightNote">PC 版採左右雙欄；手機版會改成上下兩段。三個情境改成分頁切換，避免 PC 畫面被三張卡擠爆。</div>
    `;
    side.querySelectorAll('[data-scene-tab]').forEach(btn=>{
      btn.addEventListener('click',()=>activateSceneTab(Number(btn.dataset.sceneTab)));
    });
    activateSceneTab(0);
    bindPrintButtons();
  }
}
