<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide 心靈問答</title>
<style>
:root{
  --bg:#071225;--card:#0d2038;--card2:#102744;--line:#294d76;
  --txt:#eef6ff;--muted:#aac2e4;--blue:#3b82f6;--gold:#f6c542;
  --ok:#16a34a;--bad:#ef4444;--green:#0f7a55;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 8% 0%,#143a6b 0,#071225 42%,#050b16 100%);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif}
button{font-family:inherit}
.wrap{max-width:880px;margin:0 auto;padding:12px 12px 28px}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.brand{display:flex;gap:8px;align-items:center;font-weight:950;font-size:20px;letter-spacing:.2px}
.logo{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#38bdf8,#2563eb);display:grid;place-items:center;box-shadow:0 8px 18px rgba(37,99,235,.28)}
.sub{font-size:12px;color:#dbeafe;font-weight:800;margin-top:2px}
.btn{border:1px solid #2e5b91;background:#12345d;color:#fff;border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer;min-height:36px}
.btn:hover{filter:brightness(1.08)}
.btn.primary{background:linear-gradient(135deg,#60a5fa,#2563eb);font-size:20px;width:56px;height:56px;display:grid;place-items:center;border:2px solid rgba(255,255,255,.9);box-shadow:0 0 0 4px rgba(255,255,255,.12)}
.btn.music{background:linear-gradient(135deg,#10b981,#047857)}
.btn.small{padding:5px 9px;min-height:auto;font-size:13px}
.hero{position:relative;border-radius:20px;overflow:hidden;background:#020817;min-height:260px;border:1px solid #19385f;box-shadow:0 18px 44px rgba(0,0,0,.28)}
.hero img,.hero video{width:100%;height:100%;min-height:260px;max-height:440px;object-fit:cover;display:block}
.shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,8,23,.04),rgba(2,8,23,.48) 62%,rgba(2,8,23,.88))}
.navArrow{position:absolute;top:44%;transform:translateY(-50%);z-index:3;width:40px;height:40px;border-radius:999px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.88);color:#0f172a;font-size:24px;font-weight:950;display:grid;place-items:center;cursor:pointer}
.navArrow.left{left:12px}.navArrow.right{right:12px}
.qtext{position:absolute;left:52px;right:52px;bottom:54px;text-align:center;text-shadow:0 3px 9px rgba(0,0,0,.85);z-index:2}
.qtext .en{font-size:26px;font-weight:950;line-height:1.18}
.qtext .ja,.qtext .zh{font-size:18px;font-weight:900;margin-top:6px;line-height:1.25}
.wave{position:absolute;left:0;right:0;bottom:16px;height:26px;display:flex;align-items:center;justify-content:center;gap:6px;z-index:2}
.bar{width:7px;height:18px;border-radius:9px;background:#60a5fa;opacity:.9;animation:pulse 1.4s infinite ease-in-out}
.bar:nth-child(3n){background:#f6c542}.bar:nth-child(2n){height:12px;animation-delay:.2s}.bar:nth-child(4n){height:22px;animation-delay:.35s}
@keyframes pulse{50%{transform:scaleY(.35);opacity:.55}}
.statusRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}
.pill{border:1px solid #2e5b91;border-radius:999px;padding:5px 10px;color:#dbeafe;background:#09203b;font-weight:900;font-size:13px}
.pill.gold{border-color:#a37b10;color:#fde68a;background:#221a06}
.panel{background:rgba(13,32,56,.95);border:1px solid #2b517b;border-radius:18px;padding:12px;box-shadow:0 12px 30px rgba(0,0,0,.18)}
.head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
.title{font-size:22px;font-weight:950;line-height:1.15}
.scene{color:#bfdbfe;font-weight:850;margin-top:3px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:nowrap}
.prompt{font-weight:950;margin:6px 0 10px;color:#f8fbff}
.choices{display:grid;gap:10px}
.choice{position:relative;border:1px solid #254c75;border-radius:16px;background:linear-gradient(90deg,#0c2340,#0b1d36);padding:14px 76px 14px 54px;min-height:82px;cursor:pointer;transition:.14s}
.choice:hover{border-color:#60a5fa;transform:translateY(-1px)}
.choice.correct{background:rgba(22,163,74,.28);border-color:#22c55e}
.choice.wrong{background:rgba(239,68,68,.22);border-color:#f87171}
.num{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:24px;font-weight:900;color:#fff}
.ct .en{font-size:18px;font-weight:950;line-height:1.25}
.ct .ja,.ct .zh{font-size:14px;color:#dbeafe;margin-top:4px;line-height:1.25}
.speak{position:absolute;right:12px;top:10px;display:grid;gap:6px}
.speak button{border:1px solid #386494;background:#12345d;color:#fff;border-radius:999px;padding:3px 8px;font-weight:900;cursor:pointer}
.note{margin-top:10px;color:#9fb7d8;font-size:12px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(15,23,42,.96);color:#fff;border:1px solid #334155;border-radius:999px;padding:10px 16px;font-weight:900;display:none;z-index:20;box-shadow:0 14px 30px rgba(0,0,0,.35)}
.toast.show{display:block}
.loading{padding:24px;text-align:center;color:#cfe3ff;font-weight:900}
@media(max-width:640px){
  .wrap{padding:8px}.hero{min-height:215px}.hero img,.hero video{min-height:215px}
  .qtext{left:40px;right:40px;bottom:52px}.qtext .en{font-size:21px}.qtext .ja,.qtext .zh{font-size:16px}
  .head{align-items:flex-start}.controls{gap:6px}.btn.primary{width:52px;height:52px}
  .choice{padding:13px 58px 13px 46px}.ct .en{font-size:16px}.speak{right:8px}.speak button{padding:2px 7px}
}

/* === match original monk.html compact size === */
.wrap{
  width:min(520px,100vw)!important;
  max-width:520px!important;
  margin:0 auto!important;
  padding:6px 7px 20px!important;
}
.top{margin-bottom:4px!important}
.brand{font-size:17px!important;gap:6px!important}
.logo{width:26px!important;height:26px!important;border-radius:8px!important}
.sub{font-size:10px!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top .btn{font-size:11px!important;padding:5px 9px!important;min-height:28px!important}
.hero{
  height:241px!important;
  min-height:241px!important;
  max-height:241px!important;
  border-radius:20px!important;
  margin-bottom:6px!important;
}
.hero img,.hero video{
  height:241px!important;
  min-height:241px!important;
  max-height:241px!important;
  object-fit:cover!important;
  object-position:center 32%!important;
}
.navArrow{
  width:28px!important;
  height:28px!important;
  font-size:17px!important;
}
.navArrow.left{left:8px!important}
.navArrow.right{right:8px!important}
.qtext{
  left:10px!important;
  right:10px!important;
  bottom:48px!important;
}
.qtext .en{font-size:clamp(12px,3.6vw,18px)!important;line-height:1.12!important}
.qtext .ja{font-size:clamp(10px,2.9vw,15px)!important;line-height:1.15!important;margin-top:5px!important}
.qtext .zh{font-size:clamp(10px,2.9vw,14px)!important;line-height:1.15!important;margin-top:5px!important}
.wave{
  bottom:0!important;
  height:54px!important;
  background:linear-gradient(180deg,rgba(3,8,18,0),rgba(3,8,18,.72))!important;
}
.statusRow{gap:4px!important;margin:0 0 4px!important;overflow-x:auto;scrollbar-width:none}
.pill{font-size:10px!important;padding:3px 7px!important}
.panel{
  border-radius:15px!important;
  padding:7px!important;
}
.head{margin-bottom:4px!important}
.title{font-size:15px!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scene{font-size:10px!important;margin-top:1px!important}
.controls{gap:4px!important}
.btn{min-height:28px!important}
.controls .btn{
  width:28px!important;
  height:28px!important;
  padding:0!important;
  display:grid!important;
  place-items:center!important;
}
.controls .btn.primary{
  width:35px!important;
  height:35px!important;
  font-size:16px!important;
}
.prompt{
  font-size:12.5px!important;
  line-height:1.25!important;
  margin:0 0 5px!important;
}
.choices{gap:4px!important}
.choice{
  border-radius:12px!important;
  padding:6px 42px 6px 36px!important;
  min-height:40px!important;
}
.num{left:10px!important;font-size:16px!important}
.ct .en{font-size:12.5px!important;line-height:1.12!important}
.ct .ja,.ct .zh{font-size:10.5px!important;line-height:1.1!important;margin-top:1px!important}
.speak{right:7px!important;top:5px!important;gap:2px!important}
.speak button{width:27px!important;height:19px!important;font-size:10px!important;padding:0!important}
.note{display:none!important}
@media(max-width:390px){
  .hero{height:214px!important;min-height:214px!important;max-height:214px!important;border-radius:18px!important}
  .hero img,.hero video{height:214px!important;min-height:214px!important;max-height:214px!important}
}

</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="brand"><span class="logo">▣</span><span>BookWide</span></div>
      <div class="sub" id="topicSub">心靈問答｜英文・日文・中文理解</div>
    </div>
    <button class="btn" onclick="location.href='/index.html'">首頁</button>
  </div>

  <div class="hero" id="hero">
    <div id="mediaBox"><div class="loading">正在載入...</div></div>
    <div class="shade"></div>
    <button class="navArrow left" id="photoPrev" title="上一張">‹</button>
    <button class="navArrow right" id="photoNext" title="下一張">›</button>
    <div class="qtext">
      <div class="en" id="qEn">Loading...</div>
      <div class="ja" id="qJa"></div>
      <div class="zh" id="qZh"></div>
    </div>
    <div class="wave" id="wave"></div>
  </div>

  <div class="statusRow">
    <span class="pill" id="dayPill">第 1 題</span>
    <span class="pill" id="progressPill">0/20</span>
    <span class="pill gold" id="coinPill">耗0金</span>
    <span class="pill" id="nextPill">再10題耗1金</span>
  </div>

  <div class="panel">
    <div class="head">
      <div>
        <div class="title" id="lessonTitle">心靈問答</div>
        <div class="scene" id="lessonScene">—</div>
      </div>
      <div class="controls">
        <button class="btn" id="prevBtn">‹</button>
        <button class="btn primary" id="playBtn">▶</button>
        <button class="btn music" id="bgmBtn">♫</button>
        <button class="btn" id="nextBtn">›</button>
      </div>
    </div>
    <div class="prompt">選出最合理的回答：</div>
    <div class="choices" id="choices"></div>
    <div class="note">答錯可重選；選對才會進下一題。第 5 題確認扣款，每 10 題消耗 1 個正式金幣。</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const TOPIC=params.get("topic")||"wenchan-chuyi";
const HEART_VERSION="heart-v5-compact-monk-size";
const TOPICS_URLS=[
  "/data/monk/heart-topics.json",
  "data/monk/heart-topics.json",
  "./data/monk/heart-topics.json"
].map(u=>u+"?v="+Date.now());
const BGM_DEFAULT="/assets/monk/bgm.mp3";
const COIN_EVERY=10;

let topic=null, lessons=[], photos=[];
let idx=Number(localStorage.getItem("bw_heart_idx_"+TOPIC)||0);
let photoOffset=0, bgm=null, mediaUrl="";

const keys={
  idx:"bw_heart_idx_"+TOPIC,
  done:"bw_heart_done_"+TOPIC,
  paid:"bw_heart_paid_"+TOPIC+"_"
};

function toast(t){
  $("toast").textContent=t;
  $("toast").classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>$("toast").classList.remove("show"),1600);
}
function safeJson(k, fallback){
  try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(fallback));}catch(e){return fallback;}
}
function getDone(){return safeJson(keys.done,[]);}
function setDone(a){localStorage.setItem(keys.done,JSON.stringify([...new Set(a)]));}
function completedCount(){return getDone().length;}
function coinCost(){return Math.floor(completedCount()/COIN_EVERY);}
function current(){return lessons[idx]||lessons[0]||{};}

function paidBlockForIndex(i){
  const d=i+1;
  if(d>=5 && d<=14) return 1;
  if(d>=15 && d<=99) return Math.floor((d-5)/10)+1;
  return 0;
}
function confirmPaid(target){
  const block=paidBlockForIndex(target);
  if(!block || localStorage.getItem(keys.paid+block)==="1") return true;
  const start=block===1?5:15+(block-2)*10;
  const end=start+9;
  const text=`第${start}～${end}題｜消耗1個正式金幣`;
  const ok=confirm("心靈問答扣款確認\n\n"+text+"\n\n確認後才進入第 "+(target+1)+" 題。");
  if(ok){
    localStorage.setItem(keys.paid+block,"1");
    toast("已確認扣款區段");
    return true;
  }
  toast("已取消");
  return false;
}

function speak(text,lang){
  if(!text) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;
    u.rate=lang.startsWith("en")?.86:.9;
    u.pitch=lang.startsWith("en")?.82:.9;
    const voices=speechSynthesis.getVoices&&speechSynthesis.getVoices();
    if(voices&&voices.length){
      const preferred=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(lang.slice(0,2).toLowerCase()));
      if(preferred) u.voice=preferred;
    }
    speechSynthesis.speak(u);
  }catch(e){}
}

function mediaKind(u){
  return /\.(mp4|webm|mov)(\?|#|$)/i.test(String(u||""))?"video":"image";
}
function mediaForCurrent(){
  if(!photos.length) return topic&&topic.cover_url?topic.cover_url:"";
  const p=photos[(idx+photoOffset)%photos.length];
  return p||photos[0]||"";
}
function setMedia(url){
  if(!url) return;
  if(url===mediaUrl) return;
  mediaUrl=url;
  const box=$("mediaBox");
  if(mediaKind(url)==="video"){
    box.innerHTML=`<video src="${escapeAttr(url)}" autoplay muted loop playsinline></video>`;
  }else{
    box.innerHTML=`<img src="${escapeAttr(url)}" alt="heart topic image">`;
  }
}
function renderWave(){
  let s="";
  for(let i=0;i<52;i++) s+='<span class="bar"></span>';
  $("wave").innerHTML=s;
}
function escapeHtml(s){
  return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
}
function escapeAttr(s){return escapeHtml(s);}

function bwPath(u){
  let s=String(u||"").trim();
  if(!s) return s;
  if(/^https?:\/\//i.test(s)) return s;
  s=s.replace(/^\/EduEnglish\//,"/");
  s=s.replace(/^EduEnglish\//,"/");
  if(!s.startsWith("/")) s="/"+s;
  return s;
}
async function fetchJsonAny(urls){
  const tried=[];
  let lastErr=null;
  for(const u of urls){
    tried.push(u);
    try{
      const res=await fetch(u,{cache:"no-store"});
      if(res.ok) return res.json();
      lastErr=new Error("HTTP "+res.status+"｜"+u);
    }catch(e){ lastErr=e; }
  }
  throw new Error("找不到心靈問答主題清單。已嘗試：\\n"+tried.join("\\n"));
}


function updateBgm(){
  const src=bwPath((topic&&topic.bgm_url)||BGM_DEFAULT);
  if(!bgm || bgm.src.indexOf(src)===-1){
    bgm=new Audio(src);
    bgm.loop=true;
    bgm.volume=.16;
  }
  $("bgmBtn").textContent=bgm.paused?"♫":"♪";
}
function toggleBgm(){
  updateBgm();
  if(bgm.paused){
    bgm.play().catch(()=>toast("瀏覽器擋背景音，請再點一次"));
  }else{
    bgm.pause();
  }
  updateBgm();
}

function render(){
  if(!lessons.length) return;
  if(idx>=lessons.length) idx=0;
  if(idx<0) idx=lessons.length-1;
  localStorage.setItem(keys.idx,idx);

  const l=current();
  setMedia(mediaForCurrent());

  $("qEn").textContent=l.en||"";
  $("qJa").textContent=l.ja||"";
  $("qZh").textContent=l.zh||"";
  $("lessonTitle").textContent=l.title||topic.title||"心靈問答";
  $("lessonScene").textContent=l.scene||topic.series||"";

  $("dayPill").textContent="第 "+(idx+1)+" 題";
  $("progressPill").textContent=completedCount()+"/"+lessons.length;
  $("coinPill").textContent="耗"+coinCost()+"金";
  const left=COIN_EVERY-(completedCount()%COIN_EVERY||0);
  $("nextPill").textContent=completedCount()>=lessons.length?(topic.series||"完成"):"再"+left+"題耗1金";

  const choices=Array.isArray(l.choices)?l.choices:[];
  $("choices").innerHTML=choices.map((c,i)=>`
    <div class="choice" data-i="${i}">
      <div class="num">${i+1}</div>
      <div class="ct">
        <div class="en">${escapeHtml(c.en||"")}</div>
        <div class="ja">${escapeHtml(c.ja||"")}</div>
        <div class="zh">${escapeHtml(c.zh||"")}</div>
      </div>
      <div class="speak">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="ja">日</button>
        <button type="button" data-lang="zh">中</button>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".choice").forEach(el=>{
    el.onclick=e=>{
      const c=choices[Number(el.dataset.i)];
      if(e.target&&e.target.tagName==="BUTTON"){
        const lang=e.target.dataset.lang;
        speak(c&&c[lang]||"",lang==="en"?"en-US":lang==="ja"?"ja-JP":"zh-TW");
        e.stopPropagation();
        return;
      }
      choose(Number(el.dataset.i));
    };
  });
}

function choose(i){
  const l=current();
  const c=(l.choices||[])[i];
  if(!c) return;
  const el=document.querySelectorAll(".choice")[i];
  if(c.correct){
    el&&el.classList.add("correct");
    const d=getDone(); d.push(idx+1); setDone(d);
    toast("答對了");
    setTimeout(next,650);
  }else{
    el&&el.classList.add("wrong");
    toast("請選出正確答案才能進下一題");
  }
}
function next(){
  const target=(idx+1)%lessons.length;
  if(!confirmPaid(target)) return;
  idx=target; photoOffset=0; mediaUrl=""; render();
  setTimeout(()=>speak(current().en||"","en-US"),260);
}
function prev(){
  const target=(idx-1+lessons.length)%lessons.length;
  if(!confirmPaid(target)) return;
  idx=target; photoOffset=0; mediaUrl=""; render();
}

async function fetchJson(url){
  const res=await fetch(url,{cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status+"｜"+url);
  return res.json();
}
async function load(){
  console.log("[BookWide]", typeof HEART_VERSION==="undefined"?"heart-compact":HEART_VERSION);
  renderWave();
  const cfg=await fetchJsonAny(TOPICS_URLS);
  const list=Array.isArray(cfg.topics)?cfg.topics:[];
  topic=list.find(x=>String(x.slug||"")===TOPIC)||list[0];
  if(!topic) throw new Error("heart-topics.json 沒有 topics");

  document.title=topic.title||"BookWide 心靈問答";
  $("topicSub").textContent=topic.title||"心靈問答";

  const qurl=bwPath(topic.questions_json||`/data/monk/${topic.slug}/questions.json`)+"?v="+Date.now();
  const qdata=await fetchJson(qurl);
  lessons=Array.isArray(qdata.questions)?qdata.questions:(Array.isArray(qdata.lessons)?qdata.lessons:[]);
  if(!lessons.length) throw new Error("題庫沒有 questions："+qurl);

  try{
    const purl=bwPath(topic.photos_json||"")+"?v="+Date.now();
    const pdata=await fetchJson(purl);
    photos=Array.isArray(pdata.photos)?pdata.photos:[];
  }catch(e){
    photos=[];
  }
  if(!photos.length && topic.cover_url) photos=[topic.cover_url];

  updateBgm();
  if(!confirmPaid(idx)) idx=0;
  render();
  setTimeout(()=>speak(current().en||"","en-US"),520);
}

$("playBtn").onclick=()=>speak(current().en||"","en-US");
$("bgmBtn").onclick=toggleBgm;
$("nextBtn").onclick=next;
$("prevBtn").onclick=prev;
$("photoPrev").onclick=()=>{if(!photos.length)return;photoOffset=(photoOffset-1+photos.length)%photos.length;mediaUrl="";setMedia(mediaForCurrent());};
$("photoNext").onclick=()=>{if(!photos.length)return;photoOffset=(photoOffset+1)%photos.length;mediaUrl="";setMedia(mediaForCurrent());};

load().catch(e=>{
  console.error(e);
  $("mediaBox").innerHTML='<div class="loading">載入失敗</div>';
  alert("心靈問答載入失敗：\n"+(e.message||e));
});
</script>
</body>
</html>
