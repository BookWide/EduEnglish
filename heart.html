<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide 心靈問答</title>
<style>
:root{--bg:#071225;--card:#0d1d35;--ink:#eef6ff;--muted:#9fb4d1;--blue:#3b82f6;--line:rgba(96,165,250,.28)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}
button,a{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.app{width:min(520px,100vw);margin:0 auto;padding:6px 7px 20px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
.brand{display:flex;align-items:center;gap:6px;min-width:0}.logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center}
.brand b{display:block;font-size:17px;line-height:1}.brand span{display:block;color:#b9cff0;font-size:10px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top a{font-size:11px;font-weight:850;border:1px solid rgba(148,163,184,.25);background:rgba(15,31,56,.78);border-radius:999px;padding:5px 9px}
.hero{position:relative;height:241px;border-radius:20px;overflow:hidden;background:#061225;margin-bottom:6px;box-shadow:0 14px 34px rgba(0,0,0,.24)}
.hero img,.hero video{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;filter:saturate(1.05) contrast(1.03)}.hero video{display:none;background:#061225}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,.06),rgba(5,12,24,.04) 35%,rgba(5,12,24,.70) 100%);pointer-events:none}
.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:28px;height:28px;border:0;border-radius:99px;background:rgba(255,255,255,.78);color:#0f172a;font-size:17px;font-weight:950}.prev{left:8px}.next{right:8px}
.hint{position:absolute;right:8px;bottom:8px;z-index:4;background:rgba(37,99,235,.76);border-radius:999px;padding:4px 7px;font-size:10px;font-weight:900}
.sub{position:absolute;left:10px;right:10px;bottom:48px;z-index:4;text-align:center;text-shadow:0 3px 16px rgba(0,0,0,.86),0 1px 2px rgba(0,0,0,.95)}
.en{font-size:clamp(12px,3.6vw,18px);line-height:1.12;font-weight:950;color:#fff}.ja{margin-top:5px;font-size:clamp(10px,2.9vw,15px);line-height:1.15;font-weight:950;color:#e9f7ff}.zh{margin-top:5px;font-size:clamp(10px,2.9vw,14px);line-height:1.15;font-weight:950;color:#fff7ed}
.wave{position:absolute;left:0;right:0;bottom:0;height:54px;z-index:3;background:linear-gradient(180deg,rgba(3,8,18,0),rgba(3,8,18,.72));pointer-events:none}
#waveCanvas{width:100%;height:100%;display:block}
.mini{display:flex;gap:4px;margin-bottom:4px;overflow-x:auto;scrollbar-width:none}.mini span{flex:0 0 auto;border:1px solid var(--line);background:rgba(13,29,53,.72);color:#dbeafe;border-radius:999px;padding:3px 7px;font-size:10px;font-weight:900}.mini .coin{color:#fde68a;border-color:rgba(251,191,36,.36);background:rgba(251,191,36,.12)}
.card{border:1px solid rgba(85,136,206,.42);border-radius:15px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:7px;box-shadow:0 12px 28px rgba(0,0,0,.16)}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}.title{min-width:0}.title b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title span{display:block;color:#c7d2fe;font-size:10px;font-weight:800}
.ctrls{display:flex;gap:4px}.ctrl{width:28px;height:28px;border-radius:999px;border:1px solid var(--line);background:rgba(59,130,246,.15);color:#dbeafe;font-weight:950}.ctrl.on{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55);color:#bbf7d0}.ctrl.off{opacity:.58}.play{width:35px;height:35px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff}
.quiz{border:1px solid rgba(251,191,36,.28);border-radius:14px;background:rgba(251,191,36,.08);padding:7px}.q{font-size:12.5px;font-weight:950;line-height:1.25;margin-bottom:5px}
.choices{display:grid;gap:4px}.choice{width:100%;border:1px solid rgba(148,163,184,.24);background:rgba(15,31,56,.85);color:#eaf3ff;border-radius:12px;padding:6px 7px;text-align:left;display:grid;grid-template-columns:22px 1fr 27px;gap:4px;align-items:center;min-height:40px;-webkit-tap-highlight-color:transparent}
.choice b{font-size:12.5px;line-height:1.12}.choice small{display:block;color:#c4b5fd;font-size:10.5px;line-height:1.1;margin-top:1px}.choice em{display:block;color:#cbd5e1;font-style:normal;font-size:10.5px;line-height:1.1;margin-top:1px}
.choiceText{min-width:0}.voiceBtns{display:grid;gap:2px}.voiceBtns button{width:27px;height:19px;border:1px solid rgba(96,165,250,.32);background:rgba(59,130,246,.16);color:#dbeafe;border-radius:999px;font-size:10px;font-weight:950;padding:0;cursor:pointer}.voiceBtns button:active{transform:scale(.96);background:rgba(96,165,250,.28)}
.choice.ok{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55);color:#bbf7d0}.choice.bad{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);color:#fecaca}
.spk{width:25px;height:25px;border-radius:99px;border:1px solid var(--line);background:rgba(59,130,246,.16);color:#dbeafe;display:grid;place-items:center}
.complete{width:100%;margin-top:5px;border-radius:999px;border:1px solid rgba(148,163,184,.28);background:rgba(148,163,184,.16);color:#cbd5e1;padding:7px 8px;font-size:12.5px;font-weight:950}.complete.ready{border:0;background:linear-gradient(135deg,#22c55e,#60a5fa);color:#fff}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:99;background:rgba(15,23,42,.9);border:1px solid var(--line);padding:10px 14px;border-radius:999px;font-size:13px;font-weight:900;display:none;max-width:min(360px,92vw);text-align:center}.toast.show{display:block}
.modal{position:fixed;inset:0;z-index:999;display:none;place-items:center;padding:20px;background:rgba(7,18,37,.66);backdrop-filter:blur(8px)}.modal.show{display:grid}.box{width:min(340px,92vw);border:1px solid rgba(251,191,36,.38);border-radius:24px;background:linear-gradient(145deg,rgba(16,40,71,.98),rgba(9,25,47,.98));box-shadow:0 24px 60px rgba(0,0,0,.42);padding:18px;text-align:center}.box h2{margin:0 0 8px;font-size:21px}.box p{margin:0 0 12px;color:#dbeafe;font-weight:850;line-height:1.45}.box button{width:100%;border:0;border-radius:999px;padding:10px 12px;background:linear-gradient(135deg,#f59e0b,#22c55e);color:#fff;font-weight:950}
@media(max-width:390px){.hero{height:214px;border-radius:18px}.app{padding-left:7px;padding-right:7px}}

/* === Doctor-style read-along highlight: 英文逐字變色，日文整句變色 === */
.heroWord{
  display:inline-block;
  padding:0 2px;
  border-radius:7px;
  transition:transform .14s ease,color .14s ease,background .14s ease;
}
.heroWord.on{
  color:#fde047;
  background:rgba(251,191,36,.18);
  transform:translateY(-2px) scale(1.035);
}
.ja.on{
  color:#fde047 !important;
  text-shadow:0 0 18px rgba(250,204,21,.42),0 3px 16px rgba(0,0,0,.86) !important;
}
.zh.on{
  color:#fde68a !important;
  text-shadow:0 0 14px rgba(250,204,21,.30),0 3px 16px rgba(0,0,0,.86) !important;
}

</style>

<body>
<div class="toast" id="toast"></div>
<audio id="bgm" src="./assets/monk/bgm.mp3" preload="auto" loop playsinline></audio>
<main class="app">
  <section class="top"><div class="brand"><div class="logo">📘</div><div><b>BookWide</b><span>問禪｜第5句確認扣款｜每10句1金</span></div></div><a href="./account/learning-dashboard.html">控制台</a></section>
  <section class="hero" id="hero" aria-label="點擊播放">
    <img id="photo" alt="BookWide monk photo"><video id="mediaVideo" muted loop playsinline preload="metadata"></video>
    <button class="nav prev" id="photoPrev" type="button">‹</button><button class="nav next" id="photoNext" type="button">›</button>
    <div class="hint" id="hint">點一下播放</div>
    <div class="sub"><div class="en" id="heroEn"></div><div class="ja" id="heroJa"></div><div class="zh" id="heroZh"></div></div>
    <div class="wave"><canvas id="waveCanvas"></canvas></div>
  </section>
  <section class="mini"><span id="stage">第 1 關</span><span id="done">0/20</span><span class="coin" id="coins">金0</span><span id="nextCoin">再5關</span></section>
  <section class="card">
    <div class="titleRow"><div class="title"><b id="title"></b><span id="scene"></span></div><div class="ctrls"><button class="ctrl" id="prev" type="button">‹</button><button class="ctrl play" id="play" type="button">▶</button><button class="ctrl" id="music" type="button">♫</button><button class="ctrl" id="next" type="button">›</button></div></div>
    <section class="quiz"><div class="q" id="quizQ">選出最合理的回答：</div><div id="lessonLinkHolder"></div><div class="choices" id="choices"></div><button class="complete" id="complete" type="button">先答題</button></section>
  </section>
</main>
<div class="modal" id="reward"><div class="box"><h2 id="rewardTitle">完成！</h2><p id="rewardText"></p><button id="rewardOk" type="button">收下，進下一關</button></div></div>
<script>

const HEART_TOPIC_SLUG = new URLSearchParams(location.search).get("topic") || "wenchan-chuyi";
const HEART_TOPICS_URLS = [
  "/data/monk/heart-topics.json",
  "data/monk/heart-topics.json",
  "./data/monk/heart-topics.json"
].map(u => u + "?v=" + Date.now());

let HEART_TOPIC = null;
let HEART_TITLE = "心靈問答";
let HEART_SERIES = "心靈問答";
let HEART_QUESTIONS_URL = "";
let HEART_PHOTOS_URL = "";
let HEART_BGM_URL = "";

function escapeHtml(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}
function bwPath(u){
  let s = String(u || "").trim();
  if(!s) return s;
  if(/^https?:\/\//i.test(s)) return s;
  s = s.replace(/^\/EduEnglish\//, "/");
  s = s.replace(/^EduEnglish\//, "/");
  if(!s.startsWith("/")) s = "/" + s;
  return s;
}
async function fetchJsonAny(urls){
  let lastErr = null;
  for(const u of urls){
    try{
      const r = await fetch(u, {cache:"no-store"});
      if(r.ok) return await r.json();
      lastErr = new Error("HTTP " + r.status + "｜" + u);
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error("fetch failed");
}
async function loadHeartTopic(){
  const cfg = await fetchJsonAny(HEART_TOPICS_URLS);
  const topics = Array.isArray(cfg.topics) ? cfg.topics : [];
  HEART_TOPIC = topics.find(t => String(t.slug || "") === HEART_TOPIC_SLUG) || topics[0];
  if(!HEART_TOPIC) throw new Error("heart-topics.json 沒有 topics");
  HEART_TITLE = HEART_TOPIC.title || HEART_TOPIC.series || "心靈問答";
  HEART_SERIES = HEART_TOPIC.series || HEART_TITLE || "心靈問答";
  HEART_QUESTIONS_URL = bwPath(HEART_TOPIC.questions_json || `/data/monk/${HEART_TOPIC.slug}/questions.json`);
  HEART_PHOTOS_URL = bwPath(HEART_TOPIC.photos_json || `/data/monk/${HEART_TOPIC.slug}/photos.json`);
  HEART_BGM_URL = bwPath(HEART_TOPIC.bgm_url || "./assets/monk/bgm.mp3");

  document.title = HEART_TITLE;
  const brandSub = document.querySelector(".brand span");
  if(brandSub) brandSub.textContent = HEART_SERIES + "｜第5句確認扣款｜每10句1金";
  const quizQ = document.getElementById("quizQ");
  if(quizQ) quizQ.textContent = "選出最合理的回答：";
  const bgmEl = document.getElementById("bgm");
  if(bgmEl && HEART_BGM_URL){
    bgmEl.src = HEART_BGM_URL;
    bgmEl.load();
  }
}
async function loadHeartLessons(){
  const j = await fetchJsonAny([HEART_QUESTIONS_URL + "?v=" + Date.now()]);
  const arr = Array.isArray(j) ? j : (Array.isArray(j.questions) ? j.questions : (Array.isArray(j.lessons) ? j.lessons : []));
  if(!arr.length) throw new Error("題庫沒有 questions / lessons：" + HEART_QUESTIONS_URL);
  lessons = arr.map((x,i)=>({
    day: Number(x.day || i+1),
    scene:x.scene||HEART_SERIES,
    title:x.title||HEART_SERIES,
    en:x.en||"",
    zh:x.zh||"",
    ja:x.ja||"",
    choices:Array.isArray(x.choices)?x.choices:[],
    lesson_category:x.lesson_category||x.lesson_cat||x.video_category||"",
    lesson_slug:x.lesson_slug||x.video_slug||"",
    lesson_label:x.lesson_label||"先看星座補解影片"
  }));
  TOTAL = lessons.length;
  ZEN_LEVEL_NAME = HEART_SERIES;
}

let photos=[];
const localPhotos=[];
async function loadPhotos(){
  photos = [];
  try{
    const j = await fetchJsonAny([HEART_PHOTOS_URL + "?v=" + Date.now()]);
    if(Array.isArray(j.photos) && j.photos.length) photos = j.photos.filter(Boolean);
  }catch(e){
    photos = [];
  }
  if(!photos.length && HEART_TOPIC && HEART_TOPIC.cover_url) photos = [bwPath(HEART_TOPIC.cover_url)];
}
let lessons=[];
const $=id=>document.getElementById(id);
let TOTAL=20; const FORMAL_COIN_EVERY=10; let ZEN_LEVEL_NAME="心靈問答";
let idx=Number(localStorage.getItem("bw_heart_idx_"+HEART_TOPIC_SLUG)||0), answered=false, correct=false, playing=false;
const BGM_VOLUME=0.14, BGM_DUCK_VOLUME=0.035;
const BGM_PREF_KEY="bookwide_heart_bgm_off_"+HEART_TOPIC_SLUG;
let bgmUserOff=localStorage.getItem(BGM_PREF_KEY)==="1";
let bgmEverTried=false;


const MONK_PAY_PREFIX="bw_heart_paid_block_"+HEART_TOPIC_SLUG+"_";
function paidBlockForIndex(i){
  const day=i+1;
  if(day>=5 && day<=14)return 1;
  if(day>=15 && day<=20)return 2;
  return 0;
}
function paidBlockCostLabel(block){
  if(block===1)return "第5～14句｜消耗1個正式金幣";
  if(block===2)return "第15～20句｜再消耗1個正式金幣";
  return "";
}
function isPaidBlockUnlocked(block){
  if(!block)return true;
  return localStorage.getItem(MONK_PAY_PREFIX+block)==="1";
}
function unlockPaidBlock(block){
  if(!block)return;
  localStorage.setItem(MONK_PAY_PREFIX+block,"1");
}
function confirmPaidBlockIfNeeded(targetIndex){
  const block=paidBlockForIndex(targetIndex);
  if(!block || isPaidBlockUnlocked(block))return true;
  const ok=confirm("心靈問答扣款確認\\n\\n"+paidBlockCostLabel(block)+"\\n\\n確認後才進入第 "+(targetIndex+1)+" 句。");
  if(ok){
    unlockPaidBlock(block);
    toast("已確認扣款區段");
    return true;
  }
  toast("已取消，停留目前句");
  return false;
}


function bgm(){return $("bgm")}
function updateBgmButton(){
  const btn=$("music"), a=bgm();
  if(!btn||!a)return;
  btn.classList.toggle("on",!a.paused&&!bgmUserOff);
  btn.classList.toggle("off",bgmUserOff);
  btn.textContent=bgmUserOff?"♫̸":"♫";
}
function startBgm(auto=false){
  const a=bgm();
  if(!a||bgmUserOff){updateBgmButton();return Promise.resolve(false)}
  a.loop=true;
  if(!playing)a.volume=BGM_VOLUME;
  bgmEverTried=true;
  return a.play().then(()=>{updateBgmButton();return true}).catch(err=>{
    updateBgmButton();
    if(!auto)toast("背景音樂需點 ♫ 或播放鍵啟動");
    return false;
  });
}
function stopBgm(saveOff=false){
  const a=bgm();
  if(a)a.pause();
  if(saveOff){bgmUserOff=true;localStorage.setItem(BGM_PREF_KEY,"1")}
  updateBgmButton();
}
function toggleBgm(){
  const a=bgm();
  if(!a)return;
  if(!a.paused&&!bgmUserOff){stopBgm(true);toast("背景音樂已關閉")}
  else{bgmUserOff=false;localStorage.removeItem(BGM_PREF_KEY);startBgm(false)}
}
function duckBgm(on){
  const a=bgm();
  if(!a||a.paused)return;
  a.volume=on?BGM_DUCK_VOLUME:BGM_VOLUME;
}
function bindBgmFirstGesture(){
  document.addEventListener("pointerdown",()=>{if(!bgmUserOff)startBgm(true)},{once:true,passive:true});
}
function tryAutoBgm(){startBgm(true)}
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1600)}
function getDone(){try{return JSON.parse(localStorage.getItem("bw_heart_done_"+HEART_TOPIC_SLUG)||"[]")}catch(e){return[]}}
function setDone(a){localStorage.setItem("bw_heart_done_"+HEART_TOPIC_SLUG,JSON.stringify([...new Set(a)]))}
function getFailed(){try{return JSON.parse(localStorage.getItem("bw_heart_failed_"+HEART_TOPIC_SLUG)||"[]")}catch(e){return[]}}
function setFailed(a){localStorage.setItem("bw_heart_failed_"+HEART_TOPIC_SLUG,JSON.stringify([...new Set(a)]))}
function markFailed(day){const f=getFailed(); if(!f.includes(day)) setFailed([...f,day])}
function completedCount(){return getDone().length}
function formalCoinCost(){
  return Math.floor(completedCount()/FORMAL_COIN_EVERY);
}
function coinCount(){return formalCoinCost()}
function zenProgressText(){
  const n=completedCount();
  if(n>=TOTAL)return `${ZEN_LEVEL_NAME}｜共耗${formalCoinCost()}金`;
  const left=FORMAL_COIN_EVERY-(n%FORMAL_COIN_EVERY||0);
  return `再${left}句耗1金`;
}
function zenRewardText(day,totalDone){
  const cost=formalCoinCost();
  if(totalDone>=20)return `${ZEN_LEVEL_NAME}完成：20句共消耗 ${cost} 個正式金幣。`;
  if(totalDone%FORMAL_COIN_EVERY===0)return `已完成 ${totalDone}/${TOTAL}，本階段消耗 1 個正式金幣；目前共消耗 ${cost} 個。`;
  return `已完成 ${totalDone}/${TOTAL}；每10句消耗1個正式金幣，目前共消耗 ${cost} 個。`;
}
function setPlaying(v){playing=v;document.body.classList.toggle("playing",v);$("play").textContent=v?"⏸":"▶";$("hint").textContent=v?"播放中":"點一下播放";duckBgm(v);if(!v)clearHeroWordHighlight()}

function splitHeroWords(text){
  return String(text || "").trim().split(/\s+/).filter(Boolean);
}
function renderHeroText(l){
  const en = $("heroEn");
  const ja = $("heroJa");
  const zh = $("heroZh");
  if(en){
    const words = splitHeroWords(l && l.en);
    en.innerHTML = words.map((w,i)=>`<span class="heroWord" data-word="${i}">${escapeHtml(w)}</span>`).join(" ");
  }
  if(ja){
    ja.textContent = (l && l.ja) || "";
    ja.classList.remove("on");
  }
  if(zh){
    zh.textContent = (l && l.zh) || "";
    zh.classList.remove("on");
  }
}
function clearHeroWordHighlight(){
  document.querySelectorAll(".heroWord").forEach(x=>x.classList.remove("on"));
  const ja = $("heroJa");
  const zh = $("heroZh");
  if(ja) ja.classList.remove("on");
  if(zh) zh.classList.remove("on");
}
function animateHeroWords(text, ms, token){
  const words = splitHeroWords(text);
  if(!words.length) return;
  const start = performance.now();
  const total = Math.max(700, ms || words.length * 430);
  function step(now){
    if(token !== speechToken || !playing){
      clearHeroWordHighlight();
      return;
    }
    const p = Math.min(0.999, (now - start) / total);
    const idxNow = Math.min(words.length - 1, Math.floor(p * words.length));
    document.querySelectorAll(".heroWord").forEach((el,i)=>el.classList.toggle("on", i === idxNow));
    if(p < 0.999) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function setHeroLangActive(lang,on){
  const ja = $("heroJa");
  const zh = $("heroZh");
  if(!on){
    clearHeroWordHighlight();
    return;
  }
  clearHeroWordHighlight();
  if(lang === "ja-JP" && ja) ja.classList.add("on");
  if(lang === "zh-TW" && zh) zh.classList.add("on");
}
function estimateSpeechMs(text, lang){
  const s = String(text || "");
  if(!s) return 700;
  if(lang === "ja-JP" || lang === "zh-TW") return Math.max(900, s.length * 155);
  return Math.max(900, splitHeroWords(s).length * 460);
}

let speechToken=0;
function stopSpeech(){
  speechToken++;
  try{speechSynthesis.cancel()}catch(e){}
  setPlaying(false);
}
function voices(){
  try{return speechSynthesis.getVoices?speechSynthesis.getVoices():[]}catch(e){return[]}
}
function pickVoice(lang,role){
  const want=lang.slice(0,2).toLowerCase();
  const vs=voices().filter(v=>(v.lang||"").toLowerCase().startsWith(want));
  const male=["male","man","男","男性","daniel","david","alex","mark","fred","george","thomas","aaron","bruce","otoya","ichiro","kyushu"];
  const female=["female","woman","女","女性","samantha","zira","susan","victoria","karen","moira","tessa","kyoko","haruka","nanami","sayaka"];
  const picked=vs.map(v=>({v,score:score(v)})).sort((a,b)=>b.score-a.score)[0];
  return picked?picked.v:null;
  function score(v){
    const n=(v.name||"").toLowerCase(), vl=(v.lang||"").toLowerCase();
    let s=0;
    if(vl===lang.toLowerCase())s+=120;
    if(v.localService)s+=8;
    const isMale=male.some(x=>n.includes(x)), isFemale=female.some(x=>n.includes(x));
    if(role==="student"){
      if(isFemale)s+=160; if(isMale)s-=120;
      if(lang==="en-US"&&n.includes("samantha"))s+=90;
      if(lang==="ja-JP"&&(n.includes("kyoko")||n.includes("nanami")||n.includes("haruka")))s+=90;
    }else{
      if(isMale)s+=160; if(isFemale)s-=140;
      if(lang==="en-US"&&(n.includes("daniel")||n.includes("david")||n.includes("alex")))s+=90;
      if(lang==="ja-JP"&&(n.includes("otoya")||n.includes("ichiro")))s+=90;
    }
    return s;
  }
}
function voiceParams(lang,role){
  if(role==="student") return lang==="ja-JP" ? {rate:.76,pitch:1.18} : {rate:.78,pitch:1.12};
  return lang==="ja-JP" ? {rate:.62,pitch:.52} : {rate:.68,pitch:.58};
}
function makeUtter(text,lang,role,useVoice=true){
  const u=new SpeechSynthesisUtterance(String(text||""));
  const vp=voiceParams(lang,role);
  u.lang=lang;
  if(useVoice) u.voice=pickVoice(lang,role);
  u.rate=vp.rate;
  u.pitch=vp.pitch;
  u.volume=1;
  return u;
}
function waitMs(ms){return new Promise(r=>setTimeout(r,ms))}
function hardTimeoutMs(text,lang){
  const s=String(text||"");
  const units=lang==="ja-JP"?s.length:Math.max(1,s.split(/\s+/).filter(Boolean).length);
  return Math.max(3500,Math.min(18000,lang==="ja-JP"?2200+units*210:2200+units*430));
}
function speakStep(text,lang,role,token){
  return new Promise(resolve=>{
    if(token!==speechToken || !text){resolve(false);return}
    let finished=false, triedFallback=false, current=null;
    const shouldHeroHighlight = role === "student" && lessons[idx] && (String(text||"") === String(lessons[idx].en||"") || String(text||"") === String(lessons[idx].ja||"") || String(text||"") === String(lessons[idx].zh||""));
    if(shouldHeroHighlight){
      if(lang === "en-US") animateHeroWords(text, estimateSpeechMs(text,lang), token);
      else setHeroLangActive(lang,true);
    }
    const finish=ok=>{if(finished)return;finished=true;clearTimeout(timer);if(shouldHeroHighlight)clearHeroWordHighlight();resolve(ok)};
    const speakNow=useVoice=>{
      if(token!==speechToken){finish(false);return}
      current=makeUtter(text,lang,role,useVoice);
      current.onend=()=>finish(true);
      current.onerror=()=>{
        // Edge / 手機有時指定 voice 會失敗；失敗時立刻改用該瀏覽器預設語音重讀同一句，不能直接跳到日文。
        if(!triedFallback && useVoice){
          triedFallback=true;
          setTimeout(()=>speakNow(false),120);
        }else{
          finish(false);
        }
      };
      try{
        speechSynthesis.resume&&speechSynthesis.resume();
        speechSynthesis.speak(current);
      }catch(e){
        if(!triedFallback && useVoice){triedFallback=true;setTimeout(()=>speakNow(false),120)}else finish(false);
      }
    };
    const timer=setTimeout(()=>finish(false),hardTimeoutMs(text,lang));
    speakNow(true);
  });
}
async function speakOne(text,lang,role="monk"){
  stopSpeech();
  const token=++speechToken;
  setPlaying(true);
  await waitMs(80);
  await speakStep(text,lang,role,token);
  if(token===speechToken)setPlaying(false);
}
async function speakPair(en,ja,role="monk"){
  stopSpeech();
  const token=++speechToken;
  setPlaying(true);
  await waitMs(80);
  // 必須先英文，再日文；英文失敗時也先用預設語音重試英文，不可直接跳日文。
  await speakStep(en,"en-US",role,token);
  await waitMs(260);
  await speakStep(ja,"ja-JP",role,token);
  if(token===speechToken)setPlaying(false);
}
function speakQuestion(){if(!bgmUserOff)startBgm(true);return speakPair(lessons[idx].en,lessons[idx].ja,"student")}
function speakAnswer(en,ja){if(!bgmUserOff)startBgm(true);return speakPair(en,ja,"monk")}
function speakAnswerLang(text,lang){if(!bgmUserOff)startBgm(true);
  const map={en:"en-US",ja:"ja-JP",zh:"zh-TW"};
  return speakOne(text,map[lang]||"zh-TW","monk");
}

let autoQuestionTimer=null;
function scheduleAutoQuestion(delay=520){
  clearTimeout(autoQuestionTimer);
  autoQuestionTimer=setTimeout(()=>{
    if(document.hidden)return;
    if(playing)return;
    speakQuestion();
  },delay);
}

let BW_waveRaf=0;
function resizeWaveCanvas(){
  const c=$("waveCanvas");
  if(!c)return;
  const dpr=window.devicePixelRatio||1;
  const r=c.getBoundingClientRect();
  c.width=Math.max(1,Math.floor(r.width*dpr));
  c.height=Math.max(1,Math.floor(r.height*dpr));
}
function drawLiveWave(){
  const c=$("waveCanvas");
  if(!c){BW_waveRaf=requestAnimationFrame(drawLiveWave);return}
  const ctx=c.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const w=c.width/dpr,h=c.height/dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const t=performance.now()/1000;
  const active=playing;
  const count=Math.max(34,Math.floor(w/9));
  const gap=4;
  const bw=Math.max(3,Math.floor((w-(count-1)*gap)/count));
  const base=h-12;
  for(let i=0;i<count;i++){
    const x=i*(bw+gap);
    const wave=Math.sin(i*.55+t*5.6)*.5+.5;
    const wave2=Math.sin(i*.22+t*2.7+1.6)*.5+.5;
    const amp=active?(8+wave*21+wave2*8):(5+wave*5);
    const bh=Math.max(5,amp);
    const y=base-bh;
    ctx.fillStyle=i%5===0?"rgba(250,204,21,.86)":"rgba(96,165,250,.82)";
    const r=Math.min(6,bw/2);
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,bw,bh,r);ctx.fill();}
    else{ctx.fillRect(x,y,bw,bh);}
  }
  BW_waveRaf=requestAnimationFrame(drawLiveWave);
}
window.addEventListener("resize",resizeWaveCanvas);
setTimeout(()=>{resizeWaveCanvas();drawLiveWave();},250);


function normalizeMediaUrl(item){
  if(!item)return "";
  if(typeof item==="string")return item;
  if(typeof item==="object")return item.url||item.src||item.photo||item.video||"";
  return String(item||"");
}
function isVideoMedia(url,item=null){
  const type=(item&&typeof item==="object"?String(item.type||item.kind||""):"").toLowerCase();
  return type==="video"||type==="mp4"||/\.(mp4|webm|mov)(\?|#|$)/i.test(String(url||""));
}
function showMedia(item){
  const url=normalizeMediaUrl(item);
  const img=$("photo"), video=$("mediaVideo");
  if(!img||!video||!url)return;
  if(isVideoMedia(url,item)){
    img.style.display="none";
    video.style.display="block";
    if(video.getAttribute("src")!==url){
      video.pause();
      video.src=url;
      video.load();
    }
    video.muted=true;
    video.loop=true;
    video.playsInline=true;
    video.play().catch(()=>{});
  }else{
    video.pause();
    video.removeAttribute("src");
    video.load();
    video.style.display="none";
    img.style.display="block";
    img.src=url;
  }
}


function currentDeviceForLesson(){
  return Math.max(document.documentElement.clientWidth||0, window.innerWidth||0) <= 640 ? "mobile" : "desktop";
}
function lessonUrlFor(l){
  const cat = l.lesson_category || "story";
  const slug = l.lesson_slug || "";
  if(!slug) return "";
  return `/player.html?cat=${encodeURIComponent(cat)}&slug=${encodeURIComponent(slug)}&device=${encodeURIComponent(currentDeviceForLesson())}&preview=1&from=heart&topic=${encodeURIComponent(HEART_TOPIC_SLUG)}`;
}
function renderLessonLink(l){
  const holder = $("lessonLinkHolder");
  if(!holder) return;
  const url = lessonUrlFor(l || {});
  if(!url){
    holder.innerHTML = "";
    holder.style.display = "none";
    return;
  }
  const label = (l && l.lesson_label) ? l.lesson_label : "先看星座補解影片";
  holder.style.display = "";
  holder.innerHTML = `<div id="bwLessonLinkBox"><button id="bwLessonLinkBtn" type="button">▶ ${escapeHtml(label)}</button><span id="bwLessonLinkHint">先看 BookWide 內部 story 教材，再做星座問答。</span></div>`;
  const btn = $("bwLessonLinkBtn");
  if(btn) btn.onclick = (e)=>{ e.preventDefault(); e.stopPropagation(); location.href = url; };
}

function render(){
  idx=Math.max(0,Math.min(idx,Math.max(0,lessons.length-1))); localStorage.setItem("bw_heart_idx_"+HEART_TOPIC_SLUG,idx);
  const l=lessons[idx]; answered=false; correct=false; stopSpeech(); renderLessonLink(l);
  showMedia(photos.length?photos[idx%photos.length]:(HEART_TOPIC&&HEART_TOPIC.cover_url?HEART_TOPIC.cover_url:"")); $("stage").textContent=`第 ${idx+1} 關`; $("title").textContent=l.title; $("scene").textContent=l.scene;
  renderHeroText(l);
  const d=getDone(); $("done").textContent=`${d.length}/${TOTAL}`; $("coins").textContent=`耗${coinCount()}金`; $("nextCoin").textContent=zenProgressText();
  $("complete").textContent=d.includes(l.day)?"已完成":"先答題"; $("complete").classList.remove("ready");
  const cs=[...l.choices].sort(()=>Math.random()-.5); $("choices").innerHTML="";
  cs.forEach((c,i)=>{
    const b=document.createElement("div"); b.className="choice"; b.setAttribute("role","button"); b.setAttribute("tabindex","0");
    b.innerHTML=`<span>${i+1}</span><span class="choiceText"><b>${c.en}</b><small>${c.ja}</small><em>${c.zh}</em></span><span class="voiceBtns"><button type="button" data-say="en">EN</button><button type="button" data-say="ja">日</button><button type="button" data-say="zh">中</button></span>`;
    const choose=async()=>{
      if(correct || b.classList.contains("locked"))return;
      answered=true;
      if(c.correct){
        correct=true;
        b.classList.add("ok");
        await speakAnswer(c.en,c.ja);
        $("complete").textContent="完成本關，進下一關";
        $("complete").classList.add("ready");
      }else{
        markFailed(l.day);
        b.classList.add("bad","locked");
        toast("請選出正確答案才能進下一關");
        $("complete").textContent="請先選出正確答案";
        $("complete").classList.remove("ready");
        await speakAnswer(c.en,c.ja);
      }
    };
    b.onclick=async e=>{
      const langBtn=e.target.closest("[data-say]");
      if(langBtn){
        e.stopPropagation();
        const map={en:c.en,ja:c.ja,zh:c.zh};
        await speakAnswerLang(map[langBtn.dataset.say],langBtn.dataset.say);
        return;
      }
      await choose();
    };
    b.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();choose();}};
    $("choices").appendChild(b);
  });
}
function complete(){
  const l=lessons[idx]; const d=getDone();
  if(!answered){toast("先選一個答案");return}
  if(!correct){toast("要先選出正確答案，才能進下一關");return}
  if(!d.includes(l.day))setDone([...d,l.day]);
  const nd=getDone(); $("done").textContent=`${nd.length}/${TOTAL}`; $("coins").textContent=`耗${coinCount()}金`; $("nextCoin").textContent=zenProgressText();
  $("rewardTitle").textContent=nd.length>=20?`${ZEN_LEVEL_NAME}完成！`:`第 ${l.day} 關完成！`;
  $("rewardText").textContent=zenRewardText(l.day,nd.length);
  $("rewardOk").textContent=nd.length>=20?"完成初一禪語":"進下一關";
  $("reward").classList.add("show");
}
function nextStage(){const target=(idx+1)%lessons.length;if(!confirmPaidBlockIfNeeded(target))return;idx=target;render();scheduleAutoQuestion(520)} function prevStage(){const target=(idx-1+lessons.length)%lessons.length;if(!confirmPaidBlockIfNeeded(target))return;idx=target;render();scheduleAutoQuestion(520)}
$("hero").onclick=e=>{if(e.target.tagName==="BUTTON")return; speakQuestion()};
$("play").onclick=()=>playing?stopSpeech():speakQuestion();
$("next").onclick=nextStage;$("prev").onclick=prevStage;$("photoNext").onclick=nextStage;$("photoPrev").onclick=prevStage;$("complete").onclick=complete;
$("rewardOk").onclick=()=>{$("reward").classList.remove("show");nextStage()};
$("music").onclick=toggleBgm;
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    stopSpeech();
    clearTimeout(autoQuestionTimer);
    const a=bgm();if(a)a.pause();
    const v=$("mediaVideo");if(v)v.pause();
    updateBgmButton();
  }else{
    const v=$("mediaVideo");
    if(v&&v.style.display==="block")v.play().catch(()=>{});
    updateBgmButton();
  }
});
if("onvoiceschanged" in speechSynthesis) speechSynthesis.onvoiceschanged=voices;
bindBgmFirstGesture();
setTimeout(tryAutoBgm,350);
loadHeartTopic()
  .then(loadHeartLessons)
  .then(loadPhotos)
  .then(()=>{
    if(idx >= lessons.length) idx = 0;

  });

console.log("[BookWide] heart-v6-full-monk-engine", HEART_TOPIC_SLUG);
