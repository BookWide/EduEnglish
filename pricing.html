<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BookWide｜方案與定價</title>
<!-- Supabase (for login/level check) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f7f8fa;
    --card:#ffffff;
    --text:#111;
    --muted:#6b7280;
    --brand:#111;
    --line:#e5e7eb;
    --accent:#111;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    position:sticky; top:0;
    background:var(--bg);
    z-index:10;
    border-bottom:1px solid var(--line);
  }
  .wrap{max-width:1152px; margin:0 auto; padding:18px 16px;}
  .title{
    font-size:28px; font-weight:800; letter-spacing:.02em;
  }
  .home-link{
    float:right;
    font-size:15px;
    color:#2563eb;
    text-decoration:none;
    margin-top:4px;
  }
  .home-link:hover{ text-decoration:underline; }
  .notice{
    display:flex; align-items:center; gap:8px;
    background:#eef2ff; border:1px dashed #c7d2fe; color:#3730a3;
    padding:12px 14px; border-radius:10px; margin-top:12px;
  }
  .grid{
    margin-top:14px;
    display:grid; grid-template-columns: repeat(5, 1fr);
    gap:16px;
  }
  .card{
    background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:16px 16px 12px;
    transition:box-shadow .15s, transform .06s;
    min-height:236px;
  }
  .card:hover{ box-shadow:0 6px 18px rgba(0,0,0,.06); transform:translateY(-2px); }
  .card h3{ margin:0 0 6px; font-size:22px; }
  .desc{ margin:0; padding-left:22px; }
  .desc li{ margin:6px 0; }
  .choose{
    margin-top:10px; display:flex; align-items:center; gap:8px;
    font-size:14px; color:#111;
  }
  input[type="checkbox"]{
    width:18px; height:18px;
    appearance:auto; -webkit-appearance:auto; -moz-appearance:auto;
    accent-color:#111;
    margin:0;
  }
  .plans-row{
    margin-top:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .plans{ display:flex; gap:16px; flex-wrap:wrap;}
  .plan{
    background:#111; color:#fff; border-radius:28px; padding:10px 16px; font-size:14px;
    display:inline-flex; align-items:center; gap:8px; border:2px solid #111;
  }
  .plan input[type="radio"]{ appearance:auto; accent-color:#fff; width:16px; height:16px; }
  .plan-extra{
    font-size:14px;
    color:#111;
    white-space:nowrap;
  }
  .cta{
    margin-top:16px;
  }
  .btn{
    background:#111; color:#fff; border-radius:12px; padding:12px 20px;
    border:none; font-size:16px; cursor:pointer;
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <a class="home-link" href="index.html">← 回首頁</a>
    <div class="title">BookWide｜方案與定價</div>
    <div id="notice" class="notice" role="status">  🎯 你已完成英語程度評測<br>
  系統已依你的程度，自動設定「今日口說」與學習起始 Week<br>
  訂閱後即可從最適合你的內容開始學習。</div>
  </div>
</header>

<main class="wrap">
  <h2 style="margin:18px 0 8px">選擇主題</h2>
  <div id="grid" class="grid" aria-label="主題清單"></div>

  <p style="color:#374151; margin:6px 0 14px; line-height:1.6;">
  BookWide 不是從第 1 週開始亂學。你的學習內容會從 <strong>評測對應的 Week</strong> 開始，每週自動銜接下一階段。
</p>
<h2 style="margin:22px 0 10px">選擇方案</h2>
  <div class="plans-row">
    <div class="plans" role="radiogroup" aria-label="方案">
      <label class="plan">
        <input name="plan" type="radio" value="month" checked>
        月繳 NT$1000 / 主題
      </label>
      <label class="plan" style="background:#fff;color:#111;border-color:#111;">
        <input name="plan" type="radio" value="half">
        半年 NT$5400 / 主題
      </label>
      <label class="plan" style="background:#fff;color:#111;border-color:#111;">
        <input name="plan" type="radio" value="year">
        年繳 NT$9600 / 主題
      </label>
    </div>
    <div class="plan-extra">*每周提供 15 片影片</div>
  </div>

  <div class="cta">
    <p style="font-size:14px; color:#6b7280; margin:10px 0 10px; line-height:1.6;">
  ✔ 評測結果已保留　✔ 訂閱完成後不需重新測驗　✔ 立即接續你的「今日口說」內容
</p>
<button id="go" class="btn">前往結帳</button>
  </div>
</main>

<footer style="text-align:center;color:#999;padding:40px 0;">BookWide © 2025</footer>

<script>
// v20260117: Level Survey 改為「訂閱後再測」
// - pricing.html 不再強制導去 level-survey

// -----------------------------
// 讀取推薦碼（ref）
// -----------------------------
const urlParams = new URLSearchParams(location.search);
const REF_CODE = urlParams.get('ref') || '';

// -----------------------------
// 主題列表（預設）
// -----------------------------
const DEFAULT_TOPICS = [
  { key:'story', title:'故事 Story', description:[
    '分級故事影片與字幕','單字 / 文法 / 閱讀測驗','可列印成績單'
  ], sort:1 },
  { key:'music', title:'音樂 Music', description:[
    '歌曲影片，歌詞雙語字幕','關鍵單詞小測驗','收藏精選歌曲'
  ], sort:2 },
  { key:'movie', title:'電影 Movie', description:[
    '電影片段學英文','情境會話 / 片語重點','主題測驗可列印'
  ], sort:3 },
  { key:'news', title:'實況 News', description:[
    '看情景劇動畫學英語培養英語思維提升詞彙語法口語聽力'
  ], sort:4 },
  { key:'pro', title:'基礎英語語法 Grammar', description:[
    '基礎文法動畫課程：冠詞、名詞、動詞、時態、介系詞',
    '中英例句與常見錯誤對照，搞懂中文與英文差異',
    '每講附小測驗與練習題，可列印成文法練習卷'
  ], sort:5 }
];

// -----------------------------
// 渲染主題卡片
// -----------------------------
function render(topics){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  topics.sort((a,b)=>(a.sort||0)-(b.sort||0)).forEach(t=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <h3>${t.title}</h3>
      <ul class="desc">${(t.description||[]).map(li=>`<li>${li}</li>`).join('')}</ul>
      <label class="choose">
        <input type="checkbox" data-key="${t.key}" checked disabled>
        <span>勾選這個主題</span>
      </label>
    `;
    grid.appendChild(card);
  });
}

// -----------------------------
// 按「前往結帳」
// -----------------------------
document.getElementById('go').addEventListener('click', ()=>{
  const keys = [...document.querySelectorAll('input[type="checkbox"]')]
    .filter(i=>i.checked).map(i=>i.dataset.key);

  const plan = document.querySelector('input[name="plan"]:checked').value;

  const url = new URL('./checkout.html', location.href);
  url.searchParams.set('topics', keys.join(','));
  url.searchParams.set('plan', plan);

  // ★ 把推薦碼帶到 checkout.html
  if (REF_CODE) url.searchParams.set('ref', REF_CODE);

  location.href = url.toString();
});

// -----------------------------
render(DEFAULT_TOPICS);
// -----------------------------
</script>

</body>
</html>
