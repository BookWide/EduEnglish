<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V49 教材仿寫引擎（SUNO版）</title>
<style>
body { background:#111; color:#eee; font-family:Arial, sans-serif; padding:20px; line-height:1.45; }
h2 { margin-top:0; }
textarea { width:100%; min-height:120px; margin:8px 0 14px; background:#222; color:#0f0; padding:10px; border:1px solid #444; box-sizing:border-box; }
button { padding:10px 18px; margin:4px 6px 4px 0; background:#ff6600; color:#fff; border:none; cursor:pointer; border-radius:6px; }
button.secondary { background:#444; }
.block { border:1px solid #444; padding:15px; margin:15px 0; border-radius:10px; background:#181818; }
.meta { color:#9ad; margin:4px 0; word-break:break-all; }
.topbar { margin-bottom:18px; }
.notice { color:#ffd27d; margin:10px 0 18px; }
.small { font-size:12px; color:#aaa; }
input[type="file"] { margin-right:8px; }
</style>
</head>
<body>

<h2>🎵 V49 教材仿寫引擎（SRT → SUNO）</h2>
<div class="topbar">
    <input type="file" id="fileInput" accept=".srt">
    <button onclick="parseSRT()">解析 SRT</button>
    <button class="secondary" onclick="exportManifest()">匯出 manifest.json</button>
</div>

<div class="notice">
    這版已加入：Part 編號、key phrase、建議檔名、manifest.json 匯出。<br>
    之後 Suno 下載 mp3 放進 google_parts，執行 MAKE_MP3.bat 即可自動比對與組合 final.mp3。
</div>

<div id="output"></div>

<script>
let latestParts = [];
let latestSourceName = "";

function normalizeText(text){
    return (text || "")
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fff\s]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function slugify(text, maxWords=8){
    const words = normalizeText(text).split(' ').filter(Boolean).slice(0, maxWords);
    return (words.join('_') || 'part').slice(0, 80);
}

function simplifySentence(s){
    return s.trim().split(/\s+/).slice(0,5).join(' ');
}

function buildPartsFromText(text){
    const lines = text.split(/\r?\n/);
    let sentences = [];

    for (let i = 0; i < lines.length; i++) {
        let t = lines[i].trim();
        if (!t) continue;
        if (t.includes('-->')) continue;
        if (/^\d+$/.test(t)) continue;
        sentences.push(t);
    }

    let simple = sentences.map(simplifySentence).filter(Boolean);
    let parts = [];

    for (let i=0; i<simple.length; i+=4){
        const chunk = simple.slice(i, i+4);
        const partNo = parts.length + 1;
        const partId = String(partNo).padStart(3,'0');
        const keyPhrase = chunk[0] || `part ${partId}`;
        const slug = slugify(keyPhrase);
        const lyrics = chunk.map(line => `${line}\n${line}`).join('\n\n');
        parts.push({
            part_no: partNo,
            part_id: partId,
            key_phrase: keyPhrase,
            slug: slug,
            suggested_filename: `${partId}_${slug}.mp3`,
            lyrics: lyrics,
            lines: chunk
        });
    }

    return parts;
}

function parseSRT() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) {
        alert('請先選 SRT');
        return;
    }

    latestSourceName = file.name;
    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        latestParts = buildPartsFromText(text);
        render(latestParts);
    };
    reader.readAsText(file, 'utf-8');
}

function render(parts){
    let html = '';

    parts.forEach((p) => {
        const style = `Upbeat educational kids song.\n90-105 BPM, cheerful, light rhythm.\nSimple melody, catchy, fun for children.\nClear pronunciation, not too fast.\nFemale voice, friendly and lively.\nPause between lines.`;

        html += `
        <div class="block">
            <h3>Part ${p.part_id}</h3>
            <div class="meta"><b>Key phrase：</b> ${escapeHtml(p.key_phrase)}</div>
            <div class="meta"><b>建議檔名：</b> ${escapeHtml(p.suggested_filename)}</div>
            <div class="meta"><b>行數：</b> ${p.lines.length}</div>

            <b>Lyrics</b>
            <textarea>${escapeHtml(p.lyrics)}</textarea>

            <b>Style（貼到 SUNO）</b>
            <textarea>${escapeHtml(style)}</textarea>

            <b>建議檔名（可手動貼到你自己記錄）</b>
            <textarea>${escapeHtml(p.suggested_filename)}</textarea>

            <button onclick="copyNthTextarea(this, 0)">複製 Lyrics</button>
            <button onclick="copyNthTextarea(this, 1)">複製 Style</button>
            <button class="secondary" onclick="copyNthTextarea(this, 2)">複製檔名</button>
        </div>`;
    });

    document.getElementById('output').innerHTML = html;
}

function copyNthTextarea(btn, idx){
    const list = btn.parentElement.querySelectorAll('textarea');
    const ta = list[idx];
    ta.focus();
    ta.select();
    document.execCommand('copy');
    alert('已複製');
}

function exportManifest(){
    if (!latestParts.length) {
        alert('請先解析 SRT');
        return;
    }

    const data = {
        version: 'V49-manifest',
        source_file: latestSourceName,
        created_at: new Date().toISOString(),
        rule: '每4句一段；每句取前5個單字；每行重複一次做 lyrics',
        parts: latestParts
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'manifest.json';
    a.click();
    URL.revokeObjectURL(a.href);
}

function escapeHtml(str){
    return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
</script>

</body>
</html>
