<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>V49 教材仿寫引擎（SUNO版）</title>
<style>
body { background:#111; color:#eee; font-family:Arial; padding:20px; }
textarea { width:100%; height:150px; margin:10px 0; background:#222; color:#0f0; padding:10px; }
button { padding:10px 20px; margin:5px; background:#ff6600; color:#fff; border:none; cursor:pointer; }
.block { border:1px solid #444; padding:15px; margin:15px 0; }
</style>
</head>

<body>

<h2>🎵 V49 教材仿寫引擎（SRT → SUNO）</h2>

<input type="file" id="fileInput">
<button onclick="parseSRT()">解析 SRT</button>

<div id="output"></div>

<script>
function parseSRT() {
    const file = document.getElementById('fileInput').files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.split('\n');
        let sentences = [];

        for (let i=0;i<lines.length;i++) {
            let t = lines[i].trim();
            if (t && !t.includes('-->') && isNaN(t)) {
                sentences.push(t);
            }
        }

        // 🔥 教材仿寫（簡化 + 重組）
        let simple = sentences.map(s=>{
            return s.split(' ').slice(0,5).join(' ');
        });

        // 🔥 分段（每4句一段）
        let parts = [];
        for (let i=0;i<simple.length;i+=4){
            parts.push(simple.slice(i,i+4));
        }

        render(parts);
    };

    reader.readAsText(file);
}

function render(parts){
    let html = "";

    parts.forEach((p,idx)=>{

        let lyrics = "";
        p.forEach(line=>{
            lyrics += line + "\n" + line + "\n\n"; // 重複句
        });

        let style = `Upbeat educational kids song.
90-105 BPM, cheerful, light rhythm.
Simple melody, catchy, fun for children.
Clear pronunciation, not too fast.
Female voice, friendly and lively.
Pause between lines.`;


        html += `
        <div class="block">
            <h3>Part ${idx+1}</h3>

            <b>Lyrics</b>
            <textarea>${lyrics}</textarea>

            <b>Style（貼到 SUNO）</b>
            <textarea>${style}</textarea>

            <button onclick="copyText(this)">複製 Lyrics</button>
        </div>
        `;
    });

    document.getElementById("output").innerHTML = html;
}

function copyText(btn){
    let ta = btn.parentElement.querySelector("textarea");
    ta.select();
    document.execCommand("copy");
    alert("已複製！");
}
</script>

</body>
</html>
