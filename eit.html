<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>BookWide 通用測驗報告</title>
<style>
:root{--bg:#07162d;--card:#f8fbff;--ink:#12223d;--muted:#60708b;--line:#d8e4f4;--accent:#367cff;--accent2:#63a4ff;--soft:#eaf3ff;--shadow:0 20px 60px rgba(0,0,0,.28)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,"Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 70% -10%,#33415d 0,#101f38 32%,var(--bg) 68%)}
body{padding:18px;display:grid;place-items:center}.page{width:min(980px,100%);height:min(930px,calc(100vh - 36px));min-height:680px;background:var(--card);border-radius:26px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-rows:auto auto 1fr auto}
.topbar{height:74px;background:#071a36;color:#fff;display:flex;align-items:center;padding:10px 24px;gap:13px}.logo{width:48px;height:48px;object-fit:contain;flex:0 0 auto}.brand h1{font-size:24px;line-height:1;margin:0;font-weight:850;letter-spacing:.2px}.brand p{font-size:12px;margin:5px 0 0;color:#cfe0ff}.actions{margin-left:auto;display:flex;gap:8px}.btn{border:1px solid rgba(255,255,255,.28);background:#10294d;color:#fff;border-radius:999px;padding:9px 14px;font-weight:700;cursor:pointer}.hero{margin:16px 22px 0;padding:18px 22px;border:1px solid var(--line);border-radius:20px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;background:linear-gradient(110deg,#fff 0,#eef5ff 60%,#d9e9ff 100%);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-30px;top:-55px;width:230px;height:230px;border-radius:50%;background:linear-gradient(135deg,rgba(54,124,255,.18),rgba(255,255,255,.2))}.eyebrow{font-size:12px;letter-spacing:2px;color:var(--accent);font-weight:850;text-transform:uppercase}.hero h2{font-size:29px;margin:8px 0 4px;line-height:1.18}.hero p{margin:0;color:var(--muted);font-size:14px}.mini-logo{width:86px;height:70px;object-fit:contain;z-index:1;filter:drop-shadow(0 8px 12px rgba(10,36,84,.15))}.content{padding:15px 22px 10px;display:grid;grid-template-columns:minmax(0,1.32fr) minmax(275px,.68fr);gap:14px;min-height:0}.panel{border:1px solid var(--line);border-radius:18px;background:#fff;min-height:0}.main{padding:18px 20px;display:grid;grid-template-rows:auto auto auto 1fr;gap:12px}.meta{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted)}.pill{padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:#f7faff}.score-row{display:flex;align-items:end;gap:14px}.score{font-size:54px;line-height:.9;font-weight:900;letter-spacing:-2px}.score small{font-size:19px;color:var(--muted);font-weight:750;letter-spacing:0}.result-title{font-size:27px;color:var(--accent);font-weight:900;margin:0 0 3px}.result-sub{color:var(--muted);font-size:13px}.summary{font-size:16px;line-height:1.65;margin:0;color:#33435d}.gauge-wrap{align-self:end}.gauge{height:26px;border-radius:999px;display:flex;position:relative;overflow:visible;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}.zone{height:100%}.zone:first-child{border-radius:999px 0 0 999px}.zone:last-child{border-radius:0 999px 999px 0}.marker{position:absolute;top:-9px;width:5px;height:44px;border-radius:4px;background:#101a2d;transform:translateX(-50%);box-shadow:0 2px 5px rgba(0,0,0,.28)}.ticks{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px}.side{padding:16px;display:grid;grid-template-rows:auto 1fr auto;gap:12px}.side h3{margin:0;font-size:17px}.snapshot{display:grid;gap:9px;align-content:start}.snap{border:1px solid var(--line);border-radius:13px;padding:10px 12px;background:#fbfdff}.snap strong{font-size:13px;display:block;margin-bottom:4px}.snap span{font-size:12px;color:var(--muted);line-height:1.4}.note{font-size:12px;line-height:1.5;padding:11px;border-radius:13px;background:var(--soft);border:1px solid #bfd5ff;color:#405572}.footer{padding:0 22px 16px;display:flex;justify-content:space-between;gap:12px;color:#7a879d;font-size:11px}.error{padding:40px;font-size:18px;color:#9b1c1c}.hide{display:none!important}
@media(max-width:760px){body{padding:0}.page{height:100dvh;min-height:620px;border-radius:0}.topbar{height:62px;padding:8px 14px}.logo{width:40px;height:40px}.brand h1{font-size:20px}.hero{margin:10px 12px 0;padding:13px 15px}.hero h2{font-size:22px}.mini-logo{width:62px;height:52px}.content{padding:10px 12px 7px;grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) auto}.main{padding:14px;gap:9px}.score{font-size:42px}.result-title{font-size:23px}.summary{font-size:14px;line-height:1.48}.side{padding:12px;grid-template-columns:auto 1fr;grid-template-rows:auto auto}.snapshot{grid-template-columns:repeat(3,1fr);gap:6px}.snap{padding:8px}.snap span{display:none}.note{grid-column:1/-1}.footer{padding:0 12px 9px}.actions .btn:first-child{display:none}}
@media(max-width:520px){.side{display:none}.content{grid-template-rows:1fr}.hero p{display:none}.hero{grid-template-columns:1fr auto}.main{grid-template-rows:auto auto auto 1fr}.summary{max-height:9.2em;overflow:auto}.footer span:last-child{display:none}}
@media print{@page{size:A4 portrait;margin:8mm}html,body{background:#fff}.page{width:100%;height:277mm;min-height:0;border-radius:0;box-shadow:none}.actions{display:none}.topbar{print-color-adjust:exact;-webkit-print-color-adjust:exact}.hero,.panel,.note,.gauge{break-inside:avoid}}
</style>
</head>
<body>
<main class="page" id="page">
  <header class="topbar">
    <img class="logo" src="bookwide_logo.png" alt="BookWide" />
    <div class="brand"><h1>BookWide</h1><p id="brandSub">通用測驗分析報告｜英・日・中</p></div>
    <div class="actions"><button class="btn" id="reloadBtn">重新讀取</button><button class="btn" onclick="window.print()">列印 / PDF</button></div>
  </header>
  <section class="hero">
    <div><div class="eyebrow">BOOKWIDE TEST REPORT</div><h2 id="reportTitle">載入中…</h2><p id="reportDesc"></p></div>
    <img class="mini-logo" src="bookwide_logo.png" alt="" />
  </section>
  <section class="content" id="content">
    <article class="panel main">
      <div class="meta"><span class="pill" id="owner">報告對象：訪客</span><span class="pill" id="completed">完成題數：—</span><span class="pill" id="created">產生時間：—</span></div>
      <div class="score-row"><div class="score"><span id="score">0</span><small> / <span id="maxScore">100</span></small></div><div><div class="result-title" id="resultTitle">結果分析</div><div class="result-sub" id="resultSub">依 JSON 分數區間自動判讀</div></div></div>
      <p class="summary" id="summary"></p>
      <div class="gauge-wrap"><div class="gauge" id="gauge"><i class="marker" id="marker"></i></div><div class="ticks" id="ticks"></div></div>
    </article>
    <aside class="panel side"><h3>人格／能力快照</h3><div class="snapshot" id="snapshot"></div><div class="note" id="disclaimer"></div></aside>
  </section>
  <footer class="footer"><span>BookWide 通用測驗報告模板</span><span>資料來源：目前載入的 JSON｜結果僅供參考</span></footer>
</main>
<script>
const $=s=>document.querySelector(s);
const qs=new URLSearchParams(location.search);
const lang=qs.get('lang')||'zh';
const jsonFile=qs.get('json')||'aptitude-analysis.json';
const pick=(obj,base,fb='')=>obj?.[base+'_'+lang] ?? obj?.[base+'_zh'] ?? obj?.[base] ?? fb;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function readSavedScore(data){
  const direct=Number(qs.get('score')); if(Number.isFinite(direct)) return direct;
  const slug=data.slug||data.topic||'bookwide-test';
  const keys=[`${slug}:score`,`${slug}_score`,'bookwide_test_score','aptitude_score','gender_tendency_score'];
  for(const k of keys){const n=Number(localStorage.getItem(k));if(Number.isFinite(n))return n;}
  try{const ans=JSON.parse(localStorage.getItem(`${slug}:answers`)||'null');if(ans&&typeof ans==='object'){
    let sum=0,used=0; data.questions?.forEach((q,i)=>{const key=ans[i]??ans[q.day]??ans[q.id];if(key==null)return;const c=q.choices?.find(x=>x.key===key||x.value===key||x.id===key);const n=Number(c?.aptitude_score??c?.score?.total_score??c?.score);if(Number.isFinite(n)){sum+=n;used++;}});if(used)return sum;
  }}catch(e){}
  return Number(data.result_gauge?.default_score ?? data.score_model?.score_range?.max/2 ?? 50);
}
function levels(data){return data.analysis?.result_levels||data.gender_tendency_analysis?.ranges||data.result_levels||data.results||[]}
function zones(data,lvls,min,max){return data.result_gauge?.zones||lvls.map((x,i)=>({from:x.from,to:x.to,label_zh:pick(x,'label','區間 '+(i+1)),color:['#4f8df7','#ffe38c','#fa7186','#78d6b0'][i%4]}))}
function snapshots(data,level){
  const arr=data.report_snapshot||data.profile_snapshot||level?.snapshot||[];
  if(Array.isArray(arr)&&arr.length)return arr.slice(0,3).map((x,i)=>typeof x==='string'?{title:'重點 '+(i+1),text:x}:x);
  const cats=Object.values(data.categories||{}).slice(0,3);
  if(cats.length)return cats.map((x,i)=>({title:x[lang]||x.zh||x.en||'面向 '+(i+1),text:['主要反應特徵','日常行為傾向','情境判斷方式'][i]}));
  return [{title:'核心傾向',text:pick(level,'label','結果區間')},{title:'分數位置',text:'依總分落點判讀'},{title:'使用方式',text:'可替換不同主題 JSON'}];
}
function render(data){
  const min=Number(data.result_gauge?.min_score??data.score_model?.score_range?.min??0), max=Number(data.result_gauge?.max_score??data.score_model?.score_range?.max??100), score=clamp(readSavedScore(data),min,max);
  const lvls=levels(data), level=lvls.find(x=>score>=Number(x.from??min)&&score<=Number(x.to??max))||lvls[0]||{};
  $('#reportTitle').textContent=pick(data,'title','BookWide 測驗報告'); $('#reportDesc').textContent=pick(data,'description','通用測驗分析');
  $('#brandSub').textContent=(pick(data,'title','通用測驗')||'通用測驗')+'｜'+(data.questions?.length||0)+'題｜英・日・中';
  $('#score').textContent=Math.round(score); $('#maxScore').textContent=max; $('#resultTitle').textContent='結果：'+pick(level,'label','分析完成'); $('#summary').textContent=pick(level,'summary',pick(data.analysis||{},'disclaimer','結果僅供參考。'));
  $('#owner').textContent='報告對象：'+(qs.get('name')||localStorage.getItem('bookwide_display_name')||'訪客'); $('#completed').textContent='完成題數：'+(qs.get('completed')||data.questions?.length||'—')+' / '+(data.questions?.length||'—'); $('#created').textContent='產生時間：'+new Date().toLocaleString('zh-TW',{hour12:false});
  const zs=zones(data,lvls,min,max), g=$('#gauge'); g.querySelectorAll('.zone').forEach(x=>x.remove());
  zs.forEach((z,i)=>{const el=document.createElement('span');el.className='zone';el.style.width=((Number(z.to)-Number(z.from)+(i===zs.length-1?0:1))/(max-min)*100)+'%';el.style.background=z.color||['#4c86ed','#ffe38c','#fa7186'][i%3];g.insertBefore(el,$('#marker'));});
  $('#marker').style.left=((score-min)/(max-min)*100)+'%'; const ticks=data.result_gauge?.ticks||[min,max]; $('#ticks').innerHTML=ticks.map(x=>`<span>${x}</span>`).join('');
  $('#snapshot').innerHTML=snapshots(data,level).map(x=>`<div class="snap"><strong>${x.title||x.label||'重點'}</strong><span>${x.text||x.summary||''}</span></div>`).join('');
  $('#disclaimer').textContent=pick(data.analysis||{},'disclaimer',pick(data.score_model?.important_disclaimer||{},'',data.gender_tendency_analysis?.disclaimer_zh||'本報告為非診斷型參考。'))||data.gender_tendency_analysis?.disclaimer_zh||'本報告為非診斷型參考。';
}
async function load(){try{const r=await fetch(jsonFile+'?v='+Date.now());if(!r.ok)throw new Error(r.status+' '+r.statusText);render(await r.json())}catch(e){$('#content').innerHTML='<div class="error">JSON 載入失敗：'+e.message+'<br><small>請用網址參數指定：?json=你的檔案.json&score=分數</small></div>'}}
$('#reloadBtn').onclick=load;load();
</script>
</body>
</html>
