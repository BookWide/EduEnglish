<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide 通用心理測驗</title>
<style>
:root{
  --bg:#06172f;--bg2:#173763;--panel:#0b2447;--panel2:#0e2b52;--line:#2a5f93;--line2:#345b87;
  --text:#fff;--muted:#c8dcf7;--muted2:#97b5d9;--gold:#ffca21;--blue:#5c97ff;--green:#1fba83;--orange:#ff9800;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(90deg,#183865 0 28%,#071a36 28% 100%);color:var(--text)}
body{display:flex;justify-content:center}
button{font:inherit}
.app{width:min(680px,100%);min-height:100vh;background:#06172f;padding:6px 14px 10px}
header{display:flex;align-items:center;gap:10px;height:44px;margin-bottom:3px}
.logo{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.brand{line-height:1}.brand b{display:block;font-size:18px;font-weight:800}.brand small{display:block;font-size:10px;color:#d8e8ff}
.testPicker{margin-left:auto;max-width:220px;border:1px solid #58799f;background:#102746;color:#fff;border-radius:999px;padding:6px 12px;font-weight:700;cursor:pointer}.testPicker option{background:#102746;color:#fff}.console{border:1px solid #58799f;background:#102746;color:#fff;border-radius:999px;padding:6px 13px;font-weight:700;cursor:pointer}
.hero{position:relative;height:202px;border-radius:24px;overflow:hidden;border:1px solid #3b678f;background:linear-gradient(135deg,#375370,#102848 60%,#0d2340);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset}
.hero::before{content:"";position:absolute;inset:-4%;background-image:var(--hero-bg,none);background-size:cover;background-position:center;filter:blur(3px) brightness(.96) saturate(1.04);transform:scale(1.02)}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,10,25,.08),rgba(0,11,26,.22) 48%,rgba(4,14,31,.48))}
.qtext{position:absolute;inset:0;display:grid;place-content:center;text-align:center;padding:16px 46px 38px;text-shadow:0 2px 5px rgba(0,0,0,.92);z-index:2}
.qtext .en{font-size:19px;line-height:1.08;font-weight:800;letter-spacing:.05px}
.qtext .ja,.qtext .zh{font-size:11px;font-weight:700;line-height:1.2}.qline{display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-top:5px}.inlineSpeak{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.42);background:rgba(10,28,49,.54);color:#fff;font-size:14px;display:grid;place-items:center;cursor:pointer;flex:0 0 auto}
.heroBtn,.speakMini{position:absolute;z-index:3;display:grid;place-items:center;border-radius:50%;border:1px solid rgba(255,255,255,.45);background:rgba(10,28,49,.48);color:#fff;backdrop-filter:blur(3px);cursor:pointer}
.heroBtn{top:50%;transform:translateY(-50%);width:40px;height:40px;font-size:28px}
.prev{left:12px}.next{right:12px}
.speakMini{right:12px;top:58%;width:34px;height:34px;font-size:17px}
.bars{position:absolute;left:0;right:0;bottom:0;height:40px;display:flex;align-items:flex-end;gap:4px;padding:0 8px 7px;z-index:2}
.bars i{flex:1;border-radius:5px;background:#4b8ee8;height:10px;opacity:.96}.bars i:nth-child(5n){background:#e6b300}.bars i:nth-child(3n){height:22px}.bars i:nth-child(4n){height:16px}.bars i:nth-child(7n){height:28px}.bars i:nth-child(2n){height:18px}
.status{display:flex;gap:6px;margin:6px 0 6px;flex-wrap:wrap}.pill{border:1px solid #3f6693;border-radius:999px;padding:4px 10px;font-size:11px;background:#0b2342;color:#fff}.pill.gold{color:#ffd84d}
.card{border:1px solid #2d659c;border-radius:20px;background:linear-gradient(180deg,#0a2447,#0b1f3d);overflow:hidden}
.cardhead{display:flex;align-items:center;gap:6px;padding:7px 9px 5px}.cardhead h2{font-size:17px;margin:0;font-weight:800}.tag{border-radius:999px;padding:6px 10px;background:linear-gradient(100deg,#ff8a10,#ffbd55,#d77ff2);font-weight:800;white-space:nowrap;font-size:12px}
.controls{margin-left:auto;display:flex;align-items:center;gap:7px;flex-wrap:nowrap}
.circle,.play{border-radius:50%;border:1px solid #5b7da3;background:#102c4d;color:#fff;cursor:pointer}.circle{width:40px;height:40px;font-size:19px}.play{width:52px;height:52px;background:#4b89f7;border:3px solid #cfe1ff;font-size:22px}.music{background:#0b6a57;border-color:#1caf81}.first{border-radius:999px;border:0;background:#ff9700;color:#fff;padding:9px 13px;font-weight:800;cursor:pointer;white-space:nowrap;font-size:12px}
.prompt{padding:0 8px 4px;font-weight:700;font-size:13px}.choices{padding:0 7px 4px}.choice{display:grid;grid-template-columns:30px 1fr 40px;gap:8px;align-items:center;margin:4px 0;padding:8px 9px;border:1px solid #2b537c;border-radius:15px;background:#102643;cursor:pointer;transition:.16s ease}.choice:hover{background:#14335a}.choice.selected{outline:2px solid #4f95ff;background:#16355e}
.num{font-size:16px;text-align:center}.ctext .en{font-size:12px;font-weight:800;line-height:1.1}.ctext .ja{font-size:10px;color:#e2ccff;margin-top:2px;line-height:1.08}.ctext .zh{font-size:10px;color:#dbeafb;margin-top:1px;line-height:1.08}.langs{display:grid;gap:3px}.langs button{border:1px solid #4175ad;background:#12355e;color:#fff;border-radius:999px;height:22px;cursor:pointer;font-size:10px}
.submit{width:calc(100% - 14px);margin:0 7px 7px;border:1px solid #6d8298;background:#32465b;color:#fff;border-radius:999px;padding:8px;font-size:14px;cursor:pointer}
.result{display:none;padding-top:2px}.result.show{display:block}
.report{background:#f3f6fb;color:#1c2a3a;border-radius:22px;padding:18px 18px 16px}
.reportHero{position:relative;height:126px;border-radius:22px;overflow:hidden;border:1px solid #d5e0ee;background:linear-gradient(120deg,#eef4fc,#d7e3f3 55%,#d0dbec)}
.reportHero::before{content:"";position:absolute;inset:-6%;background-image:var(--report-bg,none);background-size:cover;background-position:center;filter:blur(7px) brightness(.92) saturate(.9);transform:scale(1.08)}
.reportHero::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.92) 0 40%,rgba(255,255,255,.58) 62%,rgba(255,255,255,.16) 100%)}
.reportHeroText{position:absolute;left:26px;top:50%;transform:translateY(-50%);z-index:2;color:#1d2b44;max-width:70%}
.reportHeroText small{display:block;font-size:12px;letter-spacing:.18em;color:#2c62d8;margin-bottom:8px}.reportHeroText h1{margin:0;font-size:22px;line-height:1.1}.reportHeroText div{margin-top:8px;font-size:14px;color:#23395a}
.meta{margin-top:12px;border:1px solid #d4e0ef;border-radius:18px;padding:13px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;background:#fff}.meta small{display:block;color:#7085a0;font-size:12px;margin-bottom:5px}.meta b{display:block;font-size:15px;color:#203150;line-height:1.3}
.scoreline{margin-top:22px;font-size:17px;font-weight:800;color:#44556d}.scoreline span{font-size:21px;color:#213354}.resultTitle{font-size:21px;color:#4282ff;margin:12px 0 16px;line-height:1.2}.summary{font-size:14px;line-height:1.8;color:#36485f;font-weight:700}
.resultPhoto{display:none;width:100%;height:96px;object-fit:cover;border-radius:18px;margin:16px 0 10px;filter:blur(1.2px) brightness(1.0) saturate(.98)}
.chart{margin-top:18px}.gaugeWrap{position:relative;padding-top:6px}.gauge{height:24px;border-radius:999px;overflow:hidden;display:flex;position:relative}.gauge span{height:100%}.marker{position:absolute;top:-12px;width:5px;height:40px;background:#111a29;border-radius:4px;box-shadow:0 0 0 1px rgba(255,255,255,.25)}
.ticks{display:flex;justify-content:space-between;font-size:12px;color:#63748d;margin-top:8px;padding:0 2px}.explain{margin-top:20px;border:1px solid #d2def1;background:#e9f0fb;border-radius:16px;padding:14px 16px;font-size:13px;line-height:1.65;color:#4f6076}
.error{position:absolute;inset:0;display:grid;place-content:center;padding:30px;text-align:center;font-size:28px;font-weight:900;z-index:3;text-shadow:0 2px 4px rgba(0,0,0,.75)}.error small{display:block;font-size:14px;margin-top:10px;font-weight:700}
.hidden{display:none!important}
@media (max-width:720px){
  html,body{background:#06172f}
  .app{padding:4px 6px 8px}
  header{height:40px;gap:6px}.logo{width:28px;height:28px}.brand b{font-size:16px}.brand small{font-size:9px}.testPicker{max-width:140px;padding:5px 9px;font-size:10px}.console{padding:5px 11px}
  .hero{height:182px;border-radius:20px}.heroBtn{width:32px;height:32px;font-size:22px}.qtext{padding:12px 36px 34px}.qtext .en{font-size:16px}.qtext .ja,.qtext .zh{font-size:10px}.inlineSpeak{width:24px;height:24px;font-size:12px}.bars{height:36px;padding:0 6px 6px}.bars i:nth-child(3n){height:20px}.bars i:nth-child(7n){height:24px}
  .status{gap:5px;margin:5px 0}.pill{font-size:10px;padding:3px 8px}
  .cardhead{padding:6px 8px;gap:5px;flex-wrap:wrap}.cardhead h2{font-size:16px}.tag{padding:6px 10px;font-size:11px}.controls{margin-left:0;margin-top:2px;width:100%;justify-content:flex-end}.first{padding:7px 12px;font-size:11px}.circle{width:34px;height:34px}.play{width:46px;height:46px}
  .prompt{padding:0 7px 4px;font-size:12px}.choices{padding:0 5px 4px}.choice{grid-template-columns:22px 1fr 32px;padding:7px 7px 7px 5px;border-radius:14px;margin:4px 0}.num{font-size:15px}.ctext .en{font-size:11px;line-height:1.08}.ctext .ja,.ctext .zh{font-size:9px;line-height:1.05}.langs button{height:20px;font-size:9px}
  .submit{padding:8px;margin:0 6px 7px;font-size:14px}
  .report{padding:12px 10px}.reportHero{height:108px}.reportHeroText{left:16px;max-width:76%}.reportHeroText h1{font-size:16px}.reportHeroText div{font-size:11px}.meta{grid-template-columns:repeat(2,1fr);gap:8px;padding:10px}.scoreline{margin-top:14px;font-size:15px}.resultTitle{font-size:17px}.summary{font-size:12px}.resultPhoto{height:88px}.gauge{height:20px}.marker{height:34px;top:-9px}
}
</style>
</head>
<body>
<main class="app">
<header>
  <img class="logo" alt="BookWide" src="bookwide_logo.png">
  <div class="brand"><b>BookWide</b><small id="subtitle">通用心理測驗｜英・日・中</small></div>
  <select class="testPicker" id="testPicker" title="切換心理測驗">
    <option value="aptitude-analysis.json">男女傾向測驗</option>
    <option value="left-right-zodiac-potential.json">左右腦・星座潛能測驗</option>
  </select>
  <button class="console" onclick="location.href='index.html'">控制台</button>
</header>

<section id="testView">
  <div class="hero" id="hero">
    <button class="heroBtn prev" id="prev">‹</button>
    <div class="qtext">
      <div class="en" id="qEn">載入中…</div>
      <div class="qline"><span class="ja" id="qJa"></span><button class="inlineSpeak" id="speakJa" title="朗讀日文">🔊</button></div>
      <div class="qline"><span class="zh" id="qZh"></span><button class="inlineSpeak" id="speakZh" title="朗讀中文">🔊</button></div>
    </div>
    <button class="heroBtn next" id="next">›</button>
    <button class="speakMini" id="speakQ">🔊</button>
    <div class="bars" id="bars"></div>
  </div>

  <div class="status">
    <span class="pill" id="testName">BookWide 通用測驗</span>
    <span class="pill" id="progress">1/30</span>
    <span class="pill" id="answered">0/30</span>
    <span class="pill gold">英・日・中</span>
  </div>

  <section class="card">
    <div class="cardhead">
      <h2 id="qTitle">通用測驗 Q1</h2>
      <span class="tag">選出最像你的反應</span>
      <div class="controls">
        <button class="first" id="playAll">自動朗讀</button>
        <button class="circle" id="prev2">‹</button>
        <button class="play" id="playBtn">▶</button>
        <button class="circle music" id="musicBtn">♫</button>
        <button class="circle" id="next2">›</button>
      </div>
    </div>
    <div class="prompt">選出最像你的反應：</div>
    <div class="choices" id="choices"></div>
    <button class="submit" id="submitBtn">先答題</button>
  </section>
</section>

<section class="result" id="resultView">
  <div class="report">
    <div class="reportHero" id="reportHero">
      <div class="reportHeroText">
        <small>BOOKWIDE TEST REPORT</small>
        <h1 id="reportName">BookWide 心理測驗</h1>
        <div id="reportCount">測驗分析｜英・日・中</div>
      </div>
    </div>

    <div class="meta">
      <div><small>報告對象 / Report owner</small><b id="owner">受測者</b></div>
      <div><small>帳號狀態 / Account</small><b>已完成測驗</b></div>
      <div><small>完成題數 / Completed</small><b id="doneCount">0 / 0</b></div>
      <div><small>產生時間 / Created</small><b id="created"></b></div>
    </div>

    <div class="scoreline">你的分數：<span id="score">0</span> / <span id="maxScore">0</span></div>
    <h2 class="resultTitle" id="resultTitle">結果</h2>
    <div class="summary" id="resultSummary"></div>
    <img id="resultPhoto" class="resultPhoto" alt="結果附圖">
    <div class="chart">
      <div class="gaugeWrap">
        <div class="gauge" id="gauge"></div>
        <i class="marker" id="marker"></i>
      </div>
      <div class="ticks" id="ticks"></div>
    </div>
    <div class="explain" id="disclaimer"></div>
    <button class="submit" onclick="location.reload()" style="margin-top:18px">重新測驗</button>
  </div>
</section>
</main>

<script>
const $ = s => document.querySelector(s);
const qs = new URLSearchParams(location.search);
let data = null;
let index = 0;
let answers = {};
let photoPool = [];
let photoByQuestion = [];
let resultPhotoUrl = '';

for(let i=0;i<52;i++){
  const b = document.createElement('i');
  $('#bars').appendChild(b);
}

const TEST_BASE = 'data/monk/aptitude/';
let file = qs.get('json') || 'aptitude-analysis.json';
if(!file.includes('/')) file = TEST_BASE + file;
const photosManifest = qs.get('photos') || 'assets/hiking/photos.json';
const owner = qs.get('name') || localStorage.getItem('bookwide_name') || '受測者';

function currentJsonName(){ return file.split('/').pop(); }
function syncTestPicker(){
  const picker = $('#testPicker');
  const current = currentJsonName();
  if(![...picker.options].some(o=>o.value===current)){
    const opt=document.createElement('option'); opt.value=current; opt.textContent=current; picker.appendChild(opt);
  }
  picker.value=current;
}
$('#testPicker').onchange = e => {
  const url = new URL(location.href);
  url.searchParams.set('json', e.target.value);
  url.searchParams.delete('reset');
  location.href = url.toString();
};

function speak(text, lang='zh-TW'){
  if(!text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.92;
  speechSynthesis.speak(u);
}

function speakSequence(items){
  speechSynthesis.cancel();
  let i = 0;
  function next(){
    if(i >= items.length) return;
    const [text, lang] = items[i++];
    if(!text){ next(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.92;
    u.onend = next;
    speechSynthesis.speak(u);
  }
  next();
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

async function loadPhotoPool(){
  const tries = [photosManifest, '/'+photosManifest.replace(/^\//,''), 'assets/hiking/photos.json', '/assets/hiking/photos.json'];
  for(const url of [...new Set(tries)]){
    try{
      const r = await fetch(url + (url.includes('?') ? '&' : '?') + 'v=' + Date.now());
      if(!r.ok) continue;
      const j = await r.json();
      const list = Array.isArray(j) ? j : (j.photos || j.images || []);
      const imgs = list.filter(x => typeof x === 'string' && /\.(jpg|jpeg|png|webp)(\?.*)?$/i.test(x));
      if(imgs.length){
        photoPool = shuffle(imgs);
        return;
      }
    }catch(err){}
  }
  photoPool = [];
}

function getRandomQuestionPhoto(q, idx){
  const direct = q?.img || q?.image || q?.photo || q?.cover_path || data?.hero_image || data?.cover_path || data?.image;
  if(direct) return Array.isArray(direct) ? direct[0] : direct;
  if(photoByQuestion[idx]) return photoByQuestion[idx];
  if(photoPool.length){
    const pick = photoPool[idx % photoPool.length];
    photoByQuestion[idx] = pick;
    return pick;
  }
  return '';
}

function getResultPhoto(level){
  const direct = level?.image || level?.img || level?.photo || data?.result_image || data?.cover_path;
  if(direct) return Array.isArray(direct) ? direct[0] : direct;
  if(resultPhotoUrl) return resultPhotoUrl;
  if(photoPool.length){
    resultPhotoUrl = photoPool[(index + 3) % photoPool.length];
    return resultPhotoUrl;
  }
  return '';
}

function setHeroBg(el, url, cssVar){
  el.style.setProperty(cssVar, url ? `url("${String(url).replaceAll('"','%22')}")` : 'none');
}

function autoSpeakCurrent(){
  const q = data.questions[index];
  speakSequence([[q.en,'en-US'], [q.ja,'ja-JP'], [q.zh,'zh-TW']]);
}

function render(){
  const q = data.questions[index];
  const total = data.questions.length;
  $('#subtitle').textContent = `${data.title_zh || '通用心理測驗'}｜${total}題｜英・日・中`;
  $('#testName').textContent = data.title_zh || 'BookWide 通用測驗';
  $('#progress').textContent = `${index+1}/${total}`;
  $('#answered').textContent = `${Object.keys(answers).length}/${total}`;
  $('#qTitle').textContent = q.title || `通用測驗 Q${index+1}`;
  $('#qEn').textContent = q.en || '';
  $('#qJa').textContent = q.ja || '';
  $('#qZh').textContent = q.zh || '';
  $('#speakJa').style.display = q.ja ? 'grid' : 'none';
  $('#speakZh').style.display = q.zh ? 'grid' : 'none';
  setHeroBg($('#hero'), getRandomQuestionPhoto(q,index), '--hero-bg');

  $('#choices').innerHTML = '';
  q.choices.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'choice' + (answers[index] === c.key ? ' selected' : '');
    el.innerHTML = `
      <div class="num">${i+1}</div>
      <div class="ctext">
        <div class="en">${c.en || ''}</div>
        <div class="ja">${c.ja || ''}</div>
        <div class="zh">${c.zh || ''}</div>
      </div>
      <div class="langs">
        <button data-l="en-US">EN</button>
        <button data-l="ja-JP">日</button>
        <button data-l="zh-TW">中</button>
      </div>`;
    el.onclick = e => {
      if(e.target.tagName === 'BUTTON'){
        const lang = e.target.dataset.l;
        const text = lang === 'en-US' ? c.en : lang === 'ja-JP' ? c.ja : c.zh;
        speak(text, lang);
        e.stopPropagation();
        return;
      }
      answers[index] = c.key;
      render();
    };
    $('#choices').appendChild(el);
  });
  $('#submitBtn').textContent = Object.keys(answers).length === total ? '查看結果' : '先答題';
}

function move(step){
  index = Math.max(0, Math.min(data.questions.length - 1, index + step));
  render();
  setTimeout(autoSpeakCurrent, 220);
}

function finish(){
  const total = data.questions.length;
  if(Object.keys(answers).length < total){
    const next = data.questions.findIndex((_, i) => !Object.prototype.hasOwnProperty.call(answers, i));
    if(next >= 0){
      index = next;
      render();
      autoSpeakCurrent();
    }
    return;
  }

  let score = 0;
  data.questions.forEach((q, i) => {
    const c = q.choices.find(x => x.key === answers[i]);
    score += Number(c?.aptitude_score ?? c?.score?.total_score ?? c?.score ?? 0);
  });

  const gauge = data.result_gauge || {};
  const max = Number(gauge.max_score ?? gauge.standard_max_score ?? 300);
  const levels = data.analysis?.result_levels || data.result_levels || [];
  const level = levels.find(x => score >= Number(x.from) && score <= Number(x.to)) || levels[levels.length - 1] || {};

  $('#testView').style.display = 'none';
  $('#resultView').classList.add('show');
  $('#owner').textContent = owner;
  $('#doneCount').textContent = `${total} / ${total}`;
  $('#created').textContent = new Date().toLocaleString('zh-TW',{hour12:false});
  $('#reportName').textContent = data.title_zh || 'BookWide 心理測驗';
  $('#reportCount').textContent = `${total}題分析｜英・日・中`;
  $('#score').textContent = score;
  $('#maxScore').textContent = max;
  $('#resultTitle').textContent = '結果：' + (level.label_zh || level.title_zh || '分析完成');
  $('#resultSummary').textContent = level.summary_zh || level.description_zh || '';
  $('#disclaimer').textContent = data.analysis?.disclaimer_zh || data.disclaimer_zh || '這不是醫學、心理診斷，也不是性傾向診斷；只是用來觀察反應風格。';

  const resultImg = getResultPhoto(level);
  if(resultImg){
    $('#resultPhoto').src = resultImg;
    $('#resultPhoto').style.display = 'block';
    setHeroBg($('#reportHero'), resultImg, '--report-bg');
  }else{
    setHeroBg($('#reportHero'), getRandomQuestionPhoto(data.questions[0],0), '--report-bg');
    $('#resultPhoto').style.display = 'none';
  }

  const zones = gauge.zones || levels.map((x, i) => ({
    from: Number(x.from), to: Number(x.to), color: ['#4782f1', '#f2da72', '#ef7089', '#7f6aff'][i % 4]
  }));
  $('#gauge').innerHTML = zones.map(z => {
    const width = Math.max(0, ((Number(z.to) - Number(z.from) + 1) / (max + 1)) * 100);
    return `<span style="width:${width}%;background:${z.color || '#4f8fff'}"></span>`;
  }).join('');
  $('#marker').style.left = `calc(${Math.max(0, Math.min(100, (score / max) * 100))}% - 2px)`;
  const ticks = gauge.ticks || [0, max];
  $('#ticks').innerHTML = ticks.map(t => `<span>${t}</span>`).join('');

  localStorage.setItem((data.slug || 'bookwide-test') + ':score', score);
  setTimeout(() => speakSequence([[`你的測驗結果是${level.label_zh || '分析完成'}。分數${score}分。`, 'zh-TW'], [level.summary_zh || '', 'zh-TW']]), 300);
}

['#prev','#prev2'].forEach(sel => $(sel).onclick = () => move(-1));
['#next','#next2'].forEach(sel => $(sel).onclick = () => move(1));
$('#submitBtn').onclick = finish;
$('#speakQ').onclick = autoSpeakCurrent;
$('#speakJa').onclick = () => { const q = data.questions[index]; speak(q.ja,'ja-JP'); };
$('#speakZh').onclick = () => { const q = data.questions[index]; speak(q.zh,'zh-TW'); };
$('#playAll').onclick = autoSpeakCurrent;
$('#playBtn').onclick = autoSpeakCurrent;
$('#musicBtn').onclick = () => speechSynthesis.cancel();

async function loadJSON(){
  const tries = [file, '/' + file.replace(/^\//,'')];
  for(const url of [...new Set(tries)]){
    try{
      const r = await fetch(url + (url.includes('?') ? '&' : '?') + 'v=' + Date.now());
      if(!r.ok) continue;
      return await r.json();
    }catch(err){}
  }
  throw new Error('json-load-failed');
}

(async function boot(){
  syncTestPicker();
  try{
    await loadPhotoPool();
    data = await loadJSON();
    render();
    setTimeout(autoSpeakCurrent, 700);
  }catch(err){
    $('#hero').innerHTML = `<div class="error">JSON 載入失敗<small>${file}</small></div>`;
  }
})();
</script>
