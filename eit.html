<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide 通用測驗</title>
<style>
:root{--bg:#071a36;--panel:#0d294f;--panel2:#102f59;--line:#2b5c8d;--text:#fff;--muted:#b9d2ef;--gold:#ffcc26;--blue:#4f8fff;--green:#27c78b;--orange:#ff8a00}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(90deg,#132d55 0 30%,#071a36 30% 100%);color:var(--text)}
body{display:flex;justify-content:center}.app{width:min(660px,100%);min-height:100vh;background:#06172f;padding:8px 22px 22px}
header{display:flex;align-items:center;gap:12px;height:54px}.logo{width:44px;height:44px;object-fit:contain}.brand{line-height:1}.brand b{font-size:22px}.brand small{display:block;margin-top:4px;color:#d2e5ff}.console{margin-left:auto;border:1px solid #58799f;background:#102746;color:#fff;border-radius:999px;padding:8px 14px;font-weight:700}
.hero{position:relative;height:300px;border-radius:28px;overflow:hidden;border:1px solid #3c6389;background:radial-gradient(circle at 50% 25%,rgba(255,255,255,.15),transparent 38%),linear-gradient(135deg,#4b6681,#1a3656 52%,#142b49)}
.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,19,39,.1),rgba(3,17,34,.65))}.qtext{position:absolute;inset:0;display:grid;place-content:center;text-align:center;padding:35px 50px 72px;text-shadow:0 2px 5px #000}.qtext .en{font-size:27px;font-weight:800;line-height:1.05}.qtext .ja,.qtext .zh{font-size:17px;font-weight:700;margin-top:7px}.nav{position:absolute;top:44%;width:38px;height:38px;border:0;border-radius:50%;font-size:26px}.prev{left:12px}.next{right:12px}.speak{position:absolute;right:12px;top:58%;width:34px;height:34px;border-radius:50%;border:1px solid #7998bb;background:#112b4d;color:#fff}.bars{position:absolute;left:0;right:0;bottom:0;height:58px;display:flex;align-items:end;gap:5px;padding:0 8px 10px}.bars i{flex:1;border-radius:5px;background:#4c8fe8;height:20px}.bars i:nth-child(5n){background:#e6b300}.bars i:nth-child(3n){height:40px}.bars i:nth-child(4n){height:28px}.bars i:nth-child(7n){height:48px}
.status{display:flex;gap:7px;margin:8px 0}.pill{border:1px solid #3f6693;border-radius:999px;padding:4px 10px;font-size:13px;background:#0c2444}.pill.gold{color:#ffd633}
.card{border:1px solid #2d659c;border-radius:20px;background:linear-gradient(#0a2447,#0b1f3d);overflow:hidden}.cardhead{display:flex;align-items:center;gap:8px;padding:10px}.cardhead h2{font-size:20px;margin:0}.tag{border-radius:999px;padding:8px 13px;background:linear-gradient(100deg,#ff8b13,#ffbd55,#d17af0);font-weight:800}.controls{margin-left:auto;display:flex;align-items:center;gap:7px}.circle,.play{border-radius:50%;border:1px solid #5b7da3;background:#102c4d;color:#fff;width:42px;height:42px;font-size:20px}.play{width:56px;height:56px;background:#4b89f7;border:3px solid #cfe1ff}.music{background:#0c6d58;border-color:#1caf81}.first{border-radius:999px;border:0;background:#ff8d00;color:white;padding:10px 14px;font-weight:800}
.prompt{padding:0 10px 8px;font-weight:700}.choices{padding:0 9px 8px}.choice{position:relative;display:grid;grid-template-columns:38px 1fr 42px;gap:10px;align-items:center;margin:8px 0;padding:12px;border:1px solid #2b537c;border-radius:16px;background:#102643;cursor:pointer}.choice.selected{outline:2px solid #4f95ff;background:#16355e}.num{font-size:22px}.ctext .en{font-size:16px;font-weight:800}.ctext .ja{font-size:14px;color:#d8c2ff;margin-top:4px}.ctext .zh{font-size:14px;color:#d4e6fa;margin-top:3px}.langs{display:grid;gap:4px}.langs button{border:1px solid #4175ad;background:#12355e;color:#fff;border-radius:999px;height:25px}.submit{width:calc(100% - 18px);margin:0 9px 9px;border:1px solid #6d8298;background:#32465b;color:#fff;border-radius:999px;padding:10px;font-size:16px}
.result{display:none;padding:18px}.result.show{display:block}.result h3{font-size:25px;color:#65a0ff;margin:0 0 8px}.scoreline{font-size:38px;font-weight:900}.summary{line-height:1.7;color:#dceaff}.gauge{height:20px;border-radius:999px;overflow:hidden;display:flex;margin-top:18px}.gauge span{height:100%}.footnote{font-size:12px;color:#9fb8d5;margin-top:12px}
@media(max-width:720px){html,body{background:#06172f}.app{padding:6px 12px 16px}.hero{height:290px}.qtext{padding-left:42px;padding-right:42px}.qtext .en{font-size:23px}.cardhead{flex-wrap:wrap}.controls{width:100%;justify-content:flex-end}.choice{grid-template-columns:30px 1fr 36px}}
</style>
</head>
<body>
<main class="app">
<header><img class="logo" src="bookwide_logo.png" alt="BookWide"><div class="brand"><b>BookWide</b><small id="subtitle">通用測驗｜英・日・中</small></div><button class="console" onclick="location.href='index.html'">控制台</button></header>
<section id="testView">
<div class="hero"><button class="nav prev" id="prev">‹</button><div class="qtext"><div class="en" id="qEn">載入中…</div><div class="ja" id="qJa"></div><div class="zh" id="qZh"></div></div><button class="nav next" id="next">›</button><button class="speak" id="speakQ">🔊</button><div class="bars" id="bars"></div></div>
<div class="status"><span class="pill" id="testName">BookWide 通用測驗</span><span class="pill" id="progress">1/30</span><span class="pill" id="answered">0/30</span><span class="pill gold">英・日・中</span></div>
<section class="card"><div class="cardhead"><h2 id="qTitle">通用測驗 Q1</h2><span class="tag">選出最像你的反應</span><div class="controls"><button class="first" id="playAll">先按播放</button><button class="circle" id="prev2">‹</button><button class="play" id="playBtn">▶</button><button class="circle music" id="musicBtn">♫</button><button class="circle" id="next2">›</button></div></div><div class="prompt">選出最像你的反應：</div><div class="choices" id="choices"></div><button class="submit" id="submitBtn">先答題</button></section>
</section>
<section class="card result" id="resultView"><div class="scoreline"><span id="score">0</span> / <span id="maxScore">0</span></div><h3 id="resultTitle">結果</h3><div class="summary" id="resultSummary"></div><div class="gauge" id="gauge"></div><div class="footnote" id="disclaimer"></div><button class="submit" onclick="location.reload()">重新測驗</button></section>
</main>
<script>
const $=s=>document.querySelector(s), qs=new URLSearchParams(location.search);let data=null,index=0,answers={},speaking=false;
for(let i=0;i<52;i++){const b=document.createElement('i');$('#bars').appendChild(b)}
const file=qs.get('json')||'aptitude-analysis.json';
const txt=(o,k)=>o?.[k+'_zh']??o?.[k]??'';
function speak(text,lang){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;speechSynthesis.speak(u)}
function render(){const q=data.questions[index],total=data.questions.length;$('#subtitle').textContent=`${data.title_zh||'通用測驗'}｜${total}題｜英・日・中`;$('#testName').textContent=data.title_zh||'BookWide 通用測驗';$('#progress').textContent=`${index+1}/${total}`;$('#answered').textContent=`${Object.keys(answers).length}/${total}`;$('#qTitle').textContent=`${q.title||'通用測驗 Q'+(index+1)}`;$('#qEn').textContent=q.en||'';$('#qJa').textContent=q.ja||'';$('#qZh').textContent=q.zh||'';$('#choices').innerHTML='';q.choices.forEach((c,i)=>{const el=document.createElement('div');el.className='choice'+(answers[index]===c.key?' selected':'');el.innerHTML=`<div class="num">${i+1}</div><div class="ctext"><div class="en">${c.en||''}</div><div class="ja">${c.ja||''}</div><div class="zh">${c.zh||''}</div></div><div class="langs"><button data-l="en-US">EN</button><button data-l="ja-JP">日</button><button data-l="zh-TW">中</button></div>`;el.onclick=e=>{if(e.target.tagName==='BUTTON'){const lang=e.target.dataset.l;const text=lang==='en-US'?c.en:lang==='ja-JP'?c.ja:c.zh;speak(text,lang);e.stopPropagation();return}answers[index]=c.key;render()};$('#choices').appendChild(el)});$('#submitBtn').textContent=Object.keys(answers).length===total?'查看結果':'先答題'}
function move(d){index=Math.max(0,Math.min(data.questions.length-1,index+d));render()}
function finish(){if(Object.keys(answers).length<data.questions.length){const next=data.questions.findIndex((_,i)=>!answers.hasOwnProperty(i));if(next>=0){index=next;render()}return}let score=0;data.questions.forEach((q,i)=>{const c=q.choices.find(x=>x.key===answers[i]);score+=Number(c?.aptitude_score??c?.score?.total_score??0)});const max=Number(data.result_gauge?.max_score??300);const level=(data.analysis?.result_levels||[]).find(x=>score>=x.from&&score<=x.to)||{};$('#testView').style.display='none';$('#resultView').classList.add('show');$('#score').textContent=score;$('#maxScore').textContent=max;$('#resultTitle').textContent='結果：'+(level.label_zh||'分析完成');$('#resultSummary').textContent=level.summary_zh||'';$('#disclaimer').textContent=data.analysis?.disclaimer_zh||'';const zones=data.result_gauge?.zones||[];$('#gauge').innerHTML=zones.map(z=>`<span style="width:${((z.to-z.from+1)/(max+1))*100}%;background:${z.color}"></span>`).join('');localStorage.setItem((data.slug||'eit')+':score',score)}
['#prev','#prev2'].forEach(s=>$(s).onclick=()=>move(-1));['#next','#next2'].forEach(s=>$(s).onclick=()=>move(1));$('#submitBtn').onclick=finish;$('#speakQ').onclick=()=>{const q=data.questions[index];speak(q.en,'en-US')};$('#playAll').onclick=()=>{const q=data.questions[index];speechSynthesis.cancel();[ [q.en,'en-US'],[q.ja,'ja-JP'],[q.zh,'zh-TW'] ].forEach((x,i)=>setTimeout(()=>speak(x[0],x[1]),i*1800))};$('#playBtn').onclick=$('#speakQ').onclick;$('#musicBtn').onclick=()=>document.body.classList.toggle('musicOn');
fetch(file+'?v='+Date.now()).then(r=>{if(!r.ok)throw Error(r.status);return r.json()}).then(j=>{data=j;render()}).catch(e=>{$('#qEn').textContent='JSON 載入失敗';$('#qZh').textContent=`請確認 ${file} 與 eit.html 放在同一資料夾`});
</script>
</body>
</html>
