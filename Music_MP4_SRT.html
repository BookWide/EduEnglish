<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Music MP4 SRT Builder</title>
<style>
body { font-family: Arial; background:#0b1220; color:#fff; padding:20px;}
.box {background:#111a2e; padding:20px; border-radius:10px; margin-bottom:20px;}
button {padding:10px 20px; border:none; border-radius:6px; background:#3b82f6; color:#fff; cursor:pointer;}
textarea {width:100%; height:150px;}
</style>
</head>
<body>

<h1>🎵 Music_MP4_SRT (音樂專用產包器)</h1>

<div class="box">
<h3>1️⃣ 匯入 MP4</h3>
<input type="file" id="mp4" accept="video/mp4">
</div>

<div class="box">
<h3>2️⃣ 匯入 SRT</h3>
<input type="file" id="srt" accept=".srt">
</div>

<div class="box">
<h3>3️⃣ 產生兒歌歌詞</h3>
<button onclick="generateLyrics()">產生音樂歌詞</button>
<textarea id="lyrics"></textarea>
</div>

<div class="box">
<h3>4️⃣ 匯出 out_assets</h3>
<button onclick="exportAssets()">下載 out_assets.json</button>
</div>

<script>

function generateLyrics(){
    const demo = "I like you, I like you\nCome and play today!\nFun fun in the sun!";
    document.getElementById("lyrics").value = demo;
}

function exportAssets(){
    const data = {
        musicMode: true,
        lyrics: document.getElementById("lyrics").value,
        note: "這是簡化版 out_assets，實際需接後端切圖"
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "out_assets_music.json";
    a.click();
}

</script>

</body>
</html>
