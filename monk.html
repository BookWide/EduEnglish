<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide 老和尚英日問答</title>
<style>
:root{--bg:#071225;--card:#0d1d35;--ink:#eef6ff;--muted:#9fb4d1;--blue:#3b82f6;--line:rgba(96,165,250,.28)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif}
button,a{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.app{width:min(520px,100vw);margin:0 auto;padding:6px 7px 20px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
.brand{display:flex;align-items:center;gap:6px;min-width:0}.logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center}
.brand b{display:block;font-size:17px;line-height:1}.brand span{display:block;color:#b9cff0;font-size:10px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top a{font-size:11px;font-weight:850;border:1px solid rgba(148,163,184,.25);background:rgba(15,31,56,.78);border-radius:999px;padding:5px 9px}
.hero{position:relative;height:241px;border-radius:20px;overflow:hidden;background:#061225;margin-bottom:6px;box-shadow:0 14px 34px rgba(0,0,0,.24)}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;filter:saturate(1.05) contrast(1.03)}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,.06),rgba(5,12,24,.04) 35%,rgba(5,12,24,.70) 100%);pointer-events:none}
.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:28px;height:28px;border:0;border-radius:99px;background:rgba(255,255,255,.78);color:#0f172a;font-size:17px;font-weight:950}.prev{left:8px}.next{right:8px}
.hint{position:absolute;right:8px;bottom:8px;z-index:4;background:rgba(37,99,235,.76);border-radius:999px;padding:4px 7px;font-size:10px;font-weight:900}
.sub{position:absolute;left:10px;right:10px;bottom:48px;z-index:4;text-align:center;text-shadow:0 3px 16px rgba(0,0,0,.86),0 1px 2px rgba(0,0,0,.95)}
.en{font-size:clamp(12px,3.6vw,18px);line-height:1.12;font-weight:950;color:#fff}.ja{margin-top:5px;font-size:clamp(10px,2.9vw,15px);line-height:1.15;font-weight:950;color:#e9f7ff}.zh{margin-top:5px;font-size:clamp(10px,2.9vw,14px);line-height:1.15;font-weight:950;color:#fff7ed}
.wave{position:absolute;left:0;right:0;bottom:0;height:44px;z-index:3;background:linear-gradient(180deg,rgba(3,8,18,0),rgba(3,8,18,.72));display:flex;align-items:end;justify-content:center;gap:5px;padding-bottom:12px}
.bar{width:6px;height:12px;border-radius:99px;background:rgba(96,165,250,.8);opacity:.75}.playing .bar{animation:pulse .72s ease-in-out infinite}.bar:nth-child(2){animation-delay:.12s}.bar:nth-child(3){animation-delay:.24s}.bar:nth-child(4){animation-delay:.36s}.bar:nth-child(5){animation-delay:.48s}@keyframes pulse{50%{height:30px;opacity:1}}
.mini{display:flex;gap:4px;margin-bottom:4px;overflow-x:auto;scrollbar-width:none}.mini span{flex:0 0 auto;border:1px solid var(--line);background:rgba(13,29,53,.72);color:#dbeafe;border-radius:999px;padding:3px 7px;font-size:10px;font-weight:900}.mini .coin{color:#fde68a;border-color:rgba(251,191,36,.36);background:rgba(251,191,36,.12)}
.card{border:1px solid rgba(85,136,206,.42);border-radius:15px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:7px;box-shadow:0 12px 28px rgba(0,0,0,.16)}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}.title{min-width:0}.title b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title span{display:block;color:#c7d2fe;font-size:10px;font-weight:800}
.ctrls{display:flex;gap:4px}.ctrl{width:28px;height:28px;border-radius:999px;border:1px solid var(--line);background:rgba(59,130,246,.15);color:#dbeafe;font-weight:950}.play{width:35px;height:35px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff}
.quiz{border:1px solid rgba(251,191,36,.28);border-radius:14px;background:rgba(251,191,36,.08);padding:7px}.q{font-size:12.5px;font-weight:950;line-height:1.25;margin-bottom:5px}
.choices{display:grid;gap:4px}.choice{width:100%;border:1px solid rgba(148,163,184,.24);background:rgba(15,31,56,.85);color:#eaf3ff;border-radius:12px;padding:6px 7px;text-align:left;display:grid;grid-template-columns:22px 1fr 27px;gap:4px;align-items:center;min-height:40px;-webkit-tap-highlight-color:transparent}
.choice b{font-size:12.5px;line-height:1.12}.choice small{display:block;color:#c4b5fd;font-size:10.5px;line-height:1.1;margin-top:1px}.choice em{display:block;color:#cbd5e1;font-style:normal;font-size:10.5px;line-height:1.1;margin-top:1px}
.choiceText{min-width:0}.voiceBtns{display:grid;gap:2px}.voiceBtns button{width:27px;height:19px;border:1px solid rgba(96,165,250,.32);background:rgba(59,130,246,.16);color:#dbeafe;border-radius:999px;font-size:10px;font-weight:950;padding:0;cursor:pointer}.voiceBtns button:active{transform:scale(.96);background:rgba(96,165,250,.28)}
.choice.ok{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55);color:#bbf7d0}.choice.bad{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);color:#fecaca}
.spk{width:25px;height:25px;border-radius:99px;border:1px solid var(--line);background:rgba(59,130,246,.16);color:#dbeafe;display:grid;place-items:center}
.complete{width:100%;margin-top:5px;border-radius:999px;border:1px solid rgba(148,163,184,.28);background:rgba(148,163,184,.16);color:#cbd5e1;padding:7px 8px;font-size:12.5px;font-weight:950}.complete.ready{border:0;background:linear-gradient(135deg,#22c55e,#60a5fa);color:#fff}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:99;background:rgba(15,23,42,.9);border:1px solid var(--line);padding:10px 14px;border-radius:999px;font-size:13px;font-weight:900;display:none;max-width:min(360px,92vw);text-align:center}.toast.show{display:block}
.modal{position:fixed;inset:0;z-index:999;display:none;place-items:center;padding:20px;background:rgba(7,18,37,.66);backdrop-filter:blur(8px)}.modal.show{display:grid}.box{width:min(340px,92vw);border:1px solid rgba(251,191,36,.38);border-radius:24px;background:linear-gradient(145deg,rgba(16,40,71,.98),rgba(9,25,47,.98));box-shadow:0 24px 60px rgba(0,0,0,.42);padding:18px;text-align:center}.box h2{margin:0 0 8px;font-size:21px}.box p{margin:0 0 12px;color:#dbeafe;font-weight:850;line-height:1.45}.box button{width:100%;border:0;border-radius:999px;padding:10px 12px;background:linear-gradient(135deg,#f59e0b,#22c55e);color:#fff;font-weight:950}
@media(max-width:390px){.hero{height:214px;border-radius:18px}.app{padding-left:7px;padding-right:7px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<audio id="bgm" src="./assets/monk/bgm.mp3" preload="none" loop playsinline></audio>
<main class="app">
  <section class="top"><div class="brand"><div class="logo">📘</div><div><b>BookWide</b><span>老和尚英日問答｜英文・日文・中文理解</span></div></div><a href="./account/learning-dashboard.html">控制台</a></section>
  <section class="hero" id="hero" aria-label="點擊播放">
    <img id="photo" alt="BookWide monk photo">
    <button class="nav prev" id="photoPrev" type="button">‹</button><button class="nav next" id="photoNext" type="button">›</button>
    <div class="hint" id="hint">點一下播放</div>
    <div class="sub"><div class="en" id="heroEn"></div><div class="ja" id="heroJa"></div><div class="zh" id="heroZh"></div></div>
    <div class="wave"><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i></div>
  </section>
  <section class="mini"><span id="stage">第 1 關</span><span id="done">0/20</span><span class="coin" id="coins">金0</span><span id="nextCoin">再5關</span></section>
  <section class="card">
    <div class="titleRow"><div class="title"><b id="title"></b><span id="scene"></span></div><div class="ctrls"><button class="ctrl" id="prev" type="button">‹</button><button class="ctrl play" id="play" type="button">▶</button><button class="ctrl" id="music" type="button">♫</button><button class="ctrl" id="next" type="button">›</button></div></div>
    <section class="quiz"><div class="q" id="quizQ">選出老和尚最合理的回答：</div><div class="choices" id="choices"></div><button class="complete" id="complete" type="button">先答題</button></section>
  </section>
</main>
<div class="modal" id="reward"><div class="box"><h2 id="rewardTitle">完成！</h2><p id="rewardText"></p><button id="rewardOk" type="button">收下，進下一關</button></div></div>
<script>
let photos=[];
const localPhotos=["assets/monk/monk_01.png","assets/monk/monk_02.png","assets/monk/monk_03.png","assets/monk/monk_04.png","assets/monk/monk_05.png","assets/monk/monk_06.png","assets/monk/monk_07.png","assets/monk/monk_08.png","assets/monk/monk_09.png","assets/monk/monk_10.png","assets/monk/monk_11.png","assets/monk/monk_12.png","assets/monk/monk_13.png","assets/monk/monk_14.png","assets/monk/monk_15.png","assets/monk/monk_16.png","assets/monk/monk_17.png","assets/monk/monk_18.png","assets/monk/monk_19.png","assets/monk/monk_20.png"];
async function loadPhotos(){
  photos=[...localPhotos];
  try{
    const r=await fetch("./assets/monk/photos.json?v="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("photos.json "+r.status);
    const j=await r.json();
    if(Array.isArray(j.photos)&&j.photos.length)photos=j.photos.filter(Boolean);
  }catch(e){
    photos=[...localPhotos];
  }
}
const lessons=[{"day":1,"scene":"Asking About Love","title":"Why Does Love Hurt?","en":"Master, why does love hurt so much?","zh":"師父，為什麼愛會這麼痛？","ja":"師よ、なぜ愛はこんなに痛いのですか。","choices":[{"en":"Because you are holding too tightly.","zh":"因為你抓得太緊了。","ja":"あなたが強く握りしめすぎているからです。","correct":true},{"en":"Because your mind keeps living in a future that has not arrived.","zh":"因為你的心一直住在還沒到來的未來。","ja":"あなたの心が、まだ来ていない未来に住み続けているからです。","correct":false},{"en":"Pause before your words become arrows.","zh":"在你的話變成箭之前，先停一下。","ja":"言葉が矢になる前に、いったん止まりなさい。","correct":false}]},{"day":2,"scene":"Learning to Let Go","title":"Why Do People Leave?","en":"Master, why do people leave us?","zh":"師父，為什麼有些人會離開？","ja":"師よ、なぜ人は私たちのもとを去るのですか。","choices":[{"en":"Because some people are only meant to walk with you for a season.","zh":"因為有些人，只是陪你走一段路。","ja":"ある人は、人生の一時期だけ一緒に歩くために現れるのです。","correct":true},{"en":"Forgive to free your heart, not to excuse their actions.","zh":"原諒是為了釋放你的心，不是替對方找理由。","ja":"許すのは自分の心を自由にするためで、相手の行いを正当化するためではありません。","correct":false},{"en":"Peace is not having no problems. Peace is no longer becoming the problem.","zh":"平靜不是沒有問題，而是不再讓自己變成問題。","ja":"平和とは問題がないことではなく、自分自身が問題にならないことです。","correct":false}]},{"day":3,"scene":"Facing Reality","title":"How Do I Stop Suffering?","en":"Master, how do I stop suffering?","zh":"師父，我要怎麼停止痛苦？","ja":"師よ、どうすれば苦しみを止められますか。","choices":[{"en":"Stop arguing with what has already happened.","zh":"不要再和已經發生的事爭辯。","ja":"もう起きてしまったことと争うのをやめなさい。","correct":true},{"en":"Because your body is in bed, but your heart is still chasing yesterday.","zh":"因為你的身體在床上，心卻還在追著昨天。","ja":"体はベッドにあっても、心はまだ昨日を追いかけているからです。","correct":false},{"en":"Because your heart is touching something your hands can no longer hold.","zh":"因為你的心碰到了手再也握不住的東西。","ja":"心が、もう手でつかめないものに触れているからです。","correct":false}]},{"day":4,"scene":"Understanding Loneliness","title":"Why Am I Lonely?","en":"Master, why do I feel so lonely?","zh":"師父，為什麼我覺得這麼孤單？","ja":"師よ、なぜ私はこんなに孤独を感じるのですか。","choices":[{"en":"Because you are waiting for others to bring you back to yourself.","zh":"因為你在等別人，把你帶回自己身邊。","ja":"他人があなたを自分自身へ連れ戻してくれるのを待っているからです。","correct":true},{"en":"Attachment is turning a guest into the owner of your heart.","zh":"執著，就是把過客變成你心裡的主人。","ja":"執着とは、通り過ぎる人を心の主人にしてしまうことです。","correct":false},{"en":"Let go little by little, until your heart stops looking back.","zh":"一點一點放，直到你的心不再回頭。","ja":"少しずつ手放しなさい。心が振り返らなくなるまで。","correct":false}]},{"day":5,"scene":"Finding Peace","title":"How to Calm My Mind?","en":"Master, how can I calm my mind?","zh":"師父，我要怎麼讓心安靜？","ja":"師よ、どうすれば心を静められますか。","choices":[{"en":"Breathe first. Answers come only after the storm becomes quiet.","zh":"先呼吸。暴風安靜後，答案才會出現。","ja":"まず息をしなさい。嵐が静まってから、答えは現れます。","correct":true},{"en":"Because you are trying to control pain before it even happens.","zh":"因為你想在痛苦發生前，就先控制它。","ja":"痛みが起きる前に、それを支配しようとしているからです。","correct":false},{"en":"Destiny is what arrives after you have done your part.","zh":"命運，是你做好自己該做的事之後，來到你面前的東西。","ja":"運命とは、自分の役目を果たしたあとに訪れるものです。","correct":false}]},{"day":6,"scene":"Seeing Human Weakness","title":"Why Do People Lie?","en":"Master, why do people lie?","zh":"師父，為什麼人會說謊？","ja":"師よ、なぜ人は嘘をつくのですか。","choices":[{"en":"Because truth sometimes asks for more courage than they have.","zh":"因為真相有時需要的勇氣，超過他們擁有的。","ja":"真実には、ときにその人が持つ以上の勇気が必要だからです。","correct":true},{"en":"Do not become hard. Stay soft, but stop breaking for everyone.","zh":"不要變冷硬。保持柔軟，但不要再為所有人碎掉。","ja":"硬くなるのではありません。柔らかいまま、誰かのために壊れないことです。","correct":false},{"en":"A quiet heart, a clean conscience, and someone you can be kind to.","zh":"一顆安靜的心、一份乾淨的良心，以及一個你願意善待的人。","ja":"静かな心、清らかな良心、そして優しくできる誰かです。","correct":false}]},{"day":7,"scene":"Simple Happiness","title":"What Is True Happiness?","en":"Master, what is true happiness?","zh":"師父，真正的快樂是什麼？","ja":"師よ、本当の幸せとは何ですか。","choices":[{"en":"It is needing less, not owning more.","zh":"是需要更少，不是擁有更多。","ja":"より多く持つことではなく、必要とするものが少なくなることです。","correct":true},{"en":"Because kindness does not remove storms; it teaches you how to walk through them.","zh":"因為善良不會拿走風雨，它教你如何穿越風雨。","ja":"優しさは嵐を消すのではなく、その中を歩く方法を教えてくれます。","correct":false},{"en":"Because you are holding too tightly.","zh":"因為你抓得太緊了。","ja":"あなたが強く握りしめすぎているからです。","correct":false}]},{"day":8,"scene":"Meeting Fear","title":"Why Am I Afraid?","en":"Master, why am I always afraid?","zh":"師父，為什麼我總是害怕？","ja":"師よ、なぜ私はいつも怖いのですか。","choices":[{"en":"Because your mind keeps living in a future that has not arrived.","zh":"因為你的心一直住在還沒到來的未來。","ja":"あなたの心が、まだ来ていない未来に住み続けているからです。","correct":true},{"en":"Pause before your words become arrows.","zh":"在你的話變成箭之前，先停一下。","ja":"言葉が矢になる前に、いったん止まりなさい。","correct":false},{"en":"Because some people are only meant to walk with you for a season.","zh":"因為有些人，只是陪你走一段路。","ja":"ある人は、人生の一時期だけ一緒に歩くために現れるのです。","correct":false}]},{"day":9,"scene":"Learning Forgiveness","title":"How to Forgive?","en":"Master, how do I forgive someone?","zh":"師父，我要怎麼原諒一個人？","ja":"師よ、どうすれば人を許せますか。","choices":[{"en":"Forgive to free your heart, not to excuse their actions.","zh":"原諒是為了釋放你的心，不是替對方找理由。","ja":"許すのは自分の心を自由にするためで、相手の行いを正当化するためではありません。","correct":true},{"en":"Peace is not having no problems. Peace is no longer becoming the problem.","zh":"平靜不是沒有問題，而是不再讓自己變成問題。","ja":"平和とは問題がないことではなく、自分自身が問題にならないことです。","correct":false},{"en":"Stop arguing with what has already happened.","zh":"不要再和已經發生的事爭辯。","ja":"もう起きてしまったことと争うのをやめなさい。","correct":false}]},{"day":10,"scene":"Quieting the Night","title":"Why Can't I Sleep?","en":"Master, why can I not sleep at night?","zh":"師父，為什麼我晚上睡不著？","ja":"師よ、なぜ夜眠れないのですか。","choices":[{"en":"Because your body is in bed, but your heart is still chasing yesterday.","zh":"因為你的身體在床上，心卻還在追著昨天。","ja":"体はベッドにあっても、心はまだ昨日を追いかけているからです。","correct":true},{"en":"Because your heart is touching something your hands can no longer hold.","zh":"因為你的心碰到了手再也握不住的東西。","ja":"心が、もう手でつかめないものに触れているからです。","correct":false},{"en":"Because you are waiting for others to bring you back to yourself.","zh":"因為你在等別人，把你帶回自己身邊。","ja":"他人があなたを自分自身へ連れ戻してくれるのを待っているからです。","correct":false}]},{"day":11,"scene":"Understanding Attachment","title":"What Is Attachment?","en":"Master, what is attachment?","zh":"師父，什麼是執著？","ja":"師よ、執着とは何ですか。","choices":[{"en":"Attachment is turning a guest into the owner of your heart.","zh":"執著，就是把過客變成你心裡的主人。","ja":"執着とは、通り過ぎる人を心の主人にしてしまうことです。","correct":true},{"en":"Let go little by little, until your heart stops looking back.","zh":"一點一點放，直到你的心不再回頭。","ja":"少しずつ手放しなさい。心が振り返らなくなるまで。","correct":false},{"en":"Breathe first. Answers come only after the storm becomes quiet.","zh":"先呼吸。暴風安靜後，答案才會出現。","ja":"まず息をしなさい。嵐が静まってから、答えは現れます。","correct":false}]},{"day":12,"scene":"Stopping Overthinking","title":"Why Do I Overthink?","en":"Master, why do I overthink everything?","zh":"師父，為什麼我什麼都想太多？","ja":"師よ、なぜ私は何でも考えすぎるのですか。","choices":[{"en":"Because you are trying to control pain before it even happens.","zh":"因為你想在痛苦發生前，就先控制它。","ja":"痛みが起きる前に、それを支配しようとしているからです。","correct":true},{"en":"Destiny is what arrives after you have done your part.","zh":"命運，是你做好自己該做的事之後，來到你面前的東西。","ja":"運命とは、自分の役目を果たしたあとに訪れるものです。","correct":false},{"en":"Because truth sometimes asks for more courage than they have.","zh":"因為真相有時需要的勇氣，超過他們擁有的。","ja":"真実には、ときにその人が持つ以上の勇気が必要だからです。","correct":false}]},{"day":13,"scene":"Inner Strength","title":"How to Become Strong?","en":"Master, how do I become strong?","zh":"師父，我要怎麼變堅強？","ja":"師よ、どうすれば強くなれますか。","choices":[{"en":"Do not become hard. Stay soft, but stop breaking for everyone.","zh":"不要變冷硬。保持柔軟，但不要再為所有人碎掉。","ja":"硬くなるのではありません。柔らかいまま、誰かのために壊れないことです。","correct":true},{"en":"A quiet heart, a clean conscience, and someone you can be kind to.","zh":"一顆安靜的心、一份乾淨的良心，以及一個你願意善待的人。","ja":"静かな心、清らかな良心、そして優しくできる誰かです。","correct":false},{"en":"It is needing less, not owning more.","zh":"是需要更少，不是擁有更多。","ja":"より多く持つことではなく、必要とするものが少なくなることです。","correct":false}]},{"day":14,"scene":"Kindness and Pain","title":"Why Do Good People Suffer?","en":"Master, why do good people suffer?","zh":"師父，為什麼好人也會受苦？","ja":"師よ、なぜ善い人も苦しむのですか。","choices":[{"en":"Because kindness does not remove storms; it teaches you how to walk through them.","zh":"因為善良不會拿走風雨，它教你如何穿越風雨。","ja":"優しさは嵐を消すのではなく、その中を歩く方法を教えてくれます。","correct":true},{"en":"Because you are holding too tightly.","zh":"因為你抓得太緊了。","ja":"あなたが強く握りしめすぎているからです。","correct":false},{"en":"Because your mind keeps living in a future that has not arrived.","zh":"因為你的心一直住在還沒到來的未來。","ja":"あなたの心が、まだ来ていない未来に住み続けているからです。","correct":false}]},{"day":15,"scene":"Cooling Anger","title":"How to Stop Anger?","en":"Master, how do I stop my anger?","zh":"師父，我要怎麼停止憤怒？","ja":"師よ、どうすれば怒りを止められますか。","choices":[{"en":"Pause before your words become arrows.","zh":"在你的話變成箭之前，先停一下。","ja":"言葉が矢になる前に、いったん止まりなさい。","correct":true},{"en":"Because some people are only meant to walk with you for a season.","zh":"因為有些人，只是陪你走一段路。","ja":"ある人は、人生の一時期だけ一緒に歩くために現れるのです。","correct":false},{"en":"Forgive to free your heart, not to excuse their actions.","zh":"原諒是為了釋放你的心，不是替對方找理由。","ja":"許すのは自分の心を自由にするためで、相手の行いを正当化するためではありません。","correct":false}]},{"day":16,"scene":"Real Peace","title":"What Is Peace?","en":"Master, what is peace?","zh":"師父，什麼是平靜？","ja":"師よ、平和とは何ですか。","choices":[{"en":"Peace is not having no problems. Peace is no longer becoming the problem.","zh":"平靜不是沒有問題，而是不再讓自己變成問題。","ja":"平和とは問題がないことではなく、自分自身が問題にならないことです。","correct":true},{"en":"Stop arguing with what has already happened.","zh":"不要再和已經發生的事爭辯。","ja":"もう起きてしまったことと争うのをやめなさい。","correct":false},{"en":"Because your body is in bed, but your heart is still chasing yesterday.","zh":"因為你的身體在床上，心卻還在追著昨天。","ja":"体はベッドにあっても、心はまだ昨日を追いかけているからです。","correct":false}]},{"day":17,"scene":"Painful Memories","title":"Why Do Memories Hurt?","en":"Master, why do memories hurt?","zh":"師父，為什麼回憶會痛？","ja":"師よ、なぜ思い出は痛むのですか。","choices":[{"en":"Because your heart is touching something your hands can no longer hold.","zh":"因為你的心碰到了手再也握不住的東西。","ja":"心が、もう手でつかめないものに触れているからです。","correct":true},{"en":"Because you are waiting for others to bring you back to yourself.","zh":"因為你在等別人，把你帶回自己身邊。","ja":"他人があなたを自分自身へ連れ戻してくれるのを待っているからです。","correct":false},{"en":"Attachment is turning a guest into the owner of your heart.","zh":"執著，就是把過客變成你心裡的主人。","ja":"執着とは、通り過ぎる人を心の主人にしてしまうことです。","correct":false}]},{"day":18,"scene":"Letting Go","title":"How to Let Go?","en":"Master, how do I let go?","zh":"師父，我要怎麼放下？","ja":"師よ、どうすれば手放せますか。","choices":[{"en":"Let go little by little, until your heart stops looking back.","zh":"一點一點放，直到你的心不再回頭。","ja":"少しずつ手放しなさい。心が振り返らなくなるまで。","correct":true},{"en":"Breathe first. Answers come only after the storm becomes quiet.","zh":"先呼吸。暴風安靜後，答案才會出現。","ja":"まず息をしなさい。嵐が静まってから、答えは現れます。","correct":false},{"en":"Because you are trying to control pain before it even happens.","zh":"因為你想在痛苦發生前，就先控制它。","ja":"痛みが起きる前に、それを支配しようとしているからです。","correct":false}]},{"day":19,"scene":"Understanding Destiny","title":"What Is Destiny?","en":"Master, what is destiny?","zh":"師父，什麼是命運？","ja":"師よ、運命とは何ですか。","choices":[{"en":"Destiny is what arrives after you have done your part.","zh":"命運，是你做好自己該做的事之後，來到你面前的東西。","ja":"運命とは、自分の役目を果たしたあとに訪れるものです。","correct":true},{"en":"Because truth sometimes asks for more courage than they have.","zh":"因為真相有時需要的勇氣，超過他們擁有的。","ja":"真実には、ときにその人が持つ以上の勇気が必要だからです。","correct":false},{"en":"Do not become hard. Stay soft, but stop breaking for everyone.","zh":"不要變冷硬。保持柔軟，但不要再為所有人碎掉。","ja":"硬くなるのではありません。柔らかいまま、誰かのために壊れないことです。","correct":false}]},{"day":20,"scene":"Life Wisdom","title":"What Matters Most?","en":"Master, what matters most in life?","zh":"師父，人生最重要的是什麼？","ja":"師よ、人生で一番大切なものは何ですか。","choices":[{"en":"A quiet heart, a clean conscience, and someone you can be kind to.","zh":"一顆安靜的心、一份乾淨的良心，以及一個你願意善待的人。","ja":"静かな心、清らかな良心、そして優しくできる誰かです。","correct":true},{"en":"It is needing less, not owning more.","zh":"是需要更少，不是擁有更多。","ja":"より多く持つことではなく、必要とするものが少なくなることです。","correct":false},{"en":"Because kindness does not remove storms; it teaches you how to walk through them.","zh":"因為善良不會拿走風雨，它教你如何穿越風雨。","ja":"優しさは嵐を消すのではなく、その中を歩く方法を教えてくれます。","correct":false}]}];
const $=id=>document.getElementById(id);
const TOTAL=20, COIN_EVERY=5;
let idx=Number(localStorage.getItem("bw_monk_light_idx")||0), answered=false, correct=false, playing=false;

function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1600)}
function getDone(){try{return JSON.parse(localStorage.getItem("bw_monk_light_done")||"[]")}catch(e){return[]}}
function setDone(a){localStorage.setItem("bw_monk_light_done",JSON.stringify([...new Set(a)]))}
function getFailed(){try{return JSON.parse(localStorage.getItem("bw_monk_light_failed")||"[]")}catch(e){return[]}}
function setFailed(a){localStorage.setItem("bw_monk_light_failed",JSON.stringify([...new Set(a)]))}
function markFailed(day){const f=getFailed(); if(!f.includes(day)) setFailed([...f,day])}
function coinCount(){const f=getFailed(); return getDone().filter(n=>n%COIN_EVERY===0 && !f.includes(n)).length}
function setPlaying(v){playing=v;document.body.classList.toggle("playing",v);$("play").textContent=v?"⏸":"▶";$("hint").textContent=v?"播放中":"點一下播放"}
let speechToken=0;
function stopSpeech(){
  speechToken++;
  try{speechSynthesis.cancel()}catch(e){}
  setPlaying(false);
}
function voices(){
  try{return speechSynthesis.getVoices?speechSynthesis.getVoices():[]}catch(e){return[]}
}
function pickVoice(lang,role){
  const want=lang.slice(0,2).toLowerCase();
  const vs=voices().filter(v=>(v.lang||"").toLowerCase().startsWith(want));
  const male=["male","man","男","男性","daniel","david","alex","mark","fred","george","thomas","aaron","bruce","otoya","ichiro","kyushu"];
  const female=["female","woman","女","女性","samantha","zira","susan","victoria","karen","moira","tessa","kyoko","haruka","nanami","sayaka"];
  const picked=vs.map(v=>({v,score:score(v)})).sort((a,b)=>b.score-a.score)[0];
  return picked?picked.v:null;
  function score(v){
    const n=(v.name||"").toLowerCase(), vl=(v.lang||"").toLowerCase();
    let s=0;
    if(vl===lang.toLowerCase())s+=120;
    if(v.localService)s+=8;
    const isMale=male.some(x=>n.includes(x)), isFemale=female.some(x=>n.includes(x));
    if(role==="student"){
      if(isFemale)s+=160; if(isMale)s-=120;
      if(lang==="en-US"&&n.includes("samantha"))s+=90;
      if(lang==="ja-JP"&&(n.includes("kyoko")||n.includes("nanami")||n.includes("haruka")))s+=90;
    }else{
      if(isMale)s+=160; if(isFemale)s-=140;
      if(lang==="en-US"&&(n.includes("daniel")||n.includes("david")||n.includes("alex")))s+=90;
      if(lang==="ja-JP"&&(n.includes("otoya")||n.includes("ichiro")))s+=90;
    }
    return s;
  }
}
function voiceParams(lang,role){
  if(role==="student") return lang==="ja-JP" ? {rate:.76,pitch:1.18} : {rate:.78,pitch:1.12};
  return lang==="ja-JP" ? {rate:.62,pitch:.52} : {rate:.68,pitch:.58};
}
function makeUtter(text,lang,role,useVoice=true){
  const u=new SpeechSynthesisUtterance(String(text||""));
  const vp=voiceParams(lang,role);
  u.lang=lang;
  if(useVoice) u.voice=pickVoice(lang,role);
  u.rate=vp.rate;
  u.pitch=vp.pitch;
  u.volume=1;
  return u;
}
function waitMs(ms){return new Promise(r=>setTimeout(r,ms))}
function hardTimeoutMs(text,lang){
  const s=String(text||"");
  const units=lang==="ja-JP"?s.length:Math.max(1,s.split(/\s+/).filter(Boolean).length);
  return Math.max(3500,Math.min(18000,lang==="ja-JP"?2200+units*210:2200+units*430));
}
function speakStep(text,lang,role,token){
  return new Promise(resolve=>{
    if(token!==speechToken || !text){resolve(false);return}
    let finished=false, triedFallback=false, current=null;
    const finish=ok=>{if(finished)return;finished=true;clearTimeout(timer);resolve(ok)};
    const speakNow=useVoice=>{
      if(token!==speechToken){finish(false);return}
      current=makeUtter(text,lang,role,useVoice);
      current.onend=()=>finish(true);
      current.onerror=()=>{
        // Edge / 手機有時指定 voice 會失敗；失敗時立刻改用該瀏覽器預設語音重讀同一句，不能直接跳到日文。
        if(!triedFallback && useVoice){
          triedFallback=true;
          setTimeout(()=>speakNow(false),120);
        }else{
          finish(false);
        }
      };
      try{
        speechSynthesis.resume&&speechSynthesis.resume();
        speechSynthesis.speak(current);
      }catch(e){
        if(!triedFallback && useVoice){triedFallback=true;setTimeout(()=>speakNow(false),120)}else finish(false);
      }
    };
    const timer=setTimeout(()=>finish(false),hardTimeoutMs(text,lang));
    speakNow(true);
  });
}
async function speakOne(text,lang,role="monk"){
  stopSpeech();
  const token=++speechToken;
  setPlaying(true);
  await waitMs(80);
  await speakStep(text,lang,role,token);
  if(token===speechToken)setPlaying(false);
}
async function speakPair(en,ja,role="monk"){
  stopSpeech();
  const token=++speechToken;
  setPlaying(true);
  await waitMs(80);
  // 必須先英文，再日文；英文失敗時也先用預設語音重試英文，不可直接跳日文。
  await speakStep(en,"en-US",role,token);
  await waitMs(260);
  await speakStep(ja,"ja-JP",role,token);
  if(token===speechToken)setPlaying(false);
}
function speakQuestion(){return speakPair(lessons[idx].en,lessons[idx].ja,"student")}
function speakAnswer(en,ja){return speakPair(en,ja,"monk")}
function speakAnswerLang(text,lang){
  const map={en:"en-US",ja:"ja-JP",zh:"zh-TW"};
  return speakOne(text,map[lang]||"zh-TW","monk");
}
function render(){
  idx=Math.max(0,Math.min(idx,lessons.length-1)); localStorage.setItem("bw_monk_light_idx",idx);
  const l=lessons[idx]; answered=false; correct=false; stopSpeech();
  $("photo").src=(photos.length?photos[idx%photos.length]:localPhotos[idx%localPhotos.length]); $("stage").textContent=`第 ${idx+1} 關`; $("title").textContent=l.title; $("scene").textContent=l.scene;
  $("heroEn").textContent=l.en; $("heroJa").textContent=l.ja; $("heroZh").textContent=l.zh;
  const d=getDone(); $("done").textContent=`${d.length}/${TOTAL}`; $("coins").textContent=`金${coinCount()}`; $("nextCoin").textContent=`再${COIN_EVERY-(d.length%COIN_EVERY||0)}關`;
  $("complete").textContent=d.includes(l.day)?"已完成":"先答題"; $("complete").classList.remove("ready");
  const cs=[...l.choices].sort(()=>Math.random()-.5); $("choices").innerHTML="";
  cs.forEach((c,i)=>{
    const b=document.createElement("div"); b.className="choice"; b.setAttribute("role","button"); b.setAttribute("tabindex","0");
    b.innerHTML=`<span>${i+1}</span><span class="choiceText"><b>${c.en}</b><small>${c.ja}</small><em>${c.zh}</em></span><span class="voiceBtns"><button type="button" data-say="en">EN</button><button type="button" data-say="ja">日</button><button type="button" data-say="zh">中</button></span>`;
    const choose=async()=>{
      if(correct || b.classList.contains("locked"))return;
      answered=true;
      if(c.correct){
        correct=true;
        b.classList.add("ok");
        await speakAnswer(c.en,c.ja);
        $("complete").textContent="完成本關，進下一關";
        $("complete").classList.add("ready");
      }else{
        markFailed(l.day);
        b.classList.add("bad","locked");
        toast("答錯不發金幣；請選出正確答案");
        $("complete").textContent="請先選出正確答案";
        $("complete").classList.remove("ready");
        await speakAnswer(c.en,c.ja);
      }
    };
    b.onclick=async e=>{
      const langBtn=e.target.closest("[data-say]");
      if(langBtn){
        e.stopPropagation();
        const map={en:c.en,ja:c.ja,zh:c.zh};
        await speakAnswerLang(map[langBtn.dataset.say],langBtn.dataset.say);
        return;
      }
      await choose();
    };
    b.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();choose();}};
    $("choices").appendChild(b);
  });
}
function complete(){
  const l=lessons[idx]; const d=getDone();
  if(!answered){toast("先選一個答案");return}
  if(!correct){toast("要先選出正確答案，才能進下一關");return}
  if(!d.includes(l.day))setDone([...d,l.day]);
  const nd=getDone(); $("done").textContent=`${nd.length}/${TOTAL}`; $("coins").textContent=`金${coinCount()}`;
  const noCoin=getFailed().includes(l.day);
  $("rewardTitle").textContent=`第 ${l.day} 關完成！`;
  $("rewardText").textContent=noCoin?`本關曾答錯，不發金幣；已完成 ${nd.length}/${TOTAL}。`:`已完成 ${nd.length}/${TOTAL}。每 5 關可得 1 個遊客金幣。`;
  $("reward").classList.add("show");
}
function nextStage(){idx=(idx+1)%lessons.length;render()} function prevStage(){idx=(idx-1+lessons.length)%lessons.length;render()}
$("hero").onclick=e=>{if(e.target.tagName==="BUTTON")return; speakQuestion()};
$("play").onclick=()=>playing?stopSpeech():speakQuestion();
$("next").onclick=nextStage;$("prev").onclick=prevStage;$("photoNext").onclick=nextStage;$("photoPrev").onclick=prevStage;$("complete").onclick=complete;
$("rewardOk").onclick=()=>{$("reward").classList.remove("show");nextStage()};
$("music").onclick=()=>{const a=$("bgm");a.volume=.16;if(a.paused){a.play().then(()=>{$("music").textContent="♪"}).catch(()=>toast("瀏覽器擋背景音，請再點一次"))}else{a.pause();$("music").textContent="♫"}};
document.addEventListener("visibilitychange",()=>{if(document.hidden){stopSpeech();$("bgm").pause();$("music").textContent="♫"}});
if("onvoiceschanged" in speechSynthesis) speechSynthesis.onvoiceschanged=voices;
loadPhotos().then(render);
</script>
