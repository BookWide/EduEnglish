<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MP4_SRT V25</title>
<style>
body{font-family:Arial;background:#0b1a2b;color:#fff;padding:20px}
button{padding:10px 18px;margin:6px;font-size:16px;border-radius:6px;border:0;background:#1e88e5;color:white;cursor:pointer}
textarea{width:100%;height:200px;margin-top:10px}
.panel{background:#13263f;padding:15px;border-radius:10px;margin-top:15px}
</style>
</head>

<body>

<h2>MP4_SRT V25（簡化版）</h2>

<div class="panel">
<input type="file" id="srtFile">
<button onclick="loadSRT()">讀取 SRT</button>
<button onclick="autoVoice()">生成 Voice JSON</button>
<button onclick="downloadJSON()">下載 JSON</button>
</div>

<div class="panel">
<h3>SRT 內容</h3>
<textarea id="srtText"></textarea>
</div>

<div class="panel">
<h3>Voice JSON</h3>
<textarea id="jsonOut"></textarea>
</div>

<script>

let segments=[];

function loadSRT(){

const file=document.getElementById("srtFile").files[0];
if(!file){alert("請選 SRT");return}

const reader=new FileReader();

reader.onload=function(e){

const txt=e.target.result;
document.getElementById("srtText").value=txt;

parseSRT(txt);

}

reader.readAsText(file);

}


function parseSRT(text){

segments=[];

let blocks=text.trim().split(/\n\s*\n/);

blocks.forEach((b,i)=>{

let lines=b.split("\n").map(v=>v.trim());

if(lines.length>=3){

segments.push({
id:i+1,
time:lines[1],
text:lines.slice(2).join(" ")
})

}

})

alert("解析 "+segments.length+" 段");

}


function detectRole(t){

t=t.toLowerCase();

if(t.includes("mother")) return "mother";
if(t.includes("girl")||t.includes("goldilocks")) return "girl";
if(t.includes("bear")) return "bear";

return "narration";

}


function autoVoice(){

let voiceMap={

narration:{voice:"en-US-GuyNeural",pitch:"+0Hz",rate:"+0%",volume:"+0%"},
girl:{voice:"en-US-AriaNeural",pitch:"+3Hz",rate:"+5%",volume:"+0%"},
mother:{voice:"en-US-JennyNeural",pitch:"+0Hz",rate:"+0%",volume:"+0%"},
bear:{voice:"en-US-BrianNeural",pitch:"-2Hz",rate:"-5%",volume:"+0%"}

};

let out=[];

segments.forEach(s=>{

let role=detectRole(s.text);

out.push({
id:s.id,
time:s.time,
role:role,
voice:voiceMap[role].voice,
pitch:voiceMap[role].pitch,
rate:voiceMap[role].rate,
volume:voiceMap[role].volume,
text:s.text
})

});

document.getElementById("jsonOut").value=JSON.stringify(out,null,2);

}


function downloadJSON(){

let data=document.getElementById("jsonOut").value;

if(!data){alert("沒有 JSON");return}

let blob=new Blob([data],{type:"application/json"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="voice.json";
a.click();

}


</script>

</body>
</html>
