
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MP4_SRT_V28</title>
<script>
const MP4_SRT_VERSION = "V28";

let sourceFile = null;
let storyName = "";
let mode = "video";
let srtSegments = [];

function pad4(n){ return String(n).padStart(4,'0'); }

function handleSource(e){
    sourceFile = e.target.files[0];
    if(!sourceFile) return;

    storyName = sourceFile.name.replace(/\.[^/.]+$/, "");
    document.getElementById("storyLabel").innerText = storyName;

    if(sourceFile.type.startsWith("video/")){
        mode = "video";
    }else if(sourceFile.type.startsWith("image/")){
        mode = "image";
    }else{
        alert("Unsupported format");
    }
}

function parseSRT(text){
    const blocks = text.split(/\n\n+/);
    srtSegments = blocks.map(b=>{
        const lines = b.split("\n");
        if(lines.length < 3) return null;
        const times = lines[1].split(" --> ");
        return {
            start: times[0],
            end: times[1],
            text: lines.slice(2).join(" ")
        };
    }).filter(Boolean);

    document.getElementById("segmentCount").innerText = srtSegments.length;
}

function handleSRT(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ()=> parseSRT(reader.result);
    reader.readAsText(file);
}

function exportMock(){
    if(!storyName){
        alert("No source file");
        return;
    }

    let output = {
        story: storyName,
        segments: []
    };

    srtSegments.forEach((seg,i)=>{
        const id = pad4(i+1);
        output.segments.push({
            id: id,
            audio: storyName + "_" + id + ".mp3",
            image: storyName + "_" + id + ".jpg",
            start: seg.start,
            end: seg.end
        });
    });

    const blob = new Blob([JSON.stringify(output,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = storyName + "_story.json";
    a.click();
}
</script>
</head>
<body style="background:#111;color:white;font-family:Arial;padding:20px">

<h2>MP4 + SRT → OK2 (V28)</h2>
<p>Version: V28 Stable Naming</p>

<hr>

<h3>1) 匯入來源 (MP4 / JPG / PNG)</h3>
<input type="file" accept=".mp4,.jpg,.jpeg,.png" onchange="handleSource(event)">
<p>故事名: <span id="storyLabel">未選擇</span></p>

<hr>

<h3>2) 匯入 SRT</h3>
<input type="file" accept=".srt" onchange="handleSRT(event)">
<p>段數: <span id="segmentCount">0</span></p>

<hr>

<h3>3) 匯出 (命名: 故事名_0001.xxx)</h3>
<button onclick="exportMock()">下載 JSON (示範匯出格式)</button>

<hr>
<p>規則:</p>
<ul>
<li>支援 MP4 / JPG / PNG</li>
<li>JPG 模式不讀影片長度</li>
<li>每段 SRT 對應 故事名_0001.jpg / .mp3</li>
<li>缺圖不自動補</li>
<li>匯出統一 故事名_序號</li>
</ul>

</body>
</html>
