<style>

.hero{position:relative;height:241px;border-radius:20px;overflow:hidden;background:#061225;margin-bottom:5px;box-shadow:0 14px 34px rgba(0,0,0,.25);cursor:pointer}.hero img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,.04),rgba(5,12,24,.08) 35%,rgba(5,12,24,.72));pointer-events:none}.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:30px;height:30px;border:0;border-radius:999px;background:rgba(255,255,255,.82);color:#0f172a;font-size:18px;font-weight:950}.prev{left:8px}.next{right:8px}.hint{position:absolute;right:8px;bottom:8px;z-index:4;background:rgba(37,99,235,.75);border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900}

.mini{display:flex;gap:5px;overflow-x:auto;margin-bottom:5px}.mini span{flex:0 0 auto;border:1px solid rgba(96,165,250,.26);background:rgba(13,29,53,.72);color:#dbeafe;border-radius:999px;padding:4px 8px;font-size:10.5px;font-weight:900}#miniCoins{color:#fde68a;border-color:rgba(251,191,36,.36);background:rgba(251,191,36,.12)}#miniBadge{color:#bbf7d0;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.1)}.card{border:1px solid rgba(85,136,206,.42);border-radius:16px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:8px}.titleRow{display:flex;justify-content:space-between;align-items:center;gap:8px}.title b{display:block;font-size:16px}.title span{display:block;color:#c7d2fe;font-size:10.5px;font-weight:800}.controls{display:flex;gap:5px;align-items:center}.ctrl{border:1px solid var(--line);background:rgba(59,130,246,.15);color:#dbeafe;border-radius:999px;width:30px;height:30px;font-weight:950}.play{width:38px;height:38px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff}.langSel{border:1px solid var(--line);background:#0d1d35;color:#dbeafe;border-radius:999px;height:31px;padding:0 8px;font-size:12px;font-weight:900;max-width:92px}
.quiz,.speakBox{margin-top:6px;border:1px solid rgba(251,191,36,.28);border-radius:14px;background:rgba(251,191,36,.08);padding:8px}.quizQ{font-size:13px;line-height:1.25;font-weight:950;margin-bottom:6px}.choices{display:grid;gap:5px}.choice{width:100%;border:1px solid rgba(148,163,184,.24);background:rgba(15,31,56,.85);color:#eaf3ff;border-radius:12px;padding:0;text-align:left;font-weight:850;overflow:visible}.choiceInner{display:grid;grid-template-columns:24px 1fr 28px;gap:5px;align-items:center;min-height:56px;padding:8px}.choiceNo{color:#dbeafe;font-weight:950}.choiceEn{display:block;color:#fff;font-size:14px;line-height:1.18;font-weight:950}.choiceLocal{display:block;color:#c4b5fd;font-size:12px;line-height:1.15;margin-top:2px}.choiceZh{display:block;color:#dbeafe;font-size:12px;line-height:1.14;margin-top:2px}.choiceSpeak{width:26px;height:26px;border-radius:999px;border:1px solid var(--line);background:rgba(59,130,246,.16);display:grid;place-items:center}.correct{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55)}.wrong{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45)}.complete{width:100%;border:1px solid rgba(148,163,184,.28);background:rgba(148,163,184,.16);color:#cbd5e1;border-radius:999px;padding:8px;margin-top:6px;font-size:13px;font-weight:950}.ready{background:linear-gradient(135deg,#22c55e,#60a5fa)!important;border:0!important;color:#fff!important}
.speakBox{display:none;border-color:rgba(96,165,250,.35);background:rgba(30,64,115,.58)}.speakBox.show{display:block}.challengeTop{font-size:12px;color:#c7d2fe;line-height:1.4;font-weight:850;margin-bottom:7px}.tabRow{display:flex;gap:8px;margin-bottom:8px}.tab{border:1px solid var(--line);background:#102947;color:#dbeafe;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:950}.tab.on{background:#fff;color:#0f172a}.target{font-size:21px;line-height:1.35;font-weight:950;padding:8px 0;border-bottom:1px solid rgba(148,163,184,.15)}.targetLocal{font-size:14px;color:#dbeafe;font-weight:850;line-height:1.35;padding:6px 0;border-bottom:1px solid rgba(148,163,184,.12)}.refLine{font-size:14px;color:#dbeafe;font-weight:850;padding:7px 0}.refLine b{color:#93c5fd;margin-right:5px}.challengeBtns{display:flex;flex-wrap:wrap;gap:8px;margin:5px 0 8px}.challengeBtns button{border:0;border-radius:10px;padding:9px 11px;font-size:13px;font-weight:950;color:#fff;background:#334155}#recBtn{background:#f59e0b}#passBtn{background:#3b82f6}.saidBox{border:1px dashed rgba(147,197,253,.42);background:#061225;border-radius:10px;padding:8px;min-height:46px;color:#eaf3ff;line-height:1.35}.scoreBox{display:none;margin-top:8px;border-radius:12px;background:rgba(15,31,56,.78);border:1px solid rgba(96,165,250,.24);padding:9px;font-size:14px;font-weight:900}.scoreBox.show{display:block}.fallback{width:100%;min-height:48px;border:1px dashed rgba(147,197,253,.42);background:#061225;color:#eaf3ff;border-radius:10px;padding:8px;resize:vertical;margin-top:7px}
.modal{position:fixed;inset:0;z-index:99;display:none;place-items:center;background:rgba(3,7,18,.72);backdrop-filter:blur(8px);padding:18px}.modal.show{display:grid}.modalBox{width:min(420px,94vw);border:1px solid rgba(251,191,36,.38);border-radius:22px;background:linear-gradient(145deg,#122846,#071225);box-shadow:0 24px 70px rgba(0,0,0,.5);padding:18px;text-align:center}.modalBox h2{margin:0 0 8px;font-size:22px}.modalBox p{margin:0 0 12px;color:#dbeafe;font-weight:850;line-height:1.45}.modalActions{display:grid;gap:9px}.modalActions button,.modalActions a{display:block;text-decoration:none;border:0;border-radius:999px;padding:12px 14px;color:#fff;font-weight:950;background:linear-gradient(135deg,#2563eb,#60a5fa)}.modalActions .gold{background:linear-gradient(135deg,#f59e0b,#22c55e)}.portalGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.portalGrid a{border-radius:16px}
@media(max-width:390px){.hero{height:214px}.brand b{font-size:17px}.heroText{bottom:50px}.choiceEn{font-size:12.5px}.choiceLocal,.choiceZh{font-size:10.8px}.target{font-size:19px}}

<body>
<main class="app">
  <section class="top"><div class="brand"><div class="logo">📘</div><div><b>BookWide</b><span id="headerSub">英文＋日文｜中文只顯示</span></div></div><a href="./account/learning-dashboard.html">控制台</a></section>
  <section class="hero" id="hero"><img id="photo" alt=""><button class="nav prev" id="photoPrev" type="button">‹</button><button class="nav next" id="photoNext" type="button">›</button><div class="hint" id="playHint">點一下播放</div><div class="heroText"><div class="heroEn" id="heroEn"></div><div class="heroLocal" id="heroLocal"></div></div><div class="wave" aria-hidden="true"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div></section>
  <section class="mini"><span id="miniStage">第 1 關</span><span id="miniDone">0/20</span><span id="miniCoins">金0</span><span id="miniNextCoin">再5關</span><span id="miniBadge">剛出發</span></section>
  <section class="card"><div class="titleRow"><div class="title"><b id="title">Doctor English + Japanese</b><span id="scene">看醫生英文＋日文急救包</span></div><div class="controls"><button class="ctrl" id="prev" type="button">‹</button><select class="langSel" id="localSelect"><option value="ja">日文</option><option value="en">只英文</option></select><button class="ctrl play" id="play" type="button">▶</button><button class="ctrl" id="musicToggle" type="button">♫</button><button class="ctrl" id="next" type="button">›</button></div></div>
    <section class="speakBox" id="speakBox"><div class="challengeTop" id="challengeTop">任務 11 / 20｜先聽標準音，再開口說。分數超過 35 才可做題。</div><div class="tabRow"><button class="tab on" id="tabEn" type="button">英文挑戰</button><button class="tab" id="tabLocal" type="button">日文挑戰</button></div><div class="target" id="challengeTarget"></div><div class="targetLocal" id="challengeLocal"></div><div class="refLine"><b>ZH</b><span id="challengeZh"></span></div><div class="refLine"><b>參考</b><span id="challengeRef"></span></div><div class="challengeBtns"><button id="slowBtn" type="button">慢速標準音</button><button id="recBtn" type="button">開始口說</button><button id="passBtn" type="button" style="display:none">進入答題</button></div><textarea class="fallback" id="saidInput" placeholder="手機不能語音時，輸入你說的內容"></textarea><div class="challengeBtns"><button id="checkBtn" type="button">檢查分數</button></div><div class="scoreBox" id="scoreBox">你說的內容：<div class="saidBox" id="saidBox">尚未開始</div><div id="scoreText" style="margin-top:7px"></div></div></section>
    <section class="quiz" id="quizBox"><div class="quizQ" id="quizQ"></div><div class="choices" id="choices"></div><button class="complete" id="completeBtn" type="button">先答題</button></section>
  </section>
</main>
<div class="modal" id="stage1Modal"><div class="modalBox"><h2>第 1 關完成！</h2><p>你完成 1–10 題，得到 <b>2 個遊客金幣</b>。接下來可去影片館使用，或挑戰 11–20 題。</p><div class="modalActions"><button class="gold" id="openPortal" type="button">A. 去 Story / Music / Movie / News</button><button id="startStage2" type="button">B. 進入 11–20 跟讀挑戰</button></div></div></div>
<div class="modal" id="portalModal"><div class="modalBox"><h2>選擇影片館</h2><p>帶著遊客金幣進入你要看的分類。</p><div class="portalGrid"><a href="./index.html?cat=story">STORY</a><a href="./index.html?cat=music">MUSIC</a><a href="./index.html?cat=movie">MOVIE</a><a href="./index.html?cat=news">NEWS</a></div><div class="modalActions" style="margin-top:10px"><button id="backStage1" type="button">返回選擇</button></div></div></div>
<div class="modal" id="finishModal"><div class="modalBox"><h2>第 2 關完成！</h2><p>你完成 11–20 跟讀＋答題，再得到 <b>2 個遊客金幣</b>。總共 4 金幣。</p><div class="modalActions"><button class="gold" id="finishPortal" type="button">去 Story / Music / Movie / News</button></div></div></div>
<script>

const EMBEDDED={"lessons":[{"day":1,"scene":"需要醫生","title":"Need a Doctor","en":"I need to see a doctor.","zh":"我需要看醫生。","ja":"医者に診てもらいたいです。","question":{"en":"I need to see a doctor.","zh":"我需要看醫生。","ja":"医者に診てもらいたいです。"},"answer":{"en":"I can help you make an appointment.","zh":"我可以幫你預約。","ja":"予約のお手伝いをします。"},"choices":[{"en":"I can help you make an appointment.","zh":"我可以幫你預約。","ja":"予約のお手伝いをします。","correct":true},{"en":"I lost my passport.","zh":"我的護照不見了。","ja":"パスポートをなくしました。","correct":false},{"en":"How much is this medicine?","zh":"這個藥多少錢？","ja":"この薬はいくらですか。","correct":false}]},{"day":2,"scene":"預約","title":"Appointment","en":"Do I need an appointment?","zh":"我需要預約嗎？","ja":"予約が必要ですか。","question":{"en":"Do I need an appointment?","zh":"我需要預約嗎？","ja":"予約が必要ですか。"},"answer":{"en":"Yes, please make an appointment first.","zh":"是的，請先預約。","ja":"はい、まず予約してください。"},"choices":[{"en":"Yes, please make an appointment first.","zh":"是的，請先預約。","ja":"はい、まず予約してください。","correct":true},{"en":"Please show me your boarding pass.","zh":"請出示你的登機證。","ja":"搭乗券を見せてください。","correct":false},{"en":"The train leaves at nine.","zh":"火車九點開。","ja":"電車は九時に出発します。","correct":false}]},{"day":3,"scene":"不舒服","title":"Feeling Sick","en":"I do not feel well.","zh":"我不舒服。","ja":"気分が悪いです。","question":{"en":"I do not feel well.","zh":"我不舒服。","ja":"気分が悪いです。"},"answer":{"en":"Please tell me your symptoms.","zh":"請告訴我你的症狀。","ja":"症状を教えてください。"},"choices":[{"en":"Please tell me your symptoms.","zh":"請告訴我你的症狀。","ja":"症状を教えてください。","correct":true},{"en":"Your hotel room is ready.","zh":"你的飯店房間準備好了。","ja":"ホテルの部屋の準備ができています。","correct":false},{"en":"This shirt is on sale.","zh":"這件襯衫正在特價。","ja":"このシャツはセール中です。","correct":false}]},{"day":4,"scene":"發燒","title":"Fever","en":"I have a fever.","zh":"我發燒了。","ja":"熱があります。","question":{"en":"I have a fever.","zh":"我發燒了。","ja":"熱があります。"},"answer":{"en":"Let me take your temperature.","zh":"我幫你量體溫。","ja":"体温を測りましょう。"},"choices":[{"en":"Let me take your temperature.","zh":"我幫你量體 const $=id=>document.getElementById(id);function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}function lang(){return $("localSelect").value||"ja"}function cfg(){return LANGS[lang()]||LANGS.ja}function local(obj){const code=lang();if(code==="en")return"";return String(obj?.[code]||obj?.local||"")}function speechLang(){return cfg().speech}function normalize(s){return String(s||"").toLowerCase().replace(/[’']/g,"").replace(/[^a-z0-9぀-ヿ㐀-鿿가-힯ऀ-ॿ\s]/g," ").replace(/\s+/g," ").trim()}
function scoreText(a,b){a=normalize(a);b=normalize(b);if(!a||!b)return 0;const aw=a.split(" "),bw=b.split(" ");let hit=0;for(const w of aw){if(bw.includes(w))hit++}let ratio=hit/Math.max(aw.length,1);if(a.length>3&&b.includes(a))ratio=Math.max(ratio,.75);return Math.round(Math.min(100,ratio*100))}
function fetchJson(u){return fetch(u+(u.includes("?")?"&":"?")+"v="+Date.now(),{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})}
async function load(){try{let data=await fetchJson(PHOTO_JSON);let a=Array.isArray(data)?data:data.photos;if(Array.isArray(a)&&a.length)photos=a.filter(Boolean)}catch(e){console.warn("photos fallback",e)}try{let data=await fetchJson(LESSON_JSON);let a=Array.isArray(data)?data:data.lessons;if(Array.isArray(a)&&a.length)lessons=a.slice(0,TOTAL)}catch(e){console.warn("lessons fallback",e)}}
function setCoins(n){let cur=Number(localStorage.getItem("bw_guest_coins")||0);localStorage.setItem("bw_guest_coins",String(cur+n))}
function speak(t,l,rate=RATE,onDone){if(!t){onDone&&onDone();return}try{speechSynthesis.cancel()}catch(e){}const u=new SpeechSynthesisUtterance(String(t));u.lang=l;u.rate=rate;u.pitch=1;u.onend=()=>onDone&&onDone();u.onerror=()=>onDone&&onDone();speechSynthesis.speak(u)}
function speakSeq(items){try{speechSynthesis.cancel()}catch(e){}let i=0;function next(){if(i>=items.length)return;const it=items[i++];if(!it||!it.text){next();return}const u=new SpeechSynthesisUtterance(String(it.text));u.lang=it.lang||"en-US";u.rate=it.rate||RATE;u.pitch=1;u.onend=()=>setTimeout(next,220);u.onerror=()=>setTimeout(next,220);speechSynthesis.speak(u)}next()}
function renderHeroWords(text){const words=String(text||"").split(/(\s+)/);$("heroEn").innerHTML=words.map(w=>/\s+/.test(w)?w:`<span class="heroWord">${esc(w)}</span>`).join("")}
function highlightHero(){const words=[...document.querySelectorAll(".heroWord")];words.forEach(w=>w.classList.remove("on"));let i=0;const timer=setInterval(()=>{words.forEach(w=>w.classList.remove("on"));if(i>=words.length){clearInterval(timer);return}words[i++].classList.add("on")},260)}
function playQuestion(){const l=lessons[idx],lo=local(l.question||l);highlightHero();speak(l.en,"en-US",RATE,()=>{if(lo){$("heroLocal").classList.add("on");speak(lo,speechLang(),RATE,()=>$("heroLocal").classList.remove("on"))}})}
function stage2Needed(){return idx>=10}function isChallengePassed(){return !stage2Needed()||passed[idx]}
function render(){if(idx>9&&!stage2Unlocked)idx=0;const l=lessons[idx]||lessons[0],lo=local(l.question||l);answered=false;renderHeroWords(l.en);$("heroLocal").textContent=lo;$("heroLocal").style.display=lo?"block":"none";$("headerSub").textContent=`第 ${idx+1} 關｜英文＋${cfg().label}｜中文只顯示`;$("miniStage").textContent=`第 ${idx+1} 關`;$("miniDone").textContent=`${Math.min(idx,20)}/20`;$("miniCoins").textContent=`金${Number(localStorage.getItem("bw_doctor_bonus")||0)}`;$("miniNextCoin").textContent=idx<10?"完成10題送2金":"跟讀>35%";$("miniBadge").textContent=idx<10?"第1關":"第2關";$("title").textContent=l.title||"Doctor English + Japanese";$("scene").textContent=l.scene||"看醫生";$("photo").src=photos[idx%photos.length]||photos[0];renderChallenge();renderQuiz();}
function renderChallenge(){const box=$("speakBox"),quiz=$("quizBox"),l=lessons[idx];if(!stage2Needed()){box.classList.remove("show");quiz.style.display="block";return}box.classList.add("show");const done=passed[idx];quiz.style.display=done?"block":"none";$("challengeTop").textContent=`任務 ${idx+1} / 20｜先慢速聽，再開口說。分數超過 ${PASS_SCORE} 才可做題。｜本 Mission 已解鎖`;$("tabEn").classList.toggle("on",challengeMode==="en");$("tabLocal").classList.toggle("on",challengeMode!=="en");const target=challengeMode==="en"?l.en:(local(l.question||l)||l.en);const targetLocal=challengeMode==="en"?(local(l.question||l)||""):l.en;$("challengeTarget").textContent=target;$("challengeLocal").textContent=targetLocal;$("challengeLocal").style.display=targetLocal?"block":"none";$("challengeZh").textContent=(l.question&&l.question.zh)||l.zh||"";$("challengeRef").textContent=challengeMode==="en"?((l.question&&l.question.zh)||l.zh||""):l.en;$("passBtn").style.display=done?"inline-block":"none";$("scoreBox").classList.remove("show");}
function renderQuiz(){const l=lessons[idx],answers=(l.answers||l.choices||[]).slice(0,3);$("quizQ").textContent=`「${l.en}」選合理回答：`;$("completeBtn").textContent="先答題";$("completeBtn").classList.remove("ready");$("choices").innerHTML=answers.map((a,i)=>{let al=local(a);return `<button class="choice" type="button" data-i="${i}" data-c="${a.correct?'1':'0'}"><div class="choiceInner"><span class="choiceNo">${String.fromCharCode(65+i)}.</span><span class="choiceText"><span class="choiceEn">${esc(a.en||"")}</span>${al?`<span class="choiceLocal">${esc(al)}</span>`:""}<span class="choiceZh">${esc(a.zh||"")}</span></span><span class="choiceSpeak">🔊</span></div></button>`}).join("");document.querySelectorAll(".choice").forEach(b=>{b.onclick=e=>{const a=answers[Number(b.dataset.i)],al=local(a),seq=[{text:a.en,lang:"en-US"}];if(al)seq.push({text:al,lang:speechLang()});if(e.target.classList.contains("choiceSpeak")){speakSeq(seq);return}if(stage2Needed()&&!passed[idx])return;document.querySelectorAll(".choice").forEach(x=>x.disabled=true);b.classList.add(b.dataset.c==="1"?"correct":"wrong");speakSeq(seq);if(b.dataset.c==="1"){answered=true;$("completeBtn").textContent="完成本關";$("completeBtn").classList.add("ready")}else{$('completeBtn').textContent="答錯，請重整再試"}}})}
function checkChallenge(text){const l=lessons[idx];const target=challengeMode==="en"?l.en:(local(l.question||l)||l.en);const sc=scoreText(target,text);$("saidBox").textContent=text||"尚未取得內容";$("scoreText").textContent=`分數：${sc} / 100（需超過 ${PASS_SCORE}）`;$("scoreBox").classList.add("show");if(sc>PASS_SCORE){passed[idx]=true;$("passBtn").style.display="inline-block";$("scoreText").textContent+=`｜通過，可以進入答題`;renderQuiz();$("quizBox").style.display="block"}}

$("openPortal").onclick=()=>{closeModal("stage1Modal");openModal("portalModal")};$("backStage1").onclick=()=>{closeModal("portalModal");openModal("stage1Modal")};$("startStage2").onclick=()=>{stage2Unlocked=true;idx=10;closeModal("stage1Modal");render()};$("finishPortal").onclick=()=>{closeModal("finishModal");openModal("portalModal")};
$("tabEn").onclick=()=>{challengeMode="en";renderChallenge()};$("tabLocal").onclick=()=>{challengeMode="local";renderChallenge()};$("slowBtn").onclick=()=>{const l=lessons[idx];const t=challengeMode==="en"?l.en:(local(l.question||l)||l.en);speak(t,challengeMode==="en"?"en-US":speechLang(),.68)};$("passBtn").onclick=()=>{$("quizBox").scrollIntoView({behavior:"smooth",block:"nearest"})};$("checkBtn").onclick=()=>checkChallenge($("saidInput").value);
$("recBtn").onclick=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("這個瀏覽器沒有語音辨識，請在下方輸入你說的內容，再按檢查分數。");return}const rec=new SR();rec.lang=challengeMode==="en"?"en-US":speechLang();rec.interimResults=false;rec.maxAlternatives=1;$("saidBox").textContent="正在聽...";$("scoreBox").classList.add("show");rec.onresult=e=>{const txt=e.results[0][0].transcript;$("saidInput").value=txt;checkChallenge(txt)};rec.onerror=e=>{$("saidBox").textContent="語音辨識失敗，請手動輸入。"};rec.start()};
load().then(render);
</script>
