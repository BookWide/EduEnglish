function qs(k){return new URLSearchParams(location.search).get(k)||''}
function speak(txt,lang){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(txt||''));u.lang=lang==='ja'?'ja-JP':lang==='zh'?'zh-TW':'en-US';u.rate=.86;speechSynthesis.speak(u)}catch(e){}}
function localPhoto(){const direct=['mbti_cover_url','bw_mbti_cover_photo_url','bookwide_mbti_cover_url','mbti_cover_original_url','bw_mbti_cover_original_url','bookwide_mbti_cover_original_url','avatar_url','profile_photo_url','bw_profile_photo_url','bookwide_profile_photo_url'];for(const k of direct){const v=localStorage.getItem(k);if(v&&String(v).trim())return {src:String(v).trim(),source:k.includes('cover')?'cover':'avatar'}}for(const k of ['bw_user_profile','bw_profile_cache','profile_cache','bookwide_profile_cache']){try{const raw=localStorage.getItem(k);if(!raw)continue;const p=JSON.parse(raw);const cover=p.mbti_cover_url||p.bw_mbti_cover_photo_url||p.bookwide_mbti_cover_url||p.mbti_cover_original_url||p.bw_mbti_cover_original_url||p.bookwide_mbti_cover_original_url;const avatar=p.avatar_url||p.profile_photo_url||p.bw_profile_photo_url||p.bookwide_profile_photo_url||p.role_photo_url;if(cover&&String(cover).trim())return {src:String(cover).trim(),source:'cover'};if(avatar&&String(avatar).trim())return {src:String(avatar).trim(),source:'avatar'};}catch(e){}}return {src:'',source:'none'}}
async function fetchProfilePhoto(){const c=localPhoto();if(c.src)return c;if(!supa)return c;try{const ur=await supa.auth.getUser();const user=ur?.data?.user;if(!user)return c;const {data}=await supa.from('profiles').select('avatar_url,mbti_cover_url,mbti_cover_original_url,name,display_name').eq('id',user.id).single();if(!data)return c;const src=data.mbti_cover_url||data.mbti_cover_original_url||data.avatar_url||'';if(data.mbti_cover_url){localStorage.setItem('mbti_cover_url',data.mbti_cover_url);localStorage.setItem('bw_mbti_cover_photo_url',data.mbti_cover_url)}if(data.mbti_cover_original_url){localStorage.setItem('mbti_cover_original_url',data.mbti_cover_original_url);localStorage.setItem('bw_mbti_cover_original_url',data.mbti_cover_original_url)}if(data.avatar_url){localStorage.setItem('avatar_url',data.avatar_url);localStorage.setItem('profile_photo_url',data.avatar_url);localStorage.setItem('bw_profile_photo_url',data.avatar_url)}return {src,source:data.mbti_cover_url?'cover':(data.avatar_url?'avatar':'none'),name:data.display_name||data.name||'你'}}catch(e){return c}}
async function loadPhoto(force=false){if(force)['mbti_cover_url','bw_mbti_cover_photo_url','bookwide_mbti_cover_url','mbti_cover_original_url','bw_mbti_cover_original_url','bookwide_mbti_cover_original_url','avatar_url','profile_photo_url','bw_profile_photo_url','bookwide_profile_photo_url'].forEach(k=>localStorage.removeItem(k));actorState=await fetchProfilePhoto();actorState.name=actorState.name||'你';avatarThumb.src=actorState.src||fallbackPhoto;photoBadge.textContent=actorState.src?(actorState.source==='cover'?'✅ MBTI 封面':'🙂 一般頭像'):'⚠️ 無照片';actorStatus.textContent=actorState.src?'主角照已就位':'請到 Profile 上傳封面照';}
async function loadR2List(){try{const r=await fetch('data/monk/mbti-ex/mbti-ex_photos.json?ts='+Date.now(),{cache:'no-store'});if(r.ok)r2List=await r.json();}catch(e){r2List=[]}}
function normVideoConfig(data){
  if(Array.isArray(data))return data.filter(Boolean);
  if(data&&Array.isArray(data.items))return data.items.filter(Boolean);
  if(data&&Array.isArray(data.videos))return data.videos.filter(Boolean);
  if(data&&typeof data==='object'){
    const out=[];
    Object.keys(data).forEach(k=>{
      const v=data[k];
      if(Array.isArray(v))v.forEach(x=>out.push(Object.assign({type:k},typeof x==='string'?{youtubeId:x}:x)));
      else if(v&&typeof v==='object')out.push(Object.assign({type:k},v));
      else if(typeof v==='string')out.push({type:k,youtubeId:v});
    });
    return out;
  }
  return [];
}
async function loadYouTubeList(){try{const r=await fetch('data/monk/mbti-ex/mbti-ex_videos.json?ts='+Date.now(),{cache:'no-store'});if(r.ok)ytList=normVideoConfig(await r.json());}catch(e){ytList=[]}}
function parseYouTubeId(v){
  const s=String(v||'').trim();
  if(!s)return '';
  if(/^[A-Za-z0-9_-]{11}$/.test(s))return s;
  const m=s.match(/(?:youtube\.com\/(?:shorts\/|watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:'';
}
function ytToken(item){
  if(!item)return '';
  if(typeof item==='string'){const id=parseYouTubeId(item);return id?'yt:'+id+'|0|0':'';}
  const id=parseYouTubeId(item.youtubeId||item.yt||item.url||item.href||'');
  if(!id)return '';
  const start=Number(item.start||0)||0, end=Number(item.end||0)||0;
  return 'yt:'+id+'|'+start+'|'+end;
}
function ytCandidates(type,scene){
  const p=new URLSearchParams(location.search);
  const qid=parseYouTubeId(p.get('youtubeId')||p.get('yt')||'');
  const q=qid?[`yt:${qid}|0|0`]:[];
  const typeU=String(type||'').toUpperCase();
  const fromJson=(ytList||[]).filter(x=>{
    const xt=String(x.type||x.mbti||'').toUpperCase();
    const xs=String(x.scene||'');
    return (!xt||xt===typeU)&&(!xs||xs===scene);
  }).map(ytToken).filter(Boolean);
  return [...q,...fromJson].filter((v,i,a)=>a.indexOf(v)===i);
}

function fillTypes(){const order=['ISTJ','ISFJ','INFJ','INTJ','ISTP','ISFP','INFP','INTP','ESTP','ESFP','ENFP','ENTP','ESTJ','ESFJ','ENFJ','ENTJ'];me.innerHTML=order.map(k=>`<option value="${k}">${k}｜${TYPES[k].zh}</option>`).join('');const p=(qs('me')||qs('type')||localStorage.getItem('mbti_last_type')||'INFP').toUpperCase();if(TYPES[p])me.value=p}
function mediaCandidates(type,scene){
  const manual=mediaUrl.value.trim();
  const manualYt=parseYouTubeId(manual);
  const manualList=manual?(manualYt?[`yt:${manualYt}|0|0`]:[manual]):[];
  const local=[`ads/monk/mbti-ex/${type}(小娟).mp4`,`ads/monk/mbti-ex/${type}.mp4`,`/ads/monk/mbti-ex/${type}(小娟).mp4`,`/ads/monk/mbti-ex/${type}.mp4`];
  const match=(r2List||[]).filter(u=>String(u).toUpperCase().includes(type));
  return [...manualList,...ytCandidates(type,scene),...match,...local].filter((v,i,a)=>v&&a.indexOf(v)===i);
}
function mediaHTML(url,fallback){
  const raw=String(url||''), low=raw.toLowerCase();
  const cands=encodeURIComponent(JSON.stringify(window.__CANDS||[]));
  if(raw.startsWith('yt:')){
    const parts=raw.split('|'), id=parts[0].slice(3);
    const start=parseInt(parts[1]||'0',10)||0, end=parseInt(parts[2]||'0',10)||0;
    const src=`https://www.youtube.com/embed/${encodeURIComponent(id)}?enablejsapi=1&playsinline=1&rel=0&modestbranding=1&start=${start}`;
    return `<iframe id="mainMedia" class="media ytFrame" src="${src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen data-idx="0" data-cands="${cands}" data-ytid="${esc(id)}" data-ytend="${end}"></iframe><div class="videoHint ytHint">YouTube 連結播放，不下載</div>`;
  }
  if(url && low.includes('.mp4'))return `<video id="mainMedia" class="media" src="${esc(url)}" playsinline preload="metadata" poster="${esc(fallback||'')}" data-idx="0" data-cands="${cands}"></video><div class="videoHint">影片可播放 / 暫停</div>`;
  if(url)return `<img id="mainMedia" class="media" src="${esc(url)}" alt="media">`;
  if(fallback)return `<img id="mainMedia" class="media" src="${esc(fallback)}" alt="profile">`;
  return `<div class="fallbackPhoto">上傳 Profile 封面照<br>或填入 R2 MP4 URL</div>`;
}
function textLines(txt){return String(txt||'').split('\n').map(s=>s.trim()).filter(Boolean)}
function compactCaption(txt){const lines=textLines(txt);const keep=lines.slice(0,3);if(lines.length>3&&keep.length)keep[keep.length-1]+=' …';return keep.join('\n')}
function cueReaction(txt,tag){const lines=textLines(txt);const beats=lines.slice(1).filter(Boolean);const out=beats.slice(0,3);return (out.length?out.join(' / '):lines[0]||tag||'').replace(/\s+/g,' ').trim()}

function currentMedia(){return document.getElementById('mainMedia')}
function ytCommand(cmd,args=[]){
  const v=currentMedia();
  if(!v||v.tagName!=='IFRAME')return;
  try{v.contentWindow.postMessage(JSON.stringify({event:'command',func:cmd,args:args}),'*')}catch(e){}
}
function enhanceMedia(){
  const v=currentMedia();
  if(!v)return;
  if(v.tagName==='IFRAME'){ytPlaying=false;playBtn.textContent='▶ 播放';return;}
  if(v.tagName!=='VIDEO')return;
  v.playbackRate=parseFloat(speedRange.value||'1');
  v.addEventListener('click',togglePlay);
  v.addEventListener('play',()=>playBtn.textContent='⏸ 暫停');
  v.addEventListener('pause',()=>playBtn.textContent='▶ 播放');
  v.addEventListener('ended',()=>{if(loopOne){v.currentTime=0;v.play().catch(()=>{})}});
  v.addEventListener('error',()=>{try{const list=JSON.parse(decodeURIComponent(v.dataset.cands||'%5B%5D'));let i=parseInt(v.dataset.idx||'0',10)+1;if(i<list.length){v.dataset.idx=String(i);v.src=list[i];v.load();mediaMode.textContent='媒體備援：'+list[i]}else if(actorState.src){const img=document.createElement('img');img.id='mainMedia';img.className='media';img.src=actorState.src;v.replaceWith(img);}}catch(e){}});
}
function togglePlay(){
  const v=currentMedia();if(!v)return;
  if(v.tagName==='IFRAME'){ytPlaying=!ytPlaying;ytCommand(ytPlaying?'playVideo':'pauseVideo');playBtn.textContent=ytPlaying?'⏸ 暫停':'▶ 播放';return;}
  if(v.tagName!=='VIDEO')return;
  if(v.paused)v.play().catch(()=>{});else v.pause();
}
function replay(){
  const v=currentMedia();
  if(v&&v.tagName==='IFRAME'){ytCommand('seekTo',[0,true]);ytCommand('playVideo');ytPlaying=true;playBtn.textContent='⏸ 暫停';return;}
  if(v&&v.tagName==='VIDEO'){v.currentTime=0;v.play().catch(()=>{})}
}
function buildCues(t,sc,mainZh){const reaction=cueReaction(mainZh,t.tag);return [{time:'00:00',en:sc.en,zh:sc.zh},{time:'00:04',en:'Reaction beat',zh:reaction},{time:'00:08',en:'Mood tag',zh:t.tag}]}
function render(){const type=me.value, scene=sceneSel(), t=TYPES[type], sc=SCENES[scene];localStorage.setItem('mbti_last_type',type);const cands=mediaCandidates(type,scene);window.__CANDS=cands;const media=cands[0]||'';const fallback=actorState.src||fallbackPhoto;const mainZh=scene==='see'?t.see:t.msg;const compactZh=compactCaption(mainZh);storyCard.innerHTML=`${mediaHTML(media,fallback)}<div class="dim"></div><div class="typeTop"><div class="typeChip"><b>${esc(type)} </b><span>${esc(t.zh)} / ${esc(t.en)}</span></div><div class="thumbWrap"><img class="topThumb" src="${esc(actorState.src||fallbackPhoto)}"><div class="sceneChip">${esc(sc.zh)}</div></div></div><div class="caption"><div class="zh">${esc(compactZh)}</div><span class="tag">${esc(t.tag)}</span></div>`;enhanceMedia();
langPanel.innerHTML=`<div class="subtitleNow"><button class="speak" onclick="speak('${esc(t.lineEN)}','en')">🔊</button><h2>可跟讀句 / Practice line</h2><p class="bigEN">${esc(t.lineEN)}</p><p class="lineJP">${esc(t.lineJA)}</p><p class="lineZH">${esc(t.lineZH)}</p></div>`;const cues=buildCues(t,sc,mainZh);cueList.innerHTML=cues.map((c,i)=>`<div class="cueItem ${i===0?'active':''}"><div class="cueTime">${c.time}</div><div class="cueText"><b>${esc(c.en)}</b><span>${esc(c.zh)}</span></div></div>`).join('');mediaMode.textContent='媒體來源：'+(media||'Profile / 示意圖')+'｜備援 '+cands.length+' 個';}
function sceneSel(){return document.getElementById('scene').value}
playBtn.onclick=togglePlay;replayBtn.onclick=replay;prevBtn.onclick=()=>{curIdx=Math.max(0,curIdx-1);replay()};nextBtn.onclick=()=>{curIdx++;replay()};loopBtn.onclick=()=>{loopOne=!loopOne;loopBtn.classList.toggle('green',loopOne);loopBtn.textContent=loopOne?'✅ 循環':'🔁 循環'};coinBtn.onclick=()=>{let n=parseInt(localStorage.getItem('bw_guest_coins')||'0',10);if(n>0){n--;localStorage.setItem('bw_guest_coins',String(n));coinState.textContent='已扣｜餘 '+n}else{coinState.textContent='未扣｜餘額不足'}};speedRange.oninput=()=>{speedVal.textContent=parseFloat(speedRange.value).toFixed(2)+'x';const v=currentMedia();if(v&&v.tagName==='VIDEO')v.playbackRate=parseFloat(speedRange.value)};
fillTypes();['me','scene','mediaUrl'].forEach(id=>document.getElementById(id).addEventListener('change',render));buildBtn.onclick=render;reloadPhotoBtn.onclick=async()=>{await loadPhoto(true);render()};Promise.all([loadPhoto(),loadR2List(),loadYouTubeList()]).then(render);
</script>
</body></html>
