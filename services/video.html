<!doctype html>
<html lang="zh-Hant">
<head>

<title>影片介紹｜BookWide</title>

<style>
body{margin:0;font-family:Arial;background:#fff;color:#111}
.wrap{max-width:960px;margin:auto;padding:20px}
.topbar{background:#0b1324;color:#fff}

.btn{

  background:#145ef6;
  color:#fff;
  padding:14px 24px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
}

@media(max-width:720px){
  .body{grid-template-columns:1fr}
}
</style>
</head>
