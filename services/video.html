<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>影片介紹｜BookWide</title>

<style>
:root{
  --bg:#f4f7fb;
  --nav:#081225;
  --card:#ffffff;
  --line:#dbe4f0;
  --text:#0f172a;
  --muted:#64748b;
  --blue:#2563eb;
  --green:#22c55e;
  --gold:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at 10% 0%,rgba(37,99,235,.12),transparent 30%),var(--bg);color:var(--text)}
.topbar{background:var(--nav);color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
.topbar-inner{max-width:1120px;margin:auto;padding:16px 20px;font-size:22px;font-weight:900;display:flex;align-items:center;gap:10px}
.topbar-inner a{color:#fff;text-decoration:none}
.wrap{max-width:1120px;margin:auto;padding:22px 18px 38px}

.hero-guide{
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:18px;
  align-items:stretch;
  background:linear-gradient(135deg,#071225,#113b72 58%,#071225);
  border-radius:28px;
  padding:22px;
  box-shadow:0 22px 48px rgba(15,23,42,.18);
  color:#fff;
  overflow:hidden;
  position:relative;
}
.hero-guide:before{
  content:"";
  position:absolute;
  right:-80px;
  top:-120px;
  width:430px;
  height:430px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,.38),transparent 68%);
}
.hero-guide>*{position:relative;z-index:1}

.video-box{
  background:#000;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 16px 36px rgba(0,0,0,.35);
}
video{width:100%;height:100%;display:block;object-fit:cover}

.ai-card{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:14px;
  padding:8px 4px;
}
.ai-kicker{display:inline-flex;align-items:center;gap:8px;width:max-content;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800;color:#dbeafe}
.ai-title{font-size:34px;line-height:1.15;margin:0;font-weight:950;letter-spacing:-.5px}
.ai-sub{margin:0;color:#dbeafe;line-height:1.7;font-size:15px}
.ai-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  color:#fff;text-decoration:none;border-radius:999px;font-weight:900;
  padding:12px 18px;border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1);
}
.btn.primary{background:linear-gradient(90deg,var(--gold),var(--green));border:0}
.btn.blue{background:var(--blue);border-color:var(--blue)}

.panel{margin-top:18px;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:var(--card);box-shadow:0 12px 30px rgba(15,23,42,.06)}
.head{padding:20px 22px;background:#f8fafc;border-bottom:1px solid var(--line)}
.head h1{margin:0 0 6px;font-size:28px}
.muted{color:var(--muted);line-height:1.6}
.guide-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:18px}
.step{
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  background:linear-gradient(180deg,#fff,#f8fbff);
  min-height:128px;
}
.step b{display:block;font-size:18px;margin-bottom:8px}
.step span{color:#475569;line-height:1.55;font-size:14px}

.emma-box{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}
.emma-route{
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  box-shadow:0 10px 24px rgba(15,23,42,.05);
}
.emma-route h3{margin:0 0 8px;font-size:18px}
.emma-route p{margin:0 0 12px;color:#64748b;line-height:1.55;font-size:14px}
.route-btn{display:inline-flex;border-radius:999px;background:#0f172a;color:#fff;text-decoration:none;padding:9px 13px;font-weight:800;font-size:13px}

.cta{text-align:center;margin:26px 0 0}


.emma-direct-panel{overflow:hidden}
.emma-head{background:linear-gradient(135deg,#f8fafc,#eef6ff)}
.emma-pick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px}
.pick-card{display:flex;gap:12px;align-items:flex-start;text-decoration:none;color:var(--text);border:1px solid var(--line);border-radius:20px;padding:18px;background:linear-gradient(180deg,#fff,#f7fbff);box-shadow:0 10px 24px rgba(15,23,42,.05);min-height:128px;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
.pick-card:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(15,23,42,.10);border-color:#93c5fd}
.pick-icon{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:#0f172a;color:#fff;font-size:22px;flex:0 0 44px}
.pick-card b{display:block;font-size:19px;margin:2px 0 8px}
.pick-card span{display:block;color:#475569;line-height:1.55;font-size:14px}
@media(max-width:820px){.emma-pick-grid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.emma-pick-grid{grid-template-columns:1fr;padding:12px}.pick-card{min-height:auto;padding:15px}.pick-card b{font-size:17px}}
@media(max-width:820px){
  .hero-guide{grid-template-columns:1fr;padding:16px;border-radius:22px}
  .ai-title{font-size:28px}
  .guide-grid{grid-template-columns:1fr 1fr}
  .emma-box{grid-template-columns:1fr}
}
@media(max-width:520px){
  .wrap{padding:14px 10px 28px}
  .topbar-inner{padding:12px 14px;font-size:20px}
  .guide-grid{grid-template-columns:1fr;padding:12px}
  .head{padding:16px}
  .hero-guide{border-radius:18px}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner"><a href="../index.html">← BookWide</a></div>
</div>

<div class="wrap">

<section class="hero-guide">
  <div class="video-box">
    <video 
      controls 
      playsinline 
      webkit-playsinline
      preload="metadata"
      src="https://pub-578e9e060a104f24b6865e26eb941648.r2.dev/ads/home/introduce.mp4">
    </video>
  </div>

  <div class="ai-card">
    <div class="ai-kicker">🤖 Emma AI 助理導覽</div>
    <h1 class="ai-title">不知道先看哪裡？<br>我直接帶你走。</h1>
    <p class="ai-sub">
      第一次來 BookWide，先看影片介紹。了解「看影片、跟字幕、記單字、做測驗」後，再進入首頁挑教材。
    </p>
    <div class="ai-actions">
      <a class="btn primary" href="../index.html">讓 Emma 帶我選教材</a>
      <a class="btn" href="../go.html?a=airport">先玩旅遊英文</a>
    </div>
  </div>
</section>

<div class="panel emma-direct-panel">
  <div class="head emma-head">
    <h1>Emma 幫你選路線</h1>
    <div class="muted">看完介紹，不用讀說明書。直接選你想學的方向。</div>
  </div>

  <div class="emma-pick-grid">
    <a class="pick-card" href="../go.html?a=airport">
      <div class="pick-icon">✈️</div>
      <div>
        <b>我要出國</b>
        <span>Airport → Hotel → Shopping → Directions</span>
      </div>
    </a>

    <a class="pick-card" href="../index.html?cat=music">
      <div class="pick-icon">🎵</div>
      <div>
        <b>我喜歡聽歌</b>
        <span>用音樂練聽力、字幕、跟讀。</span>
      </div>
    </a>

    <a class="pick-card" href="../index.html?cat=movie">
      <div class="pick-icon">🎬</div>
      <div>
        <b>我想看電影</b>
        <span>看短片、學句子、做測驗。</span>
      </div>
    </a>

    <a class="pick-card" href="../heart.html">
      <div class="pick-icon">❤️</div>
      <div>
        <b>最近心情不好</b>
        <span>進 Heart / Monk，用情境問答學語言。</span>
      </div>
    </a>
  </div>
</div>

<div class="cta">
  <a class="btn blue" href="../index.html">回首頁選教材 →</a>
</div>

</div>

</body>
</html>
