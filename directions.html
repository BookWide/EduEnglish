<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BookWide 問路英文＋多國闖關 Clean V2</title>
<style>
:root{--bg:#071225;--card:#0d1d35;--panel:#122846;--line:rgba(96,165,250,.35);--ink:#eef6ff;--muted:#9fb4d1;--blue:#3b82f6;--green:#22c55e;--gold:#facc15}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Microsoft JhengHei",sans-serif}
button,select{font:inherit}.app{max-width:520px;margin:0 auto;padding:7px 8px 22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}.brand{display:flex;gap:7px;align-items:center}.logo{width:27px;height:27px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center;font-weight:900}.brand b{display:block;font-size:18px;line-height:1}.brand span{display:block;color:#b9cff0;font-size:10.5px;font-weight:850}.top a{color:#dbeafe;text-decoration:none;border:1px solid var(--line);background:rgba(15,31,56,.78);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}
.hero{position:relative;height:241px;border-radius:20px;overflow:hidden;background:#061225;margin-bottom:5px;box-shadow:0 14px 34px rgba(0,0,0,.25);cursor:pointer}.hero img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,.04),rgba(5,12,24,.08) 35%,rgba(5,12,24,.72));pointer-events:none}.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:30px;height:30px;border:0;border-radius:999px;background:rgba(255,255,255,.82);color:#0f172a;font-size:18px;font-weight:950}.prev{left:8px}.next{right:8px}.hint{position:absolute;right:8px;bottom:8px;z-index:4;background:rgba(37,99,235,.75);border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900}
.heroText{position:absolute;left:12px;right:12px;bottom:54px;z-index:4;text-align:center;text-shadow:0 3px 16px rgba(0,0,0,.9)}.heroEn{font-size:clamp(14px,4vw,22px);font-weight:950;line-height:1.12}.heroLocal{margin-top:5px;font-size:clamp(11px,3.2vw,17px);font-weight:950;line-height:1.18;color:#f8fbff}.wave{position:absolute;left:0;right:0;bottom:0;height:50px;z-index:4;background:linear-gradient(180deg,transparent,rgba(3,8,18,.8));display:flex;align-items:end;justify-content:center;gap:3px;padding-bottom:12px}.bar{width:3px;border-radius:99px;background:#60a5fa;height:10px;animation:w 1s infinite ease-in-out}.bar:nth-child(2n){animation-delay:.12s}.bar:nth-child(3n){animation-delay:.25s}@keyframes w{50%{height:23px;background:#fde047}}
.mini{display:flex;gap:5px;overflow-x:auto;margin-bottom:5px}.mini span{flex:0 0 auto;border:1px solid rgba(96,165,250,.26);background:rgba(13,29,53,.72);color:#dbeafe;border-radius:999px;padding:4px 8px;font-size:10.5px;font-weight:900}.card{border:1px solid rgba(85,136,206,.42);border-radius:16px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:8px}.titleRow{display:flex;justify-content:space-between;align-items:center;gap:8px}.title b{display:block;font-size:16px}.title span{display:block;color:#c7d2fe;font-size:10.5px;font-weight:800}.controls{display:flex;gap:5px;align-items:center}.ctrl{border:1px solid var(--line);background:rgba(59,130,246,.15);color:#dbeafe;border-radius:999px;width:30px;height:30px;font-weight:950}.play{width:38px;height:38px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff}.langSel{border:1px solid var(--line);background:#0d1d35;color:#dbeafe;border-radius:999px;height:31px;padding:0 8px;font-size:12px;font-weight:900;max-width:92px}
.quiz{margin-top:6px;border:1px solid rgba(251,191,36,.28);border-radius:14px;background:rgba(251,191,36,.08);padding:8px}.quizQ{font-size:13px;line-height:1.25;font-weight:950;margin-bottom:6px}.choices{display:grid;gap:5px}.choice{width:100%;border:1px solid rgba(148,163,184,.24);background:rgba(15,31,56,.85);color:#eaf3ff;border-radius:12px;padding:0;overflow:hidden;text-align:left;font-weight:850}.choiceInner{display:grid;grid-template-columns:22px 1fr 28px;gap:5px;align-items:center;min-height:44px;padding:7px 8px}.choiceNo{color:#dbeafe;font-weight:950}.choiceEn{display:block;color:#fff;font-size:14px;line-height:1.18;font-weight:950}.choiceLocal{display:block;color:#c4b5fd;font-size:12px;line-height:1.15;margin-top:2px}.choiceZh{display:block;color:#dbeafe;font-size:12px;line-height:1.14;margin-top:2px}.choiceSpeak{width:26px;height:26px;border-radius:999px;border:1px solid var(--line);background:rgba(59,130,246,.16);display:grid;place-items:center}.correct{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.55)}.wrong{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45)}.complete{width:100%;border:1px solid rgba(148,163,184,.28);background:rgba(148,163,184,.16);color:#cbd5e1;border-radius:999px;padding:8px;margin-top:6px;font-size:13px;font-weight:950}.ready{background:linear-gradient(135deg,#22c55e,#60a5fa);border:0;color:#fff}
@media(max-width:390px){.hero{height:214px}.brand b{font-size:17px}.heroText{bottom:50px}.choiceEn{font-size:12.5px}.choiceLocal,.choiceZh{font-size:10.8px}}
</style>
</head>
<body>
<main class="app">
  <section class="top"><div class="brand"><div class="logo">📘</div><div><b>BookWide</b><span id="headerSub">英文＋日文｜中文只顯示</span></div></div><a href="./account/learning-dashboard.html">控制台</a></section>
  <section class="hero" id="hero">
    <img id="photo" alt="">
    <button class="nav prev" id="photoPrev" type="button">‹</button><button class="nav next" id="photoNext" type="button">›</button>
    <div class="hint" id="playHint">點一下播放</div>
    <div class="heroText"><div class="heroEn" id="heroEn"></div><div class="heroLocal" id="heroLocal"></div></div>
    <div class="wave" aria-hidden="true"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
  </section>
  <section class="mini"><span id="miniStage">第 1 關</span><span id="miniDone">0/20</span><span id="miniCoins">金0</span><span id="miniNextCoin">再5關</span><span id="miniBadge">剛出發</span></section>
  <section class="card">
    <div class="titleRow">
      <div class="title"><b id="title">Directions English + Local</b><span id="scene">問路英文＋多國急救包</span></div>
      <div class="controls">
        <button class="ctrl" id="prev" type="button">‹</button>
        <select class="langSel" id="localSelect">
          <option value="ja">日文</option><option value="en">只英文</option><option value="it">義大利文</option><option value="da">丹麥文</option><option value="es">西班牙文</option><option value="fr">法文</option><option value="de">德文</option><option value="ko">韓文</option><option value="ne">尼泊爾文</option><option value="hi">印地文</option>
        </select>
        <button class="ctrl play" id="play" type="button">▶</button><button class="ctrl" id="musicToggle" type="button">♫</button><button class="ctrl" id="next" type="button">›</button>
      </div>
    </div>
    <section class="quiz"><div class="quizQ" id="quizQ"></div><div class="choices" id="choices"></div><button class="complete" id="completeBtn" type="button">先答題</button></section>
  </section>
</main>

<script>
const PHOTO_JSON="assets/directions/photos.json";
const LESSON_JSON="assets/directions/directions_lessons_20.json";
const RATE=.8,TOTAL=20,COIN_EVERY=5;
const LANGS={ja:{label:"日文",speech:"ja-JP"},it:{label:"義大利文",speech:"it-IT"},da:{label:"丹麥文",speech:"da-DK"},es:{label:"西班牙文",speech:"es-ES"},fr:{label:"法文",speech:"fr-FR"},de:{label:"德文",speech:"de-DE"},ko:{label:"韓文",speech:"ko-KR"},ne:{label:"尼泊爾文",speech:"ne-NP"},hi:{label:"印地文",speech:"hi-IN"},en:{label:"只英文",speech:"en-US"}};
const DEFAULT=[
{scene:"開口問路",title:"Asking Directions",en:"Excuse me, could you help me?",zh:"不好意思，可以幫我嗎？",ja:"すみません、助けていただけますか。",it:"Scusi, potrebbe aiutarmi?",da:"Undskyld, kan du hjælpe mig?",es:"Disculpe, ¿podría ayudarme?",fr:"Excusez-moi, pourriez-vous m’aider ?",de:"Entschuldigung, könnten Sie mir helfen?",ko:"실례합니다, 도와주실 수 있나요?",ne:"माफ गर्नुहोस्, के तपाईं मलाई मद्दत गर्न सक्नुहुन्छ?",hi:"माफ कीजिए, क्या आप मेरी मदद कर सकते हैं?",answers:[
{en:"Sure. Where would you like to go?",zh:"可以，你想去哪裡？",ja:"もちろんです。どこへ行きたいですか。",it:"Certo. Dove vorrebbe andare?",da:"Selvfølgelig. Hvor vil du gerne hen?",es:"Claro. ¿Adónde le gustaría ir?",fr:"Bien sûr. Où voulez-vous aller ?",de:"Gerne. Wohin möchten Sie gehen?",ko:"물론이죠. 어디로 가고 싶으세요?",ne:"हुन्छ। तपाईं कहाँ जान चाहनुहुन्छ?",hi:"ज़रूर। आप कहाँ जाना चाहेंगे?",correct:true},
{en:"Please show me your boarding pass.",zh:"請出示你的登機證。",ja:"搭乗券を見せてください。",it:"Mi mostri la carta d’imbarco, per favore.",da:"Vis mig venligst dit boardingkort.",es:"Muéstreme su tarjeta de embarque, por favor.",fr:"Veuillez me montrer votre carte d’embarquement.",de:"Bitte zeigen Sie mir Ihre Bordkarte.",ko:"탑승권을 보여 주세요.",ne:"कृपया आफ्नो बोर्डिङ पास देखाउनुहोस्।",hi:"कृपया अपना बोर्डिंग पास दिखाइए।"},
{en:"Take this medicine after meals.",zh:"請飯後吃這個藥。",ja:"食後にこの薬を飲んでください。",it:"Prenda questa medicina dopo i pasti.",da:"Tag denne medicin efter måltider.",es:"Tome este medicamento después de comer.",fr:"Prenez ce médicament après les repas.",de:"Nehmen Sie dieses Medikament nach dem Essen.",ko:"식후에 이 약을 드세요.",ne:"यो औषधि खाना पछि खानुहोस्।",hi:"यह दवा खाने के बाद लें।"}]},
{scene:"找車站",title:"Finding the Station",en:"Where is the nearest station?",zh:"最近的車站在哪裡？",ja:"最寄りの駅はどこですか。",it:"Dov’è la stazione più vicina?",da:"Hvor er den nærmeste station?",es:"¿Dónde está la estación más cercana?",fr:"Où est la gare la plus proche ?",de:"Wo ist der nächste Bahnhof?",ko:"가장 가까운 역이 어디예요?",ne:"नजिकैको स्टेशन कहाँ छ?",hi:"सबसे नज़दीकी स्टेशन कहाँ है?",answers:[
{en:"Go straight and turn left.",zh:"直走後左轉。",ja:"まっすぐ行って、左に曲がってください。",it:"Vada dritto e giri a sinistra.",da:"Gå ligeud og drej til venstre.",es:"Siga recto y gire a la izquierda.",fr:"Allez tout droit puis tournez à gauche.",de:"Gehen Sie geradeaus und biegen Sie links ab.",ko:"곧장 가서 왼쪽으로 도세요.",ne:"सिधा जानुहोस् र बायाँ मोडिनुहोस्।",hi:"सीधे जाइए और बाएँ मुड़िए।",correct:true},
{en:"I would like a table for two.",zh:"我想要兩人座。",ja:"二名席をお願いします。",it:"Vorrei un tavolo per due.",da:"Jeg vil gerne have et bord til to.",es:"Quisiera una mesa para dos.",fr:"Je voudrais une table pour deux.",de:"Ich hätte gern einen Tisch für zwei.",ko:"두 명 자리 부탁합니다.",ne:"म दुई जनाको लागि टेबल चाहन्छु।",hi:"मुझे दो लोगों के लिए एक मेज़ चाहिए।"},
{en:"The food was delicious.",zh:"食物很好吃。",ja:"料理はおいしかったです。",it:"Il cibo era delizioso.",da:"Maden var lækker.",es:"La comida estaba deliciosa.",fr:"La nourriture était délicieuse.",de:"Das Essen war lecker.",ko:"음식이 맛있었어요.",ne:"खाना स्वादिष्ट थियो।",hi:"खाना स्वादिष्ट था।"}]}
];
const BASE_EN=[
["I am looking for the bus stop.","我在找公車站。"],["How far is it from here?","從這裡走多遠？"],["Can I walk there?","我可以走路到那裡嗎？"],["Which way should I go?","我應該往哪個方向走？"],["Is it on this street?","是在這條街上嗎？"],["Can you show me on the map?","可以在地圖上指給我看嗎？"],["Do I need to cross the road?","我需要過馬路嗎？"],["Is there a subway station nearby?","附近有地鐵站嗎？"],["Where can I buy a ticket?","我在哪裡可以買票？"],["Does this bus go downtown?","這班公車有到市中心嗎？"],["I think I am lost.","我想我迷路了。"],["Could you say that again slowly?","可以再慢慢說一次嗎？"],["Turn right at the corner.","在轉角右轉。"],["Go past the traffic light.","經過紅綠燈。"],["It is next to the bank.","它在銀行旁邊。"],["You will see it on your left.","你會在左手邊看到。"],["Thank you for your help.","謝謝你的幫忙。"],["I can find it now.","我現在找得到路了。"]];
function buildLessons(){let arr=DEFAULT.map((x,i)=>({...x,day:i+1}));BASE_EN.forEach((p,i)=>arr.push({day:i+3,scene:"問路",title:"Directions",en:p[0],zh:p[1],ja:"",it:"",da:"",es:"",fr:"",de:"",ko:"",ne:"",hi:"",answers:[{en:"Yes, that is correct.",zh:"是的，這樣對。",correct:true},{en:"No, this is a restaurant.",zh:"不，這是餐廳。"},{en:"Please take this medicine.",zh:"請吃這個藥。"}]}));return arr.slice(0,TOTAL)}
let lessons=buildLessons(),photos=Array.from({length:20},(_,i)=>`assets/directions/directions-${String(i+1).padStart(2,"0")}.png`),idx=0,photoIdx=0;
const $=id=>document.getElementById(id);function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function lang(){return $("localSelect").value||"ja"}function cfg(){return LANGS[lang()]||LANGS.ja}
function local(obj){const code=lang();if(code==="en")return"";return String(obj?.[code]||obj?.local||"")}
function speechLang(){return cfg().speech}
function speak(t,l){if(!t)return;try{speechSynthesis.cancel()}catch(e){};const u=new SpeechSynthesisUtterance(String(t));u.lang=l;u.rate=RATE;u.pitch=1;speechSynthesis.speak(u)}
function speakSeq(items){
  try{speechSynthesis.cancel()}catch(e){}
  let i=0;
  function next(){
    if(i>=items.length)return;
    const it=items[i++];
    if(!it || !it.text){next();return;}
    const u=new SpeechSynthesisUtterance(String(it.text));
    u.lang=it.lang||"en-US";
    u.rate=RATE;
    u.pitch=1;
    u.onend=()=>setTimeout(next,260);
    u.onerror=()=>setTimeout(next,260);
    speechSynthesis.speak(u);
  }
  next();
}
function normalizeLesson(x,i){let d={...x,day:Number(x.day||i+1),en:String(x.en||x.question?.en||""),zh:String(x.zh||x.question?.zh||""),scene:String(x.scene||""),title:String(x.title||"")};["ja","it","da","es","fr","de","ko","ne","hi"].forEach(k=>{d[k]=String(x[k]||((x.local_lang===k||x.lang===k)?x.local:"")||"")});if(!d.answers){const right={en:"Sure. Where would you like to go?",zh:"可以，你想去哪裡？",correct:true};right[lang()]=local(d);d.answers=[right,{en:"Please show me your boarding pass.",zh:"請出示你的登機證。"},{en:"Take this medicine after meals.",zh:"請飯後吃這個藥。"}]}return d}
async function fetchJson(u){const r=await fetch(u+(u.includes("?")?"&":"?")+"v="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error(r.status);return r.json()}
async function load(){try{let p=await fetchJson(PHOTO_JSON);let a=Array.isArray(p)?p:p.photos;if(Array.isArray(a)&&a.length)photos=a.filter(Boolean)}catch(e){}try{let d=await fetchJson(LESSON_JSON);let a=Array.isArray(d)?d:d.lessons;if(Array.isArray(a)&&a.length)lessons=a.slice(0,TOTAL).map(normalizeLesson).filter(x=>x.en&&x.zh)}catch(e){}}
function render(){
  const l=lessons[idx]||lessons[0],lo=local(l);
  $("heroEn").textContent=l.en;$("heroLocal").textContent=lo;$("heroLocal").style.display=lo?"block":"none";
  $("headerSub").textContent=`第 ${idx+1} 關｜英文＋${cfg().label}｜中文只顯示`;
  $("miniStage").textContent=`第 ${idx+1} 關`;$("miniDone").textContent=`${idx}/20`;$("miniCoins").textContent=`金${Math.floor(idx/5)}`;$("miniNextCoin").textContent=`再${5-idx%5}關`;
  $("title").textContent=l.title||"Directions English + Local";$("scene").textContent=l.scene||"問路";
  $("photo").src=photos[idx%photos.length]||photos[0]; $("quizQ").textContent=`「${l.en}」選合理回答：`;
  const answers=(l.answers||[]).slice(0,3);$("choices").innerHTML=answers.map((a,i)=>{let al=local(a);return `<button class="choice" type="button" data-i="${i}" data-c="${a.correct?'1':'0'}"><div class="choiceInner"><span class="choiceNo">${String.fromCharCode(65+i)}.</span><span class="choiceText"><span class="choiceEn">${esc(a.en||"")}</span>${al?`<span class="choiceLocal">${esc(al)}</span>`:""}<span class="choiceZh">${esc(a.zh||"")}</span></span><span class="choiceSpeak">🔊</span></div></button>`}).join("");
  document.querySelectorAll(".choice").forEach(b=>{b.onclick=e=>{
    const a=answers[Number(b.dataset.i)];
    const al=local(a);
    const seq=[{text:a.en,lang:"en-US"}];
    if(al) seq.push({text:al,lang:speechLang()});
    if(e.target.classList.contains("choiceSpeak")){
      speakSeq(seq);
      return;
    }
    document.querySelectorAll(".choice").forEach(x=>x.disabled=true);
    b.classList.add(b.dataset.c==="1"?"correct":"wrong");
    speakSeq(seq);
    $("completeBtn").textContent=b.dataset.c==="1"?"完成本關":"再試一次";
    $("completeBtn").classList.toggle("ready",b.dataset.c==="1");
  }})
}
$("localSelect").onchange=render;$("play").onclick=()=>{const l=lessons[idx];const lo=local(l);const seq=[{text:l.en,lang:"en-US"}];if(lo)seq.push({text:lo,lang:speechLang()});speakSeq(seq)};$("hero").onclick=$("play").onclick;$("prev").onclick=()=>{idx=(idx-1+lessons.length)%lessons.length;render()};$("next").onclick=()=>{idx=(idx+1)%lessons.length;render()};$("photoPrev").onclick=e=>{e.stopPropagation();idx=(idx-1+lessons.length)%lessons.length;render()};$("photoNext").onclick=e=>{e.stopPropagation();idx=(idx+1)%lessons.length;render()};$("completeBtn").onclick=()=>{if($("completeBtn").classList.contains("ready")){idx=Math.min(idx+1,lessons.length-1);render()}};
load().then(render);
</script>
</body>
</html>
