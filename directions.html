<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>BookWide 問路英文＋多國闖關 V70</title>
<style>
:root{
  --bg:#071225;
  --card:#0d1d35;
  --ink:#eef6ff;
  --muted:#9fb4d1;
  --blue:#3b82f6;
}
*{box-sizing:border-box}
html,body{
  margin:0;min-height:100%;
  background:radial-gradient(circle at 20% 0%,rgba(59,130,246,.22),transparent 34%),var(--bg);
  color:var(--ink);
  font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}
button,a{font:inherit}
a{color:inherit;text-decoration:none}
.app{max-width:520px;margin:0 auto;padding:10px 10px 28px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 0 8px}
.brand{display:flex;align-items:center;gap:8px;min-width:0}
.logo{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#0ea5e9);display:grid;place-items:center;font-size:16px;flex:0 0 auto}
.brandText{min-width:0}
.brandText b{display:block;font-size:21px;line-height:1.05}
.brandText span{display:block;color:#b9cff0;font-size:12px;font-weight:850;margin-top:2px;white-space:nowrap}
.top a{font-size:13px;font-weight:850;border:1px solid rgba(148,163,184,.25);background:rgba(15,31,56,.78);border-radius:999px;padding:7px 11px}

.hero{position:relative;height:214px;border-radius:22px;overflow:hidden;background:#08172b;box-shadow:0 14px 34px rgba(0,0,0,.25);margin-bottom:9px;cursor:pointer}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:opacity .25s ease}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,12,24,0),rgba(5,12,24,.08) 62%,rgba(5,12,24,.42));pointer-events:none}
.heroNav{position:absolute;top:50%;transform:translateY(-50%);z-index:4;width:34px;height:34px;border:0;border-radius:99px;background:rgba(255,255,255,.78);color:#0f172a;font-size:20px;font-weight:950;cursor:pointer}
.heroNav.prev{left:8px}.heroNav.next{right:8px}
.dayPill{position:absolute;left:10px;bottom:10px;z-index:4;background:rgba(7,18,37,.76);backdrop-filter:blur(10px);border:1px solid rgba(148,163,184,.22);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#eaf3ff}
.photoMeta{position:absolute;left:10px;top:10px;z-index:4;background:rgba(7,18,37,.42);backdrop-filter:blur(6px);border:1px solid rgba(148,163,184,.14);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700;letter-spacing:.2px;color:rgba(239,246,255,.92)}
.hint{position:absolute;right:10px;bottom:10px;z-index:4;background:rgba(37,99,235,.76);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:white}

.card{border:1px solid rgba(85,136,206,.42);border-radius:21px;background:linear-gradient(145deg,rgba(16,40,71,.94),rgba(9,25,47,.94));padding:12px;box-shadow:0 12px 28px rgba(0,0,0,.16)}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.title{min-width:0}
.title b{display:block;font-size:19px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title span{display:block;color:#c7d2fe;font-size:12px;font-weight:800;margin-top:2px}
.controls{display:flex;gap:7px;align-items:center}
.ctrl{border:1px solid rgba(96,165,250,.32);background:rgba(59,130,246,.15);color:#dbeafe;border-radius:999px;width:34px;height:34px;font-weight:950;cursor:pointer}
.ctrl.play{width:43px;height:43px;background:linear-gradient(135deg,#2563eb,#60a5fa);color:white;box-shadow:0 8px 18px rgba(37,99,235,.28)}
.notice{color:#9fb4d1;font-size:12px;font-weight:800;margin:0 0 8px 0}
.lineItem{display:grid;grid-template-columns:42px 1fr 34px;gap:8px;align-items:center;padding:8px 0;border-top:1px dashed rgba(148,163,184,.18)}
.lineItem:first-of-type{border-top:0}
.lang{border-radius:9px;padding:6px 4px;text-align:center;font-weight:950;font-size:12px;background:#123054;color:#7dd3fc}
.lang.zh{background:rgba(34,197,94,.18);color:#86efac}
.lang.ja{background:rgba(139,92,246,.22);color:#c4b5fd}
.txt{font-size:18px;line-height:1.35;font-weight:900;color:#dbeafe}
.speak{width:34px;height:34px;border-radius:999px;border:1px solid rgba(96,165,250,.4);background:rgba(59,130,246,.18);color:#bfdbfe;cursor:pointer}
.lineItem.zh .speak{display:none}
.active{margin-left:-4px;margin-right:-4px;padding-left:4px;padding-right:4px;border-radius:14px;background:linear-gradient(90deg,rgba(59,130,246,.22),rgba(96,165,250,.08))}
.active .txt{color:#fff;text-shadow:0 0 18px rgba(96,165,250,.48)}
.active .lang{background:#2563eb;color:white}
.done .txt{color:#7dd3fc}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:99;background:rgba(15,23,42,.9);border:1px solid rgba(96,165,250,.35);color:#eaf3ff;padding:10px 14px;border-radius:999px;font-size:13px;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.28);display:none}
.toast.show{display:block}

/* 手機與壓縮版樣式 */
@media(max-width:390px){
  .app{padding-left:8px;padding-right:8px}
  .hero{height:196px}
  .brandText b{font-size:20px}
  .brandText span{font-size:11px}
  .top a{font-size:12px;padding:6px 10px}
  .txt{font-size:17px}
  .photoMeta{font-size:10px;padding:3px 7px}
}

#musicToggle{ font-size:17px; }
#musicToggle.on{ background:rgba(34,197,94,.22); border-color:rgba(34,197,94,.55); color:#bbf7d0; }
#musicToggle.off{ opacity:.58; }

.gameTitle, .gamePanel{ display:none!important; }
.gameMini{ display:flex; align-items:center; gap:6px; margin:0 0 7px; overflow-x:auto; scrollbar-width:none; }
.gameMini::-webkit-scrollbar{display:none}
.gameMini span{ flex:0 0 auto; border:1px solid rgba(96,165,250,.26); background:rgba(13,29,53,.72); color:#dbeafe; border-radius:999px; padding:5px 9px; font-size:12px; font-weight:900; line-height:1 }
#miniStage{ background:rgba(37,99,235,.30); color:#fff }
#miniBadge{ color:#fef3c7; border-color:rgba(251,191,36,.30); background:rgba(251,191,36,.10) }

.card{ padding:8px!important; border-radius:16px!important; }
.titleRow{ margin-bottom:3px!important; }
.title b{ font-size:16px!important; line-height:1.08!important; }
.title span{ font-size:10.5px!important; }
.controls{ gap:5px!important; }
.ctrl{ width:29px!important; height:29px!important; font-size:14px!important; }
.ctrl.play{ width:37px!important; height:37px!important; }
.notice{ display:none!important; }
.lineItem{ grid-template-columns:31px 1fr 28px!important; gap:5px!important; padding:5px 0!important; }
.lineItem.zh{ display:none!important; }
.lang{ font-size:10.5px!important; padding:4px 2px!important; border-radius:7px!important; }
.txt{ font-size:15px!important; line-height:1.22!important; }
.speak{ width:28px!important; height:28px!important; font-size:13px!important; }

.quizCard{ margin-top:5px!important; padding:8px!important; border-radius:15px!important; border:1px solid rgba(251,191,36,.28); background:rgba(251,191,36,.08); }
.quizQ{ font-weight:950; font-size:13px!important; line-height:1.25!important; margin-bottom:6px!important; color:#fff; }
.choices{ display:grid; gap:5px!important; }
.choice{ width:100%; border:1px solid rgba(148,163,184,.24); background:rgba(15,31,56,.85); color:#eaf3ff; text-align:left; padding:0!important; border-radius:12px!important; overflow:hidden; -webkit-tap-highlight-color:transparent; }
.choice.correct{ background:rgba(34,197,94,.22); border-color:rgba(34,197,94,.55); color:#bbf7d0; }
.choice.wrong{ background:rgba(239,68,68,.18); border-color:rgba(239,68,68,.45); color:#fecaca; }

.choiceInner{ display:grid; grid-template-columns:24px 1fr 28px; align-items:center; gap:5px; padding:7px 8px; min-height:44px; }
.choiceNo{ font-size:13px; font-weight:950; color:#dbeafe; }
.choiceText{ min-width:0; }
.choiceZh{ display:block; font-size:13px; line-height:1.18; color:#fff; font-weight:950; }
.choiceJa{ display:block; font-size:11px; line-height:1.15; color:#c4b5fd; font-weight:850; margin-top:1px; }

.choiceSpeak{ width:26px; height:26px; border-radius:999px; border:1px solid rgba(96,165,250,.32); background:rgba(59,130,246,.16); color:#dbeafe; display:grid; place-items:center; font-size:12px; }
.completeBtn{ width:100%; margin-top:6px!important; padding:8px 9px!important; border:0; border-radius:999px; font-size:13px!important; font-weight:950; cursor:pointer; background:rgba(148,163,184,.16)!important; border:1px solid rgba(148,163,184,.28)!important; color:#cbd5e1!important; }
.completeBtn.done{ background:rgba(34,197,94,.20)!important; border:1px solid rgba(34,197,94,.50)!important; color:#bbf7d0!important; }

.rewardModal, .finishModal { position:fixed; inset:0; z-index:9999; display:none; place-items:center; padding:20px; background:rgba(7,18,37,.62); backdrop-filter:blur(8px); }
.rewardModal.show, .finishModal.show { display:grid; }
.rewardBox, .finishBox { width:min(340px,92vw); border:1px solid rgba(251,191,36,.38); border-radius:24px; background:linear-gradient(145deg,rgba(16,40,71,.98),rgba(9,25,47,.98)); padding:18px; text-align:center; position:relative; }
.rewardClose, .finishClose { position:absolute; top:8px; right:10px; width:30px; height:30px; border:0; border-radius:999px; background:rgba(148,163,184,.16); color:#dbeafe; font-weight:950; }
.rewardIcon, .finishIcon { font-size:38px; margin-bottom:6px; }
.rewardTitle, .finishTitle { font-size:21px; font-weight:950; color:#fff; margin-bottom:6px; }
.rewardText, .finishText { font-size:14px; line-height:1.45; font-weight:850; color:#dbeafe; }
.rewardStats { margin:10px auto 12px; display:inline-block; border:1px solid rgba(96,165,250,.28); background:rgba(59,130,246,.14); color:#bfdbfe; border-radius:999px; padding:7px 11px; font-size:13px; font-weight:950; }
.rewardOk { width:100%; border:0; border-radius:999px; padding:11px 12px; background:linear-gradient(135deg,#f59e0b,#22c55e); color:#fff; font-size:15px; font-weight:950; }

.app { width:min(520px,100vw)!important; max-width:520px!important; padding-left:7px!important; padding-right:7px!important; padding-bottom:20px!important; }
.hero { position:relative; width:100%!important; height:241px!important; max-height:241px!important; border-radius:20px!important; margin-bottom:6px!important; background:#061225!important; overflow:hidden; cursor:pointer; }
.hero img { width:100%!important; height:100%!important; object-fit:cover!important; object-position:center 32%!important; }
.heroSubtitle { position:absolute; left:14px; right:14px; bottom:54px; z-index:6; text-align:center; pointer-events:none; text-shadow:0 3px 16px rgba(0,0,0,.86); }
.heroEn { font-size:clamp(13px,3.6vw,19px)!important; line-height:1.12!important; font-weight:950!important; color:#f8fbff; }
.heroJa { margin-top:5px!important; font-size:clamp(10px,2.9vw,16px)!important; line-height:1.15!important; font-weight:950!important; color:#e9f7ff; }
.waveWrap { position:absolute; left:0; right:0; bottom:0; height:54px; z-index:5; background:linear-gradient(180deg,rgba(3,8,18,0),rgba(3,8,18,.72)); }
#waveCanvas { width:100%; height:100%; display:block; }

.finishActions { display:grid; gap:9px; margin-top:10px; }
.finishActions button { width:100%; border:0; border-radius:999px; padding:11px 12px; color:#fff; font-size:15px; font-weight:950; cursor:pointer; }
#goIndexBtn { background:linear-gradient(135deg,#f59e0b,#22c55e); }
#goStoryBtn { background:linear-gradient(135deg,#2563eb,#60a5fa); }

.localSelect { border:1px solid rgba(96,165,250,.32); background:rgba(13,29,53,.92); color:#dbeafe; border-radius:999px; height:31px; padding:0 8px; font-size:12px; font-weight:900; max-width:92px; }
</style>
</head>
<body>
<div class="toast" id="toast">點一下畫面即可播放</div>
<audio id="bgmAudio" src="./assets/directions/bgm.mp3" preload="auto" loop playsinline></audio>

<div class="rewardModal" id="rewardModal">
  <div class="rewardBox">
    <button class="rewardClose" id="rewardClose" type="button">×</button>
    <div class="rewardIcon">🏔️</div>
    <div class="rewardTitle" id="rewardTitle">第 1 關完成！</div>
    <div class="rewardText" id="rewardText">獲得 +1 星，明天再繼續。</div>
    <div class="rewardStats" id="rewardStats">完成 1/20｜連續 1 天</div>
    <button class="rewardOk" id="rewardOk" type="button">收下，進下一關</button>
  </div>
</div>

<div class="finishModal" id="finishModal">
  <div class="finishBox">
    <button class="finishClose" id="finishClose" type="button">×</button>
    <div class="finishIcon">🏔️</div>
    <div class="finishTitle">20 關完成！</div>
    <div class="finishText">你已完成問路英文＋多國急救包英文＋多國闖關，獲得 <b>4 個遊客金幣</b>。</div>
    <div class="finishActions">
      <button id="goIndexBtn" type="button">去影片館消費金幣</button>
      <button id="goStoryBtn" type="button">直接進入 Story</button>
    </div>
    <small style="display:block;margin-top:10px;color:#9fb4d1;font-size:11px;">遊客金幣先存在本機瀏覽器；之後可再做登入保存。</small>
  </div>
</div>

<main class="app">
  <section class="top">
    <div class="brand">
      <div class="logo">📘</div>
      <div class="brandText">
        <b>BookWide</b>
        <span id="headerSub">問路英文＋多國急救包｜英文＋多國發音｜中文只顯示</span>
      </div>
    </div>
    <a href="./account/learning-dashboard.html" style="font-size:13px;font-weight:850;border:1px solid rgba(148,163,184,.25);background:rgba(15,31,56,.78);border-radius:999px;padding:7px 11px;">控制台</a>
  </section>

  <section class="hero" id="hero" aria-label="問路照片輪播，點擊播放">
    <img id="photo" alt="BookWide directions photo" />
    <button class="heroNav prev" id="photoPrev" type="button" style="display:none;">‹</button>
    <button class="heroNav next" id="photoNext" type="button" style="display:none;">›</button>
    <div class="dayPill" id="dayPill" style="display:none;">第 1 關</div>
    <div class="photoMeta" id="photoMeta" style="display:none;">Directions English + Local</div>
    <div class="hint" id="playHint" style="position:absolute;right:10px;bottom:10px;z-index:4;background:rgba(37,99,235,.76);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:white;">點一下播放</div>
    <div class="heroSubtitle" aria-live="polite">
      <div class="heroEn" id="heroEn"></div>
      <div class="heroJa" id="heroJa"></div>
    </div>
    <div class="waveWrap"><canvas id="waveCanvas"></canvas></div>
  </section>
  <section class="gameMini" id="gameMini">
    <span id="miniStage">第 1 關</span>
    <span id="miniDone">0/20</span>
    <span id="miniCoins">金0</span>
    <span id="miniNextCoin">再5關</span>
    <span id="miniBadge">剛出發</span>
  </section>

  <section class="card">
    <div class="titleRow">
      <div class="title">
        <b id="title">Directions English + Local</b>
        <span id="scene">問路英文＋多國急救包</span>
      </div>
      <div class="controls">
        <button class="ctrl" id="prev" type="button">‹</button>
        <select class="localSelect" id="localSelect" title="選擇第二語言">
          <option value="ja">日文</option>
          <option value="en">只英文</option>
          <option value="da">丹麥文</option>
          <option value="it">義大利文</option>
          <option value="es">西班牙文</option>
          <option value="fr">法文</option>
          <option value="de">德文</option>
          <option value="ko">韓文</option>
          <option value="ne">尼泊爾文</option>
          <option value="hi">印地文</option>
        </select>
        <button class="ctrl play" id="play" type="button">▶</button>
        <button class="ctrl" id="musicToggle" type="button" title="背景音樂">♫</button>
        <button class="ctrl" id="next" type="button">›</button>
      </div>
    </div>

    <!-- 隱藏原生 lineItem 列，完全交由 Live Hero 與 Quiz 接管 -->
    <div class="lineItem en" data-lang="en" style="display:none!important;"><div id="enText"></div><button id="enBtn"></button></div>
    <div class="lineItem zh" data-lang="zh" style="display:none!important;"><div id="zhText"></div></div>
    <div class="lineItem ja" data-lang="ja" style="display:none!important;"><div id="jaText"></div><button id="jaBtn"></button></div>
  
    <section class="quizCard">
      <div class="quizQ" id="quizQ">這句英文是什麼意思？</div>
      <div class="choices" id="choices"></div>
      <button class="completeBtn" id="completeBtn" type="button">先答題</button>
    </section>
  </section>
</main>

const PHOTO_JSON = "assets/directions/photos.json";
const LESSON_JSON = "assets/directions/directions_lessons_20.json";
const RATE = 0.8;
const SLIDE_MS = 4600;
const BGM_URL = "./assets/directions/bgm.mp3";
const BGM_VOLUME = 0.16;
const TOTAL_STAGES = 20;
const COIN_EVERY_STAGES = 5;

const $ = id => document.getElementById(id);

const LOCAL_LANGS = {

const LOCAL_PHRASES = {
  "We would like a table for two.": { da:"Vi vil gerne have et bord til to.", it:"Vorremmo un tavolo per due.", es:"Quisiéramos una mesa para dos.", fr:"Nous voudrions una table pour deux.", de:"Wir hätten gern einen Tisch für zwei.", ko:"두 명 자리 부탁드립니다.", ne:"Hami dui janaka lagi tebal chahanchhaun.", hi:"हमें दो लोगों के लिए एक मेज चाहिए。" },
  "This table is fine, thank you.": { da:"Dette bord er fint, tak.", it:"Questo tavolo va bene, grazie.", es:"Esta mesa está bien, gracias.", fr:"Cette table convient, merci.", de:"Dieser Tisch ist gut, danke.", ko:"이 자리가 괜찮습니다, 감사합니다.", ne:"Yo tebal thik chha, dhanyabaad.", hi:"यह मेज ঠিক है, धन्यवाद।" },
  "Can I see the menu, please?": { da:"Må jeg se menuen, tak?", it:"Posso vedere il menù, per favore?", es:"¿Puedo ver el menú, por favor?", fr:"Puis-je voir le menu, s'il vous plaît ?", de:"Kann ich bitte die Speisekarte sehen?", ko:"메뉴를 볼 수 있을까요?", ne:"Kripaya ma menu herna sakchhu?", hi:"क्या मैं मेनू देख सकता हूँ?" },

  "I will have the pasta.": { da:"Jeg tager pastaen.", it:"Prendo la pasta.", es:"Voy a tomar la pasta.", fr:"Je vais prendre les pâtes.", de:"Ich nehme die Pasta.", ko:"파스타로 하겠습니다.", ne:"Ma pasta linchhu.", hi:"मैं पास्ता लूँगा।" },
  "What do you recommend?": { da:"Hvad anbefaler du?", it:"Che cosa consiglia?", es:"¿Qué recomienda?", fr:"Que recommandez-vous ?", de:"Was empfehlen Sie?", ko:"무엇을 추천하시나요?", ne:"Tapain ke sipharis garnuhunchha?", hi:"आप क्या सुझाते हैं?" },

let BW_VOICES = [];
function refreshVoices(){ try{ BW_VOICES = speechSynthesis.getVoices() || []; }catch(e){ BW_VOICES = []; } }
function voiceScore(v, lang){
  const name = (v.name || "").toLowerCase();
  const vlang = (v.lang || "").toLowerCase();
  let score = 0;
  if(lang.startsWith("ja") && vlang.startsWith("ja")) score += 100;
  else if(lang.startsWith("da") && vlang.startsWith("da")) score += 100;
  else if(lang.startsWith("it") && vlang.startsWith("it")) score += 100;
  else if(lang.startsWith("es") && vlang.startsWith("es")) score += 100;
  else if(lang.startsWith("fr") && vlang.startsWith("fr")) score += 100;
  else if(lang.startsWith("de") && vlang.startsWith("de")) score += 100;
  else if(lang.startsWith("ko") && vlang.startsWith("ko")) score += 100;
  else if(lang.startsWith("hi") && vlang.startsWith("hi")) score += 100;
  else if(lang === "en-US"){
    if(vlang === "en-us") score += 100;
    if(vlang.startsWith("en")) score += 80;
  }
  return score;
}
function pickVoice(lang){
  refreshVoices();
  const voices = BW_VOICES.filter(v => v && v.lang);
  if(!voices.length) return null;
  const candidates = voices.map(v => ({ v, score: voiceScore(v, lang) })).filter(x => x.score > 0).sort((a,b) => b.score - a.score);
  return candidates.length ? candidates[0].v : null;
}

let activeIndex = 0;
let photoIndex = 0;
let photoOrder = [];
let slideTimer = null;
let speaking = false;
let attemptedAutoplay = false;

function completedStageCount(){
  let n = 0;
  for(const l of lessons){ if(localStorage.getItem("bw_directions_game_v29_done_" + l.day) === "1") n++; else break; }
  return n;
}
function currentStageIndex(){
  const count = completedStageCount();
  return Math.min(lessons.length - 1, count);
}
function isUnlockedIndex(idx){ return idx <= completedStageCount(); }

function setupPhotoCycle(){
  photoOrder = Array(20).fill("assets/directions/directions-01.png");
  showPhoto(activeIndex);
}
function showPhoto(i){
  const img = $("photo");
  if(img) img.src = photoOrder[0];
}

function calcStreak(){
  const arr = JSON.parse(localStorage.getItem("bw_directions_game_v29_dates") || "[]");
  const set = new Set(arr);
  let d = new Date(), n = 0;
  for(;;){
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    if(!set.has(key)) break;
    n++; d.setDate(d.getDate()-1);
  }
  return n;
}

function updateProgress(){
  const l = lessons[activeIndex] || lessons[0];
  const count = completedStageCount();
  safeSet("miniStage", `第 ${l.day} 關`);
  safeSet("miniDone", `${count}/${TOTAL_STAGES}`);
  safeSet("miniCoins", `金${Math.floor(count / COIN_EVERY_STAGES)}`);
  safeSet("miniNextCoin", `再${count % COIN_EVERY_STAGES === 0 ? COIN_EVERY_STAGES : COIN_EVERY_STAGES - (count % COIN_EVERY_STAGES)}關`);
  safeSet("miniBadge", count >= 20 ? "問路達人" : "剛出發");

  const btn = $("completeBtn");
  if(btn){
    if(localStorage.getItem("bw_directions_game_v29_done_" + l.day) === "1"){
      btn.textContent = "✅ 本關已完成"; btn.classList.add("done");
    }else{
      btn.textContent = "先答題"; btn.classList.remove("done");
    }
  }
}

function showReward(day){
  safeSet("rewardTitle", `第 ${day} 關完成！`);
  $("rewardModal").classList.add("show");
}
function closeReward(){
  $("rewardModal").classList.remove("show");
  const next = currentStageIndex();
  if(next !== activeIndex){ activeIndex = next; render(); playAll(); }
}

function completeToday(force=false){
  const l = lessons[activeIndex];
  const wasDone = localStorage.getItem("bw_directions_game_v29_done_" + l.day) === "1";
  localStorage.setItem("bw_directions_game_v29_done_" + l.day, "1");
  updateProgress();
  if(!wasDone) showReward(l.day);
}

// 聲波裝飾動畫
let BW_wavePhase = 0;
function drawLiveWave(){
  const c = $("waveCanvas"); if(!c) return;
  const ctx = c.getContext("2d");
  const w = c.clientWidth, h = c.clientHeight;
  c.width = w; c.height = h;
  ctx.clearRect(0,0,w,h);
  BW_wavePhase += speaking ? 0.15 : 0.03;
  for(let i=0;i<40;i++){
    const bh = Math.max(4, (Math.sin(BW_wavePhase + i*0.4)*0.4 + 0.5) * h * (speaking?0.8:0.2));
    ctx.fillStyle = "rgba(59,130,246,0.6)";
    ctx.fillRect(i*8, (h-bh)/2, 4, bh);
  }
  requestAnimationFrame(drawLiveWave);
}
setTimeout(drawLiveWave, 250);

function bgm(){ return $("bgmAudio"); }
function toggleBgm(){
  const a = bgm();
  if(!a.paused){ a.pause(); $("musicToggle").classList.remove("on"); }
  else { a.play().then(()=>$("musicToggle").classList.add("on")); }
}

function playAll(){
  if(speaking) { try{speechSynthesis.cancel();}catch(e){} speaking=false; return; }
  const l = lessons[activeIndex];
  try{speechSynthesis.cancel();}catch(e){}
  
  const uEn = new SpeechSynthesisUtterance(l.en);
  uEn.lang = "en-US"; uEn.rate = RATE;
  uEn.onstart = () => { speaking = true; $("play").textContent = "❚❚"; };
  uEn.onend = () => {
    setTimeout(() => {
      let tx = ""; let langCode = "ja-JP";
      if (window.BW_getCurrentMultilangText) {
        const v70Obj = window.BW_getCurrentMultilangText();
        if (v70Obj) { tx = v70Obj.text; langCode = v70Obj.langCode; }
      }
      if(tx && langCode !== "en-US"){
        const uLoc = new SpeechSynthesisUtterance(tx);
        uLoc.lang = langCode; uLoc.rate = RATE;
        uLoc.onend = () => { speaking = false; $("play").textContent = "▶"; };
        speechSynthesis.speak(uLoc);
      } else {
        speaking = false; $("play").textContent = "▶";
      }
    }, 100);
  };
  speechSynthesis.speak(uEn);
}

function prevDay(){ activeIndex = Math.max(0, activeIndex - 1); render(); }
function nextDay(){
  if(!isUnlockedIndex(activeIndex + 1)){ toast("先完成本關，才能進下一關"); return; }
  activeIndex = Math.min(lessons.length - 1, activeIndex + 1); render();
}

function render(){
  if(window.BW_syncMultilangV70) window.BW_syncMultilangV70();
}

function bind(){
  $("hero").onclick = playAll; $("play").onclick = playAll;
  $("prev").onclick = prevDay; $("next").onclick = nextDay;
  $("musicToggle").onclick = toggleBgm;
  $("rewardOk").onclick = closeReward; $("rewardClose").onclick = closeReward;
  $("finishClose").onclick = () => $("finishModal").classList.remove("show");
  
  document.addEventListener("pointerdown", ()=>{
    if(!attemptedAutoplay){ attemptedAutoplay = true; playAll(); }
  }, {once:true, passive:true});
}

window.addEventListener("load", () => {
  activeIndex = currentStageIndex(); setupPhotoCycle(); bind(); render();
});

  function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
  function lang(){const s=$("localSelect");return (s&&LOCAL_LANGS_V70[s.value])?s.value:"ja";}
  function cfg(){return LOCAL_LANGS_V70[lang()]||LOCAL_LANGS_V70.ja;}
  
  // 取得目前核心資料
  function current(){
    const idx = window.activeIndex || 0;
    // 如果在前 2 關，直接抓 V70 寫死的精美補丁[cite: 3]
    if (idx < MULTI_V70.length) return MULTI_V70[idx];
    
    // 如果在第 3 關到 20 關，動態抓取原本大資料庫的關卡資料！[cite: 3]
    const coreData = window.lessons[idx] || window.lessons[0];
    
    // 為後續關卡動態包裝多國回答結構
    const targetEn = coreData.en;
    const globalTranslate = LOCAL_PHRASES[targetEn] || {};
    
    // 生成三個選項（正確意思、其他關卡隨機錯意A、其他關卡隨機錯意B）
    const wrongs = window.lessons.filter(x => x.en !== targetEn);
    const w1 = wrongs[(idx + 3) % wrongs.length];
    const w2 = wrongs[(idx + 7) % wrongs.length];
    
    return {
      day: coreData.day,
      scene: coreData.scene,
      title: coreData.title,
      en: coreData.en,
      zh: coreData.zh,
      ...globalTranslate, // 展開內建所有選單語系
      answers: [
        { 
          en: coreData.en, zh: coreData.zh, correct: true,
          ...globalTranslate 
        },
        { 
          en: w1.en, zh: w1.zh, correct: false,
          ...(LOCAL_PHRASES[w1.en] || {})
        },
        { 
          en: w2.en, zh: w2.zh, correct: false,
          ...(LOCAL_PHRASES[w2.en] || {})
        }
      ]
    };
  }

  function localOf(obj, forSpeech=false){
    const code=lang();
    if(code==="en") return "";
    if(code==="ne" && forSpeech && obj && obj.ne_roman){ return String(obj.ne_roman); }
    return String((obj&&obj[code]) || (obj&&obj.local) || "");
  }
  
  window.BW_getCurrentMultilangText = function() {
    const l = current();
    return { text: localOf(l, true), langCode: code === "en" ? "en-US" : cfg().speech };
  };

  const code = lang();

  function syncHero(){
    const l=current();
    const en=$("heroEn"), lo=$("heroJa");
    if(en) en.textContent=l.en;
    if(lo){
      const tx=localOf(l, false); 
      lo.textContent=tx; lo.style.display=tx?"block":"none";
    }
    const hs=$("headerSub");
    if(hs) hs.textContent = `第 ${l.day} 關｜英文＋${cfg().label}｜中文只顯示`;
    
    const titleBox = $("title"); if(titleBox) titleBox.textContent = l.title;
    const sceneBox = $("scene"); if(sceneBox) sceneBox.textContent = l.scene;
  }
  
  function syncQuiz(){
    const l=current();
    const q=$("quizQ"), box=$("choices");
    if(q) q.textContent = `「${l.en}」選合理回答：`;
    if(!box) return;
    
    window.__quizAnswered = localStorage.getItem("bw_directions_game_v29_done_" + l.day) === "1";
    
    // 重新隨機洗牌選項，避免正解永遠在第一個
    if (!box._lastDay || box._lastDay !== l.day) {
      box._shuffledAnswers = shuffle(l.answers);
      box._lastDay = l.day;
    }
    
    box.innerHTML = box._shuffledAnswers.map((a,i)=>{
      const local=localOf(a, false);
      const speechLocal = localOf(a, true);
      return `<button class="choice" type="button" data-correct="${a.correct?'1':'0'}">
        <div class="choiceInner">
          <span class="choiceNo">${String.fromCharCode(65+i)}.</span>
          <span class="choiceText">
            <span class="choiceZh">${esc(a.en)}</span>
            ${local?`<span class="choiceJa">${esc(local)}</span>`:''}
            <span class="choiceZh" style="font-size:11px;color:#bfdbfe;margin-top:2px">${esc(a.zh)}</span>
          </span>
          <span class="choiceSpeak" data-en="${esc(a.en)}" data-local="${esc(speechLocal)}">🔊</span>
        </div>
      </button>`;
    }).join("");
    
    if (window.__quizAnswered) {
      box.querySelectorAll(".choice").forEach(b => {
        b.disabled = true;
        if(b.dataset.correct === "1") b.classList.add("correct");
      });
    }

    box.querySelectorAll(".choice").forEach(btn=>{
      btn.onclick=(ev)=>{
        if(ev.target && ev.target.classList.contains("choiceSpeak")) return;
        if(window.__quizAnswered) return;
        
        const isCorrect = btn.dataset.correct === "1";
        const idx = [...box.children].indexOf(btn);
        const a = box._shuffledAnswers[idx];
        const speechLocal = localOf(a, true);
        
        if(isCorrect){
          window.__quizAnswered = true;
          box.querySelectorAll(".choice").forEach(b=>b.disabled=true);
          btn.classList.add("correct");
          window.updateProgress();
          toast("答對了！");
          
          try { speechSynthesis.cancel(); } catch(e){}
          const uEn = new SpeechSynthesisUtterance(a.en);
          uEn.lang = "en-US"; uEn.rate = 0.8;
          uEn.onend = () => {
            setTimeout(() => {
              if (speechLocal && lang() !== "en") {
                const uLoc = new SpeechSynthesisUtterance(speechLocal);
                uLoc.lang = cfg().speech; uLoc.rate = 0.8;
                speechSynthesis.speak(uLoc);
              }
            }, 100);
          };
          speechSynthesis.speak(uEn);
          
          setTimeout(()=>{ try{ window.completeToday(true); }catch(e){} }, 1500);
        } else {
          btn.classList.add("wrong");
          toast("答錯了，再選一次");
          setTimeout(()=>btn.classList.remove("wrong"), 900);
        }
      };
    });
    
    box.querySelectorAll(".choiceSpeak").forEach(sp=>{
      sp.onclick=(ev)=>{
        ev.stopPropagation();
        const en=sp.dataset.en||"";
        const speechLocal=sp.dataset.local||"";
        
        try { speechSynthesis.cancel(); } catch(e){}
        const uEn = new SpeechSynthesisUtterance(en);
        uEn.lang = "en-US"; uEn.rate = 0.8;
        uEn.onend = () => {
          setTimeout(() => {
            if (speechLocal && lang() !== "en") {
              const uLoc = new SpeechSynthesisUtterance(speechLocal);
              uLoc.lang = cfg().speech; uLoc.rate = 0.8;
              speechSynthesis.speak(uLoc);
            }
          }, 100);
        };
        speechSynthesis.speak(uEn);
      };
    });
  }
  
  function shuffle(a){
    const b=[...a];
    for(let i=b.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]];
    }
    return b;
  }

  function syncAll(){ syncHero(); syncQuiz(); window.updateProgress(); }
  window.BW_syncMultilangV70 = syncAll;

  window.addEventListener("load",()=>{
    const sel=$("localSelect"); if(sel) sel.onchange=()=>syncAll();
    setTimeout(syncAll,50);
  });
})();
</script>
</body>
</html>
