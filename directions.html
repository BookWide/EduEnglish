      <div class="quizQ" id="quizQ">這句英文是什麼意思？</div>

<script>
const PHOTO_JSON = "assets/directions/photos.json";
const LESSON_JSON = "assets/directions/directions_lessons_20.json";
const RATE = 0.8;
const SLIDE_MS = 4600;
const BGM_URL = "./assets/directions/bgm.mp3";
const BGM_VOLUME = 0.16;

const TOTAL_STAGES = 20;
const COIN_EVERY_STAGES = 5;

const $ = id => document.getElementById(id);

const LOCAL_LANGS = {
  ja:{label:"日文", short:"日", speech:"ja-JP"},
  da:{label:"丹麥文", short:"丹", speech:"da-DK"},
  it:{label:"義大利文", short:"義", speech:"it-IT"},
  es:{label:"西班牙文", short:"西", speech:"es-ES"},
  fr:{label:"法文", short:"法", speech:"fr-FR"},
  de:{label:"德文", short:"德", speech:"de-DE"},
  ko:{label:"韓文", short:"韓", speech:"ko-KR"},
  ne:{label:"尼泊爾文", short:"尼", speech:"en-US"}, 
  hi:{label:"印地文", short:"印", speech:"hi-IN"},
  en:{label:"只英文", short:"EN", speech:"en-US"}
};

let selectedLocalLang = "ja";
let activeIndex = 0;
let photoIndex = 0;
let photoOrder = [];
let slideTimer = null;
let speaking = false;
let attemptedAutoplay = false;

// 預設關卡靜態兜底資料 (會由下方 V70 的腳本接管前2關)
let lessons = [
  { "day": 1, "scene": "開口問路", "title": "Asking Directions", "en": "We would like a table for two.", "zh": "我們想要兩人座位。" },
  { "day": 2, "scene": "尋找車站", "title": "Finding Station", "en": "This table is fine, thank you.", "zh": "這個位子可以，謝謝。" }
];
let photos = ["assets/directions/directions-01.png"];

function toast(msg){
  const t=$("toast");
  if(!t) return;
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("show"),2200);
}

function completedStageCount(){
  let n = 0;
  for(let i=1; i<=TOTAL_STAGES; i++){
    if(localStorage.getItem("bw_directions_game_v29_done_" + i) === "1") n++; else break;
  }
  return n;
}

function currentStageIndex(){
  const count = completedStageCount();
  return Math.min(TOTAL_STAGES - 1, count);
}

function isUnlockedIndex(idx){ return idx <= completedStageCount(); }

function goToStage(idx){
  const max = completedStageCount();
  activeIndex = Math.max(0, Math.min(idx, max, TOTAL_STAGES - 1));
  render();
}

function showPhoto(i){
  const img = $("photo");
  if(img && photos.length) img.src = photos[i % photos.length] || "";
}

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function saveTodayComplete(){
  const key = todayKey();
  const arr = JSON.parse(localStorage.getItem("bw_directions_game_v29_dates") || "[]");
  if(!arr.includes(key)){
    arr.push(key);
    localStorage.setItem("bw_directions_game_v29_dates", JSON.stringify(arr.slice(-120)));
  }
}

function calcStreak(){
  const arr = JSON.parse(localStorage.getItem("bw_directions_game_v29_dates") || "[]");
  const set = new Set(arr);
  let d = new Date();
  let n = 0;
  for(;;){
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    if(!set.has(key)) break;
    n++;
    d.setDate(d.getDate()-1);
  }
  return n;
}

function updateProgress(){
  const currentDay = activeIndex + 1;
  const count = completedStageCount();
  const done = localStorage.getItem("bw_directions_game_v29_done_" + currentDay) === "1";

  safeSet("miniStage", `第 ${currentDay} 關`);
  safeSet("miniDone", `${count}/${TOTAL_STAGES}`);
  safeSet("miniCoins", `金${Math.floor(count / COIN_EVERY_STAGES)}`);
  
  const mod = count % COIN_EVERY_STAGES;
  const nextNeed = mod === 0 ? COIN_EVERY_STAGES : COIN_EVERY_STAGES - mod;
  safeSet("miniNextCoin", `再${nextNeed}關`);

  const btn = $("completeBtn");
  if(btn){
    if(done){
      btn.textContent = "✅ 本關已完成";
      btn.className = "completeBtn done";
    } else if(window.__quizCorrect){
      btn.textContent = "進入下一關";
      btn.className = "completeBtn ready";
    } else {
      btn.textContent = "先答題";
      btn.className = "completeBtn";
    }
  }
}

function safeSet(id, val){ const el=$(id); if(el) el.textContent=val; }

function completeToday(force=false){
  const currentDay = activeIndex + 1;
  if(!force && !window.__quizCorrect){ toast("先答對小測驗"); return; }
  
  localStorage.setItem("bw_directions_game_v29_done_" + currentDay, "1");
  saveTodayComplete();
  updateProgress();
  
  // 彈出過關獎勵
  safeSet("rewardTitle", `第 ${currentDay} 關完成！`);
  const m = $("rewardModal");
  if(m) m.classList.add("show");
}

function closeReward(){
  const m = $("rewardModal");
  if(m) m.classList.remove("show");
  
  // 自動推進到下一關
  const nextIdx = currentStageIndex();
  if(nextIdx !== activeIndex){
    activeIndex = nextIdx;
    render();
    if(!speaking) playAll();
  } else if(activeIndex === TOTAL_STAGES - 1) {
    const fm = $("finishModal");
    if(fm) fm.classList.add("show");
  }
}

function closeFinishModal(){ const m = $("finishModal"); if(m) m.classList.remove("show"); }

function prevDay(){ stopAll(); if(activeIndex > 0){ activeIndex--; render(); } }
function nextDay(){
  stopAll();
  if(!isUnlockedIndex(activeIndex + 1)){ toast("先完成本關，才能進下一關"); return; }
  if(activeIndex < TOTAL_STAGES - 1){ activeIndex++; render(); }
}

function render(){
  // 清除答題狀態
  window.__quizCorrect = localStorage.getItem("bw_directions_game_v29_done_" + (activeIndex + 1)) === "1";
  updateProgress();
  if(window.BW_syncMultilangV70) window.BW_syncMultilangV70();
}

function stopAll(){
  try{ speechSynthesis.cancel(); }catch(e){}
  speaking = false;
  const p = $("play"); if(p) p.textContent = "▶";
  const h = $("playHint"); if(h) h.textContent = "點一下播放";
}

function playAll(){
  if(speaking){ stopAll(); return; }
  if(window.BW_getCurrentMultilangText){
    speaking = true;
    const p = $("play"); if(p) p.textContent = "❚❚";
    const h = $("playHint"); if(h) h.textContent = "播放中";
    
    // 取得當前關卡的英文
    const heroEnText = $("heroEn") ? $("heroEn").textContent : "";
    const uEn = new SpeechSynthesisUtterance(heroEnText);
    uEn.lang = "en-US";
    uEn.rate = RATE;
    
    uEn.onend = uEn.onerror = () => {
      setTimeout(() => {
        if(!speaking) return;
        const v70Obj = window.BW_getCurrentMultilangText();
        if(v70Obj && v70Obj.text){
          const uLocal = new SpeechSynthesisUtterance(v70Obj.text);
          uLocal.lang = v70Obj.langCode;
          uLocal.rate = RATE;
          uLocal.onend = uLocal.onerror = () => { stopAll(); };
          speechSynthesis.speak(uLocal);
        } else {
          stopAll();
        }
      }, 100); // 英文唸完完整停頓 0.1 秒
    };
    speechSynthesis.speak(uEn);
  }
}

function initLocalSelector(){
  const sel = $("localSelect");
  if(sel){
    sel.value = selectedLocalLang;
    sel.onchange = () => {
      selectedLocalLang = sel.value;
      render();
    };
  }
}

function bind(){
  if($("prev")) $("prev").onclick = prevDay;
  if($("next")) $("next").onclick = nextDay;
  if($("photoPrev")) $("photoPrev").onclick = (e)=>{ e.stopPropagation(); prevDay(); };
  if($("photoNext")) $("photoNext").onclick = (e)=>{ e.stopPropagation(); nextDay(); };
  if($("play")) $("play").onclick = playAll;
  if($("hero")) $("hero").onclick = playAll;
  if($("rewardOk")) $("rewardOk").onclick = closeReward;
  if($("rewardClose")) $("rewardClose").onclick = closeReward;
  if($("finishClose")) $("finishClose").onclick = closeFinishModal;
  if($("completeBtn")) $("completeBtn").onclick = () => {
    if(window.__quizCorrect) {
      const nextIdx = currentStageIndex();
      if(nextIdx !== activeIndex) { activeIndex = nextIdx; render(); if(!speaking) playAll(); }
    } else {
      completeToday(false);
    }
  };
}

window.addEventListener("load", () => {
  activeIndex = currentStageIndex();
  initLocalSelector();
  bind();
  render();
});
</script>

<!-- V70 多國發音核心與內建補丁 (完美修復圖二標題找回英文、選題連動發音與點擊過關) -->
<script id="bw-multilang-v70-fix">
(function(){
  const LOCAL_LANGS_V70 = {
    ja:{label:"日文", short:"日", speech:"ja-JP"},
    it:{label:"義大利文", short:"義", speech:"it-IT"},
    da:{label:"丹麥文", short:"丹", speech:"da-DK"},
    es:{label:"西班牙文", short:"西", speech:"es-ES"},
    fr:{label:"法文", short:"法", speech:"fr-FR"},

    ko:{label:"韓文", short:"韓", speech:"ko-KR"},
    ne:{label:"尼泊爾文", short:"尼", speech:"en-US"},
    hi:{label:"印地文", short:"印", speech:"hi-IN"},
    en:{label:"只英文", short:"EN", speech:"en-US"}
  };

  const MULTI_V70 = [
    {
      day: 1, scene: "開口問路", title: "Asking Directions",
      en:"Excuse me, could you help me?", zh:"不好意思，可以幫我嗎？",

      ne:"माफ गर्नुहोस्, के तपाईं मलाई मद्दत गर्न सक्नुहुन्छ?", ne_roman: "Maaf garnuhos, ke tapain malai madat garna saknuhunchha?", hi:"माफ कीजिए, क्या आप मेरी मदद कर सकते हैं?",
      answers:[
        {en:"Sure. Where would you like to go?", zh:"可以，你想去哪裡？", ja:"もちろんです。どこへ行きたいですか。", it:"Certo. Dove vorrebbe andare?", da:"Selvfølgelig. Hvor vil du gerne hen?", es:"Claro. ¿Adónde le gustaría ir?", fr:"Bien sûr. Où voulez-vous aller ?", de:"Gerne. Wohin möchten Sie gehen?", ko:"물론이죠. 어디로 가고 싶으세요?", ne:"हुन्छ। तपाईं कहाँ जान चाहनुहुन्छ?", ne_roman: "Hunchha. Tapain kahan jana chahannuhunchha?", hi:"ज़रूर。आप कहाँ जाना चाहेंगे?", correct:true},
        {en:"Please show me your boarding pass.", zh:"請出示你的登機證。", ja:"搭乗券を見せてください。", it:"Mi mostri la carta d’imbarco, per favore.", da:"Vis mig venligst dit boardingkort.", es:"Muéstreme su tarjeta de embarque, por favor.", fr:"Veuillez me montrer votre carte d’embarquement.", de:"Bitte zeigen Sie mir Ihre Bordkarte.", ko:"탑승권을 보여 주세요.", ne:"कृपया आफ्नो बोर्डिङ पास देखाउनुहोस्।", ne_roman: "Kripaya aaphno boarding pass dekhaunuhos.", hi:"कृपया अपना बोर्डिंग पास दिखाइए।"},
        {en:"Take this medicine after meals.", zh:"請飯後吃這個藥。", ja:"食後にこの薬を飲んでください。", it:"Prenda questa medicina dopo i pasti.", da:"Tag denne medicin efter måltider.", es:"Tome este medicamento después de comer.", fr:"Prenez ce médicament après les repas.", de:"Nehmen Sie dieses Medikament nach dem Essen.", ko:"식후에 이 약을 드세요.", ne:"यो औषधि खाना पछि खानुहोस्।", ne_roman: "Yo aushadhi khana pachhi khannuhos.", hi:"यह दवा खाने के बाद लें।"}
      ]
    },
    {
      day: 2, scene: "尋找車站", title: "Finding Station",
      en:"Where is the nearest station?", zh:"最近的車站在哪裡？",
      ja:"最寄りの駅はどこですか。", it:"Dov’è la stazione più cuzina?", da:"Hvor er den nærmeste station?", es:"¿Dónde está la estación más cercana?", fr:"Où est la gare la plus proche ?", de:"Wo ist der nächste Bahnhof?", ko:"가장 가까운 역이 어디예요?", ne:"नजिकैको स्टेशन कहाँ छ?", ne_roman: "Najikai ko station kahan chha?", hi:"सबसे नज़दीकी स्टेशन कहाँ है?",
      answers:[
        {en:"Go straight and turn left.", zh:"直走後左轉。", ja:"まっすぐ行って、左に曲がってください。", it:"Vada dritto e giri a sinistra.", da:"Gå ligeud og drej til venstre.", es:"Siga recto y gire a la izquierda.", fr:"Allez tout droit puis tournez à gauche.", de:"Gehen Sie geradeaus und biegen Sie links ab.", ko:"곧장 가서裝쪽으로 도세요.", ne:"सिधा जानुहोस् र बायाँ मोडिनुहोस्।", ne_roman: "Sidha januhos ra bayan modinhos.", hi:"सीधे जाइए और बाएँ मुड़िए。", correct:true},
        {en:"I would like a table for two.", zh:"我想要兩人座。", ja:"二名席をお願いします。", it:"Vorrei un tavolo per due.", da:"Jeg vil gerne have et bord til to.", es:"Quisiera una mesa para dos.", fr:"Je voudrais une table pour deux.", de:"Ich hätte gern einen Tisch für zwei.", ko:"두 명 자리 부탁합니다.", ne:"म दुई जनाको लागि टेबल चाहन्छु।", ne_roman: "Ma dui jana ko lagi tebal chahanchhu.", hi:"मुझे दो लोगों के लिए एक मेज़ चाहिए।"},
        {en:"The food was delicious.", zh:"食物很好吃。", ja:"料理はおいしかったです。", it:"Il cibo era delizioso.", da:"Maden var lækker.", es:"La comida estaba deliciosa.", fr:"La nourriture était délicieuse.", de:"Das Essen war lecker.", ko:"음식이 맛있었어요.", ne:"खाना स्वादिष्ट थियो।", ne_roman: "Khana swadila thiyo.", hi:"खाना स्वादिष्ट था।"}
      ]
    }
  ];

  function lang(){const s=document.getElementById("localSelect"); return (s&&LOCAL_LANGS_V70[s.value])?s.value:"ja";}
  function cfg(){return LOCAL_LANGS_V70[lang()]||LOCAL_LANGS_V70.ja;}
  
  function localOf(obj, forSpeech=false){
    const code=lang();
    if(code==="en") return "";
    if(code==="ne" && forSpeech && obj && obj.ne_roman){ return String(obj.ne_roman); }
    return String((obj&&obj[code]) || (obj&&obj.local) || "");
  }
  
  function speakLang(){
    const code=lang();
    if(code==="en") return "en-US";
    return (LOCAL_LANGS_V70[code]||LOCAL_LANGS_V70.ja).speech;
  }

  function speakText(text, language){
    if(!text) return;
    try{ speechSynthesis.cancel(); }catch(e){}
    const u=new SpeechSynthesisUtterance(String(text));
    u.lang=language||"en-US";
    u.rate=0.8;
    try{ speechSynthesis.speak(u); }catch(e){}
  }

  function current(){
    const idx = Math.max(0, Math.min((window.activeIndex||0), MULTI_V70.length-1));
    return MULTI_V70[idx] || MULTI_V70[0];
  }

  window.BW_getCurrentMultilangText = function() {
    const l = current();
    return { text: localOf(l, true), langCode: speakLang() };
  };

  function syncAll(){
    const l = current();
    
    // 【修復核心】完整找回並重繪圖二上半部的英文標題與場景說明文字
    const tBox = document.getElementById("title"); if(tBox) tBox.textContent = l.title;
    const sBox = document.getElementById("scene"); if(sBox) sBox.textContent = l.scene;
    
    // 同步圖一上半部的 Hero 英日文字
    const en=document.getElementById("heroEn"), lo=document.getElementById("heroJa");
    if(en) en.textContent=l.en;
    if(lo){
      const tx=localOf(l, false);
      lo.textContent=tx;
      lo.style.display=tx?"block":"none";
    }
    
    // 同步其餘頂部欄位說明
    const hs=document.getElementById("headerSub");
    if(hs) hs.textContent = `第 ${(window.activeIndex||0)+1} 關｜英文＋${cfg().label}｜中文只顯示`;

    // 重新繪製小測驗選項卡片
    const q=document.getElementById("quizQ"), box=document.getElementById("choices");
    if(q) q.textContent = `「${l.en}」選合理回答：`;
    if(!box) return;

    box.innerHTML = l.answers.map((a,i)=>{
      const local=localOf(a, false);
      return `<button class="choice" type="button" data-index="${i}" data-correct="${a.correct?'1':'0'}">
        <div class="choiceInner">
          <span class="choiceNo">${String.fromCharCode(65+i)}.</span>
          <span class="choiceText">
            <span class="choiceZh">${a.en}</span>
            ${local?`<span class="choiceJa">${local}</span>`:''}
            <span class="choiceZh" style="font-size:11px;color:#bfdbfe;margin-top:2px">${a.zh}</span>
          </span>
          <span class="choiceSpeak" data-index="${i}">🔊</span>
        </div>
      </button>`;
    }).join("");

    // 綁定選項按鈕點擊，精準處理選題判斷對錯、發音與解鎖過關機制
    box.querySelectorAll(".choice").forEach(btn => {
      btn.onclick = (ev) => {
        if(ev.target && ev.target.classList.contains("choiceSpeak")) return;
        
        const isCorrect = btn.dataset.correct === "1";
        const idx = btn.dataset.index;
        const a = l.answers[idx];

        if(isCorrect) {
          // 答對了
          box.querySelectorAll(".choice").forEach(b=>b.disabled=true);
          btn.className = "choice correct";
          window.__quizCorrect = true;
          window.updateProgress();
          toast("答對了！");

          // 連動發音：英文 -> 停頓 0.1 秒 -> 第二語言
          speakText(a.en, "en-US");
          const speechLocal = localOf(a, true);
          if(speechLocal) {
            setTimeout(() => { speakText(speechLocal, speakLang()); }, 100);
          }
          
          // 自動延時觸發完成過關卡片
          setTimeout(() => { window.completeToday(true); }, 1200);
        } else {
          // 答錯了
          btn.className = "choice wrong";
          toast("答錯了，再選一次");
          setTimeout(() => { btn.className = "choice"; }, 900);
        }
      };
    });

    // 喇叭按鈕單獨發音
    box.querySelectorAll(".choiceSpeak").forEach(sp => {
      sp.onclick = (ev) => {
        ev.stopPropagation();
        const idx = sp.dataset.index;
        const a = l.answers[idx];
        speakText(a.en, "en-US");
        const speechLocal = localOf(a, true);
        if(speechLocal) setTimeout(() => { speakText(speechLocal, speakLang()); }, 100);
      };
    });
  }

  window.BW_syncMultilangV70 = syncAll;
})();
</script>
